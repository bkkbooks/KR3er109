  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3er109_jc_013-d15.h1s1}
  - {type: 'tls:div-start', offset: 3, content: '', id: KR3er109_jc_013-d15d2, level: 2, head_text: 諸痹源流白虎歷節風}
  - {type: 'tls:head', offset: 3, content: '', id: KR3er109_jc_013-d15.d2.h1s1}
  - {type: 'tls:div-start', offset: 3976, content: '', id: KR3er109_jc_013-d15.d2d4, level: 3, head_text: 白虎歷節風痛痹之一症也以其痛循歷遍身百節故曰歷節}
  - {type: 'tls:head', offset: 3976, content: '', id: KR3er109_jc_013-d15.d2.d4.h1s1}
