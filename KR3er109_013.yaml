body:
  text: 卷十三諸痹源流白虎歷節風諸痹風寒濕三氣犯其經絡之陰而成病也故經曰病在陽曰風病在陰曰痹痹者閉也三氣雜至壅蔽經絡血氣不行不能隨時祛散故久而為痺或遍身或四肢攣急而痛或有不痛者病久入深也入於骨則重而不舉為骨痹入於血則凝而不流為脈痹入於筋則屈而不伸為筋痹入於肉則肌肉不仁為肉痹入於皮則寒在皮毛為皮痹說筋骨皮脈肉間得邪則氣緩故雖痹而不痛然痹之為病每各以時遇如冬氣在骨遇三氣故成骨痹春氣在筋遇三氣故成筋痹夏氣在脈遇三氣故成脈痹季夏氣在肉遇三氣成肉痹秋氣在皮遇三氣故成皮痹皆各以主時受之也而筋骨皮肉脈又各有五臟之合茍五者受而不去則必內舍於合而五臟之痹起何言之骨痹久復感三氣內舍於腎則善脹尻以代踵脊以代頭說胃氣下行而腎為胃關腎既痹則腎氣不行是陽明逆也故善脹腎為作強之官痹則足攣而不能伸故尻代踵身僂而不能直故脊代頭也筋痹久復感三氣內舍於肝則多飲溲數夜臥易驚上為引如懷說肝內熱脾不淫精於肝故渴而多飲肝熱下乘膀胱故溲數肝藏魂肝痹則氣血兩衰故魂不歸而易驚經絡有氣無血故上下相引而血不得赴若結於中而如懷也脈痹久復感三氣內舍於心則脈不通煩則心下鼓暴上氣咽乾善噫厥氣上而恐說心合脈而痹入之故脈不通不通則心氣鬱故鼓暴鼓暴則氣逆而喘故上氣心脈起心中上挾胃挾咽故咽乾善噫厥為陰氣心火衰而邪乘之故神怯而恐也肉痹久復感三氣內舍於脾則四肢怠惰發咳嘔汁上為大塞說肢惰者肉痹之驗脾痹則本臟不足不能散精反上壅肺故發咳上焦不通故嘔汁甚則否塞也皮痹久復感三氣內舍於肺則煩滿喘而嘔說痹既入肺則臟氣閉而不通本氣不能升舉肺膱行治節痹則上焦不通而胃氣逆故煩滿喘而嘔也此五臟之痹各以其症顯者臟症顯便不易治宜五痹湯各加本經藥以復感云者既已成痹又各以其主時重受風寒濕之邪氣為病而深也經又曰淫氣喘息痹聚肺淫氣憂思痹聚心淫氣溺澀痹聚腎淫氣乏竭痹聚肝淫氣飢飽痹聚脾則不特三氣入舍於其合而後成痹即七情過用亦能傷臟氣而為病以氣淫則燥能消陰故也由五臟而推六腑亦以飲食居處為病本而後邪中其腧而內應之是以循其腧各舍於其腑也即如腸痹經言數飲而出不得中氣喘爭時發喘息者以腸兼大小而言二腸患痹則下焦之氣熱鬱不行故飲雖多而水不得出水不出則本末俱病故與中氣喘爭且清濁不分而飧泄也又如胞痹經言少腹膀胱按之內痛若沃以湯澀於小便上為清涕者以胞者膀胱也氣閉故按之痛水閉不行故蓄熱若沃湯且溲澀太陽之脈從巔絡腦故上為清涕也腸痹宜五苓散加木通桑皮麥冬胞痹宜腎瀝湯即經言二痹凡六腑可推矣經又言十二經筋之病支轉筋痛皆曰痹何也以其經筋在外其病不及經隧之榮氣故於臟腑無涉惟三氣得以病之故按四季之痹以見其所感之由然手足三陰之筋皆內結胸腹肓膜間其為病自有異如足以少陰筋主癇瘛及痙足厥陰筋主陰器不用與不起不收手少陰筋主舌卷手太陰筋主息賁脅急吐血手少陰筋主伏梁唾膿血雖筋痹而臟腑氣矣總宜淒痹湯總之諸痹不已益入內而傷臟氣然有六經應之而為有餘不足者經曰厥陰有餘病陰痹不足病熱痹滑則病狐風疝澀則病少腹積氣滑與澀者其脈之見於其部而知其有餘不足也說厥陰位下焦總諸筋有餘則木壅不升邪鬱陰分故病陰痹不足則虛而生熱故病熱痹若其脈見滑是邪有餘狐風疝者其疝如狐而數變如風也疝在前陰少腹間當肝部肝鬱於此即陰痹也脈見澀是氣血虛滯邪留則為積即熱痹也經又曰少陰有餘病皮痹癮疹不足病肺痹滑則病肺風疝澀則病積溲血說少陰君火之氣有餘則尅金肺合皮故癮疹不足則不能溫金故肺痹若脈見滑心火不勝水邪便鬱而實於肺風則肺動疝則肺聚也脈見澀仍為心血不足火收於內而入小腸包絡故積與溲血也經又曰太陰有佘病肉痹寒中不足病脾痹滑病脾風疝澀病積心腹時痛說脾主肉邪有餘則濕鬱而不運故為肉痹中氣濕則陽明之火不能揚故寒中不足則脾自受而成痹本氣不行也若脈見滑水濕壅土亦病在濕脈見澀積而不流故中州滿也經又曰陽明有餘病脈痹身時熱不足病心痹滑病心風疝澀病積時善驚說陽明燥金之氣應脈燥有餘則傷血脈故脈痹燥侮陰故肉痹脈為心行血脈者也肺不足心脈反窒故心痹若脈見滑則風燥合邪傷肺傷血將心氣抽掣而不得散故成心風疝脈見澀則金斂不舒脈為不行而積善驚木侮金也經又曰太陽有餘病骨痹身重不足病腎痹滑病腎風疝澀病積癲疾說腎氣應太陽太陽時氣有餘則浸淫及骨而痹水邪盛而作強之官弛故身重不足則本臟先受而痹將足緩脈酸精不堅固若脈見滑太陽之風寒合邪而為腎風疝澀則邪痹太陽經脈而有積癲疾者陽氣不通巔頂故常風痛也經又曰少陽有餘病筋痹脅滿不足病肝痹滑病肝風疝澀病積時筋急目痛說相火之氣犯陰則肝受之若邪有餘則火傷筋而痹脅滿肝部在脅也不足是肝木虛而痹肝痹者邪鬱而血不榮筋之症也若脈見滑風熱合邪淫氣聚筋而寒熱往來抽掣相引而為肝風疝脈見澀則血滯而積筋急目痛皆肝病也以上皆六氣犯陰犯陽之痹症也人身陰陽天地之六氣應故六氣亦有時而內淫且因臟腑陰陽之有餘不足而外邪得以留之此於氣運之外又有所留為陰陽之痹也脈滑為邪有餘故留滯為風疝風謂其動疝謂其聚也澀為本氣不足故不能勝邪而成積疝與積概指其聚而積者非特前陰少腹之病也雖然內經之言痹固可闡而明之矣而仲景書又有所謂血痹者曰尊榮人骨弱肌膚盛重因勞疲汗出臥不吐動搖加被微風遂得之大抵此症原於質虛勞倦之故說以尊榮者素安閒故骨弱素膏粱故肌膚盛一旦疲勞汗出則氣竭表虛因而臥則神不斂或時動搖而微風乘之此時本氣弱疲勞又耗氣汗則陽氣泄臥則陽氣伏則外之陽氣不能固閉榮氣又復動搖風雖微而易入故風與血相搏而成痹也然風搏於中上二焦寸口關上脈必微澀而邪之前鋒早及下焦尺中必見小緊得如此脈而又身體不仁如風痹狀故知為血痹症也宜黃芪桂枝五物湯仲景書又有所謂胸痹者其為症狀不一曰胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數此則胸痹實症的脈凡患胸痹者皆然宜栝蔞薤白白酒湯至其症狀又有雜出者曰胸痹以下凡言胸痹皆具有喘息咳唾胸背痛短氣等狀而又及有他症不得臥胸背徹痛則症兼支飲矣說不得臥由於有飲飲原不痛飲由胸痹故心痛徹背也宜栝蔞薤白半夏湯曰胸痹心中痞留氣結在胸胸滿脅下逆搶心乃上焦陽微而客氣動鬲故有心痞胸滿之象其言留氣即客氣至脅下逆搶心則不特上焦虛而中焦亦虛陰邪得以據之也宜枳實薤白桂枝湯人參湯曰胸痹胸中氣塞短氣夫胸既痹而又言氣塞短氣是較喘息等更覺幽閉不通邪氣之有餘實甚也宜茯苓杏仁甘草湯橘枳生薑湯曰胸痹緩急者乃胸痹之邪淫及於筋故肢節之筋有緩有急也宜薏苡附子散曰心中痞諸逆心懸痛曰心痛徹背背痛徹心二節俱不貫胸痹字是不必具有胸痹實症而各自成病耳說陰邪凝結心中乃痞心中之痞因初時氣逆逮至心痛如懸則前因逆而邪痞心中者後乃邪結心中而下反如空也宜桂枝生薑枳實湯心與背本兩處中有空竅乃正氣所貯以通上下者今痛則相徹是正氣之虛寒邪乘虛而相搏結也宜烏頭赤石脂丸然則仲景言血痹胸痹二症固均屬陽虛之疾不與他痹症相同故於血痹謂宜針引陽氣於胸痹謂當全責陽虛也此又於內經臟腑陰陽諸痹之外所可詳及者然而風寒濕三氣之相勝其為病亦在可枚舉者風勝為行痹游行上下隨其虛處風邪與正氣相搏聚於關節筋弛脈緩痛無定處古名走注今名流火俗有鬼箭風之說亦此類宜防風湯而其所統之病有濕傷腎腎不生肝肝風挾濕走注四肢肩髃者宜苡仁散有肢節腫痛日夜無已時者宜沒藥散虎骨丸控涎丹亦可寒勝為痛痹四肢攣痛關節浮腫痛有定處是名痛風又名白虎歷節風宜加減五積散而其所統之病有兼風者宜加減烏藥順氣散有兼濕而天陰即發身體沉重者宜除濕捐痹湯在上加桂枝桔梗威靈仙在下加防己木通牛膝有兼痰者宜豁痰湯有兼火者宜四物湯多加酒柏竹瀝薑汁有兼濕熱者宜二妙散有兼血瘀者宜桃紅飲子有晝靜夜發痛如虎咬此正名白虎歷節風大約掣因多寒腫因多濕汗因多風特以其原由症狀之繁另詳條款於後濕勝為著痹病而不移汗多四肢緩弱精神昏塞皮膚不仁宜茯苓川芎湯而其所統之症不外麻木另詳麻木條中大約風勝之脈必浮寒勝之脈必澀濕勝之脈必緩三痹各有所勝治藥則以勝者為主然亦不可舉一廢二以三氣本雜合成病也三痹之外更有熱痹由臟腑移熱復遇外邪故身熱唇口反裂皮膚色變也宜升麻湯更有周痹由犯三氣遍及於身故周身俱痛也宜蠲痹湯更有支飲夫支飲本痰飲中症此則兼有痹病故復詳於此仍列其名為支飲其原由受三氣兼挾痰涎宿飲故手足麻痹臂痛不舉多睡眩冒忍尿不便膝冷成痹也宜茯苓湯以上三症皆痹之屬而痹症多兼麻木說麻猶痹也雖不知痛癢尚覺氣微流行非若木之痛癢不知即氣亦不流行者而麻木原委另詳本篇痹又與風與痿相類靈樞曰病在陽曰風病在陰曰痹陰陽俱病曰風痹陽者表與上陰者裡與下也總之痹本氣閉不通或痛或癢或頑麻或手足緩弱與痿病相似但痿因血虛火盛肺焦而成痹因風寒濕氣侵入而成也痹又為中風之一然雖一例而受病各異痹兼三氣因陰受之中風則陽受之也學醫者能神而明之類而推之切而治之可以司人之命矣脈法脈經曰脈澀而緊為痹痛脈訣曰風寒濕氣合而為痹浮澀而緊三脈乃備玉機曰脈大而澀為痹脈來急亦為痹也諸痹原由症治內經曰汗出而風吹之血凝於膚者則為痹又曰風之為病當半身不遂或但臂不遂者此為痹又曰虛邪中人留而不去則為痹衛氣不行則為不仁又曰痹病痛者寒氣多有寒故痛也不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不榮故不仁其或寒者陽氣少陰氣多與病相益故寒也其或熱者陰氣少陽氣多病氣勝陽乘陰故為痹熱其多汗而濡者此其逢濕盛也陽氣少陰氣多兩氣相感故汗出而濡也類聚曰不仁者何以明之仁者柔也不仁謂不柔和也痛癢不知寒熱不知灸刺不知是謂不仁也入門曰痹之初起驟用參芪歸地則氣鬱滯而邪不散只以行濕流氣藥主之玉機曰三氣襲入經絡久而不已則入五臟或入六腑隨其臟腑之哄合以施針灸仍服逐三氣發散等藥自愈又曰痹症因虛而感三邪既著體不去則須製對症之藥日夜飲之雖留連不去能守病禁不令入臟亦可扶持也入門曰痹病雖守禁忌凡味酸傷筋則緩味咸傷骨則痿令人發熱變為痛痹麻木等證慎疾者須戒魚腥面醬酒醋肉屬陽大能助火亦宜量吃痛風諸痹皆然鰲按痹症有手足緩弱者有筋攣不伸者有偏活不遂者有肌肉不仁者其形症往往與風痿相似而後世醫治之法亦往往與風痿相混此千古之大誤也總之風則陽受痹則陰受此二語實為風痹病之炯鑑益可見治法不當混施且痹病多重痛沉著一時未易得去其不可輕視也明矣白虎歷節風痛痹之一症也以其痛循歷遍身百節故曰歷節以其痛甚如虎咬故日白虎歷節其原皆由風寒濕入於經絡致氣血凝滯津液稽留久而怫鬱堅牢榮衛之氣阻礙難行正邪交戰故作痛不止也而所以致三氣作患之故則或飲酒當風或汗出入水或坐臥濕地或行立寒冰或體虛膚空掩護不謹而此三氣乃與血氣相搏遍歷關節遂成此症日久不治令人骨節蹉跌固未可輕視也試言其症狀必短氣自汗頭眩欲吐手指攣曲身瘣㿔其腫如脫漸至摧落其痛如掣不得屈伸須當大作湯丸不可拘以尋常之劑然其方藥又必各因病之原由輕重如由血虛血熱血瘀則必調血行血宜趁痛散或由風濕相搏肢節腫痛不可屈伸則必疏風理濕宜大羌活湯或由風濕麻痹走注疼痛為偏活為暴喑則必散鬱開結宜防風天麻丸或由風濕與痰與死血致走注刺痛其痛處或腫或紅則必宣邪通氣宜疏風活血湯或由血虛陰火而痛及腰以下濕熱注痛則必養陰清熱宜潛行散或由風冷侵入氣血氣滯血凝周身麻痛則必祛寒散邪宜五靈丸或由風毒攻注皮膚骨髓之間痛無定所午靜夜劇筋脈拘攣屈伸不得則必解結疏堅宜定痛散或由痰注百節痛無一定久乃變成風毒淪骨入髓反致不移其處則必搜邪去毒宜虎骨散加減虎膏散或由風氣游行痛無常處如蟲行遍體日靜夜劇則必宣風利氣宜麝香丸或由火甚而肢節痛濕甚而肌肉腫並受風寒而發動於經絡之中濕熱流注於節腠之際則必排解內外宜靈仙除痛飲或由濕痰流注痛及肩背則必豁痰開結宜半夏苓朮湯其餘三氣所傷或猶輕淺總必以疏風驅寒除濕為主宜龍虎丹活絡丹捉虎丹乳香定痛丸說以其痛如掣者為寒多其腫如脫者為濕多其肢節間或黃汗出者為風多而三氣之為患固變幻若斯之甚也歷節風原由症治丹溪曰此症大率因血受熱已自漲騰其後或涉水或坐濕或當風熱血得寒淤濁凝澀所以作痛夜則痛甚行於陰也治宜辛溫疏散開發腠理血行氣和其病自安又曰治痛風大法蒼朮南星川芎白芷當歸酒芩在上加羌活威靈仙桂枝桔梗在下加牛膝防己黃柏木通又曰薄桂能橫行手臂領南星蒼朮等至痛處醫鑑曰白虎歷節亦是風寒濕三氣乘之也東垣曰痛風多屬血虛血虛然後寒熱得以侵之多用芎歸佐以桃仁紅花薄桂威靈仙或用趁痛散綱目曰丹溪治法主血熱血虛血瘀或挾痰皆不離四物湯潛行散黃柏牛膝生甘草桃仁陳皮蒼朮薑汁隨症加減可謂發前人所未發也治諸痹方三十五痹湯總治人參茯苓當歸白芍川芎白朮細辛甘草五味子薑如肝心腎三痹當倍用川芎此方專治風寒濕氣客留肌體手足緩弱麻痹五苓散腸痹白朮茯苓肉桂豬苓澤瀉腎瀝湯胞痹麥冬犀角杜仲桔梗赤芍木通桑皮桑螵蛸五加皮羊腎蠲痹湯周痹當歸赤芍黃芪防風薑黃羌活各錢半甘草五分薑五片棗二枚此方專治手冷痹一云冷痺者身寒不熱腰腳沉重即寒痹之甚者黃芪桂枝五物湯血痹黃芪桂枝白芍各三錢薑六棗二日三服一方加人參瓜蔞薤百白酒湯胸痹瓜蔞一枚搗薤白半升白酒七升三味煎取二升分溫再服栝蔞薤白半夏湯又栝蔞一枚搗薤白三兩半夏半升白酒一斗煎取四升溫取一升日三服枳實薤白桂枝湯又枳實二兩薤白半斤桂枝一兩厚朴四兩栝蔞一枚搗水五升煎取二升人參湯又人參甘草乾薑白朮各三錢水八升煎三升溫服一升日三服茯苓杏仁甘草湯又茯苓三兩杏仁五十個甘草一兩水一斗煎五升溫服一升日三服不差更服橘枳生薑湯又橘皮一斤枳實三兩生薑半斤水五升煎二升分溫再服薏苡附子湯又苡仁十五兩附子十枚炮杵為散服方寸匕日三服桂枝生薑枳實湯又桂枝生薑各三兩枳實五兩水六升煎三升分溫三服赤石脂丸又烏頭一分蜀椒二分附子一分乾薑一分赤百脂二分防風湯行痹防風錢半當歸赤苓獨活杏仁桂心甘草各一錢麻黃五分黃芩秦艽葛根各三分薑五棗二此方專治行痹走注無定苡仁散走注苡仁川芎當歸乾薑肉桂川烏羌活獨活麻黃防風白朮甘草沒藥散肢節痛沒藥虎骨等分每末三錢酒下此方兼治走注痛虎骨丸又虎骨五靈脂白膠薑蠶威靈仙各一兩烏頭兩半酒糊丸控涎丹又加減五積散痛痹茯苓白芷半夏川芎當歸陳皮乾薑甘草白芍蒼朮桔梗桂枝麻黃厚朴加減烏藥順氣丸因風烏藥麻黃陳皮各二錢薑蠶五分川芎枳殼白芷甘草桔梗各五錢薑棗除濕捐痹湯因濕蒼朮二錢白朮茯苓羌活澤瀉各錢半陳皮一錢甘草五分薑汁竹瀝各三匙豁痰湯因痰柴胡半夏各四兩黃芩二兩半人參甘草紫蘇陳皮南星厚朴各二兩薄荷兩半羌活一兩枳殼二兩竹瀝薑汁丸四物湯因火川芎當歸白芍生地二妙散濕熱酒黃柏製蒼朮等分桃紅飲子瘀血桃仁紅花川芎當歸威靈仙加麝少部水煎茯苓川芎湯著痹赤苓桑皮各錢半川芎防風麻黃赤芍當歸各一錢陳皮甘草各五分棗二枚此方兼治麻木不仁升麻湯熱痹升麻茯苓人參防風羌活官桂犀角羚羊角加竹瀝當歸湯血痹當歸赤苓赤芍獨活防風黃芩秦艽甘草肉桂薑茯苓湯支飲半夏赤苓橘皮枳殼桔梗甘草薑治白虎歷節風方十六趁痛散歷節風桃仁紅花當歸地龍五靈脂酒牛膝酒羌活便香附甘草各二錢乳香沒藥各一錢每末二錢酒下此方治風痹之由血虛血瘀者大羌活湯又羌活升麻各錢半獨活一錢威靈仙蒼朮防己白朮當歸澤瀉赤苓甘草各七分防風天麻丸又滑石二兩防風天麻川芎羌活白芷草烏白附子荊芥穗當歸甘草各五錢蜜丸彈子大每服半丸或一丸熱酒化下覺藥力運行微麻為度此開鬱散結宣風通氣之妙劑也或為末蜜酒調下一錢亦可疏風活血湯又當歸川芎威靈仙白芷防己黃柏南星蒼朮羌活桂枝各一錢紅花三分薑五片潜行散又黃柏木酒浸焙乾為末每一錢薑汁和酒調服此藥必兼用四物湯間服之尤妙五靈丸又五靈脂二兩川烏兩半沒藥一兩乳香五錢水丸彈子大每丸薑湯和酒下定痛散又蒼耳子骨碎補自然銅血竭白附子赤荷當歸白芷肉桂沒藥防風牛膝各七錢半虎脛骨龜板各五錢天麻五加皮羌活檳榔各二錢半每末一錢溫酒下虎骨散又虎骨二兩白花蛇天麻防風牛膝薑蠶酒當歸乳香肉桂各一兩炙甘草全蠍各五錢麝香一錢每末二錢溫酒下豆淋酒尤妙一方加有自然銅白附子羌活檳榔川芎白芷各一兩地龍沒藥雄黃各五錢服法亦同加減虎骨散又虎脛骨三兩沒藥五錢每末二錢溫酒下麝香丸又川烏大者二個全蠍二十一個生地龍五錢生黑豆二錢半麝香一字糯米糊丸緑豆大空心酒下七丸或九丸出汗便差靈仙除痛飲又麻黃赤芍各一錢防風荊芥羌活獨活酒芩白芷蒼朮威靈仙枳實桔梗川芎葛根各五分歸梢升麻甘草各三分一名麻黃芍藥湯半夏苓朮湯又蒼朮二錢白朮錢半半夏南星酒黃芩香附各一錢陳皮赤苓各五分威靈仙三分甘草二分薑三片一方有羌活龍虎丹又草烏蒼朮白芷各一兩用童便薑汁蔥汁拌蒸乳香沒藥各三錢當歸牛膝各五錢酒糊丸彈子大每一丸酒化下活絡丹又川烏草烏南星地龍各一兩乳香沒藥各二錢二分酒糊丸空心酒下二三十丸捉虎丹又五靈脂白膠草烏黑豆同煮去豆木鱉子地龍各兩半沒藥乳香當歸各七錢半麝香京墨煅各二錢半糯米糊丸芡實大每一丸空心酒化下一名一粒金丹此方專治一切痛風走注癱瘓麻木白虎歷節痛不可忍兼治寒濕腳氣走注疼痛服此藥一丸趕到腳面赤腫下散再服一丸趕至腳心中出黑汗乃除根乳香定痛丸又蒼朮二兩川烏當歸川芎各一兩丁香五錢乳香沒藥各三錢棗肉丸梧子大酒吞下五六十丸麻木源流麻木風虛病亦兼寒濕痰血病也麻非癢非痛肌肉之內如千萬小蟲亂行或遍身淫淫如蟲行有聲之狀按之不止搔之愈甚有如麻之狀木不癢不痛自己肌肉如人肌肉按之不知掐之不覺有如木之厚麻木皆有久暫暫時雖因氣血不足未足為病若用重劑反損真元惟經年纍月無一日不麻必內氣甚虛風痰湊之之故夫痰本不能作麻為風所吹如波浪沸騰而起陰陽失運行之柄安得不麻仲景曰身如蟲行汗多亡陽也則知氣虛是本風痰是標當先以生薑為向導枳殼開氣半夏逐痰防風羌活散風木通牙皂通經絡薑蠶為治蟲行之聖藥在手臂用桑條在股足加牛膝待病減用補中益氣湯多加參芪若經年纍月無一日不木乃死血凝滯於內而外挾風寒陽氣虛敗不能運動先用桂附為向導烏藥木香行氣當歸阿膠桃仁紅花活血木通牙皂穿山甲通經絡待病減用八珍湯大補氣血無不驗此治麻木之大法也而其變現於一身上下之間者正非一端可盡今條舉之有渾身麻木者宜八仙湯五積散有渾身麻木兼目縮或昏或熱者宜神效黃芪湯有皮膚麻木者是肺氣不行也宜芍藥補氣湯有暑天手麻木是熱傷元氣也宜人參益氣湯有左腿麻木沉重者宜除濕補氣湯有體倦麻木食汗善飢舌強聲啞聲重者宜清陽補氣湯有四肢腫肌肉麻者宜續斷丸有痹病甚而麻木不知者宜黃芪酒有十指面目皆麻者宜補中益氣湯有十指尖著指甲肉麻者宜沈氏桑尖湯有口舌麻木吐痰涎或身麻有痰者宜止麻消痰飲有因瘀血麻木者宜四物湯加桃仁甘草紅花有身麻木生疙瘩者宜散滯湯有因氣麻木者宜開結舒筋湯有合目則麻開目則不麻四肢痿厥目昏頭眩者宜衝和補氣湯有濕痰死血相並作麻木者宜雙合湯有自頭麻至心窩而死或自足心麻至膝說而死者宜麻骨方有婦人七情六鬱氣滯經絡手足麻痺者宜開結舒筋湯種種形症既各不同而治之之法總須以補助氣血為培本之要不可專用消散切記切記至人有大指次指麻木不仁者三年內須防中風宜一切預防常服十全大補湯加羌活秦艽若如古法服愈風湯天麻丸等開其玄府漏其真液適以招風取中耳預防云乎哉脈法正傳曰脈浮而濡屬氣虛關前得之麻在上體關後得之麻在下體又曰脈浮而緩屬濕為麻痹脈緊而浮屬寒為痛痹脈澀而芤屬死血為木不知痛癢麻木原由症治靈樞曰衛氣不行則為麻且木正傳曰河間云著痹者留著不去四肢麻木拘攣也內經曰病久入深榮衛之氣澀經絡時疏故不痛皮膚不榮故為不仁夫所謂不仁者或周身或四肢唧唧然麻木不知痛癢如繩扎縛初解之狀古方名為麻痹者是也丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木以不仁中而分為二也綱目曰如肌肉麻必待瀉榮氣而愈醫鑑曰手十指麻是胃中有濕痰死血痰用二陳湯加二朮桃仁紅花少加附子行經血用四物湯加二朮陳皮茯苓羌活蘇木紅花入門曰麻氣虛也木濕痰死血也說麻猶之痹雖不知痛癢尚覺氣微流行在手多兼風濕在足多兼寒濕木則非惟不知痛癢氣亦不覺流行也繆仲淳曰手足冷麻風冷氣血閉手足身體疼痛冷麻者宜用五靈脂二兩沒藥一兩乳香五錢川烏頭兩半炮去皮為末水丸彈子大每以生薑溫酒磨服一丸如腹皮麻痹不仁多煮蔥白食之即自愈如風淫濕痹手足麻木不舉筋節攣疼者先與通關次以全蠍七個瓦炒入麝香一字研勻酒三盞空心調服如覺已透則止未透再服如病未盡除此後專以婆蒿根酒煎二日服如面上麻木牛皮膠化和桂末厚塗一二分自愈如年久麻痹或歷節走氣疼痛不仁者不拘男女用草烏頭半斤去皮為末以袋盛豆腐半袋入烏末在內再將豆腐填滿壓乾煮一夜其藥即堅如石取出曬乾為末每服五分冷風濕氣薑湯下麻木不仁蔥白湯下導引法保生祕要曰將左足搭右膝上以有手扳左腳尖左手托腳跟扳向右頭即轉左右亦如之兼法運動氣脈自朝運央保生祕要曰氣血兩虛之症起於歸元會意運法漸行患處多旋百回以還原位行住坐臥得間皆可運用或時以指甲捻麻處捻之覺疼使血來朝之意治麻木方十九補中益氣湯治麻黃芪人參陳皮甘草白朮歸身柴胡升麻八珍湯治木人參茯苓白朮甘草川芎當歸白芍地黃八仙湯身麻木人參茯苓白朮甘草川芎當歸身白芍地黃羌活半夏陳皮秦艽牛膝柴胡桂枝防風五積散又白芷茯苓當歸半夏川芎炙草肉桂白芍枳殼麻黃陳皮桔梗厚朴乾薑蒼朮薑蔥白挾氣加吳萸神效黃芪湯昏熱人參黃芪白芍炙草陳皮蔓荊子六服可效溲澀加澤瀉大熱加丹皮或多加黃芪甚者加木通白芍目縮者去白芍芍藥補氣湯皮膚黃芪白芍陳皮炙甘草人參益氣湯暑天黃芪二錢人參生草各錢半白芍七分柴胡六分升麻炙草各五分五味子三十粒空腹服於麻木處頻按摩屈伸之午前又一服藥料稍輕亦可第二曰黃芪四錢紅花三分半陳皮五分澤瀉二分半亦是日二服第三曰黃芪三錢黃柏六分陳皮一錢半升麻一錢澤瀉錢二分白芍二錢二分生草二分炙草五分五味子三十五粒亦是日二服除濕補氣湯左腿黃芪二錢青皮一錢炙草錢半五味子三十五粒升麻錢半當歸柴胡澤瀉各五分紅花六分陳皮二分半清陽補氣湯體倦蒼朮一錢甘草當歸蒿本知母各五分升麻錢半柴胡黃柏黃芪各八分五味子四分陳皮六分續斷丸肌肉川斷當歸防風附子萆薢天麻各五錢乳香沒藥各一錢白芍二錢蜜丸酒下黃芪酒痹甚黃芪防風細辛獨活川芎牛膝各兩半附子川椒炙草各一兩川烏山萸秦艽葛根各七錢浸酒日午夜服三次虛加肉蓯蓉下利加女萎多忘加石斛菖蒲沈氏桑尖湯指尖嫩桑枝尖五錢漢防己三錢歸身酒炒二錢黃芪茯苓各錢半威靈仙秦艽各一錢川芎升麻各五分此金鱉自製方也用之屢效加人參亦可止麻消痰飲口舌黃連黃芩茯苓半夏桔梗枳殼陳皮天麻南星細辛甘草瓜蔞仁血虛加當歸氣虛加人參四物湯痰血川芎當歸白芍地黃散滯湯疙瘩防風荊芥各四分羌活獨活歸身生地蒼朮連翹檳榔元參牛蒡子忍冬藤升麻防己各五分木瓜六分木香三分黃連四分烏藥牛膝各七分茯苓白蒺藜各八分赤芍陳皮萆薢各一錢半半夏二錢加薑二蔥白二溫服取汗初服加麻黃一錢二三服加當歸一錢四服加酒大黃錢半五服即愈開結舒筋湯因氣紫蘇陳皮香附烏藥川芎羌活蒼朮南星半夏當歸各八分桂枝甘草各四分衝和補氣湯合目麻黃芪二錢蒼朮陳皮各錢半人參白朮白芍豬苓澤瀉各一錢羌活七分升麻甘草各五分當歸獨活黃柏各三分柴胡神曲木香麻黃草豆蔻黃連各二分上銼分作二貼水煎服雙合湯痰血並當歸川芎白芍生地白芥子茯苓半夏陳皮各一錢桃仁八分酒紅花甘草各三分入竹瀝薑汁麻骨方頭足麻人糞燒灰豆腐漿調服即止又方用楝子燒灰為末每三五錢酒調下破傷風源流痙痓破傷風外因病也其原有四一原卒暴傷損肌膚風邪相襲而發一由諸瘡湯洗艾灸火毒之氣內逼妄行而發一由瘡口不合貼膏留孔風氣相襲而發一由熱鬱遍身白痂瘡口閉塞氣難通泄傳播經絡而發此四因發時寒熱間甚或口噤目斜身體強直角弓反張不急治必死然四因之發雖皆由風邪外襲要必其血衰不能榮養乎筋然後邪得襲之故三因方以為傷寒汗下過多與夫病瘡人及産後多致斯病良有然也而古人於痙痓通稱為破傷風竊按痙者筋徑強直而不柔和痓者口禁角弓反張破傷風症有至筋徑強直角弓反張者非痙痓之止於破傷風說痙痓多是氣血兩虛風痰壅盛而成或傷寒雜病汗吐後感風亦成大發濕家汗亦成産後去血多亦成惟跌磕打傷瘡口未合貫風而成者乃為真破傷風三因言傷寒産後云云者以痙痓之狀與破傷風症相似而言之即古人通稱痙痓為破傷風之故非真破傷風一症也特汗後産後之痙痓有專由血液少而成者亦有血液既少復中風邪而成者以其復中風邪故亦云破傷風也但血液內虛復中乎風因成痙痓而所中有不止於風者如中乎寒則筋患緊縮中乎熱則筋患弛張中乎濕則筋患弛緩猶中乎風則筋患弦急也惟所中不止於風故風能散氣必有汗而不惡寒者亦寒能澀血必無汗而又惡寒也熱能消氣必為瘈瘲也濕能溢血必為緩弱也經所謂大筋軟短小筋弛張者非是之謂乎茲特條列其症治凡破傷風有口噤身強直者宜玉真散有發熱紅腫風邪欲傳經絡而未深入者宜水調膏有腰脊反張四肢僵直牙噤口嘴遍身冷不知人者宜全蠍散大蜈蚣散有風邪入裡發搐目直視二便祕結當下者宜左龍湯羌麻湯有痰涎極盛者宜烏蛇散有手足掉戰不已者宜朱砂指甲散有血凝昏悶者宜烏鴉散有不論新久諸瘡傳變而為破傷風者宜急風散有發汗過多變成破傷風者宜防風當歸散有亡血過多變成破傷風者宜當歸地黃湯當各隨其症以施治雖然有要法焉不可不急講也說破傷風之發痙痓當先識為何經受病如身熱足寒項強頭搖口噤背反張面搐者太陽也無汗則急汗之宜防風湯羌活防風湯小續命湯若本有汗或過多宜止之宜白朮湯白朮防風湯如頭低視下手足牽引肘膝相搖而身前搐者陽明也急下之宜左龍丸小芎黃湯大芎黃湯如或左右一目視或左右一手一足搐搦者少陽也急和之宜羌麻湯防風通聖散河間海藏輩皆本此以為治故無不中病不及三陰者以病既入陰而現有脹滿自利咽乾口燥舌卷卵縮等象俱不能生故古人不立方治而今亦不多贅也嗟乎汗下和治傷寒法也即可移以治破傷風詎不貴人之靈明哉脈法正傳曰破傷風脈浮而無力太陽也長而有力陽明也浮而弦小少陽也破傷風原由症治綱目曰破傷風者諸瘡久不合口因熱甚鬱結而榮衛不得宣通怫熱因之遍體故多白痂是時瘡口閉塞氣難宣通故熱甚而生風也又曰瘡口平無汁者中風也邊自出黃水者中水也並欲作痓須急治之又痛不在瘡處者風傷經絡亦死症也初覺瘡腫起白痂身寒熱急用玉真散貼之傷在頭面急用水調膏和雄黃敷瘡上腫漸消為度若腰脊反張四肢強直牙噤通身冷不知人急用蜈蚣細末擦牙吐出涎沫立蘇河間曰痛後搐者太陽也身前搐者陽明也兩旁搐者少陽也太陽宜汗陽明宜下少陽宜和若明此三法而不中病者未之有也又曰破傷風在表宜以辛熱發散之防風湯羌活防風湯九味羌活湯在半表半裡宜以辛涼和解之羌活湯防風通聖散在裡則以寒藥下之小芎黃湯大芎黃湯又曰破傷風雖宜發汗若自汗多則宜用白朮湯白朮防風湯入門曰破傷風多死宜用防風全蠍之類全蠍散最妙丹溪曰大凡破傷風在頭面則白芷為君防風頭佐之在身體及四肢則以防風為君隨身梢用在下部以獨活佐之醫鑑曰諸瘡欲變痓宜急風散發汗多成痓宜防風當歸散亡血多成痓宜當歸地黃湯回春曰破傷風宜早治若入臟則難治有四死症一頭面青黑色二額上有汗珠不流三眼小目瞪四身汗如油繆仲淳曰凡閃脫折骨諸瘡慎不可當風用扇中風則發痓口噤項急殺人急用蘇木為末三錢酒服立效名獨聖散或用生蟾二兩半切剁如泥入花椒一兩同酒炒熟再入酒二盞半熱服之少頃通身汗出神效或用威靈仙半兩獨頭蒜一個香油一錢同搗爛熱酒衝服汗出即愈其或打撲金刃傷及破傷風傷濕發病強直如癇狀者用南星防風等分為末水調敷瘡上出水為妙仍以溫酒調服一錢已死心尚溫者熱童便調灌三錢名奪命散即玉真散斗毆內傷墜壓者酒和童便連灌散服即蘇亦可煎服其或破傷風有表症末解者用江鰾五錢炒焦蜈蚣一對炙研為末以防風川芎羌活獨活等分煎湯調服一錢其或破傷風病傳入裡者用左蟠龍即野鴿糞江鰾薑蠶各炒五分雄黃一錢蒸餅丸梧子大每十五丸酒下取效其或破傷風濕如瘧者以黃蠟一塊熱酒化開服立效與玉真散對用尤妙痙痓風寒濕熱俱有病也痙者筋徑強直而不柔和痓者口噤而角弓反張二者雖各有症狀其原則由血氣內虛痰涎壅盛其症則寒熱交作絶似傷寒但脈沉遲弦細搖頭露眼噤口手足搐搦項強背反張如發癇終日不醒為異其因則緣傷寒雜病汗下過多或大發濕家瘡家汗産家亡血太甚故作痓仲景以太陽病發熱無汗反惡寒為剛痓太陽病發熱汗出不惡寒為柔痓海藏據之亦以無汗為剛痓有汗為柔痓河間因以剛痓無汗為風性徑柔痓有汗為濕性緩亦可見剛柔所由分矣剛柔既分治法亦異故但搐搦強直反張而為柔痓者不必汗宜小續命湯去麻黃有熱桂枝減半冬去黃芩若加胸滿腳攣急臥不著席齘齒而為剛痓者急須下宜大承氣湯剛柔不分者概與解散宜九味羌活湯或小續命湯加生附子其風痰發痓宜參歸養榮湯痰火發痓宜瓜蔞枳實湯均與導痰審乎此而痙痓之病無難矣夫痙痓病凡傷寒雜症皆有之不獨破傷風濕也特破傷風濕尤易發痙痓耳故附於破傷風之後脈法仲景曰痓脈按之緊如弦直上下行三因曰痙痓脈皆伏沉弦緊入門曰凡痓脈如雨濺散出指外者立死回春曰凡痓脈弦或沉細些汗後欲解脈至如蛇弦緊尚可伏堅傷嗟痓癇相似丹溪曰痓與癇相似而不同癇病身軟時蘇痓病身強直反張不時蘇甚有昏冒而遂亡者又曰痓癇相似但癇病為虛切不可作風治而純用風藥須帶補益多是氣虛有火兼痰宜用參芪芎歸竹瀝之類痙痓原由症治回春曰若眼牽嘴扯手搖足戰伸縮者是風痰痙若身冷手足冷脈沉細名為陰痓俱宜參歸養榮湯身熱喘嗽生痰脈洪數名痰火痓用瓜蔞枳實湯不可全用風藥散氣入門曰痓病戴眼反折瘈瘲汗出如珠或反張離席一掌部小兒離席二指部者皆死直指曰太陽風痓之症始則發熱腹鳴喘息脈浮次則牙緊頭搖十指微搖漸加項背強直轉側不仁甚者昏困失音目暗直視滑泄不禁身腰反張如此則十不救一徐忠可曰痓即痙強直之謂也痓病必有背項強直等的症但治痓病剛柔之辨最為吃緊故無汗為剛有汗為柔為辨症之要領夫發熱無汗惡寒本傷寒家症若痓而項強背直者見之乃衛陽與腎中真陽氣本相通今太陽經寒濕相搏而氣侵少陰真陽不達故反惡寒也寒性徑切故曰剛發熱有汗不惡寒本傷風而並陽明症若痓而項強背直者見之是太陽陽明傷濕而兼風非寒邪內侵之比也風性溫和故曰柔非止項強而身體則軟為柔痓也仲景以葛根湯為剛痓主方所以杜太陽項強漸成陽明胸滿之勢也以瓜蔞桂枝湯為柔痓主方所以大潤太陽經既耗之液使經氣流通風邪解濕氣行而筋不燥而痓愈也以大承氣湯為由表入裡主方又因痓病內入而胸滿太陽之邪仍不解而口噤角弓反張而臥不著席於是邪入內必熱陽熱內攻而腳攣齒齘說太陽之邪並於陽明陽明脈起於腳而絡於齒也故直攻其胃使太陽陽明之邪一並而散此下其熱非下其食也又曰諸痓項強皆屬於濕乃仲景論痓前後未嘗重濕即方藥亦不專主濕僅寒濕相得一語略露機倪其立三方仍治風寒或內驅熱可知痓症之說非濕流關節之比彼乃浸淫為病燥濕為主此則風寒為微濕所搏故仍以治本為急也曰然則痓症之濕從何來乎不知痓之根原由亡血陰虛其筋易強而痓之濕乃即汗餘之氣搏寒為病也故産後血虛多汗則致之太陽病汗太多則致之風病原有汗下之而並耗其內液則致之瘡家發汗則致之此仲景明知有濕而不專治濕謂風寒去而濕自行耳治破傷風方二十一玉真散強直防風南星等分每末一錢薑汁和酒調服以渣敷瘡口口噤者童便調下南星為防風所製服之不麻可以開關定搐一名定風散木調膏邪傳經絡杏仁泥白面等分新汲水調成膏塗腫處即消腫退熱神效全蠍散身冷蠍梢七個為末熱酒服日三次凡患破傷風非此不除大蜈蚣散又大蜈蚣二條魚鏢炒左蟠龍即野鴿糞炒煙盡各五錢共為末每取二錢防風湯下服此不解覺轉入裡當服左龍丸一方蜈蚣一條魚鏢三錢共為末每取一錢防風羌活湯調下一方治口噤身反張不省人蜈蚣一條全蠍二個炒為末擦牙或吹鼻中名小蜈蚣散左龍丸入裡搐左蟠龍魚鏢燒薑蠶各五錢天麻二錢雄黃一錢蜈蚣二條共為末分三帖先將二帖飯丸梧子大朱砂為衣次將一帖加巴霜五分飯丸梧子大每周朱砂丸子二十丸加巴豆丸子一丸第二服加二丸酒下至便利為度只服朱砂丸病愈即止若搐痓不已宜服羌麻湯一名江鏢散羌麻湯半表裡羌活麻黃川芎甘菊蔓荊子石膏防風前胡黃芩細辛枳殼茯苓甘草各七分白芷薄荷各五分薑三片烏蛇散痰盛烏蛇六錢麻黃一兩川烏白附子附子川芎乾薑天麻各五錢蠍梢二錢半每末一錢酒下日三服朱砂指甲散手足戰朱砂薑南星獨活各二錢人手足爪甲六錢燒存性為末分三貼酒下烏鴉散血凝烏鴉翎燒灰酒服一錢服後飲酒一二杯以助藥力急風散傳變麝香一字朱砂一兩生黑丑二錢半草烏三兩半生半焙存性醋淬每末五分酒下防風當歸散汗多防風當歸川芎生地各錢半當歸地黃湯亡血當歸地黃白芍川芎防風藁本白芷各一錢細辛五分防風湯無汗防風川芎羌活獨活各錢二分半水煎調小蜈蚣散服之大效小蜈蚣散方詳在大蜈蚣散方後羌活防風湯又羌活防風川芎白芍當歸藁本甘草各一錢地榆細辛各五分小續命湯又防風錢半防己杏仁肉桂黃芩白芍人參川芎麻黃甘草各一錢附子五分薑三棗二一方無防己附子有當歸石膏白朮湯有汗白芍三錢白朮葛根各二錢升麻黃芩各一錢甘草三分白朮防風湯又防風四錢白朮黃芪各二錢小芎黃湯陽明川芎三錢黃芩二錢甘草五分此方治破傷風入裡猶有表熱二三帖後用大芎黃湯大芎黃湯又川芎二錢大黃羌活黃芩各一錢此方專治破傷風入裡大便祕小便赤自汗不止以微利為度防風通聖散少陽滑石錢七分甘草錢二分石膏黃芩桔梗各七分防風川芎當歸赤芍大黃麻黃薄荷連翹芒硝各四分半荊芥白朮山梔各三分薑五片此方治風熱燥三者之總劑也宣明云能治諸風熱中風不語暴喑或洗頭風破傷風諸般風搐小兒驚風積熱或瘡疹黑陷將死或傷寒疫癘不能辨明或風熱瘡疳或頭生白角或面鼻生紫赤風刺癮疹肺風瘡或大瘋癲疾或風火鬱甚為腹滿澀痛煩渴喘悶或熱極生風為舌強口噤筋惕肉瞤或大小瘡腫惡毒或熱結大小便不通並解酒傷熱毒按此方治法甚廣姑即宣明之言附記於此醫者能神而明之其所治並不止此也九味羌活湯和解羌活防風各錢半川芎蒼朮白芷黃芩生地各錢二分細辛甘草各五分薑三棗二蔥白二此解表神方也能不犯三陽禁忌正傳曰羌活治太陽肢節痛乃撥亂反正之主防風治一身盡痛聽將軍命令而行蒼朮雄壯上行之氣除濕氣而下安太陰甘草緩裡急和諸藥川芎治厥陰頭痛在腦生地治少陰心熱在內黃芩治太陰肺熱在胸白芷治陽明頭痛在額細辛治少陰腎經頭痛故為解表散邪之妙方也一名羌活衝和湯治痙痓方七小續命湯治柔痓防風錢半防己肉桂杏仁黃芩白芍人參川芎麻黃甘草各一錢附子五分薑三棗二一方無防己附子有當歸石膏大承氣湯剛痓大黃芒硝厚朴枳實五味羌活湯剛柔不分防風羌活各錢半蒼朮川芎黃芩白芷生地各錢二分細辛甘草各五分薑二棗二蔥白一參歸養榮湯風痰人參當歸川芎白芍熟地白朮茯苓陳皮各一錢甘草五分薑三棗二瓜蔞枳實湯痰火瓜蔞仁枳實山梔子川貝母桔梗黃芩陳皮茯苓麥冬人參當歸蘇子各八分甘草三分薑三片煎衝竹瀝薑汁服瓜蔞桂枝湯柔痓瓜蔞根桂枝炙甘草白芍生薑大棗葛根湯剛痓葛根麻黃桂枝炙草白芍薑棗
