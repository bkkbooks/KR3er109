  - {type: 'tls:div-start', offset: 6643, content: '', id: KR3er109_jc_013-d15d3, level: 2, head_text: 麻木源流}
  - {type: 'tls:head', offset: 6643, content: '', id: KR3er109_jc_013-d15.d3.h1s1}
  - {type: 'tls:div-end', offset: 9032, content: '', id: KR3er109_jc_013-d15d3}
  - {type: 'tls:div-start', offset: 9032, content: '', id: KR3er109_jc_013-d15d4, level: 2, head_text: 破傷風源流痙痓}
  - {type: 'tls:head', offset: 9032, content: '', id: KR3er109_jc_013-d15.d4.h1s1}
  - {type: 'tls:div-start', offset: 10759, content: '', id: KR3er109_jc_013-d15.d4d4, level: 3, head_text: 痙痓風寒濕熱俱有病也痙者筋勁強直而不柔和痓者口噤而角弓反張}
  - {type: 'tls:head', offset: 10759, content: '', id: KR3er109_jc_013-d15.d4.d4.h1s1}
