body:
  text: 卷二十二面部門面部病源流人身之有面猶室之有大門人未入室先見大門人相對先見其面惟先見大門故即其門之景象可以知其家之貴賤貧富惟先見面故即其面之形色可以知其病之虛實淺深其理一也何言之面部地分分隸五臟額為天庭屬心頦為地閣屬腎左頰屬肝右頰屬肺鼻居面中屬脾故察其色可以辨其病之所在此分隸而不可易者也然而五色又可獨決於明堂明堂者鼻也明堂之色青黑為痛黃赤為熱白為寒又兩目內眥又精明穴就其穴而察五色觀五臟有餘不足六腑強弱形之盛衰可以參互決死生之變又天中天庭司空印堂額角方廣皆命門部位可以占病之吉凶此於分隸不易之外又可相參而得者也總之面為諸陽之會非他處可比靈樞曰手之三陽從手走至頭足之三陽從頭走至足竊考銅人圖手太陽之脈從缺盆貫頸上頰至目鋭眥手少陽之脈從缺盆上耳上角以屈下頰至䪼手陽明之脈從缺盆上頸貫頰交人中上挾鼻孔皆從下而上走於面足太陽之脈起於目內眥上額交巔上足少陽之脈起於目內眥上抵頭角足陽明之脈起於鼻交頞中入齒挾口環唇倚頰車上耳前過客主人皆從面而下走至足此手足六陽之俱會於面也若諸陰脈則皆至頸項無一上於面者故人面獨耐寒熱素間曰人之十二經脈三百六十五絡其血氣皆上於面而走空竅其精氣上走於目而為睛其別氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇口而為味其氣之津液皆上燻於面而皮又厚其肉堅故大熱大寒不能勝之此面所以為諸陽之會而非他部之可比也然六陽之經雖皆至面而手三陽則皆自下而上面止為其經歷之處即足太陽少陽亦皆起於目眥而非居中以為主獨足陽明胃起於鼻則既有居中馭外之勢而頞而齒而口而唇而頰而耳凡面部所有之處其脈俱有以維絡之故面病專屬於胃如或風熱乘之則令人面腫或面鼻色紫或風刺癮疹或面熱或面寒一皆胃之為病也説面熱因於胃家鬱熱或飲食不節以致胃病漸至氣短精神少而生大熱有時濕火上行獨燎其面宜升麻黃連湯面寒因胃中有寒濕或胃氣虛故皆不能耐寒宜升麻附子湯面腫為胃風症必飲食不下形瘦腹大惡風頭冷汗或麻木牙關緊急口不得開目內蠕動頞與頰車常如糊弸牢觸則痛脈右關弦而緩帶浮宜升麻胃風湯犀角升麻湯皆由陽明經絡受風熱毒氣故若此也而亦有腎風症者面龐浮腫疼痛其色炲黑多汗惡風或兼手熱口乾苦渴小便黃目下腫如臥蠶腹中鳴身重難行少氣時熱熱時從胸背上至頭此病雖由於腎虛然亦腫於面與胃風症同治宜升麻胃風湯加腎家引經藥又有面戴陽症一因浮火所衝一因陽氣怫鬱於表一因下虛其因下虛者面雖赤而不紅活忌用涼藥恐氣消而成大病其因陽氣怫鬱者當發表不可攻裡火鬱則發之是也瘡瘍亦然仲景言傷寒少陰症面戴陽由下虛之故宜通脈四逆湯加蔥白九莖用蔥白者通陽氣也腮腫亦名痄腮因風熱乘胃或膏粱久積而作甚有出膿血者宜外用醋調石灰敷之內服加味消毒飲小兒胎毒攻腮發腫尤可畏宜大連翹飲面上紫塊如錢大或滿面俱有乃火熱所滯也宜擦面神丹婦人頰瘡甚或每年頻發亦屬惡症宜甘家祕方至於風刺粉刺皯𪒟痤痱酒皶肺風瘡熱毒瘡癤鼻臉赤紫黑黶斑子皮膚癢等症或由風客皮毛或由痰漬臟腑或由上焦火毒或由脾肺風濕搏熱皆面上雜病也治之俱當以陽明為主俱宜柏連散清上防風湯玉容散連翹散紅玉散然則面之為部雖不盈尺而所生病不且煩多也哉面見五色靈樞曰足厥陰之脈病面塵脫色足少陽之脈病面微塵手厥陰之脈病面赤足少陰之脈病面黑如炭色足陽明之脈病面黑又曰太陽病終者面色白絶汗出少陰病終者面黑齒長而垢太陰病終者面黑皮毛焦難經曰肝外症面青善怒心外症面赤善笑脾外症面黃善噫肺外症面白善嚏腎外症面黑善恐善唾仲景曰寸口脈微而澀微者衛氣衰澀者榮血不足衛氣衰則面色黃榮血不足則面色青又曰陰陽俱虛則面色青白面部凶症扁鵲曰病人面無光齒齦黑者死面腫色蒼黑者死病人榮衛竭絶面浮腫者死華他曰面黑唇青者死面青唇黑者亦死又曰病人黑色出於天中天庭者死丹溪曰人有病面上忽見紅點者死導引法養性書曰熱摩手心頻拭額上謂之修天庭連發際二三七遍面上自然光澤所謂手宜在面是也治面部病方十三升麻黃連湯面熱升麻葛根各一錢白芷七分白芍甘草各五分酒黃連四分犀角川芎荊芥薄荷各三分食後溫服忌酒面五辛升麻附子湯面寒升麻附子葛根白芷蜜黃芪各七分人參草蔻仁炙甘草各五分益智仁三分加蔥白升麻葛根湯乃陽明經主藥也加黃連犀角白芷川芎荊芥薄荷以治面熱加附子白芷黃芪人參草蔻益智以治面寒良以面熱為胃熱上燻面寒為胃虛故也升麻胃風湯胃風升麻二錢甘草錢半白芷錢二分當歸葛根蒼朮各一錢麻黃五分柴胡藁本羌活草豆蔻黃柏各三分蔓荊子二分薑棗犀角升麻湯又犀角錢半升麻羌活防風各一錢白附子白芷川芎黃芩甘草各五分加味消毒飲腮腫防風荊芥惡實甘草連翹羌活各一錢擦面神丹紫塊野大黃四兩取汁穿山甲十片燒存性川椒末五錢生薑三兩取汁和研生絹包擦如乾入醋潤濕數次如初此方屢效甘家祕方頰瘡水銀兩半豬脂揉擦令消盡入黃礬石末二兩胡粉一兩再加豬脂令和如泥洗瘡淨塗之別以胡粉塗膏上通脈四逆湯少陰柏連散總治炙黃柏黃連炒胡粉等分為末豬脂調塗此治面上熱毒惡瘡清上防風湯又防風一錢連翹白芷桔梗各八分酒黃芩川芎各七分酒黃連荊芥山梔枳殼薄荷各五分甘草三分竹瀝五匙衝服此方專清上焦火治頭面生瘡癤風熱毒玉容散又皂角一斤升麻二兩六錢半楮實二兩六錢半白芷白芨天花粉緑豆粉各三錢三分半甘松砂仁白丁香各一錢六分半糯米三合半共為細末令勻常用洗面一方加樟腦二錢此方專治面上皯𪒟或生小瘡或生痤痱粉刺之類日日洗之自然光澤連翹散又連翹川芎白芷片芩桑白皮黃連沙參荊芥山梔貝母甘草各七分水煎食後服一名清肺散此方專治面生谷嘴瘡俗名粉剌及面上肺火肺風瘡紅玉散又白芷藿香葉牙皂各二錢甘松三奈子木澤白丁香細辛密陀僧杏仁各一錢天花粉白茯苓各一錢半樟腦五分白芨三分上共為細末臨臥時用津唾調或乳汁調敷面上明早用溫水洗去其面如玉木澤未詳此方專治一切酒刺風刺黑黶斑子面瘍面部諸瘍俱熱毒病也雖各由於經絡大約陽明之症居多如發眉生左右眉稜或頭或尾生瘍在眉頭則易攻入眼目在眉後則易攻入太陽最宜謹慎或眉心生疽名面風毒由膀胱風熱壅結陰陽相滯所致宜消毒散或蟾酥丸汗之而眉疔又名發眉毒寒熱先作或癢或麻木然後色黑痛甚宜追疔奪命湯二活散然凡疔之發皆如此不獨在眉也宜知之又如左右額赤疽夫額與太陽相近皆屬要害處若額疽腫滿太陽即成虛損故始發時不拘大小急宜以藥貼破見膿即無害破後尤宜速斂初起宜黃連消毒散仙方活命飲斂口宜外貼長肌膏倘外傷風水即能殺人若七日刺不得膿十日不穴者死又如左右太陽穴癰疽亦宜於五七日內破之宜追毒萬應針頭丸否則毒氣攻眼眼合不開破更傷風水必傷目又如鼻柱上生疽乃肺經風熱及上焦鬱火所成也宜漏蘆湯仙方活命飲加山梔木通薄荷又如鼻下人中兩傍及承漿生疽名發髭此由摘髭風入孔竅而成也宜仙方活命飲又如地角上生疽名髭毒由陽明風熱也宜仙方活命飲加芩連元參山梔桔梗又如顴骨疽亦名面風毒多由上焦陽明鬱火所致宜仙方活命飲加升麻桔梗葛根酒煎仍服奪命丹汗之而亦有由於心病者靈樞曰心病者顴赤察其色赤且診其脈病果屬心則急降心火宜黃連安神丸清之有由於腎者靈樞曰腎病顴骨而黑察其色黑且診其脈病果屬腎則急滋腎水宜六味地黃丸固不得概泥為陽明鬱火也又如腮臉生毒發於肌肉浮而不著骨此名痄腮乃陽明風熱相乘或因積熱所致也宜白芷胃風湯犀角升麻湯其間更自有辨近於下為發頤由陽明畜熱近於耳後又屬少陽熱毒上攻宜急用仙方活命飲加元參芩蓮若老弱人不可全用攻瀉宜黃芪內托散至於腮頰上生瘡亦屬陽明熱症宜仙方活命飲加桔梗升麻或犀角升麻湯又如遊風毒生於面上亦陽明胃病由平日多食辛辣厚味金石藥也宜黃連清毒飲去人參加山梔薄荷葉又如面上風癬宜祛風白芷散及耳鼻面上與下部諸竅生瘡隨月盛衰名月蝕瘡宜月蝕瘡散眼胞上生瘡癗名偷針眼宜偷針眼方並小兒環口生瘡名羊須瘡宜羊須散小兒面上耳後生瘡多出水名黃水瘡宜藥油玉紅膏以上皆面瘍之屬也雖然面生瘡疽其斑痕一時不易即退宜用鮮橄欖切斷蘸麝香少部擦之一二日即可無痕此良法也不然面留瘡疤其何以使人見之哉面瘍症治薛立齋曰痄腮屬足陽明胃經內熱腫痛宜升麻黃連湯白芷胃風湯外腫作痛內熱口乾犀角升麻湯內傷寒涼不能消潰者補中益氣湯發熱作渴大便祕者加味清涼飲表裡俱解而作腫痛者欲成膿也托裡消毒散膿成托裡散其氣虛血虛倦怠惡食等症照常用補中湯六君子湯十全大補湯八珍湯選用不可泥於風熱用尅伐之劑又曰連耳上太陽部分屬風熱加羌活防風連耳下少陽部分屬怒火加柴胡山梔丹皮連耳後少陰部分屬相火加知母黃柏齒牙俱腫出血者清胃散加石膏陳文治曰凡腫初起宜黃連消毒散若腫硬作痛繼以仙方活命飲一二劑脈數而濡乃濕熱壅盛故用黃連消毒散腫硬作痛故甩仙方活命飲並以甘溫補益陽氣托裡而潰腐之不宜純用苦寒傷胃氣反致不得腐化凡瘡易消散易腐潰易收斂皆氣血壯盛故也可以類推自鼻直上發際曰天中天中之下曰天庭即額也天庭之下曰司空司空之下曰印堂在兩眉間印堂之下曰山根即兩眼之間山根之下曰鼻準即明堂也鼻準之下曰人中人中之下曰承漿承漿穴名承漿之下曰地閣即頦也兩額角曰方廣亦曰太陽穴靈樞曰五色獨決於明堂明堂者鼻也明堂之色青黑為痛黃赤為熱白為寒又曰明堂者鼻也闕者眉間也庭者顏也即額蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必百歲又曰庭者額中也闕中者兩眉之間也下極者兩目之間也直下者兩鼻而下也方者鼻隧也面王者鼻柱之端也又曰明堂之色沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚為血痛甚為變寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗又曰目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中又曰視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣內經曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也又曰五臟已敗其色必夭夭必死矣注曰夭謂死生異常之候也色者神之旗臟者神之舍故神去則臟敗臟敗則色見異常之候也又曰切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參互決死生之分注云精明穴名在明堂左右兩目內眥也綱目曰自額而下闕上屬首咽喉之部分也自闕中循鼻而下鼻端屬肺心肝脾腎五臟之部分也自目內眥挾鼻而下至承漿屬膽胃大小腸膀胱六腑之部分也自顴而下頰則屬肩臂手之部分也自牙車而斜下頤屬股膝脛足之部分也內經曰精明五色者氣之華也赤欲如帛裹朱不欲如赭白欲如翎羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如炭注云精明穴名五氣之精華者上見為五色變化於精明之間也又曰五臟之氣青如草滋者死黃如枳實者死黑如炲者死赤如衃血者死白如活骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也又曰生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹瓜蔞實生於腎如以縞裹紫此五臟所生之外榮也又曰夫心者五臟之專精也目者其竅也華色者其榮也又曰面黃目青面黃目赤面黃目白面黃目黑皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也華他曰病人面青目白者死面青目黃者五日死面赤目白者十日死面赤目青者六日死面黑目白者八日死面白目黑者死南黑目直視惡風者死赤色出兩顴大如拇指者病雖少愈必卒死又曰病人耳目及頰顴赤者死黑色出於天庭天中者死耳目鼻黑色起入口者死面黑唇青者面青唇黑者亦死扁鵲曰病人面㿠白直視肩息者一日死仲景曰鼻頭色青腹中痛舌冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死色青為痛色黑為勞色赤為風色黃者便難也色鮮明者有留飲也丹溪曰人有病面上忽見紅點者多死臍下忽大痛人中如墨色者多死治面部諸瘍方消毒散眉疽緑豆五倍子研末醋調搽蟾酥丸又乳香沒藥各二錢輕粉蟾酥各一錢麝香五分川烏蓮須朱砂各錢半追疔奪命湯眉疔蟬退四分澤蘭五分青皮金線重樓各七分防風細辛各八分黃連首烏羌活薑蠶藕節各一錢加蔥薑水煎臨臥入酒一杯服衣覆取汗如大便祕加大黃一錢此方能治一切疔瘡二活散又羌活獨活當歸烏藥赤芍連翹酒洗金銀花花粉白芷甘草節各五錢紅花蘇木荊芥蟬退葛根各三錢檀香二錢共為末每三錢用蒼耳子煎湯調下黃連消毒散額疽黃連羌活黃芩黃柏生地知母獨活防風連翹藁本防己歸尾桔梗各五分黃芪蘇木陳皮澤瀉人參甘草各三分水煎此方專治一切癰疽琚腫發痛或麻木誠瘡家初起通用之良方仙方活命飲又炒黃穿山甲白芷防風赤芍甘草歸尾花粉貝母皂角刺乳香沒藥各一錢金銀花陳皮各三錢另將乳香沒藥二味為末將水酒各半煎藥送下不飲酒水煎亦可此方專治一切瘡瘍未成膿者自消已成膿者即潰止痛消毒誠瘡家初起通用之神方故以仙方活命呼之長肌膏斂口白燭油四錢黃蠟香油各八錢大楓子去殼研五錢番木鱉二錢黃連黃柏活礬輕粉各三錢密陀僧另研五分將前七味先煎去渣入礬粉僧三味拌勻候凝看瘡口大小做薄餅簪穿小孔十數貼瘡日易之鹽茶湯洗淨再貼此方兼治年久諸般爛瘡追毒萬應針頭丸太陽麝香二錢血竭蟾酥輕粉硇砂各三錢全蠍蜈蚣各一對全用片腦一錢煉蜜丸黍米大瘡頭用針挑破微有血出以藥一粒放進眼上用綿紙説之周圍以津唾粘定不一日愈此方兼治一切腦背惡瘡欲死一粒可愈漏蘆湯鼻疽朴硝大黃各一錢黃芩漏蘆炙草麻黃去節枳實麩炒白芍藥白斂升麻各五分水煎此方專治一切疔腫瘡毒初覺一二日如傷寒頭痛煩渴急惡寒壯熱肢體疼痛恍惚悶亂坐臥不寧大便祕澀小便黃赤者宜服此奪命丹又蟾酥輕粉各五分朱砂三錢寒水石活礬銅緑乳香沒藥麝香各一錢蝸牛三十一個另研和藥末為丸緑豆大如乾加好酒每一丸用生蔥白三四根嚼爛吐手心包藥熱酒連蔥送下約行六七裡汗出為效重者再服一二丸此方專主諸般大腫毒此與前蟾酥丸皆少陰經藥皆為劫劑用者當審陰陽輕重之分而擇取之若些小症候勿用也黃連安神丸清心六味地黃丸滋腎地黃山藥山萸丹皮茯苓澤瀉白芷胃風湯痄腮白芷升麻各二錢半葛根七分蒼朮八分當歸錢半炙草一錢柴胡草豆蔻黃柏藁本羌活各四分蔓荊子薑蠶炒去絲各三分麻黃去節六分此方專治氣虛風熱面目麻木或牙關緊急眼目瞤動犀角升麻湯又犀角錢半升麻防風羌活白附子川芎白芷黃芩各五分甘草二分水煎漱服此方專治胃經風毒血氣凝滯內熱口乾鼻額口唇頰車發際連牙腫痛黃芪內托散老弱黃芪當歸川芎厚朴桔梗防風甘草人參白芍各五分肉桂三分為末溫酒服祛風白芷散風癬白芷三錢黃連黃柏黃丹各二錢茯苓錢半輕粉一錢為末香油調搽一方加兒茶二錢麝香二分月蝕瘡散月蝕瘡炒胡粉活礬黃連黃丹輕粉各二錢胭脂燒存性一錢麝香一字共為末以鹽湯洗淨乾摻或油調敷偷針眼方針眼南星地黃各三錢研成膏貼太陽兩旁其腫自消羊須散羊須瘡羖羊須荊芥乾棗去核各二錢上燒炒存性入膩粉五分同研先洗淨香油調塗藥油黃水瘡松香活礬槐樹皮共為末紙卷為筒藏藥在內蘸油燃火有油滴下收之人輕粉少部搽玉紅膏又香椒即川椒一兩另研末篩細松香八兩用好醋加蔥頭打碎或取汁同煮黃丹三兩活礬二兩半輕粉七錢五分共為末先以豬肉湯洗淨菜油調塗升麻黃連湯痄腮升麻黃連白芷連翹牛蒡子各一錢川芎當歸各錢半水煎服如痛連太陽加羌活痛連耳後加山梔柴胡此方專治胃經熱毒腮腫作痛補中益氣湯又黃芪升麻柴胡陳皮甘草人參當歸白朮加味清涼飲又炒大黃赤芍當歸甘草黃芩山梔托裡消毒散又人參黃芪鹽水炒酒當歸川芎炒白芍炒白朮茯苓各一錢金銀花白芷各七分炙草連翹各五分薛立齋本方加減法開列於後高腫琚痛熱毒也加黃連漫腫微痛氣虛也去銀花連翹加參朮頭痛發熱邪在表也加川芎羌活或去參芪芍朮外邪在表而元氣實者暫用人參敗毒散即服本方頭痛惡寒表虛也去銀花連翹加參芪發熱飲冷便祕內熱也去參芪歸朮加大黃發熱飲熱便祕內虛也去銀花連翹加參芪歸朮發熱飲冷小便澀滯汗熱也去參芪加柴胡山梔不作膿膿不潰氣虛也去銀花連翹白芷加參朮肉桂如不應暫用十全大補湯再服此腫赤作痛血凝滯也加乳香沒藥如不應暫用仙方活命飲再服本方膿出反痛氣血虛也去銀花連翹白芷加參芪歸地肉赤而不斂血虛有熱也去銀連芷加熟地丹皮參芪肉黯而不斂陽氣虛寒也去參芪加白斂官桂或肉桂漫腫不痛或肉死不潰脾氣虛也去銀花連翹加人參白朮如不應加薑桂更不應宜急加附子肉白而不斂陽氣虛也去銀花連翹白芷加參芪歸朮膿多而不斂氣血虛也去銀花連翹白芷加參芪歸朮熟地如不應暫用十全大補湯再服本方自效飲食少思而不斂胃氣虛也去銀連芷加參芪如不應暫用補中益氣湯飲食難化而不斂脾氣虛也去銀連芷加參朮如不應暫用六君子湯又不應佐以八味丸仍兼服本方膿少而帶赤血虛也去銀連芷加參歸朮如不應暫用八珍湯加丹皮忿怒晡熱而出血肝火血虛也去銀連芷加丹皮熟地黑山梔如不應暫用八珍湯送六味地黃丸面青血脹而出血肝氣虛不能藏血也去銀連芷加山萸五味子如不應兼用六味丸食少體倦而出血脾氣虛而不能攝血也去銀連芷加參芪歸地兼鬱少寐加茯神棗仁遠志龍眼肉如不應暫用歸脾湯仍服此欲吐作嘔或外搽內服寒涼或痛甚或感寒邪穢氣而嘔胃氣虛也去銀連芷加人參白朮藿香飲食少思腸鳴腹痛腹冷泄瀉脾氣虛寒也去銀連芷加炮薑木香手足逆冷脾血虛寒也去銀連芷加炮薑木香附子煎送四神丸作渴飲冷熱毒也加赤小豆知母如不應暫用竹葉黃芪湯善食作渴胃火也加山梔石膏如不應暫用竹葉石膏湯膿多作渴氣血虛也去銀連芷加熟地五味子如不應暫用十全大補湯加麥冬五味口乾舌燥腎氣虛也去銀連芷加熟地山藥山萸如不應兼用六味丸又不應佐以補中益氣湯自汗內熱口乾胃氣虛也去銀連芷加參芪歸朮如不應暫用六君子湯盜汗內熱口乾陰血虛也去銀連芷加熟地麥冬五味如不應暫用當歸六黃湯莖中痛而小便不利精內敗也去銀連芷加山萸山藥澤瀉如不應佐以六味丸愈便則愈痛愈痛則愈便精復竭也去銀連芷煎送六味丸食少體倦口乾飲熱小便黃短脾肺虛熱也去銀連芷加五味山萸如不應暫用六味丸勞役而小便黃元氣下陷也去銀連芷加升麻柴胡午後小便黃短腎虛熱也去銀連芷加升麻柴胡不應煎送六味丸口燥作渴小便頻數腎水虧也去銀連芷加熟地山萸山藥五味不應兼用六味丸四肢逆冷腎氣虛寒也去銀連芷加附桂不應佐以八味丸食少體倦作渴胃氣虛也去銀連芷加參芪白朮不應暫用補中益氣湯體倦頭痛或眩暈陰血虛也去銀連芷加升麻柴胡不應暫用補中益氣湯加蔓荊子日晡頭或眩暈陰血虛也去銀連芷加熟地不應佐以六味丸夢泄遺精頭眩頭痛或痰喘氣促腎虛不能納氣也去銀連芎芷佐以六味丸如不應是虛寒也用八味丸面目赤色煩熱作渴脈大而虛血脫煩躁也去銀連芷加黃芪當歸不應暫用當歸補血湯身熱惡寒欲投於水脈沉微細氣脫發躁也去銀連芷加附桂不應暫用附子理中湯多思不寐體痛盜汗脾血虛也去銀連芷加茯神遠志棗仁圓眼不應暫用歸脾湯寢汗出腎氣虛也去銀連芷加五味子煎送六味丸飲食時出汗胃氣虛也去三味加參芪歸朮五味子不應暫用六君子湯睡後覺飽出盜汗宿食也去三味加參朮半夏不應暫用六君子湯胸滿多痰脾氣虛也去三味加桔梗半夏不應暫用六君子湯加桔梗枳殼哺熱多痰脾血虛也去三味加歸地參朮不應暫用六君子湯加芎歸熟地咳嗽唾痰腎虧津液泛上也去三味加熟地山藥山萸不應佐以六味丸忿怒胸痞肝氣滯也加桔梗山梔不應暫用補中益氣湯加桔梗枳殼倦怠胸痞中氣虛也去三味加參朮茯苓不應暫用八珍湯加柴胡口苦寒熱往來肝火血虛也去三味加柴胡熟地因怒寒熱往來肝火血虛也加柴芩不應暫用八珍湯加山梔炒棗仁酒龍膽草體倦寒熱往來肝脾氣滯也去三味加參芪歸朮不應暫用補中益氣湯內熱哺熱或寒熱往來陰血虛也去三味加芎歸柴胡丹皮不應暫用八珍湯加丹皮畏寒或寒熱往來胃氣虛也去三味加參芪白朮升麻不應暫用補中益氣湯脅痛痞滿或寒熱往來肝氣滯也去三味加青皮木香不應氣血虛也更加芎歸參朮婦人勞役恚怒或適經行發熱譫語或夜熱甚此邪在血分也去三味加生地柴胡丹皮不應暫用加味四物湯誤服尅伐藥或膿血太泄或因吐瀉或誤入房或勞損元氣或夢泄遺精或外邪感觸以致發熱頭痛小便淋澀或數便血目赤煩喘氣短頭暈體倦熱渴意欲投水身熱惡衣揚手擲足腰背反張鄭聲自汗此陽氣脫陷之假熱症也畏寒頭痛咳逆嘔吐耳聵目蒙小便自遺瀉利腸鳴裡急腹痛玉莖短縮牙齒浮痛肢體麻痹或厥冷身痛或咬牙嚙唇此陽氣脫陷之真寒症也以上假熱真寒勿論其症但有一二急去三味加桂附補之應有復生之理又按加減六十二法皆托裡消毒之發揮也即此意而消息則得瘍家之要矣他如護心散十方皆有益無損之藥故能托裡消毒故附録於後在隨宜取舍而已護心散緑豆末一兩乳香五錢每末一錢食後用生甘草湯調細呷下使常在膈間為妙李氏云凡患癰疽蚤進護心散數服使毒氣外出而無嘔吐之患否則咽喉口舌生瘡或黑爛如菌若瘡發四五日後宜間別藥而服但此方專解金石發疽之品若發熱琚腫飲冷而渴必宜用也若不喜飲冷而喜熱湯及非因丹毒而發症者則又不宜用阿膠飲子橘紅五錢阿膠蛤粉炒粉草各一兩分三劑水煎服此方專治一切癰疽癤毒國老膏粉草不拘多少河水浸二日揉汁砂器內煎膏每一二匙酒或白湯下此方專治一切癰疽消腫逐毒更解丹毒央難盡述但元氣虛弱者忌萬金散瓜蔞一個研細沒藥一錢研末甘草節二錢先將二味酒煎入沒藥末調服此方專治癰疽已潰未潰有消毒破血之央忍冬酒忍冬藤生取五兩甘草一兩水煎至半入好酒一碗再煎數沸去渣分三服一日夜服完重者連服二劑至大小便通利為度此方治一切癰疽初起甚效保安湯栝蔞新者一個去皮焙沒藥二錢研末金銀花生薑各五錢好酒五大碗砂器內煎三茶杯分三次服毒微者服即效此方治瘡疽托裡已成者速潰紫金錠五倍子三兩打碎洗淨焙乾山茨菰二兩去皮研末鹿香三錢另研千金子淨霜大戟去蘆焙為末各一兩糯米濃飲丸為四十錠此藥能應諸病各有神效若瘡疽用東流水磨塗並服須端午日合一方有全蠍朱砂雄黃各一兩名神仙追毒丸凡一切癰疽惡瘡湯火蟲蛇犬獸傷俱宜服此單煮大黃湯大黃酒浸去皮水煎服此孫真人傳凡癰疽熱毒大便祕結者服此能宣熱撥毒但元氣虛者切不可用須慎之楝子灰川楝子七枚鐃灰存性酒服次用十四枚次用二十一枚如此三服雖成亦小此方專治諸毒初起撥毒仙丹冬瓜一個切去一頭合瘡上瓜爛切去仍合之瓜未完而瘡愈此方能治背發欲死熬按托裡消毒散及護必散以下十方俱治一切癰疽瘡瘍惡症不獨面部痄腮用之也特首見於此故詳録之凡臨一切症者酌取可也托裡散又大黃牡蠣瓜蔞根朴硝連翹皂角刺各三錢赤芍黃芩各二錢金銀花當歸各錢半每末五錢水酒煎服此方兼治一切惡瘡癰腫便毒始發脈洪弦實而數腫甚者三服見效補中湯又六君子湯又十全大補湯又八珍湯又人參茯苓白朮甘草地黃川芎歸身白芍清胃散又歸身生地黃連丹皮各錢半升麻三錢石膏二錢細辛三分黃芩一錢目病源流眉稜骨肝發竅於目故目病多由於肝目又為五臟精華故其地位亦分隸臟腑何言之目有五輪白珠屬肺肺主氣氣之精曰氣輪烏珠屬肝肝主筋筋之精曰風輪肝為風也內外眥屬心心主血血之精曰血輪上下胞屬脾脾主肌肉肉之精曰肉輪瞳人屬腎腎主骨骨之精曰水輪腎為水也得效曰氣輪之病因凌寒冒暑愛飲寒漿肌體虛疏寒邪入內其候或痛或昏傳在白睛筋多腫赤視目如隔霧看物似生煙日久不治變成白膜黑暗難開風輪之病因喜怒不常作勞用心晝視遠物夜讀細書其候眥頭尤澀睛內偏疼視物不明胞弦緊急宜去風藥肉輪之病因多食熱物五辛遠道奔馳食飽耽眠風積痰壅胞多赤腫昏蒙多瓷倒睫澀痛瘀血侵睛宜醒脾藥血輪之病因七情煩勞內動於心外攻於目其候赤筋纏眥白膜侵睛胞腫難開昏澀久不治失明宜洗心涼血藥水輪之病因勞役過度嗜欲無厭又傷七情多嚏酒麯辛熱因動腎經逆於黑水其候冷泪流於臉上飛蠅趁於睛前或澀或癢結成翳障常帶昏暗宜補腎藥目又有八廓乾天廓屬肺位睛中間坎水廓屬腎位瞳人艮山廓屬膽位神光震雷廓屬小腸位白睛上截向小眥巽風廓屬肝位烏珠離火廓屬心位大小眥坤地廓屬脾胃位上下胞兌澤廓屬膀胱位白睛下截向大眥得效曰天廓之病因云中射雁月下看書侵冒寒暑其候視物生煙眥疼難間地廓之病因濕積頭上冷灌睛輪其候眼弦緊急瘀血生瘡火廓之病因心恐神怖赤脈侵眥血灌瞳人其候瞼頭紅赤而腫睛內偏疼熱泪如注水廓之病因努力爭斗擊棒開弓驟騎努力其候常多昏暗睛弦泪多風廓之病因枕邊窗穴有風不避腦中風邪其候黑睛多癢兩瞼常爛或昏多泪雷廓之病因失枕睡臥酒後行房血脈滿溢風邪內聚其候眥頭赤腫瞼內生瘡倒睫拳毛攀睛藟肉山廓之病因撞刺磕損致令肉生兩瞼翳閉雙睛若不早治必致昏暗瘀血侵晴澤廓之病因春不宣解冬聚湯毒多食辛熱致令腦脂凝聚血泪漸流有如霧障目又有內外眥俗云眼大頭為內眥太陽經脈所起也血多氣少俗云眼梢頭為鋭眥即外眥少陽經也血少氣多目上綱亦屬太陽目下綱陽明也血氣俱多此足三陽經俱會於目惟厥陰肝經連於目係而已故張子和云血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明以此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏矣此五輪八廓內外眥之分配臟腑而目之為病所以不止由於肝也然其部位雖各分屬而病之發於臟腑又統全局言之不必細分其部也試觀肺經壅熱則病白睛腫赤宜桑皮湯心火上炎則病目赤而寸脈數宜導赤散清火止痛湯脾胃不足則病內障耳鳴及多年目昏不能視物宜益氣聰明湯腎水不足則病視不分明漸成內障宜熟地黃丸肝血不足則病目昏生花久視無力多眵宜養肝丸與夫肝火盛則病目赤澀痛宜龍薈丸四物龍膽湯肝經熱邪上壅則病目暴赤澀而腫痛宜湯泡散肝經積熱肺受風邪則病眼障昏花宜還睛丸如此等症雖亦有現於本經之部位者然總不能盡拘矣至病之所發實有見於各經之部位者又當隨各經治之如白睛變赤為火乘肺也上下胞赤腫為火乘脾也五色花翳遮瞳子為腎虛也睛被翳遮為肝虛火旺也目中血貫澀火自甚也説以目之為病皆屬於火斷無由於寒者故既見於各經宜用各經藥以瀉之也雖然目病大綱約有三端一為內障總係足厥陰肝疾亦有由腎虛者説通黑晴之脈者曰目係而目係則屬足厥陰足太陽手少陽三經三經虛邪從目係入黑睛內為翳故內障為肝疾兼腎心則肝腎之主也其症每先患一眼漸及兩眼皆黑睛內有隱隱青白翳遮瞳人不痛不癢無泪無眵如薄霧如輕煙或如金色或如緑豆色或見五花日漸日增比外障更難療治其屬肝者必由血少神勞宜養肝丸生熟地黃丸其屬腎者必由內傷色欲宜益陰腎氣丸滋腎明目丸其肝腎俱病者必由二經皆虛宜駐景丸加減駐景丸此則通治內障之法也而其症狀實各有名目共二十三種今詳考眼科家書撮其要略如一曰圓翳在黑珠上一點圓日中見之差小陰處見之即大視物不明轉見黑花此由肝腎兩虛而得也宜補肝散補腎元二曰冰翳如冰束堅實傍觀目透於瞳人內陰處及日中見之其形一般疼而泪出此肝膽病也宜通肝散三曰滑翳有如水銀珠子但微含黃色不疼不痛無泪遮蔽瞳人宜菊花散四曰澀翳微如赤色或聚或開兩傍微光瞳人上如凝脂色無泪時澀痛宜決明子散五曰散翳形如鱗點或瞼下生粟日夜痛楚瞳人最疼常下熱泪此澀散二症皆肝肺相傳也宜八味還晴散六曰橫開翳上橫如劍脊下微薄不赤不痛此病稀少七曰浮翳上如水光白色環遮瞳人生自小眥頭至黑珠上不痛不癢無血色相潮八曰沉翳白點藏在黑珠下向日細視方見其白晴疼痛日輕夜重間或出泪宜空青丸九曰偃月翳膜如凝脂一邊厚一邊薄如缺月其色光白無瑕疵此橫開浮沉偃月四症皆難治十曰棗花翳周回如鋸齒四五枚相合赤色刺痛如針視物如煙晝則痛楚多泪昏暗十一曰黃心翳邊白中一點黃在黑珠上時下澀泪此棗花黃心兩症皆由肝肺風熱宜還睛散墜翳丸十二曰黑花翳其狀青色大小眥頭澀痛常泪口苦此膽受風寒也宜涼膽元十三曰胎患初生觀物轉睛不快至四五歲瞳人潔白昏蒙不見及年高不治此由胎中受熱致損也十四曰五風五色變為內障頭痛甚卻無泪日中如坐暗室常自憂嘆此由毒風腦熱所致十五曰雷頭風此毒熱之氣衝入眼睛中牽引瞳人或微或大或小黑暗全不見物十六曰驚振因病中再被撞打變成內障日夜疼痛不能視三光此胎患五風雷頭驚振四症俱不可治俱宜八味還睛散十七曰緑風初患頭旋額角相牽瞳人連鼻皆痛或時紅白花起肝受熱則先左肺受熱則先右肝肺同病則齊發宜先胰羚羊角散羚羊角丸後服還睛丸十八曰烏風眼雖癢痛而頭不旋但漸昏如物遮全無障翳或時生花此肝有實熱也宜瀉肝散十九曰黑風與緑風相似但時時黑花起此腎受風邪熱攻於眼也須涼腎二十曰青風不痛不癢瞳人依然如無恙者但微頭旋及生花轉加昏蒙此黑風青風相似俱宜還睛丸二十一曰肝虛雀目雀目者日落即不見物也此由肝虛血少時時花起或時頭痛久則雙目盲此則有初時好眼患成雀目者而亦有生成如此並由父母遺體日落即不見物不必治治亦無效宜雀目散鮮地黃炒豬肝食亦妙小兒每因疳病得之宜蛤粉丸風疳丸二十二曰高風雀目與前症相同晝明晦暗但經年瞳子如金色名曰黃風不治宜還睛丸二十三曰肝虛目暗遠視不明眼花頻起眥目赤痛有時看一成二此宜與眼暗參看宜補肝散一為外障總係足三陽病按綱目本靈樞經曰凡赤脈翳初從上而下屬太陽主表必眉稜骨痛或腦項痛或半邊頭腫痛治法必當溫之宜蠟茶飲散之宜夏活草散赤脈翳初從下而上或從內眥出外皆屬陽明主裡其症多熱或便實治法當下之宜明目流氣飲寒之宜羊肝元一味黃連飲赤脈翳初從外眥入內屬少陽主半表半裡治法宜和解之宜神仙退翳丸綱目條析三陽是已而又皆統於肺以外障皆連遮白睛而白睛則屬肺此則通治外障之法也而其症狀亦各有名目共二十七款今復詳考眼科家書撮其要略如一曰混睛白睛先赤後癢痛閉澀泪下久則睛變碧色滿目如凝脂赤脈橫貫宜地黃散二曰藟肉攀睛必眼先赤爛多年時癢時痛兩眥頭努出筋膜心氣不寧憂慮不已遂成攀睛或由用力作勞而得或由風熱衝肝而成俱宜二黃散定心元或由心經實熱必大眥赤紅肉堆起或由心經虛熱必小眥赤紅絲血脹俱宜速效散三曰兩瞼粘睛即爛弦風也由風沿眼係上膈有積熱或飲食時挾怒氣而成久則眼沿因膿漬而腫宜還睛紫金丹點之甚則中生細蟲年久不愈而多癢者是也當去蟲以絶根宜聖草散亦有小兒初生即兩目赤而眶爛至三四歲不愈者宜桑皮湯送消風散四曰雞冠蜆肉由風熱乘於脾經後有所傳致翳生瞼內如雞冠如蜆肉或青或黑阻礙痛楚怕日羞明須翻出看之用燈草輕輕刮去毫釐血出用銀匙挑洗風毒藥水按止之並不時將藥水點入則不復腫然後服藥宜石決明散五曰瞼生風粟由肝壅瘀血致兩瞼上下初生如粟米漸大如米粒或赤或白不甚痛癢常泪出滲痛當翻出以針撥之兼服藥以宣其風熱宜消毒飲亦有由脾經積熱者須分別治之宜加味荊黃湯六曰胞肉膠凝由風毒所注或熱積脾經或過於傷胞故上下胞腫如桃時出熱泪宜消風散羚羊角散七曰漏睛膿出由心氣不寧風熱客於眥瞼間致眥頭結聚津液膿出不止宜白微元或因患瘡出膿血後大眥頭常出膿涎不早治必生黑點侵損於目宜黃芪散八曰風牽瞼出由脾受風毒侵及於目故上下瞼俱赤或翻出一瞼在外若久而瞼內俱赤則不治宜五退散九曰瞼硬睛疼瞼中紅而堅硬疼痛涎出怕日羞明宜通肝散亦有起翳障宜春雪膏點之十曰蟹睛疼痛由肝家積熱上衝於目令目痛甚黑睛上生黑子如蟹目或大如豆名曰損翳極難治宜石決明散羚羊角散十一曰睛高突起由風熱痰飲漬於臟腑蘊積生熱熱衝於目致眼珠突出是名睛脹須用涼藥瀉肝宜瀉肝散一説云黑睛脹當瀉肝宜龍膽散白睛脹當治肺宜清肺散存參十二曰血灌瞳人由肝氣閉塞血無所歸致灌於瞳人痛如針刺視物不明卻無翳膜宜通血丸車前散又恐生花須預防之服前藥後再服還睛散倘生翳障不可輕忽急早治之宜地黃汁和大黃末攤帛上二寸部罨眼上久則易之十三曰痛如針刺由熱毒在心忽然睛急疼痛如針刺坐臥不寧宜先服洗心散再服還晴散十四曰瞳人乾缺眼睛乾澀全無泪流始而痛後稍定或白或黑不能見物不可治十五曰轆轆轉關睛藏上下瞼不能歸中也亦不易療姑服藥以治之然不能決其必效也宜瀉肝散門冬飲子若風寒直灌瞳人攻於眼帶則瞳人牽曳向下名墜睛眼亦轆轆轉關之類若日久即拽破瞳人兩眼俱陷即不見物宜犀角散十六曰風起嘴斜頻泪無翳不癢不痛宜蟬花無比散至如眼有偏視者由風邪攻肝牽引瞳人故令偏視也宜槐子丸十七曰鶻眼凝睛輪硬而不能轉動者是也此不可治十八曰神祟疼痛本無根因忽然疼痛如針刺如火炙兩太陽牽痛日輕夜重先當求禱再服藥宜石決明散十九曰風赤瘡疾由脾藏風熱蘊結兩瞼似朱塗而生瘡黑睛端然無染不治便生翳膜宜五退散外以湯泡散洗之二十曰小眥赤脈由三焦積熱令小眥中生赤脈漸漸衝睛急當早治並忌食熱物及房事宜犀角飲二十一曰拳毛倒睫由內多伏熱致陰氣外行故始則兩目緊急皮縮漸生膜泪出涔涔睫倒難開瞳人如刺須先去其內熱及火邪宜先服瀉肝散再服五退散使眼皮緩則毛自出翳自退或摘去拳毛用蝨子血點眼內數次即愈一法用木鱉子一個去殼打爛綿裹塞鼻中左目塞右右目塞左一二夜其睫即正二十二曰衝風泪出肺虛遇風風衝於內火發於外風熱相搏遂至泪流不止冬月尤甚宜白薑蠶散亦有汗熱甚而泪流並兩瞼赤者宜食後吞當歸龍薈丸亦有肝虛客熱而迎風冷泪者宜木賊散二十三曰癢極難當由膽受風熱致瞳子及眥頭皆癢不能收瞼宜驅風一字散二十四曰天行赤目由天行時疾目忽腫赤痛澀長幼相似宜瀉肝散石決明散並以五行湯洗之二十五曰被物撞打目因撞打疼痛瞳人被驚昏暗眼眶停留瘀血宜石決明散外貼地黃膏若撞打睛出而目係未斷即推入瞼內勿驚觸四畔宜生地黃散外以生地打爛厚敷如目係斷睛損不可治其有瘀血者以針刺出且用眼藥二十六曰塵絲瞇目或為飛絲所侵或為塵沙所苦皆疼痛閉澀瞇眼不脫宜瞿麥散二十七曰偷針眼或太陽結熱或脾家積熱兼宿食不消令目眥生小泡如瘡以針刺破即差甚有發腫而痛者用生南星生地黃同研膏貼兩太陽穴腫自消一為翳膜總係肝受風熱成病輕則朦朧重則厚起直指云翳雖自熱生然治之必先退翳而後退熱以先去熱則血冷而翳不能去也旨哉斯言其可知治翳之法乎至如勞役過度亦生翳當以補元為主宜益本滋腎丸服涼藥過多亦生翳説緣陽氣衰九竅不宣故青白翳見大眥也當益火之源以消陰翳宜補陽湯㿀痘後亦生翳宜決明元風熱眼病後亦生翳宜蟬花散菊花散翳之由來良非一端然總論之不外肝氣盛而發現在表故始治之法只宜表散宜羌活退翳湯如反疏利邪必內陷而翳益深矣故凡邪氣未定謂之熱翳而浮邪氣已定謂之冰翳而沉宜羚羊角散邪氣牢而深謂之陷翳當先琚發之宜羚羊角散使邪氣再動翳再浮乃用退翳之劑宜神仙退云丸大約翳係久病治之亦不能速效故須積歲月除之若眼睛上但有物如蠅翅之薄則謂之膚翳此翳之輕者也用點藥即愈宜烏賊骨散此皆通治翳膜之法也而其症狀亦各有名目共一十四條今更詳考眼科家書撮其要略如一曰肝臟積熱先患赤腫疼痛怕日羞明泪溢難開忽生翳膜初患一目漸及兩眼宜洗肝散瀉青丸亦有由風熱相侵者大約風眼腫則軟熱眼腫則硬宜局方密蒙花散二曰膜入水輪因黑珠上生瘡稍安其痕不沒故侵入水輪此難治三曰釘翳根深由心肝留熱致目疼生翳久則如銀釘頭入黑睛不可治宜點藥石決明散點之四曰黑翳如珠由腎虛受風熱而得如小黑豆生黑睛上疼痛泪出不可用點藥宜先服羚羊角散次服補腎丸五曰花翳白陷由肝肺二臟積熱致睛上忽生白翳如花白如鱗砌宜先點磨翳膏再服羚羊角散六曰水瑕深翳由五臟俱受熱致黑水內橫深瑕盤青色深入痛楚無時宜清涼散七曰玉翳浮滿黑珠上浮玉色不疼痛翳根下紅粒宜龍膽散點磨翳膏八曰順逆生翳凡翳自下而上者為順自上而下者為逆順則易愈逆則難治宜車前散點磨翳膏九曰旋螺尖起目痛翳生尖起而赤一似旋螺宜先服通肝散次石決明散十曰撞刺生翳因撞刺傷目生翳也或兼風熱更加疼痛昏暗宜先服經效散次石決明散十一曰赤眼後生翳由暴赤後熱流於肺輕則朦朧重則白睛紅花乃生云膜極不易治宜服瀉肝散點地黃膏十二曰暴風客熱由暴風熱所攻白睛起脹漸覆黑珠瞼腫癢痛宜瀉肝散清肺散十三曰黃膜上衝由脾受風熱毒致黃膜從下生而上衝黑暗疼痛閉澀此猶可治宜犀角飲十四曰赤膜下垂由客邪所攻致赤膜從上生而下遮黑睛名垂膜迎風出泪怕日羞明此為難治宜通肝散觀音夢授丸以百點膏點之以上論內障外障翳膜皆目病所當薄析者此外又有眼昏眼花眼疼三端各有由來不可不察説眼昏者視物不明也內經曰肝虛則目無所見靈樞曰足少陰之脈病目無所見又曰氣脫者目不明難經曰脫陰者目盲據諸經之言是目昏皆由於虛以五臟精皆聚於目每一臟虛則一臟精明之用失故皆能令目昏此則其原也然亦有由於目之玄府受熱者河間云熱氣怫鬱玄府閉塞而致氣液血脈榮衛精神不能升降出入各隨所鬱微甚而為病之重輕故熱鬱於目則目無所見也或目昏而見黑花由熱氣甚也據此可知目昏不但為虛而亦由熱矣試觀傷寒症熱極則目盲不識人且有病後餘熱未清並有目昏漸生翳膜者宜石決明散點春雪膏益可信也若微昏者至近則視難辨物以近則光反隔也目暴不見物者氣脫也久病昏暗者腎臟真陰虛也總治目昏宜駐景丸加減駐景丸還晴丸婦人目昏者多由於鬱怒傷肝也宜抑青明目湯老人眼昏者血氣衰而肝葉薄膽汁減也前人云童子水在上故視明瞭老人火在上故視昏暗旨哉言也宜夜光育神丸明眼地黃丸眼花者眼光昏散也皆由腎虛之故説腎主骨骨之精為瞳子腎水虛骨活火得乘之故瞳子散而視物杳冥也如見黑花或如飛蠅散亂或如懸蟢空虛皆腎虛也見青花膽虛也見紅花火甚也見五色花腎虛客熱也東垣云陽主散陽虛則眼楞急而為倒睫拳毛陰主斂陰虛不斂則瞳子散大而為目暗眼花然則昏花二症舍陰虛其安屬哉宜滋陰地黃丸益本滋腎丸眼疼者一為目眥白眼疼即經言白眼赤脈法於陽是也惟其屬陽故日中更疼點苦寒藥則效一為目珠黑眼疼即經言瞳子黑眼法於陰是也惟其屬陰故夜則更疼點苦寒藥反劇何相反若是歟説以白眼疼由肝實熱宜瀉青丸救苦湯黑眼疼由肝虛熱故也宜夏活草散至若男子讀書過度女子針繡太甚以至眼疼發澀此為肝勞過度不必服藥時常閉目調養自愈以上三端又於內外障翳膜之外所當詳審而析治者也總之目為肝臟發竅而肝實藏血肝又主風故日病多半由於虛實寒熱及內動外感之風邪前既歷詳各種名目症治茲更實指其由以明病所從發如由血虛必目昏也宜明目地黃丸由亡血過多及久痛傷血或年老血少必羞明酸痛不能視物也宜芎歸明目丸或雖養血安神必兩目昏花不能久視也宜久患目疾方失血後復受燥熱左目赤痛也宜葉氏荷葉湯高年血絡空虛目昏日久復又氣血乘其空隙攻觸脈絡液盡而痛當夜而甚乃熱氣由陰而上也宜葉氏羚羊角湯實熱暴發必赤腫疼痛也宜瀉熱黃連湯風熱攻目至隱澀難開也宜羞明立勝散風熱壅珠必眼白紅障而痛也宜黃連湯風熱牽閉目不得開也宜芎芷香蘇散加前胡蔥白風溫上鬱目赤脈左弦當以辛散也宜葉氏夏活草湯秋風化燥上焦受邪目赤珠痛也宜葉氏連翹湯熱蒸濕鬱暑入氣阻當用淡滲以清中上之邪也宜葉氏茯苓湯鬱勃氣火翳遮目睛也宜葉氏山梔皮湯或陰血虛而陽氣盛能遠視不能近視也宜地芝丸陽氣虛而陰血盛能近視不能遠視也宜定志丸加茯苓陽升不交於陰竟夕無寐而目珠赤痛也宜葉氏桑葉湯陰傷火鬱左眼眶疼痛或微寒汗大出不可作時邪治也宜六味丸去萸肉加蔓荊子丹皮白芍或肺有實熱而眵多結硬肺有虛熱而眵稀不結也宜經效散邪中腦項之精精散視岐見一為兩也宜驅風一字散肝腎虛而視一為兩也宜腎氣丸肝膽氣熱而目痛偏左翳膜紅絲脈左弦澀也宜葉氏草決明湯陽明空虛肝陽上擾而右目多泪眥脹心嘈雜當調補肝胃也宜葉氏肝胃湯肝陰內虧厥陽上越左目痛翳膜泪熱而脈細澀也宜葉氏補肝湯焦煩鬱勃陽升化風劫傷血液而左偏頭痛先損左目致瞳人散大也宜葉氏肝腎兼補丸時行火邪兩目腫痛也宜白蒺藜湯種種目疾安可不詳求治法哉總之暴病皆是風火為實宜羌柴湯外以洗眼湯洗之久病則皆為虛候必須壯水滋陰宜加味地黃丸明目四神丸或有過服寒涼以致陽虛其火轉甚者則當用溫補其火自降目自明矣宜八味丸加目疾藥凡患目疾切忌以冰片辛香金石等藥搽點俗語云眼不醫不瞎説謂此也此篇參取危達齋得效方脈法醫鑑曰左寸脈洪數心火炎也關弦而洪肝火盛也右寸關俱弦而洪肝木挾相火之勢侮肺金而乘脾土也回春曰眼本火病心肝數洪右寸關見相火上衝類聚曰眼見黑花者從腎虛而起左手尺脈沉而數者是也眼病皆火無寒直指曰凡眼為患多生於熱治法以清心涼肝調血順氣為先耳入門曰歷考眼科之病無寒而有虛與熱豈寒澀血而不上攻歟目得血而能視內經曰人臥則血歸於肝肝受血而能視又曰肝虛則目無所見難經曰肝氣通於目肝和則能變五色直指曰肝者目之外候肝取木腎取水水能生木子母相合故肝腎氣充則精彩光明肝腎之氣乏則昏蒙暈眩心者神之舍又所以為肝腎之綱焉説心主血肝藏血血能熱凡熱衝發於眼皆當清心涼肝入門曰肝藏血熱則目赤而腫虛則眼前生花目病原由症治東垣曰因心事煩冗飲食失節勞役過度故脾胃虛弱心火太甚則百脈沸騰血脈逆行邪害孔竅故日月不明脾者諸陰之首目者血脈之宗故脾虛則五臟精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動損其血脈故百病生焉不理脾胃及養血安神是治其標不治其本不明此理也入門曰五臟六腑精華皆稟於脾注於目故理脾胃則氣上升而神清也肝之係雖連於目而照徹光彩實腎精心神所主故補精安神治眼之本也又曰內障昏蒙因腦脂下凝烏珠轉白如腦脂凝結瞳人反背者不治丹溪曰凡昏弱不能視物內障見黑花瞳子散大皆裡病也又曰目疾所因不過虛實虛者昏花由腎經真水之微也實者瞳痛由肝經風熱之甚也若虛實相因則兼用滋陰散熱此內治法也至日久熱壅血凝而為攀睛藟肉翳膜赤爛等則必須點洗外治之法正傳曰雀目病暮暗者肝虛無血也至曉復明者木生於亥旺於外絶於中酉戌木氣衰故暗至卯木氣盛故復明至雀目終變為黃脹而死者木絶於中乃水土長生之地木衰而土盛始變為黃脹宜平胃散以平土氣四物湯以補肝虛保命曰目病在腑為表當除風散熱臟為裡當養血安神目病易治難治不治及凶症內經曰瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可以不察也又曰目內陷者太陽絶也死保命曰外障易治內障難治暴發為表易治久病為裡難治直指曰真珠翳狀如碎米者易散梅花翳狀如梅花者難消入門曰瞳人乾缺痛澀無泪者或白翳藏在黑水下向日細看方見者或兩眼相傳疼痛晝輕夜重者或內障五色相間頭痛無泪日中如坐暗室者或雷頭風熱毒氣衝入睛中或微或大昏暗不見者皆不治綱目曰戴眼者目直視而目睛不轉動也若目睛動者非直視也傷寒直視者邪氣壅盛臟腑之氣不上榮於目則直視多難治衄家不可發汗發汗則目直視不能瞬不能眠猶未甚也逮狂言反目直視與直視搖頭皆臟腑氣奪絶也即死日病導引法保生祕要曰對香靜坐灰心歇念目含光意覺香頭有灰以意吹之又靜覺灰又吹香盡為期治一切云翳藟肉扳睛腎水活心火盛皆效運央保生祕要曰法行艮背右旋上行逾昆侖經明堂漸旋至眼細圈入瞳人撤散數十度降胸臆曲行大腸出谷道退火復歸元位左目運左右目運右左右齊患則止從明堂位上分行雙運又導引法保生祕要曰先以手抱昆侖仰頭吐氣或噓或呵瀉而復納次以二目轉動左右上下轉時先開後閉閉而復開隨時行之不間或動或運二者兼之運央保生祕要曰雙瞳藏於兩腎想腎水浸洗能退熱運徹四散能去風雙目視二腎存兩道白水運至眼中著意圈洗磨剝單去翳想二乳下肺肋推下腳股吹吸之法能退白上紅以雙手向肩崖兩腳心懸空噓吸能退黑睛熱能泄肝經之火常注念臍縧取腎水升洗覆臍效眉稜骨痛風痰濕火俱有病也目係所過上抵於腦諸陽經挾外邪鬱成風熱毒上攻腦下注目精遂從目係過眉骨相並不痛若心肝壅熱上攻目精而痛亦目係與眉骨牽連而痛故其為症有由風痰眉骨痛連於目不可開晝靜夜劇者宜芎辛導痰湯有由痰火眉心並眉梁骨痛者宜二陳湯送青州白元子有由風熱挾痰而痛者宜芷苓散有中風寒侵犯而痛者宜羌烏散有由濕痰眉眶骨痛而身重者宜芎辛導痰湯加川烏白朮大約選奇湯上清散二方俱為總治眉稜骨痛之劑戴復庵分為二症皆屬於肝一為肝經傷頭痛眼不可開必晝靜夜劇宜導痰湯加川烏細辛一為肝虛而痛方見光明即發宜生地黃丸熟地黃丸眉稜骨原由醫説曰眉屬肝故橫土稟木氣眉所生處之骨為眉稜骨故其為病亦屬肝治目病方一百十七導赤散心火生地木通甘草各一錢竹葉七片桑皮湯肺熱桑皮元參枳殼杏仁升麻防風赤芍甘菊黃芩炙甘草旋覆花甜葶藶清火止痛湯總治川連元參甘菊連翹黃芩木通當歸丹皮白芍藥木賊草羚羊角生地谷精草益氣聰明湯脾胃黃芪甘草人參升麻葛根白芍黃柏蔓荊子熟地黃丸腎虛熟地決明子黃連牛膝酒黃柏杞子菟絲子柴胡生地五味子養肝丸肝虛當歸防風川芎楮實熟地蕤仁白芍車前子龍薈丸肝火龍膽草蘆薈當歸黑山梔廣木香黃連黃芩麝香蜜丸四物龍膽湯又龍膽草川芎當歸白芍熟地羌活防風防己湯泡散肝熱赤芍當歸黃連各一錢滾水泡洗還睛散又人參茺蔚子知母桔梗熟地車前子黃芩細辛元參五味子明目地黃丸血虛生地熟地牛膝枳殼防風杏仁金石斛芎歸明目丸亡血川芎當歸白芍地黃牛膝甘草杞子天冬甘菊外障加木賊內障加珍珠久患目疾方久昏杞子甘菊地黃白蒺藜瀉熱黃連湯實熱黃連黃芩升麻柴胡生地龍膽草羞明立勝散風熱黃連黃芩防風秦皮黃連湯又決明子甘菊川芎元參陳皮黃連細辛甘草薄荷蔓荊子決明子散赤翳黃芩甘菊赤芍石膏川芎羌活木賊草決明子石決明甘草蔓荊子撥雲丹藟肉蔓荊子木賊草密蒙花川芎各二錢白蒺藜當歸各二錢半甘菊二錢薄荷五分黃連蟬退楮實花粉各六分地骨皮八分川椒七分甘草四分為末空心水下無比丸赤爛茯苓甘草防礬各四兩川芎石決明當歸羌活赤芍蟬退蒼朮各二兩白蒺藜蛇退各一兩甘菊湯又決明子甘菊當歸川芎赤芍甘草防風荊芥蔓荊子地芝丸近視生地天冬枳殼甘菊密丸烏金丹飛絲京墨一味磨濃汁點之即出羌柴湯甚痛蘇葉防風細辛各七分荊芥羌活柴胡蒿本白芷各一錢白蒺藜湯時氣白蒺藜青葙子木賊草白芍草決明山梔當歸各一錢黃連黃芩川芎各五分甘草三分服此忌怒酒色辛辣之物洗眼湯外洗甘菊玉竹各一錢大黃山梔細辛竹葉蘇葉各五分甘草青鹽各三分乘熱洗有障加蟬退加味地黃丸久病熟地山萸山藥丹皮茯苓當歸黃連澤瀉人參明目四神丸又杞子八兩酒水拌分四股一用小茴三錢炒去茴一用川椒三錢炒出汗去椒一用青鹽三錢炒一用黑芝麻三錢炒白蒺藜四兩歸頭酒炒熟地各三兩石決明甘菊桑葉谷精草各二兩蜜丸每三錢開水送下八味丸溫補地黃山藥山萸丹皮茯苓澤瀉附子肉桂生熟地黃丸血虛生地熟地元參石膏各一兩蜜丸空心茶下益陰腎氣丸腎虛熟地二兩酒生地萸肉各一兩山藥丹皮柴胡歸尾五味子各五錢茯神澤瀉各二錢半蜜丸鹽湯下滋腎明目丸又川芎當歸白芍熟地生地各一錢人參桔梗山梔白芷黃連甘菊甘草蔓荊子各五分加茶葉燈心駐景丸肝腎菟絲子五兩車前子熟地黃各三兩蜜丸一方加杞子一兩半尤佳加減駐景丸又菟絲子八兩楮實杞子車前子五味子川椒各一兩熟地當歸各五錢補肝散圓翳羚羊角防風各一兩人參赤苓各七錢半羌活元參黃芩細辛車前子各三錢七分半每末二錢米飲下如筋脈活澀加夏活草補腎丸又蓯蓉杞子各一兩巴戟破故紙山藥茴香丹皮各五錢青鹽二錢半通肝散冰翳山梔枳殼甘草荊芥白蒺藜各五錢車前子牛蒡子各二錢半每末二錢竹葉湯調下八味還睛散散翳草決明一兩白蒺藜防風木賊草山梔甘草各五錢青葙子蟬退各二錢半每末二錢麥冬或菊花湯下空青元沉翳防風生地知母各二兩細辛石決明車前子五味子各一兩空青二錢蜜丸茶清下十丸墜翳丸黃心翳青羊膽青魚膽鯉魚膽各七個熊膽二錢半牛膽五錢麝香三分水飛石