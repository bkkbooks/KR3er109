藥多柴胡錢半羌活獨活人參甘草熟地白朮黃芪各五分澤瀉陳皮防風白芍生地茯苓當歸知母各三分肉桂一分清晨服此湯臨臥服連柏益陰丸連柏益陰丸又草決明酒黃連黃芩鹽酒黃柏鹽酒知母各一兩羌活獨活五味子當歸防風甘草各五錢石決明二錢蜜丸茶清下宜多服補陽湯少服此丸蟬花散病後翳蟬退甘菊川芎白蒺藜草決明防風羌活山梔荊芥穗蔓荊子谷精草密蒙花木賊草去節童便浸曬蒼朮炙草等分為末每二錢茶下菊花散又甘菊四兩木賊草羌活蟬退白蒺藜各三兩荊芥甘草各二兩每末二錢茶清下羌活退翳湯太陽經羌活錢半防風一錢薄荷荊芥藁本各七分酒知母五分酒黃柏四分川芎當歸各三分麻黃酒生地各二分川椒細辛各一分羚羊角散陷翳羚羊角升麻各二兩甘草一兩半為末半蜜丸取末一錢泔水煎送五十丸瀉青丸肝熱當歸龍膽草川芎黑山梔煨大黃羌活防風各等分蜜丸芡子大每一丸竹葉湯同砂糖化下一名涼肝丸烏賊骨散膚翳烏賊骨冰片各一錢為末日點三四次洗肝散肝積熱羌活當歸薄荷防風炙甘草大黃川芎山梔各一錢加龍膽草一錢尤佳局方密蒙花散又密蒙花白蒺藜木賊草石決明羌活甘菊等分每末一錢茶清下點藥石決明散膜入水輪石決明珍珠西珀各七錢五分烏賊骨五錢冰片一錢共為末以銅箸蘸取大豆部點眼日三此方兼治一切丁翳根腳極厚久不差者補腎元黑翳熟地杞子山萸山藥丹皮補骨脂核桃肉蜜丸磨翳膏花翳蕤仁口含去皮殼一兩冰片三錢空青二錢研極細取少部點清涼散瑕翳蔓荊子荊芥穗苦竹葉甘草各錢半山梔七分半薄荷七片水煎經效散撞刺翳柴胡二錢大黃當歸赤芍犀角各一錢甘草五分食後服觀音授丸赤膜夜明砂當歸蟬退木賊草各三兩羊肝四兩煮爛打膏為丸空心熱水下五十丸百日如舊百點膏又黃連三錢銼水一碗煎至半碗入防風八分歸身甘草各六分蕤仁泥三分同熬至滴水不散絞去渣入煉蜜少部再熬片時令靜心點之日五七次臨臥點尤效此方兼可點一切翳膜春雪膏眼昏硼砂三錢冰片一錢朴硝五錢研極細每用少部口中津塗和點閉目片時開眼泪出效抑膏明目湯婦人當歸白芍生地白朮赤苓半夏陳皮柴胡黃連山梔丹皮蔻仁甘草龍膽草各七分薑三棗二夜光育神丸老人熟地生地川連遠志牛膝杞子甘菊枳殼當歸菟絲子地骨皮等分蜜丸空心酒下五七十丸滋陰地黃丸眼花當歸五錢生地七錢半川連熟地各一兩柴胡八錢黃芩六錢天冬地骨皮五味子各三錢枳殼炙草各二錢蜜丸茶清下百丸亦名熟地黃丸凡目漸昏乍明乍暗此失血之驗也宜此丸與定志丸間服救苦湯眼疼蒼朮龍膽草各錢半當歸甘草各一錢川芎六分生地川柏知母黃芩各五分羌活防風升麻柴胡黃連蒿本各三分桔梗連翹細辛紅花各二分水煎食後服葉氏荷葉湯失血鮮荷葉冬桑葉赤苓皮甘草緑豆皮穭豆皮葉氏羚羊角湯高年羚羊角連翹心夏活草丹皮青菊葉桂枝全當歸葉氏夏活草湯風溫夏活草桑葉連翹赤芍草決明葉氏連翹湯秋燥連翹薄荷黃芩山梔桑皮苦丁茶夏活草青菊葉葉氏茯苓湯熱蒸冬桑葉谷精草望月砂苡仁通草緑豆皮茯苓葉氏山梔皮湯鬱勃山梔皮夏活草谷精草連翹草決明望月砂丹皮生香附葉氏桑葉湯陽升桑葉丹皮苡仁川貝母夏活草山梔葉氏草決明湯肝膽熱草決明冬桑葉夏活草小胡麻谷精草丹皮葉氏肝胃湯肝胃黃芪三錢當歸白芍各錢半茯神三錢煨薑一錢南棗一枚葉氏補肝湯肝陰望月砂製首烏穭豆皮各三錢炒杞子小胡麻各錢半冬桑葉黃菊花各一錢石決明一具葉氏肝腎兼補丸焦煩熟地杞子山萸茯神甘菊生神麯五味子山藥谷精草治眉稜骨痛方九二陳湯痰火茯苓甘草半夏陳皮青州白元子又半夏七兩南星三兩白附子二兩川烏五錢共為細末清水浸春五夏三秋七冬十朝夕換水日數足取納絹袋濾過渣再研濾澄清去水曬又為末米飲丸薑湯下三十丸羌烏散風寒川烏童便浸二宿炒一錢酒芩炙草細辛羌活各五分為末分二服食後茶下芎辛導痰湯風濕痰半夏錢半南星川芎細辛赤苓陳皮各一錢枳殼甘草各五分生地黃丸肝虛生地黃甘菊防風枳殼決明子石決明白芍茯神熟地黃丸又金石斛熟地菟絲子防風茺蔚子車前子黃芪覆盆子肉蓯蓉地膚子磁石煅各一兩兔肝一具炙乾蜜丸空心鹽湯下芷芩散風熱痰白芷酒黃芩等分為末每二錢茶清下選奇湯總治羌活防風半夏各二錢黃芩錢半甘草一錢加薑三片上清散又川芎鬱金赤芍荊芥薄荷芒硝各二錢半乳香沒藥各五分半冰片二分半研末搐鼻
