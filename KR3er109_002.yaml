body:
  text: 卷二諸氣源流諸氣肺病也經曰肺主氣又曰諸氣皆屬於肺凡人清純元氣與血流行循環無端若衝擊橫行於臟腑間而為痛為痞滿為積聚等病者氣失其平也下手脈沉便知是氣極則伏若感氣肺脈必洪大若動怒肝脈亦必洪軒岐分九氣喜怒勞思悲恐驚寒暑喜則氣緩怒則氣逆勞則氣耗思則氣結悲則氣沮恐則氣凝驚則氣亂寒則氣收暑則氣泄又喜恐驚屬心腎膽過則耗散真氣怔忡健忘失志不足諸證作怒憂思屬肝脾肺過則鬱抑邪氣癲狂噎膈腫脹疼痛有餘諸證作以上諸症治法詳本條內法宜高者抑之下者與之寒者溫之熱者清之驚蓄平之勞者和之然後諸氣可得而治也古人云人有病在七情非藥可治也還即以情治之此旨甚微醫者亦所宜審如恐可治喜以遽迫死亡之言怖之悲可治怒以愴悴甘楚之言感之喜可治憂以謔浪褻狎之言調之怒可治思以污辱欺妄之言觸之思可治恐以慮彼忘此之言奪之此足救醫藥之所不逮者丹溪云氣有餘便是火說言邪氣有餘非言元氣也經云壯火食氣亦謂邪氣之實而壯者能耗元氣宜稍清之使有餘之邪不為元氣之害宜黃岑山梔黃連生地黃柏連翹等但苦寒之藥施於邪氣有餘者方可若元氣不足邪氣有餘苦寒之品最傷脾胃切勿妄投總之用藥有四法氣虛當補宜人參黃耆白朮茯苓河車炙草氣升當降宜蘇子橘紅烏藥枇杷葉重則降香沉香氣逆當調宜木香白蔻仁砂仁香附陳皮氣實當破宜枳殼枳實青皮檳榔厚朴循是四法再能各因病症而治之自無不效矣所謂病因若何有病人自覺冷氣從下而上者非真冷也上升之氣自肝而出中挾相火陽亢陰微火極似寒者宜六味丸有氣結痰在喉間吞吐不得膈痞嘔惡者宜四七湯有氣虛胸中虛痞喜按者宜補中益氣湯有氣逆上盛下虛痰盛胸嗌者宜蘇子降氣湯有氣逆肋滿積聚脹痛者宜沉香化氣丸有氣收胸寒上喘腹脹不和者宜分氣紫蘇飲有氣不宣流成瘡癤並挫閃腰肋痛者宜復元通氣散有氣聚而不得散者宜大七氣湯有昏迷痰塞牙緊似中風但身冷無汗者急以蘇合丸灌之再依次服藥次宜順氣散再次宜調氣散如餘痰末平再換方藥治宜星香散一切氣鬱總宜以化滯為主宜木香化滯湯脈法仲景曰脈浮而汗出如珠者衛氣衰也又曰寸口脈微而澀微者衛氣衰澀者榮氣不足又曰趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣脈經曰寸口脈瞥瞥如羹上肥者陽氣微縈縈如蜘蛛絲者陰氣衰又曰代者氣衰細者氣少浮而絶者氣欲絶脈經曰下手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲又曰脈沉細動皆氣痛症心痛在寸腹痛在關下部在尺脈象顯然氣為諸病子和曰諸病皆生於氣諸痛皆因於氣回春曰風傷氣者為疼痛寒傷氣者為戰栗濕傷氣者為腫滿燥傷氣者為閉結直指曰人有七情病生七氣氣結則生痰痰盛則氣愈結故調氣必先豁痰如七氣湯以半夏主治官桂佐之說良法也又曰七氣相干痰涎凝結如絮如膜甚如梅核窒礙於咽喉之間或中滿艱食或上氣喘急曰氣膈曰氣滯曰氣祕曰氣中以至五積六聚疝癖癥瘕心腹塊痛發則欲絶殆無往而不至矣當治以七氣湯四七湯氣逸則滯入門曰凡人逸則氣滯亦令氣結輕者行動而愈重者橘皮一物湯氣不足病靈樞曰邪之所在皆為不足放上氣不足腦為之不滿耳為之鳴頭為之傾目為之滿中氣不足溲便為之變腸為之鳴下氣不足乃為痿厥心悗氣絶候靈樞曰五陰氣俱絶則目系轉轉則目連目連者為志先死志先死則遠一日死矣六陽氣俱絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死又曰六腑氣絶於外者上氣腳縮五臟氣絶於內者下利不禁甚者手足不仁又曰陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必黃脅下溫心下熱中氣暴病也凡人暴喜傷陽暴怒傷陰憂愁怫意氣多厥逆皆能致中氣之病要惟忿怒為尤甚說怒則氣惟一往有升無降便覺痰涎壅塞牙關緊閉一時昏倒不省人事若以薑湯急灌之立時可醒既醒之後隨症調治當無不痊非若中風之病猝難為之救治也宜八味順氣散木香順氣散脈法得效曰中風脈浮身溫口多痰涎中氣脈沉身涼口無痰涎中氣非中風可比得效曰中風而以中氣藥治之亦無所傷中氣而以中風藥治之禍不旋踵入門曰中氣虛者八味順氣散實者四七湯醫鑑曰內經云無故而喑氣不至不治自已謂氣暴逆也氣復則已審如是雖不服藥亦可上氣肺病也經曰邪在肺則寒熱上氣又曰肺藏氣氣有餘則喘咳上氣說由肺經受邪氣道窒塞呼多吸少其息促急也經言所有餘只邪氣耳宜蘇子降氣湯沉香降氣湯快氣湯上氣不治症正傳曰上氣而面浮腫肩息脈浮大者不治如又加脹則更甚矣下氣腸胃鬱結病也說惟鬱結則腸胃之氣不能健運所納谷食之氣從內而發不得宣通往往上行則多噫氣上行不快遠而下行因復下氣也此下氣之常症也經云夏脈者心也心脈不及下為氣泄此言下氣之原由於臟病者又云癲癇癆瘵若氣下泄不止必死以真氣竭絶腸胃腠理閉塞故氣不能宣通於腸胃之外故從腸胃中泄出此言下氣之原由於真元虛者經所言俱非常病也宜七氣湯傷寒亦有下氣忡景曰傷寒陽明病胃中有燥屎者必轉矢氣下之即愈轉矢氣者氣下泄也短氣無氣虛乏病也當補氣不可瀉肺治法無二宜加味生脈散其氣出多入少者最為難治宜拯陰理癆湯加黃耆白朮脈法仲景曰趺陽脈微而緊微為虛緊為寒微緊相搏為短氣脈經曰趺陽脈浮而澀澀則衛氣虛虛則短氣又曰寸口脈沉胸中短氣也短氣疽治仲景日平人寒熱短氣不足以息者實也又曰短氣有微飲當從小便去之入門曰短氣者呼吸不相接續也有結胸者有停水怔忡者有風濕相搏者有素弱氣虛者大抵心腹脹滿者為實為邪在裡心腹濡滿者為虛為邪在表又曰氣散則中虛倦怠無力短氣不足以息當補中益氣少氣肺腎二經病也經曰腎生氣腎虛則少氣力言吸吸骨酸懈惰不能舉動又曰肺藏氣肺不足則息微少氣以是知腎虛則氣無所生既不尅壯氣之原肺虛則氣無由藏又不尅充氣之府曰少者獨言所剩無多虛虛怯怯非如短氣之不相接續也知此則少氣可得而治矣宜四君子人參黃耆湯益氣丸少氣症狀東垣曰內傷脾胃致中氣虛少易老曰真氣虛耗脈弱懶語綱目曰少氣者氣少不足以言也氣逆火病也故內經曰諸逆衝上皆屬於火也又曰何謂逆而亂曰清氣在陰濁氣在陽榮氣順脈衛氣逆行清濁相干亂於胸中是為太悗悶故氣亂於心則煩心密默仰首靜伏亂於肺則俯仰喘喝按手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩仆則知逆亂之故皆由火熱上衝氣不得順之所致也然則治逆惟有散火而散火必先降氣氣降則火自清火清而逆自平也宜退熱清氣湯若火盛者必當以清火為重兼以理氣自合治法宜滋陰降火加便香附茯神沉香氣逆症丹溪曰病人自言冷氣從下而上者此上升之氣自肝而出中挾相火其熱為甚自覺其冷非真冷也又曰氣之上逆屬陽無寒之理覺惡寒者乃火極似水也氣鬱內外因俱有之病也其始或因七情或因飲食或因六淫雖其端甚微而清濁相干往往由氣成積由積成痰痰甚則氣不得宣而愈鬱或痞或痛說有必至者矣宜交感丹木香勻氣散降氣湯上下分消導氣湯脈法千金方曰諸氣逆上脈必沉澀氣鬱症正傳曰氣鬱而濕滯濕滯而成熱故氣鬱之病多兼浮脹滿也此氣鬱條當與諸鬱篇參看氣滯澀五臟俱有病也凡人之生不外氣血而此氣血五臟皆兼有之但氣為先天之用陽也無形而有影血為後天之用陰也有形而成質陽常足以統陰故血之榮活一隨乎氣之盛衰氣盛則血亦榮而潤澤氣衰則血必活而減形甚哉人生之重乎氣也說氣茍衰弱漸必滯澀氣既滯澀每各隨乎所滯之臟腑而成病治之者宜先其滯澀宜調氣散木香化滯湯俟宣通後再加補益宜補中益氣湯益氣丸五氣滯澀保生祕要曰氣澀於肝則肝氣不順或搠脅而疼或成疽症或成目疾或成風患諸風掉眩皆屬於肝也春月木旺常宜噓吸為補瀉之法和其肝氣勿食諸肝以免死氣入肝傷其魂也宜燒蒼朮香清晨飲屠蘇酒馬齒莧以祛一年不正之氣大抵陽春初升景物融和當眺覽園林尋春郊外以暢春生之氣氣澀於心心為一身之主統領血海故心血少則神不定寢不安百病集作諸痛癢瘡瘍皆屬心火當常呵以泄其火吸以和其心諸心切勿食穢氣傷我靈夏至夜半後地氣一陰生大熱勿食冷受寒霍亂侵更忌房中事元氣離命門大抵甚暑天善於養心則無秋患時當飲六一燈心湯草蔻香茹水飽醉勿頂風前臥慎此則無患矣氣澀於肺則肺氣不清液凝滯而生痰諸痰臏鬱皆屬肺上焦之疾或傳於大腸秋月金旺宜常哂吸以和其肺氣慎勿食諸肺則不厭其魄時秋初夏末熱氣酷甚少貪風涼免傷背之腧穴中風之症說感此也肅殺之天殺中有生秋分之日戒傷生命大抵萬物收斂人心更要時守勿為馳逞發揚氣澀於腎諸寒收引皆屬腎水氣弱或作腰疼水活瞳人昏暗兩耳難察律音冬月水旺常吐納按節吹氣調和會意掌心所忌須避寒冷最宜早臥遲升大抵冬月斂藏氣閉至陰已極宜節欲養一陽之初生說陰陽交精子午合璧萬物氣微在下不可動搖守此則保壽無疆氣澀於脾則胃口凝滯不尅飲食而多瀉泄久不疏通成中滿之症諸濕腫滿皆屬於睥四季脾居土輕呼稍寬胸大病須服氣能伏養谷神說脾為一身之主氣滯於內卻內五臟之患滯於外防癤疥之憂皮裡隔膜有積熱而內外相感猶防疽毒所感者七情六欲而生也鰲按保生祕要論五氣滯澀篇永與醫道無關然明乎此亦可知百病之生皆由氣之滯澀藥物外更加調養則病可卻而生可廷況古云醫道通仙道修仙之術端由煉氣煉形入手以至變化生神而素問首卷亦日恬淡無為斂神內守實以靜央調養真氣靈樞用針灸亦是以行氣之法起膏盲之疾可見上古醫經專從理氣治患非徒恃土石草木之藥物己也微哉此旨凡醫者病者安可略而不論徒恃方藥乎故附録於此氣痛三焦內外俱有病也人身之氣周流不息本無停止多因七情六氣飲食勞役所鬱以致凝滯上焦則為心胸痞痛宜枳橘湯清膈蒼莎丸凝滯中焦則為腹脅剌痛宜木香破氣散撞氣阿魏丸凝滯下焦則為疝瘕腰痛宜四磨湯木香檳榔丸凝滯於內則為癖積疼痛宜化積丸三稜散凝滯於外則為遍身刺痛或浮腫或䐜脹宜流氣飲子木香流氣飲總而言之何莫非氣之為病哉氣痛症治入門曰人身元氣與血循環彼橫於臟腑之間而為疼痛積聚痃癖壅逆胸臆之上而為痞滿刺痛等症皆由氣結甚為痰飲初起宜辛溫開鬱行氣豁痰消積久則宜用辛寒降火以除根鰲按本條氣痛與氣滯澀條相類而有虛實之別氣滯澀為病由於氣之虛氣痛為病由於氣之實治諸氣方十三六味丸火極似寒地黃山藥山萸丹皮茯苓澤瀉四七湯氣結半夏茯苓厚朴蘇葉薑七氣湯又半夏二錢人參肉桂炙草各七分薑二片補中益氣湯氣虛人參當歸黃耆白朮柴胡升麻陳皮炙草蘇子降氣湯氣逆蘇子半夏前胡炙草當歸沈香虛加黃耆冷加肉桂沉香化氣丸又淡黃岑大黃白朮沉香竹瀝薑汁丸朱砂為衣每服一錢分氣紫蘇飲氣收復元通氣散氣不宣通大茴香穿山甲延胡索白丑木香炙甘草陳皮大七氣湯氣聚三棱莪朮青皮陳皮陳皮桔梗香附藿香甘草肉桂益智仁順氣散痰塞人參茯