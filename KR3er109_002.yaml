沒者乃為風寒所衝必至毒邪內陷宜羚羊散大青湯元參解毒湯倘不早治胃爛而死宜犀角解毒湯已過三日不沒者乃內有濕熱之故宜四物湯加犀角汁然所謂三日漸沒第以手摸之無痕耳肌膚邊內隱隱紅點雖至五六日亦有至疹子之色則以鮮明紅潤為佳赤紫乾燥晦暗皆火盛毒熾急治始無變症宜六一散或四物去地黃加炒黃岑番紅花等類若渾身如錦紋則為夾斑疹宜化斑湯若色白則為血不足宜養血益榮湯若黑色則九死一生矣急與大青龍湯既沒之後必慎風寒戒勞碌靜養三七日至色欲一事非七七日後斷不可犯說疹雖已痊餘邪萬不能一時即盡使傷精喪血欲火煽動恐邪復乘虛肆橫致生別症設有此患急宜大補氣血仍兼消毒清火宜十全大補加減飲食禁忌尤宜小心五辛早令生驚搐鹽醋早令咳不止雞魚早令天行時即重出此皆終身為患故須切戒總之疹子出必貴速沒必貴漸速出則毒行盡泄不致停留於中漸沒則自無衝遏而餘毒亦解故出不速者必用藥以開其腠理而催發之宜麻黃散消毒飲凡用方劑必要參合歲氣時令沒不漸者必用藥以清其實熱而和解之宜犀角消毒散至於發熱時有汗自出者有鼻衄血者皆不得遽止之以毒能隨汗衄泄也然衄血者少而自汗者多以衄必其人陽素盛復因熱毒薰灼而傷血分故上溢而從鼻出鼻為肺竅疹又為肺病故也然其症必重衄太過亦須止之宜茅花湯汗者乃心之液疹家之汗則不盡出於心而出於肺說肺之氣化本下輸於臟腑滋灌於經絡茲為疹毒所蒸遂越皮毛而出毒亦因之以泄是汗固疹家必不可無故發熱時或不得汗必表散以出之也宜蘇葛湯升麻葛根蔥白湯雖然汗固宜矣畢竟當以亡陽為戒在無汗而以藥發之者既得之後切不可再汗在自有汗者即不得輕用表藥逮疹出既齊汗獨外溢須審其情勢而止之宜黃連湯此又於常法之外曲防其變者也大抵強壯人汗或多出猶不妨虛弱人則急宜斟酌耳夫疹之根由既悉則疹之變故宜參疹之情狀既明其疹之治法宜備大約發熱之時審知必是出疹急與疏散透肌固己但必明乎歲氣所屬辨乎時令所宜而後用之以配君臣佐使說所謂歲氣所屬者人中黃屬土甲己年為君黃岑屬金乙庚年為君黃柏屬水丙辛年為君黃連屬火戊癸年為君梔子黃屬木丁壬年為君既以其年所屬為君即以餘年所屬為臣而荊防蘇翹苦參牛蒡山豆根皆其佐也使也所謂時令攸宜者如溫暖時必用辛涼宜防風解毒湯暄熱時必用辛寒宜黃連解毒湯大寒時必用辛溫宜桂枝解毒湯時寒時暖必用辛平宜升麻解毒湯不得妄施汗下此即師韓飛霞修造五瘟丹之意出齊之後風邪之宣散已十去八九熱毒之末泄者正多急與清金降火清金知母石膏麥冬牛蒡花粉之屬降火岑連山梔連翹元參大青之屬而毒自解矣此即遵胥門施氏療治之法收沒之後則以滋陰養血為主而兼帶清涼昔人云麻疹出六腑先動陽分而後歸於陰經故當發熱必火在榮分煎熬以至血多虛耗又必內多實熱故須用養陰退陽之劑宜四物加黃連防風連翹凡一切燥熱升陽動氣者皆在禁例如參朮半夏等此即採支氏録本之遺斯為三大綱領治疹之總要也誠能按法治之寧慮其有變端乎而亦有不能免者在透發前或皮膚乾毛孔閉淹延難出是毒邪怫鬱於內也宜麻黃散或依歲氣時令用表散解毒藥仍不能出應再服前藥更用外治法宜胡荽酒之類如此三四次仍不出反見腹脹疼痛上氣喘急昏眩悶亂煩躁不安此必死可勿藥或發熱時多渴宜人參白虎湯緑豆燈心炒糯米湯等過於飲水定生水蓄之症水入肺必喘必咳宜葶藶丸水入脾必腫必脹必自利入胃必利必嘔噦俱宜二苓澤瀉湯水入心必驚必悸宜赤苓木通湯水入肝必脅痛宜芫花等水入腎與膀胱必小便不利宜車前子通草等務各以對經之藥宣泄五臟之水或咽喉腫痛不能飲食毒邪怫鬱激而上薰也宜甘桔湯加元參連翹牛蒡或咳嗽口乾心煩毒邪在心肺透發末盡也宜瀉白散加翹葛元參花粉以瀉肺導赤散加翹葛黃連竹葉以瀉心或發熱時吐利滯下毒邪內迫上則吐下則利甚則裡急後重而滯下也吐宜竹茹石膏自利宜豬苓湯滯下宜黃岑湯或初出時頻瀉稀水最為惡候但疹出稠密或色紫赤太甚者反不妨由毒邪鬱遏大腸惟瀉斯解宜平胃散加翹葛等逮疹發透收沒自然瀉止若既收仍瀉毒必末盡急須分利解毒宜平胃散加翹葛黃連木通牛蒡澤瀉萬萬不可止澀以致痞脹喘急便為不治之症凡此皆收沒以前之患所當於三大綱領外隨症調治者也至於疹後四大症其害尤為不小醫者更宜著急一曰疹後癆疹既收沒毒邪猶鬱於肌肉間晝夜發熱漸至發焦膚槁羸瘦如柴變成骨蒸癆瘵急須調治宜金花丸清火消毒加當歸連翹川芎蘆會使君子龍膽草等胃弱兼用胃苓湯遲則口鼻氣冷睡臥露睛手足厥冷搐制必至不救即末羸瘦而遍身壯熱瘛瘋煩躁實由陰虧血耗至餘毒入肝而傳於心故如此宜當歸養榮湯金花丸清火消毒湯黃連安神丸加朱砂棗仁以清其毒一曰疹後疳餘毒末盡陷入胃家忽發走馬疳牙根臭爛血出頰腫環口青黑久則腮穿齒落唇缺鼻壞急救勿緩內治以速清胃火為主宜金花丸清胃湯外治以散毒去腐為主宜文蛤散雄黃散如瘡色白者其胃己爛必死一曰疹後痢疹前曾作瀉痢調解末清至是變成休息痢日夜無度裡急後重餘毒流入大腸也不論赤白總應養血行氣宜黃岑湯說血和而痢自止氣行而後重除也然須分虛實實者不妨微利宜三黃湯虛者只可調和宜香連丸一曰疹後嗽氣喘息高連聲不止甚至咳血或嗆出飲食此毒歸於肺肺焦葉舉也名曰頓嗽宜麥冬清肺飲加連翹而或體實宜寧肺或神虛宜清肺飲亦當分別如胸高肩聳手愈頭搖口鼻出血面色青赤或活白或晦黯皆不可治而亦有肺氣極虛毒遏發喘不至嗆食咳血者不得泥乎肺熱專為解毒清肺也宜麥冬清肺飲倍加人參此四者皆為疹後壞病關乎生死切勿妄治而此四證之外容有燒熱不退者血虛血熱也只須滋陰補血其熱自除宜四物湯為主渴加麥冬犀角嗽加瓜蔞霜痰加貝母陳皮切忌參朮半夏有身熱不退嘔吐而煩者毒猶末盡留連於肺胃間也宜化斑湯有大便祕者餘火內結也宜於清火藥中少加大黃有泄瀉者積熱移於大腸也宜四苓散加岑連木通久則心傷脾或酌用木香砂仁訶子肉豆蔻有疹退熱除不能食者胃氣弱也宜四物湯加砂仁神麯或酌加地黃有疹後出入動作如常忽然心腹絞痛死者氣虛中惡也說因元氣虛弱或曾受疫癘之氣外雖無病內實虧損故一發而死有疹沒後三四日又出至五六次不止者由發熱時風寒侵襲邪鬱肌肉前雖藉藥發出終屬勉強故留連不散而屢發也宜照前治疹之法治之以上七症亦屬餘邪為患所當急治者然而疹類不一其源流形似處更不可不辨今人多曰麻斑癮疹大約相似不知麻為太陽經病其經感受深山邃谷毒風積熱因發為麻形如心經痘子一般頭不尖鋭較疹稍稀疏西北人常患之南方不多見斑則有陰陽之別陽斑乃少陽相火與風熱相搏之病如溫毒發斑冬溫夏熱發斑之類皆是其形琚腫如蚊蚤所嚙或成片如錦紋云霞宜大青湯化斑湯羚角散若傷寒發斑全由胃熱當從傷寒門治吐瀉發斑全由胃虛治法可補不可瀉可溫不可涼二者皆不在此例故本論不列方陰斑則如陰證發斑伏寒在下迫其無根失守之火聚於胸中熱上蒸肺所致宜麻桂芎芷羌芍蒼夏藿桔陳皮枳殼砂仁甘草生薑又如內傷寒物發斑先由傷暑次食生冷冰水並睡臥涼處內外皆寒逼暑火於外故色微紅或帶白與陽斑不同宜藿香正氣散多於暑月見之或嬰兒肌膚脆薄亦常有之若疹則脾家濕火鬱結復感外邪互煽烙肺肺熱挾痰遂生是症其形色已詳前文或有皮膚盡赤者為夾斑疹方已見前有根窩微種者為兼癮疹宜照歲氣時令加減用加減用藥癮者由脾家蓄熱更兼風濕故隱隱然不發胖無顆粒似腫非腫多發癢或不仁宜消風散以其隱見肌肉故曰癮以亦憎寒壯熱而發與疹相同故人皆混稱曰癮疹其實是二症也此外又有風疹由脾虛血熱感受風邪而作宜調中湯切不可專治風藥其形浮腫成片成塊愈搔愈盛又有怫疹即夏月痱子之極盛者其粒大如粟米皮膚盡赤多生項下夾窩內胯凡皮肉相貼處外科書謂之暑毒宜苦參湯洗若抓破皮易變成膿瘡宜鵝黃散撲之又有凍疹寒冬天地之氣閉塞交春東風發動其氣流散而東風襲入毛孔此惡氣即乘以入遂有形如魚子而色白者頭面胸腹手足不拘發見一處不至遍及一身極颯淅難忍周時收沒即無點痕宜消風散加減三者亦疹之流派也至如孕婦有出疹者由於內虛故腹中有胎易為熱毒所傷治宜安胎清熱使胎不動則疹亦易痊宜四物湯多加白朮砂仁黃連如胎氣上衝則已為毒所傷矣宜急用苧根艾葉濃煎湯磨檳榔濃汁急服之並多服四物湯為妙産婦亦有出疹者當血液大虧之後復得耗血損液之症又恐熱毒煎熬惡露乾結不行惟以敗毒清火與去瘀生新之劑相兼用之庶乎可療宜當歸川芎丹參玄參丹皮赤芍荊芥桔梗益母草嬰兒之疹有夾痘出者因毒氣壯盛擊動臟腑毒趨百竅血有餘而氣不足不能密護脈絡血遂夾毒外浮乘勢而與痘齊出也宜升麻葛根荊芥解毒湯加丹參赤芍當歸牛蒡使疹散去痘亦自出又有結痂後出疹者痘之餘毒末盡又加血熱故也宜犀角解毒湯嗟乎疹之關人性命若此果能醫治無失又自善保養自然安穩無事精神充足萬一事故難辭不免勞頓氣虛血弱致多不足之象急應補救宜十全大補湯加減然則操人生死之柄可勿兢兢詳慎以求無誤哉脈法金鏡録曰足冷不溫其脈洪要知總是斑疹候醫旨曰疹發之脈浮大而數右寸關更甚也疹子之原入門曰太古無痘周末秦初乃有之海藏曰㿀疹之為病皆由子在母腹中浸漬食母血蘊而成毒皆太陰濕土壅滯君相二火之所作也疹子形症正傳曰有色點而無顆粒者曰斑浮小而有顆粒者曰疹也又曰疹如粟米微紅隱隱皮膚不出作癢全無腫滿又曰麻子最小隱隱如麻子頂平軟不礙指耶有清水痘多挾疹同出麻亦多挾疹同出故曰痘疹麻疹陸南暘曰痘之發觸於天行時氣疹之發中於時氣風寒痘當從外解疹當從內解又曰麻疹多屬於肺故嗽而始出起而成粒勻圓而小陽氣從上故頭面愈多者為佳金鏡録曰心熱盛移於小腸故小便多黃而赤然小便之行由於肺氣之降下而輸化也若肺受火尅則失降下之令故小便短而澀當痘疹之時不必利水治當清金降氣用涼藥以泄其熱而小便自利矣疹子看法金鏡録曰凡看麻疹之法多於耳後項上腰眼裡先見也辨疑賦曰根窩若腫兮疹而兼癮皮膚加赤兮疹尤夾㿀似錦而明兮不藥而愈如煤而黑兮百無一痊疹子治法入門曰麻疹雜症與痘瘡略同但始終藥宜用清涼醫鑑曰麻疹當以蔥白湯飲之蔥白連須不拘多少煎取汁服其麻自出如渴只用蔥白湯以滋其渴使毛竅中常微汗潤澤可也過三日不沒內有實熱犀角地黃湯解之疹子輕重難治不治症金鏡録曰或熱或退五六日而後出者輕淡紅滋潤頭面勻淨而多者輕發透三日而漸沒者輕頭面不出者重紅紫暗燥者重咽喉腫痛不食者重冒風早沒者重移熱大腸而變者重黑暗乾活一出即沒者不治鼻煽口張目無神者不治鼻清糞黑者不治氣喘心前吸者難治疹後牙疳臭爛者不治入門曰麻疹不出而喘者死變成黑斑者死沒後餘毒內攻循衣摸床譫語神昏者死治疹子方五十二蘇葛湯起初紫蘇葛根甘草赤芍陳皮砂仁前胡枳殼生薑蔥白加味升麻湯又升麻甘草元參柴胡赤芍條岑葛根獨活此麻疹表藥鄰家己有出者服一二帖亦可非如上蘇葛湯專為初熱見點發表之方也四物湯用熱川芎當歸生地芍藥羚角散毒邪內陷羚羊角甘草防風麥冬元參知母黃岑牛蒡子大青湯又大青木通元參桔梗知母山梔升麻石膏水煎調路東黃土末二三錢服之如大便結閉口乾腹脹身熱煩躁者此熱祕也加酒炒大黃無大青以青黛代之元參解毒湯又元參葛根山梔黃岑桔梗甘草生地荊芥入茅根京墨汁服犀角解毒湯胃爛犀角連翹桔梗生地當歸薄荷防風黃岑甘草赤芍牛蒡荊芥穗六一散色紫黑滑石甘草冬日溫水下夏日新汲水下十全大補湯補氣血人參白芍茯苓熟地黃耆白朮炙甘草肉桂川芎當歸糯米麻黃散出遲蜜酒炒麻黃焙蟬退酒炒升麻炒牛蒡子消毒飲又防風荊芥甘草炒牛蒡子薑茅花湯止衄茅花歸尾生地生梔元參黃岑調百草霜服升麻葛根湯表散升麻葛根赤芍甘草薑蔥白湯又連鬚蔥白黃連湯止汗黃連黃柏黃岑黃耆生地歸身麥冬浮麥調蒲扇灰服防風解毒湯辛涼防風甘草荊芥連翹薄荷枳殼石膏知母桔梗木通淡竹葉牛蒡子黃連解毒湯辛寒黃連防風元參甘草桔梗黃岑木通知母荊芥石膏大青山梔酒黃柏桂枝解毒湯辛溫桂枝甘草人參赤芍防風荊芥川芎羌活桔梗牛蒡酒麻黃升麻解毒湯辛平升麻桔梗荊芥連翹防風羌活赤芍甘草淡竹葉牛蒡子胡荽酒外治滾酒入胡荽略煎三四沸合定勿泄氣候溫遠遠噴之從項至足勿噴頭面人參白虎湯熱渴人參知母石膏花粉葛根麥冬竹葉粳米緑豆燈心炒糯米湯又緑豆一酒杯燈心三十根炒糯米一撮葶藶丸喘咳炒葶藶煨杏仁酒防己炒萊蔔子炒白牽牛茯苓食後服甘桔湯咽腫痛甘草桔梗若加牛蒡連翹射乾升麻山梔黃連黃岑名牛蒡甘桔湯瀉白散瀉肺蜜桑皮地骨皮炒黃岑酒黃連馬兜鈴淡竹葉桔梗山梔燈心大青元參連翹導赤散瀉心生地木通甘草淡竹葉竹茹石膏湯吐多竹茹石膏陳皮半夏茯苓甘草豬苓湯自利豬苓茯苓滑石澤瀉升麻甘草黃連黃岑湯滯下平胃散邪遏大腸蒼朮厚朴陳皮甘草薑棗金花丸疹癆黃連黃柏黃岑大黃水泛丸去大黃加山梔名梔子金花丸清火消毒湯又黃岑黃連山梔鬱金龍膽草雄黃地骨皮燈心胃苓湯胃弱茯苓豬苓白朮澤瀉蒼朮陳皮甘草薑厚朴官桂少部當歸養榮湯疹癆當歸山梔川芎生地麥冬甘草竹葉燈心便結少加大黃黃連安神丸又黃連當歸龍膽草全蠍去毒石菖蒲茯神蒸餅和豬心血丸朱砂為衣用燈心湯下清胃湯疹疳升麻生地黃連當歸丹皮文蛤散又雄黃活礬各五分文蛤一錢蠶退紙灰三分米泔洗瘡敷日三四次以平為度雄黃散又雄黃一錢黃柏二錢麝香五分艾葉湯洗敷以平為度三黃湯疹痢炒黃連炒黃岑蒸大黃以微利為度香連丸又黃連一兩用吳萸五錢同炒去萸木香三錢忌火醅糊丸空心米湯下麥冬清肺飲疹嗽麥冬人參甘草赤芍桔梗陳皮檳榔赤苓寧肺湯又黃岑桑皮貝母知母枇杷葉杏仁花粉天冬沙參化斑湯毒留肺胃人參甘草知母石膏桔梗連翹升麻竹葉炒牛蒡地骨皮四苓散熱移大腸茯苓豬苓澤瀉炙甘草蒼朮治新瀉熱瀉消風散脾熱風濕茯苓蟬退川芎殭蠶人參藿香防風荊芥甘草茶酒煎調中湯風疹藿香枳實砂仁甘草蒼朮茯苓陳皮青皮半夏厚朴苦參湯痱疹苦參四兩菖蒲二兩水五碗煎數沸添水二碗說片時臨洗入豬膽汁四五個三五次無不愈鵝黃散又緑豆粉一兩滑石五錢黃柏三錢輕粉二錢搽之即愈荊芥解毒湯疹夾痘荊芥赤芍牛蒡連翹元參桔梗防風前胡木通歸尾甘草梢天花粉養血益榮湯色白赤芍人參甘草酒當歸酒炒紅花藿香正氣散傷寒發斑藿香白朮茯苓半夏陳皮桔梗白芷甘草薑厚朴紫蘇大腹皮犀角地黃湯解熱犀角生地黃岑黃連大黃附録石氏治疹經驗良方十五透肌散治疹初出隱隱淹在肌肉內以出即沒者乃癮疹也炒牛蒡二錢半葛根二錢荊芥錢二分蟬退三十個酒一小杯水一大杯半煎六分溫服一次本方加羌活五分二次本方加紫蘇枳殼六分三次本方加牛膝五分清心湯治疹出痕如朱點或赤或紫煩躁不寧者乃疹也黃連連翹生地各錢半山梔二錢黃岑一錢歸尾三錢黃柏丹皮甘草各五分赤芍八分甘菊七分燈心三分川芎六分溫服如衄血即隨血解和解散治疹已出遍身形如蠶種色黑黯皮肉僵硬此十死一生症也急用後二方麻黃去節取頭末緑豆取生粉隔紙焙熟各七分共為細末又用新蒲公英二兩乾者七分條芩生地各一錢煎好調前二味末春冬溫服夏秋涼服兼用下外治方外治方仰天皮二斤即凹地上卷皮也嫩柳皮半斤星星草四兩蟬退二百個水十杯煎三沸去渣乘熱氣燻洗遍體黑疹變為鮮色十有九生之妙清肺解毒湯治疹收之後胸脹喘急咳嗽悶亂狂言譫語手足動搖此餘毒入肺也黃芩陳皮各一錢麥冬二錢貝母一錢半赤苓七分蜜桑皮甘草各五分酒炒黃連七分蒲公英三錢煎好再用大黃三錢切片開水泡一時澄汁一小杯沖服斂肺湯治疹收之後喘急悶亂頭折眼吊胸膛高陷角弓反張目睛直視唇白面黃口鼻歪斜名曰肺氣耗散正氣不歸原也急以此方治之緩則無救如唇反而黑紫鼻眼俱黑必死北五味三錢黃芩二錢麥冬三錢甘草節五分小靈丹治疹後餘毒壅遏在咽喉腫痛咽物不下或結一切餘毒牙齒破爛百官硼二錢朴硝三錢辰砂錢半乳香去油沒藥去油各三分吹敷俱可天緑散治疹後餘毒壅遏在眼皰爛如癬或小兒木耳等瘡皆效銅緑一兩研極細末黑透熟天茄打汁量末調稀糊於黑碗內上用黑碗說之鹽泥封固文火煨二炷香取出丸緑豆大或用散每五厘入乳汁小半酒杯再研如茶湯以雞翎蘸敷二三次即愈金黃散治疹後重舌並兩頰骨疙瘩硼砂三錢雄黃錢半朱砂七分鮮薄荷打汁調敷數次愈鐵箍散治疹後餘毒流注肌肉之間結成癰疽腫痛白芨白蘞各一兩黃柏二兩山豆根連翹黃芩乳香沒藥各五錢川烏六錢地骨皮七錢射乾三錢共為末茶酒調敷清咽湯治疹後熱毒在胃攻衝喉啞疼痛日夜飲水不止升麻元參射干連翹山梔黃芩石膏歸尾麥冬生地薄荷大黃金銀花甘草節一匙金治疹後風並痘脫痂風一服立效白花蛇去骨刺三分炒褐色人指甲一分半炒黃色共為末再用透骨草麻黃各三錢入水酒各半杯煎三沸去渣調上二味末服之說臥微汗即愈如兒小分三服治水痘方凡水痘初出每痘根周圍紫硬頂陷色黑令兒啼多煩躁蒸熱名凹痘疔新人屎尖七個瓦上焙如褐色研細可重一二分酒調下遍身臭汗即效又方治水痘收後餘熱不退咳嗽微喘多睡眼澀多眵蒲公英二兩水煎服一帖即愈又方治水痘收後心胸脹脅滿食即嘔吐久不治結為痰痞者大黃一錢牙皂皮硝火硝各五分共為末水丸黍米大三歲服六十丸十歲一百丸毒自與積俱化而愈如兒小不能服丸蜜調末服亦可
