效病深者再服必候惡物下盡為度此方專治蟲積所下之蟲曰穿心蟲曰血鱉蟲曰傳尸蟲曰肺蟲曰疾心蟲曰馬尾蟲曰積血蟲曰細蟲曰長蟲寸白蟲其狀不一或作五色或如魚凍此乃王經略赴廣東偶染山岡瘴氣肚腹脹滿百藥無效遇一道人付此藥服之下蟲一條如蛇長三寸餘病乃愈因乞其方溫白丸蟲積炮川烏二兩半吳萸桔梗柴胡菖蒲紫菀黃連炮薑肉桂心川椒巴霜赤苓炙皂莢厚朴人參各五錢蜜丸薑湯下三丸或五丸至七丸又名萬病紫菀丸此方通治積聚癥瘕痃癖黃疸鼓脹十種水氣八種痞塞五種淋疾九種心痛遠年瘧疾及七十二種風三十六種尸疰癲狂邪祟一切腹中諸疾兼治婦人腹中積聚有似懷孕羸瘦困慮或歌哭如邪祟服此自愈久病服之則皆瀉出蟲蛇惡膿之物桃仁承氣湯血積桃仁大黃芒硝桂枝甘草三棱煎又三棱蓬朮各四兩芫花一兩用醋五盞磁器內浸之封口文火煅令乾取出棱朮將芫花以餘醋炒令微焦共焙乾為末醋糊丸薑汁湯下十五丸一方三棱蓬朮各二兩青皮半夏麥芽各一兩醋六升同煮乾焙為末製法服法同上此方兼治食瘕酒癖氣塊竹瀝化痰丸痰積芫花醋浸一宿炒黑甘遂面裹煨熟水浸半日曬乾大戟長流水煮曬乾各五錢大黃濕紙包煨再用酒浸炒熟一兩黃柏炒二兩粥丸麻子大此名小胃丹如單服此每十丸臨臥津唾咽下能取上隔濕痰熱積下可利腸胃之痰惟胃虛少食者忌用若用小胃丹一料加南星半夏俱用白礬皂角薑汁水煮十五次各三兩半蒼朮用米泔白礬皂角水浸一宿炒二兩桃仁杏仁俱用白礬水浸半日去皮尖炒紅花酒蒸陳皮枳實並用白礬水泡半日炒白朮土炒白芥子炒各一兩竹瀝薑汁煮神曲糊丸緑豆大每服二三十丸薑湯下故名竹瀝化痰丸又名加味小胃丹又名導痰小胃丹此方專治風痰痞積眩暈喉痹癱瘓不語腹中痞塊等症神效竹瀝達痰丸又薑半夏去白陳皮白朮微炒大黃酒浸蒸曬乾茯苓酒黃芩各二兩炙甘草人參各兩半青礞石一兩同焰硝一兩火煅金色沉香五錢以竹瀝一大碗半薑汁三匙拌勻曬乾如此五六度因以竹瀝薑汁和丸小豆大每百丸臨臥米飲下一名竹瀝運痰丸此方能運痰從大便出不損元氣丹溪曰痰在四肢非竹瀝不開此藥是也開氣消痰湯又桔梗便香附薑蠶各一錢陳皮片芩枳殼各七分前胡半夏枳實羌活荊芥檳榔射乾威靈仙各五分木香甘草各三分薑三此方專治胸胃咽門窄狹如線疼痛及手足俱有核如胡桃者十將軍丸瘧積砂仁檳榔常山草果各二兩三棱蓬朮青皮陳皮烏梅半夏各一兩先將常山草果酒醋各二碗浸一宿後入八味同浸至晚煮乾為末酒醋各半打糊丸白湯下三四十丸日二服服至八兩即除根鱉甲丸又醋鱉甲一兩三棱蓬朮香附青皮桃仁紅花神曲麥芽海粉各五錢醋糊丸白湯下三五十丸本方加芎歸赤芍治夜發瘧名陰瘧丸消癖丸又芫花炒朱砂等分蜜丸每十丸棗湯下去癖須用芫花破水之劑此方專治咳瘧彌年經汗吐下榮虧衛損邪氣伏藏脅間結為瘧癖腹脅堅痛此三方治瘧母與瘧疾條參看附子理中湯寒積附子人參白朮炮薑甘草沈氏棉子丸又棉子八兩升麻炮薑各四錢白朮一兩半夏八錢砂糖炒煬和丸每服二錢米湯空心下服至半月部當有寒積如稀痰一般隨大便下以下盡為度即勿服再服健脾溫中暖腹之劑此餘自製方也神效清心湯熱積甘草錢七分連翹梔子酒蒸大黃薄荷黃芩黃連各七分朴硝五分竹葉七片蜜一二匙地骨皮散又石膏二錢黃芩知母生地各一錢羌活七分半赤苓地骨皮各五分越鞠保和丸預解鬱白朮三兩查肉二兩便香附蒼朮川芎神曲陳皮半夏茯苓枳實酒黃連酒當歸山梔萊蔔子連翹木香各五錢薑汁糊丸薑湯下五十丸此方開鬱行氣消積散熱加味越鞠丸又薑蒼朮川芎便香附神曲山梔各四兩陳皮白朮黃芩各兩半查肉一兩糊丸白湯下五六十丸大七氣丸初積三棱蓬朮青皮陳皮桔梗藿香益智肉香附肉桂甘草各一錢一方加大黃檳榔各一錢治諸般痞積面色黃萎四肢無力皆由內有蟲積或好食生米壁土茶炭等物只一服除根水煎露一宿空心溫服不得些少飲食不然則藥力減而蟲積不行矣服後心痛當下惡物如魚凍蟲鱉至日午下積盡方用溫粥止之木香檳榔丸久積大黃四兩黑丑頭末黃芩各二兩木香檳榔黃連當歸枳殼便香附青皮陳皮蓬朮黃柏各一兩水泛丸溫水下五六十丸通元二八丹又黃連八兩芍藥當歸生地烏梅各五錢雄豬肚一個入藥末於內線縫鋪韭菜二斤於鍋內蒸一日以藥熟為度取出搗丸空心薑湯下七十丸或瀉一二次以粥補之木香枳殼丸總治黑丑頭末微炒大黃各二兩茯苓白朮厚朴半夏的人參木香青皮陳皮三棱蓬朮檳榔神曲麥芽各一兩乾薑枳實各五錢薑汁糊丸薑湯下七十丸凡人有積病則氣滯而餒此方攻補兼施真得古人養正積自除之理三聖膏外貼風化石灰半斤為末瓦器炒令淡紅色提出候熱稍減次下大黃末一兩就爐外炒候熱減再入桂心末五錢略炒入米醋熬成膏厚紅色攤貼琥珀膏又大黃朴硝各一兩為末大蒜搗膏和勻作片貼之一方加麝香五分名硝黃膏貼痞膏又水紅花子二錢大黃朴硝山梔石灰各一錢酒酵雞子大一塊共搗成膏用布攤貼塊上再用湯瓶尉手帕勒之三日後揭起肉黑如墨是其效也握藥丸握藥巴豆乾薑良薑白芥子硫黃甘遂檳榔等分飯丸如中指大清早先以川椒湯洗手麻油塗手掌中握藥一圓少時即瀉欲止瀉以冷水洗手治息積病方四化氣湯氣鬱蓬朮乾薑青皮陳皮丁香茴香炙甘草各五錢肉桂木香各二錢半胡椒沉香各一錢一分每末二錢生薑蘇葉鹽少部煎湯下木香調氣散又烏藥香附枳殼青皮陳皮厚朴川芎蒼朮各一錢木香砂仁各五分肉桂甘草各三分薑三片磨積丸虛氣胡椒一百五十粒全蠍十個木香二錢半粟米飯丸橘皮湯下十五丸萬病丸又芍藥川椒肉桂川芎乾薑防風巴霜當歸犀角桔梗赤苓人參黃芩黃連桑皮蒲黃前胡大戟葶藶麝香細辛雄黃朱砂紫菀醋芫花醋淬禹餘糧研水飛甘遂牛黃各一兩蜈蚣十二節去頭足炙芫青二十八個糯米同炒黃為度云翅足蜥蜴去頭尾足炙四寸蜜丸溫水或薑湯下三丸以吐利為度此方專治七種癖塊八種痞病五種癲癇十種疰忤七種飛尸十二種蟲毒五種黃疽十二種瘧疾十種水病八種大風十二種濕痹及積聚脹滿及久遠心腹痛疳蛔寸白諸蟲久積痰飲消瘦疲困或婦人子臟中瘀血凝滯因而斷産服此藥以三丸為一劑不過二劑其病悉除說無窮盡故名為萬病丸
  hash: sha256:0043e5dfe40f22b7d639b192ce024a64e00ac825648ecba70350ca872ec041d5
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3er109_jc_014-d16.h1s1}
  - {type: 'tls:div-start', offset: 3, content: '', id: KR3er109_jc_014-d16d2, level: 2, head_text: 寒病源流惡寒發熱痼冷寒厥暴亡}
  - {type: 'tls:head', offset: 3, content: '', id: KR3er109_jc_014-d16.d2.h1s1}
  - {type: 'tls:div-start', offset: 1323, content: '', id: KR3er109_jc_014-d16.d2d4, level: 3, head_text: 惡寒發熱陰陽二氣相乘勝病也成無己明理論云}
  - {type: 'tls:head', offset: 1323, content: '', id: KR3er109_jc_014-d16.d2.d4.h1s1}
  - {type: 'tls:div-end', offset: 2668, content: '', id: KR3er109_jc_014-d16.d2d4}
  - {type: 'tls:div-start', offset: 2668, content: '', id: KR3er109_jc_014-d16.d2d5, level: 3, head_text: 痼冷寒邪久伏病也凡人或冒雨雪或涉冰淵}
  - {type: 'tls:head', offset: 2668, content: '', id: KR3er109_jc_014-d16.d2.d5.h1s1}
  - {type: 'tls:div-end', offset: 3212, content: '', id: KR3er109_jc_014-d16.d2d5}
  - {type: 'tls:div-start', offset: 3212, content: '', id: KR3er109_jc_014-d16.d2d6, level: 3, head_text: 寒厥暴亡亦積寒病也}
  - {type: 'tls:head', offset: 3212, content: '', id: KR3er109_jc_014-d16.d2.d6.h1s1}
  - {type: 'tls:div-end', offset: 5981, content: '', id: KR3er109_jc_014-d16.d2d6}
  - {type: 'tls:div-end', offset: 5981, content: '', id: KR3er109_jc_014-d16d2}
  - {type: 'tls:div-start', offset: 5981, content: '', id: KR3er109_jc_014-d16d3, level: 2, head_text: 積聚癥瘕痃癖痞源流息積病}
  - {type: 'tls:head', offset: 5981, content: '', id: KR3er109_jc_014-d16.d3.h1s1}
  - {type: 'tls:div-start', offset: 11681, content: '', id: KR3er109_jc_014-d16.d3d4, level: 3, head_text: 息積氣分病也}
  - {type: 'tls:head', offset: 11681, content: '', id: KR3er109_jc_014-d16.d3.d4.h1s1}
