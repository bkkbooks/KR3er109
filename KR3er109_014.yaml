body:
  text: 卷十四寒病源流惡寒發熱痼冷寒厥暴亡經曰諸病上下所出水液澄徹清冷癥瘕㿗疝堅痞腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒經云然者以足太陽寒水乃腎與膀胱之氣腎陽既虛則寒水之氣益泛而一值天地殺厲之氣則兩相感召而諸寒病生焉是寒之為病未有不由於陽虛者也夫寒病莫大於傷寒亦莫險於傷寒以其為生死攸關也餘別著傷寒論綱目故茲不贅及外此則有感寒症亦頭疼亦發熱亦惡寒探其舌本必從喉嚨內乾出於外多兼煩躁不煩躁即感寒之輕者又或不頭疼而發熱不發熱而頭疼雖渴而不欲引飲至夜或偶得寐遇食不好亦不惡居處雖若尪怯而神氣安靜凡若此者皆屬感寒之候與傷寒不同宜解表散寒宜桂枝乾薑麻黃柴胡前胡川芎蔥白升麻紫蘇葛根羌活獨活生薑細辛吳萸隨症選用又宜沈氏葛補湯又有中寒症身體強直口噤不語四肢戰掉卒然眩暈身無汗者此寒毒所中也其脈必沉而細或緊澀或陰陽俱盛其為症定當無汗有汗反不治宜薑附湯麻黃附子湯或有眩暈口噤昏迷肢冷身不熱脈遲緊者宜附子理中湯若肢冷腹絞痛唇青宜用灸法宜以半夏皂角麝香各一分半為末填臍中生薑切薄片貼之放艾火於上灸之又有雜中寒或乘冷多食生冷致頭疼身熱項背拘急嘔吐腹痛者卻不似真中寒之猛急宜五積散若感寒脈浮亦宜服之有因色欲後受寒手足冷臍腹痛者宜健陽丹有急陰病腹痛肢冷甲青者宜太乙還元丹要皆寒之為病也脈法脈經曰緊脈為寒又曰弦緊為寒邪脈訣曰傷寒有五脈非一端陰陽俱盛緊澀者寒陽浮而滑陰濡而弱此名傷風勿用寒藥陽濡而弱陰小而急此非風寒乃濕溫脈陽脈浮滑陰脈濡弱或遇於風變成風溫陽脈洪數陰脈實大更遇溫熱變成溫毒陽脈濡弱陰脈弦緊更遇濕氣變為濕溫陰陽俱盛重感於寒變為溫瘧同病異名陰陽俱盛病熱之極浮之而滑沉之散澀回春曰中寒緊澀陰陽俱盛法當無汗不汗傷命醫鑑曰中寒之脈虛而微細寒病原由症治東垣曰仲景論傷寒矣未及手中寒前人冶冒大寒而昏中者用附子理中湯其議藥則得之然曰傷曰中未有議其異同者夫傷寒有即病有不即病必大發熱病邪循經而行以漸而深中寒則倉卒感受其病即發而暴一身受邪難分經絡無熱可發溫補自解此氣太虛也不急治則死得效曰寒溫不節將理失宜乍暖脫衣甚熱飲冷坐臥當風居處暴露衝冒霜雪凌晨朝起呼吸冷氣久睛暴暖忽變陰寒久雨積寒致生陰濕如此之候皆為邪厲侵傷肌膚入於腠理使人身體沉重泪出氣壅胸膈凝滯肢節酸疼項背拘急頭目不清鼻塞聲重飲食不入凡此之症若不便行解利伏留經絡傳變無已此不過四時感寒若傳變必至成傷寒矣又曰中寒則口噤四肢強直卒然暈倒局方曰尋常感冒有表症宜羌活衝和湯防風衝和湯芎芷香蘇散寒毒入裡吐利者宜藿香正氣散挾食停痰宜人參養胃湯時令感冒宜升麻葛根湯又曰大抵感冒古人不敢輕發汗者正由麻黃能開腠理用或不得其宜則導泄真氣因而致虛變生他症若人參養胃湯乃和平之劑止能溫中解表而已不致妄擾也丹溪曰雜病與傷寒相類者極多凡有感冒輕症不可便認為傷寒而妄治之其或可者說亦因其不敢放肆多用和解平和之藥散之爾醫鑑曰中寒者寒邪直中三陰卒然昏不省人口噤四肢強直拘急疼痛不急治死在旦夕先用熱酒薑汁各半盞灌服次用回陽救急湯附子理中湯朮附湯回陽湯又曰中寒雖燥熱煩渴可煎附子理中湯浸水中冷服之不可熱服又曰凡感冒風寒通謂之四時傷寒宜衝和散正氣散沃雪湯十味芎蘇散入門曰冷極唇青厥逆無脈陰囊縮者急用蔥尉法吳茱萸尉法並艾灸臍中氣海關元各三五十壯而手足不溫者死惡寒發熱陰陽二氣相乘勝病也成無己明理論云寒邪為陰熱邪為陽裡分為陰表分為陽邪之客於表也為寒邪與陽爭則為寒矣邪之入於裡也為熱邪與陰爭則為熱矣若邪在半表半裡之間外與陽爭而為寒內與陰爭而為熱表裡之不拘內外之無定由是寒熱且往且來日有至而三五發甚者十數發也若以陰陽二氣相勝陽不足則先寒後熱陰不足則先熱後寒此則雜病陰陽自相勝然也無己之論良為精切餘竊思焉惡寒發熱二症當分言之而後合參之何則惡寒者寒邪客於榮衛故灑淅而然也說寒之所客雖不見風而亦惡寒雖居暖室無寒氣相襲亦不欲去衣被故無他症但覺惡寒陰勝也宜理中湯或嘔或心下痞而惡寒中寒也宜五苓散汗後惡寒陽微也宜芍藥附子甘草湯下症悉具而微惡寒表未解也宜先用羌活衝和湯解表後用承氣湯攻裡下後渴而惡寒陽邪內搏也宜白虎湯加荊防一身不惡寒但背惡寒表未解也宜葛根湯腹滿背惡寒邪入裡也宜小承氣湯汗後不解反背惡寒虛也宜芍藥甘草附子湯口中和背惡寒陰氣盛也宜附子湯口乾燥心煩背微惡寒陽氣內陷也宜人參白虎湯身無他症但面惡寒胃虛寒也宜升麻附子湯身無他症但足膝惡寒下元衰也宜菟絲子丸發熱者邪氣之入不能宣泄故鬱而為熱也其熱有表有裡有陰有陽如翕翕而熱表熱也是風寒客於皮膚怫鬱於中表熱而裡不熱也無汗脈浮緊宜發表宜參蘇飲去人參有汗脈浮緩宜解肌宜柴葛解肌湯蒸蒸而熱裡熱也是陽邪入陷於陰中裡熱而表不熱也脈沉實而渴者宜下之宜大柴胡湯若表裡未罷邪氣傳裡表裡俱熱脈必弦數宜和解宜小柴胡湯如脈沉反發熱是未離於表也宜麻黃附子細辛湯發熱煩渴小便赤脈浮大是為表裡發見也宜五苓散若陰陽俱虛熱不止若汗下後復大熱脈躁亂若下利熱不止皆死症以上皆分言之者又有發熱惡寒一齊俱作屬乎陽也宜羌活衝和湯下後不渴發熱而渴又惡寒陰陽鬱而未和也宜白虎湯背惡寒而復潮熱陽邪實於胃中且有燥屎也宜柴胡加桂湯背惡寒又潮熱腹滿胃中實熱也宜小承氣湯發熱惡寒兼之頭痛脊強脈浮緊邢入太陽表症也宜麻黃杏仁飲汗後七八日不解表裡俱熱時時惡風惡寒大渴舌乾燥而煩陰虛陽鬱未散也宜人參白虎湯以上皆可合參之者然則惡寒發熱見於雜病者奚可混於傷寒也哉惡寒發熱原由症治經曰人傷於寒而傳為熱何也曰夫寒盛則生熱也寒氣外凝陽氣內鬱腠理堅致六府閉封致則氣不宣通封則濕氣內結中外相搏寒盛熱生故人傷於寒轉而為熱也汗之而愈則外凝內鬱之理可知矣斯乃雜病數日者也活人書曰惡寒者不當風而自憎寒惡風者必當風而後憎寒本事方曰發熱惡寒近似傷寒者有五種脈浮而緊發熱惡寒者傷寒也脈浮而數發熱惡寒或有痛處是欲作癰疽也脈浮而澀發熱惡寒或胸膈嘔吐此傷食也脈浮而滑發熱惡寒或頭眩嘔吐是風痰也脈浮而弦發熱惡寒或欲思飲食此欲作瘧疾也繆仲淳曰凡肌熱躁熱困渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無力此血虛發熱也得於飢困勞役像白虎症但脈不長實為異耳若誤服白虎湯即死宜用歸身酒洗二錢黃芪蜜炙一兩日二服又曰脾勞發熱者有蟲在脾中為病令人好嘔也取東行茱萸根大者一尺大椿子八升橘皮二兩酒一斗浸一宿微火薄暖之絞去渣平旦空腹服一升取蟲下或死或半爛或下黃汁凡作藥時切忌言語又曰肺熱身如火燎煩躁引飲而晝盛者氣分熱也宜黃芩一兩水煎頓服以瀉肺經氣分之火次日身熱盡退而痰嗽皆愈又曰心經實熱用黃連七錢水一盞半煎一盞食遠溫服小兒減之名瀉心湯又曰三焦積熱用元參大黃黃連各一兩蜜丸每三四十丸白湯下小兒丸粟米大又曰膈上煩熱多渴滑石末二兩煎水去渣入粳米煮粥食痼冷寒邪久伏病也凡人或冒雨雪或涉冰淵或晨行曠野或夜深露坐或衣被一時不及或飲食耐冷強吞而一股寒冷之邪自外入裡又一時不即透發以致輾轉深陷或伏於經絡或伏於臟腑及其發也或腹痛或遍身肢節拘急痛宜附子理中湯或身痛腹痛兼下利清谷惡寒不汗四肢厥冷宜四逆湯或寒入臟腑四逆不溫或咳或悸或小便不利或腹痛或泄利下重宜四逆湯或臍腹冷疼口吐清水大便自利足脛寒而逆宜加減白通湯或因久寒痼冷吐利日久身冷脈微宜金液丹或心腹冷痛臟腑虛滑既吐又瀉脈微欲絶宜至聖來復丹或寒冷之邪伏於太陽筋惕肉瞤振振欲劈地氣寒惡寒宜真武湯或寒冷之邪伏於陽明心胸中大寒痛嘔不能飲食腹中寒氣上衝皮高起痛不可觸近宜大建中湯或寒冷之邪伏於少陽口苦耳聾胸滿脅痛乾嘔不能食宜小柴胡湯或寒冷之邪伏於太陰脈沉無力腹中急痛吐嘔糞溏或厥冷拘急或結胸吐蛔宜理中湯或寒冷之邪伏於厥陰脈細欲絶手足厥冷乾嘔吐涎頭痛宜當歸四逆湯加吳萸生薑肝邪疝氣牽引臍腹疼痛宜天台烏藥散或寒冷之邪優於少陰下利厥逆無脈乾嘔而煩宜白通加人尿豬膽汁湯腹痛四肢沉重痛下利小便不利宜真武湯或煩躁欲死宜吳茱萸湯或五更泄瀉宜四神丸或陰疝疼痛宜導氣湯痼冷之為患其款類紛繁若此茍非詳求審察奚自治之哉痼冷症治醫鑑曰痼冷者謂痼久而冷也痼者固也冷者寒之甚也綱目曰臟腑之中停寒不散謂之沉寒積冷不解謂之痼冷宜用代灸塗臍膏寒厥暴亡亦積寒病也與中寒異說中寒之寒非盡積久隨中隨發寒厥之寒乃由久伏寒邪於內而復有新寒以觸之遂厥而暴亡故其症狀雖皆口噤四肢強直昏不知人而其原實一為即發之病一為久而觸發之病此其原異且發之之時中寒則卒然僵朴人不及防寒厥則先四末逆冷而後昏冒強直其間少需時候此其病作亦異且中寒倉卒間一身受邪難分經絡寒厥則邪之所積早入臟腑內陷已深此其病所自發又異宜回陽救急湯附子理中湯然則寒厥暴亡四字謂其因寒致厥而後暴亡非如中寒中暑中惡中氣等卒中而亡之暴亡意也每一病古人立一名夫豈徒哉夫豈徒哉寒厥症治類聚曰一婦人病傷寒暴亡脈絶有一道人見之曰是寒厥耳不死也令人速掘地作坑以薪炭燒之俟極暖施薦覆坑舁病人臥其上厚被覆之少頃大汗沾衣即蘇鏊按凡患寒厥者必先行此法令其蘇然後以藥與服非若中風等病口噤不語難進湯藥可用開關法也治寒病方二十一沈氏葛朴湯感寒葛根厚朴枳殼甘菊藿梗神曲秦艽各錢半加桑枝一尺此金鏊自製方也凡遇四時感受寒邪頭疼項強身熱體痛者以此治之無不神效如有風加荊芥薄荷有濕加茯苓豬苓有痰加半夏廣皮有熱加黃芩丹皮大熱加花粉石膏濕火加黑山梔澤瀉食重加蔔子山楂雖兼病甚多不能盡為立法神而明之在乎臨時酌劑耳薑附湯中寒乾薑附子等分麻黃附子湯又麻黃附子人參白朮炙甘草乾薑等分附子理中湯又附子乾薑人參白朮炙甘草五積散類中寒白芷當歸茯苓半夏白芍川芎桔梗炙甘草枳殼麻黃陳皮桂枝乾薑厚朴蒼朮薑蔥健陽丹房寒胡椒十五粒母丁香十粒黃丹一錢生飢三分醋調塗臍被說出汗自效太乙還元丹急陰病人參白朮炮薑附子半夏陳皮各一錢白蔻仁沉香丁香茯苓各八分神曲六分薑三棗二鹽少部熱服臍上用炒蔥熱貼冷則易之羌活衝和湯感冒羌活川芎生地蒼朮細辛甘草白芷防風黃芩此方專治春夏秋感冒風寒惡寒發熱頭痛項強或無汗或有汗以代桂枝麻黃青龍各半湯治太陽經表熱之神藥也此藥獨治四時風寒春可治溫夏可治熱秋可治濕並治雜病亦有神也防風衝和湯又防風羌活各錢半白朮川芎白芷生地黃芩各一錢細辛甘草各五分薑三蔥白二一名加減衝和湯芎芷香蘇散又香附蘇葉各二錢蒼朮錢半陳皮川芎白芷各一錢甘草五分薑棗藿香正氣散寒毒大腹皮紫蘇甘草桔梗陳皮茯苓白朮厚朴半夏曲白芷薑三棗二人參養胃湯痰食蒼朮錢半陳皮厚朴半夏各錢二分半茯苓藿香各一錢人參炙甘草草果各五分薑三棗二烏梅一煎服微汗出自愈若有餘熱以參蘇飲調理此方兼治傷寒陰症及外感風寒內傷生冷憎寒壯熱頭痛身疼升麻葛根湯時令葛根二錢白芍升麻甘草各一錢薑二蔥二此方兼治春溫回陽救急湯中寒人參白朮茯苓半夏陳皮乾薑附子肉桂炙草五味子各一錢薑七片此方兼治傷寒陰症及陰毒四肢厥冷脈沉細唇青面白朮附湯又白朮三錢炙甘草錢半附子一錢薑十片水煎調蘇合丸服之亦可回陽湯又智仁青皮各二錢生附子生川烏各一錢炮薑五分薑十片棗二枚衝和散感寒蒼朮四錢荊芥二錢甘草一錢沃雪湯又蒼朮三錢厚朴錢半川芎當歸防風白芍陳皮葛根甘草各七分此方解利四時傷寒以此溫和表裡通順陰陽大效十味芎蘇散又川芎錢半半夏錢二分赤苓紫蘇葉柴胡葛根各一錢陳皮枳殼甘草各七分桔梗五分薑三棗二此方兼治濕熱瘟疫蔥尉法中寒連根蔥白切小麥麩各三升鹽二升水和勻分二包炒令極熱絹包互換尉臍上冷則用水拌濕更炒尉之吳茱萸尉法又吳茱萸二升炒熱分二包互尉治惡寒發熱方十九理中湯陰勝人參白朮甘草乾薑五苓散中寒肉桂白朮茯苓豬苓澤瀉芍藥附子甘草湯陽微白芍附子炙甘草羌活衝和湯表未解羌活防風川芎白芷製蒼朮細辛甘草生地黃芩大承氣湯又大黃芒硝厚朴枳實白虎湯陽邪石膏知母甘草粳米葛根湯表邪葛根麻黃桂枝白芍炙草薑棗小承氣湯裡邪大黃厚朴枳實附子湯陰盛附子白朮白芍茯苓人參人參白虎湯陽陷人參石膏知母甘草粳米升麻附子湯胃虛升麻附子葛根白芷蜜黃芪各七分人參草蔻仁炙甘草各五分益智仁三分蔥白二此方乃陽明經主藥也加黃連犀角川芎薄荷荊芥治面熱說面熱面寒皆本於胃也菟絲子丸下元衰鹿茸澤瀉菟絲子附子肉桂熟地牛膝茯苓山萸川斷防風杜仲肉蓯蓉破故紙蓽澄茄巴戟沉香茴香五味子川芎桑螵蛸覆盆子石龍芮去尖參蘇飲發表人參蘇葉葛根半夏前胡桔梗枳殼陳皮茯苓甘草木香薑棗柴葛解肌湯解肌柴胡葛根黃芩芍藥羌活石膏升麻白芷桔梗各一錢甘草五分薑三棗二一名葛根解肌湯此方治陽明經病目疼鼻乾不得臥大柴胡湯裡熱柴胡黃芩半夏芍藥大黃枳實小柴胡湯和解柴胡黃芩各二錢人參半夏各一錢甘草五分薑三棗二一名三禁湯以其禁發汗禁利小便禁利大便故只用此藥乃和解之劑也此方專治少陽病半表半裡往來寒熱能和其內熱解其外邪傷寒方之正道也兼治汗下後不解過經不解時氣瘟疫婦人熱入血室等症其間有五症尤為的當傷寒五六日心煩喜嘔者一也寒熱往來者二也耳聾胸結者三也發潮熱者四也産後發熱者五也此五症尤為可服麻黃附子細辛湯未離表麻黃附子細辛無熱惡寒本陰經病也陰病當無熱今反發熱但頭不疼為異邪仍在表也脈雖沉獨宜用溫劑以發汗柴胡加桂湯陽頭胃柴胡黃芩半夏甘草肉桂麻黃杏仁飲表症治痼冷方十五附子理中湯總治白朮人參乾薑炮炙甘草附子入肝加木瓜入脾多加朮入肺加桑皮入心加茯苓腹痛甚加木香下利多加白朮渴者亦多加白朮倦臥沉重多加附子腹滿去甘草嘔吐去白朮加半夏薑汁臍下動氣去朮加桂心悸加茯苓寒積結胸加枳實四逆湯又附子乾薑炮炙甘草加減白通湯又附子炮薑肉桂草蔻仁半夏人參白朮炙甘草薑各一錢或附子多加一錢亦可金液丹又硫黃十兩研細飛過盛磁器內赤石脂封口鹽泥固之先掘拙坑埋小灌子盛滿水安磁器在上泥固漫火養七日夜加頂火一斤煅取出放冷研細末每末一兩蒸餅一兩湯浸去水和丸梧子大空心米湯下三十丸至聖來復丹又硫黃硝石各一兩共為細末入銚內微火慢炒柳木箸不住攪令陰陽氣相入再研極細名曰二氣砂乃入水飛五靈脂青皮陳皮各二兩為細末次入太陰元精石末一兩和勻醋糊丸碗豆大空心米湯下三十丸或五十丸此鐵甕城八角杜先生方此方兼治榮衛不交養心神不升降上實下虛氣寒痰厥一切急危之症但有胃氣無不獲安此藥配類二氣均調陰陽可冷可熱可緩可急央效殊勝一名正乙丹真武湯太陽附子白朮茯苓白芍生薑水寒相搏而咳加五味子細辛乾薑小便利去茯苓下利去芍藥加乾薑嘔去附子加生薑一倍大建中湯陽明川椒乾薑人參煎去渣入飴糖小柴胡湯少陽柴胡黃芩人參半夏甘草理中湯太陰人參白朮甘草乾薑加減法同附子理中湯當歸四逆湯厥陰當歸桂枝白芍細辛炙草木通大棗天台烏藥散又高良薑烏藥木香茴香青皮各五錢檳榔二個川楝子十個巴豆七十一粒先以巴豆微打破同川楝麩炒黑去麩及巴豆將川楝同餘藥為末酒下一錢白通加入尿豬膽汁湯少陰蔥白乾薑附子人尿豬膽汁加生薑吳茱萸湯又吳茱萸人參薑棗四神丸又破故紙四兩酒浸一宿炒五味子炒三兩肉豆蔻面裡煨二兩吳萸鹽湯泡淡炒一兩用大棗百枚生薑八兩切全煮爛取棗肉丸每服二錢臨臥鹽湯下若平旦服之至夜藥力已盡不能敵一夜之陰寒也導氣湯又川楝子四錢木香三錢茴香二錢吳萸一錢長流水煎治寒厥暴亡方二回陽救急湯總治人參附子甘草白朮茯苓乾薑陳皮肉桂半夏五味子附子理中湯又附子人參白朮炙甘草乾薑一方加吳萸肉桂當歸陳皮厚朴各等分作一帖水煎服亦名附子理中湯積聚癥瘕痃癖痞源流息積病積聚癥瘕痃癖因寒而痰與血食凝結病也經曰積之始生得寒乃生厥乃成積厥氣生足悗足悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積又曰卒然多飲食則脹滿起居不節用力過度則陽絡脈傷陽絡傷則血外溢陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則並合凝聚不得散而積成矣又曰內傷憂恐則氣上逆逆則六腧不通溫氣不行且外中寒與此偕厥凝血蘊裹不散津液澀著不去而積皆成據經之言可知經絡之氣得寒則厥寒與厥先逆於下必肢節痛而不便利至成足悗於是脛寒血氣凝澀漸而入於腸胃陽不化氣而腸外汁沫迫聚不散兼多食而不及運化汁又溢腸外與血相搏起居用力過度絡傷血瘀得寒則食積血積所必不免此積之所由成也夫分言之有積聚癥瘕疝癖之不一總言之則止曰積說以積者停畜之總名而欲施治有不得不分者大抵積在臟聚在腑惟在臟故臟有五而因有五積之名肝曰肥氣心曰伏梁脾曰痞氣肺曰息賁腎曰奔豚各詳五臟本論中惟在腑故腑有六而因有六聚之號臟陰故積亦屬陰腑陽故聚亦屬陽積脈沉細附骨聚脈浮動帶結此積與聚切脈而顯然可別者也且難經曰積者陰氣聚者陽氣氣之所積名曰積氣之所聚名曰聚積者五臟所生其始發有常處其痛不離其部上下有所終始左有有所窮處聚者六腑所成其始發無根本上下無所留止其痛無常處據難經之言而積與聚不又按症而顯然可別乎然壯盛之人必無積聚必其人正氣不足邪氣留著而後患此故易老云養正積自除譬如滿座皆君子縱有一小人自無容地而出令人真氣實胃氣強則積自消更能斷厚味節色欲戒暴怒正思慮庶乎萬全而無害其言良是也然細思之日進攻伐固不可全用補益亦未必效說既有是積是聚而積聚之凝結日久者不為消磨恐未必能自盡譬之一室中既有小人在內縱使滿座皆君子未必不恬然自安處於其側雖此時斷不敢與君子相抗為難然終自處於室中也惟以威屈或以言激或以勢凌迫而逐之方能去耳故治積聚者計惟有補益攻伐相間而進補益以補中益氣湯等為主隨症加減攻伐以攻積丸等為主隨症加減方為正治病深者伐其大半即止然後俟脾土健運積聚自消且夫積聚必成塊治塊宜丸不宜煎煎藥如過路之水徒耗元氣無損於塊說塊者有形之物氣不能成塊必成於痰食死血大法貴察其所痛以知其病之有餘不足而攻補之東垣謂當詳臟腑之高下而高者越之結者散之客者除之留者行之堅者削之強者奪之咸以軟之苦以瀉之全真氣藥補之隨所利而行之節飲食慎起居和其中外可使必已斯誠千古治積聚之良法也五積宜五積丸增損五積丸尤妙通治諸積聚宜化積丸又按大全分癥痞食癥血癥痃癖諸氣疝瘕八瘕腹中瘀血凡七門經云男子為七疝女子為瘕聚則知疝瘕既已同經男女亦有同病且癥痞痃癖諸病亦屬男女皆有之特腹中瘀血為女子之病耳此條另詳婦科玉尺茲不贅且大全所謂七門者一日癥食癥血癥即統在內二日痞三曰痃四日癖五日疝六日瘕八瘕即統在內七日腹中瘀血其門類顯然可證但諸積聚皆屬痰食死血大全特於癥之一門復中食癥血癥二條其餘則否且即癥亦但中言食與血而不及痰何也須知諸積中未嘗無痰並未嘗無食與血即血癥食癥之內更未嘗無痰且諸積之痰食死血又未嘗不先因氣病也故治積者必兼行氣滌痰去瘀消食而後可耳夫七疝餘另立論瘀血另洋婦科茲故皆不之及試詳言癥瘕痃癖痞癥者征也以腹中堅硬按之應手其病形有可征驗也往往見臍下其原由飲食失節胃氣衰脾元弱邪正相搏積於腹中牢固不動散名曰癥醫者當審其病機或出脾胄虛宜六君子湯加消積藥或由肝脾宜婦脾湯加消積藥或由肝火鬱宜蘆薈丸詳察進藥其有臟腑虛弱好食生冷粘滯之物因脾胃虛不能尅化遂與臟氣相搏結積成塊日漸長大堅固不移此謂之食癥若體氣充實當先疏導而佐以補脾健胃否則必以培土為主而兼用消導也或有氣壅血滯而不易愈者散之可也宜烏藥散其有臟腑虛弱寒熱失節或風冷內停飲食不化周身運行之血氣適與相值結而生塊或因跌撲或因閃挫氣凝而血亦隨結經絡壅瘀血且不散成塊必腹胠脅間苦痛漸至羸瘦妨於飲食此之謂血癥薛立齊云氣主之血主濡之脾統血肝藏血故鬱結傷脾恚怒傷肝者多患血癥腹脅作痛正屬肝脾病也宜沈氏血癥丸薛氏此言乃血癥病之原於七情所傷者瘕者假也假血成形腹中雖硬其實聚散無常也亦往往見於臍下其原由寒暖失宜飲食少節臟腑之氣先虛又復多所勞傷外而感受風寒停畜於內是用故正虛邪實正不能勝邪邪遂挾其力反假游行之血相聚相結而成顆塊推之而動按之而走故名曰瘕醫者當審其病機果屬肝脾兩傷宜四物湯加柴胡青皮木香延胡索而三棱鱉甲亦專治癥瘕二症以藥投之自無不效然瘕為總病所統八瘕皆有名可稽有形可按一青瘕聚在左右脅下藏於背膂上至肩胛其苦腰下急痛腹下氣衝面色黃四肢腫二便難喜唾涎不可多食二黃瘕左脅下有氣牢結不可抑其苦腰背相引痛小腹常急下引陰中如刺不得小便或溺黃赤時發寒熱三燥瘕狀如半杯上下腹中不定其苦痛連兩脅上下引心而煩胸及腹中不得太息腰背重足酸削而久立痛遺尿失精便難盜汗妨於飲食時欲嘔吐四血瘕留著腸胃之外及少腹間其苦橫骨下有積氣牢如石因而少腹急痛陰中若有冷風亦或背脊疼腰疼不可俯仰五脂瘕在脂膜間猝難蹤跡其苦腰背如刺左右走腹中而切痛少腹沉重身體解㑊大小便血時甚時止此症婦人獨患之男子無是疾也六狐瘕出入少腹間或隱或見男子即為狐疝女子乃名狐瘕其苦陰酸澀小便難少腹瘀痛胸膈腰背上衝而痛其瘕甚有手足成形者乃不治症七蛇瘕其形長大在臍上下或左右脅上食心肝其苦不得吐氣腰背痛難以動作少腹熱膀胱引陰攣急小便黃赤兩股脛間時痛八鱉瘕形大如杯若存若亡持之應手其苦小腹內切痛惡氣左右走上下腹中痛腰背亦痛不可以息面目黃黑脫聲少氣甚亦有頭足成形者乃不治症此八瘕皆瘕之屬也痃者懸也懸於腹內近臍左右各有一條筋脈扛起大者如臂如筒小者如指如筆管如弦其原皆由陰陽之氣不和常多鬱塞又時忿怒動氣偏勝或適當飲食與氣纏裹適受寒冷與氣停畜且仇怒則肝火盛而血隨氣結痰亦緣火相附而升遂合並而成形質懸於臍之左右故名曰痃醫者當審其病機選藥定劑自獲奇央宜麝香丸積塊丸三棱散獖豬肝丸癖者匿也潜匿兩肋之間尋摸不見有時而痛始覺有物其原皆由榮衛失調經絡閟隔而又起居飲食無度傷脾傷胃有所勞力強忍作勞以致精傷血軼邪冷之氣搏結不散藏於隱僻之所故名曰癖醫者當審其病機針對發藥癖結自解宜香棱丸大硝石丸木香硇砂丸痞者閉也痞必有塊塊則有形總在皮裡膜外其原皆由傷於飲食脾胃虧損抑且邪積胸中阻塞氣道氣不宣通為痰為食為血皆得與正相搏邪既勝耳不得而製之遂結成形而有塊丹溪云凡痞塊左為血積右為食積中為痰飲此言誠然夫左關肝膽之位主藏血液右關脾胃之位主藏飲食中間為水谷出入之道路所以左為血積有為食積中為痰飲其理昭然觀丹溪之言亦可知痞所由成矣然雖有痰飲血食之異質左右與中之殊位總能閉塞氣分故名曰痞醫者當審其病機以治之宜連夢丸消塊丸開懷散消積保中丸而又必察其形質不能移動者類於癥上下左右能移者類於瘕俱宜潰堅丸潰堅湯或緣有所驚恐而成宜妙應丸加穿山甲各三錢元胡索蓬朮各四錢或緣憂思鬱結而得宜入門六鬱湯或緣氣分之火壅遏而致宜解鬱調胃湯或緣心腹塊痛每至脹寒熱而盛宜柴香散或緣三焦閉格胸膈楚悶氣不流通蘊結而積宜助氣丸或緣日耽曲蘗脾濕氣滯胸中悶滿氣促不安嘔吐清水而生宜勝紅丸加茯苓白朮葛根其致痞不同治痞因異而痞焉有不除者乎總之積聚瘕痃癖痞分隸三焦斷難混視痞癖見於胸膈間是上焦之病痃積聚見於腹內是中焦之病癥瘕見於臍下是下焦之病按其症分其部方得頭緒故積聚痃癖痞多生於男子而女子偶患之癥瘕多生於女子而男子偶患之理固當然也是以前敘八瘕亦以為女子常生之病男子偶或一見故但詳形症而其原由則詳於婦科玉尺中此則從略也然積聚等七者雖詳而痰食死血之為病有與此相類而不得竟謂之積聚癥瘕痃癖痞亦有是此七病而各有形症不同即各當用藥調治者如積聚腹脹如鼓青筋浮起坐臥不便宜蒜紅丸如寒氣結塊腹大堅滿痛楚之極宜木香通氣散如左肋下痞滿氣逆息難有形但不妨飲食宜推氣湯如痞積氣塊口內生疳宜化痞膏如心下堅大如盤由於水飲所作宜枳朮湯如腹中痃癖致成鼓脹宜烏牛尿膏如痃癖不瘥脅下堅硬如石宜大黃散如腹滿癖堅如石積年不損宜楊枝酒如小腹冷癖有形如卵上下走痛不可忍宜茴香丸如久患涎沫遂成積塊宜青黛丸如卒暴癥疾腹中如石刺痛日夜啼呼不治百日死宜牛膝酒如誤食菜中蛇精或食蛇肉致成蛇瘕腹內常飢食物即吐宜赤蜈蚣散如好吃生米成瘕不得米則吐清水得米即止米不消化久亦斃人宜雞屎米煎如食發成瘕心腹作痛咽間如有蟲行欲得油飲宜香澤油如平時嗜酒血入於酒而成酒鱉平時多氣血凝於氣而成氣鱉虛勞痼冷敗血雜痰而成血鱉搖頭掉尾如蟲之行上侵人咽下餂人肛或附脅背或隱腹大則如鱉小則如錢宜蕪荑湯如老人小兒痃癖往來疼痛宜星附丸以上種種皆積聚等七病之類所當一一詳審者也他如脾胃虛弱或飲食過常或生冷過度不能尅化又或起居無節寒暖不調致隨其所食之物及所傷寒熱之氣結成積聚或有塊或無塊面色青肌體瘦心腹脹滿噫氣吞酸者又當條款而列陳之一曰食積食物不能消化成積痞悶也宜青礞石雞內金枳實巴豆香附方用保和丸連夢丸佐脾丸二曰酒積飲酒受傷成積面黃黑腹膜脹時嘔痰水也宜麥芽神曲方用曲藥丸酒積丸烏白丸三日面積食面太多或受寒或懊憹以致成積胸胃飽悶也宜麥芽萊蔔子方用阿魏丸四曰糕積食之過傷成積噫氣吞酸心腹作痛也宜用白芍谷芽神曲方用青木香丸加增法五曰索粉積食之失度而成積胸腹間若有所梗也宜枳實萊蔔子方用紫蘇湯六曰茶積好飲茶成癖積或喜吃乾茶葉而成積面黃胸膈或空或脹無常也宜薑黃吳茱萸蒼朮白朮炮薑川椒方用星朮丸磨積丸七曰果菜積多食果菜成積不時瀉利腹中若有傀儡也宜丁香麝香肉桂方用妙應丹桂香丸平胃散加丁麝八曰水積飲湯水成積胸脅引痛瀝洛有聲也宜牽牛子甘遂茯苓豬苓方用五苓散十棗湯破積導飲丸九曰肉積食肉過多成積腹多膨脹泄瀉疼痛也宜查肉阿魏硇砂硝石方用阿魏丸小阿魏丸三棱煎丸十曰魚鱉蟹積食此過多成積腹中疼痛胸中滿悶或吐或瀉也宜紫蘇陳皮木香薑汁方用妙應丸遇仙丹十一曰蛋積食蛋不消成積即噯敗卵氣作酸堅痛也宜白蔻仁橘紅豆豉薑汁方用妙應丸十二曰狗肉積食狗多而成積滿腹中覺熱脹悶也宜杏仁山楂方用三棱煎丸十三曰蟲積飲食積聚變化生蟲時嘔清水苦水常在腹中咬痛也宜雄黃白檳榔雷丸蕪荑棐子使君子肉方用妙應丸溫白丸十四曰血積瘀血成積或因打撲或因墮跌瘀血畜於脾腹面黃糞黑也宜三棱蓬朮五靈脂紅花延胡索桃仁丹參大黃方用桃仁承氣湯三棱煎十五曰痰積痰涎凝聚成積結在胸膈吐咯不出咽門至胃脘窄狹如線疼痛目眩頭旋腹中纍纍有塊也宜青礞石海粉南星半夏瓦楞子方用竹瀝化痰丸竹瀝達痰丸開氣消痰湯十六曰瘧積瘧疾不善調理而成積經汗吐下日久榮衛虧損邪氣伏藏脅腹結為癥癖堅痛名為瘧母也宜常山鱉甲三棱蓬朮草果方用於將軍丸鱉甲丸消癖丸十七曰寒積感傷寒冷成積腹中疼痛必以手重按或將物頂住稍可口吐清水也宜乾薑柴胡丁香肉桂附子方用附子理中湯沈氏棉子丸十八曰熱積傷熱成積或吐或瀉頭暈腹痛心中煩躁也宜黃芩黃連黃柏石膏方用清心湯地骨皮散共十八條病皆由積勿論其塊之有無也且諸積之成莫不由痰食死血固夫人而知之矣庸詎知痰食死血乃成積之質而非成積之本乎說使痰伏其位食化其液血順其經病何自作而積何自生夫惟氣鬱而濕滯濕鬱而熱生熱鬱而痰結痰鬱而血凝血鬱而食不化食鬱而積成此六者實相因致病古人所以云六鬱為諸積之本也故當積之未也必先有以解其鬱而使當升者升當降者降當變化者變化不致傳化失常宜入門六鬱湯越鞠保和丸加味越鞠丸斯氣血衝和而百疾不作若積之既成又當調榮養衛扶胃健脾使元氣旺而間進以去病之劑從容調理俾其自化夫然後病去而人亦不傷乃今之治積者動議吐下竟謂非此不除不知吐與下只治病之卒暴作者若積之成必匪朝伊夕其所由來者漸矣故積之治法必匪朝伊夕其所由去者不可不以漸也不然內經何但有化積消積挨積磨積之文而並無吐積下積之說乎說直吐直下皆足以傷胃氣而損元氣積必不去也凡病者醫者其皆體念毌忽脈法難經曰病在有脅有積氣得肺脈結結甚則積甚結微則積微肺脈雖不見右手脈當沉伏脈訣曰五積為陰沉伏附骨肝弦心芤腎沉結滑脾實且長肺浮喘卒六聚成結痼則沉結正傳曰鬱脈多沉伏或促或結或代丹溪曰鬱脈沉澀積脈弦堅綱目曰心肺有積其脈皆喘數肝有積其脈弦長脾胃有積其脈皆大脈經曰脈弦緊為積弦緊而微細者癥也夫癥瘕積聚之脈皆弦緊在心下即寸脈弦緊在胃脘即關脈弦緊在臍下即尺脈弦緊又曰內有積不見脈難治見一脈相應易治又曰診積其脈堅強急者生虛弱者死又曰脈弦而伏者腹中有癥不可轉也必死不治回春曰有癥瘕其脈多弦弦急瘕疾弦細癥疾醫鑑曰腹中有積脈忌虛弱又曰診女人疝瘕積聚之脈弦急者生虛弱小者死諸積原由症治靈樞曰喜怒不節則傷藏藏傷則虛風雨襲虛則病起於上留著於脈稽留不去息而成積著於陽明之經則挾臍而居飽食則益大飢則益小著於緩筋也是陽明之積飽食則痛飢則安著於腸胃之膜原痛而外連於緩筋飽食則安飢則痛著於膂筋在腸後者飢則積見飽則積不見按之不得又曰人之善病腸中積聚者皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪留止積聚乃成腸胃之間寒溫不次邪氣猶至畜積留止大聚乃起內經曰寒氣客於小腸膜原之間絡血之中血澀不得注於大經血氣稽留不得行故宿昔而成積矣仲景曰有積有聚有𣖫氣𣖫氣者脅下痛按之則愈復發為𣖫氣入門曰治五積古有肥氣等五方今增損五積丸更妙又曰積初為寒宜辛溫消導大七氣湯烏白丸久則為熱宜辛寒推蕩木香檳榔丸通元二八丹又曰壯人無積虛人則有之皆由脾胃怯弱氣血兩衰四時有感皆能成積若遽以磨積破結之藥治之疾似去而人已衰矣法當先補虛使氣血壯則積自消宜木香枳殼丸本事方曰治積要法大抵以所惡者攻之所喜者誘之則易愈得效曰宿血滯氣凝結為癥瘕腹中痞塊堅硬作楚當以破氣藥伐之或以類相從如敗梳治蝨瘕銅屑治龍瘕曲蘖治米瘕石灰塵治發瘕丹溪曰凡攻擊之藥有病則病受之無病則胃氣受傷胃氣者清純衝和之氣也惟與谷肉菜果相宜說藥石皆偏勝之氣雖參芪性亦偏況攻擊者乎又曰醫為病所困首惟陰虛之難補久積之難除玉山自倒陰虛之謂也養虎遺患久積之謂也人之罹此二患者可不俱哉仲景曰積聚癥瘕不轉動者難治必死又曰五積中奔豚症最為難治奔豚從小腹起上衝咽喉發作欲死復還止皆從驚恐得之越人曰驚者神上越也說奔豚病上衝咽喉者隨神上越故也外貼法千金方曰凡積聚癥瘕用藥外貼亦可令消散宜三聖膏琥珀膏貼痞膏握藥宣積法得效曰凡積聚服藥畏難看可用握藥法能令積散宜握藥丸痞塊導引法保生祕要曰以左手向前上伸以有手向後下伸閉氣一口扭身轉項左右轉換各十七回俟後內微覺響聲身熱乃止兼行後央運央保生祕要曰注臍發運患處撤散或想刀劈破氣塊推之四旁又灌火燒之或用梭法息積氣分病也人身之氣周流運行無時或息故經絡宣通榮衛調和機關順利而呼吸出入氣以息宣息隨氣運百疾不生有所怫鬱則氣為之壅壅則不通升不得升降不得降必致腹滿肋痛氣逆上衝故知息調於氣氣鬱則息亦鬱氣鬱而積息亦鬱而積也且靈樞曰何謂逆而亂日清氣在陰濁氣在陽榮氣順脈衛氣逆行清濁相乾亂於胸中是為太悗悶夫至太悗悶則其息之積而不調可知矣是故息積之病偏脹膨滿未有不原於氣鬱者宜化氣湯木香調氣散亦或腸胃因虛氣癖於肓膜之外流於季脅氣逆息難經年纍月醫所難治久則榮衛停凝一朝敗濁潰膿為癰多至於不救宜磨積丸萬病丸則息積之病說有不容忽視者息積症治內經曰帝曰人有病脅下滿氣逆二三歲不已是為何病岐伯曰病名曰息積此不妨於食不可灸刺為導引服藥藥不能獨治也導引法得效曰以兩手拇指壓無名指本節作拳按髀趺坐叩齒三十六屏氣二十一息咽氣三口再屏息再咽如是三作以氣通為效遇子午卯酉時則行治積聚癥瘕痃癖痞方九十一補中益氣湯補益人參黃芪當歸白朮升麻柴胡陳皮甘草攻積丸攻伐吳萸乾薑官桂川烏各一兩黃連橘紅檳榔茯苓厚朴枳實菖蒲人參沉香桔梗琥柏另研元胡索半夏曲各八錢巴霜另研五錢皂角六兩煎汁泛丸每八分加至一錢薑湯下肥氣丸肝積柴胡一兩黃連七錢厚朴五錢川椒四錢甘草三錢人參蓬朮昆布各二錢半皂角茯苓各錢半乾薑巴霜各五分川烏二分蜜丸初服二丸二日三丸以後每日加一丸至大便溏又每日減少一丸仍至二丸再日加增周而復始塊減半即勿服伏梁痞氣奔豚息賁四方服法俱照此增減伏梁丸心積黃連兩半人參厚朴各五錢黃芩桂枝茯神丹參各一錢乾薑菖蒲巴霜川烏各五分紅豆蔻三分蜜丸黃連湯下服法照肥氣丸痞氣丸脾積黃連八錢厚朴四錢吳萸三錢黃芩二錢砂仁錢半茯苓人參澤瀉各一錢茵陳乾薑各錢半川烏川椒各五分肉桂巴霜各四分白朮二錢蜜丸甘草湯下服法照肥氣丸息賁丸肺積黃連兩三錢厚朴八錢川烏桔梗白蔻仁陳皮三棱天冬人參各二錢乾薑茯苓川椒紫菀各錢半青皮巴霜各五分蜜丸薑湯下服法照肥氣丸奔豚丸腎積厚朴七錢黃連五錢川楝子三錢茯苓澤瀉菖蒲各二錢元胡索一錢半全蠍附子獨活各一錢川烏丁香巴霜各五分肉桂二分蜜丸淡鹽湯下服法照肥氣丸增損五積丸總治五積黃連肝積五錢脾腎積七心肺積兩半厚朴肝心肺積五錢脾腎積八錢川烏肝肺積一錢心腎脾積五錢乾薑肝心積五分肺脾腎積錢半人參肝心脾肺積二錢腎積五分茯苓錢半巴霜五分蜜丸服法亦照五積丸如肝積另加柴胡一兩川椒四錢蓬朮三錢皂角昆布各二錢半如心積另加黃芩三錢肉桂茯神丹參各一錢菖蒲五分如肺積另加桔梗三棱天冬青皮陳皮蔻仁各一錢紫菀川椒各錢半如脾積另加吳萸黃芩砂仁各二錢澤瀉茵陳各一錢川椒五分腎積另加元胡索三錢苦楝肉全蠍附子獨活各一錢澤瀉菖蒲各二錢肉桂三分母丁香五分此方兼治一切積塊不拘臍上下左右通用化積丸通治諸積三棱蓬朮阿魏海浮石香附雄黃檳榔蘇木瓦楞子五靈脂水丸六君子湯脾胃虛人參白朮茯苓炙甘草陳皮半夏歸脾湯肝脾虛人參黃芪當歸白朮茯神杏仁遠志龍眼木香甘草薑棗蘆薈丸肝火蘆薈黃連胡黃連木香青皮蕪荑炒各五錢當歸茯苓陳皮各一兩半炙甘草七錢米糊丸米飲下七八十丸烏藥散食癥烏藥蓬朮醋炒肉桂當歸桃仁青皮木香等分為末每二錢酒下沈氏血癥丸血癥五靈脂大黃甘草梢桃仁泥各五錢生地七錢牛膝四錢官桂二錢元胡索歸身各六錢三棱蓬朮赤芍川芎各三錢琥珀乳香沒藥各一錢酒糊丸每服一錢壯盛人錢半消過半即止再隨病體立方服藥此金鰲自製方也四物湯瘕川芎當歸白芍生地麝香丸痃麝香五錢阿魏面煨二錢半三棱五靈脂各七錢半桃仁七錢醋炒芫花三錢檳榔蓬朮肉桂沒藥當歸木香各五錢飯丸梧子大每十丸醋湯下無時積塊丸又醋三棱醋蓬朮自燃銅醋煅蛇含石各二錢雄黃蜈蚣各錢二分木香錢半鐵華粉醋炒一錢沉香八分冰片五分蘆薈天竺黃河魏全蠍各四分雄豬膽汁加蜜丸消即止三棱散又三棱八錢川芎四錢醋煨大黃一錢獖豬肝丸又獷豬肝一具可十兩者以巴豆五十粒去皮扎在肝內米醋三碗煮肝極爛去巴豆入京三棱末和得所丸梧子大每服五丸食前酒下香棱丸癖三棱檳榔各三兩查肉二兩夢卜子香附枳實枳殼陳皮青皮蓬朮各一兩黃連此方通治五積六聚氣塊又方木香丁香各五錢積殼酒三棱莪朮以巴豆三十粒去殼同炒巴豆黃色去之青皮川楝肉茴香等分醋糊丸朱砂為衣每三十丸淡鹽湯下無時此方亦治一切積聚破痰癖消癥塊大硝石丸又硝石三兩大黃四兩人參甘草各一兩陳醋三升銅器內先微火煎大黃數沸常攪不息至七分入諸藥熬成膏至可丸即丸每服三十丸米湯下三日一服或下如雞肝或米泔赤黑等物多至二三升後忌風冷此方通治七癥八瘕聚結杯塊及婦人帶下絶産腹中有癥瘕者當先下此藥妙在但去癥瘕令人不困木香硇砂丸又木香硇砂另研丁香官桂沒藥另研附子乾漆細黑乳香另研青皮大黃末三棱豬牙皂角乾薑各等分巴霜減半上除硇砂乳香沒藥外同為末以醋一升化硇砂去渣銀石器中慢火熬次下巴霜大黃熬成膏將前藥末和膏為丸如麻子大每服三五十丸食後溫酒下加至大便利為度此藥乃攻伐之劑全無補益虛人禁用即壯實者亦須以四君子湯四物湯兼服此方專治男女痃癖積聚血塊刺痛脾胃虛寒飲食不消久不瘥者連夢丸痞塊黃連一兩五錢半以吳萸五錢同炒去吳萸半以益智仁五錢同炒去益智白芥子萊服子並炒各兩半山梔川芎京三棱蓬朮桃仁香附查肉神曲各一兩青皮五錢蒸餅和丸白湯下五六十丸一名白芥丸又名消積丸消塊丸又大黃四兩硝石三兩人參甘草各兩半各為末用陳醋三升磁器內先同大黃末煎不住手攪使微沸盡一升下餘藥末熬至可丸如梧子大米飲下三十丸當利如雞肝惡物一名硝石丸此方通治痞塊癥瘕上連夢丸專治食積死血痰飲成塊在兩脅作痛雷鳴嘈雜眩暈與此方俱靈效之至開懷散又柴胡草豆蔻各一錢醋三棱醋蓬朮青皮陳皮半夏茯苓香附檳榔枳實紅花甘香各七分薑三片此方專治心下積塊痞悶或發熱消積保中丸又白朮三兩去白陳皮二兩半夏茯苓醋香附萊蔔子白芥子薑黃連薑梔子神曲各一兩檳榔七錢醋三棱醋蓬朮各八錢麥芽六錢乾漆五錢青皮香油炒砂仁各四錢木香阿魏