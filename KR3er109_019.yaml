body:
  text: 卷十九春溫病源流春溫少陰病也仲景何以言太陽以太陽與少陰相表裡就其發熱言之故曰太陽而邪之所傷者實少陰也經曰冬傷於寒春必病溫又曰冬不藏精春必病溫夫邪之所湊其氣必虛不藏精矣有不虛乎少陰主精其精不藏則虛者非少陰乎特以冬時寒水主令少陰氣旺寒雖傷之未便發泄至春少陽司令木旺水虧不足供其滋溉所鬱之邪向之乘虛而入者今則乘虛而發木燥火炎乘太陽之氣蒸蒸而熱故所傷雖寒所病則溫是以春溫雖太陽少陽少陰三經俱有之病而其原則專屬少陰也仲景復言太少合病以發熱不惡寒兼耳聾脅滿也復言三陽合病以脈大為陽明多眠為熱聚少陽也其發熱而不惡寒者以寒鬱營間久則反熱熱自內發無表症也然此其定理也亦有寒邪將發之時復感風邪者必先頭痛或先惡寒而後熱此新邪引舊邪也或往來寒熱頭痛嘔吐稍愈後渾身壯熱此正氣又虛伏邪更重也無外症宜黃芩湯為主兼外症必加柴胡或本經藥以輕解切不可汗故仲景曰發汗已身灼熱者名曰風溫言誤用辛熱既辛散以劫其陰復增熱以助其陽故熱甚脈浮遂成危症也誤下誤火亦危總宜以涼解為主夫所傷者寒所發者熱而曰溫何也說冬之傷寒必先天氣溫暖開發腠理忽然寒氣襲之故受傷又以所傷不甚故不即病乘少陰之虛而優於其經至春木旺其氣溫和夏熱尚遠故所發之病不得仍謂之寒不得遂謂之熱而謂之溫也適當春時故謂之春溫也茲據仲景傷寒論中所及溫病而條疏之仲景曰太陽病發熱而渴不惡寒者為溫病說以邪自內發表裡俱熱津液必耗故渴內方喜寒故不惡寒三四日後或腹滿或不利者皆由熱也未顯他經之症故曰太陽以與少陰為表裡邪之伏既在少陰裡邪之發自在太陽表也仲景又曰若汗發已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚時瘛瘲若火燻之一逆尚引日再逆促命期說以此仍是太陽症而誤汗者雖與更感風者不同然其症本溫復辛散以耗津增熱以使脈浮風與溫混腎水不能獨沉故現腎之本病若自汗至語言難出等症也古律云風溫治在少陰不可發汗發汗者死今雖太陽風溫亦同少陰之不可汗也奈何誤汗之乎若不汗而誤下傷膀胱之氣其變直視等症由腑臟兩絶也誤火劫微則熱傷營氣而熱瘀發黃盛則熱甚生風而驚瘛是由神明亂筋脈擾也一逆再逆統指汗下火三者言之仲景又曰太陽與少陽合病自利者與黃芩湯若嘔者黃芩加半夏生薑湯主之說以溫病之為太少二陽止據脅滿頭痛口苦引飲不惡寒而即熱斷之非如傷寒合病皆表症也且不但無表兼有下利之裡症又以內鬱既久中氣已虛邪不能一時盡泄於外至下走即利非如傷寒協熱利必待傳經也故不用二經藥而但用黃芩湯黃芩湯者治溫主方也仲景又曰三陽合病脈浮大上關上但欲眠睡目合則汗說以太陽脈浮陽明脈大關上又太陽部位邪雖見於陽少陰之源未靖故顯欲眠本症然母虛子亦虛目合而盜汗出因顯少陽本症故曰三陽也宜小柴胡湯去人參半夏加芍藥仲景又曰師曰伏氣之病以意候之今月之內欲有伏氣假令伏氣當須脈之若脈微弱當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利說以微弱少陰脈也腎虛故不及於陽而即發於陰少陰脈循喉故發則痛而似傷腎司開合雖陰熱上升而咽痛泄不盡必後陷故下利可下此一節於伏氣之時見伏氣病也仲景又曰少陰病二三日咽痛者可與甘草湯不差者與桔梗湯說以甘草湯緩伏氣上升之勢也桔梗湯開伏氣怫鬱之邪也不用黃芩湯以二三日為初發之時無胸滿心煩下利嘔渴等症止咽痛耳連舉二方倘服之痛止邪即衰其大半後可隨所見而投藥亦不妄投之道也仲景又曰少陰病得之二三日已上心中煩而不臥黃連阿膠湯主之說以此雖未至咽痛而心煩不臥血液已耗於伏邪未發時故以清熱滋陰為要也以上皆仲景要法治溫之準則也總之溫症之發必渴而煩脅滿口苦惡熱不惡寒以自內發無表症也雖經絡不同必先少陽以春行風木令也若周禹載治春溫諸法可遵用之其法有治少陽陽明合病裡症多者宜大承氣湯有治三陽合病者宜大柴胡湯雙解散有治少陽客邪發脈弦兩額旁痛寒熱口苦者宜小柴胡湯去參半薑加花粉如嘔但去人參有治脈微緊兼惡寒頭痛者宜梔子豉湯或益元散加蔥豉薄荷熱甚涼膈散去硝黃加蔥豉有治暴感外邪頭痛如破者宜葛根蔥白湯邪散後用黃芩湯有治熱在上焦脈洪大而數外熱譫妄者宜三黃石膏湯有治應下症下後熱不去或暫解復熱須再下者宜承氣湯有治下後熱不止脈澀咽痛胸滿多汗熱傷血分宜吐者宜葶藶苦酒湯有治裡熱已甚陽邪怫鬱作戰而不能汗出雖下症未全除者宜涼膈散有治腹滿煩渴脈沉實者宜選用三承氣湯勢極合用黃連解毒湯以上皆春溫症有治病溫少陰伏邪發出更感太陽客邪名曰寒溫必陽脈浮滑陰脈濡弱發熱咽痛口苦但微惡寒者宜黃芩湯加桂枝石膏或以蔥豉先治其外後用本湯甚則用葳蕤湯加減有治本太陽病發熱而渴誤發汗身灼熱者亦名風溫脈陰陽俱浮如前症宜麻黃升麻湯去二麻薑朮夫誤汗風溫一症仲景不立方者以太陽少陰同時薦至危於兩感去生甚遠也以上皆風溫症此外又有冬溫病冬行春令天氣溫暖實為非時之暖不正之氣獨冬不藏精之人腎氣外泄腠理不固溫氣襲入感之成病此為冬溫說當冬而溫火勝矣不藏精水虧矣水既虧則所勝妄行土有餘矣所生受病金不足矣所不勝者反來侮之火太過矣火土合德濕熱相助故成溫病是冬氣溫暖感之而即病者也非如春溫之由於伏寒者也故周氏又有治冬溫之法並條列而採用之有治寸脈潢尺脈數或實大心煩嘔逆身熱不惡寒或頭痛身重面腫咳嗽咽病下利與春溫無異特時令不同者宜陽旦湯加桔梗茯苓有治寒食停滯者宜厚朴一味以溫散黃芩涼解其外即仲景陰旦湯之意有治先感溫氣即被嚴寒逼抑發熱而微惡寒汗不出而煩擾者宜陽旦湯加麻黃石膏有治本冬溫醫誤認傷寒用辛熱發汗致令發㿀成毒者宜升麻葛根湯加犀角黑參或犀角黑參湯有治誤用辛熱發汗徒耗津液裡熱益甚胸復滿又誤用下藥反發熱無休脈來澀為陰血受傷者急宜探之宜葶藶苦酒蕩以收陰氣泄邪熱若服藥後勢轉劇神氣昏憒譫語錯亂必不救也冬溫為病亦自不一當各隨見症治之凡冬溫之毒大便泄譫語脈虛小手足冷者皆不治也以上皆冬溫症而又有溫瘧者是春溫病未愈適又感寒忽作寒熱者也陰陽例云脈陰陽俱盛重感於寒變為溫瘧其症寒熱交作胸脅滿煩渴而嘔微惡寒即是也宜小柴胡湯去參半加花粉石膏又有治無寒但熱其脈平骨節煩疼時嘔者宜黃芩加生薑湯至如內經所言先熱後寒之溫瘧乃得之冬中於風寒氣藏於骨髓之間至春陽大發時邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有勞力邪氣與汗並出此病固藏於腎自內達外者也惟其陰氣陽邪盛故為熱熱甚必衰衰則氣反而復入入則陽虛陽虛則又寒故先熱後寒亦名溫瘧宜人參白虎湯又或有客邪內蘊先微惡寒繼大熱熱而復大寒者此伏邪自發之溫瘧與溫病復感外邪之溫瘧不同宜人參白虎湯少加桂枝以上皆溫瘧症而又有溫毒發斑者夫發斑皆失於汗下之故熱毒內攻不得散蘊結陽明而發出肌表或汗下不解足冷耳聾胸煩悶咳嗽嘔逆躁熱起臥不安俱是發斑之候春至病溫之人更遇時熱變為溫毒王氏叔和云陽脈洪數陰脈實大更感溫濕變為溫毒伏溫與時熱交並表裡俱熱其為病最重也其為脈浮沉俱盛也其為症心煩悶嘔逆喘咳甚則面赤身俱赤狂亂躁渴咽腫痛狂言下利而發斑也最為危候周氏亦有治法更條列之有治斑如錦紋身熱煩躁而無燥結者宜黃連解毒湯有治躁悶狂亂而無汗者宜三黃石膏湯有治自汗煩渴而發斑為胃熱者宜人參化斑湯有治煩熱錯語不眠者宜白虎湯合黃連解毒湯有治斑不透者宜犀角大青湯有治斑已透熱不退者宜犀角大青湯去升麻黃芩加人參生地柴胡有治斑色紫而為危候者宜黃連解毒犀角地黃二湯合用必須與病家言過而後用藥以此症雖藥十中僅救一二若色黑而下陷必死可勿藥凡發斑雖禁下若大便祕躁渴色紫者可微下之宜大柴胡湯若發斑已盡外熱已退內實不大便譫語微下之宜小劑涼膈散或大柴胡湯凡發斑鮮紅起發者吉雖大不妨稠密成片紫色者半死半生雜色青紫者十不一生總之紅赤者為胃熱紫為胃傷黑為胃爛也凡斑既赤脈須洪數有力身溫足暖者易治脈小足冷元氣虛弱者難治狂言發斑大便自利或短氣燥結不通而黑斑如果實黶者皆不治以上皆溫毒發斑症夏熱發斑同此驗治至於脈象或見浮緊乃重感不正之暴寒寒邪束於外熱邪結於內故其脈外繃急而內洪盛也若誤認弦脈為緊必謬說脈之盛而有力者多兼弦不可誤認為緊而以為寒也夫溫病之脈多在肌肉之分不甚浮且右反甚於左者怫鬱在內故也其左手盛或浮得必重感風寒否則非溫病是非時暴寒耳溫病亦有先見表症而後見裡症者怫鬱自內達外熱鬱腠理之時若不用辛涼發散邪不得外泄遂還裡而成可攻之症非如傷寒從表而始也或不明斯理而於溫病求浮緊之脈亦疏矣其脈法有如此者夏熱病脈亦同此看法周氏禹載溫病治法最善故此篇多採用之脈法靈樞曰尺膚熱甚脈盛躁者病溫也脈訣曰陰陽俱盛病熱之極浮之而滑沉之散澀惟溫病脈散於諸經各隨所在不可指名脈法曰溫病二三日身熱腹滿頭痛食飲如故脈直而疾八日死溫病四五日頭痛腹滿而吐脈來細而強十二日死溫病八九日頭身不痛目不赤色不變而反利脈來澀按之不足舉之卻大心下堅十七日死溫病汗不出出不至足者死醫鑑曰溫病穰穰大熱脈細小者死溫病下利腹中痛者死症也溫病原由症治丹溪曰夏至前發為溫病夏至後發為熱病謂之伏氣傷寒所謂冬傷於寒春必病溫是也正傳曰溫病初症未知端的先以荊防敗毒散治之看歸在何經隨經施治又曰治法切不可作傷寒正治而大汗大下但當從手中治而用少陽之小柴胡湯陽明之升麻葛根湯加減治之陶節庵曰問曰傷寒溫病何以為辨答曰溫病於冬時感寒所得也至春變為溫病耳傷寒汗下不愈而過經其症尚在而不除者亦溫病也經云溫病之脈行在諸經不知何經之動隨其經之所在而取之如太陽病頭疼惡寒汗下後過經不愈診得尺寸俱浮者太陽病溫也如目疼惡寒身熱汗下後過經不愈診得尺寸俱長者陽明病溫也如胸脅痛汗下後過經不愈診得尺寸俱弦者少陽病溫也如腹滿嗌乾過經不愈診得尺寸俱沉細著太陰病溫也如口燥舌乾而渴過經不愈診得尺寸俱沉者少陰病溫也如煩滿囊縮過經不愈診得尺寸俱微緩著厥陰病溫也是故隨其經而取之隨其症而治之如發斑乃溫毒也又曰治溫大抵不宜發汗過時而發不在表也已經汗下亦不在表也經曰不惡寒而反渴者溫病也說其熱自內達外無表症明矣又曰溫毒者冬月感寒毒異氣至春始發也表症未罷毒氣未散故有發斑之候心下煩悶嘔吐咳嗽後必下利寸脈洪數尺脈實大為病則重以陽氣盛故耳通用元參升麻湯以治之周禹載曰二陽搏病溫者死不治雖未入陰不過十日死二陽者少陽陽明也又曰溫病發於三陰脈微足冷者難治又曰溫病大熱脈反細小手足逆冷者死又曰溫病初起大熱目昏譫語脈小足冷五六日而脈反躁急嘔吐昏沉失血痙搐舌本焦黑脈促結代小者皆死又曰溫病汗後反熱脈反盛者死又曰溫病誤發汗狂言不能食脈反躁盛者皆不治華岫云曰冬傷於寒春必滿溫者重在冬不藏精也說煩勞多欲之人陰精久耗入春則裡氣大泄木火內燃強陽無製燔燎之勢直從裡發始見必壯熱煩冤口乾舌燥之候矣故主治以存精液為第一黃芩湯堅陰卻邪即此義也再者在內之溫邪欲發在外之新邪又加蔥豉湯最為捷徑表分可以肅清又曰風溫者風為天之陽氣溫乃化熱之邪兩陽燻灼先傷上焦種種變幻情狀不外手三陰為病藪頭脹汗出身熱咳嗽必然並見當與辛涼輕劑清解為先大忌辛溫消散劫爍清津太陰無肅化之權救逆則有蔗漿蘆根玉竹門冬之類也又忌苦寒沉降損傷胃口陽明頓失循序之司救逆則有復脈建中之類也大凡此症驟變則為痙厥緩變則為虛勞其主治之方總以甘藥為要或兼寒或兼溫在人通變可也治春溫病方二十八黃芩湯主方黃芩三兩炙草白芍各二兩大棗十二枚擘碎水一斗煮三升每服一升日二服夜一服黃芩加半夏生萋湯嘔吐黃芩三兩炙草白芍各二兩大棗十二枚擘碎半夏半升生薑一兩照前煮法服法此方用黃芩滌熱故為溫利主藥用白芍者酸寒入陰分一泄一收熱去而利自止也甘草大棗和中也膀胱與膽既病胃豈能獨安若嘔則明有痰飲結聚非薑半不除雖其性辛燥非伏氣所宜而去嘔則有殊央也甘草湯咽痛甘草二兩甘能治大熱桔梗湯又桔梗一兩甘草一兩此方用桔梗開肺以少陰之火上攻並其母亦病也黃連阿膠湯心煩黃連阿膠黃芩白芍雞子黃小柴胡湯三陽柴胡黃芩人參半夏甘草大柴胡湯又柴胡黃芩白芍半夏枳實大黃薑棗大承氣湯裡症大黃芒硝厚朴枳實雙解散三陽麻黃防風川芎連翹薄荷當歸白芍大黃芒硝各五錢石膏黃芩桔梗各一兩炙甘草二兩白朮荊芥山梔各二兩滑石三兩每取未三錢加生薑三片煎梔子豉湯惡寒頭痛山梔十四枚香豉四錢綿裹益元散又滑石甘草涼膈散熱甚連翹山梔白芍黃芩大黃芒硝各二錢蔥白一莖炙草五分大棗一枚葛根蔥白湯暴感川芎二錢葛根白芍知母各一錢半蔥白四個薑十片未止再服本方去知母加甘草大棗名增損葛根蔥白湯能治感冒頭痛三黃石膏湯三焦熱黃連黃芩黃柏各二錢山梔二十枚石膏五錢麻黃六分豉三錢薑三蔥白二澄清地漿水煎服半日部不出汗再服如脈數便閉上氣喘急舌卷囊縮去豉麻黃加大黃芒硝節庵殺車捶法加細茶一撮葶藶苦酒湯血熱葶藶三錢搗研取汁苦酒三合生艾汁一合如無乾艾浸搗汁水煎作三服服之取汗為度小承氣湯腹滿大黃枳實厚朴調胃承氣湯又大黃芒硝厚朴甘草黃連解毒湯煩渴黃連黃芩黃柏山梔各錢半葳蕤湯風溫葳蕤一錢半石膏二錢白薇麻黃川芎葛根羌活炙甘草杏仁青木香各一錢日三服麻黃升麻湯誤汗麻黃升麻乾薑白朮當歸知母黃芩玉竹天冬白芍茯苓甘草桂枝石膏此係正方如欲借治誤汗風溫須去二麻薑朮用以收汗愈陽旦湯冬溫桂枝白芍甘草黃芩萋棗此亦正方如欲借治冬溫有三種加法一加桔梗茯苓一加麻黃石膏一加厚朴升麻葛根湯發斑升麻葛根白芍炙甘草各一錢半犀角黑參湯又犀角黑參升麻射乾黃芩人參甘草黃芩加生薑湯溫瘧黃芩白芍炙草大棗生薑人參白虎湯又犀角大青湯斑不透犀角大青元參升麻黃連黃芩黃柏山梔甘草如脈虛熱甚去升麻芩柏加人參生地柴胡名消斑青黛飲犀角地黃湯斑色紫犀角生地白芍丹皮加藕節汁扁柏汁磨金墨汁和服荊防敗毒散溫病初起羌活獨活柴胡前胡人參赤苓桔梗枳殼荊芥川芎防風各一錢甘草五分夏熱病源流夏熱少陰病也經曰冬傷於寒夏必病熱則知熱病之由於伏寒與春溫同熱病之伏寒優於腎亦與春溫同也春溫之寒傷於冬而發於春夏熱之寒傷於冬而發於夏同一伏寒而發有異時者人有強弱邪有重輕感觸有異故也同一伏寒發於春而病名溫發於夏而病名熱者以春氣溫故病當其時亦曰溫夏氣熱故病當其時亦曰熱也春溫之伏寒優於少陰而發必由於少陽以當春而病少陽司令故少陽即為伏寒所出之途夏熱之伏寒優於少陰而發則由於陽明以當夏而病陽明司令故陽明即為伏寒所出之途也至兼見之經不一溫與熱病同溫病主方用黃芩湯以熱尚淺不必大為滌蕩也熱病主方用白虎湯以熱更熾故必重為清肅也春溫之外有不必盡由伏寒由現感春時之邪而病亦名溫者夏熱之外亦有不必盡由伏寒由現感夏時之邪而病亦名熱者春溫本自內達外無表症有表者為重感風邪治法必先撤外邪而後用黃芩湯夏熱亦自內達外無表症有表者為重感熱邪治法亦必先撤外邪而後用白虎湯此春溫夏熱固為異病而同源也茲據仲景傷寒書之言熱病者詳為論仲景曰傷寒脈浮滑此表有熱裡有寒白虎湯主之說以浮為風脈知不獨傷於寒矣滑為裡熱滑且浮知不獨熱在裡矣故表有熱不言裡而裡之熱可知裡有寒乃所以發熱之由雖言裡寒而表裡之皆熱可知故非白虎湯不能治也仲景又曰三陽合病腹滿身重難以轉側口不仁而面垢語遺尿發汗則語下之則額上生汗手足逆冷若自汗出者白虎湯主之說以腹滿熱本病也身重又濕病也口不仁等又暍病也此因中暑濕引動伏寒齊出為病故曰三陰也如此熱勢自劇故不可汗而致津液外亡不可下而致陰竭於下陽脫於上故必仍自汗方可用白虎若誤汗下而症如上不得專用白虎也宜人參白虎湯仲景又曰傷寒脈滑而厥者裡有熱也白虎湯主之說以滑者邪實也而乃曰厥是熱深厥深之謂故曰裡有熱仲景又曰傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表症者白虎加人參湯主之說以熱病無不發熱汗出者今脈浮無汗風邪襲表矣故必先辛涼解表然後熱可治渴欲飲邪耗津液也無表症邪已解也然其時元必虛矣故必加人參仲景又曰傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之說以熱病無不燥渴且煩者乃曰無大熱以背微惡寒也背為太陽經位惡寒必正氣虛矣故必加人參仲景又曰陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔滑者梔子豉湯主之若渴欲飲水口於舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之說以熱病而見傷寒浮緊之脈以本由伏寒止發於夏故反惡熱不惡寒而為熱病也腹滿等皆陽明症以本由少陰之伏寒故特見咽燥之本症也緊而兼浮其重襲風邪可知若其時兼用梔子蔥頭解外繼用白虎治本得其法矣倘誤汗以耗液誤燒針以燥血誤下以亡陰自必變生諸症漸至難救觀舌上苔滑外邪尚在可知渴而口乾舌燥外邪內入可知故必用梔豉白虎二湯也其加人參以誤治必傷液也若脈浮云云則浮為虛而熱已入膀胱矣治以豬苓湯者此之小便不利由於血分故以阿膠補虛滑石泄熱非如傷寒之便不利由於氣分必用白朮等也仲景又曰陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便也說以汗多之故而不用豬苓因津液之耗不可再泄也宜人參白虎湯仲景又曰傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之說以誤為吐下而熱邪不但不衰反為更甚故陽外虛而惡風陰內亡而燥煩大渴故非本湯不可仲景又曰服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之說以誤認為風而妄投辛熱之藥津液竭矣故有如是之症而必當用本湯也以上皆仲景妙法無可易者其言熱病而皆冠以傷寒何歟說以熱病由於冬月傷寒之伏邪雖發出而為熱病其原實由於寒故冠以傷寒字追其始也其治法以白虎湯為主者又以熱病自下發上自內發外必經陽明陽明必以石膏之辛涼乘勢升散知母之苦寒清少陰伏邪之原甘草粳米調養中州良為妙法今人不明此旨誤以白虎治傷寒既非表藥又非下藥不大謬乎總緣不知熱病之為熱病傷寒之為傷寒故冒昧若此也說所謂熱病者其時必夏至後炎暑司令相火用事之時也其症則止發熱身痛而不惡寒但大熱而不大渴之症也傷寒之時豈其時乎傷寒之症豈如是症乎故益知仲景之法之妙也然而熱病之為症更有可臚列者如熱病脈應洪大反見浮緊是又感夏時暴寒其實內伏已發故浮之則緊若重按則應仍洪盛也宜通解散去麻黃蒼朮加蔥白香豉或先以連須蔥白香豉湯去薑以解外次用白虎加人參法如熱病凡客邪所感不論脈浮脈緊惡風惡寒宜解不宜解者有通治之法宜雙解散去硝黃或再減白朮白芍桔梗二三味加蔥豉知母最妥如熱病兼衄兼喘藥必兼治宜以白虎湯為主衄加生地丹皮喘加花粉厚朴杏仁如惡熱煩渴腹滿舌黃燥或黑乾五六日不大便須用下法宜涼膈散三乙承氣湯如熱病又兼暑濕必兼清暑濕宜涼膈散合天水散用並小便不利兼利水宜竹葉石膏湯倍用石膏如熱病兼風痰須先用探吐再以涼藥熱飲被覆取汗百無一損之法宜雙解散煎好先以半碗探吐再盡劑服之如誤用辛溫藥致發斑喘滿譫語昏亂則解之宜黃連解毒湯加減用如屢下後熱勢獨盛不便再下或諸濕內盛小便黃澀大便溏小腹痛者欲作利也則解之宜黃連解毒湯夫熱病之症治亦既備矣若夫神明其間勿致妄錯是在臨症時悉心辨之庶乎其可此篇亦間採周寓載熱病論脈法靈樞曰熱病脈靜汗已出脈盛一逆也死不治醫鑑曰熱病得汗脈安靜者生躁急者死及大熱不去者亦死又曰熱病七八日當汗反不得汗脈絶者死宜與春溫脈法參看夏熱原由症治丹溪曰夏至前發為溫病夏至後發為熱病謂之伏氣傷寒正傳曰治熱病切不可作傷寒正治周禹載曰熱病七八日脈微小溲血口乾一日半而死脈代者一日死熱病七八日脈不躁或躁不散數三日中有汗三日不汗四日死熱病已汗脈尚躁喘且復熱喘甚者必死熱病不知痛處耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不治熱病汗不出大顴發赤噦者死熱病泄甚而腹愈滿者死熱病目不明熱不已者死熱病汗不出嘔血下血者死熱病舌本爛熱不止者死熱病咳而衄汗出不至足者死熱病熱而痙者死腰折瘈瘲齒禁齘也陶節庵曰冬月感寒不即病至春夏時其伏寒各隨時氣改變為溫為熱者因溫暑將發又受暴寒故春變為溫病既變之後不得復言其為寒矣所以仲景有云發熱不惡寒而渴者其理可兼溫病也暑病亦然比之溫病尤加熱也不惡寒則病非外來渴則明其熱自內達其無表症明矣治溫暑大抵不宜發汗以過時而發不在表也其伏寒至夏又感暴寒變為暑病暑病者即熱病也取夏火當權而言暑字緣其溫熱二症從冬時伏寒所化總曰傷寒所發之時既異治之不可混也若言四時俱是正傷寒者非也此二者皆用辛涼之劑以解之若將冬時正傷寒藥通治之定殺人矣辛涼者羌活衝和湯是也溫熱指歸柯韵伯曰內經論傷寒而反發熱者有三義有當時即發者曰人傷於寒即為病熱也有過時發熱者曰冬傷於寒春必病溫也有隨時易名者曰凡病傷寒而成溫者先夏至日為病溫後夏至日為病熱也夫病溫熱當時即病者不必論凡病傷寒而成者雖由於冬時之傷寒而根實種於其人之鬱火內經曰冬藏於精春不病溫此是冬傷於寒春必病溫之源先夏至為病溫後夏至為病熱中明冬不藏精夏亦病溫之故夫人傷於寒則為病熱其恆耳此至冬夏而病者以其人腎陽有餘好行淫欲不避寒冷爾時雖外傷於寒而陽氣足禦但知身著寒而不為寒所病然表寒雖不得內侵而虛寒亦不得外散仍下陷入陰中故身不知熱而亦不發熱所云陽病者上行極而下也冬時收藏之令陽不遽發寒愈久而陽愈匿陽日盛而陰愈虛若寒日少而畜熱淺則陽火應春氣而病溫寒日多而鬱熱深則陽火應夏氣而病熟此陰消陽熾從內而達於外也叔和不知此義謂寒毒藏於肌膚至春變為溫病夫寒傷於表得熱則散何以能藏設無熱以禦之必深入臟腑何以止藏於肌膚且能藏者不能變何以時換而變其所藏乎不知原其人之自傷而但咎其時之外傷只知傷寒之因不究熱傷其本妄擬寒毒之能變熱不知內陷之陽邪發見其本來面目也又謂辛苦之人春夏多溫熱病皆因冬時觸寒所致而非時行之氣不知辛苦動搖筋骨凡動則為陽往往觸寒即散或因飢寒而病者有之或因勞倦而發熱者有之故春夏因虛而感時行之氣者不少矣若夫春夏溫熱由冬時觸寒所致者偏在飽暖淫欲之人不知持滿竭津耗真陽強不能密精失守而陰虛故遺禍至春夏也內經論之脈症治法甚詳學者多不得其要領仲景獨挈發熱而渴不惡寒為提綱洞悉溫病之底蘊今內經冬不藏精之指熱論以口燥舌乾而渴屬少陰少陰者封蟄之本精之處也少陰之表名曰太陽太陽根起於至陰名曰陰中之陽故太陽病當惡寒此發熱而不惡寒是陽中無陰矣而即見少陰之渴太陽之根本悉露矣於此見逆冬氣則少陰不藏腎氣獨沉孤陽無附而發為溫病也溫病症治散見六經如傷寒發熱不渴服湯已渴者是傷寒溫病之關寒去而熱罷即傷寒欲解症寒去而熱不解是溫病發見矣如服桂枝湯大汗出後大煩渴不解脈洪大者即是溫勢猖獗用白虎加人參預保元氣於清火之時是凡病傷寒而成溫者之正法也因所傷之寒邪隨大汗而解所成之溫邪隨大汗而發焉得不虛設不加參則熱邪因白虎而歸安保寒邪不因白虎而來耶是傷寒者當補治病必求其本耳如服柴胡湯已渴者屬陽明也以法治之夫柴胡湯有參甘芩棗皆生津之品服已反渴是微寒之劑不足以解溫邪少陽相火直走陽明也是當用白虎加人參法若柴胡加人參法非其治矣夫相火寄甲乙之間故膽肝為發溫之原腸胃為市故陽明為成溫之藪若夫溫熱不因傷寒而致者只須扶陰抑陽不必補中益氣矣且溫邪有淺深治法有輕重如陽明病脈浮發熱渴欲飲水小便不利者豬苓湯主之瘀熱在裡不得越身體發黃刻欲飲水小便不利者茵陳湯主之少陰病得之二三日咽燥口乾者大承氣湯急下之厥陰病了利欲飲水者白頭翁湯主之此仲景治溫之大略也夫溫與熱偶感天氣而病者輕因不藏精者其病重此為目傷若再感風土之異氣此三氣相合而成溫疫也溫熱利害只在一人溫疫移害禍延鄰裡今人不分溫熱溫疫渾名溫病令人惡聞以辭害義矣吳又可溫疫論程郊倩熱病注俱有至理愚不必復贅鰲按此篇原本溫熱俱作溫暑以熱病當暑而發故即言暑非中暑傷暑之暑病其實夏熱病也今暑字俱改作熱欲令鵙者不至混淆耳治夏熱病方十一白虎湯主方石膏知母甘草粳米人參白虎湯通治人參石膏知母甘草粳米通解散感寒麻黃石膏滑石黃芩蒼朮甘草連須蔥白香豉湯又連須蔥白香豉生薑水煎取汗不汗加蘇葉雙解散宣解防風麻黃川芎連翹薄荷當歸白芍大黃芒硝各五錢石膏黃芩桔梗各一兩炙甘草二兩白朮荊芥山梔各二兩滑石三兩每取末三錢加生薑三片煎涼膈散不大便連翹山梔仁白芍黃芩大黃芒硝各二錢蔥白一莖炙草五分棗一枚三乙承氣湯又大黃芒硝厚朴枳實甘草天水散暑濕竹葉石膏湯利水竹葉石膏半夏人參麥冬甘草粳米黃連解毒湯誤藥黃連黃芩黃柏山梔各錢半羌活衝和湯總治羌活川芎防風生地細辛白芷黃芩蒼朮甘草濕溫症源流濕溫暑濕病也活人書所謂先傷於濕又中於暑是也說中暑則速濕溫則緩固知先受濕而後中暑也濕因暑邪遏抑陽氣故必脛冷腹滿暑挾濕邪鬱蒸為熱故必頭痛妄言多汗其脈陽濡而弱陰小而急浮為陽沉為陰也濕傷血故沉按之則陰脈小而急暑傷氣故浮候之則陽脈濡而弱也凡濕溫症切不可發汗汗之名重暍必死宜蒼朮白虎湯如有寒熱外邪必加辛涼解表之藥一二味如濕氣勝一身盡痛小便不利大便反快急宜祛濕宜蒼朮白虎湯加香茹茵陳如有寒物停滯及中寒則宜溫之必小便清白然後可如赤澀而少斷不可溫宜十味香茹飲清暑益氣湯天水散王宇泰曰昔人治濕溫通身皆潤足冷至膝下腹滿不省人事六脈皆小弱而急間所服皆陰病藥此非病本重乃藥令病重耳以五苓合白虎十餘劑少蘇更與清燥湯調理而安凡陰病厥冷兩臂皆冷今脛冷臂不冷則非下厥上行故知非陽微寒厥而合用祛熱藥也脈法仲景曰太陽病關節疼痛而煩脈沉而細者此名中濕亦曰濕痹其候小便不利大便反快但當利其小便陶節庵曰濕溫之脈寸濡而弱尺小而急濕溫症治活人書曰濕溫與中暑同但身涼不渴耳本事方曰一人季夏得病胸項多汗兩足逆冷譫語豫診之其脈關前濡關後數是濕溫說先傷暑後受濕也先用人參白虎湯次服蒼朮白虎湯足漸溫汗漸止三日而愈方廣曰冒暑遭雨暑濕鬱發四肢不仁或半身不遂或入浴暈倒口眼歪斜手足不仁皆濕溫類也宜苓朮湯茯苓白朮湯陶節庵曰素傷於濕因時中暑濕與熱搏即為濕溫其人胸腹滿身痛壯熱妄言自汗兩脛疼倦怠惡寒若發其汗使人不能言耳聾不知痛處其身青面色變是醫之殺人也葉氏醫案曰病起旬日猶然頭脹漸至耳聾正如內經所云因於濕首如裹此厄忒鼻衄皆邪混氣之象況舌色帶白咽喉欲閉邪阻上竅空虛之所諒非苦寒直入胃中可以治病病名濕溫不能自解即有昏痙之變醫莫泛稱時氣而已宜連翹銀花牛蒡子馬勃射干金汁又曰體壯有濕近長夏陰雨潮濕著於經絡身痛自利發熱仲景言濕家大忌發散汗之則變痙厥脈來小弱而緩濕邪凝遏陽氣病名濕溫濕中熱氣橫衝心包絡以致神昏四肢不暖亦手厥陰見症非與傷寒同法也宜犀角連翹心元參石菖銀花野赤豆皮煎送至寶丹治濕溫方二十二蒼朮白虎湯總治蒼朮石膏知母甘草粳米十味香茹飲又香茹扁豆厚朴茯苓甘草木瓜人參黃芪陳皮白朮清暑益氣湯又人參甘草黃芪酒當歸麥冬五味子青皮陳皮神曲酒黃柏葛根蒼朮白朮升麻澤瀉薑棗天水散又滑石六兩甘草一兩此即六一散加薄荷少部名雞蘇散能散肺加青黛少部名碧玉散能涼肝加朱砂少部名益元散能清心五苓散又肉桂白朮茯苓豬苓澤瀉白虎湯又石膏知母甘草粳米清燥湯又蒼朮白朮黃芪人參黃芩黃連黃柏甘草陳皮豬苓升麻五味神曲生地玉女煎又石膏熟地麥冬知母牛膝苓朮湯又赤苓白朮乾薑澤瀉內桂各一錢茯苓白朮湯又赤苓白朮蒼朮乾薑肉桂甘草各一錢至寶丹又犀角鎊朱砂飛雄黃飛琥珀研玳瑁鎊各一兩西牛黃五錢麝香冰片各一錢水安息香一兩無灰酒熬成膏如無以旱安息香代之金箔銀箔各十五片研極細將安息膏重湯煮和入諸藥分作百丸蠟護人參湯下牛黃膏逐穢牛黃二錢半朱砂鬱金丹皮各三錢冰片甘草各一錢蜜丸如柏子大每一丸新水下紫雪又黃金石膏寒水石滑石磁石升麻元參甘草犀角羚羊角沉香木香丁香朴硝硝石辰砂麝香兩儀膏扶虛人參熟地熬膏白蜜收犀角地黃湯清營犀角生地白芍丹皮三才湯補營天冬熟地人參復脈湯又蒼朮石膏湯遏熱蒼朮石膏知母甘草半夏瀉心湯治中半夏黃連乾薑黃芩人參炙草大棗桂苓甘露湯開下生地熟地天冬麥冬石斛茵陳黃芩枳殼甘草肉桂茯苓枇杷葉河間桂苓甘露飲滑石石膏寒水石甘草白朮茯苓澤瀉豬苓肉桂每服五錢張子和就河間方去豬苓減三石一半加人參葛根藿香木香亦名桂苓甘露飲二陳湯溫氣茯苓半夏甘草陳皮藿香正氣散又藿香紫蘇白芷茯苓大腹皮白朮陳皮半夏曲厚朴桔梗甘草薑棗陽毒陰毒源流陽毒發斑陽邪亢極病也亦或有誤服辛熱而成者金匱云陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之此陽毒之病所以昭揭於千古也說以人傷寒皆為熱病然邪在陽經久而熾盛則為毒故有陽毒之病其始陽熱之氣淫於榮衛之間因而結聚於胃上衝咽喉上焦之熱極矣而肝脾之陰於是不交其發現也面為陽明之氣所注火熱盛故面斑如錦咽與喉雖有陰陽之分為火熱所衝故痛則俱痛心本主血陽經熱盛心火並之故化為膿唾者因其病在上焦也夫陽邪成毒其為病本非傷寒傳經之比然經脈遞運五日經氣未偏猶為可治至於七日陰陽經氣已周而再行矣安可治乎仲景用升麻合生甘草以升陽散熱為君雄黃解毒為臣鱉甲當歸以理肝陰為佐蜀椒以宣導熱邪為使其製方之法實因熱邪與氣血相搏不容直折故病雖見於陽反以陰法救之並非陽毒起於陰經而用鱉甲之陰藥也況古人云病在陽者必兼和其陰此仲景於陽毒而用鱉甲之旨乎然而病之由來其端不一又有虛熱熾甚而毒不化者宜陽毒升麻湯便結去射干加酒大黃熱甚去人參加青黛又有吐下未當邪陷於內而壯熱頭項強痛燥悶不安或狂言詈罵妄見妄聞或亦面生斑紋口唾膿血或並舌卷焦黑鼻如煙煤或更下利黃赤六脈洪大而數者宜犀角黑參湯黃連解毒湯切不可用下藥勢甚者以青布浸冷水搭病人胸膛必喜熱即易之須臾得睡陽毒症治醫鑑曰三陽病深必變為陽毒或有失於汗下或本陽症誤用熱藥使熱毒陷深發為狂亂面赤眼紅身發斑黃宜黑奴丸三黃石膏湯消斑青黛飲陶節庵曰傷寒先觀兩目或赤或黃赤為陽毒脈洪大有力燥渴者輕則三黃石膏湯三黃巨勝湯重則大承氣湯下之鰲按前源流論是專言陽邪成病者此引醫鑑節庵二則皆是傷寒中之病本各不同然方藥亦有可通用者故亦附載於此陰毒發斑陰邪深極病也金匱曰陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之此又陰毒之病所以昭揭於千古也說陰毒云者乃寒邪直中陰經久而不解斯成毒也雖然直中陰經究何經歟實中於腎也中於腎遂浸淫及於肝脾也故面目為肝脾之精所布土受寒侵木乃乘之是以色青寒侵肌肉寒至必疼痛又與衛氣相爭故痛如被杖少陰脈上至咽凡有伏寒者咽必痛喉雖屬陽似不宜痛然咽與喉切近咽之陰既為寒逼而痛喉之陽亦因咽痛甚而氣相應也亦曰五日可治七日不可治者陰陽經氣總以周而再行相傳至深則難治也藥即用陽毒方而反去雄黃蜀椒之溫熱者以邪雖屬陰而既結成毒則一種陰燥之氣自行於至陰之中而陰既云燥溫之反有不可即攻之亦罕有濟故與其直折而過剛之患不若辛平而得解散之央此仲景所以單取鱉甲當歸走肝和陰以止痛升麻甘草從脾升散以化寒而毌庸蜀椒之辛溫雄黃之辛鋭直而折之也然而病之由來其端不一又有陰寒極盛而成陰毒者與仲景言陰毒自是兩種不可混也說惟陰寒至極反大熱燥渴四肢厥逆脈沉細而疾或尺部短而寸口大額上手背冷汗不止其原由房後著寒或內傷生冷寒物而犯房事內既伏陰又加外寒相搏積寒優於下衛陽消於上遂成陰盛格陽陽氣上脫之候也後五六日胸前發出紅斑其色淡其點小是為陰斑雖盛暑亦必須熱藥宜附子理中湯甚至身重睛疼額出冷汗嘔噦厄忒或爪甲青或腹絞痛或面赤足冷厥逆燥渴不欲飲或身發青黑色斑口鼻灰色舌黑而卷莖與囊俱縮脈沉細而遲或伏而不出或疾至八九至而不可數急用蔥餅子臍上尉之內速服藥宜附子散或人參三白合四逆湯藥之尉之手足不和暖者死不治總之前一症純陰之極畜熱自深於內法當如仲景之治後一症則止陰寒凝結非用回陽退陰之劑內溫正氣逼出外邪斷不能起死而回生也宜正陽散復陽丹還陽散破陰丹退陰散回陽救急湯趙以德又曰古方書謂陽毒者陽氣獨盛陰氣暴衰內外皆陽故成陽毒陰毒者陰氣獨盛陽氣大衰內外皆陰故成陰毒二者或傷寒初得便有是症或服藥後變而成陽毒治以寒涼陰毒治以溫熱藥劑如冰炭之異仲景以一方治之何也且治陰毒去蜀椒雄黃反去其溫熱者矣豈非一皆熱毒傷於陰陽二經乎在陽經絡則面赤如錦紋唾膿血在陰經絡則面青身如被杖此皆陰陽水火動靜之本象也其曰七日不可治者陰陽之津氣血液皆消滅也傷寒七日經氣已盡而此加之以毒至七日不惟消滅其陰且火亦自滅矣趙氏此說是單就仲景所言之陽毒陰毒論之但其曰一皆熱毒傷於陰陽二經雖於理不至大悖究不免有語病說陰毒之由乃是陰燥陰燥者陰極而反化燥是其燥是由陰出非熱邪傷及陰經之故也若傷及陰經則是外乘之熱矣而何能成陰毒之病乎因益知醫關生死不可以躁心嘗不可輕心掉也願為醫者勖之陰毒症治入門曰三陰經病深必變為陰毒其症四肢厥冷吐利不渴靜倦而臥甚則目痛鄭聲加以頭痛頭汗眼睛內痛不欲見亮面唇指甲青黑手背冷汗心下結硬臍腹築痛身如被杖外腎冰冷其脈附骨取之則有按之則無宜甘草湯正陽散陽氣乍復或生煩躁者破陰丹復陽丹不可用涼藥又云此症多面青舌黑肢冷多睡醫鑑曰一人傷寒四肢逆冷臍下築痛身痛如被杖說陰毒也急服金液丹來復丹等藥其脈沉遲而滑雖陰而有陽脈可至仍灸臍下百壯乃手足溫陽回得汗而解鰲按前陰毒源流乃陰邪成病者此引入門醫鑑二說亦是傷寒中之病然症狀方藥亦有相通才是故又附録於此神而明之化而裁之是在醫者治陽毒方九升麻鱉甲湯總治升麻鱉甲蜀椒雄黃當歸甘草陽毒升麻湯又升麻犀角射干黃芩人參甘草手足汗則解不解重作犀角黑參湯又升麻犀角射干黃芩人參甘草黑參此即陽毒升麻湯加黑參一味也黃連解毒湯又黃連黃芩黃柏山梔各一錢半黑奴丸又麻黃大黃各二兩黃芩釜底煤芒硝灶突墨梁上塵小麥奴各一兩蜜丸彈子大新汲水化服須臾振寒汗出而解未汗再服此方能治陽毒發斑煩躁大渴脈洪數者陽毒及壞傷寒醫所不治精魂已竭心下尚暖斡開其口灌藥下咽即活若不大渴不可與此藥三黃石膏湯又石膏三錢黃芩黃連黃柏山梔各錢半麻黃六分香豉半合薑三片細茶一撮消斑青黛飲又黃連甘草石膏知母柴胡元參生地山梔犀角青黛人參薑一棗二水煎入苦酒一匙服大便實者去人參加大黃此陶節庵方也治熱邪傳裡裡實表虛血熱不散熱氣乘於皮膚而為斑也輕則如疹子重則如錦紋重甚則斑爛皮膚或本屬陽症誤投熱藥或當下不下或下後不解皆能致此不可發汗重令開泄更加斑爛也然而斑之方萌與蚊迹相類發斑多見於胸腹蚊迹只在於手足陽脈洪大病人昏憒先紅後赤者斑也脈不洪大病人自靜先紅後黃者蚊迹也其或大便自利怫鬱氣短燥屎不通又如果實黶者盧扁不能施央矣凡汗不解足冷耳聾煩悶咳嘔便是發斑之候三黃巨勝湯又石膏三錢黃芩黃連黃柏山梔各錢半芒硝大黃各一錢薑一片棗二枚入泥漿清水二匙服大承氣湯又大黃芒硝枳實厚朴治陰毒方十三升麻鱉甲湯總治方詳上附子理中湯又附子乾薑甘草人參白朮附子散又附子乾薑肉桂當歸白朮半夏生薑人參三白合四逆湯又人參白芍白朮白茯苓生薑附子乾薑甘草大棗正陽散又附子一兩炮薑炙草各二錢半皂角一挺麝香一錢每末二錢水一盞煎五分連渣熱服一方用白湯調下此方兼治傷寒門之陰毒復陽丹又蓽澄茄木香吳萸全蠍附子硫黃各五錢乾薑一錢酒糊丸每二三十丸薑湯下復以熱酒送之取汗此方治陰毒面青肢冷脈沉還陽散又硫黃為末每二錢新汲水調下良久或寒一起熱一起再服汗出而差此方治陰毒面青肢冷脈沉心躁腹痛破陰丹又硫黃五兩硝石元精石各二兩乾薑附子肉桂各五錢各為末用鐵銚先鋪元精次鋪硝石各一半中鋪硫黃末又鋪硝石末再鋪元精末以小盞說著用炭三斤燒令得所勿令煙出急取瓦盆合著地上候冷取出入餘藥同為末糊丸每二十丸艾湯下取汗此方治陰毒脈伏及陽脫無脈厥冷不省退陰散又川烏乾薑等分為粗末炒令轉色放冷再研細末每末一錢鹽一捻水少部煎溫服回陽救急湯又人參白朮茯苓陳皮半夏乾薑附子肉桂炙草五味子各一錢薑七片甘草湯又炙甘草升麻當歸桂枝各一錢雄黃川椒各錢半鱉甲二錢水煎服毒從汗出未汗再服金液丹又來復丹又元精石硫黃硝石五靈脂陳皮青皮
