body:
  text: 卷五腫脹源流痞滿腫脹脾肺腎三經病也考內經五臟六腑五運六氣司天在泉勝復淫鬱無不成腫脹之病而張介賓以為未有不干於脾肺腎三臟者其意以脾主運化精微肺主氣行治節腎主五液而行水凡五氣所化之液悉屬於腎五液所行之氣悉屬於肺輸轉二臟利水生金悉屬於脾所以腫脹之生無不由三者失職旨哉洞本之論也然又必先腎氣不足下氣厥上三合而成經曰厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹又曰五臟陽已竭又曰合之於真三合乃得夫厥氣在下此病根也人身上下陽布陰生則肺行而腎納於何有厥厥氣在下則肺不行而腎失納矣至氣已厥必營衛之流行經絡者留止無根之陰氣於是逆上與真氣相搏寒留而不行乃合為脹也況臟陽即元運之氣臟陽竭諸停而不行可知其曰合立於真三合乃得者人之脹雖由衛逆於營而既在血脈則合經絡合臟合腑陰陽俱有故曰三合乃得特厥氣在下究為脹之本耳故經又以診之而其脈大堅以澀者為脹說大者邪氣盛也堅者邪氣實也兩氣相攻脹勢已成故其脈大堅以厥於陽而實也澀者氣血虛而不流利也是為陰氣衰陰氣衰即真氣衰此厥於陰而虛也陰虛陽堅中氣已損能勿脹乎是以澀而堅者其病在陰即脹在臟經故曰陰為臟大而堅者其病在陽則脹在腑經故曰陽為腑於是有脈脹有膚脹有五臟脹有六腑脹而又有水脹有鼓脹有蠱脹有單腹脹有石水種種之症而其為症又虛實不倫虛中有實實中有虛行實當顧虛補虛無忘實而其要惟大補脾腎以培根本則得之矣至於辨驗虛實莫善於士材其說云陽症必熱熱者多實陰症必寒寒者多虛先脹於內而後腫於外者為實先腫於外而後脹於內者為虛小便黃赤大便祕結者為實小便清白大便溏泄者為虛脈滑數有力者為實脈浮弦細澀者為虛色紅氣粗者為實色瘁聲短者為虛凡實或六淫外客或飲食內傷陽邪急速其至必暴每成於數日之間凡虛或情志多勞或酒色過度日積月纍其來有漸每成於經月之後故治實易治虛難士材之言當奉以為則而於虛實疑似之間復能察脈審形辨別毫釐庶無實實虛虛之害試先即脹病條分之經曰五臟六腑各有畔界病各有形狀營氣循脈衛氣逆之為脈脹說清者為營營行脈中其氣專精末即致脹濁者為衛衛行脈外其氣懍疾滑利而行肉分此必由衛氣之逆而後病及營而為脈脹也是知凡病脹皆發於衛經又曰衛氣並脈循分為膚脹說衛氣逆而並於脈復循肉分之間故為膚脹然脹無常所既脹皮膚即排臟腑而廓胸脅凡膻中心主之宮城脾之太倉咽喉小腸之傳送胃之五竅閭裡門戶廉泉玉英之津道應無不受脹者又曰心脹者短氣煩心臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引少腹脾脹者善噦四肢煩冤體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴濯濯而痛冬日重感於寒則飧泄不化小腸脹者少腹填脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息以上經言臟腑之脹總以治脹藥為主宜藿香正氣散木香調氣散薊子湯等各加引經之劑療之心黃連細辛肺桔梗升麻白芷肝柴胡川芎青皮吳萸脾升麻蒼朮葛根白芍腎獨活知母細辛肉桂胃白芷升麻葛根石膏大腸白芷升麻黃芩石膏小腸黃柏藁本赤苓木通膀胱滑石羌活三焦柴胡連翹下焦地骨皮膽柴胡青皮連翹方為正治經又曰膚脹者寒氣客於皮膚之間然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也說以寒客皮膚間附氣不行病在氣分故有聲若鼓氣無形故不堅氣無不至故腹大身盡腫凡腫因水則皮澤而薄因氣故皮厚氣在膚腠故按散之猝不起腹皮厚故色不變此膚脹乃氣病也宜加味枳朮丸前文言膚脹以脹必見於膚乃總言致脹之由此則專為一症也經又曰鼓脹者腹脹身皆大大與膚脹等色蒼黃腹筋起此其候也此鼓脹亦氣分病故與膚脹相似惟腹有筋起為異但膚脹病根在肺鼓脹病根在脾由脾陰受傷胃雖納谷脾不運化或由怒氣傷肝漸蝕其脾牌虛之極故陰陽不交清濁相混隧道不通鬱而為熱熱留為濕濕熱相生故其腹脹大中空無物外皮繃急旦食不能暮食也但臍突出肚見青筋皮光如油皆不治脈亦喜浮大忌虛小說鼓有土敗木賊之象濕熱相兼猶饅頭得火與湯乃發胖治者先令卻鹽味厚衣衾斷妄想禁忿怒以調和氣血藥必大補脾土養肺金健金能制木脾無賊邪之害宜調中健脾丸更審虛實權輕重辨其所因而以蘇梗厚朴木通陳皮柴胡白芍大腹皮延胡索為主寒加熱熱加寒虛加補皆制為大劑服數十帖亦有生者久服藥忽手足腫病為自內遠外不久愈若自手足腫至腹病為從外入內難治其或朝寬暮急或朝急暮寬或先脹後喘宜治脾二陳湯或先喘後脹宜治肺寧肺湯雖多分別大法不外乎此曷言乎辨其所因也說同屬鼓脹有因六氣而成者宜藿香正氣散有因七情而成者宜沉香降氣散有因飲食傷而成者必嘔吐噯嘻而脹宜香砂調中丸有因畜血而成者必青紫筋見小便仍利宜代抵當湯有因憂思太過而成者必二便不利脈虛澀腸鳴而脹宜蘇子湯有因血熱而脹者必喘燥虛汗肢厥溲赤屎黑而脹宜人參芎歸湯有因氣為痰所隔而成者必心下堅滿而脹宜加味枳朮湯有因積聚痞塞而成者必膈滿嘔吐口苦吞酸而脹宜枳殼散有因瀉久而成者必多虛羸狀而脹宜六君子湯有因老人虛寒而成者必氣弱惡寒不善食而脹宜先服香朴九再服人參養榮湯或二方參用有因婦人産後敗血入胞而成者必胞不下而脹血消即宜奪命丹其或素虛弱或過服峻劑而患鼓症必補之宜朝服金匱腎氣丸晚服補中益氣湯或壯實人而患鼓症不妨攻之宜先服五痺散二劑再按法服石斡散風諸鼓脹之因如此至如蠱脹又是一症不得混蠱為鼓乃由脾胃家濕熱積滯或內傷瘀血而成說人之腹中雖長蛔寸白皆賴以消宿食然太多即為病況如白蟯三尸食肛應聲赤九種腸疰疳癆瘕等蟲為類不一皆能使心腹作痛而脹甚則面青口涎治以補脾健胃為主兼用消導其或因跌撲閃挫負重努力致血瘀於內而成脹痛亦以補脾健胃為主兼用去瘀生新之品宜參用參朮健脾丸士材新制陰陽攻積丸說所謂蠱者若蟲侵蝕有蠱壞之義而蠱與鼓之脈亦相反蠱脈必實鼓脈必浮蠱與鼓之形更相異蠱之脹以手按腹隨手而起以其為蟲血之積而實也鼓之脹以手按腹凹而不趣以其為氣而虛也二者皆非輕病此外更有脹滿之病雖亦腹脹卻不至腫不如鼓脹之生死相關或因傷食消導可已宜香砂調中丸或因氣滯行氣即痊宜木香順氣散有久有暫實者峻下之宜承氣湯上鬱則奪之也畜血者用破血藥宜桃仁承氣湯病後氣虛作脹惟補益元氣宜補中益氣湯使元氣歸元即愈又有單腹脹即俗名蜘蛛鼓其症四肢不腫但腹脹其原皆由脾氣虛而傷風與食宜調中健脾丸至若腹脹經久忽瀉數升日夜不止服藥不效為氣脫最難救治惟濃煎益智仁湯服之立愈且夫脹與腫內因則各殊而外形多相似要有其易辨者如先腹大後四肢腫為脹病先頭足腫後腹大是水也但腹腫四肢竟不腫為脹病臍腹四肢悉腫是水也皮厚色蒼或一身皆腫或自上而下為脹病皮薄色白或自下而上是水也至若脹病有腫有不腫腫病有脹有不脹皆當分辨茲更即腫病而條分之腫不一而為害莫有大於水腫者經曰水始起也目窠上微腫如新起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也頸脈者足陽明人迎陽明胃脈自人迎下循腹裡水邪乘之故頸脈動水之標在肺故時咳陰邪結陰分故陰股間寒也又曰三陰結謂之水三陰者太陰脾也太陰為六經之主三陰邪結則坤土不能運精如是而二陰腎獨主裡而氣更盛反來侮土故氣盛陽不得入陽不得入則肺氣不得通調斯寒水不行而壅故成水腫之病說中州結則氣壅而關門不利不利則水聚而從其類類者本在腎標在肺也此言腎與肺之水因脾虛而類聚者又曰肺移寒於腎謂之湧水湧水者水氣客於大腸如囊裹漿者形寒飲冷肺氣不足則肺寒母病傳子則寒可移於腎腎本寒水以寒濟寒故水氣不升而為涌涌不於腎而於大腸大腸為肺下流故如囊裹不能散也此言肺腎之寒之水相移而由臟歸腑者以上皆致水之原也由是觀之水之為病有不由脾土虛弱不能制水水逆上行干及於肺滲透經絡流注溪谷灌入隧道血亦因而化水精亦因而化水者乎顧嘗反復究之水雖制於脾實主於腎腎水臟也元氣寓焉若土陽虛則命門火衰既不能自制陰寒又不能溫養脾土陰陽不得其正則化而為邪說氣即火陰即水陽旺則化而精能為氣陽衰則不能化而水即為邪也夫火盛水虧則病燥水盛火虧則病濕故火不能化則陰不從陽而精氣亦皆化為水所以水腫又未有不由於陽虛腎為胃關不惟腎氣不化而閉即胃亦能令關閉故水之聚不待腎水後成即所飲湯水亦聚而為患說胃主中焦為水谷之海胃和則升降出納之氣行水谷從其道而輸泄胃不和則出納之關滯水谷之液皆積而成水故經言胃所生病大腹水腫膝臏腫痛又言五谷精液因陰陽不和則並於腸胃中留於下焦不得沁入膀胱則下焦水溢而為水脹又言腎者牝臟勇而勞甚則腎汗出遇於風內不得入臟腑外不得越皮膚客於元府行於皮裡傳於跗踵本之於腎名曰風水所以水腫又未有不由於胃虛經又曰肝腎脈並浮為風水說肝腎同居下焦腎為陰主靜脈常沉肝為陽主動脈常浮二臟俱有相火動於腎者猶龍火出於海動於肝者猶雷火出於澤龍起而火隨風發而水隨今水從風是以腎與肝並浮猶言腎脈本沉因從肝化而與之俱浮也所以水腫又未有不由於肝盛經又曰三焦為決瀆之官水道出焉者氣化也氣即是火三焦病氣滿小腹光堅不得小便溢則水流作脹以火衰則水勝也所以水腫又未有不由於三焦病夫既明其水之所由來當必稔乎水之所由治其一為水腫之常法腫在腰以上者宜發汗即經所謂開鬼門也鬼門即腠理宜麻黃羌活防風柴胡牛蒡子蔥白忍冬藤以開之或用柳枝煎湯洗腫在腰以下者宜利小便即經所謂潔淨府也淨府即膀胱宜澤瀉木通香茹甘草燈心冬葵子蜀葵子葶藶防己崑布海藻海金沙赤小豆茯苓豬苓青蛙海蛤白螺鯉魚鯽魚白魚鱸魚緑頭鴨秋石代鹽以潔清之上下分消使陰陽平治水氣可去即經所謂去菀陳莝是也菀者積也陳者久也莝者腐也宜甘遂芫花大戟牽牛子續隨子同大麥麵作麵食或商陸同赤粳米作飯日食大效或郁李仁酒服七七粒或末之和麵作餌食或老絲瓜巴豆拌炒又同陳粳米炒去巴豆丸服然皆治其標而已尤當理氣養脾以治其本治本宜參朮健脾丸使脾氣實而健運則水自行故宜以參朮為君更視水之所屬或為陰或為陽加減治之說病水者脾必虛故必健脾為主也其一治水腫太甚者權宜之法大抵水腫多由肝盛脾弱之人肝盛則觸怒益脹而干於脾脾弱則食傷不化而生濕濕鬱甚則化為水上至頭下至足中滿身之前後浮腫如匏寒冷如石行坐臥起不安本宜專利小水以除其腫但腫勢太甚內而膀胱外而陰囊相連緊急道路阻塞即欲利小便苦無一線之通惟宜權開大便以逐水隨下而隨補逐水宜硝黃等補救宜參朮等漸漸調理可痊若腫不極甚只宜利小水以治標養脾胃以治本而水有陰陽之別陽水多外因或涉水冒雨或感風寒暑濕其腫先現上體其脈沉數其症兼發熱煩渴溲赤便祕輕則四磨湯五苓散重則疏鑿飲子陰水多內因因飲水及茶酒飢飽勞役房勞其腫先現下體其脈沉遲其症兼身涼不渴溲清便利或溏宜實脾飲或小便照常時赤時不赤晚則微赤卻不澀亦屬陰也宜先用木香香附烏藥茯苓豬苓等次進復元丹未可驟補宜分次第治之有一身惟面與足腫早則面甚晚則足甚面腫為風宜白蒺藜益母草杏仁葶藶防風崑布甘遂鬱李仁足腫為水宜防己香附麻黃赤小豆等或敗荷葉同藁本煎湯洗或杏葉蔥白楠木桐木煎洗更須察二便通祕別其陰陽治之即用前文陽水陰水之藥水之脹腫又有內外之別先脹於內後腫於外者小便赤澀大便祕結色澤紅亮聲音高爽脈滑數而有力實熱也宜以治脾為主宜木香沉香砂仁枳實厚朴蒼朮大腹皮兼理肺宜桑皮葶藶枳殼蔻仁桔梗蘇子陳皮專利小便宜木通通草茯苓防己車前子澤瀉豬苓或發汗宜麻黃防風羌活川芎桂枝如氣壯年少新病者必瀉其實熱硝黃亦可酌用先腫於外後脹於內者小便淡黃大便不實氣色活白語音低怯脈微細而無力虛寒也宜以補脾為主宜陳皮白朮茯苓甘草兼補肺理氣補肺宜人參黃耆桔梗苡仁理氣宜沉香木香陳香櫞佛手專利小便宜五苓散或發汗宜升麻柴胡如虛甚多寒必須大劑頻投方可救援宜多用參朮即桂附乾薑吳茱萸亦可選用古人以金匱腎氣丸治水誠為切要至其他藥品有與本病相關者亦須研核其所以然如白芍能於土中瀉木忍冬藤能和緩下氣木瓜赤豆利水下氣交長片腦雄雞金溫中與寬膨並用牙皂夾燒灰存性神麯為丸取利甚捷雞屎白炒熱袋盛浸酒空心飲下水大奇青蛙入豬肚烹為饌皆奇方立效水之脹腫在女科又有氣分血分之別先病水脹經水後斷因而心胸堅大病發於上者屬氣分宜木香調氣散經水先斷後病水脹因而血結胞門病發於下者屬血分宜代抵當湯而又有上半身腫太甚者宜羌活防風升麻白芷蘇葉有下半身腫太甚者宜五苓散加蒼朮木通有腫而心腹堅脹喘滿者宜當歸散有頭身俱腫腹前脹疼者宜蟠桃丸有腫而不能食不能臥小便祕者宜白朮木香散有大病後腫明屬脾虛不能通調水道者宜補中益氣湯送六味丸有腎水不足虛火爍金小便不生而患腫者急補之宜補中益氣湯六味丸互用久服自效誤與疏風行水將貽性命之憂宜急投金匱腎氣丸尚前救有血熱生瘡變為腫病煩渴小便少者經曰純陽者腫四肢此熱症也如便閉更須和氣宜消風敗毒散有遍身水腫喘滿小便閉澀諸藥不效者宜導水茯苓湯有腫而因於風者宜黃耆防己湯有腫而因於寒者宜中滿分消湯有熱者忌有腫而因於熱者宜中滿分消丸有寒者忌或神芎導水丸有腫而因於濕者宜二蛟散如虛宜間服加味胃苓丸此二方百發百中無不效有孕婦遍身浮腫腹脹滿小便不利者宜防己湯葶藶散有産後腫滿喘息而渴小便不利者宜大調經散凡此皆水病之支分派委所可溯流以窮源者也吾因舉水之發源於五臟者而分言之大凡水腫必有目胞上下浮胖肢體沉重咳嗽怔忡腰間清冷小便黃澀皮膚光亮諸狀今若心水病必兼身重少氣不得臥煩而躁其陰必大腫肝水病必腹大不能轉側脅腸痛時時津液生小便續連肺水病必身腫小便難時鴨溏脾水病必腹大四肢重津液不生少氣小便難腎水病必腹大臍腫腰痛不得臥陰下濕足逆冷面黃瘦大便反堅皆當審形辨脈知其水從何經而來於治水藥中各加引經之品以開導之各引經藥己詳在前五臟之外又有九種水其根緣症狀治法有可一一明之者一曰青水先從兩脅腫起根在肝主治宜大戟二曰赤水先從舌根腫起根在心主治葶藶三曰黃水先從腰腹腫起根在脾主治甘遂四曰白水先從足腫起根在肺主治桑皮五曰黑水先從陰上腫起根在腎主治連翹六曰元水先從面頰腫起根在外腎主治芫花七曰風水先從四肢腫起根在膀胱主治藁本八曰高水先從少腹腫起根在小腸主治巴霜九曰氣水或盛或衰根在三焦主治赤小豆上九種藥等分配合主治某經者倍之蜜丸赤茯苓湯下三丸日三服忌鹽二三十日自愈凡患水腫者皆自此推之可知其所從來而治之不差矣大約水腫之病唇黑傷肝缺盆平傷心臍突傷脾背平傷肺足心平傷腎五傷者必死不可不知之也血腫一症尤為奇害其為狀四肢浮腫皮肉間必有紅痕赤薄皆由血溢離經留滯於中與水濕相化因變為水也宜調榮飲或酌用代抵當湯而産婦敗血留滯以致化水亦能成腫必四肢浮面皮黃宜小調經散不論婦人女子經水為患亦能化水四肢腫小便不通此血不歸經之故宜椒目丸三者皆不易治皆水腫病之類也石水一症內經雖有其名卻無明文然本章雖末詳言而陰陽別論篇曰陰陽結邪多陰少陽曰石水少腹腫以既見於陰陽篇故不必重出也並非闕文其理自可互參邪應作斜陽結腫四肢是在陽之發處陰結便血是在陰之聚處今邪交入陰陽而交結之勢必結於陰陽之所共生處矣生陰惟腎生陽惟膽皆根原下焦而腎職行水膽職沁水若兩家交壅正所謂不能通調水道也然陰多陽少則腎病為多腎病則陰之真水沉寒而無陽以化氣此病固不在膀胱而在腎腎既留水不能化精故石堅一處惟見少腹而不及他所也水蠱一症因水毒之氣結聚於內遂令其腹漸大動搖有聲常欲飲水皮膚粗惡其原多因他病久而變成說亦有蠱敗之義焉故亦名蠱其為症治有可指陳者或因雨濕而浮腫宜平胃散加白朮赤苓草蔻仁或飲水過多而浮腫宜胃苓湯或久喘後積水氣而浮腫宜葶藶丸或久瘧變水氣而浮腫宜黃甲丸或久痢變水氣而浮腫宜補中益氣湯加附子此等皆水症之別也而水症之外又有結陽症內經曰結陽者腫四肢注曰素嘗氣疾濕熱加之氣濕熱故為腫也邪氣漸甚正氣漸微陽氣衰少致邪伐正氣不能宣通故四維發腫諸陽受氣於四維也今人見手足關節腫痛概以為風症治者誤矣宜犀角湯嗟乎脹腫之為患重且大如此倘忽視之不兒委人命於草莽乎業師孫慶曾先生嘗謂餘曰脹腫門惟水病難治其人必真火衰微不能化生脾土故水無所攝泛溢於肌肉間法惟助脾扶火足以概之而助脾扶火之劑最妙是五苓散肉桂以益火火暖則水流白朮以補土土實則水自障茯苓豬苓澤瀉以引水則水自滲泄而可不為患每見先生治人水病無不用五苓散加減無不應手而愈如響應者可見無人不知五苓散而不能用治水病以致決潰而死者皆未明病之根源方之奧妙而尊之信之加減以收央也然其加減則必有神明乎藥物之性洞悉乎病根所在者而後所加所減悉與原方配合悉與本病無乖故可投之立效否亦無益也脈法內經曰其脈大堅以澀者脹也又曰脈盛而緊曰脹脈訣曰脹滿脈弦脾制於肝洪數熱脹遲弱陰寒浮為虛滿緊則中實浮則可治虛則危急得效曰關上脈虛則內脹遲而滑者脹虛而緊澀者脹或弦而遲或浮而數皆脹也又曰諸氣脹滿浮大可治虛小難治此係脹滿之脈仲景曰脈得諸沉當責有水身體腫重脈經曰水病脈大者可治微細者不可治水病腹大如鼓實者生虛者死東垣曰水氣得沉脈則逆此陰脈也得效曰水氣浮大則宜沉細則愈而復作又曰上氣浮腫浮滑可安微細難治正傳曰水腫脈多沉伏又曰病陽水兼陽症脈必沉數病陰水兼陰症脈必沉遲三因曰陽虛陰實為水必矣此係浮腫脈脹滿為真臟病丹溪曰脹滿由脾虛之極乃真臟病如反胃癆瘵亦皆真臟受病凡人真臟不病則五行相生相制以適於平雖不服藥而自愈如火極傷金有水以制之有土以生之之類所謂亢則承害乃制也雖然亦有惡藥忌醫而誤之者說正氣與病邪不兩立一勝則一負久則病劇正脫而不免於死然則有病不服藥可乎不延醫可乎脹滿症治內經曰飲食不節起居不時者陰受之陰受之則入五臟入五臟則填滿閉塞又曰腹滿填脹支膈胠脅下厥上冒過在足太陰陽明又曰脹者皆在於臟腑之外排臟腑廓胸脅脹皮膚故命名脹內經注曰寒氣在上聚而不散則成脹脈經曰胃中寒則脹滿仲景曰腹滿按之痛者為實不痛者為虛又曰腹脹時減復如故此為寒宜溫之又曰脹滿不減減不足言須當利之入門曰凡脹初起是氣久則成水治比水腫更難說水腫飲食如常鼓脹飲食不及每病根深痼必三五年而後成治腫補中行濕足矣治脹必補中行濕兼以消導更斷鹽醬音樂妄想不責速效乃可萬全又曰脹有虛實虛脹陰寒為邪吐利不食時脹時減按之則陷而軟實脹陽熱為邪身熱咽乾常脹內痛按之不陷而硬醫鑑曰中滿腹脹者其面目四肢不腫而肚腹脹起中空似鼓者是也本事曰臍腹四肢悉腫者為水但腹脹四肢不甚腫者為蠱蠱即脹也回春曰脹病亦謂鼓脹其脅痛面黑是氣鼓脅滿少腹滿身上有血絲薄是血鼓噯氣作酸飲悶脹腹是食鼓惡寒手足厥冷瀉水是水鼓胸腹脹滿有塊如鼓者是痞散成鼓脹病有七醫旨曰一曰寒脹腹滿濡時減吐利厥冷宜溫之二曰熱脹以陽並陰則陽實陰虛陽盛生外熱陰虛生內熱脈必浮數浮為虛數為實陰虛不能宣導飲食如故腹中脹滿者為實脹三曰谷脹即食脹失飢傷飽痞悶停酸朝則陰消陽長谷氣易行故能食暮則陰長陽消谷氣難化故不能食是為谷脹四曰水脹脾主水濕水浸腸胃而溢皮膚漉漉有聲怔忡喘息者是五曰氣脹七情鬱結氣道壅塞上不得降下不得升身體腫大四肢瘦削六曰血脹煩躁漱水迷忘驚狂痛悶嘔逆小便多大便黑婦人多有之七曰蠱脹但腹脹而四肢頭面不腫是也而此症之類又有名蜘蛛蠱脹者單腹腫大四肢極瘦皆由脾氣虛極真臟已傷病也古方雖有諸蠱保命丹用肉蓯蓉三兩紅棗青礬各一斤入罐內煅煙盡為末再將香附一斤便制麥芽一斤半炒為末和前末糊丸食後酒下二三十丸以治之者然為死症未必盡效也脹滿不治症靈樞曰腹脹身熱脈大一逆也腹鳴而滿四肢清泄脈大二逆也腹大脹四末清脫形泄甚三逆也腹脹使血四逆也並不治得效曰腹脹末久或脹或消腹皮稍軟不泄不喘此則隨治隨差若臍心突起利後腹脹急久病羸乏喘息不得安名曰脾腎俱敗不治又曰腹滿咳逆不得小便不治腹大滿而下泄不治綱目曰腹滿或兼身熱或兼如瘧皆不治直指曰久病羸乏卒然腹滿喘息不得與夫臍心突起或下利頻頻末見一愈者矣浮腫微兆內經曰諸有水氣者微腫先見於目下以水者陰也目下亦陰也腹者至陰之所居故水在腹也必使目下先腫也鰲按如男子陰囊女人陰戶兩傍亦必先微腫又曰腰脊者身之大關節也肢脛者人之管以趨翔也莖垂者身中之機陰精之候津液之道也故飲食不節喜怒不時津液內溢乃下流於睪血道不通日夜不休俯仰不便趨翔不能此病滎然有水也浮腫形症內經曰水病下為䯒腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥又曰濕勝則濡泄甚則水閉跗腫仲景曰水病有五種一風水其脈自浮外症骨節疼痛惡風二皮水脈亦浮外症跗腫按之沒指不惡風其腹如鼓不渴當發其汗三正水脈沉遲外症自喘四石水脈沉外症腹滿不喘五黃汗脈沉遲身發熱胸滿四肢頭面腫久不愈必生癰膿又曰久則肌肉潰爛陰囊足腫水出直指曰其狀目胞上下微腫如裹水通身浮腫喘咳怔忡股間清涼小便澀黃皮薄而光手按成窟舉手即滿此浮腫也浮腫可治不治症入門曰凡浮腫陰囊軟者可治又曰男從腳下腫而上女從頭上腫而下皆為逆不治得效曰浮腫善症男從上而下女從下而上所患未久旋利腫退喘定則愈矣又曰凡水腫大喘氣粗不食乃腎水盈溢上行旁侵於肺也不治直指曰大凡腫病先起於腹而後散於四肢可治先起於四肢而後入於腹不治又曰蠱脹而肚上有青筋或腹滿而大便滑泄或久瘧而變作虛浮與夫肝傷而唇黑心傷而缺盆平脾傷而臍突腎傷而足心平肺傷而背平皆不治之症又曰卒唇腫而蒼黑者死掌腫無紋者死臍腫凸出者死陰囊陰莖俱腫者死脈絶口張足脹者死足跗腫脹如斗者死水腫禁忌入門曰凡水腫極忌甘藥助濕作滿本草曰病嗽及水全宜忌鹽胸腹脹悶導引保生祕要曰雙手交叉低頭觀臍以兩手貼胸口將身往下不論數推沸能寬胸脹止腹疼兼後央效運央保生祕要曰先定歸元後行斡旋至胸前捘撤散法左右分開如末通暢以艮背佐之無不效矣臌脹導引保生祕要曰坐定擦手足心極熱用大指節仍擦摩迎香二穴以暢肺氣靜定閉息存神半晌次擦手心摩運臍輪按四時吐故納新從玄雍竅轉下至丹田捫氣面撮谷道緊尾閭提升泥丸下降宮復氣海周天一度如此七七身心放下半炷香部如久病難坐用得力人扶背慎勿早睡恐氣脈凝滯神魂參錯效難應期手足可令人摩擦患輕者一七能取大效重則二七三七五臌盡消屢屢取驗妙入神也運央保生祕要曰反瞳守歸元念四宇訣定後斡旋推入大腸曲行提回抱守能情鼓脹氣脹加推散四肢時吐濁吸清飲食宜少降氣安心而食自然加或病酒過用湯水而成宜通其二便摩臍輪腎輪二穴吹噓其氣或開腠埋以泄微汗其脹自效血脹加運血海效痞滿脾病也本由脾氣虛及氣鬱不能運行心下痞塞填滿故有中氣不足不能運化而成者有食積而成者有痰結而成者有濕熱太甚而成者虛則補其中氣宜調中益氣湯實則消食宜資生丸豁痰宜豁痰丸除濕宜二陳湯加豬苓澤瀉有濕熱清熱宜當歸拈痛湯而消導之亦不可用峻劑致傷元氣又有傷寒下早因而成痞結胸則從傷寒門治之夫痞與脹不同痞則內雖覺其痞悶而外無脹急之形痞只見於胸脅脘膈間脹則連腹少腹都急也脈法仲景曰凡痞關脈須沉若關脈沉者三黃瀉心湯痞滿症治仲景曰心下滿而不痛此為痞陶節庵曰胸滿者胸膈間氣塞滿悶也非心下滿脅滿者脅肋下氣填脹滿也非腹中滿說邪自表傳裡必先胸脅以至心腹入胃是以胸滿多帶表症宜發汗惟脅滿多帶半表半裡小柴胡湯加枳實和之治腫脹方五十六藿香正氣散總治藿香紫蘇白芷厚朴桔梗茯苓半夏陳皮甘草腹皮薑燈心木香調氣飲又白蔻仁木香藿香砂仁甘草蘇子湯又大腹皮蘇子草果半夏厚朴木香陳皮木通白朮枳實人參甘草加味枳朮丸膚脹枳殼肉桂紫蘇陳皮檳榔桔梗白朮木香黃芩半夏甘草五靈脂加薑調中健脾丸鼓脹人參蒼朮黃耆吳萸茯苓白朮沉香陳皮半夏香附查肉苡仁黃連白芍蘇子澤瀉草蔻蔔子五加皮全瓜蔞川椒鹼荷葉腹皮湯打黃米粉糊丸此方分量合法詳後痞滿方內查之可也二陳湯脹喘茯苓陳皮半夏甘草寧肺湯喘脹黃芩桑皮貝母花粉杏仁知母天冬沙參枇杷葉沉香降氣散七情沉香香附烏藥砂仁甘草加鹽香砂調中丸食傷藿香砂仁茯苓蒼朮半夏厚朴青皮陳皮枳實甘草便瀉去枳實青皮加麥芽山查黃連肉果代抵當湯畜血桃仁蓬朮大黃芒硝當歸生地人參芎歸湯血熱人參肉桂烏藥蓬朮木香砂仁炙草川芎當歸半夏蘇葉五靈脂枳殼散氣痞三稜蓬朮枳殼陳皮檳榔肉桂厚朴乾薑青皮甘草木香肉蔻益智仁六君子湯瀉虛人參茯苓白朮炙草陳皮半夏香朴丸老人厚朴二錢附子七分木香三分人參養榮湯又肉桂心人參黃耆陳皮白芍當歸白朮熟地炙草茯苓遠志五味子奪命丹血敗丹皮乾漆炒煙盡大黃各一錢附子五分金匱腎氣丸誤藥熟地山萸山藥丹皮茯苓澤瀉附子肉桂牛膝車前補中益氣湯病虛人參黃耆當歸白朮陳皮甘草柴胡升麻五痺散壯盛人參茯苓當歸白芍川芎細辛白朮甘草五味子薑石幹散又石幹檳榔黑醜頭末海金沙各一錢葶藶八分西珀沉香木香各五分共為末先服五痺湯二帖後以蔥白湯空心送此末一錢隔日再服輕者二服重亦不過三服愈後服健脾藥忌食鹽醬暈腥參朮健脾丸蠱脹人參白朮陳皮茯苓當歸白芍炙草大棗陰陽攻積丸又吳萸乾薑官桂川烏各一兩玄胡索黃連半夏橘紅茯苓檳榔厚朴枳實菖蒲人參沉香琥珀桔梗各八錢巴霜另研五錢皂角六兩煎汁泛丸每服八分漸加至一錢半薑湯下木香順氣散氣滯丁香檀香木香蔻仁各二兩藿香炙甘草各八兩砂仁四兩每服二錢滾湯入鹽少部下承氣湯實脹大黃芒硝厚朴枳實此大承氣湯去芒硝名小承氣湯桃仁承氣湯畜血大黃芒硝桃仁肉桂甘草四磨湯陽水五苓散下腫肉桂白朮茯苓豬苓澤瀉疏鑿飲子陽水澤瀉商陸羌活椒目木通秦艽檳榔茯苓皮大腹皮赤小豆實脾飲陰水厚朴白朮木瓜附子木香草果乾薑茯苓大腹皮加薑復元丹又附子二兩木香茴香川椒厚朴獨活白朮橘紅吳萸肉桂各一兩澤瀉二兩肉果檳榔各五錢當歸散心腹堅當歸肉桂心木香木通赤苓赤芍丹皮陳皮白朮檳榔蟠桃丸身腫沉香木香沒藥乳香各三錢琥珀一錢半生白醜頭末六分黑醜頭末牙皂汁浸半日半生半焙熟八分檳榔一錢半半用生半用皂角汁浸焙熟皂角水打糊丸每服二錢半五更砂糖湯下神效此專治水腫若治鼓脹不效白朮木香散不食白朮檳榔赤苓豬苓澤瀉各一錢半木香甘草各一錢官桂七分滑石三錢陳皮八分加薑六味丸病後熟地山萸山藥丹皮茯苓澤瀉消風敗毒散血熱導水茯苓湯諸藥不效赤苓麥冬澤瀉白朮各二兩桑皮紫蘇檳榔木瓜各一兩大腹皮陳皮砂仁木香各七錢半共為粗末每五錢加燈草七根煎連進三服小水自利黃耆防己湯因風黃耆防己白朮甘草薑棗中滿分消湯因寒黃耆吳萸厚朴草蔻黃柏各五分半夏茯苓木香升麻益智仁各三分人參青皮當歸黃連蓽澄茄澤瀉生薑乾薑麻黃柴胡川烏中滿分消丸因熱黃芩黃連薑黃白朮人參炙草茯苓豬苓乾薑砂仁半夏枳實知母澤瀉厚朴陳皮蒸餅為丸每百丸白湯下神芎導水丸又黑醜頭末川芎薄荷黃連黃芩大黃滑石有血積加肉桂二蛟散因濕三年老黃米炒為末芒硝各三兩將硝鍋內熔化炒乾為末和米研細大人服三錢小兒一錢半黑糖調服至午便一次晚再便一次病久虛者間服加味胃苓丸加味胃苓丸因虛白朮白芍陳皮茯苓人參藿香山查厚朴豬苓澤瀉半夏甘草女人加香附本方總加薑燈心至重不過五服此二方百發百中無不愈者防己湯孕娠防己桑皮赤苓紫蘇木香葶藶散又郁李仁葶藶茯苓桑皮大調經散産婦大黑豆五錢茯苓三錢三分西珀三分半每末三錢紫蘇湯下日三服調榮飲血腫蓬朮川芎當歸白芷檳榔陳皮延胡索小調經散又沒藥西珀桂心白荷當歸各一錢細辛麝香各五分酒薑汁調下椒目丸經水椒目甘遂附子千金子郁李仁黑牽牛五靈脂吳萸當歸延胡索各五錢芫花一錢蚖青十枚去頭翅足同米炒螌蝥十枚制同蚖青膽礬一錢石膏二錢糊丸芡實大橘皮湯下一丸平胃散水蠱蒼朮厚朴陳皮甘草胃苓湯又葶藶丸又葶藶防己木通杏仁川貝各一兩棗肉丸桑皮湯下治肺氣喘促面目浮腫黃甲丸又犀角湯結陽症犀角元參各一錢升麻木通各八分連翹柴胡各六分沉香射干甘草各五分芒硝麥冬各四分鋪臍藥餅外治真輕粉二錢巴豆四兩生硫黃一錢研勻成餅先用新棉鋪臍上次鋪藥餅外以帛緊束之約人行五七裡部自然瀉下惡水待下三五次即去藥以溫粥補之一餅可治一二十人久患者隔日取水一方治水蠱商陸根赤者杵爛貼臍上以帛縛定水從小便出敷藥又大戟芫花甘遂海藻等分醋糊和面少部攤絹上貼腫處口吮甘草不過三五時水即下矣灸法又水分穴在臍上一寸宜灸如年數壯中脘穴在臍上四寸上下一寸居岐骨與臍之分中灸二七壯灸神闕以鹽滿臍中灸之以上外用三方皆專治水腫凡患水腫者切忌用刺刺之水盡即死附載嵩崖水腫神方回生丹專治青皮陳皮三稜蓬朮各三錢連翹三錢用巴豆一兩五錢同炒去豆木香甘遂商陸木通澤瀉乾漆炒至煙盡萊蔔子各三錢赤苓桑皮椒目各五錢胡椒一錢黑醜一兩醋糊丸初服酒蔥湯五更下十五丸二服陳皮桑皮湯下十八丸三服射干湯下二十丸凡患水腫忌食鹽魚肉雞面羊湯七件並房事治痞滿方八調中益氣湯中氣虛人參黃耆白朮甘草五味子當歸升麻柴胡陳皮白芍資生丸消食人參白朮茯苓橘紅查肉扁豆黃連神麯澤瀉桔梗藿香甘草蔻仁苡仁山藥蓮肉麥芽芡實豁痰丸導痰南星半夏赤苓枳實橘紅甘草加薑二陳湯除濕方詳上當歸拈痛湯濕熱黃芩羌活甘草茵陳人參葛根升麻蒼朮苦參當歸防風知母白朮豬苓澤瀉三黃瀉心湯脈浮小柴胡湯和解調中健脾丸單腹脹五加皮蒼朮人參黃耆茯苓各二錢陳皮半夏香附查肉苡仁各三錢吳萸白芍黃連各二錢半萊蔔子草蔻仁澤瀉蘇子各一錢半沉香六分用瓜蔞一個挖一孔入川椒三錢鹼二錢外用紙糊鹽泥封固曬乾火煅去泥並藥共為末荷葉大腹皮煎湯打黃米粉糊丸每服百丸湯下日三服
