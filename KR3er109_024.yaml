body:
  text: 卷二十四咽喉音聲病源流咽喉症皆火病也少陰少陽君相二火經脈並係咽喉君火勢緩熱結為痰為腫相火勢速腫則為痹痹甚則痰塞以死火有虛實實火因過食煎炒蘊熱結毒其症煩渴二便閉風痰壅將發喉痹先三日必胸膈不利脈弦而數必用重劑潤下去其積熱大便下後方可用去風痰解熱毒之藥清利上焦若大便閉結不通難治然壯盛者可用硝黃微弱者但用滋燥潤腸之劑再虛者止用蜜煎導之虛火因過飲或善怒或好色痰火上攻喉舌乾燥便澀心脈虛數腎脈微此水不勝火宜滋陰降火不宜全用寒涼取效一時致上熱未除中寒復起毒氣乘虛入腹胸前高腫上喘下泄手足指甲青黑七日後全不進食口如魚口者不治喉症最忌發汗誤人不淺或針砭出血即汗之之義若寒傷於腎及中腫者尤忌用針誤針則不救至如內傷虛損咽喉失音無法可療喉症過四五日為重三日前可消若非急症一二日不發寒熱三日始發熱若頭痛則兼傷寒須疏風散寒必問二便便利者乃浮游之火上攻宜消風清熱降氣解毒之劑宜清上丸喉症初發一寒戰即生者發後身涼口不碎又無重舌或二便俱利不可認作熱症皆由陰氣虛寒而發其痰不可吊盡以此痰即身內精神所化與舌後乳蛾舌之痰毒聚一處必以流盡毒而愈者不同若亦流盡則精神竭而必弊先以吹藥或用水渙之法使喉一通即便服藥第一劑發散和解宜清心利咽湯第二劑即溫補資養以導火宜酌用八味丸歸脾湯設三四日後再發寒戰或心痛脅痛骨疼難治喉症發時牙關緊喉舌腫口碎腥臭重舌或舌有黃刺便祕即是熱症宜石膏敗毒散若症不減牙關反開唇不腫紋如無病人不治喉症舌腫滿口色如葡萄如茄子如朱砂紙不治喉症最忌口渴氣喘痰如桃膠一頸皆腫面紅紫或青或純白無神不治喉症有寒傷於腎致喉花腫者關乎性命以喉花即為蒂中舌下紫筋為舌係下通於腎若白腫不治喉症無痰者不治有痰聲如曳鋸者危用吹藥出痰三次方可愈宜用金丹痰不出加製皂角少部倘喉碎先用長肉藥後用碧丹若至穿爛多用口疳藥加珍珠龍骨喉症其痛連胸而紅腫脈浮洪而數者係肺癰宜蜜調藥加桔梗百草霜喉中無形紅腫者熱也宜多用燈草灰喉症雖凶甚若發於外而不見死症治之必愈惟纏喉風及傷寒喉閉為最重最險難治喉症凶者面發腫白亮無光彩脈沉微無力是神氣外泄無陽症也不治若面發紅腫脈洪大有力症雖極重是有元氣火氣治之可愈喉症腮口內腫爛用箸縛絲棉蘸水輕攪患處痛者用藥必愈若不知痛即係死肉不治喉症切忌半夏生薑最喜梨與柿子婦人喉症腫痛先問經水有因經閉而致火上升為患者宜內服通經藥經通而喉症自愈宜通經丸以上言喉病之大略也茲舉其症之可名者而條列之一曰喉痹痹者閉也必腫甚咽喉閉塞為天氣不通乃風痰鬱火熱毒相攻之症火有微甚症因有輕重其總絡係於肺胃急清此二經之熱宜牛蒡湯外用通隘散然雖屬火熱內外表裡虛實不可不辨如惡寒寸脈小一時所患相同屬天行邪氣宜先表散宜牛蒡湯大忌酸收恐鬱其邪於內不得外散其病之由來有二一者少陽司天三陽之氣民病喉痺仲景用半夏桔梗湯依陽毒施治二者太陰濕勝火氣內鬱民病喉痹又太陰在泉濕淫所勝病喉腫喉痺或而青黑仲景用半夏桔梗甘草湯依陰毒施治若不惡寒寸脈大滑實為陽盛陰虛下之則愈宜酌用大小承氣湯亦可用膽礬等澀劑收之外微而輕者可緩治宜喉痹飲徐徐服之不可驟用寒涼以痰實結胸遇寒不運漸至喘塞不治也其有中氣急閉塞欲死者此猶緩症宜薑蠶為末薑汁調下立愈或馬蘭根苗汁和醋含漱立愈或將鵝翎蘸馬蘭汁入喉探吐拔去頑痰自愈痰盛飲汁亦妙若甚而急則用吹法吐法針法吹法者用硼砂膽礬末吹患處或以皂角末吹鼻噴嚏亦開吐法者用皂角揉水灌入或新汲水磨雄黃灌入即吐又一法喉病氣閉不通死在須臾即用溫湯半碗入桐油三四匙攪勻用硬雞鵝翎蘸探四五次痰即湧出再探再吐以人醒聲高為度後再服藥針法者用砭針於腫處刺血若口噤針不能入則剌少商穴穴在大指甲內去甲韭菜葉部左右皆刺二分出血立愈若畏針急分開兩邊頭髮捽住中間頭發一把盡力拔之其喉自寬此吹吐針三法隨症任用可也又有陰虛陽氣飛越痰結在上脈浮大重取或澀者此症最危作實症治必死宜加減八味丸其喉痹連項腫宜芩連消事飲口緊者宜急救方皆危症一曰纏喉風喉腫而大連項腫痛喉內有紅絲纏緊勢如絞轉且麻且癢手指甲青手心壯熱痰氣壅盛如鋸手足厥冷或兩頤及項赤色纏繞發寒熱亦是皆由平日多怒之故先兩日必胸膈氣滯痰塞氣促最為急症過一日夜目直視牙噤喉響如雷燈火近口即滅此氣已離根有升無降不治喘急額汗不治治法不外喉痹斟酌服藥宜喉痹飲外用金碧二丹頻吹藥內加牛黃更速效若水漿不入更危宜解毒雄黃丸一曰乳蛾有單有雙有連珠單輕易治雙重難治連珠尤重一日痛二日紅三日有形會厭一邊腫曰單兩邊腫曰雙如白星上下相連曰連珠酒色過度鬱火結成治法亦不外喉痹宜喉痹飲外先用碧五金一後用金二碧三一曰喉癬肺熱也喉間生紅絲如哥窯紋又如秋海棠葉背紋乾燥而癢阻礙飲食是虛火上炎痰壅肺燥所致鹽醬及助火等物到喉則不救癆病人多患此宜喉痹飲青靈膏不時噙化頻吹碧丹一曰喉菌狀如浮萍色紫生喉旁說憂鬱氣滯血熱使然婦人多患之輕則半月重則月餘宜守戒忌口宜喉痹飲不時含化青靈膏吹藥初用碧五金一後用碧三金二一曰喉癰喉間紅腫而痛無別形狀由過食辛辣炙煿火酒等物熱極而發症在胃大腸二經重者寒熱頭疼四五日可愈宜犀角地黃湯外用金十碧一頻吹之一曰喉瘡層層如疊不痛日久有竅出臭氣廢飲食宜枸橘葉汁沖燒酒頻頻服一曰喉杵喉極腫而極痛宜甘桔射干湯外點燒鹽散以上皆喉症之最巨而有名可指者其餘如曰咽嗌痛不能納氣與食為地氣閉塞凡病喉痹必兼咽嗌痛凡病咽嗌痛卻不兼喉痹由陰虛火炎也宜喉痹飲加荊芥元參曰喉燥痛水涸火炎肺金受尅故也難治忌辛熱收澀宜養金湯曰喉中腥臭肺胃熱毒也宜黃芩射干煎曰喉中結塊此危症飲食不通宜百靈丸重者不過兩丸如射干海藻牛舌葉汁俱治曰谷賊由谷芒強澀藏於米而誤食之滯於咽門不能傳化又為風熱壅聚與血氣搏遂令刺肺也不急治亦能殺人宜多取鵝涎灌之一曰尸咽由陰陽不和脾肺壅盛風熱毒氣不能宣通故令尸蟲發動上蝕於喉或癢或疼如𧏾之候也此與傷寒狐惑症同當參考之以上雖非如喉痹等症之巨而可名要皆喉症之可數而不可忽者也亦有伏氣病名腎傷寒謂非時暴寒伏毒於少陰始衰不病旬日乃發脈微弱而咽痛次必下利當辛熱藥攻其本病順其陰陽則水火降而咽疼自己又有少陽傷寒不傳太陽寒邪抑鬱內格陽氣為熱上行於咽門經會之處寒熱相搏而成喉痹用辛濕甘苦以製其標病以通咽隘二者誤用寒涼多致不救此外又有咽腫痰盛者宜清心利咽湯外吹薑蠶散又有咽痛不腫者宜甘桔射干湯又有已汗下餘腫不消者宜元參解毒湯又有久嗽喉痛者宜柿霜丸含化又有喉腫如丸者宜龍腦丸含化又有喉中如有物不能吞吐者宜木香四七丸又有喉中食噎如有物者宜含化丸又有喉中痰涎壅盛者宜蘇子降氣湯又有積飲停痰蘊熱膈上至咽喉腫痛胸膈不利咳吐痰涎舌乾口燥無表裡症相兼者宜連翹散又有走馬喉痹者宜馬勃焰硝各一兩為末每吹一字吐涎血即愈又有風毒咽腫咽水不下及瘰癧咽痛者宜水服莨菪子末二錢神效又有肺熱喉痛有痰熱者宜甘草鼠粘湯又有熱病咽痛者宜童便含之效又有懸癰喉痛風熱上搏者宜啓關散又有懸癰垂長咽中煩悶者宜活礬鹽花等分研筋頭頻點在上去涎又有喉中生肉者宜棉裹筋頭拄鹽揩之日五六度又有脾肺虛熱上攻咽喉生瘡者宜麥門冬丸又有喉痹已破瘡口痛者宜豬腦蒸熟入薑醋吃之愈又有鎖喉蛇瘴嶺南人多受朴蛇瘴氣項大腫痛連喉者宜赤足蜈蚣一二節研細水下愈又有露地之物有天絲著上食之咽喉生瘡者宜白礬巴豆燒灰吹入加愈又有咽喉微覺腫痛聲破難言者宜桔梗湯又有喉痛因於相火用涼藥不愈者宜六味丸加桔梗元參知母黃柏又有七情氣鬱結成痰涎隨氣積聚堅大如塊在心腹間或塞咽喉如梅核粉絮狀咯不出咽不下每發欲絶逆害飲食者宜四七湯噙化丸又有風火上鬱咽痛頭脹或項腫當用辛涼者宜滑石連翹桑皮射干杏仁西瓜翠衣又有腎液不收肝陽上越巔脹流涕咽喉微痛者宜六味丸加生地車前五味以上零星喉症又各有治法如此而更有總治一切喉中熱毒之方宜清上丸總治一切喉中生瘡之方宜牛蒡湯總治一切喉閉喉風痰涎壅塞口噤不開湯水難進之方宜金鎖匙吹之痰自出如痰未出腫不消當刺少商穴斯三者備喉症更無遺患矣要之咽喉者心肺肝腎呼吸之門飲食音聲吐納之道關係一身害人迅速故曰走馬看咽喉言不可遲誤也脈法正傳曰兩寸脈浮洪而溢者喉痹也脈微而伏者死回春曰咽喉之脈兩寸洪溢上盛下虛脈忌微伏咽喉會厭舌分別靈樞曰咽喉者水谷之道也喉嚨氣之所以上下也會厭者音聲之戶也懸雍者音聲之關也得效曰喉候氣咽咽物咽接三脘以通胃故以之咽物喉通五臟以係肺故以之候氣氣喉谷咽較然明白也子和曰喉以納氣而通於天咽以納食而通於地會厭管乎其上以司開合掩其喉則食下不掩之則其喉錯必舌抵上腭則會厭能開其喉矣四者交相為用缺一則飲食廢而死矣直指曰懸雍生於上腭雖不關於咽喉其暴腫亦熱氣也又曰懸雍謂之帝鐘其腫而垂下有長數寸者名帝鐘風宜用鹽礬散不可針破針則殺人入門曰懸雍者音聲之關若臟腑伏熱上衝咽喉則懸雍或長而腫咽喉病原由症治內經曰一陰一陽結謂之喉痹痹與閉同入門曰一陰肝心包一陽膽三焦四經皆有相火火者痰之本痰者火之標也正傳曰咽喉病輕重之異乃火之微甚故也得效曰凡咽喉閉毒氣歸心胸前腫滿氣煩促下部洞泄不止者死附録尤氏喉科祕傳吾邑尤氏為喉科專家世傳祕法茲幸得之故特附於此其書曰喉症一二日腫痛三四日勢定有形每至三日必發寒熱或頭痛刻刻吹藥總不可緩方有生機喉痹者總名屬風屬痰屬熱皆因火鬱而兼熱毒致生乳蛾等症大要去風痰解熱毒其症自愈單乳蛾多因酒色鬱結而生其症生喉旁初起一日痛二日紅腫三日有形如細白星發寒熱者凶四日凶勢定大約四五日可愈吹青藥五分黃藥一分後黃二青三同吹出痰兼服煎劑宜喉症主方俟大便走後症自痊矣如至三日喉中但紅腫而無細白星即為喉癰宜辨雙乳蛾細白星左右俱有藥照前用左屬心右屬肝煎藥於主方內左宜加黃連犀角右宜加赤芍柴胡雙蛾則兼用之大便閉加枳殼元明粉連珠蛾二白星上下相連又或狀如纏袋用藥照前單蛾輕雙蛾重連珠更重喉癰過食辛辣炙煿厚味醇酒感熱而發屬肺無形狀止紅腫而痛重者亦發寒熱頭痛四五日可愈用青藥加黃藥少部內服藥宜膠子蜜調藥喉症主方喉癬為虛火上炎肺金太旺致攻咽喉生紅絲如哥窯紋如秋海棠葉背後紋飲食阻梗咽痛雖不喪命不能速愈用青藥頻吹不時擒膠子藥再服主方加土貝母下氣須戒憂思怒憤酒色忌一切鮮食物及動風動火之物用藥醫治一月可愈若不守戒不忌口用藥遲延必至症重難愈久則聲啞而肺金受傷不治喉菌屬憂鬱血熱氣滯婦人多患之狀如浮萍略高面厚紫色生喉旁初起用青九黃一後黃二青三內服主方不可間斷亦難速效輕則半用或二十日可愈重則經月或月餘治之得法可愈亦須守戒忌口舌喉癰凡肥人感熱性躁者多患此煎藥犀角地黃湯加減吹用黃藥但此須吹至舌根下兩旁時刻難間方能速愈喉內用青十黃一亦須勤吹凡舌下生如小舌樣者為舌連喉腫痛即為喉癰喉不痛者非癰也大抵舌兼喉癰而發者十有六七其勢凶喉閉傷寒後發難治為氣閉不能無形無聲纏喉風曰纏者自頤纏擾赤色寒熱心中躁急而發先兩日必胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷頸如絞轉熱結於內腫擾於外且麻且癢喉內紅絲纏緊手指甲白色手心壯熱喉腫而大風痰壅盛如鋸是也最為急症初起一日即用藥頻吹更服藥猶可治若過一日夜目直視喉中雷鳴者不治燈火近口即吹滅者不治若喘急額汗危在旦夕矣倘下藥俱加牛黃已上諸症十難一生不可輕治傷寒後患連珠蛾及喉閉者不治其症喉項強硬目睛上視故多不治也凡喉症非急者一二日未必發寒熱症尚輕緩至第三日必寒熱症必加重須審二便通閉如通症亦可減不過浮游之火上攻咽喉宜服消風清熱降火解毒藥即愈若二便閉乃內有實火非用降火解毒重刑及通二便之藥火何從泄病何從解頭痛不痛亦要問凡治喉症必吹藥四五管方可由痰必出痰三四次可以全愈初一管必用黃藥多為要宜對喉重口一吹急提出管恐痰即欲嘔出故也餘俱輕口吹之凡喉症先碎者須先用長肉藥吹之後用青藥凡出痰不但黃藥多用須單用青藥吹入喉中方能釣出頑痰初起一二日用青藥漸漸多加黃藥勢甚者黃藥為君或單用青藥凡喉症必大便去後方可望痊如閉結不可輕部其愈凡喉症無痰者不治喉閉多因先患勞病重症既久虛火上升榮血已竭喉之上腭有紅點密密如蚊蟲咬斑此係危篤將殂斷不可治也凡喉連胸紅腫此係肺癰之症必用蜜調藥加百藥煎為要凡喉症初起大便閉宜大黃元明粉下之則火自降而易痊若五六日後不食而大便祕用大黃元明粉反立斃說以病後胃虛元氣已弱故禁用此二藥雖閉甚只宜用蜜導法此祕訣也凡吹藥不但患處要吹並四圍好肉上亦要吹方不延開且易愈凡吹喉內藥須用氣和平用管周圍吹之為妙凡用青藥看凶症冰片多於甘草將愈甘草多於冰片凡藥入瓶須捺實及用時須將管發松毋忽略也青藥方煉礬牙硝各三分百草霜硼砂各五分薄荷末二分燈草灰冰片各一分煉礬法明礬研細入傾銀罐內半小罐將罐入爐用桴炭火煨煬以銅箸針入罐底攪之無礬塊為度即將研細上好槍硝投入礬內十分之三次將研細白硼砂投入礬內亦十分之三少頃再投入生礬末逐漸投下候礬煬盡照前投硝硼少部如是逐漸逐層投完直待礬鋪出罐內高如饅頭而止須加炭火燒至礬活乾然後用瓦片一大塊復罐上一時取起將牛黃少部為細末用水五六匙調和以匙抄滴礬內將罐仍入火內烘乾即取起連罐覆合潔淨地上地上用紙襯罐子罐上再用碗覆之過七日收貯須煉礬至輕鬆無豎紋者佳如堅實有豎紋即不堪用煅時火候初起宜緩亦不可太緩恐礬僵定不易熔化致有豎紋中後須用武火若礬末煬盡即投硝硼亦不能熔化致有豎紋凡銀罐須要生者先用炭火烘爐然後入爐不致炮碎亦不可放濕炭上烘使濕透入罐經火亦必致炮碎矣煅燈草法擇肥白燈草一把鋪淨桌上清水噴濕候至燈心內潮濕為度將筆套一個要完固不碎兩頭厚薄相勻用水濕管內以淡紅紙圍塞緊一頭即將濕燈草捏入管內以竹箸打實傾去水塞滿後再以濕紙圍塞口入桴炭火煅之煅絶為度取出放淨磚地上須以水預先噴濕地上碗說之待冷剝去筆套灰及紙灰拆開燈草灰須黑水成團者佳煅時勿筆套炮碎碎則無用不可煅過過則灰無用又不可煅生生則灰不成此藥最輕煅時極難得法須平日多製以備急用取百草霜法即鍋底灰也燒茅柴者佳須取近鍋臍者可用若鍋底心鍋口邊者俱不用先輕刮去上面一層配藥法配成即碧丹每煉礬三分加百草霜半匙研細次入燈草灰一釐研勻如瓦灰色再入甘草末三匙薄荷末二分研再入上好冰片半分多加尤妙研勻細入磁瓶紙塞緊口勿令出氣用時以烏金紙包此藥須時配合若合過五日即不效五日遇陰雨亦無效也不得草率如吹喉症欲出痰加豬牙皂角末少部惟喉癰及單乳蛾輕症單用青藥即效若遇重症須兼黃藥用之若二藥兼用前後多少最為要訣凡初起用青藥九分配黃藥一分吹過五管次用青八黃二再次用青七黃三如症重青黃對半用用至三五次痰涎必不壅然後用黃六青四將管直對喉中重吹一次立刻收管即吊出痰此要訣也若症重甚用黃八青二尤效凡初起吹一次須令患者低頭開口溜出痰涎凡遇春夏時配藥青藥多用薄荷少用製礬秋冬製礬多用薄荷少用此要訣加硼砂少部薄荷須二試者為妙其梗葉細味辛涼若頭試梗葉大三試味薄俱不堪用青藥驅風消痰清熱解毒真是良方然性尚緩不及黃藥能消腫毒除風熱開喉閉出痰涎最為神效然症初起黃藥不可多用因其能直透入內且善走散若初起即多用之恐藥與病不相入也喉症即重三日前尚未成膿藥能消散之故尚無慮至五日已成膿必難消散穿破後必爛成窠為難愈耳爛處須用口疳藥多加龍骨珍珠黃藥方蒲黃二分硝九分硼砂冰片薄荷葉各一分製硝法馬牙硝長白厚大者溫湯蘸過棉紙挹乾仍用紙包好放灶上鹽罐洞內五六日自乾白如霜或用柴灰置飯夢內以硝一大塊放灰土水淋過留盆內一宿硝自凝結撈出放熱灰上收乾仍用紙包放鹽罐洞內倘未製就急切要用炒乾亦可生硝必提過則味淡而性平且合藥可以留久每硝八兩水四飯碗煎三碗取起入尖底凸口砂盆內將竹黃籃片做品字樣竹竿放在盆內過一宿硝自凝結於底提起竹竿則硝自起此須十二月內製之為佳此又一法也薑蠶擇其細直而腹小者為雄可用粗而腹大者為雌不可用也將牙刷蘸水刷去石灰瓦上文火炙如醬色又要折斷中間無筋連者佳研細豬牙皂角取堅小不蛀者瓦上炙至色光明而脆為度去兩頭研末蒲黃生用用羅絹篩細黃末去粗褐色者配藥法配成即金丹每牙硝二錢蒲黃四分研細次下薑蠶末一分牙皂末一分半共研極細如淡鵝黃色加上好冰片一分研勻此藥可留久雖經年可用惟冰片臨時加可耳上藥薑能消腫出痰若遇牙叉穿牙疔專用此藥治之如咽喉等症則兼用青藥看症輕重多少用之症重者再加牛黃如喉閉及纏喉風加薑蠶牙皂餘只用牙硝蒲黃可也口疳藥上好薄荷葉研細絹篩三分兒茶末二分半製黃柏末一釐白龍骨末二釐堅細白芷末如腫痛用三四釐如不腫痛用二釐半生甘草末用五釐珍珠細末五釐共研極細加上好冰片三釐再研勻入磁瓶封固凡遇口碎及各種口疳用此治之若初腫起而熱甚者多加薄荷及冰片取其辛涼能發散也若患不腫熱甚且病則宜以長肉為主用長肉藥長肉藥即前口疳藥多用兒茶末龍骨末配成紫色凡治喉症碎者亦用此長肉藥如治走馬牙疳穿牙毒凡極重口疳初生小兒胎毒口疳本方加牛黃倍珠末無不奏效若黑臭爛者不治小兒黃色胎疳如乾橘囊者不治如痧痘後口疳去黃柏龍骨加牛黃倍珠末大抵遇極凶症難效者或欲速愈見奇加牛黃五釐珠末六釐更妙二味宜多加痘後疳非此不除餘症加之則效如神此係口疳藥祕訣口疳重症藥內加上好滴乳石少部上好珍珠少部入兒茶內研極細此亦祕訣製黃柏法先用荊芥穗為君甘草為臣煎濃湯浸黃柏柔軟為度取起攤瓦上慢火炙至金黃色如焦色者去之再以白蜜湯漉拉一次曬乾聽用甘草須擇細小堅實者膠子蜜調藥薄荷葉末為君煉礬為臣燈草灰川貝母二味為佐百草霜冰片甘草末三味為使先將煉礬百草霜研和後入燈草灰再研後入薄荷貝母研極細方入冰片再研和配成青灰色用白蜜調治喉癬喉菌須時時刻刻噙咽若症重兼服煎劑及用吹藥喉症煎藥主方牛蒡子炒研前胡連翹金銀花黑山梔甘草活芩炒黑元參桔梗花粉薄荷加燈心三十段泉水煎如發寒熱加小柴胡頭痛加煅石膏胸膈飽悶加枳殼鬱熱而發加赤芍貝母口渴加麥冬知母玉液上清丸蘇州薄荷葉十四兩柿霜五兩桔梗四兩半甘草三兩半川芎二兩八錢川百藥煎五錢防風兩六錢砂仁四錢半福建青黛三錢冰片元明粉白硼砂各二錢此吳陽谷所傳方也研細末蜜丸芡實大每服一丸不拘時噙化專治風痰上壅頭目不清咽喉腫痛口舌生瘡服之生津液化痰涎昔宋神宗患喉痹服此藥一丸立愈咽喉腫痛方百草霜六錢梅礬一兩甘草三錢片腦不拘多少此方兼治乳蛾牙叉等症若治纏喉風喉閉一切急症用梅礬一兩生甘草三錢兒茶五錢雄黃二錢珍珠琥珀各六分自死僵蠶去頭足炙脆為末麝香少部薄荷一兩又有時去雄黃加蒲黃六錢製梅礬法取大青梅圓嫩而脆者先切下圓說好好去核將白礬研細捺入梅內仍用圓說覆上以竹釘釘好過一夜明晨以炭火煅之梅不用其礬輕白如膩粉味極平酸收貯磁瓶聽用通治咽喉口舌唇齒等症君臣佐使藥味別名君藥四味金丹合玉丹製碧丹合王丹製臣藥十味疊玉有二用脆玉有二用軟玉同製香玉另研滴玉煅碎金研篩片金製青霜研篩緑霜飛元霜研佐藥十味涼草研細苦草研細甜草研細輕藥煅澀藥炙脆天蟲炙脆紫玉研細赤土研地蟲酒炙脆香草研使藥十味酉金煅丑金研辰金煅紅脆研圓明煅或生研酸果製人霜煅香臍研象膽研細楅炒金丹即黃藥王丹即煉礬碧丹即青藥王丹即製黃柏香玉即冰片輕藥即燈草灰酸果即梅礬辰金即龍骨碎金即蒲黃香草即白芷紫玉即兒荼紅脆即琥珀赤精即朱砂疊玉即明礬天蟲即薑蠶甜草即甘草香臍即麝香青霜即青黛軟玉即硼砂地蟲即蜣螂脆玉即牙硝澀藥即牙皂元霜即百草霜丑金即牛黃片金即黃柏圓明即珍珠苦草即黃連人霜即人中白赤土即血竭緑霜即銅緑酉金即雞內金滴玉即乳石象膽即蘆薈涼草即薄荷楅子即牛蒡子以上皆喉科祕傳也但其書總論云言咽喉則牙舌即包羅於內故口齒唇舌等症治相連而及並其方藥有即與喉科通者餘此節本各分門然因尤氏之書雜舉不便採摘分隸於各門之下故姑取口牙唇舌等治法亦並録於喉症之後庶方藥可以類查不至瑣雜難稽也其書曰頸癰胸前紅腫形在外亦欲內攻甚則喉腫而閉出膿外急以藥敷之宜三黃散內吹青藥服煎劑宜喉症主方面癰與前症相仿大抵屬鬱托腮癰生於腮下因過飲醇酒多食厚味熱毒所結而生治法如前舌癰舌紅而腫大屬心經火盛角額亦紅腫吹藥用青黃對半須吹至舌根方愈煎藥多加黃連山梔犀角木舌舌腫大如煮熟豬肝不能轉動生舌根下狀如白棗有青紫筋不能速愈半月可痊如初起不疼不發寒熱漸漸腫大初起愈遲則愈難療因憂鬱而發內服煎藥宜舌症主方外用青藥加黃藥初起青黃對半後單用黃藥舌菌屬心經多因氣鬱而生舌上如菌狀或如木耳其色紅紫紫舌脹屬心火內必煩躁悶亂吹藥單用青內服藥宜犀角地黃湯加減一二日可愈也懸癰生於上腭有紫泡如豆大用簪腳挑破血出即愈或用口疳藥吹一次亦可牙槽風初起先齒痛不已後牙根肉浮腫紫黑色或出血久則腐爛而臭急用吹藥宜用冰王方加牛黃兒茶珍珠然不能速效必至半月始愈初治五日紫色退至白色再至五日可長肉再治五日方可望痊此症若久不愈甚則齒縫出白膿謂之牙漏極難調治須戒酒色忌食一切辛辣炙煿內服滋陰降火之劑宜犀角地黃湯加減外用口疳吹藥方可漸愈甚則齒落上爿左邊第一門牙落者不治已上二經皆屬胃火腎虛內必須服煎劑為妙牙癰其初起有小塊牙根肉上或上或下或內或外其狀高硬即用口疳藥吹之能消牙菌生於牙根紫黑色高起如祟用口疳藥治之此係火盛血熱而兼氣滯宜內服煎劑穿牙疔先二日牙痛發寒熱後痛不可忍牙根上發一塊紫色用黃藥略加青藥治之內服涼血解毒降火消疔之劑此症初起未破名穿牙疔已破即穿牙毒一症兩名穿牙毒用口疳藥加牛黃倍珠末兒茶治之內服煎劑其色青者不治紅者可治牙叉生於牙根叉中齒不能開牙關緊閉用黃藥吹之須吹到牙叉中腫塊消散方止此症初起勢甚至夜尤甚然不難愈亦不傷命大凡患牙癰牙根紅腫但牙關不緊口能開合若患牙叉則牙根脹腫而大牙關緊閉口不開先用青黃二藥吹入牙根外用黃速香削成鑿子樣漸䪞進牙門則牙漸開方可吹進黃藥牙䪞括屬胃火如豆大或內或外先用黃藥後用口疳藥多加薄荷冰片煎藥內多加石膏連翹牙宣牙縫出血上屬肝下屬胃實火上攻故也亦有胃虛火動腐爛牙根以致淡血常常滲漏不已內服清胃涼血之劑外用珍珠散又胃虛火動腐爛牙根外用長肉藥吹之內服扶脾清火之劑鵝口初生月內小兒滿口舌上生白屑如鵝口樣先用絲棉卷箸水中蘸濕繳去舌上白翳用口疳藥吹之頻繳頻吹自愈內亦須服藥宜犀角丸或犀角汁或化毒丸馬牙疳初生小兒胎內受熱見風即生但看牙根上有白色如脆骨者即是先用溫水青絹繳淨口內竹箸撬開牙根將銀簪腳淺淺挑碎出血繳淨吹口疳藥立愈此症初發出苔即打噴嚏含乳不吮其病已深若不急治入腹即死切勿誤作黃疸之類出苔便當看視日日要挑至三四日病即成五六日堅硬難治甚有發而又發者大約百日外可免此患小兒走馬牙疳及大人牙槽風俱要防齒落上爿左邊門牙為牙中之主此牙落則餘牙盡落矣最重難治若此牙不落餘牙雖落無妨凡治牙疳俱用黃藥多青藥少倘有碎處先用長肉藥吹一管後用本藥吹之無虞凡治口疳用絲棉輕攪切不可用青布恐布硬一觸患處以致疼痛也凡唇上乾難吹藥者用蜜調敷上或用湯水濕其患處再用吹藥凡患口舌等恙吹藥後舌上無涎乾如橘囊者不治凡遇口舌腐爛無血出者不治舌症主方黃連黑山梔犀角連翹丹皮生地赤芍麥冬甘草木通如兼口唇必用煅石膏為君以瀉脾火惟舌屬心故專瀉心火如有鬱兼有積痰加貝母不拘咽喉口舌等症如大便閉結加枳殼無明粉引用燈心凡病後忌用寒涼恐妨大體牙症主方元參丹皮知母甘草白芍地骨皮山梔黃柏車前子如熱甚加煅石膏為君炒黑升麻為佐如有風加荊芥穗如虛加枳子熟地去山梔如解毒加黃連連翹如穿牙疔毒則用消腫解毒之藥加紫花地丁甘菊凡舌腫大生蒲黃加冰片敷之舌出血用炒蒲黃舌喉癰大便祕煎藥內加大黃元明粉小便不利煎藥內加六一散甚效此心法也齒乃腎之標骨之餘足陽明胃脈貫絡於齒上根手陽明大腸脈貫絡於齒下根屬腎熱有風寒亦有因腎虛一兒兩唇腫黑勢甚可畏服藥用連翹牛蒡子煅石膏黃連山梔生地丹皮花粉枳殼元參桔梗甘草木通如熱加薄荷前胡大便祕加元明粉一錢通即去之外用口疳吹藥多加薄荷冰片口疳喉內結毒吹藥薄荷末一錢兒茶八分天靈說煅三分珠末二分朱砂甘草末牛黃冰片各一分如廣瘡結毒加上好輕粉少部一方加升丹紅粉霜三黃散生大黃薑黃各二錢生蒲黃五分冰片五釐麝香二釐共為細末用白蜜調加蔥薑汁二三匙敷患處或芭蕉根汁或扁柏汁和蜜調俱可此方治頸癰面癰打腮癰等症並治小兒丹毒兼敷陰症人中白散人中白製雞內金掛金燈子青黛鹿角灰蒲黃薄荷白芷冰片甘草共為末吹之治牙叉七日愈治舌根癰五日愈治重舌七日愈治喉蛾三四日愈治喉菌半月可愈消腫用金玉二丹碎用碧丹製人中白法取多年溺器一個用水灌放火爐上滾則傾出如此三五次去盡穢氣然後鹽泥封固大火煅之半日取起冷定去泥殼取溺器內淡紅色者置地上去火毒聽用玉鑰匙用巴豆壓油於紙上取油紙捻成條子點火吹滅以煙燻入鼻中一時口鼻流涎牙關自開此方專治牙關緊閉黃袍散薄荷葉一兩黃柏甘草各三錢黃連二錢冰片不拘多少此方專治一切口疳口碎走馬胎疳痧痘後疳口糜口腐等症藍袍散銅青水飛淨生甘草各二錢白芷一錢硼砂二錢楝子去蛀打碎炒黑研末二錢冰王散冰片八分人中白黃柏蒲黃各一錢薄荷葉黃連各錢半甘草青黛硼砂朴硝各五分活礬少部共為末內吹外敷俱妙兼治丹毒犀角丸犀角粉草朴硝各二錢桔梗一兩赤苓生地連翹新牛蒡子元參各五錢青黛一錢蜜丸龍眼大每一丸薄荷湯下兼驚則朱砂為衣此方專治小兒走馬牙疳通治小兒諸瘡及痧痘後餘毒並效十寶丹梅礬薄荷兒茶各一兩甘草五錢乳石三錢血竭珍珠琥珀各二錢冰片三分此方口喉通用附録楊氏咽喉十八症名目及咽喉看法喉痹纏喉風單乳蛾其形圓如箸頭生喉中左右若生下關不能見者難治宜羅青散又方不論單雙蛾用牡蠣粉四匙陳醋一盞砂鍋煎數沸待冷不時噙漱止痛平腫甚效雙乳蛾兩個生喉間關下是也難治宜羅青散消毒散蟬舌風舌下再生一舌也牙蜞風牙根腫甚聚毒成瘡是也木舌風舌上黃色腫痛魚口風如魚吸水是也不治懸蜞蟲毒風上膕腫湯水難入形腫如雞卵搶食風亦名飛絲毒生口中或食鯉鮎惡物發泡是也擸頰風腮頰結腫牙盡處腫破喉風風自頤纏繞赤色寒熱松子風口內滿喉間赤紫如豬肝張口吐物則氣逆關閉飲食不入崩砂疳口風自舌下牙根上赤腫口內作臖如湯之熱牙根漸爛齒牙漸脫連珠風自舌起初起一個又起一個甚者三五七九個連珠生起蜂子毒或在臉腮洋爛或在喉關舌下作臖色黃如蜂走注瘰癧風頸項結核五七個皮膚赤腫作寒熱咽喉看法初起紅色腫痛語聲清朗無表裡症相兼者輕如已成腫痛咽喉半開半閉咯吐痰涎飲食稍進者順咽喉腫閉牙關緊急言語不清痰壅氣急聲小者險咽喉腫閉牙關緊急言語不清痰壅氣急聲小者險咽喉驟閉痰涎壅塞口噤不開探吐不出聲喘者死生瘡之後毒結喉間腫痛腐爛吐納不堪聲啞者重久嗽痰火虛陽攻上咳傷咽痛但見聲嘶面紅者死音聲病肺家火熱症也說聲啞者莫不由於肺熱宜降氣清熱潤肺生津涼血益血宜鬱金生地蒲黃茅根白芨阿膠童便知母聲重者莫不由於肺熱痰稠宜用前藥加薄荷竹瀝暴喑者莫不由於火盛宜降氣發音聲宜蘇子貝母桔梗枇杷葉百部竹瀝天冬麥冬梨汁甘草薄荷元參桑皮童便亦有寒包熱而聲啞者宜鬱金湯亦有風毒入肺而失音或痰迷而舌強者宜防己薑蠶木通菖蒲竹瀝山梔南星半夏荊芥陳皮亦有喉音如故但舌本不能轉運言語由於體虛有痰者宜補虛湯亦有中風病而舌強舌卷不能言者宜大秦艽湯若天熱加知母五分亦有勞嗽失音但喉聲不清者宜訶子湯亦有痰結喉中語不出者宜玉粉丸亦有久嗽失音者宜蛤蚧丸亦有暴嗽失音者宜杏仁桑皮湯亦有初感風邪驟用參芪五味而喉啞者宜細辛半夏生薑倘邪去仍嗽肺管開也宜五味烏梅一斂即愈大抵總治喉音啞久嗽聲啞須用清滋之品宜清音湯音聲原由症治直指曰肺為聲音之門心為聲音之主腎為聲音之根風寒暑濕氣血痰熱邪氣乾於心肺者病在上脘隨症解之邪散則天籟鳴矣若腎虛不能納氣歸元致氣逆而上咳嗽痰壅或喘或脹胸腹百骸俱為牽製嗽益重氣益乏聲益乾矣以上言聲音出於腎錢仲陽曰大病後及虛勞病雖有聲而不能言又能進藥此非失音乃腎怯不能上接於陽故也當補腎失音乃感風寒而卒病耳以上言腎怯與失音相似內經曰中盛藏滿氣勝傷恐者聲如從室中言是中氣之濕也靈樞曰病人語聲寂寂然善驚呼者骨節間病語聲喑喑然不徹者心胸間病語聲啾啾然細而長者頭中病回春曰肝病聲悲肺病聲促心病聲雄脾病聲慢腎病聲沉大腸病聲長小腸病聲短胃家聲速膽病聲清膀胱病聲微東垣曰濕勝則聲音如甕中出矣以上言聽音辨症靈樞曰寒氣客於會厭則厭不能發發不能下故無音也得效曰醉臥當風使人卒失音丹溪曰風冷能令人卒失音以上言卒然無音綱目曰喑者邪入陰分也然有二症一曰舌喑乃中風舌不轉運之類是也一曰喉喑乃勞嗽失音之類是也說舌喑但舌本不能轉運言語而喉咽音聲則如故也喉喑但喉中聲嘶而舌本能轉運言語也以上言喑啞有二得效曰五臟久咳則聲嘶嘶者喉破也非咽門病入門曰用力顫掉聲嘶乃氣虛衛冷甚也丹溪曰咳嗽聲嘶乃血虛受熱之故也以上言聲嘶內經曰不得臥而息有音者是陽明之逆也足三陽本下行今逆而上行故息有音也陽明者胃脈也陽明逆不得從其道故不得臥也夫起居如故而息有音者此肺之絡脈逆也絡脈之病人也微故起居如故而息有音以上言息有音扁鵲曰病人五臟已奪神明不守聲嘶者死入門曰內傷虛損因瘡失音者不治病人陰陽俱絶失音不能言者三日半死矣以上言聲音不治症治咽喉病方四十一喉痹欽總治桔梗元參貝母荊芥薄荷薑蠶前胡甘草花粉燈心牛蒡子款冬花清心利咽湯痰盛黃連黃芩防風荊芥薄荷桔梗山梔連翹元參大黃朴硝甘草牛蒡子吹藥方又火硝錢半硼砂五分薑蠶二分半冰片二釐八味丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂歸脾湯又石膏敗毒散熱症通經丸經閉桂心青皮大黃薑炭蓬朮乾漆當歸桃仁延胡索牛蒡湯喉痹升麻牛蒡子黃藥子無參紫背浮萍桔梗甘草天花粉外用通隘散吹之通隘散又硼砂二分兒茶青黛滑石寒水石各一分黃連黃柏清黃活礬各半分冰片二釐大承氣湯陽盛大黃芒硝厚朴枳實芩連消毒飲項腫柴胡羌活黃芩黃連防風荊芥白芷川芎連翹桔梗枳殼射干大黃甘草牛蒡子等分惟桔梗加倍急救方口緊馬蘭梗葉打汁入醋少部滴鼻中或灌喉中痰自開解毒雄黃丸喉風雄黃鬱金各一兩巴豆十四粒醋糊丸緑豆大醋磨下七丸吐痰即愈不吐再服或就腫處刺血以牙硝吹點之或刺手大指之少商穴青靈膏喉癬薄荷三錢貝母一錢百草霜甘草各六分冰片三分玉丹二錢元丹八分共研細蜜丸噙化犀角地黃湯喉癰犀角生地赤芍山梔丹皮甘草黃芩燈心口渴加麥冬甘桔射干湯喉杵桔梗二錢山豆根甘草射干連翹防風荊芥元參牛蒡子各一錢二分竹葉十片養金湯咽燥生地阿膠杏仁知母沙參麥冬桑皮蜜百靈丸結塊百草霜蜜丸芡實大新汲水化服元參解毒湯餘腫元參山梔黃芩甘草葛根桔梗生地荊芥柿霜丸嗽痛柿霜硼砂天冬麥冬各二錢元參一錢烏梅肉五分蜜丸含化木香四七丸喉梗木香五分射干檳榔羚羊角犀角陳皮厚朴半夏各一錢赤苓二錢升麻元參桑皮各錢半生薑六味丸相火地黃山藥山萸丹皮茯苓澤瀉噙化龍腦丸喉腫冰片射干各二分半鐘乳粉升麻牙硝黃芪各一錢大黃甘草各五分生地五錢蜜丸含化丸食噎杏仁五錢枇杷葉官桂人參各一兩蜜丸含化以愈為度四七湯梅核氣蘇葉半夏厚朴赤茯苓陳皮枳實南星砂仁神麯各一錢青皮七分蔻仁六分檳榔益智仁各三分薑五片蘇子降氣湯痰塞蘇子厚朴半夏陳皮前胡官桂各一錢甘草五分連翹散痰飲連翹葛根赤芍黃芩山梔桔梗升麻麥冬甘草木通牛蒡子少陰甘桔湯咽痛甘草桔梗川芎陳皮柴胡黃芩無參羌活升麻清上丸熱毒熊膽一分雄黃薄荷青鹽各五分硼砂一錢膽礬少部蜜丸壓舌下化僵蠶散痰盛僵蠶末薑汁調灌立愈又方薑蠶炒研生礬研等分白梅肉丸皂子大棉裹含化咽汁良此方治急喉閉神效甘草鼠粘湯肺熱炒甘草二兩桔梗米泔浸一夜炒一兩鼠粘根二兩每末二錢水鐘半入阿膠一錢煎服啓關散懸癰炒惡實生甘草等分水煎含咽麥門冬丸實熱麥冬一兩黃連五錢蜜丸每二十丸麥冬湯下金鎖匙喉閉火硝錢半硼砂五錢薑蠶一錢冰片一分雄黃二錢共研末吹之痰自出如腫不消刺少商穴羅青散乳蛾蒲黃五分羅青盆硝各三分甘草一分冷蜜水調細咽如吞不下以鵝翎蘸藥掃入喉內金丹總治槍硝錢八分生蒲黃四分薑蠶一錢牙皂分半冰片一分研細吹此方能消腫去痰碧丹又玉丹三分元丹一釐百草霜半匙甘草炭三匙冰片五釐薄荷去筋二分牙皂少部凡喉痹初起金丹不宜多用以其性善走央能達內症輕則不勝藥力也此碧丹消痰清熱祛風解毒開喉痹出痰涎最效不比金丹之迅利凡喉痹單蛾輕症止用碧丹重症金碧合用初起碧九金一吹過五管後碧七金三極重金碧各半痰涎上壅金六碧四因症之輕重以定藥之多寡最宜斟酌無痰切莫亂用玉丹又即前尤氏方內之煉礬也元丹又即前尤氏方內之煅燈草灰也雪梅丹又即前尤氏方內之製梅礬也配合吹藥又碧丹二分元丹一釐百草霜五釐甘草冰片各一分薄荷末二分牙硝研三分硼砂五釐治音聲病方八鬱金湯寒包熱鬱金生地知母阿膠牛蒡子杏仁童便桔梗沙參蟬退補虛湯舌強黃芪白朮當歸陳皮各一錢竹瀝薑汁各半盞大秦艽湯舌卷秦艽石膏甘草川芎當歸白芍羌活獨活防風黃芩白朮白芷茯苓細辛熟地生地訶子湯音濁訶子二個一炙一生桔梗五錢半炒半生甘草二錢半炙半生童便水各半盞煎三服愈玉粉丸痰結半夏五錢草烏炮二錢半肉桂一分半薑汁糊丸每夜含化一丸杏仁桑皮湯暴嗽杏仁一兩桑皮五錢薑汁白蜜砂糖各一兩五味子紫菀各二錢通草貝母各四錢蛤蚧丸久嗽蛤蚧一對去口足溫水浸去膜刮了血脈酥炙訶子阿膠生地麥冬炙甘草細辛各五錢蜜丸含化清音湯總治訶子肉阿膠天冬鹽知母各五錢蜜炙黃柏麥冬茯苓歸身生地熟地各一錢人參三分烏梅二個人乳牛乳梨汁各一盞蜜丸每一錢含化
