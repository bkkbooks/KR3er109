body:
  text: 卷十心包絡病源流手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循糯內行太陰之間入肘中下臂行兩筋之間入掌中循中指出其端支者另掌中循小指次指出其端次注手少陽三焦每日戌時周身氣血俱注於心包絡經手厥陰包絡經少氣而多靈蘭祕典論十二官無心包絡但曰膻中者臣使之官喜樂出焉按心包絡在心下橫膜之上豎膜之下其與橫膜相粘而黃脂裹者心也脂膜之外有細筋膜如絲與心肺相連者心包也其地正值膻中且位居相火代君行事實臣使也然則祕典之言膻中其即為心包無疑矣故心為君火居廣明以建極以照臨十二官經曰君火不用尊之極也然火為地二所生君火雖不用有奉天行職又不得同於君火者心包所以主相火也夫相火本屬少陽膽相火之用專屬陽明胃腐熟水谷何以心包主之也説以人之相火起於少陽膽遂遊行於三焦而督署之以為陽明腐水谷之正者實心包也故經曰陽明居午以陽明當相火夏令不言心包而心包之能督署自見矣此以知陽明之經之職總攝於包而膽也胃也三焦也總與心包同一職矣所以難經曰手心主少陽火生足太陰陽明土右尺巳午即其位也説手心主者心包之別名去腕二寸曰內關出於兩筋之間循經以上係於心包心係氣實則病心痛心中大熱手心熱面黃目赤笑不休臂肘攣急腋腫甚則胸脅支滿虛則煩心手心熱心淡淡大動然虛不可補此皆取之兩筋間也古人云心包絡痛必連及少陽少陰夫亦可以知其故矣包症治靈樞曰少陰者心脈也心者五臟六腑之大主也為帝王精神之所舍其臟堅固邪不能容容之則傷心心傷則神去神去則死矣故諸邪在於心者旨在心之包絡包絡者心主之脈也故少陰無輸也正傳曰心包絡實乃裹心之膜包於心外故曰心包絡也醫旨曰包絡虛宜錢氏安神丸虛而挾熱醒心散包絡實熱宜犀角地黃湯十味導赤散治心包絡病諸藥要品及方四心包絡虛宜養心當歸川芎血竭沒藥茯神心包絡實宜瀉火朱砂丹皮犀角生地山梔子當歸黃岑黃連黃柏錢氏安神丸因虛朱砂一兩麥冬牙硝茯苓山藥寒水石甘草各五錢冰片二分蜜和一兩作三十丸每丸砂糖水化下醒心散虛熱人參麥冬遠志五味茯神生地菖蒲等分犀角地黃湯實熱犀角生地黃岑黃連大黃十味導赤散又地骨皮黃連黃岑麥冬半夏茯神赤芍木通生地甘草各五分加薑五片三焦病源流手少陽三焦脈起於小指次指之端上出二指之司循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循到三焦其支者從膻中上出缺盆上項係耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥次注足少陽膽經每日亥時周身氣血俱注於三焦手少陽三焦經少血而多氣經曰上焦出胃口並咽以上貫膈而布胃中中焦亦並在胃中出上焦之後下焦別回腸注於膀胱而於陽明胃之脈則曰循喉嚨入缺盆下膈屬胃其直者從缺盆下乳內廉其支者起胃口下循腹裡下至氣街此與三焦同行在前不知三焦者實胃部上下之匡廓三焦之地皆胃之地三焦之所主即胃之所施其氣為腐熟水谷之用與胃與太陰脾之前為相火所居所遊之地故焦也者固以熟物為義也然則三焦雖有上中下之分而所由以分者不俱從胃言之歟何則人之心下為膈膜膈下為胃其上口曰賁門在臍上五寸上脘穴分是為上焦臍下四寸為中脘穴即中焦肺脈起中焦在此臍上二寸為下脘穴即胃下口傳入小腸處曰幽門者是為下焦論三焦地分雖不過四寸之間而論三焦所主部位則上焦之胃上口承接心肺其所主部位自在膈以上一段下焦之胃下口下輸水谷於小腸而小腸之水液滲入膀胱以注前陰小腸之滓穢轉輸大腸以注後陰則下焦所主部位自在臍腹以下一段若膈之下臍腹以上中間一段胃實居之則胃之正中正中焦所主之部分也古人云上焦如霧者狀陽明化物之升氣也云下焦如漚又云如瀝者狀化時沃溢之氣也云下焦如瀆者狀擠泌流水之象也古人誠見乎三焦之氣化一皆胃之氣化一皆相火所成央耳乃後以三焦為無狀空有名皆不知其為匡廓於陽明也故其病而燥實則有耳鳴喉痺腫痛耳後連目鋭眥痛肩臑痛內外皆疼頭面赤熱赤白遊風等症虛則有腹寒短氣少氣等症如或板窒窒則三焦之氣滯也急當調之使一氣流通三焦傳受靈樞曰上焦出於胃上口並咽以上貫膈而布胸中走脅循太陰之分而行還至陽明上至舌下足陽明常與榮俱行於陽二十五度行於陰亦二十五度為一周而復大會於手太陰命曰衛氣也中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微亦注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰榮氣也下焦者別回腸注於膀胱而滲入焉故水谷者常並居於胃中成糟粕而俱下於大腸而成了焦滲而俱下擠泌別汁循下焦而滲入膀胱焉入門曰心肺若無上焦何以宗主榮衛脾胃若無中焦何以腐熟水谷肝腎若無下焦何以疏決津液無形而有用主持諸氣三焦水谷之道路氣之所終始也三焦症治靈樞曰鼻柱中央起三焦乃約又曰小腹腫痛不得小便邪在三焦約也海藏曰上焦如霧霧不散則為喘滿此出而不納也中焦如漚漚不利則為留飲不散久為中滿此上不能納下不能出也下焦如瀆瀆不利則為腫滿此上納而下不出也入門曰三焦為丙火府故其發也為無根之相火內經曰三焦為上中下水谷之道路其病宜通利二便醫鑑曰三焦病宜三和散枳殼丸木香檳榔丸治三焦病諸藥要品及方七實宜清涼血蘇子知母元參黃岑童便貝母麥冬黃柏山梔黃連射乾甘草犀角天冬白芍生地蒲黃牛膝桔梗蒲荷花粉丹皮連翹赤芍苧根藍汁紅藍花牛蒡子山豆根山茨菰千金子枇杷葉五味子甘蔗汁梨柿三焦實兼宜降氣虛宜補中益氣人參白朮黃耆麥冬沉香益智仁五味子滯宜調氣通塞木香香附蒼朮砂仁白蔻仁紫蘇根三和散總治川芎一錢沉香紫蘇葉大腹皮羌活木瓜各五分木香白朮檳榔陳皮炙草各三分此方兼治諸氣鬱滯或脹或痛枳殼丸又枳殼二兩陳皮一兩檳榔五錢木香二錢半黑牽牛子四兩一半生用一半炒熱搗取頭末一兩半餘不用蜜丸此方專治三焦約大小便不通木香檳榔丸又半夏曲皂角去弦子酥炙郁李仁去殼另研各二兩木香枳殼杏仁檳榔青皮各一兩共為末另以皂角四兩打碎浸漿水去渣渣揉熬膏入蜜少部和丸空心薑湯下此方疏導三焦快氣順腸涼膈散上焦熱連翹二錢大黃芒硝甘草各一錢薄荷黃岑山梔各五分竹葉七片蜜少部煎至半入硝桃仁承氣湯中焦熱立效散下焦熱瞿麥四錢山梔二錢甘草一錢薑燈心導赤散又生地木通甘草各一錢竹葉七片附載仲景大法及分別標本方藥上焦不歸噫而吞酸上焦之脈不歸也中焦不歸不能消谷引食榮衛皆虛中焦之脈不歸也三焦無倚寸口微濡下焦不歸則遺溺下焦之脈不歸也三焦實麻黃元參山梔黃岑連翹三焦虛附子硫黃肉蓯蓉補骨脂陽起石三焦大熱石膏三焦大寒肉桂標有汗桂枝黃耆白朮石膏地骨皮無汗麻黃荊芥蒲荷金沸草本肉桂黃耆熟地益智仁膽病源流足少陽膽脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至眉上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎會於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下脅循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足胕上入小指次指之間其支者別胕上入大指之間循大指歧骨內出其端還貫爪甲出三毛次注足厥陰肝經每日子時周身氣血注於膽足少陽膽經多氣少血膽為中正之官決斷出焉又為中清之府主藏而不主瀉則其所主異於他臟腑矣其府之氣直得先天甲氣而起於少陰發於厥陰乃二陰之真精所生以為一陽之妙運也經曰少陽連腎腎上連肺夫少陽起於夜半之子為腎之天根其氣上升以應肺之治節為腎天根則通乎下應肺治節則通乎上其所以能通乎上下者以其為中和之極也惟通乎上下故得遊行三焦且即三焦之所治以致用陽明故十一經皆藉膽氣以為和經曰少火生氣以少陽即嫩陽為生氣之首也是以肝之為用能起九地而升地德亦能出三陽而布天德皆少陽之妙運也亦十一經所以取決於膽之故也豈特為中正之官為五神之決斷已哉然其為腑有獨居於清靜寧謐而出其沖和之氣以溫養諸臟者宜其有中清之目矣若夫動而為病實則口苦耳聾鼻淵善太息心脅痛不能轉側甚則面塵體無膏澤足外熱頭額痛目鋭眥痛缺盆中腫痛腋下腫痛馬刀挾癭胸中脅肋髀膝外至脛絶骨外踝前及諸節皆痛汗出振寒瘧虛則易驚或不得眠身寒潮熱而潮熱在平旦由氣中之火實上主於肺潮熱在日脯由血中之火實下主於腎察其在氣在血有汗無汗咸佐以柴胡丹皮地骨皮大實更加大黃下之得其治矣卮言曰膽者淡也清淨之府無所受輸淡淡然者也士材曰膽者擔也中正之官決斷出焉猶人之正直無私有力量善擔當者也二家釋膽字俱有義理耐人尋味膽病症治子和曰膽者敢也驚怕則膽傷矣又曰面青脫色膽腑受怖也入門曰膽候咽門故熱壅則生瘡腫痛又曰膽病多寒熱又曰膽虛則恐畏不能獨臥實則易怒又曰膽虛則不臥膽實則多睡又曰小柴胡湯乃少陽經之藥水煎澄清溫服則能入膽膽絶侯靈樞曰膽絶者耳聾百節皆縱目直視如驚絶係絶係者一日半日死其死也色先青白乃死矣脈經曰膽絶七日死何以知之眉為之傾治膽病諸藥要品及方十膽實宜用和解柴胡黃岑半夏生薑甘草陳皮天冬甘菊生地沙參元參薄荷知母山萸白蒺藜龍膽草丹皮膽虛宜補膽氣人參當歸甘草竹茹竹葉谷精草決明子白芍棗仁陳皮木賊草茯神半夏湯膽實生地棗仁各五錢半夏生薑各三錢遠志赤苓各二錢黃岑一錢黍米二合長流水煎澄清服此方專治膽經實熱煩悶十味導赤散又地骨皮黃連黃岑麥冬半夏茯神赤芍木通生地甘草各五分薑五片此方能治膽熱兼治心藏實熱煩渴驚悸口瘡當歸龍薈丸又龍膽草當歸山梔黃連黃柏黃岑各一兩大黃蘆薈青黛各五錢木香二錢半麝香五分蜜丸此方專治肝膽實熱脅痛瀉青丸又龍膽草當歸川芎山梔大黃包煨羌活防風等分蜜丸芡子大每一丸竹葉湯同砂糖溫水化下此方治膽實清肝涼膽湯又白芍一錢半川芎當歸各一錢柴胡八分山梔丹皮龍膽草各四分此方專治肝血虛膽汁少有怒火仁熟散膽虛柏子仁熟地各一錢人參五味子枳殼山萸肉桂甘菊茯神杞子各七分半煎服或為末酒下二錢此方專治膽虛恐畏不能獨臥加味溫膽湯又香附二錢四分橘紅一錢二分半夏枳實竹茹各八分人參茯苓柴胡麥冬桔梗各六分甘草四分薑三棗二一名參胡溫膽湯此方專治心膽虛怯觸事易驚涎與氣搏變生諸症加減溫膽湯又茯神半夏枳實陳皮山梔白朮黃連麥冬各一錢當歸棗仁竹茹各八分人參六分甘草三分薑三棗二烏梅一個水煎和竹瀝半盞調朱砂末五分服此方專治膽虛驚疑如人將捕神不守舍琥珀定志丸又南星八兩先掘地作坑置炭十八斤燒紅去灰淨好酒十餘斤傾坑內瓦盆盛南星安其中説覆以炭火擁定勿令泄氣次日取出為末人乳粉薑製人參茯苓茯神各三兩塊朱砂納公豬心內線扎懸砂罐中入好酒二碗煮菖蒲豬膽汁炒遠志肉豬膽汁拌炒再用薑汁製各二兩西珀一兩蜜丸臥時服薑湯下此方專能扶肝壯膽管轄神魂治一切驚戰虛弱氣乏之疾十四友丸又龍齒另研二兩熟地棗仁茯苓茯神人參肉桂遠志阿膠當歸黃耆柏子仁紫石英煅另研各一兩朱砂五錢蜜丸棗湯下此方能補心肝虛神志不寧附載仲景分別標本方藥標柴胡標之本柴胡葛根湯本花粉本之本大柴胡湯肝病源流肥氣胠脅肋痛腋臭漏腋足厥陰肝經脈起於大指叢毛之際上循足趺上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胄到肝絡膽上貫膈布脅循喉嚨之後上入頏顙連目係上出額與督脈會於巔其支者從目係下頰裡環唇內其支者復從肝別貫膈上注肺次仍還注手太陰肺經每日丑時周身氣血俱注於肝足厥陰肝經少氣而多血肝於五臟為獨使為將軍之官合少陽膽為遊部居脾之下腎之前微偏左其位在少腹其地在血海其部在兩脅兩胠其經起於足指通於巔頂其臟為太少二陰之交盡處其表為少陽膽故一陽發生之氣起於厥陰而一身上下其氣無所不乘肝和則生氣發育萬物為諸臟之生化若衰與亢則能為諸臟之殘賊故又與膽同為少陽而厥陰兼乎少陽之肝與少陽根乎厥陰之膽相為表裡是以其臟主春其德屬木惟其地為血海故其臟為血臟其部為血部而其職主藏血而攝血其主又在筋能任筋骨勞役之事為罷極之本其精上榮於目而兼通於耳惟其德屬木故其體本柔而剛直而升以應乎春其性條達而不可鬱其氣偏於急而激暴易怒故其為病也多逆逆則頭痛耳聾頰腫目滿兩脅下痛引少腹善怒善瘛四肢滿悶虛則目無見耳不聰善恐如人將捕之經病則腰痛不可俯仰丈夫疝㿉婦人少腹腫甚則嗌乾面塵色脫遺溺癃閉其鬱與勝必侵及乎脾脾受木邪則胸滿嘔逆飧泄總而計之其為寒熱虛實邪氣侵剋本經自病與經氣相加種種諸症其由肝之不足者固可勿論即屬有餘亦由肝之陰不足故有鬱勝所生病也夫肝氣之逆因肝志之鬱然雖鬱不可用攻伐經故曰以辛散之以辛補之也肝火之實因肝血之虛然既虛則不得廢滋養經故曰以酸收之以甘緩之也然則肝無補法一語不且遺千古之禍哉至若陰邪犯入必陰厥陰厥宜溫是補肝之氣也陰虛不榮必陽厥陽厥宜清是涼肝之血也氣則溫補血則清涼尚何有肝木之病哉薛耆清肝火補肝血兩言洵足為醫林炯鑑肝病原由症治靈樞曰有所附墮惡血留內有所大怒氣上不下積於脅下則傷肝又曰邪在肝則兩腋中痛寒中惡血在內又曰肝藏血血捨魂肝氣虛則恐實則怒內經曰肝病者兩腋下痛引少腹令人善怒又曰肺傳之肝病名肝痺一名厥脅痛出食肝熱者色蒼而爪活又曰大骨活大肉陷胸中氣滿腹內痛心中不快肩聳身熱肉脫目眶陷真臟見目不見人立死其見人者至其所不勝之時死注云不勝之時庚辛月也又曰肝藏血血有餘則怒不足則恐又曰肝病者平旦慧下哺甚夜半靜又曰肝苦急急食甘以緩之注云肝苦急是其氣有餘也又曰肝欲散急食辛以散之又曰肝病忌當風難經曰外症面紫而青善怒內症臍左有動氣按之牢若痛其症四肢滿閉脈澀便難轉筋有是者肝也無是者非也入門曰人動則血運於諸經靜則血歸於肝臟肝主血海故也肝絶侯靈柩曰足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰器而絡於舌本也故脈不榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚日篤辛日死又曰厥陰絶者中熱嗌乾心煩善尿甚則舌卷卵縮而終矣仲景曰唇吻反青四肢伸縮汗出者肝絶也脈經曰脈絶八日死何以知之面青但欲伏眠目不見汗如水不止肝氣滯澀保養法保生祕要曰凡人氣旺則血榮而潤澤氣絶則血活而滅形故氣虛弱滯澀而成病如滯於肝則肝氣不順或搠脅而疼或成疸症或傳目疾或成瘋患諸風掉眩皆屬於肝也春月木旺宜常噓吸為補瀉之法和其肝氣勿食諸肝以免死氣入肝傷其魂也宜燒蒼朮香清晨飲屠蘇酒馬齒莧以祛一年不正之氣大抵陽春初升景物融和當眺覽園林尋春郊外以暢春生之氣肝臟修養法養生書曰常以正二三月朔旦東面平坐叩齒三通吸震宮青氣入口九吞之閉氣九十息導引法𦡱仙曰可正坐以兩手相重按陛下徐緩身左右各三五度又可正坐兩手拽相叉翻覆向胸三五度此能去肝家積聚風邪毒氣肝之積曰肥氣在左脅下狀如覆杯有足似龜形久則發咳嘔逆脈必弦而細宜肥氣丸增損五積丸皆肝家氣血兩虛肝氣不和逆氣與瘀血相並而成治法宜和肝散結脈法綱目曰肝有積其脈弦長胠脅肋痛肝經病也説肝與膽二經之脈布脅脅肝火盛木氣實故流於胠脅肋間而作痛凡人肩下曰膊膊下曰臑臑對腋腋下為怯怯下為脅脅後為肋肋下為季肋俗名肋梢季肋之下為腰部分如此今怯脅肋痛固由於肝邪之實而所謂肝邪者不越氣血食痰風寒五端試先言五者之由再詳症之所屬一曰氣鬱由大怒氣逆或謀慮不決皆令肝火動甚以致膚脅肋痛宜沉香降氣散枳殼煮散枳殼散桂枝小龍薈丸一曰死血由惡血停留於肝居於脅下以致胠脅肋痛按之則痛益甚宜小柴胡湯合四物加桃仁紅花乳香沒藥或桃仁承氣湯復元活血湯一曰痰飲由痰飲流注於厥陰之經以致怯脅肋痛痛則咳嗽氣急宜控涎丹加南星川芎蒼朮再用二陳湯煎水吞下又芎夏湯調中順氣丸一曰食積由食停脅下有一條槓起以致胠脅肋痛宜神保丸以枳實湯吞下又當歸龍薈丸一曰風寒由外感風寒之邪留著脅下以致脅肋痛宜芎葛湯小柴胡湯加枳殼桔梗此五者皆足致痛而惟怒氣瘀血居多也治法先分左右再審虛實大約左痛多留血或大怒傷陰或跌撲鬥毆傷血致死血阻滯或肋下有塊皆作痛右痛為肝邪入肺惱怒鬱結不伸是為氣痛痰痛亦在右走注痛而有聲食痛亦在右即前所云一條扛起者是此以左右分氣血也故左屬血痰氣亦有流於左者然必與血相搏而痛不似右脅之痛無關於血也右屬氣亦有血適瘀於右而痛者然必與氣相阻而後痛不似左脅之痛無關於氣也如是則左痛不專屬血右痛不專屬氣氣血將安辨哉説瘀血按之痛不按亦痛痛無時息而不膨氣痛時止而膨暖即寬旋復痛以此辨驗氣血更快至胠脅肋地分本近一處故其為痛亦不必細分何部只以脅痛概之而脅之痛要即俗名肝氣痛由肝家邪實所致非怯脅肋之自生痛而自作痛也故不入於身形門中與腰腹等並列而特附於肝也試更論之脅痛多半是實不得輕於補肝能令肝脹也治實大忌柴胡若川芎則必用暴怒傷血必和血宜當歸香附山梔甘草死血阻滯必日輕夜重午後發熱脈短澀當去瘀宜桃仁紅花沒藥香附赤芍苡仁根有塊必消塊宜牡蠣以上左病氣痛須調氣宜和脅飲有痰須導痰宜蒼朮半夏白芥子陳皮食積當消導宜砂仁枳實黃連吳萸以上有病此氣血食痰分見於左右者也若風寒則不論左右皆有稔知外感之邪必表散宜川芎葛根桂枝防風有兩邊俱痛者則於前藥加減參用痛甚加醋少部此皆治實之法也亦有痛時目䀮䀮無見耳無聞善恐如人將捕之者其脈必虛切不可作實治須看大便大便通和咳嗽肝火侮肺金也宜小柴胡湯加山萸橘葉若連胸腹脹痛大便不通為瘀血停滯須先通之宜歸尾紅花香附延胡索蘇木橘葉大黃隨即用補益宜參用歸脾湯加味逍遙散又或酒色過度當脅一點痛不止名於脅痛甚危惟大補氣血而已宜補肝散此皆治虛之法也而又有左痛由肝實火盛者宜枳殼疏肝散左痛不移處由死血菀結者宜桃仁承氣湯右痛由痰積氣滯兼有者宜推氣湯右痛而氣喘者宜分氣紫蘇飲右痛由怒氣所傷者宜香附湯右痛由痞塞者宜沉香導氣散跌撲肋痛由氣血凝滯者宜復元活血湯右痛由悲傷肺氣者宜推氣湯脅痛由受暑皮黃發泡者宜大瓜蔞散或兼清肝破氣之品脅痛由傷寒者宜小柴胡湯不便加枳殼或不由傷寒身體微熱者宜枳殼散枳殼為脅痛的藥故諸方皆用之也此皆挾有五邪分見左右一切零星之病之治法也至於肋梢之部在肝下膽之位若甚痛牽連小腹亦是死血不外胠脅肋痛治瘀血方藥痛不甚止於一處痰也亦不外胠脅肋痛治痰方藥宜二陳湯加柴胡青皮白芥子烏藥脈法內經曰肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆仲景曰寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也正傳曰脈雙弦者肝氣有餘兩脅作痛又曰肝脈沉之而急浮之亦然若脅下痛有氣支滿引小腹而痛時小便難若目眩頭痛腰背痛得之少時有所墜墮丹溪曰氣鬱胸脅痛看其沉澀當作鬱治也腎邪上搏脅痛入門曰一人患脅痛衆以為癰陽脈弦陰脈澀投諸香薑桂之屬益甚項昕見之曰弦者痛也澀者腎邪有餘也腎上搏於脅不能下且腎惡燥今服燥藥過多非瀉不愈先用神保丸下黑溲痛止更服神芎丸或疑其太過昕曰向用神保丸者腎邪透膜非全蠍不能引導然巴豆性熱非得硝黃蕩滌後遇熱必再作乃大泄數次遂愈胠脅肋痛症治丹溪曰肝苦急是其氣有餘急食辛以散之宜用川芎蒼朮青皮又曰肝火盛兩脅痛不得伸舒先以琥珀膏貼患處卻以生薑湯吞下蜜丸當歸龍薈丸最妙此藥丸乃治脅痛又曰龍薈丸亦治飲食大飽勞力行房脅痛乃瀉肝火之要藥也又曰咳引脅痛宜疏肝氣用青皮枳殼香附白芥子之類兩脅走痛可用控涎丹正傳曰凡脅痛皆肝木有餘小柴胡湯加青皮川芎芍藥龍膽草甚者入青黛麝香調服又曰性急多怒之人時常腹脅作痛小柴胡湯加川芎芍藥青皮吞下龍薈丸甚捷入門曰肝熱鬱則脅必痛又曰發寒熱脅痛似有積塊必是飲食太飽勞力所致須用當歸龍薈丸治之又曰肝氣實脅痛者手足煩躁不得安臥小柴胡湯加川芎白芍當歸蒼朮青皮龍膽草肝氣虛脅痛者悠悠不止耳目䀮䀮善恐四物湯加柴胡青皮兩脅下痛引小腹善怒是肝氣實也當歸龍薈丸以薑汁吞下氣弱之人脅下痛脈弦細多從勞役怒氣得之八物湯加木香青皮肉桂煎服或用枳實醫鑑曰凡脅痛者必用青皮而青皮必須醋炒煎服末服並佳説青皮乃肝膽二經之藥人多怒脅下有鬱積固宜用此以解之若二經氣血不足則當先補血少用青皮可也腋臭漏腋皆先天濕鬱病也腋臭者穢氣從腋下出如狐狸膻臊令人不可相近俗因名狐臭患此疾者腋下必有毛空如針細即出穢處耳內必有油濕治法於五更時先取精豬肉兩大片以甘遂末一兩盡數拌之挾腋下天明以甘草一兩煎湯飲之良久瀉出穢物但此穢氣恐或傳人須於荒僻處出大便如此三五次即當愈其他密陀僧胡粉之類皆塞竅以治其末耳宜蜘蛛散漏腋者腋下或手掌足心陰下股裡常如汗濕之衣也宜六物散二症因腋與膚脅肋相連故附詳於此腋臭治法丹溪曰治腋臭法用大田螺一個水中養之候靨開以巴豆肉一粒針挑放在螺內仰頓盞內夏月一宿冬則五七宿自然成水取搽腋下絶根一方先用胭脂塗腋下其出狐臭之處黃色就將前巴豆田螺去靨掩於狐臭之上絹帛扎緊其狐臭從大便出則絶根矣回春曰以自己小便洗一次米泔洗二次生薑自然汁每日擦十次日日如此一月之後可斷矣治肝病諸藥要品及方五肝實宜清熱降氣橘皮青皮黃連黃岑杜蘇子柴胡甘草青黛竹葉赤芍藥鬱金香附砂仁木通羚羊角麥冬童便甘菊荊芥龍膽草大黃生地連翹元參延胡索黃柏山梔肝虛宜辛散甘緩當歸生薑甘菊胡麻杜仲蘇子陳皮地黃甘草鬱金谷精草降香通草橘紅白芍鹿角膠木瓜斷牛膝杞子金石斛天冬麥冬黃柏酉珀五味子真珠丹皮犀角蟬退木賊草棗仁人參黑醜茶葉蜜蒙花黃耆烏梅黃岑石膏忍冬藤山藥山查乾薑紅曲刺蒺藜決明子沙蒺藜女貞實土茯苓因鬱而虛者加細辛木香縮砂仁沉香川芎香附瀉青丸肝實當歸川芎山梔羌活防風煨大黃龍膽草等分蜜丸芡子大每一丸竹葉湯同砂糖湯化下一名涼肝丸洗肝散又當歸羌活薄荷防風大黃黑山梔川芎甘草各一錢加龍膽草一錢妙當歸龍薈丸實熱龍膽草當歸山梔黃連黃柏黃岑各一兩蘆薈大黃青黛各五錢木香二錢半麝香五分蜜丸小豆大薑湯下二三十丸清肝湯肝虛白芍一錢半當歸川芎各一錢柴胡八分山梔丹皮各四分補肝丸又川芎當歸白芍生地防風羌活蜜丸附載仲景大法及分別標本方藥有餘則聚聚宜通氣薄荷荊芥羌活防風蔓荊子雄黃皂莢川芎獨活龍膽草血紅花三稜木香鱉甲鯪鯉甲虻蟲水蛭不足則燥燥宜潤氣吳萸甘菊杞子天麻柏子仁蜜蒙花血當歸川芎牛膝杜仲菟絲子白芍熟地沒藥血竭細辛槐角風實則泄羌活獨活細辛雄黃大黃牽牛子皂莢首烏風虛則補川烏牛膝殭蠶川斷南星白花蛇蟬退天麻杜仲川芎半夏菟絲子白朮萆薢土茯苓白附子風經則鎮真珠金箔銀箔夜明沙代赭石石決明一法木鬱則達之謂吐之令條達也標初病為標渴欲飲者少少與之則愈此雖在裡即是標也囊縮四逆湯吳茱萸湯本煩滿當歸脈沉滑脈力皆倍者當下之此即大小二閉閉雖用承氣湯不若四物湯加大黃尤嘉胸煩滿囊縮自下不治自愈厥陰本無下症大概言傷寒傳入裡可下之又一轉厥陰症標亦為初病宜甘溫本宜用熱無汗麻黃旋覆花蒼朮蔥頭有汗桂枝地骨皮白朮黃耆汗之而發麻黃清涼為汗細辛和之而汗柴胡下之而汗大黃吐之而汗瓜蒂防風治肥氣方二肥氣丸總治柴胡二兩黃連七錢川椒二兩厚朴五錢甘草二錢廣皮崑布人參各錢半川烏錢二分皂莢茯苓各一錢六分乾薑巴霜各五分春夏再加黃連五錢丸法服法同息賁丸增損五積丸又黃連厚朴川烏乾薑人參茯苓柴胡川椒蓬朮皂角崑布增減法及分量詳在息賁條內治胠脅肋痛方三十沉香降氣散氣鬱薑黃陳皮甘草各一錢煨山稜煨蓬朮益智仁厚朴各七分白朮蘇葉香附神麯麥芽烏藥備五分大腹皮人參訶子各二分半此方專治氣滯脅肋刺痛胸膈痞塞枳殼煮散又枳殼二錢細辛桔梗川芎防風各一錢葛根七分甘草五分薑三棗二煎服此方專治悲哀傷肝兩脅痛又治七情傷肝兩腋兩脅牽痛枳殼散又枳殼兩二錢半炙草三錢七分半每末二錢濃煎蔥白湯調下此方專治脅痛如有物刺之乃氣實也桂枝湯又小枳殼一兩桂枝五錢每末二錢薑棗湯下此方專治驚傷肝脅骨裡疼痛小龍薈丸又當歸山梔黃連川芎大黃龍膽草各五錢蘆薈三錢木香一錢麝香少部粥丸薑湯下五七十丸仍以琥珀膏貼患處琥珀膏外占大黃朴硝各一兩為末大蒜搗為膏和勻作片貼之一方加麝五分名硝黃膏此方兼貼一切積塊痞塊小柴胡湯死血四物湯又川芎當歸白芍地黃桃仁承氣湯又桃仁大黃芒硝桂枝甘草加鱉甲青皮柴胡當歸川芎復元活血湯又柴胡花粉當歸紅花穿山甲甘草大黃桃仁十棗湯痰飲甘遂炒大戟芫花微炒等分為末別取大棗十枚水一盞煎半盞調下壯人一錢弱人半錢大便利下以粥補之此方有毒不可輕用控涎丹又甘遂大戟白芥子等分糊丸臨臥溫水下七丸至十丸二陳湯又茯苓陳皮半夏甘草芎夏湯又半夏赤苓各一錢陳皮青皮枳殼各五分白朮炙草各二分薑五片調中順氣丸又薑半夏大腹子各一兩木香蔻仁青皮陳皮三稜各五錢砂仁尖檳榔沉香各二錢半粥丸陳皮湯下神保丸食積全蠍全者七個巴豆十粒木香胡椒各二錢半朱砂一錢半為衣蒸餅丸麻子大每五七丸枳實湯下當歸龍薈丸又當歸龍膽草山梔黃連黃柏黃岑各一兩大黃蘆薈青黛各五錢木香二錢半麝香五分蜜丸薑湯下二三十丸芎葛湯風寒川芎葛根桂枝細辛枳殼人參麻黃芍藥防風各一錢甘草五分薑三片和脅飲氣痛枳殼青皮薑黃香附甘草歸脾湯補益人參黃耆當歸白朮茯神棗仁遠志龍眼木香甘草薑棗加味逍遙散又白芍白朮各錢二分知母當歸地骨皮各一錢茯苓麥冬生地各八分山梔黃柏各五分桔梗甘草各三分補肝散又川芎當歸白芍地黃防風羌活共為末枳殼疏肝散肝實枳殼枳實川芎柴胡陳皮香附白芍炙草推氣湯痰氣薑黃枳殼肉桂甘草陳皮青皮木香穿山甲分氣紫蘇湯氣喘紫蘇桑皮桔梗甘草茯苓陳皮五味子大腹皮薑鹽香附湯怒傷香附川芎當歸柴胡青皮沉香導氣散痞塞沉香人參檳榔白朮烏藥麥芽神麯紫蘇厚朴香附薑黃橘紅甘草紅花三稜蓬朮益智大腹皮訶子皮大瓜蔞散受暑大瓜蔞一個搗爛加紅花少部甘草枳殼散微熱枳殼桔梗細辛川芎防風葛根甘草八物湯怒勞治腋臭漏腋方二蜘蛛散腋臭大蜘蛛一個鹽泥包煅紅放冷去泥研細入輕粉一字醋調成膏夕敷腋下明日登廁必瀉下黑汁臭穢於僻處埋之六物散隔腋枸杞根甘薔薇根甘草各二兩商陸根胡粉滑石各一兩為末以苦酒少部和塗當微汗出易衣更塗不過三著愈
