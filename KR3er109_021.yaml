細貝薑黃青荊烏藥同煎後衝服砂仁更是強四十三號鼎象方牛膝二錢獨活枳殼桃仁連翹澤瀉赤芍山楂薑黃蒲黃各一錢水煎微冷服此方專散瘀毒引火下行歌曰鼎象同前瘀毒除為因引火下行時翹牛獨枳楂桃澤赤芍薑蒲次第施四十四號未濟方牛膝二錢金銀花丹皮連翹細辛延胡索澤蘭白芨蒲黃木通各一錢水煎沖童便微溫服此方專治小腸經痧歌曰小腹疼痧伸屈難方推未濟澤蒲黃通延牛膝銀花細白芨連翹並用丹四十五號蒙象方天竺黃膽星各三錢雄黃朱砂各五分麝香牛膝各三分甘草湯泛丸梧子大每服三丸白湯下此方專治痰涎喘急之痰歌曰蒙象痰涎喘急聲朱雄天竺膽南星麝香研末牛黃共甘草湯丸拔盡根四十六號渙象方旋覆花丹參薑黃橘紅元胡索穿山甲赤芍澤蘭山楂角刺此方專治半身不遂痧歌曰半身不遂毒來攻渙象丹延澤橘紅角刺穿山楂赤芍薑黃旋覆氣平胸四十七號訟象方澤蘭延胡索赤芍桃仁陳皮紅花烏藥獨活丹參水煎溫服此方專治內傷兼痧歌曰訟象兼屬痧內傷丹烏延赤澤為蘭陳桃獨活銀花取不畏煩勞咳嗽痰此首歌內加金銀花四十八號同人方歸身山楂紅花枳殼赤芍川斷青皮茜草丹參連翹微溫服此方養血和中之劑歌曰同人吐衄便紅增養血和中此劑平楂殼赤紅翹茜草歸青續與共丹參四十九號坤象方白蒺藜荊芥炭赤芍薄荷葉青皮陳皮等分水煎微冷服此方專治痧症氣血阻塞歌曰坤象同前血阻明肚心肺部患非輕蒺藜赤芍薄荷葉荊芥青皮又用陳五十號複象方連翹山梔茜草枳殼丹皮赤芍牛膝金石斛金銀花草決明水煎沖童便服此方專治眼目怪症痧歌曰眼目奇痧複象方梔翹茜草決明當銀花石斛丹牛殼赤芍還加童便良五十一號臨象方羚羊角生地黃連木通荊芥谷精草赤芍生甘草甘菊大黃木賊草羌活望月沙水煎服此方專治痧毒在肝目生障翳歌曰臨象同前用二生連通菊賊芍羌荊羚羊望月谷精草一著將軍眼倍明五十二號泰象方人中白三錢花粉硼砂青黛各一錢生甘草兒茶薄荷葉細茶葉黃連各五分冰片一分牛黃珠子各五釐研至無聲先用濃茶洗去腐肉吹之此方專治痧後牙疳歌曰痧後牙疳泰象神兒茶花粉黛官硼牛黃珠子人中白薄荷黃連一片冰五十三號大壯方桃仁紅花山楂獨活細辛香附青皮水煎沖童便服此方專能行經散痧歌曰倒經大壯婦人科腹脹雙紅可奈何獨細青紅香附米楂桃多用便相和雙紅謂經水紅及鼻紅也五十四號央象方桑寄生紅花香附荊芥菔子益母草細辛神麯水煎沖砂仁末服此專治胎前痧症歌曰央象胎前痧所侵寄生益母附紅荊細辛卜子兼神麯沖服砂仁藥更靈五十五號需象方獨活細辛丹參柴胡牛膝烏藥山楂陳皮金銀花益母草金石斛水煎溫服此方專治產後痧症歌曰絞痛非常產後虛消瘀需象獨陳皮柴丹益母辛牛膝石斛楂烏即便除五十六比象方香附薑黃桃仁蘇木山楂丹參牛膝艾葉柴胡獨活金銀花益母草水煎稍溫服此方專治產後痧症歌曰比象同前蘇木薑楂桃益母艾柴香銀花牛膝丹參獨縱有諸邪亦不妨薑薑黃也五十七號兌象方荊芥防風連翹紅花青皮卜子桔梗枳殼山楂牛蒡子此方專治小兒痘前痧症歌曰痘前痧脹用心專兌象荊防桔梗看青殼牛蒡楂菔子紅翹共劑自安痊五十八號困象方羌活紅花荊芥木通當歸牛膝青皮連翹蟬退牛蒡子此方專治痧後熱毒流連不已致成瘡瘍歌曰困象瘡瘍熱毒攻羌防歸膝芥翹通青皮暗退紅花合腫痛兼痧一旦空五十九號萃象方甘菊荊芥紅花甘草木通連翹土貝母金銀花牛蒡子柴花地丁等分胡桃肉一枚水煎溫服此方專消痧後餘毒發為癰瘍紅腫緣痧毒留滯肌肉骨腠間者歌曰萃象同前毒發紅金銀土貝菊翹通荊防甘草地丁紫引用胡桃肉一宗六十號咸象方人參當歸黃芪甘草牛膝紅花貝母角刺白芷山楂金銀花加胡桃肉一個水煎空心溫服此方專治痧後餘毒流連氣血不能即潰者歌曰咸象變成惡毒症參芪歸貝草銀紅山楂角刺胡桃芷莫使流連氣血攻六十一號蹇象方乳香沒藥貝母雄黃花粉黃連各一錢大黃半炒半曬赤芍各二錢牛蒡子錢二分甘草七分穿山甲土炒七分每細末五分蜜湯下此方專治痧後熱毒發癰發疴疼痛不已歌曰蹇象癰疔不可當川連乳沒貝雄黃將軍赤芍穿山甲細末還調是蜜湯六十二號謙象方人參茯苓當歸白朮白芍黃芪陳皮川芎熟地甘草空心服此方痰後調理之劑歌曰痧退調和謙象稱芎歸熟地芍參苓陳皮芪朮生甘草煎服空心氣血平六十三號小過方金銀花土貝母牛蒡子白扁豆子山藥山楂當歸各一錢人參四分甘草三分胡桃肉一枚蓮肉六枚水煎空心溫服此方痧退後調理之劑歌曰小過同前調理清銀花土貝草歸參蒡楂扁豆兼山藥蓮肉胡桃引用明六十四號婦妹方炒鹽活礬各一兩炮川烏甘草各五錢乾薑三錢飯丸每服一錢白湯溫服新犯痧者一二服即愈久犯痧者十服全愈說用甘草以助胃用薑烏以充胃用活礬以解毒用食鹽以斷痧五味之妙用誠為千古之良方若病人素本虛寒必加倍多服方能有效此方專治屢患痧症必待全愈然後服之以絕其根若痧氣未除切不可服恐甘者能作脹熱者反能助邪也歌曰婦妹常沾要絕根待他全愈斷痧靈礬鹽烏草乾薑共米飯為丸湯送溫治痧脹應用古方十七玉樞丹山茨菇去皮焙二兩此味不真則藥不效五倍子洗淨焙三兩千金子霜一兩紅芽大戟去蘆焙乾一兩半麝香另研和入三錢上除千金麝香另研三味為末和入二味研勻糯米濃湯和木臼內杵千下分為四十錠孕婦忌服每用一錠生薑汁磨薄荷湯服井華水磨亦可通利兩次無妨用溫粥補之此方所治諸病開列於後一治癰疽發背未破時用井華水磨塗患處並磨服之良久覺癢即消一治陰陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發並瘟疫山嵐瘴氣纏喉風並痧脹腹疼冷水入薄荷一葉同磨下一治急中風癲邪喝叫亂走鬼胎鬼氣無灰酒送下一治自縊死落水死心頭溫者及驚死鬼迷未隔宿者並冷水磨灌下一治蛇犬蜈蚣傷冷水磨塗傷處並服尤妙一治新久諸瘧臨發桃柳枝煎一治牙痛含藥少部吞下一治湯火傷東流水磨塗患處一治撲跌損傷炒松節無灰酒煎數沸下一治年深日近頭疼太陽痛酒磨塗紙上貼太陽穴一治諸般癇疾口嘴斜唇眼掣及夜睡多涎言語蹇澀卒中風口噤牙關緊急筋脈緊縮節風腫手足疼痛行立俱覺艱辛風氣疼痛並用酒磨服一治小兒急慢驚風五疳二痢蜜水薄荷葉同磨服牙關急緊磨塗並服普濟消毒飲酒黃連酒黃芩各五錢去白陳皮生甘草元參各二錢牛蒡子三錢連翹板藍板各二錢馬勃一錢炒薑蠶升麻柴胡各七分桔梗三分薄荷五分大青葉三錢川芎防風各八分共為細末半用湯調時時服之半用蜜丸含化服盡良愈牛黃八寶丹雄黃元參瓦上焙各五錢炒羌活土炒川連羚羊角犀角炒貝母乳香沒藥各三錢青黛二錢珍珠四分朱砂五錢牛黃冰片各二錢共研細末再將金銀花紫花地丁甘菊各二兩甘草五錢長流水五碗砂鍋內慢火煎至半取汁渣絞乾桑柴火熬膏入煉蜜盞部再熬粘筋和丸每丸重三分幼者一丸大人二丸蜜湯服此方專治痧症發斑發狂渾身赤紫痧後惡毒瘡瘍皆能消化仙方腦麝丸黃藥子白藥子各三錢花粉二兩黃連一兩研末篩止用頭末木香三錢沉香二錢麝香五分龍腦三分豬膽汁丸每丸重一分此方專治山嵐瘴癘解茶痰酒渴除伏暑退心熱止喉疼開目霧及赤白痢一切火症央效如神並將兼治之症開列於後一治瘴氣痰渴老年痰火臨臥含化三丸一三伏時行路含一丸口不渴且消暑氣如感大熱用五丸或七丸同好茶一撮鹽梅一個打碎以井華水調服一治心熱頭疼用三五丸含化一治赤痢用七丸茅根汁同搗服白痢用七丸同茶葉鹽梅搗服一治痧脹面赤身熱痰喘氣急不省人事服之即愈鬱金丸醋炒五靈脂一兩元胡索八錢木香鬱金真者曬研雄黃各三錢生礬砂仁各五錢神麯糊丸每三十丸或四十丸用自己口中津唾咽下此方專治隨常痧症腹痛一服見效兼治九種心疼潤下丸酒製大黃四兩黑醜頭末炒二兩牙皂煎汁和丸鳳仙子大每服一錢或錢半至二錢燈心湯服此方專治大腸燥實二便秘結痧毒壅盛者此丸不但潤腸兼利小便煉石丹千年石即陳石灰水飛一兩松根石即真琥珀三錢水骨石即滑石水飛二錢水泛為丸表熱躁煩者青黛為衣眩暈心悶者朱砂為衣每服二錢垂頭蘆粟湯下如聖散麩炒枳殼三兩微炒小茴三錢鹽磚剷上燒紅三分每末二錢溫酒調下如不能止再服一錢此方可補痧脹方所不逮兼治當心痛遍身骨節牽疼或嘔吐惡心不時發作者並疝氣勞根失笑散五靈脂去砂土炒炒蒲黃等分每末一二錢溫酒調服此方專治男婦慣發痧脹服此永不再發兼治血迷心竅不省人事婦人產後心腹絞痛及腹瘀血作痛者白虎湯熟石膏五錢知母三錢甘草一錢梗米一撮加竹葉名竹葉石膏湯此方專治傷暑發痧神效兼治溫病身熱自汗口乾脈來洪大及霍亂一切暑病解曰病在陽明骨肉則巨陽之表邪已解矣故外不惡寒又無頭痛身疼之症但自汗出而發熱也經曰熱淫所勝佐以苦甘以知母甘草解熱說熱則傷氣用粳米甘草之甘以益氣且治不得眠而煩躁也煩者肺也躁者腎也以石膏為君佐知母之苦以清腎之源因石膏體堅而重墜知母沉寒而走下故用米草之甘以緩之使不遽達於下焦也名之曰白虎者以白虎為西方金神而司秋令暑火之氣至秋而衰且知母之苦寒又能保太陰肺金之氣故名之曰白虎以為三陽經一解表藥耳雖是三陽經解表切記有汗當施無汗當戒也說無汗者必須柴葛升麻以解其表邪不可見其身熱誤用白虎以遏其熱而使之內陷也益元散滑石六兩甘草一兩每末三錢暑月涼水調服加朱砂名辰砂六一散此方專清暑熱利小便止渴除煩利竅之劑也餘治小兒身熱咳嗽微帶驚風者用燈心湯調服之屢屢有效大羌活湯防風防己羌活獨活蒼朮白朮黃芩細辛炙草各一兩川芎知母生地各二兩俱咀片每用一兩半水煎得清藥一大盞熱飲之不解再服此解利兩感神方也若痧症與此相似亦以此方加減而選用之經曰兩感者死不治一日太陽與少陰俱病頭痛發熱惡寒口乾煩滿而渴太陽者腑也血背哄而入人所共知少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水水流濕故腎受之又曰天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有裡欲下之則有表表裡既不能一治故死矣然所稟有虛實所感有淺深虛而感深者必死實而感淺者獨或可治治之而不能救者有之矣未有不治而得生者也治臌香櫞丸陳香櫞四兩去白廣皮醋三棱醋蓬朮澤瀉茯苓各二錢醋香附三兩炒菔子六兩青皮去穰淨楂肉各一兩神麯糊丸每服五六十丸米飲下此方或水或氣或食俱治加味活命散土炒穿山甲金銀花大黃各三錢去白陳皮歸尾各錢半花粉薄荷赤芍生地白芷乳香甘草節防風貝母各一錢沒藥角刺各五分水煎空心服忌醋並諸毒物此方專治痧後一切留滯熱毒發為腫毒發背疔疽其加法開列於後毒在背加皂刺一錢半毒在面加白芷一倍毒在胸加瓜蔞仁二錢毒在頭項手足加金銀花五錢此方之妙即非痧後尋常發毒亦可用祛瘴闢瘟丹厚朴蒼朮羌活防風陳皮枳實香附牛蒡子各一錢檳榔白芷各八分藿香川芎各五分細辛四分甘草三分加蔥白加減法開列於後無汗加蘇葉薄荷口渴加花粉葛根身重汗出加防己石膏溫瘧加柴胡半夏大便秘結加大黃頭疼加川芎遍身疙瘩腫痛加鹽葉薑蠶大黃肌肉發紅黑紫斑加元參青黛連翹先中熱又中暑加白虎湯香茹咳嗽涕唾頭目昏眩加旋覆花荊芥風溫身體灼熱加黃芩黃連黑山梔此本方專治感受時行不正之氣瘟疫痧瘴男婦老幼皆同者加減聖效散厚朴藿香葉防風製蒼朮藁本柴胡獨活澤瀉枳殼石菖蒲細辛各五錢檳榔陳皮炒砂仁炒菔子元胡索各八錢草蔻仁去殼十枚共為粗末每服五錢不計時煎溫服取遍身微汗即愈時氣不和空心飲之可闢邪疫原名聖散子即東坡守杭時設劑療疫全活萬人之方也如有痧症相類者用此以治之亦無不效此方專治傷寒時行疫癘陰陽兩感表裡未辨或外熱內寒或外寒內熱肢節拘急頭項腰脊疼痛發熱惡寒嘔逆喘咳鼻塞聲重及飲食生冷傷在胃脘胸膈飽滿腸脅脹痛心下痞結手足逆冷腸鳴泄瀉水谷不消小水不利等症硫礬丸明礬硫黃各四兩先將二味用豆腐渣在砂罐內煮一日夜取去豆腐渣仍入罐慢火熬至乾燥罐盛二藥埋地深三尺三日夜取出礬硫化紫金色再下一層有泥渣不用然後再將茯苓山藥各三兩同蒸曬露一宿酒炒當歸酒炒白蒺藜各四兩烏藥略炒熟半夏三兩杏仁焙一兩半去白陳皮炒小茴各一兩棗肉丸清晨鹽湯下一錢半臨臥白湯下一錢此方為斷除痧根之神劑有人病痧十年或十日半月或一季半年發則痛不可忍叫喊驚人隨即暈死或用探吐或用醋炭燻鼻並用華佗危病方略得解醒後用此丸全愈遂得除根此病已入骨髓百無一救今幸而得此且餘屢用而多效真神方也附華佗危病方吳萸木瓜食鹽各五錢同炒焦用砂罐盛水三杯煮百沸隨病人冷熱任意服之即蘇又痧脹隨宜便用救急小方十九陰陽水涼水滾水各半或井水河水各半細辛為末砂仁湯冷調服此治氣阻受寒痧晚蠶沙為末白湯冷服羊糞一把滾水泡盡一時取上面清湯冷極服之白砂糖攪梅水服黑砂糖亦可童便連飲數碗泥漿水路上受暑痧用仰天皮水攪澄清飲之綠豆湯稍溫服做綠豆粉泔水亦可麻油一盞灌下牙關緊抉口灌之蘆根湯微溫服菜油二兩麝香一錢昏迷不省欲死者灌下立蘇蘿卜菜作湯飲伏龍肝泡水飲生豆腐漿服碗部絲瓜葉搗汁飲之亦可治霍亂生黃豆細嚼不豆腥氣可用辨試是否痧症芋艿連皮毛生嚼是痧便不麻口可用辨試燒鹽湯待冷不拘多少灌下探吐以下二方乃吐新食阻隔痧毒之法必多飲方吐明礬研末陰陽水調服二錢亦可探吐多則用至三錢以上六十四方古方十七小方十九皆錄養吾原本
