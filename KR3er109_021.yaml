body:
  text: 卷二十一痧脹源流痧脹風濕火三氣相搏病也夫痧脹之病自古已有痧脹之名自古未立考之方書曰乾霍亂曰絞腸痧曰青筋曰白虎症曰中惡即皆痧脹之病也特未專立痧脹之名而其症亦偶一患之未如近今之甚耳故從古患此症者北方多有謂之曰青筋症又曰馬頭瘟今則南方遍行謂之曰水痧又曰水傷寒江浙則為痧閩廣則曰瘴氣其實一而已矣惟古已有此病故凡方書所以治乾霍亂絞腸痧青筋白虎中惡者皆即治痧脹之方藥惟古未立此名故凡後世焠刮刺等法及所以治之之方劑皆自古所未專詳後之醫者因得藉口以為古書之所無今人自不能治以致患此症者俱束手以視其斃亦可憾矣雖然皇古無醫書自軒岐創法歷代名人各有撰述因而一切之病著一切之治法亦備痧脹之病特古未遍行故治法遂略耳迨後世其病既盛其法又何嘗不有人詳論之耶且痧脹至今時而始有人詳論不猶之一切病症亦為古略而後詳耶是亦理有固然無足怪已夫所謂今時詳論痧脹者何人王養吾是也養吾名凱毗陵人精於醫尤善痧症曾詳列七十二種正變痧於康熙間刻痧症全書行於世而其板惜早湮沒其書不甚傳向餘於痧脹一症曾遍稽古方書言乾霍亂等症者參以己見著為論後得養吾書讀之詳盡無遺仍複理精詞達雖其言兼症變症類症處未免頭緒太煩然掘柢搜根發前人所未發直覺養吾未有書痧症如隱煙霧中養吾既有書痧症如顯日月臨照中而人皆得共見也視餘向之所論殊為簡而未該矣遁即養吾之言最精確者採輯而條貫之以著斯篇又恐人不知餘斯篇之實本於養吾而反沒養吾也因於此特中之亦不敢掠人之美云爾且餘前言痧脹為風濕火三氣相搏之病者何也風為厥陰風木濕為太陰濕土火為少陽相火三氣雜揉清濁不分升降不利遂至胸腹脹急或痛或不痛而痧脹之症以成此則病因之由於內者也其實內三經之因其發必由外感而外感必分表裡其始感於肌表人自不知則入半表半裡故胸悶嘔吐腹痛也用焠法可愈不愈以藥治之宜四號否象方五號觀象萬或感於半表裡人自不知則入於裡故欲吐不吐欲瀉不瀉痧毒衝心則心胸大痛痧毒攻腹則盤腸吊痛用放血法自愈不愈以藥治之宜十四號豐象方十九號大畜方或中於裡人自不知則痧氣壅阻惡毒逆攻心膂立時發暈氣血不流放之亦無紫黑毒血即有亦不多此痧毒入深兇兆也但當審脈辨症風寒暑濕氣血食積痰飲辨其何因治之使蘇令氣血流動然後扶起放痧如不蘇急以藥灌之宜二十一號暌象方三十三號巽象方四十五號蒙象方如此重症當立時連進湯丸方能有救遲則必死凡痧脹服藥但由痧氣壅盛而無食積瘀血宜冷服若痧氣壅阻食積而無血瘀稍冷服若痧毒盛而血瘀微溫服若痧入氣分而毒壅宜刮痧若入血分而毒壅宜放痧其大較也且痧症必分涼熱如痧犯太陽則頭疼發熱犯少陽則耳旁腫脹寒熱往來犯陽明則但熱不寒面目如火犯太陰則腹痛身涼犯厥陰則少腹或脅胸痛亦身涼犯少陰則腰痛亦身涼犯肺則咳嗽痰喘微熱甚則鼻衄犯心則心痛或心脹頭額冷汗如珠而身或熱或涼犯膀胱則小便血甚則身熱犯大腸則痢膿血嘔吐身熱犯肝則沉重不能轉側晡熱內熱甚則吐血犯三焦則熱毒內攻口渴便結而身熱此痧犯六經臟腑而寒熱之外現者也又有痧氣壅盛發為熱症或熱而不涼或日哺發熱或潮熱往來皆痧毒阻而不通搏擊肌表發而為熱若誤為外感傳經熱症發汗溫飲雖慢痧遲緩勢必益盛變出頭汗發狂譫語種種重症不知外感之脈浮數而緊熱症之脈洪數有力痧症之脈終有不同或有可疑須看痧筋有無辨之即明矣而痧張又必觀其所起與其所伏說痧之發也與中風痰厥昏迷相似若脈不洪滑便有可疑非真痰矣故症或口渴身熱而脈變為沉遲症或不渴身涼而脈變為緊數皆為脈症不合必取青紫筋色辨之方有確見不得誤認為中風痰厥昏迷也且其病源之起伏更有顯然者如先吐瀉而心腹絞痛其痧從穢氣而發為多也先心腹絞痛而吐瀉其痧從暑氣而發為多也心胸昏悶痰涎膠結遍身腫脹疼痛難忍四肢不舉舌強不言其痧從寒氣久伏鬱為火毒而發為多也則其源之所在安可不詳審哉且夫治痧脹與治他症之法異欲治痧脹必先明乎他症之所以異何言之如傷寒食未化下之太早反引寒邪入胃變而為熱熱邪固結所食不能消化乃成結胸若痧症新食固宜以吐為先至所食既久驟然痧脹雖所食消化未盡下之無害說痧脹非有寒邪入胃變成熱結之患但因痧毒在腸胃部分肌肉作腫作脹盤腸絞痛遍及臟腑故外宜用刮放以泄毒於表內可即下以攻毒於裡則腫脹自消食積因之通利原無結胸之可憂也但下之必兼去食積又宜以漸而進中病即止痧毒若犯咽喉則痰喘如鋸先放其痧急用薄荷牛蒡童便山豆根之類以清之兼用吹藥宜二十號損象方痧症危急大便不通急宜放痧用藥攻之宜潤下丸小便不通亦急放痧用藥分利之宜四十四號未濟方枚舉兩三端可見痧與他症之異也即或有痧與他症相兼而發者亦當首重治痧兼醫他症以痧症急而他症緩也惟胎前產後有痧當並重處治說胎前宜補痧症宜消產後宜溫痧症宜涼也此際最當斟酌雖然痧症之發其表裡寒熱起伏以及他症同異固不可忽視而痧氣侵犯要必先及十二經故其發時每隨所犯之經而有十二經現症必明乎此方可隨症尋經因經設治而十二經脈所起及十二引經之藥俱不可不知試條列焉或腰背巔頂連及風府脹痛難忍是足太陽膀胱經痧也其脈起於足小指外側之端其引經藥黃柏藁本或兩目紅赤如桃唇乾鼻燥腹中絞痛是足陽明胃經痧也其脈起足次指外間又一支入足中指外間又一支入足大指端其引經藥葛根厚朴白芷少用或脅肋腫脹痛連兩耳是足少陽膽經痧也其脈起足四指間其引經藥柴胡青皮或腹脹板痛不能屈伸四肢無力泄瀉不已是足太陰脾經痧也其脈起足大指端其引經藥酒炒白芍或心胸吊痛身重難移作腫作脹是足厥陰肝經痧也其脈起足大指叢毛上其引經藥柴胡青皮川芎或痛連腰與外腎小腹脹硬是中少陰腎經痧也其脈起足小指下其引經藥獨活鹽酒或咳嗽聲啞氣逆發嗆是手太陰肺經痧也其脈起手大指端其引經藥蔥白桔梗白芷少用或半身疼痛麻木不仁左足不能屈伸是手太陽小腸經痧也其脈起手小指端循外側上行其引經藥羌活少用或半身脹痛俯仰俱廢右足不能屈伸是手陽明大腸痧也其脈起手食指端其引經藥白芷少用或病重沉沉昏迷不省或狂言亂語不知人事是手少陰心經痧也其脈起手小指內側出其端其引經藥獨活細辛或醒或寐或獨語一二句是手厥陰心包絡經痧也又名手心主其脈起中指端其引經藥柴胡丹皮或胸腹熱脹揭去衣被乾燥無極是手少陽三焦經痧也其脈起手無名指端其引經藥川芎少用夫既因十二經現症而知何經之痧即可因何經之脈所起之處以施針刺再用藥治之寧患痧脹之不愈或有謂針刺手足無如指頂為妙者法最簡便參用可也然而治痧莫要於手法更有不可不明者手法奈何不外焠刮放三者而已說痧在肌表有未發出者以燈照之隱隱皮膚之間且慢焠若既發出有細細紅點狀如蚊迹粒如㾦麩疏則累累密則連片更有發過一層複發兩三層者焠法看其頭額及胸前兩邊腹上肩腰照定小紅點上以紙捻條或粗燈草微蘸香油點灼碎之即時暴響焠畢便覺胸腹寬松痛亦隨減此火攻之妙用也此焠法也痧在皮膚之裡有發不出者則用刮法若背脊頸骨上下胸前脅肋兩肩臂灣用銅錢或碗口蘸香油刮之若在頭額項後兩肘臂兩膝腕用棉紗線或苧麻繩蘸香油戛見紅紫血點起方止大小腹軟肉內痧用食鹽以手擦之既刮出痛楚亦輕矣此刮法也古人云東南卑濕之地利用砭所謂針刺出毒者即用砭之道也但今放痧俱用鐵針輕者一針即愈重者數刺不痊說因痧毒入深一經鐵氣恐不能解惟以銀針刺之庶入肉無毒又何俱痧患之至深乎此刺法也夫治痧之手法既明而放痧之要處宜悉放痧者即刺痧也其可放之處有十一在頭頂心百會穴只須挑破略見微血以泄毒氣不用針入二在印堂頭痛甚者用針鋒微微入肉不必深入三在兩太陽穴太陽痛甚者用之針入一二分部四在喉中兩旁惟蝦蟆大頭瘟可用五在舌下兩旁惟急喉風喉鵝痧可用急令吐出惡血不可咽下六在兩乳乳頭垂下盡處是穴此處不宜多用不如看有青筋在乳上下者刺之七在兩手十指頭其法用他人兩手仂下不計遍數捏緊近脈息處刺十指尖出血一法用線紮住十指根刺指背近甲處出血隨人取用若刺指尖太近指甲常令人頭眩八在兩臂灣曲池穴臂灣名曲池腿灣名委中先蘸溫水拍打其筋自出然後迎刺九在兩足十指頭與刺手指同法十在兩腿灣看腿灣上下前後有青筋所在名曰痧眼即用針迎其來處刺之如無青筋用熱水拍打腿灣直刺委中便是惟此穴可深入寸部或謂刺腿灣痧筋法細看腿灣上下有筋深青色或紫紅色者即是痧筋刺之方有紫黑毒血其腿上大筋不可刺刺亦無血令人心煩腿兩邊硬筋上不可刺刺之筋吊臂灣筋色亦如此辨之此說參看可也以上刺痧要處皆當緊切牢記總之凡痧有青筋紫筋或現於一處或現於數處必須用針刺之去其毒血然用針必當先認痧筋醫者不識孟浪用藥藥不能到血肉之分或痧症複發痧毒肆攻輕者變重病家不能明其故歸咎於醫醫者之名由玆損矣故放痧必須令其放盡然亦有不盡者何也說痧者熱毒也或誤飲熱湯其青筋反隱不現即略現放之或毒血不肯流刮痧亦不出熱湯為之害也當急飲冷水解之然後可再放而血流再刮而痧出又有毒痧方發為食物積滯所阻與痧毒凝結於中即放之不盡刮之不出者食物積滯為之害也當先消食積而再刮放或有痧毒痧滯熱極血凝瘀血不流阻於胸腹刮放不盡者當先散瘀血而後刮放又有痧毒方發兼遇惱怒氣逆傷肝作脹故痧氣益盛而刮放俱難盡又當先用破氣藥而再刮放如此痧毒皆可漸消矣然而痧筋不同有現者有微現者有乍隱乍現者有伏而不現者其現者毒入於血分為多乍隱乍現者毒入於氣分為多伏而不現者毒結於血分為多微現者毒阻於氣分為多現者人知放刺微現者乃毒阻於腸胃痧筋不能自顯雖刺無血即微有血點滴不流治療之法但宜通其腸胃痧筋自現從而刺之可也乍隱乍現者又必待現而放之矣至伏而不現者雖欲放而無可放必從脈不合症辨之孰為所發之病在緩孰為所見症候甚急即症與脈相合又必細辨其何痧治法結於血者散其瘀結於食者消其食結於痰積者消其痰積迨結散之後痧筋必然複現然後刺放病其可得而理也治痧之手法寧有可不講求之者乎如果善用手法使痧毒得泄於外則必再求用藥之法以擴清其內而治痧之藥大約以尅削為主不可用補益說以痧者天地間癘氣也入氣分則毒中於氣而作腫作脹入血分則毒中於血而為畜為瘀凡遇食積痰火氣血因之阻滯結聚不散此所以可畏也故壯實者有痧症忽飲熱酒熱湯而變者固然即虛弱者有痧症忽飲熱酒熱湯而變者亦無不然至如人有雜症兼犯痧脹是為雜病變端亦畏熱湯熱酒人不知覺遂遭其禍則痧症之發又何論人虛實乎夫惟實者犯之固當以有餘治虛者犯之亦即以有餘治說其有餘者非有餘於本原乃有餘於痧毒也故藥雖尅削病自當之中病即已於本原依然無恙可見治痧之藥絕無補法痧之有實無虛也明甚然則有手法以泄毒於外有藥劑以清毒於內痧不既治矣乎乃竟有放血不出用藥不效者寧遂無法以治之說痧筋隱隱放之而血不流即昏迷不醒勢在危急若審其無食積血痰阻滯於中急用陰陽水或泥漿水或晚蠶沙水或白沙糖梅水或細辛水擇一種用之俟其稍醒然後扶起再行別法療治有因血瘀放之不出者用桃仁紅花童便之類有因飯後便犯痧症多用鹽湯或礬湯冷飲以吐去新食食久痧脹用菔子山楂麥芽消之有積痧阻用大黃檳榔驅之宜七號晉象方或痰血凝結昏迷欲死不省人事用菜油二兩麝香一錢調下立醒如是先去食積血痰之阻滯者則痧筋自然複現痧氣自然散行而後可刮即刮可放即放當藥即藥說緣痧症初發未攻壞臟腑故也總之肌膚痧用油鹽刮之則毒不內攻血肉痧看青紫筋刺之則毒有所泄腸胃及脾肝腎三陰痧須辨經絡臟腑在氣在血則痧氣內攻者可消可散可驅而除其病根也且凡病用藥得宜斷無不效獨痧症竟有得宜亦不效者何故夫痧熱毒也熱毒宜涼不宜溫宜消不宜補湯劑入口必須帶涼涼則直入腸胃而肌膚血肉之間雖有良劑安能得至故治痧者莫先於刮放也如刮放而肌膚血肉之毒已除後將腸胃肝脾腎之毒用藥驅之未有不效者矣然有刮放過藥仍不效奈何說雖刮而刮有未到雖放而放有未盡則肌膚血肉之毒猶在故藥有不效也若刮已到放已盡而痧症猶在則毒惟在腸胃及肝脾腎三陰經絡非藥將何以治之耶雖然痧之治法既已精詳而痧之名稱又當枚舉說痧各有受病之由其原雖不離七情六氣然不盡關七情六氣也有因糞穢所觸而發有因飢飽勞役而發有因傳染時行瘟疫而發痧本無定脈凡脈與所患之症不相應者即為痧之脈痧亦無定症或感風感食感勞感痰而以本症治之不效者皆為痧之症有其症即應有其名有其名即應有其治故養吾於有所感而獨發為痧者定為正痧三十六症而以三十六方治之又以痧之發或兼他症或類他症或變他症皆有必然之勢故複即此而定為變痧三十六症而以二十八方治之總計痧症共七十有二治痧方六十有四又以一症有兼用數方者有一方或可治數症者有有症而不必用藥因無方者其方難於立名遂取六十四卦象定名編次說以症皆己析方皆己造從古無七十二痧之名亦無六十四方之治也今得取其方症而列陳之曰風痧頭疼腿酸身熱自汗咳嗽腹痛此因時邪所感不可同傷風治法純用疏風當用刮法後服藥宜第一號乾象方曰暑痧頭眩惡心自汗如雨脈洪拍拍上吐下瀉腹痛或緊或慢宜第二號姤象方而亦有暑脹不已者宜第三號遯象方如竹葉石膏湯六一散俱可用曰陰痧腹痛而手足冷者是也宜用火焠或因穢氣所角而致宜第四號否象方曰陽痧腹痛而手足暖者是也出血即安或因鬱氣不通之故宜第五號觀象方曰紅痧皮膚隱隱紅點如㾦疹相似痧在肌表感受雖淺熱酒熱湯亦不可犯外用焠刮宜第五號觀象方曰斑痧頭眩眼花惡心嘔吐身有紫斑痧在血肉急用刮放遲則漸入於裡必生變症宜第六號剝象方曰烏痧滿身脹痛面目黧黑身有黑斑毒在臟腑氣滯血凝以致疼痛難忍宜第七號晉象方曰吐痧湯水入口即吐急用伏龍肝研碎水泡澄清飲即定若湯藥亦以此水煎之宜第四號否象方曰瀉痧水瀉不計遍數不可下不可澀惟分理陰陽用五苓散去桂白朮換蒼朮加車前木通之類宜五苓散曰緊痧其痛急霎時暈倒不消半刻即死故曰緊若知之者急為放血焠刮宜滌痧丸或可救曰慢痧緊痧只在頃刻慢者十日半月死甚或一月三四月死然亦必速治說其死雖遲久則痧毒延蔓腸胃經絡正多兇險如痧毒結滯於身或左右或上下或表裡其在內者先壞臟腑在中者先損經絡在表者先潰肌肉一不治便成死症夫痧之有緊有慢人多不識未能逐症詳明如初犯邪氣勝元氣衰或十日半月一發或一月二月一發久之則日近一日說由胃氣本虛故爾數犯當用藥以充其胃氣則毒自解而痧自斷矣宜六十四號歸妹方曰暈痧一時頭眩眼暗昏迷跌倒乃毒痧氣攻毒血一衝必至敗壞臟腑其勢甚急不能少延說因毒血與食積痰氣結聚心腹胸膈而經絡不轉氣血不通雖放而血不流雖刮而痧不顯治法視其食積痰血氣阻及暑熱伏熱穢氣之類消之散之俟胸膈一松則昏迷自醒然後驗其青紫筋以刺之宜第八號大有方第九號坎象方曰絞腸痧心腹絞切大痛或如板硬或如繩轉或如筋吊或如錐刺或如刀刮痛極難忍輕者亦微微絞痛脹悶非常放血可愈若不愈必審脈證何因辨明暑穢食積血痰氣阻治之須連進數劑俟其少安方可漸為調理此症多有放血不愈不肯服藥遂痧毒攻壞腸胃而死者良可惜哉本症右手脈伏宜放血用第十號節象方第八號大有方十一號屯象方服下能熟睡即愈如昏沉絞痛口吐痰涎宜先刺指頭出血用十二號既濟方冷砂仁湯調下並一號乾象方加山豆根茜草金銀花丹參山楂菔子服之安如盤腸絞痛脈俱伏宜十三號革象方十四號豐象方或飲之稍愈後複絞痛非常叫喊不己宜十五號明夷方十六號師象方必愈曰抽筋痧兩足筋抽疼甚忽一身青筋長起如箸粗必須處處大放毒血宜十七號艮象方曰暗痧心悶不已不食行坐如常即飲溫熱不見兇處心腹腰背不痛但漸憔悴日甚不治亦大害此痧之慢而輕者放之愈更有頭痛發熱心中脹似傷寒亦有往來寒熱似瘧悶悶不已又有咳嗽煩悶似傷風有頭面腫脹面目如火有四肢紅腫身體重滯不能轉側此痧之慢而重者誤吃熱物遂乃沉重或昏迷不醒或痰喘氣急狂亂如遇此等必當審脈辨症果係何因在表者刮在中者放在裡者或煎或散或丸須連進數服俟其少安漸為調理一婦忽不省顏黑左脈洪大右脈沉微此暗痧也刺腿灣青筋出紫黑血不蘇次日用十號節象方稍蘇至五日刮痧用十八號賁象方乃大蘇一老人六月發熱昏迷舌上黑苔芒刺狂罵不已六脈伏此痧之極重者利之血不流用十號節象方十九號大畜方稍冷飲之又用三號遯象方次日痧退少蘇但身重如石黑苔不退用六號肅象方而痊一婦杯孕失火急下樓墜仆絕氣以驚治不效安胎又不效明日胎下兒已死診之脈伏細按如有一絲但四體溫軟如熟睡狀急為刺手足血便呻吟投滌痧散遂蘇更用十九號大畜方並二十號損象方而痊曰悶痧痧毒衝心發暈悶地似中風中暑人不知覺即時而斃此痧之急者如略蘇扶起放痧不愈審脈用藥急投滌痧丸如發暈不蘇扶不起必須辨症的確用藥數劑灌蘇再放痧再調治宜十號節象方九號坎象方曰落弓痧忽昏不省或痰喘目上吊如小兒落弓症此暗痧難識必須審脈辨症是何痧毒再看身之涼熱唇舌潤燥何如然後治之宜十五號明夷方如痧氣未盡宜二十一號暌象方加銀花山楂丹參菔子一人常身熱口微渴飲熱茶忽昏迷左尺沉細動止不勻右寸浮芤乃腎虛而痧犯之腎水之痧逆行於肺故痰氣壅盛而發暈也用二十二號履象方加貝母牛膝入童便飲之更用二十三號中孚方然後扶起放痧愈曰噤口痧不語語亦無聲乃痧氣鬱盛熱痰上升阻逆氣管咽喉閉塞而然宜先放血審肺腎脾三經脈次之推詳餘經則知病之所由來矣一女為後母所詈痧脹昏沉不語左關有力右脈沉伏乃傷氣之痧也陳香椽一個煎湯微冷服稍有聲次日左關弦長而動說因怒氣傷肝痧氣尚阻肝經之故刺委中三針血出如注又刺頂心臂指十餘針乃用於十八號賁象方二十四號漸象方加元胡索香附微溫服之乃痊曰撲鵝痧痰涎壅盛氣急發喘喉聲如鋸此三焦命門之痧也當放臂指腿灣青筋紫黑血不愈服藥宜十三號革象方二十一號暌象方外吹二十五號震象方再服二十六號豫象方自愈說此症痛如喉鵝狀但喉鵝喉內腫脹痧只如喉鵝之痛而不腫脹形如急喉風但喉風痛而不移痧則痛無一定且痧有痧筋喉鵝則無可辨也曰角弓痧心胸脹極痧毒內攻故頭項向上開如角弓反張是臟腑已壞死症也然反複試驗又得一治法胸腹脹悶自不必言身難轉側或手足拘攣不能屈伸有時踡蹜有時反張急將毛青布一塊蘸油燒抹其手足拘急處再口含火酒噴其通體少頃定覺舒展松動然後用藥或可回生宜十號節象方十八號賁象方之類曰瘟痧寒氣鬱伏肌膚血肉間至春而發變為瘟症是名瘟痧又暑熱傷感凝滯於肌膚血肉中至秋而發亦名瘟痧但春瘟痧毒受病者少不相傳染時或有之秋瘟痧毒受病者多老幼相傳甚至一家一方俱犯其發也惡寒發熱或腹痛或不痛似瘧非瘧或氣急發喘頭面腫脹胸鬲飽悶或變下痢膿血輕者牽連歲月重者危急一時治宜放血消食積為主然後和解清理宜九號坎象方二十八號恆象方加大黃一二錢曰滿痧初起跌倒牙關緊閉不省人事捧心拱起鼻煽耳鳴急為大放毒血宜七號晉象方九號坎象方二十九號升象方曰脫陽痧小腹急痛腎縮面黑氣短出冷汗名為脫陽有似發痧用連須蔥白三莖研爛酒四碗煮二碗作三服又炒鹽熨臍下氣海穴令氣熱自愈曰羊毛痧腹脹連背心或腰胯如芒刺痛宜用燒酒瓶頭泥研細將燒酒和成團帶潮隨痛處將團上滾少頃即有細細羊毛滾在團上疼即止屢用皆驗曰羊筋痧腹脹渾身板痛此與上羊毛痧症或胸前或腰背當用小針穿皮提出筋毛自愈只揀疼處看其有毫毛聚起者便是宜滌痧丸普濟消毒飲曰紫疱痧痧症不內攻則外潰即如為腫為毒之外又有發為紫疱血者此真痧之異者也宜刺腿灣及手指頭令出毒血宜三十號井象方曰瘋痧曾見一人犯大麻瘋症眉發俱脫面目頹敗手足踡攣遇一老者為之放痧三次曰痧瘋也傳一方日日服之以漸而痊瘋者天地之癘氣說惡毒之氣纏於血肉散於肌表留於經絡以成瘋症最惡候也痧亦時行惡毒之氣所鐘變為大瘋又何疑乎老人所傳奇方金銀花六錢苦參四錢牛膝三錢赤芍紅花生地各二錢黃芩一錢半皂角刺一錢水酒各半煎附蝨痧手灣內鑽癢無比此症無藥吃亦不多見惟有急破去蝨剝去皮一法耳曾見一人遍身起大疱其癢無比用熱水洗之稍解嘗欲眠手鹽蒲包上疱若破內藏蝨一包如此數月而死曰血痧胸中脹悶飲食俱廢兩脅疼甚口中嘗湧出淡紅色血沫如西瓜瓤宜用燻陸香為君即丹陽零香佐以茜草劉寄奴之類治之自愈曰蛔結痧痧毒攻胃故蛔死入於大腸與宿糞相結腹中大痛是為蛔結又有痧毒入胃胃必熱脹之極蛔不能存因而上湧乘吐而出或蛔結腹痛不大便或入大腸由大便而出與傷寒吐蛔伏陰在內者不同法當清其痧脹為主先用刮放後服藥宜二十六號豫象方十五號明夷方三十一號大過方曰銅痧渾身上下頭面眼珠盡如薑黃色直視四肢僵直六脈似有似無一時又如沸羹大小便閉淹淹欲死急投滌痧丸刺指臂委中俱令出黑血宜三十二號隨象方良曰鐵痧頭面手足十指如鍋煤色不治以周身血凝聚也急深刺委中令多出黑血用火酒擦身法曰痧塊痧毒留於氣分成氣痞塊留於血分戚血塊痛壅於食積成食積塊痛說因刮放稍愈痧毒未盡不用藥消之故治法在氣分者用沉香砂仁之類在血分者用桃仁紅花之類由食積者用檳榔菔子之類或氣血俱有餘毒者兼治之更兼食積並治之又有痧症不忌食物痧毒裹食結成痧塊兩脅下痛其痧塊變症多端故難治且治痧唯在初發若不知或飲溫熱毒血凝結即慢痧不至殺人亦成脅痛瘀之日久勢必難散宜二十九號升象方三十三號巽象方與九號坎象方加貝母白芥子七號晉象方三十四號小畜方曰身重痧痧症初發勢雖兇暴未必身重若飲熱湯熱酒痧毒即阻塞經絡血肉之間偏身重痛不能轉側或嘔吐腹脹脈伏放痧之後治先消瘀解毒宜三十五號家人方如痧氣漸減再放痧用三十六號益象方曰心煩嗜睡痧痧氣衝於心胸故心煩或嗜睡此等俱慢痧若誤以心煩嗜睡治之必日甚倘吃溫熱必日兇至不起治法刺血為主可不藥而痊曰偏身青筋痧痧發面色如靛滿身青筋脹起粗如箸痛自小腹起攻上胸脅困倦不堪切不可誤認作虛急刺曲池委中出黑血宜滌痧丸以火酒下曰遍身腫脹痧痧者暑熱時疫惡癘之氣攻於裡則為痰喘為瘀血昏迷不省若元氣實內不受邪即散其毒於肌膚血肉之表為腫為脹若誤吃熱湯酒便成大害此痧之暗者宜從脈異處辨一女手足俱腫將及於腹六脈弦細沉遲此為慢痧變症因不肯放血數日愈腫強之放二十餘針黑毒血出用十號節象方並散痧解毒消瘀順氣藥十餘帖安一女久生瘡腹腫如鼓手足腫左脈微數右脈歇止夫瘡毒脈必洪數今脈症不合此慢痧為患也刺腿灣青筋五針又刺指頭十餘針用十號節象方並三十六號益象方連進五服乃痊以上三十六正痧也試更即三十六變痧述之曰傷寒兼痧凡傷寒頭痛寒熱諸症或當暑天或觸穢氣或感疫癘忽犯痧脹是惟認脈看筋辨之必先治痧痧退乃治傷寒若誤食溫熱湯酒生薑立見兇危一人傷寒發痧昏沈臥不能轉說痧氣衝心故昏迷痧毒入血分經絡故不能轉側先放痧用三十七號無妄方痧退治傷寒而痊一女太陽傷寒治之四日面赤身熱心胸煩悶六脈洪大無倫此兼痧症也刺青筋一針流紫黑血餘有細筋隱隱痧氣壅阻之故用三十四號小畜方二帖稍松次日筋大見刺九針服二十三號中孚方少安又早飲食複發熱面赤又刺兩足青筋用小畜方二帖稍痊偶飲溫茶立刻狂言此痧未盡散故又發耳飲冷井水二碗更服小畜方數帖痧乃清但病久身虛服參芪始愈曰痧症類傷寒傷寒集中僅有四症類傷寒至於痧症類傷寒比四症尤兇暴而方書不載故醫者不識夫傷寒頭痛惡寒發熱是太陽經症寒從肌表而入故宜發散若痧症頭痛是痧毒上攻頭面三陽不因外感其惡寒發熱雖在肌表是時行之氣所感由呼吸而入搏擊於肌表之中作為毒熱內熱則外寒故亦惡寒治宜先刺巔頂放痧以泄其毒用藥惟以透竅解毒順氣為上若誤用麻黃羌活發表太甚反助痧毒火邪勢必惡毒攻衝作腫作脹立時兇危故痧與傷寒症雖同而治各異要知痧症宜清涼則痧毒可由解傷寒宜辛散則寒氣可外舒固不可以治痧症者治傷寒更不可以治傷寒者治痧症也急刺腿灣指臂及頂心宜十號節象方三十八號噬嗑方三十九號頤象方四號否象方曰傷風咳嗽痧痧從時氣所感因而咳嗽肺經受傷不可同傷風治說傷風以疏風為主痧則當以刮放為先用藥以清喉順氣涼肺散痧為上宜四十號蠱象方加前胡山豆根曰咳嗽嘔噦痧痧毒之氣上凌肺金故氣逆發嗆而咳嗽痰涎上湧或嘔噦惡心或面目浮腫或心胸煩悶此熱毒入於氣分痧筋往往不現當刮之間有入血分者必待痧筋方刺之急宜清理其痧毒若從傷風治誤矣宜十號節象方加童便微冷服又二十號損象方或一號乾象方加貝母薄荷童便曰霍亂痧痛而不吐瀉者名乾霍亂毒入血分也宜放痧新食宜吐久食宜消食積下結宜攻痛而吐瀉者毒入氣分也宜刮痧有痧筋則放宜調其陰陽之氣須知腸胃食積宜驅不宜止止則益痛若吐瀉而後痛者此因瀉糞穢氣所觸宜用藿香正氣散須防食積血滯或消或攻或活血山藥茯苓不可亂施燥濕之品溫暖之藥俱在所禁乾霍亂盤腸大痛先放痧後即服藥宜十號節象方與潤下丸妙若上腹大痛吐瀉數十次痛更甚宿食雖吐瀉盡乃毒入血分血瘀作痛也宜二十號損象方三十三號中孚方曰痧痢夏傷於暑秋必瘧痢痢疾初發必先泄瀉瀉則腸胃空虛虛則易觸穢氣即成痧痛或天氣炎熱時行疫癘感動腸胃因積而發亦致痧痛夫痢不兼痧積去便輕若一兼犯必絞痛異常止治其痢亦不效或變痢如豬肝色或如屋漏水或惟紅血水或變噤口不食嘔吐凶危或休息久痢惟先治痧兼治積則痧消而積易去積去而痧可清矣急宜刮放宜九號坎象方砂仁湯下或三十號井象方或更發熱脹悶沉重痢下紫血六脈洪大不勻此痧氣不清毒尚盛也急刮放宜三十五號家人方入童便飲次以蘇木紅花茜草五靈脂烏藥香附當歸以導其瘀曰痧類瘧疾痧有寒熱往來似瘧或昏迷沉重或狂言亂語或痰喘不休或心胸煩悶叫喊不止或嘔噦吐痰睡臥不安或大小便結舌黑生芒如此重極脈必有變不與瘧同宜細辨之一人日晡潮熱昏沉脹悶大便不通苔厚舌焦左脈浮大而虛右脈沉細而澀若是瘧脈不應虛且澀視其乳下有青筋刺出黑血用散痧消毒活血之藥諸症退又用潤下丸三錢大便通惟寒熱未除用小柴胡湯愈曰瘧疾兼痧瘧疾連朝間夕多因暑熱相侵心中迷悶或感疫氣兼犯乎痧瘧因痧變勢所必至不可慢以為瘧而忽視之瘧猶可延痧必傷人自非先治痧決難全愈兼痧之禍可勝道哉宜十號節象方八號大有方又或有本患瘧疾日哺寒熱七八日後忽壯熱不已昏沉不醒左脈不勻右脈虛澀此非瘧脈乃為瘧之變症非痧而何刺臂出毒血不愈服藥宜五號觀象方加藿香菔子厚朴檳榔並四十一號離象方次日再刺指頭即觀象方加大黃枳實俟熱退再用十八號賁象方運動其氣曰頭痛痧痧毒中臟腑之氣閉塞不通上攻三陽巔頂故痛人腦髓發暈沉重名真頭痛旦發夕死夕發旦死急刺破巔頂出毒血以泄氣藥則惟破毒清臟為主痧毒中臟腑之血壅瘀不流上衝三陽頭面肌肉故肌肉腫脹目閉耳塞心胸煩悶急刺破巔頂及其餘青筋藥宜清血分破壅阻為要氣分宜四十二號旅象方血分宜先冷服紅花膏子半盞再用四十三號鼎象方曰心痛痧痧毒衝心屬之於氣則時疼時止痰涎壅盛昏迷煩悶此其候也治宜刺手臂服順氣藥為主痧毒攻心屬之於血則大痛不己昏沉不醒此其候也治宜刺腿灣服活血藥為主遲則難救宜十一號屯象方曰腰痛痧痧毒入腎則腰痛不能俯仰若誤吃熱湯酒必煩躁昏迷手足搐搦舌短耳聾垂斃而已故凡痧中於腎脈或左尺虛微右尺洪實或兼歇止者急刺腿灣出黑血宜十二號既濟方連服曰大腹痛痧痧毒入大小腸則小腹大痛不止形如扳推絞切不已治之須分左右二股屈伸為驗如小腹大痛每每左臥左足不能屈伸小腸經痧也或痧筋不現先服藥宜四十四號未濟方兩三劑俟筋現刺左腿灣二三針出紫黑血再服藥宜二十三號中孚方冷服愈如大腹大痛每每右臥右足不能屈伸大腸經痧也急刺右腿灣青筋三四針出毒血服藥宜三十二號隨象方冷服如夏月不頭疼發熱但覺小腹痛或心腹俱痛脹痞不能屈伸此皆暑火流注臟腑故先小腹痛偏及心腹急用藥宜六和湯清解之或四苓散加木瓜紫蘇香茹和散之或藿香正氣散加山梔或用炒鹽和陰陽水探吐痰涎亦可曰頭眩偏痛痧痧氣慢者上升於三陽頭面常覺頭眩內熱或半邊頭痛心煩不安宜刮痧不愈用清熱下氣之劑治之曰流火流痰痧痧毒傳遍不待時日朝發於足而足腫痛夕發於手而手腫痛朝發於肌膚而紅腫夕發於裡而痰喘不休此等痧乍隱乍現乍來乍去按脈而痧脈又不現最難識認如痧毒所流及之處熱者似流火而非流火腫者似流痰而非流痰或癢痛不已或但痛之極又痧之變者也欲知此痧須看病勢凶暴不比流火流痰輕且緩者驗於痧筋發現刺之無疑然後憑脈所犯風暑濕食痰血氣阻分治之斯能有效一女人日間左足小腿紅腫大痛夜即腹痛而足痛止次日左足小腿紅腫大痛腹痛又止來去不常痛無一定但六脈如常難據為痧委中有青筋三條刺之血甚多反加痰喘放痧未盡也用二十六號豫象方加土貝母三錢二帖少愈次日又刺左委中痧筋一條巔頂一針用前方加牛膝三錢痧退又用二十三號中孚方腫痛俱痊一人晚間右腿紅腫痛之已喉旁腫痛初不覺其為痧只見時症犯此者甚多細看兩臂痧筋剌出毒血用十六號師象方倍山楂菔子加大黃一錢飲之食消便下而安曰痰喘氣急痧先痰喘氣急痧脹因之先治痧後治痰氣無令痧為本病之助先痧脹後痰喘氣急因之但治痧而痰氣自愈若痧有寒熱不清痰喘氣急者兼和解痧有但熱無寒喘爭者兼消食順氣有二便不利喘急者有痢膿血或赤白喘急者但急攻裡有瘀血凝滯小便利大便黑喘急者當防痧毒攻壞臟腑不痛者可治痛不已者難治服藥不應者必死一人發熱頭疼脹悶昏迷痰喘氣急六脈無根因放痧用十三號革象方二十號損象方稍冷服又用四十五號蒙象方脹平再用一號乾象方加青皮連翹山楂菔子熟大黃病痊一婦喘急脹悶刺乳下二針出紫黑血用二十八號恆象方二帖愈一人喘急發熱身重腹中絞痛刮放不效用四號否象方十四號豐象方加大黃服之愈曰半身不遂痧心主血痧毒中血分故易攻心此痧症所以發昏也若慢痧衝激遲緩留滯經絡或左或右半身疼痛或麻痹不仁遂成半身不遂總因痧毒為害也見有青筋急宜刺破乃用藥散毒活血消瘀始得愈宜四十六號渙象方曰臌脹兼痧先臌脹忽痧氣乘之臌脹益甚在臌不可先醫在痧自宜早治一人腹脹如鼓臍突筋青心口將平知為血鼓症其指頭黑色兼痧無疑刺二十餘針腿臂出血略松遂服藥宜十九號大畜方臍下青筋漸退後用鼓脹藥導去惡水日服治鼓香櫞丸二月餘鼓症平永不複發曰痧變臌脹痧者毒也慢痧之毒遷延時日留滯肌膚腸胃中若不早治即成真鼓一人氣急作脹胸腹飽悶臍下青筋突然起心口將平此慢痧成鼓也出毒血二十餘針筋淡腹松用十號節象方曰老病兼痧先患痰火咳嗽忽喘急痰涎喉聲如鋸或頭汗如油喘而不休心胸煩悶莫可名狀雖是痰火危困然有兼感時氣或觸穢驟然勢盛者必宜察脈按症先清痧次治痰漸補氣血斯可耳一婦素痰火或痰壅喘急六脈雀啄此兼痧症尚有救刺出惡血用散痧消毒豁痰順氣藥並用四十五號蒙象方漸安後惟大補氣血愈曰弱症兼痧先患癆弱或吐血或乾嗽兩顴唇口鮮紅或骨蒸熱一感時氣或觸穢必兼痧症或痰喘或咽喉如哽或心腹脹悶煩躁發熱較之平時不足益加沉重此宜先治痧令痧毒退盡方治本症宜十號節象方清茶下曰內傷兼痧人有內傷詎無外感外感不獨風寒即暑熱時疫傳染穢惡觸犯一受之亦如外感然內傷本病也外感標病也內傷兼痧宜先治痧次治本病一老婦奪產爭毆發熱咳嗽吐痰胸中脹悶知是內傷兼痧刺痧筋二十餘針與十號節象方少松又用四十七號訟象方治其內傷下黑糞瘀血諸症除後用六十二號謙象方並前虛症亦除曰痧變癆瘵痧症有忌飲熱湯者有反喜熱湯者惟喜飲熱痧益難辨慢痧所以漸成癆瘵也原夫痧毒之始入於氣分令人喘嗽吐痰發熱聲啞說火毒傷肺肺為嬌臟若不知治變為百日緊癆輕亦數年難愈卒至危亡入於血分重者凶變在即輕者歲月挨延若乃毒瘀胃口必須去毒而愈毒瘀肝經損壞內潰吐血數發勢極兇危毒瘀心包絡更加兇險不待時日毒瘀腎經腰脊疼痛嗽痰咯血日甚難痊凡痧毒遺患總成癆瘵治須識立於始莫咎厥終一人痧脹不服藥但放痧三次胃脘間成一塊嗽痰發熱不食日瘦右關芤餘皆數此內有瘀血必吐出方解用桃仁蘇木澤蘭白蒺藜香附烏藥酒煎服吐出紫黑血碗部更用活血引下藥加童便酒服愈曰痧變吐血衄血便紅痧毒衝心則昏迷衝肺則氣喘痰壅甚則糞衄入肝則胸脅疼痛不能轉側甚則血湧吐出流於大腸則大便血流於小腸膀胱則小便血治宜先清痧毒順其所出之路則氣自順而血自止矣一人放痧不服藥變筋骨疼痛十日後吐血甚多疼痛不愈脈芤痧氣已退尚存瘀血用三十六號益象方一幼兒痧痛大便血令放痧用四十八號同人方一女痧痛溺血放痧不愈用四十九號坤象方加益母草金銀花牛膝連翹一人痧脹鼻衄是痧氣由衄而泄也用六號肅象方曰痧變發斑痧粒不過紅點而已至有渾身成片斑斕發熱頭暈者宜五號觀象方其有痧變發黃者邪熱攻乎脾胃而土之本色見於外也脾胃雖屬土又有濕熱之分說脾陰臟屬己土主燥觀其納甲於離宮可見胃陽腑屬戊土主濕觀其納甲於坎宮可知一濕一燥濕熱燻蒸如盦曲之狀故發黃也其方治載銅痧條曰犯痧小便不通痧毒結膀胱令便溺不利小腹脹痛難忍宜四十四號未濟方並滌痧丸潤下丸曰眼目怪症痧痧者火毒也若犯痧症適與心主之火相合痧毒逆衝須防攻心之患今少陰心君不受邪逆犯厥陰肝母故兩目紅腫如桃甚則眼珠突出然他症患目惟在於目若因痧為患必心中煩悶而目疾因之不早治則痧毒已參陽位其火炎極輕則壞目重則殞命治宜先刺巔頂百會穴以泄毒氣用清火活血順氣藥加牛膝石斛引火歸原良法也若心中煩悶頭眩兩目紅腫大痛眼珠掛出左目尤甚至晚即昏沉眩暈宜五十號複象方加童便服眼珠始收若兩目通紅甚至起障生翳此痧之餘毒在肝宜五十一號臨象方加燈心白芙蓉葉水煎溫服曰痧後牙疳此痧毒入於胃也宜五十二號泰象方神效曰痧後胸膈痛痧毒雖退尚留瘀血在胸膈間是積血作痛也宜朱笑散曰婦女倒經痧經行之際適遇痧發經阻逆行或鼻紅或吐紅肚腹腫脹臥床不能轉側肚腹不痛亦為暗痧若痧毒攻壞臟腑者不治急放痧宜五十三號大壯方曰胎前產後痧孕婦犯痧最易傷胎產後犯痧須防惡阻較之平人更甚當急救若暗痧陡發則胎前痧脈溷於有孕產後痧脈雜於惡阻又無心腹痛可據須當究其症候察其聲色看有痧筋急宜刺破肌膚痧壅焠刮兼施至若痧毒橫行肆攻臟腑莫可挽回矣曰胎前痧痛毒氣攻衝絞動殞命傷胎豈為細故至如安胎用白朮當歸茯苓之類痧所大忌以痧脹所宜惟是破氣破血之味又胎孕所忌斟酌其間活血解毒用金銀花益母丹參紅花寄生消瘀而不傷胎元順氣用香附陳皮厚朴砂仁烏藥行氣而不傷胎氣散痧用防風荊芥細辛透竅而不動胎孕消食積用山楂卜子谷芽麥芽寬中而不伐胎性採擇於中最為穩當然此等藥勢盛難於速效權用一二味尅藥恐於胎氣有妨不可不慎宜五十四號夬象方曰產後痧痛產後用藥必須溫暖痧症用藥惟重清涼既屬相反而處治之方毋執產後一於溫暖亦毋執痧症一於清涼也今統製一方為臨症之法散痧用獨活細辛破血用桃仁紅花順氣用香附烏藥陳皮解毒用金銀花紫花地丁消食用山楂卜子神麯麥芽如產後常用薑炭肉桂以溫血是痧症所忌痧症必用荊芥防風以散痧連翹薄荷以清熱又產後所不宜也況痧症脹極尤貴大黃枳實檳榔以通積滯而產後更不可用說痧而用溫脹者益脹產而用涼瘀者益瘀惟取微溫之氣則兩不相妨更加童便以清熱消瘀豈非良法乎一產婦三日腹脹絞痛惡露不通夫產後痛當在小腹絞痛非產後本病脈洪數有力兼痧無疑先飲童便一杯少蘇剌出毒血用二十二號履象方痧盡惡露行一婦產八日惡露太多忽寒熱胸中脹悶脈洪大無倫今惡露去盡此脈不宜放紅紫痧筋二條便不洪大又刺臂指十餘針用五十五號需象方四帖病痊一婦產六日身痛寒熱如瘧昏悶脈歇止指甲黑乃兼痧症也刺指七針舌底一針稍緩用五十六號比象方愈曰小兒夾驚痧小兒一時痰涎壅盛氣急不效眼目上翻手足發搐肚腹脹滿誤作驚治不效看有痧筋速為出血額現痧粒急為火焠先令痧退然後治驚宜四十五號蒙象方曰痘前痧痘本先天因時而發必由外感如痧亦時疫之氣所感作脹作痛而胎元之毒因之俱發凡痘未見點之前痧脹必心胸煩悶痰涎壅塞甚至昏迷不省此其候也小兒滑疾之脈類於痧症厥厥動搖之脈雖若疑似難明然有痧筋可辨單用藥清之痧自退痘自起矣若痘點既形觸穢痘隱者痘科自悉不載一兒痘初發犯痧腿灣有痧筋二條餘曰兩目少神四肢戰動痘之候也隱隱微點痘之形也口熱如爐紅紫之色熱之盛也但是痰喘氣急腿灣痧筋必痘因痧脹而發治宜先透痧或兼發痘用五十七號兌象方一帖稍冷服痘乃發十二朝而痊曰痘後痧脹痘後中氣多虛有感必傷一遇暑熱及穢惡即成痧脹往往忽然生變人多認為惡痘所致竟不知痧之為害有如此也宜二十六號豫象方合二十八號恆象方曰痘前痘後痧論凡痘前後見有痧筋止可辨其為痧用藥治之切忌針刺非不可針也痘變不常若一差池為害不淺故切切不可用針也曰瘡症兼痧瘡痛者心火血熱所致故火盛而膿腫作痛然膿瘡雖痛必漸漸而來非若兼痧之驟故凡瘡瘍兼痧其腫痛必多可畏處況瘡脈多洪數兼痧脈固不同筋色又可辨驗不容混也急刺指頭及頭頂宜五十八號困象方五十九號萃象方曰痧變腫毒痧毒不盡留滯肌肉腠理間即成腫毒急先放痧用解毒散痧藥以除其根然後審毒所發照十二經絡臟腑分陰陽寒熱處治輕則消重則拓虛則補實則瀉若紅腫甚者屬陽宜五十九號萃象方白色平腫不起發者屬陰宜六十號咸象方毒又有半陰半陽者宜五十八號困象方凡毒穿破後護之宜貼太乙膏若腫毒無膿止有毒水流出或膿少血多須拔去毒水膿血宜飛龍奪命丹研碎些些填太乙膏中毒水盡但貼膏有毒口難收者收之宜摻紅玉散一人發背疽黑爛脈沉微指頭黑色惡熱飲此痧變惡毒用冷圍藥而成此疽也令去圍藥放痧訖俟痧氣絕用六十號咸象方溫托之外敷如前法另有六十一號蹇象方選用曰痧後調理痧退之後痧氣已絕氣血虛弱者急補之宜六十二號謙象方六十三號小過方若屢患痧症者待痧氣既清調理之宜六十四號歸妹方以上三十六變痧也列正變之名目考正變之症狀備正變之方治痧焉瘦哉痧焉瘦哉以是知養吾之書實能發前人所未發足為軒岐之央臣也餘能不祖其說而述之哉脈法王養吾曰痧症脈多微緩細澀有時弦數縱浮大亦虛而無力疾徐不倫或六脈俱伏伏亦無妨鰲按又有或左或右一手伏者有一部兩部伏者痧氣一退脈即漸還假如頭疼壯熱脈應洪實而反微遲者痧也如厥冷不語脈應沉細而反滑數者痧也大抵痧脈與他脈有異脈症不符便舍症而從脈凡診痧無過此兩言盡矣且痧之毒氣衝激於經絡血肉之分或脈多洪數或沉緊或大而無倫或洪實有力若症脈稍有不合便審痧筋有無有則俟刮放後再診脈之來複如何以斷病之寒熱虛實從治無則憑脈斷其寒熱虛實用藥如傷寒雜病自有本脈若一兼痧其脈必變病必凶暴然兼痧之脈自可細考而知也傷食之痧脈多緊實傷血之痧脈多芤滑傷暑之痧脈多洪滑而數疾傷風之痧脈多沉微觸穢之痧脈多變異不常傷氣之痧脈多沉伏或形如雀啄傷寒濕之痧脈多沉細耳或有痧脈一似陰症者尤不可不辨說痧毒之氣阻抑於經絡血肉間故多沉伏即有別病兼痧者亦然如傷寒脈沉遲無力是直中三陰經之脈也治用熱藥固無疑矣惟傷寒兼痧痧脈與陰症相似莫辨一服溫補熱藥痧毒變幻悔無及矣凡臨傷寒症見有沉微或伏之脈一似直中三陰經其外視症候稍有不合者便取痧筋驗之有則為痧無則為陰症施治或涼或熱萬不失一且刮放服藥之後血肉經絡之分通而無阻即按其脈便不複如前之沉微或伏矣然後按脈辨症治其傷寒未有不效者至如雜病兼痧有沉微或伏之脈亦以此法驗之誠為至當不易是故凡痧察脈可決死生脈微細者生實大急數者重脈洪大無倫者兇一部無脈者輕一手無脈者重兩手無脈者死六脈無根放血服藥不應者不治諸怪脈現放血服藥不應者死也總之治病欲辨明虛實寒熱之法斟酌輕重緩急之宜惟脈是恃若諸脈伏不可推測醫者將何以斷驗乎故必求他症以辨之方有治法耳當諸痛脈伏者推驗筋之青紫識其為痧即諸病不痛而脈伏者亦必推驗筋之青紫識其為痧說因痧毒氣壅血瘀於經絡間故爾脈伏若刺放血流氣亦泄毒無壅阻而脈乃複其常至於重痧傷在三陰針刺有所不到血流有所不盡惟從食積血痰所阻之毒以治之脈且隨藥而複乃知痧症脈伏反為平常事耳痧脹原由症治陶節庵曰濕霍亂死者少乾霍亂死者多以上不得吐下不得利上下不通腹痛甚而頭疼發熱此為乾霍亂也犯此死者多因其所傷之邪不得出壅塞正氣陰陽隔絕也宜先用吐法再服藥繆仲淳曰絞腸痧屬胃氣虛猝中天地邪惡穢污之氣鬱於胸腹間上不吐下不瀉以致腸胃絞痛異常胸腹驟脹遍體紫黑頭頂心必有紅發急尋出拔去之急以三棱鎞針刺委中擠出熱血可立蘇次用新汲涼水入鹽兩部恣飲得吐瀉即止委中穴在兩膝下彎橫紋中間兩筋之中刺入一分王養吾曰痛而絞動者痧毒阻於食積之氣分也痛而不移者痧毒壅於血分而有瘀也發於頭面上部者痧之毒氣上壅也纏於手足下部者痧之毒血下注也上吐下瀉者痧氣上下衝激也煩悶氣脹者痧氣壅塞於心膈也惡寒發熱者痧氣遏抑於肌表也胸膈偏痛者痧之毒血流滯於經絡也結滯腸胃者食積瘀血為腫為脹也吐血便血者痧血泛溢而潰敗也咳嗽喘急者痧毒壅於氣分而生痰逆也立時悶死者痧之毒血攻心也手足軟而不能運者痧入於血分毒注下部也腰脅俱痛者毒阻於血分而有瘀也半身偏痛者毒阻於半身而血瘀也身重不能轉側者痧之毒血壅瘀不能轉運也變成癰毒潰爛者毒血凝滯敗壞肌表也以上宜分表裡又曰痧症之發未有起於寒者然亦有時為寒非真寒也說因世人知痧之熱而服大寒之劑以致此夫犯痧症必其無食積血阻於中者方可服寒飲而得效若一有食積血阻而飲大寒則食不消血不散積不行痧毒反冰伏凝阻未有得寧者嘗見高岩窮谷中行旅感受暑氣渴飲澗水而即死者是名寒痧說緣痧毒攻心服寒飲太過痧毒反凝結於心胸多致不救也若為放痧毒血一行便無阻滯得有其命故方書有服陰陽水者不獨取井水以此故耳是以久服涼飲之後痧有未痊者又當以微溫之藥施之略用三香溫和之劑誠為權宜之術若用桂附乾薑吳萸參芪之屬則又誤矣又曰治痧當辨身涼身熱身涼而內熱者宜攻其裡表熱者宜透其肌用藥隨時活變故不立主方以上言宜分涼熱又曰痧症危極昏迷不醒即扶不起呼不應雖欲刮放而不得即當用藥救之以期必效然痧症用藥必須帶冷雖未能即周於肌膚血肉間其昏迷不省乃痧之熱毒衝於心胸心即不能自主而昏迷若藥帶冷入口先從胸膈間順流而下則熱毒之氣在心膈間者隨藥而消故昏者複明迷者複省即有不省者乃食痰血積所阻若能攻而下之未有不省者矣以上用藥法又曰痧脹有一等兇症心胸高起如饅頭者不治雖曾以升象方治活一婦人胸前高突如拳大堅如鐵石者亦偶也背心一點痛者兇角弓反張者死腰腎一片痛者死心胸左右有一點痛者不治脅肋痛四肢腫痛者難治鼻如煙煤者死舌卷卵縮者死環口黧黑者死頭汗如珠喘而不休者死昏迷不省放痧不出服藥不應者死痧塊大痛服藥不應者死此皆實熱為害固然耳以上難治症又曰仲景傷寒論中不及瘟疫何況後世所云痧脹乎夫傷寒原為傳經熱症說因六氣陰陽同異不齊風熱火統乎陽寒燥濕統乎陰大抵六氣由表及裡故云外感乃肝脾胃腎與膀胱傳變皆周而病自解矣至於痧有由內而出者有自外而入者有無端而起者或發於臟何臟受之或發於腑何腑受之或犯兼症或犯變症但止於一經而不傳原不拘拘經之手足也故內受邪則為絞刺為脹急為悶亂外顯於症則為癮疹為斑黃為吐瀉存中形外自然之理耳又曰河間云諸熱瞀瘛暴喑冒昧躁擾狂越詈罵驚駭腑腫疼酸氣逆衝上噤栗如神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目瞇不明暴注卒瀉瞤瘛暴病暴死皆屬於火已上諸症今時痧脹十居八九至如暴病暴死河間但指中風痰厥由今觀之暴病暴死者於痧脹最為酷肖想古時不立痧脹之名未經說破故耳則知痧之屬火明甚然火有君相之別手少陰經君火也右腎命門為手心主乃手厥陰包絡之臟經言心之原出於太陵凡刺太陵穴者所以瀉手心主相火之原耳又有手少陽三焦合為表裡神脈同出現於右尺一經代君行令故相火之為病居多皆因火性最烈其氣上炎以致三焦阻塞六脈全乖昏冒口不能言痰喘聲如曳鋸然相火作病猶有可回若犯少陰心君確具死症則殞在須臾莫謂醫工藝術之疏耳又曰事必師古何況於醫丹溪治雜病以氣血痰三者為先說三者成疾人身最多能詳審於三法之間便可指下奏央至於痧脹又何能離此三者乎痧有氣塞者為喘息為脹滿為嘔噦為頭目脹其痛陣緊脈必洪數屬陽有氣閉者為昏冒不語為口噤目翻不省人事上下厥冷雖痛口不能言脈必沉伏屬陰痧有血熱者為煩躁為紫斑為頭目赤為衄為口吐紅沫脈必實大屬陽有血阻者腰脅痛攻心痛手足青紫脈必緊而牢乍大乍小屬陰痧有痰壅者喉中瀝瀝有聲吐咯不出嘔吐酸水清涎脈必弦滑屬陽有痰厥者卒倒僵仆手足厥冷肌膚芒刺遍身青筋坐臥不能轉側脈必微細似有似無屬陰凡氣血痰之為害於痧有如此者不得謂陽痧則生陰痧則死也即使陰痧又不比傷寒直中陰經症可用薑桂參芪也痧脹有脈伏三日亦得救活著四肢厥冷刺血投劑後即時溫暖者目閉牙噤刺血投劑後即時睜眼認人而言其所苦者醫工能識其竅則危者立安失其機雖得生全者亦死矣可不深為究心以救人生命乎以上參集諸家名論又曰凡犯痧症仰臥將大公雞一只放肚上雞即伏好疼止即跳下而愈此法試過亦驗又法痧症屬肝經者多肝附於背第七骨節間若犯痧先循其七節骨縫中將大指甲重掐入候內骨節響方止以鹽塗之如不響必將鹽重擦必使透入方能止疼以上腹痛治法又曰治霍亂腹痛之甚以新汲水百沸湯各半合飲之甚效說上焦主納中焦腐化下焦主出三焦通利陰陽調和升降周流則臟腑暢遂一失其道二氣淆亂濁陰不降清陽不升故發為嘔吐霍亂之病飲此湯即定者分理陰陽使得其平也此即無病凡夏月早起或臥間用一盞亦能清暑調中消食以上論陰陽湯之利益凡痧症飲湯藥云稍冷者九分冷一分溫也云微冷者八分冷二分溫也云微溫者冷者四分之三溫者四分之一也云冷服者十分生冷也云溫者四五分溫也以上湯藥規則又曰痛時則不欲飲食痛後亦有不喜食者有食而作脹複痛者或疑傷寒而餓壞者其間飲食最要斟酌宜忌不可不審也夫發痧忌熱湯熱酒粥湯米食諸物若飲熱湯酒輕必變重重必至危吃米物恐結成痧塊日久變生他疾難於救治如有食消不殞命者亦幸耳故痧病略松胸中知餓設或驟進飲食即複痧脹立能變重必忍耐一二日乃可萬全更見禪僧痧脹愈後再不複發以無葷腥故也今後凡遇痧病得愈者當知所戒即無屢發之患如傷寒不飲食至一候兩三候不妨者以邪氣填胃口也痧脹十日五日不飲食亦不妨者以痧氣滿塞胸膈也惟俟痧氣盡然後與之生薑痧症大忌切不可泡湯服或作藥引犯之必死今將宜忌食物開列醫家病家各遵毋忽食忌生薑棗圓眼川椒胡椒辣醬煙茶酒滾湯索粉醋面面筋豬肉羊肉雞魚蔥蒜芥菜瓜茄菱糯米食糖食桃梅李杏一切甜物食宜黑沙糖芋艿食鹽荸薺百合藕西瓜燈心湯山楂湯萊菔子湯蘆根湯陳香櫞湯陰陽水然即所宜亦必等痛止後知餓方可吃清水飯湯如米粥米糊亦宜少用且須冷吃不然則複發以上食物忌宜治痧脹忌宜諸藥忌藥切勿犯人參白朮山藥黃芪熟地白芍甘草茯苓豬苓半夏白芷蒼朮升麻肉桂附子吳萸乾薑生薑五味木瓜竹瀝杜仲杞子故紙茯神棗仁蓯蓉巴戟柏子仁凡治吐症用半夏藿香獨痧症作吐半夏性燥須防火邪切不可用藿香惟取其正氣以治穢濁倘腸胃中有食積瘀血阻滯痧毒驟用此以止吐反有閉門逐盜之憂矣宜藥須酌用陳皮枳殼荊芥柴胡葛根薄荷青皮枳實防風前胡厚朴紫蘇細辛獨活桔梗香附鬱金木香砂仁烏藥連翹蓁艽梔子貝母天冬杏仁桑皮赤芍香櫞丹參山楂紅花蘇木桃仁三棱莪朮麥芽神麯麥冬牛膝牛蒡澤蘭菔子茜草銀花香茹地丁甘菊青黛乳香阿魏膽星雄黃天竺黃蠶沙沒藥角剌牛黃麝香明礬石膏龜甲薑蠶童便梅花板藍根小青草即血見愁紅蓼子紫荊皮火麻仁劉寄奴益母草地骨皮穿山甲白芥子元胡索五靈脂痧症寒熱不由外感其毒從鼻吸而入搏擊肌表羌活麻黃俱在所禁如荊芥細辛善能透竅說惡毒之氣由竅而入故用以治痧亦由竅而泄若防風乃臣使之品取為透竅之佐不比麻黃羌活專主發表反有升發火毒之慮也忌宜相半藥羌活藿香檀香當歸黃連元參川芎沉香丁香生地黃芩花粉木通大凡忌宜相半之藥如必不得已而欲用之輕者止可用半分至三分重者亦只可四五分至錢部治痧脹方六十四一號乾象方防風細辛陳皮枳殼旋覆花荊芥穗等分水煎稍冷服頭面腫加薄荷甘菊口渴加天花粉手足腫加威靈仙牛膝金銀花腹脹加大腹皮厚朴吐不止加童便內熱加連翹知母血滯加茜草丹皮痰多加貝母瓜蔞霜小腹脹痛加青皮寒熱加柴胡獨活赤白痢加檳榔食積腹痛加山楂菔子喉腫加射干山豆根心痛加莪朮延胡索觸穢加藿香薄荷瘀血面黑加紅花蘇木放痧不出加蘇木桃仁倍細辛荊芥以上加減法大同小異餘可類推後不具載此方專治感風成痧之劑歌曰乾象風痧腹痛頻嗽煩身熱汗頭疼荊防細殼陳旋獨時氣相乾一服寧二號姤象方香茹薄荷連翹各一錢金銀花紫厚朴木通各七分水煎冷服此方專治傷暑成痧之劑歌曰暑痧姤象止頭眩自汗如傾吐瀉兼荷澤翹通車藿朴香茹瓜豆是更須此首歌內有加味三號遯象方香茹紫蘇厚朴山楂枳殼菔子陳皮青皮等分水煎冷服汗多者本方去紫蘇此方專治暑熱成痧之劑歌曰暑脹難當遯象名香茹楂朴殼陳青更加菔子蘇隨意竹葉石膏湯亦靈四號否象方藿香香附各四分薄荷葉七分枳殼連翹山楂元胡索各一錢水煎冷服此方專治陰痧之劑腹痛而手足冷者是也歌曰否象陰痧手足涼腹疼穢氣觸而成延胡殼木楂香附砂藿連翹薄荷增此首歌內有加味五號觀象方防風荊芥各一錢川芎三分連翹陳皮表皮各八分水煎稍冷服食不消加山楂菔子有積加檳榔心煩熱去川芎加山梔子痰多加貝母白芥子氣壅加烏藥香附血壅加桃仁紅花鬱悶不舒加細辛食積加三棱莪朮暑熱加香茹厚朴大便秘加大黃枳實小便秘加薄荷射干牛蒡子去川芎咳嗽加桑皮馬兜鈴此方專治陽痧之劑腹痛而手足暖者是也歌曰觀象陽痧手足溫多因氣鬱痛相尋荊防陳細檳翹鬱煩熱梔香菔子青六號剝象方地骨薄荷山梔丹皮天花粉元參細辛等分水煎稍冷服此方專退痧熱之劑歌曰斑痧剝象是良方嘔吐頭眩發紫斑地骨梔元花粉細丹皮薄荷便身涼七號晉象方元胡索蘇木五靈脂天仙子各一兩莪朮廣皮三棱枳實厚朴檳榔薑黃各七錢烏藥五錢降香沉香各三錢阿魏二錢香附四錢菔子一兩水泛丸每十五丸砂仁湯下此方專治食積壅阻痧毒瘀痛難忍頭面黑色手足俱腫胸腹脹悶等症歌曰烏痧惡症痛難當晉象丸方果是強蘇木延胡陳附朴蓬棱阿魏菔檳榔靈脂烏藥天仙子枳實薑黃沉降香水泛為丸如綠豆砂仁湯送月圓雙月圓雙者每服十五丸也八號大有方沉香檳榔各五錢卜子枳實厚朴各七錢山棱蓬朮天仙子廣皮各六錢蔻仁烏藥各四錢木香三錢薑黃五錢水泛丸每三十丸砂仁湯稍冷服此方專治痧氣急胸腹脹痛迷悶昏沉歌曰暈痧大有救昏迷厚朴天仙卜廣皮白蔻薑黃檳枳橘蓬棱烏藥木香齊九號坎象方五靈脂廣皮各一兩青皮天仙子三棱蓬朮薑黃各七分枳實六錢蔻仁烏藥各五錢木香沉香各二錢阿魏一錢製法服法同八號此方專治痧症氣壅血阻昏迷不省偏身沉重不能轉側歌曰坎象同前氣阻壅青陳烏藥實棱蓬仙靈白蔻兼阿魏更有薑黃沉木央十號節象方鬱金二錢細辛一兩降香三錢荊芥五錢每末三匙清茶稍冷服此方通治痧症之仙劑歌曰絞腸痧痛病非常節象仙方效最良鬱細降香荊芥穗三匙細末和茶漿以下七方俱屬此條十一號屯象方三棱蓬朮白芥子延胡索卜子各一錢枳殼青皮烏藥各八分紅花七分香附四分水煎稍冷服此方專治痧氣內攻之劑歌曰屯象祛痧氣內攻蓬棱白芥枳延紅卜青烏藥同香附任是盤腸一劑通十二號既濟方降香五錢牛膝二兩大紅鳳仙花紅桃花紅花各七錢白蒺藜一兩為末砂糖調童便沖服此方專治痧毒中腎之劑歌曰既濟方除中腎痧降牛桃蒺鳳仙花紅花共末同調和童便沖來效可誇十三號革象方鬱金沉香木香各一錢烏藥三錢降香二錢細辛五錢每末三錢冷水服此方專治痧氣寒凝之劑歌曰痧氣寒凝革象方鬱沉烏降木辛將共來為末三錢服定使陰寒見太陽十四號豐象方三棱蓬朮卜子青皮烏藥檳榔枳實各一錢水煎服此方專治痧症因於食積者歌曰豐象多緣食積因青烏卜實與蓬棱楂檳神麯能消食水二煎成取八分十五號明夷方細辛大黃枳實厚朴桃仁青皮火麻仁等分水泛丸每服一錢重者二錢再重者三錢燈心湯稍冷下此方專治痧症大便乾結氣血不通煩悶壅盛昏沉者歌曰明夷乾結便難通煩悶昏沉氣血壅蔞實將軍辛厚朴二仁水滴滯消融此首歌內無青皮有瓜蔞十六號師象方三棱蓬朮厚朴山楂枳實卜子連翹青皮陳皮細辛等分水煎冷服此方專治痧症氣食壅盛者歌曰師象連前有七方絞腸痧內療多般青陳楂朴蓬棱實卜子連翹與細看十七號艮象方五靈指菔子山楂神麯青皮各一兩蓬朮厚朴各八錢三棱檳榔各七錢蔻仁烏藥薑黃各五錢沉香木香各三錢阿魏二錢丁香一錢水泛丸每一錢紫荊皮湯下此方專治痧症食積成塊痛而不已推上移下日久叫喊筋脈抽掣之症歌曰艮象抽筋手足疼青筋脹起筋粗痕三香楂卜神靈蔻烏藥蓬棱朴實青阿魏薑黃檳治塊丸吞十粒紫荊皮三香沉木丁也十八號賁象方木香檀香沉香等分為末每服五分砂仁湯微冷下此方專治過飲冷水痧不愈者歌曰賁象皆由飲冷過三香末服暗痧多皆因暑熱寒冰受凝結於中毒阻何十九號大畜方白蒺藜二兩澤蘭薑黃卜子山楂茜草土貝母各一兩元胡索五靈脂各兩五錢檳榔七錢金銀花八錢烏藥青皮各六錢桃仁一兩二錢每末一錢溫酒下此方專治食積瘀血痧毒凝滯成塊日久不愈之症歌曰大畜能消積食瘀毒凝成塊久