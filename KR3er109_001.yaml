body:
  text: 卷首上脈象統類直看橫推提綱要脈不越浮沉遲數滑澀六字以足該表裡陰陽冷熱虛實風寒燥濕臟腑氣血也説浮為陽為表沉為陰為裡遲為在臟為冷為虛為寒數為在腑為熱為燥為實滑為血有餘澀為氣獨滯能於是薄晰以求之而疢疾莫能逃矣頤浮沉以舉按輕重言若洪芤弦虛濡長散皆輕按而得之類故統於浮短細實伏牢革代皆重手而得之類故統於沉遲數以息至多少言若微弱緩結皆遲之類故統於遲緊促動皆數之類故統於數至如滑雖似數澀雖似遲而其埋自殊緣遲數以呼吸察其至數滑澀則以往來察其形狀且滑澀二脈多主氣血故也故此二脈雖無所統亦平列於後以為六綱云浮浮以候表其象輕手乃得重手不見動在肌肉以上浮為風虛眩掉之候陽脈浮表熱陰脈浮表虛秋為正肺脈宜久病則忌左寸傷風發熱頭疼目眩風痰兼虛遲心氣不足心神不安兼散心耗虛煩兼洪散心熱左關腹脹兼數風熱入肝經兼促怒氣傷肝心胸滿逆左尺膀胱風熱小便赤澀兼芤男子尿血女子崩漏兼遲冷疝臍下痛右寸肺感風寒咳喘鼻寒清涕自汗體倦兼洪肺熱而咳兼遲肺寒喘嗽右關脾虛中滿不食兼大澀宿食兼遲脾胃虛兼滑痰飲右尺風邪客下焦大便祕兼數下焦風熱大便祕兼虛元氣不足浮而有力為洪即大脈又名鈎脈其象極大而數按之滿指如群波之湧來盛去衰來大去長也洪為經絡大熱血氣燔灼之候夏為正心脈宜血久嗽忌形瘦多氣者死凡脈洪則病進為表裡皆熱為大小便祕為煩為口燥咽乾左寸心經熱自赤口瘡頭疼痛心內煩左關肝熱身痛四肢浮熱左尺膀胱熱小便赤澀右寸肺熱毛焦唾粘咽乾右關胃熱反胃嘔吐口乾兼緊胸中脹滿右尺腹滿大便難或下血原書附之圖形浮而無力為芤其象浮大而軟按之中有兩邊無中空兩邊實指下成窟診在浮舉重按之間得之芤為失血之候大抵氣有餘血不足血不足以載氣故虛而大為芤之狀火犯陽經血上溢火侵陰絡血下流三部脈芤久病卒病死左寸心血妄行吐衄左關脅間血氣動腹中瘀血吐血目暗而常昏左尺小便女子月事為病右寸胸有積血或衄或嘔右關腸癰瘀血嘔血不食右尺大便血古人云前大後細脫血也夫前大後細非芤而何浮而端直為弦其象按之不舉之應手端直如新張弓弦之狀弦為血氣收斂為陽中伏陰或經絡間為寒所滯之候弦緊數徑為太過弦緊而細為不及弦而軟病輕弦而使病重輕虛以滑者平實滑如盾長竿者病徑急如新張弓弦者死春為正肝脈宜若肝木尅土而至不食難治瘧病自弦凡脈弦為痛為瘧為疝為飲為冷痺為勞倦為拘急為寒熱為血虛盜汗為寒凝氣結兼數勞瘧兼長中有積滯雙弦脅急痛左寸頭疼心惕勞傷盜汗乏力左關脅肋痛痃癖兼小寒冷癖兼緊瘀血疝瘕左尺小腹痛兼滑腰腳痛右寸肺經受風寒咳嗽胸膈間有寒痰右關脾胃傷冷宿食不化心腹冷痛又為飲右尺臍下急痛不安下焦停水浮而遲大為虛其象遲軟散大舉按少力豁然空不能自固虛為氣血俱虛之候氣血虛則脈虛主多在內不足之症久病脈虛多不治凡脈虛為傷暑為虛煩為自汗為小兒驚風寸血不榮心怔忡恍惚驚悸關腹脹食不易化尺骨蒸痿痺精血虧損浮而遲細為濡即軟脈其象虛軟無力應手細散如綿絮之在水中輕手相得重手按之即隨手而沒濡為氣血兩虛之候亦主脾濕病後産後可治平人脈濡難治凡脈濡為疲損為自汗為痺為下冷為無血少氣左寸心虛易驚盜汗短氣左關榮衛不和精神離散體虛懶少力左尺男傷精女脫血小便數自汗多右寸烘熱憎寒氣乏體虛右關脾弱食不化胃虛食不進右尺下元冷憊腸虛泄瀉浮而迢亘為長其象不大不小迢迢自若指下有餘過於本位長為氣血皆有餘之候有三部之長有一部之長按之如牽繩則病矣長屬肝宜於春診無病肝脈自見凡脈長為壯熱為癲癇為陽毒內蘊為三焦煩熱為陽明熱甚浮而虛大為散其象有表無裡有陰無陽按之滿指散而不聚來去不明漫無根柢如渙散不收散為氣血耗散臟腑氣絶之候在病脈主虛陽不斂又主心氣不足大抵非佳兆也心浮大而散肺短澀而散猶為平脈若病脈見代散必死産婦脈散臨盆之兆如未到産期必至墮胎寸怔忡雨汗關溢飲胻腫尺腎絶沉沉以候裡其象輕手不見重手乃得按至肌肉以下著於筋骨之間沉為陰逆陽虛之候主陰經主氣主水主寒主骨太過病在外不及病在內冬為正女寸男尺俱宜凡脈沉為停飲為癖瘕為脅脹為厥逆為洞泄兼細少氣兼滑宿食停滯兼遲痼冷內寒兼伏霍亂吐瀉兼數內熱甚兼弦心腹冷痛左寸心內寒邪痛胸中寒飲脅痛左關伏寒在經兩脅剌痛兼弦痃癖內痛左尺腎臟寒腰背冷痛小便濁而頻男為精冷女為血結兼細脛酸陰癢溺有餘瀝右寸肺冷寒痰停蓄虛喘少氣兼緊滑咳嗽兼細滑骨蒸寒熱皮毛焦乾右關胃中寒積中滿吐酸兼緊懸飲右尺病水腰腳痛兼細下利小便滑臍下冷痛沉而不及為短其象兩頭無中間有不及本位應手而回短為氣不足以前導其血之候俱主不及之病短脈只見寸尺若關部短則上不通寸下不通尺是陰陽絶脈必死故關不診短短屬肺宜於秋診無病肺脈其形自可見凡脈短為三焦氣壅為宿食不消兼浮血澀兼沉痞塊兼滑數酒傷腸胃寸頭痛尺腹痛沉而微軟為細其象小於微而常有細直而軟指下尋之往來如蠶絲狀細為血冷氣虛不足以充之候故主諸虛勞損或濕侵腰腎應病則順否則逆吐衄得之生春夏與少年不利秋冬與老弱可治憂勞過度者脈亦細凡細脈病俱在內在下凡脈細為元氣不足乏力無精內外俱冷痿弱洞泄為積為痛寸嘔吐關胃虛腹脹尺丹田泄痢遺精沉而弦長為實其象舉按不絶迢亘而長不疾不徐動而有力實為三焦氣滿之候俱主有餘之病凡脈實為嘔為痛為利為氣寒為氣聚為食積為伏陽在內左寸心中積熱口舌瘡咽喉痛兼大頭面熱風煩躁體痛面赤左關腹脅痛滿兼浮大肝盛目暗痛而赤色左尺少腹痛小便澀兼滑莖中痛淋瀝不止溺赤色兼大膀胱熱結小便難兼緊腰脊疼痛右寸胸中熱痰嗽煩滿兼浮肺熱咽燥而疼喘嗽氣壅右關伏陽蒸內脾虛食少胃氣壅滯兼浮脾熱消中善飢口乾勞倦右尺臍下痛便難或時下利沉極幾無為伏其象極重按之至於透筋著骨指下始覺隱隱然伏為陰陽潛伏關格閉塞之候關前得之為陽伏關後得之為陰伏脈伏者不可發汗痛甚者脈必伏凡脈伏為積聚為瘕癥為霍亂為水氣為食不消為榮衛氣閉而厥逆左寸心氣不足神不守常憂鬱左關血冷腰腳痛脅下寒氣左尺腎寒精虛瘕疝寒痛右寸胸中冷滯寒痰積冷右關中脘積塊作痛脾胃間停滯痞積右尺臍下冷痛下焦虛寒或痛腹中痛冷少腹痛沉而有力為牢其象似沉似伏實大而長少弦按之動而不移若牢固然牢為裡實表虛胸中氣促勞傷痿極之候大抵牢脈近乎無胃氣者故為危殆之脈如失血人宜沉細若浮大而牢必死以虛病反見實脈也凡脈牢為氣居於表為骨節疼痛寸關木乘土而心腹寒疼尺癩疝癩瘕沉失常度為革其象沉伏實大如按鼓皮一般革為虛寒失血之候其實即芤弦二脈相合之象芤為虛弦為寒虛寒相搏故主男子亡血失精女子半産漏下又為中風感濕之症久病死卒病生脈來渾濁變革急如湧異出而不反病進而危去如弦絶者死寸關尺沉而更代為代其象動而中止不能自還因而復動由是復止尋之良久乃復強起而動代為臟氣多衰形容羸瘦口不能言之候若不病而羸瘦脈代止是一臟無氣他臟代之必危若因病而氣血驟損致元氣卒不相績或風家痛家只為病脈故傷寒亦有心悸而脈代者復脈湯主之腹心疼亦有結澀止代不勻者久痛之脈不可準也妊娠脈代必懷胎三月代脈有生有死非定為死脈宜辨之凡脈代為腹痛為便膿血為泄利吐瀉為下元虛損遲遲以候臟其象呼吸之脈僅三至去來極慢遲為陰盛陽虛之候陽不勝陰故脈來不及也居寸為氣不足氣寒則縮也居尺為血不足血寒則凝也凡脈遲為寒為虛兼浮表寒兼沈裡寒左寸心上寒精氣多慘左關筋寒急脅下痛手足冷左尺腎虛便溺女人不月右寸肺感寒冷痰氣短右關中焦寒脾胃傷冷物不食食不化兼沉為積右尺臟寒泄瀉小腹冷痛腰腳重遲而細軟為微其象極細而軟若有若無多兼於遲按之如欲絶微為久虛血弱之候又主陰寒或傷寒蓄熱在裡脈道不利亦有微細濡弱不可為寒者當以標本別之總之氣血微脈即微凡脈微為虛弱為虛汗為泄瀉為少氣為崩漏不止兼浮陽不足必身惡寒冷兼沉陰不足必臟寒下利左寸心虛憂惕榮血不足左關胸滿氣乏四肢惡寒拘急左尺男子傷精尿血女子崩漏敗血不止或赤白帶下右寸上焦寒痞痛冷痰凝結不化中寒少氣右關胃寒氣脹食不能化脾虛噫氣心腹冷痛右尺臟寒泄瀉臍下冷痛遲而無力為弱其象極軟而沉細怏怏不前無息以動按之如欲絶略舉手即無弱為陽陷入陰情氣不足之候亦主筋脈弱以滑是有胃氣脈弱以澀是為久病陽浮陰弱應為血虛筋急惡寒發熱之病老得之順壯得之逆凡脈弱為痼冷為烘熱為泄精為虛汁為元氣虧耗為痿弱不前左寸陽虛心悸自汗左關筋痿無力女人主産後客風面腫左尺小便頻數腎元虛耳鳴或聾骨肉間酸疼右寸身冷多寒胸中短氣右關脾胃虛食不化右尺下焦冷痛大便滑泄不禁遲而有力為緩其象比浮而稍大似遲而小疾一息四至來往紆緩呼吸徐徐緩為氣血向衰之候若不沉不浮從容和緩乃脾家之正脈四季亦為平脈非時即病和緩而勻無浮沉徐疾微弱之偏即為胃氣脈凡脈緩為風為虛為痺為弱為疼在上為項強在下為腳弱兼浮感風兼沉血氣弱左寸心氣不足怔忡健忘亦主項背拘急而痛左關風虛眩暈腹脅氣結左尺腎元虛冷小便頻數女人主月事過多右寸肺氣浮言語短氣右關胃弱氣虛兼浮脾虛右尺下寒腳弱風氣祕滯兼浮腸風泄瀉兼沉小腹感冷遲而時止為結其象來時遲緩時一止復又來結為陰獨盛而陽不能相入之候此為陰脈之極按之纍纍如循長竿曰陰結藹藹如張車説曰陽結又有如麻子動抽旋引旋收聚散不常之結此三脈名雖同而實則異凡脈結為亡陽為汗下為疝瘕為癩結為老痰滯結為氣血凝結為七情鬱結內為積聚外為癰腫兼浮寒邪滯結兼沉積氣在內又為氣為血為痰為飲為食説先因氣寒脈緩五者有一留滯其間因而為結故仲景謂促結皆病脈數數以候腑其象一息六至數數然來數為君相二火炎熱之候陰不勝陽故脈來太過小兒吉肺病秋深皆忌寸頭疼上熱咽喉口舌瘡上血咳嗽關胃火脾熱口臭煩滿嘔逆肝火目赤尺腎火熾小便黃赤大便祕澀兼浮表熱兼沉裡熱數而弦急為緊其象來時動急按之長左右彈指舉之若牽繩轉索之狀緊為寒風搏急優於營衛之間之候凡緊脈皆主寒與痛內而腹外而身有痛必見緊象亦有熱痛者必兼實數熱為寒束故急數如此但須有神氣為妙凡脈緊人迎傷寒氣口傷食兼浮傷寒而身痛兼沉腹中有寒或為風癇左寸頭熱目痛項強兼沉心中氣逆或多寒冷左關心腹滿痛腰痛脅痛筋急緊甚傷寒渾身痛兼實痃癖左尺腰連臍下及腳痛小便難右寸鼻塞膈壅兼沉滑肺實咳嗽或多痰右關吐逆脾腹痛緊太盛腹脹傷食右尺下焦築痛數而時止為促其象來時數時一止復又來徐疾無一定之狀促為陽獨盛而陰不能相和之候怒氣逆上亦令脈促此陽脈之極凡脈促為氣痛為狂悶為毒疽為瘀血發斑為三焦鬱火為痰積咳嗽或喘逆又為氣為血為食為痰為飲説先因氣熱脈數五者有一留滯其間則因之而促此促與結非定為惡脈也雖然有加即死能退則生數見關中為動其象數見關中形圓如豆無頭無尾厥厥動搖尋之有舉乏無不往不來不離其處動為陰陽相搏之候關位前半屬陽後半屬陰陰與陽搏陽虛則陽動陰虛則陰動動脈即滑數二脈相兼為極甚者故女人心脈動甚妊子凡脈動為痛為驚為泄利為拘攣為崩脫為虛勞體痛陽動汗出陰動發熱滑滑以候氣其象往來流利如珠走盤不進不退滑為血實氣壅之候血不勝於氣也主痰飲諸病脈為血府血盛則脈滑惟腎宜之女人脈滑斷絶不勻經閉之驗諸脈調尺獨滑必有胎上為吐逆下為氣結滑數為熱結左寸心獨熱兼實大心驚舌強左關肝熱頭目為患左尺尿赤莖中痛小便淋漓右寸痰飲嘔逆兼實肺熱毛髮焦膈壅咽乾痰嗽頭目昏涕唾稠粘右關脾熱口臭吐逆宿食不化兼實胃熱右尺因相火炎而引飲多臍冷腹鳴或時下利女人主血熱氣壅月事不通若和滑為有孕澀澀以候血其象虛細而遲往來極難或一止復來三五不調澀為氣多血少之候故主血少精傷之病説氣盛則血少脈因澀惟肺宜之女人有孕而脈澀為胎病無孕而脈澀為敗血凡脈滑為無汗或為血痺痛左寸心肺虛耗不安冷氣心痛左關肝虛血散肋脹脅滿身痛左尺男子傷精癩疝女人月事虛敗若有孕主胎漏不安右寸榮衛不和上焦冷痞氣短臂酸右關脾弱不食胃冷多嘔右尺大便津液不足少腹寒足脛逆冷經云滑者傷熱澀者傷霧露附載人迎氣口脈法以上統類所載二十七脈皆按各脈之寸關尺三部診候人迎氣口二脈無從列入故特附於後人迎人迎候天六氣左手關前一分為人迎寸關尺每部各有前中後三分關前一分者乃是關部上之前一分非言關部之前寸部上之一分切勿誤認氣口同六淫之邪襲於經絡而末入胃腑致左手人迎脈緊盛大於氣口一倍為外咸風寒皆屬表陽也腑也人迎之脈浮傷風緊傷寒虛弱傷暑沉細傷濕虛數傷熱洪數傷火皆屬外因法當表散滲泄又陽經取決於人迎左人迎脈不和病在表為陽主四肢士材曰左關前一分正當肝部肝為風木之臟故外傷於風者內應風臟而為緊盛也又曰但言傷於風勿泥外因而概以六氣所傷者亦取人迎也氣口氣口候人七情右手關前一分為氣口七情之氣鬱於心腹不能散飲食五味之傷留於腸胃不得通致右手氣口脈緊盛大於人迎一倍為內傷七情飲食皆屬裡陰也臟也氣口之脈喜則散怒則濡憂則澀思則結悲則緊恐則沉驚則動皆屬內因診與何部相應即知何臟受病法宜溫潤以消平之又陰經取決於氣口右氣口脈不和病在裡為陰主腹臟士材曰右關前一分正當脾部脾為倉廩之官故內傷於食者內應食臟而為緊盛也又曰但言傷於食勿泥內因而概以七情所傷者亦取氣口也人迎氣口俱緊盛則為夾食傷寒內傷外感俱見附載奇經八脈此脈亦以不能混列統類二十七脈中故又附人迎氣口二脈之後八脈不拘制於十二正經無表裡相配故名曰奇凡診八脈所見統兩手皆然其從寸部斜至外斜至內者左手之外即右手之內左手之內即右手之外相反推之自見陽維陽維候一身之表以左手為主其脈從寸部斜至外者是也右手反看下同本脈起於諸陽之會所以維於陽説人身之衛分即是陽陽維維陽即維衛衛主表故陽維受邪為病亦在表寸為陽部外亦為陽位故陽維之脈從寸斜至外不離乎陽也陰維陰維候一身之裡以左手為主其脈從寸部斜至內者是也右手反看本脈起於諸陰之交所以維於陰説人身之營分即是陰陰維維陰即維營營主裡故陰維受邪為病亦在裡寸雖為陽部內實為陰位陰維之脈從寸斜至內是根於陽而歸於陰也陽蹻陽蹻候一身左右之陽其脈從寸部左右彈者是也不論左右手本脈為足太陽經別脈起跟中循外踝上行於身之左右所以使機關之蹻捷也陽蹻在肌肉之上陽脈所行通貫六俯主持諸表故其為病亦表病裡和陰蹻陰蹻候一身左右之陰不論左右手其脈從尺部左右彈者是也本脈為足少陰經別脈起跟中循內踝上行於身之左右所以使機關之蹻捷也陰蹻在肌肉之下陰脈所行通貫五臟主持諸裡故其為病亦裡病表和督督候身後之陽不論左右手其脈三部中央俱浮直上直下者是也本脈起腎下胞中循背而行於身之後為陽脈之總督故曰陰脈之海故其為病亦往往自下衝上而痛任任候身前之陰不論左右手其脈丸丸橫於寸口者是也本脈起腎下胞中循腹而行於身之前為陰脈之承任故曰陰脈之海故其為病亦往往自下衝上而痛衝衝候身前之陰不論左右手其脈來寸口中央堅實徑至關者是也本脈起腎下胞中夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海又以其為先天精血之主能上灌諸陽下滲諸陰以至足跗故又曰血海而其為病多氣逆而裡急帶帶候諸脈之約束不論左右手其脈來關部左右彈者是也本脈起少腹之側季脅之下環身一周絡腰而過如束帶狀所以總約諸脈故名曰帶而衝任二脈循腹脅夾臍旁傳流於氣街屬於帶脈絡於督脈衝任督三脈同起而異行一源而三岐皆絡帶因諸經上下往來遺熱於帶脈之間客熱鬱抑白物淫溢男子隨溲而下女子綿綿而下皆濕熱之過故帶脈為病即謂之帶下卷百下諸脈主病詩瀕湖脈訣各有主病歌辭然只言其梗概餘撰脈象統類各脈所主之病已詳但瑣碎無文義相貫難於記識因仿瀕湖法作二十七脈主病詩鵙者讀此復按核統類則某脈主某病某病合某脈庶益洞然於中矣浮其象輕手乃得重手不見動在肌肉以上浮脈為陽表病真遲風數熱緊寒因是浮脈兼遲兼數兼緊也各脈相兼仿此浮而有力是風熱無力而浮血弱人此首總言浮脈病寸頭疼眩目眩熱身熱因風更有風痰左寸病右咳攻右寸肺感風邪作咳關右脾虛中滿不食左腹脹溲多赤澀左尺膀胱風熱糞難通右尺風邪客下焦故大便祕浮而有力為洪即大脈其象極大而數按之滿指如群波之湧起來盛去衰來大去長脈洪陽盛血應虛相火炎炎熱病居脹滿胃翻須早治陰虛泄痢急當除此首總言洪脈病心經火盛內多煩左寸病又兼目赤口瘡頭疼肺熱毛焦咽更乾右寸病又兼涎唾稠粘肝火身疼左關病又兼四肢浮熱胃虛嘔右關病又兼口活舌乾腎虛陰火便相難左尺膀胱然小便赤澀右尺腹滿大便難或下血浮而無力為芤其象浮大而軟按之中空兩邊實指下成窟診在輕舉重按之間左芤吐衄兼心血左寸病關上為瘀脅痛真腹中瘀血脅間血氣痛吐血目暗左尺男人小便血女人月事病相因此首單言左手芤脈病右芤積血在於胸右寸病又兼衄血嘔血關內逢之腸胃癰嘔血不食兼瘀血尺多血痢與腸紅此首單言右手芤脈病浮而端直為弦其象按之不移舉之應手端直如箏弦左弦頭痛還心惕盜汗勞傷力懶牽關左脅疼兼痃癖尺疼小腹腳拘攣此首單言左手弦脈病右寸膈痰多咳嗽由肺受風寒右關胃冷腹心疼脾胃傷冷宿食不化多飲下焦停水弦逢尺陰疝常從臍下侵此首單言右手弦脈病浮而遲大為虛其象遲軟散大舉按無力豁豁然空不能自固脈虛血氣虛故脈亦虛身熱為傷暑虛損疲煩汗自多發熱陰虛宜早治養榮益氣莫蹉跎此首總言虛脈病怔忡驚悸寸常虛血不榮心奈若何腹脹診關食不化尺痺痿損傷精血骨蒸俱此首統言左右兩手虛脈病浮而遲細為濡即軟脈其象虛軟無力應手細散如綿絮之在水中輕手乃得重按隨手而沒濡為亡血陰虛病髓海丹田暗已虧汗雨夜來蒸入骨血山崩倒濕侵脾此首總言濡脈病左寸心虛故驚悸盜汗還短氣精神離散左關濡又兼榮衛不和虛少力尺男精敗女脫血自汗淋漓溲數俱此首單言左手濡脈病憎寒烘熱濡右寸氣乏身疲怎得安關上胃虛飲食不進脾更弱食不消尺腸虛瀉下元寒此首單言右手濡脈病浮而迢亘為長其象不大不小迢迢自若指下有餘過於本位氣血有餘長脈見長脈主有餘之病陽明熱勢自然深若非陽毒陽毒內蘊癲和癇即是焦煩壯熱侵浮而虛大為散其象有表無裡有陰無陽按之滿指散而不聚去來不明漫無根柢渙散不收左寸怔忡右寸汗溢飲左關應軟散右關軟散腫胻腑散居兩尺魂當斷沉其象輕手不得重手乃得按至肌肉以下著於筋骨之間沉潛脈主陰經病數熱遲寒滑有痰無力而沉虛與氣沉而有力積兼寒此首總言沉脈病寸沉痰鬱右寸病飲停胸左寸病關主中寒痛不通左右關病同尺部濁遺精血冷左尺病男精冷女血冷腎虛腰及下元痼右尺病此首統言左右手沉脈病沉而不及為短其象兩頭無中間有不及本位應手而回短脈只見寸尺若在關部將上不接寸下不接尺矣故前人云短不診關短脈內虛真氣弱三焦氣壅是真因胃衰宿食多停滯寸主頭疼尺腹疼左右手同沉而微軟為細其象小於微而常有細直而軟指下尋之往來如蠶絲寸細應知嘔吐頻入關腹脹胃虛形尺逢定是丹田冷泄痢遺精號脫陰此首統言左右兩手細脈病沉而弦長為實其象舉手不絶迢亘而長不疾不徐動而有力血實則脈實實脈為陽火鬱成發狂譫語吐頻頻或為陽毒或傷食古云脈實者水谷為病大便不通或氣疼此首總言實脈病寸心與面熱兼風左寸實心中積熱口舌瘡咽喉痛痰嗽中煩氣積胸右寸實胸膈中熱痰嗽煩滿肝火左關實腹脅痛滿脾虛右關實脾虛少食又兼胃氣滯伏陽蒸內關上見尺臍腹痛便難通左尺實小腹痛小便澀右尺實臍下痛便難或時下痢此首統言左右手脈實病沉極幾無為伏其象極重按之著骨指下隱隱然傷寒病一手伏曰單伏兩手伏曰雙伏不可以陽症見陰為診乃火邪內鬱不得發越陽極以陰故脈伏也必得大汗乃解又夾陰陽寒先有伏陰在內外又感寒陰盛陽衰四肢厥逆六脈沉伏須投薑桂脈乃覆出若太溪衝陽皆無脈則必死矣古云伏為真氣不行邪氣積伏又云痛甚者脈必伏伏為霍亂食常停蓄飲頑痰積聚真榮衛氣凝凝閉也而厥逆散寒溫裡莫因循此首總言伏脈病憂鬱傷心神不守左寸病胸中氣滯冷痰凝右寸病當關腹痛分寒食左關伏脅下有寒氣血冷腰腳痛右關伏中脘積塊痛脾胃停滯尺部腹疼與疝疼左尺伏腎寒精虛疝痛右尺伏臍下冷痛下焦虛寒旋中冷痛此首統言左右手伏脈病沉而有力為牢其象似沉似伏實大而長少弦按之動而不移牢而疾必發熱牢而遲必發寒遲疾不常寒熱往來牢為喘氣促息皮膚腫兩寸病心腹寒疼肝尅脾兩關病癥瘕疝㿗猶可治陰虛失血怎相宜兩尺病失血脈宜沉細反浮大而牢是虛病見實脈必死此首統言左右手牢脈病沉失常度曰革其象沉硬實大如按鼓皮一般革為陰陽不交之名革合芤弦寒與虛芤為虛弦為寒虛寒相搏故芤弦相合而成革脈革因為虛寒失血之候中風感濕脹兼醫女人半産並崩漏男子營虛或夢遺此首總言革脈病沉而更代為代其象動而中止不能自還因而復動又復止尋之良久乃復強起而動代脈原因臟氣衰腹疼便膿下元虧或為吐瀉兼泄痢女子懷胎三月兮此首總言代脈病遲其象呼吸之間脈僅三至來去極慢遲司臟病或多痰沉痼癥瘕仔細看有力而遲為冷痛遲而無力是虛寒此首總言遲脈病寸遲心左肺右上焦寒左寸遲心上寒精氣多慘右寸遲肺受寒冷痰氣短關主中寒痛不堪左關筋寒急手足冷脅下痛右關中焦寒脾胃傷冷食不化左尺腎虛故便濁女不月右為泄瀉疝牽丸臟寒泄瀉小腹冷痛腰腳重而無力此首統言左右兩手遲脈病遲而細軟為微其象極細而軟若有若無多兼於遲按之無欲絶之狀氣血微兮脈亦微惡寒陽微也發熱陰微也汗淋漓男為勞極諸虛候女作崩中帶下醫此首總言微脈病寸微氣促與心驚右寸中寒少氣又兼上焦寒痞冷痰不化左寸心憂惕榮血不足關脈微時脹滿形左關微中滿氣乏四肢寒冷拘急右關微胃寒氣脹食不化脾虛噫氣心腹間冷疼尺部見之精血弱左尺微傷精尿血臟寒泄瀉痛呻吟右尺微臟寒泄痢臍下冷積痛疼此首統言左右兩手微脈病遲而元力為弱其象極軟而沉細怏怏不前按之如欲絶舉手即無弱猶愈於微脈弱陰虛陽氣衰氣虛則脈弱寸弱陽虛關弱胃虛尺弱陰虛惡寒發熱骨筋萎多驚多汗精多泄益氣調營弱脈必宜補及早醫此首總言弱脈病寸汗心虛左寸弱陽虛心悸自汗右身冷右寸弱病又兼短氣關中筋萎肝主筋左關弱故筋萎少力又兼女人主産後客風面腫胃脾虛右關弱脾胃虛而食不能化欲知陽陷陰微病骨痛耳聾左尺弱胃虛之故糞數遺右尺弱大便滑又兼下焦冷痛此首統言左右手弱脈病遲而有力為緩其象比浮而稍大似遲而小疾一息四至來往紆緩呼吸徐徐緩脈有二從容和緩者為正脈前人所云諸病脈緩為胃氣回不治自愈者是若氣血衰而遲緩則為緩病脈緩脈驥驥侵營衛衰或痺緩而細或濕沉而緩或脾虛緩而澀上為項強下腳軟浮風緩兼浮傷風沉弱緩兼沉血氣衰弱細區分此首總言緩脈病寸緩心虛左寸緩心氣不足怔忡多忘又兼項背拘急痛肺則浮右寸緩肺氣浮言語短氣當關風眩左關緩風虛眩暈又兼腹脅氣急胃虛求右關緩胃弱氣虛尺為腎冷便頻數左尺緩腎虛冷小便多下寒風祕便常憂右尺緩下寒腳弱風氣閉滯遲而時止時結其象來時緩甚時一止復又來前人云陰凝則結又云結脈亦因思慮過度脾氣不足又云脈結者亦病四肢不快為氣所結結脈皆因氣血凝老痰結滯苦沉吟內生積聚外癰腫疝瘕亡陽汗自淋凡結脈主疝瘕癥結七情鬱結老痰滯結一切氣血凝結又為亡陽為汗下內為積聚外為癰腫兼浮寒結兼沉氣結此首總言結脈病數其象一息六至數數然來數脈為陽熱可知只將君相火來醫實宜涼瀉虛溫補肺病秋深卻忌之此首總言數脈病寸數咽喉右寸數口舌左寸數瘡吐紅咳嗽肺生瘍左右寸同又兼頭疼上熱當關胃火右關數胃火脾熱口臭煩滿嘔逆並肝火左關數肝火目赤尺用滋陰降火湯左右尺同主腎火熾小便黃赤大便閉塞此首統言左右兩手數脈病數而弦急為緊其象來時徑急按之長左右彈指舉之若牽繩轉索之狀又名急脈緊為諸痛主於寒癖積風癇吐冷痰浮緊汗之緊兼浮表寒身痛沉緊下緊兼沉裡寒腹痛人迎因傷寒氣口因傷食更須看此首總言緊脈病左頭目項左寸緊頭熱目痛項強右鼻膈右寸緊鼻塞膈壅關從心腹脅筋尋左關心腹滿痛脅痛筋急右關脾腹痛吐逆尺為腰腳臍下痛知是奔豚與疝疼左尺腰腳臍下痛又兼小便難右尺下焦氣築痛此首統言左右手緊脈病數而時止為促其象來時數時一止復又來徐疾無一定有迫促之狀凡脈促者亦病氣痛亦病怫鬱亦病氣血不疏通脈促惟將火病醫三焦有鬱火其因有五細推之氣血熱痰飲時時咳嗽皆痰積或發狂㿀與毒疽皆瘀血之故此首總言促脈病數見關中為動其象數見關中形圓如豆無頭無尾厥厥動搖尋之有舉之無不往不來不離其處動脈亦為神氣不安脫血虛勞動脈專司氣與驚汗因陽動熱因陰或為泄痢拘攣病男子亡陽女子崩此首總言動脈病滑其象往來流利如珠走盤不進不退滑脈為陽元氣衰痰生百病食生災浮滑風痰滑數痰火短滑宿食上為吐逆下蓄血女脈和時定有胎女人督脈滑血熱經不通和滑為有孕此首總言滑脈病寸滑膈痰生嘔吐右寸病心驚舌強緣熱故左寸病當關宿食肝脾熱左關肝熱頭目為患右關脾熱口臭吐逆宿食不化渴痢癩淋看尺部左右同此首統言左右手滑脈病澀其象虛細而遲來往極難一止復來三五不調澀緣血少或傷精反胃亡陽汗雨淋寒濕入營痺為血女人非孕即無經女人左尺澀無孕主血少有孕胎病或漏此首總言澀脈病寸心虛痛乖營衛左寸心肺虛耗不安及冷氣心痛右寸營衛不和上焦冷痞氣短臂酸脾弱右關澀脾弱不食胃冷多嘔肝虛左關弱肝虛血散肋脹脅滿身痛關內逢左尺傷精兼及疝右寒小腹足脛痌又兼大便閉津液不足此首統言左右兩手澀碗病人迎左手關前一分為人迎表候人迎屬腑陽人迎主外感六淫屬表腑也陽也風浮暑弱緊寒傷如人迎脈浮主傷風六淫仿此濕應沉細火熱數熱虛數火洪數四末清寒表散良人迎又主四肢病氣口右手關前一分為氣口氣口為陰裡臟看氣口候內傷七情及傷飲食屬裡臟也陰也怒濡憂澀散因歡如氣口脈濡即因傷怒餘皆仿此恐沉思結驚多動悲緊還推何部乾診得氣口濡澀等脈並看與何部相關即知何臟受病如氣口脈濡即屬肝病而肝脈又適弦硬是也此首單言氣口內傷七情之病飲食傷留脾臟因通腸快胃法相應人迎氣口俱沉緊夾食傷寒病日增此首言氣口內傷飲食之病及人迎氣口俱傷之病陽維以左手為主其脈從寸部斜至外者是也右手反看則從寸部斜至內矣陽維脈起會諸陽陽維脈從少陰斜至太陽發足太陽之金門而與手足少陽陽明五脈會於陽白故所會皆陽根柢於陰表是彰陽維主一身之表風府風池應並刺長沙法設桂枝湯風池風府二穴陽維之會也仲景法先刺二穴卻與桂枝湯陰維左手為主其脈從寸部斜至內者是也右手反看則從寸部斜至外矣陰維主裡會諸陰陰維主一身之裡其脈從少陽斜至厥陰發足少陰之築賓至頂前而終故所發所至皆陰也卻起於陽根自深陽根陰陰根陽故此二脈又為榮衛之綱領心痛病來詳潔古理中四逆法堪尋潔古云陰維為病若心痛其治在足少陽三陰交乃陰維所起也又按促景法太陰症用理中湯少陰症用四逆湯厥陰症用當歸四逆湯酌其劑以治陰維之病即潔古所以治足少陽三陰交也陽蹻不論左右手其脈從寸左右彈者是也一身左右陽專候陽矯主一身左右之陽脈得陽躋六腑和表病裡安陽分愆陽蹻在肌肉之上陽脈所行通貫六腑主持諸表故其為病亦表病裡和法兼汗下治無訛潔古云陽病則寒若在陽表當汗桂枝湯麻黃湯若在陰裡當下大小承氣湯陰躋不論左右手其脈從尺部左右彈者是也諸裡相持通五臟陰躋在肌肉之下陰脈所行通貫五臟主持諸裡故其為病亦裡病表和脈行左右有陰躋陰蹻主一身左右之陰病來陽緩陰多急陽躋病陰緩陽急陰躋病陽緩陰急診察須從陰熱調潔古云陰病則熱甘草乾薑湯督不論左右手其脈三部中央俱浮直上直下者是也督司陽脈稱為海循背而行遍後身督脈起胞中循背而行於身之後為陽脈之總督故為陽脈之海脊強頭沉虛實判督脈為病實則脊強而發厥虛則頭重上衝作痛苦吟呻督病又往往自下衝上而痛任不論左右手其脈丸丸橫於寸口者是也任承陰海因名任任脈亦起胞中循腹而行於身之前為陰脈之承任故曰陰脈之海天癸從生陰有陽任主天癸乃天之元氣任脈充然後衝脈旺月事時下而有子故真陰之盛必由真陽之實若使結陰陽氣絶疝瘕崩帶腹前殃任脈病非陰自病實由陰中無陽故疝瘕崩帶皆結陰之故衝不論左右手其脈來寸口中央堅實徑至關者是也衝俱督任起胞中獨主先天精血充衝脈亦起胞中夾臍而行直衝於上為諸脈衝要故曰十二經脈之海又為先天精血之主故又曰血海本病須分寒火逆衝脈病一曰寒逆陽不足也一曰火逆陰不足也更傳肝腎患無窮經云衝病傳肝腎發為痿厥帶不論左右手脈來關部左右彈者是也約持諸脈遍腰環帶脈起少腹側季脅下環身一周絡腰而過如束帶狀所以總約諸脈肝腎心脾上下安帶之上心脾帶之下肝腎濕熱滯留中間斷淫淫白物下無端心脾上鬱肝腎下虛停濕為熱留滯中分必病作而流白物附録運央規法餘輯雜病源流凡脈症方藥所以講明調治之者似已詳備然劉海蟾云醫道通仙道則修煉家導引運央之法所以卻病延年者未始不可助方藥所不逮説既已卻病自可延年在修煉家固以延年為主而欲求延年必先卻病在醫藥家則以卻病為主也故雜病源流中於每病方論後有導引運央之法可以卻此病即附載於末總期醫者病者展覽及之以備採用庶獲萬病回春也但其法有專治一病者既分載於各病之後而又有總法數條不必每病皆為遵用而時有必採取者亦不必一病全用總法而或有此病則用何法彼病又用何法者既不得贅列於各病之末而又無處可以混入故特附於此如於各病運央中見有宜用歸元周天艮背行庭及縧法通關滌穢等法者查明此處所載諸法應如何引運遵而行之無漏無遺自可卻病可延年也南北規中引諸法皆本保生祕要係明哄哄道人曹士珩元白氏所著凡人亡念奔馳不思回頭説不知有己然學道初入門及乎卻病初下手每云先要築基煉己者何也己者意中之土也時時返念守中然崑崙至於湧泉周身前後之竅雖各家傳授各取其善若能精守其一皆可起病不必得一望二持兩可之見而辨孰是孰非餘訣云總之攝心歸一專其一處皆可止念故取身中前後二竅為則其歸元取用父母生人受氣之初而能聚氣之原運動周天可參艮背通關之效然艮背者昔林子闡教為最餘受之家傳捷徑而更妙若夫運動則貫徹任督二脈兼以導引則神央爍見矣南旋式歸元訣竅歸元者父母生人受氣之初剪斷臍帶一點落根元也有生之後情欲雕琢未免精耗氣散不能返本須求安土敦仁之法説土者歸元也人者仁也以一點仁心敦養於土六根皆歸於元心有所注久久凝定便覺真種常在方可用意運行行之之法提意出上斡旋造化從左而右先運臍輪收而放放而復收以還本位不離這個念自歸真矣周天先立安土守中得訣純熟後行周天流通一身散徹四肢滯氣其法從前運於臍輪由小而大大而收小依次而上至璇璣穴向左臂打圈而下至曲池經內關溯掌心及指尖圈出手背外關而上肘後肩井及大椎而下運於尾閭由上復下過玉枕逾崑崙泥丸面部上鵲橋降重樓達胃口過臍至玉柱復氣海行於右腿歷膝關由鞋勞穴穿足背至指尖轉湧泉踵後上運過陰谷通尾閭又圈至頂門如前下鵲橋依次送左腿似右法而落湧泉又升泥丸及璇璣穴右行照左手轉過肩背貫崑崙而下攝元海如此將周身經脈宣暢徐徐回轉但意至而氣相隨是為有作之周天法亦可與造化參北旋式艮背訣竅易曰艮其背艮者止也其象屬土背從北方水屬於陰心從南方火屬於陽人能以南火而投於北水之中得以水火交而既濟所謂洗心退藏於密也説五臟六腑根蒂皆係於此所謂止者先立內念之正而止外念之邪也然大道貴無念雖立正念亦是念也當明內外兩忘以忘而離亡必先忘其外者而後定其心自忘其內也故初學之士靜坐片時將萬慮掃除凝神定志於本穴之中背之腔子裡平心元虛處初起口念太乙救苦咒四而漸歸於心歸於背存無守有念茲在茲有復冥於無神自虛而靈矣行庭吾身一小天地也周身三百六十骨節七孔八竅一竅相通竅竅光明而乾旋坤轉前屬於天後屬於地前從左旋後運右轉前後相通周乎其天則知人與天一矣其法從艮背守念念而提出腔子行其背數十回復收歸腔稍空又運行至兩腎之間念刻部從腎中意想溯尾閭起運上泥丸經明堂人中接下承漿降重樓至於心臍之間約以臍上三指為則不前不後不左不右之中而為立極定樞懸一斗杓行於臍下一寸三分斡旋上升左轉於心之後有旋下降於腎之前循環不息上行由背之北下行由臍之南如北極定樞斗柄推旋者若轉則以意隨之不轉則以意引之久而煉度所以混其氣且所以和其神也通關從北極定樞斗柄大旋三遍天地包羅行於臍下分開兩路旋下兩腿之前聯絡不絶雙行轉腳底向後繞元海上至命門會合從右轉左大旋三遍從椎骨下分行兩肩經肘後外關達掌心循內關過肩井由項後透泥丸行明堂漸落雙瞳自面部下胸膈會心窩從左轉下降大旋三遍如前臍下分開循環遍體周流運行卯酉二辰行之或九度或二十一度而止慎勿執著若有若無此所謂煉其形和其氣也縧法從歸元注念起用意左邊運縧過腰從右旋上至左肩膊縧至胸前行旋過右膊後下旋至腰如法運數十回而又復縧上行周而復始不必計籌使前後融洽或從艮背起手轉絛而前左右次序會意行之滌穢其法在胃口旋入憑虛而行運入大腸由左繞右回旋九曲以真氣滌垢轉出谷道噓往吸回自右而左旋出胃口收歸元海靜念刻部以還本位此法不宜輕用凡送濁氣出谷道外即隨念吸轉慎泄真氣丹法有云勿使尾閭墜説謂此也運規十二則身著安和氣不必運宜當守靜定息節飲除欲則百病不生若身稍有絲毫不快宜速行運動免氣久滯積成大病故設調養之央用之須得其宜然運法如風車樣不疾不徐皮裡膜外挨次運去可大可小任意收而放放而復收男左女右陰陽之分一動一靜天之行也行央之時目視頂門微露一線迎天地之光返照內景勿全下視免致昏沉馳念卻病坐央不比真修磨煉每按時坐香後欲睡即睡睡則病者精神完足若心血少不寐可定意想歸元或依法運轉神自安而寐矣開關之説學者不必用意候到自然通透説靜中運用無念自是水升不然則為火矣或腹中響聲或兩腎微動或背或眉端隱隱如蟻行手足似一線冷風皆現真境也亦有陽火衝病根腸內有聲即用真意逐響運旋撒而散之凡行氣過峽處或崑頂須多旋繞數十匝令氣浸灌為妙間時如不守前後二竅懸心於空虛地四大皆空無人無我極為養火之法又名休息以養其氣若運法無時度則神敝疲譬如伐兵勞頓而又遇徑敵豈不危乎觀燈玩月目向外射則傷神返照於我多益於我其他自可以類推卻病工夫須立課程逐日檢點勿失其時日日如是提醒縝密自不間斷而效運氣當由後而前以取西北方水而灌東南方火不可逆此或有傳法各關節處不必打圈直行亦可行後定要收歸元位退欲火法注念氣海記數斡旋或記運尾閭升降之法邪火自散大固元陽入定看書易於通悟坐下止念為先定神元海不以目睹而以心視不以心視而以內觀説神有所斂不至散於外受益自無窮盡矣嘻笑場中最易耗神令人疲倦得以內斂音聲言語少減或氣穴中發神氣亦不覺其耗上丹田穴最可養性亦可注念為藏神之府運法旋至鼻柱七竅之宗斡行入內些些則耳目口三寶皆有靈矣想湧泉穴最能健步行動略得運法血脈自可以漸漸流通而不傷筋省氣卷一臟腑門肺病源流肺脹肺萎肺癰息賁手太陰肺脈起於中焦下絡大腸還循胃口上膈到肺從肺係橫出脅下下循內行少陰心主之前下肘中循腎內骨上廉入寸口上魚際出大指之端少商穴止其支者從腕後直出次指內廉之端次注於手陽明大腸經每日寅時周身氣血俱薈萃而注於肺手太陰肺經多氣而少血肺主氣上連喉係下通心肝之竅司呼吸出人居上以鎮諸臟而壓糟粕以行於大腸出納清氣以出濁物所受者太陽之陰以固陽氣所司者太陰之陽以行陰物又與足太陰脾同行氣以給衆臟故亦名太陰其屬則位西方金其配則為秋令秋則氣化清肅萬物賴以成遂金則為水之母其氣恆下行靜時下澄於腎宮與水相通經所謂母隱子胎是也但腎為真水天一所生肺既為其母故居華説之頂猶據天河之上源以注崑崙而入龍門以匯於海也其輸精臟腑猶在天之雨露廣沛群生也然嘗病燥與寒熱以輸精布衆或太過末及滋化或邪乘不得行令故反病燥宜滋燥飲反病寒熱也寒宜紫蘇飲子熱宜瀉肺湯古人嬌臟之名所由來矣夫肺主皮毛而皮毛則純屬太陽之部太陽之傷風傷寒汗出中風與形寒飲冷皆能傷肺故其現症如鼻塞聲重喘咳氣逆肩背痛嚏噴胸滿煩心亦與太陽同五志之火上炎陰虛內爍肝火挾心而刑金亦能傷肺故其現症如肺萎肺癰痿蹩吐血聲嘶息有音鼽衄掌熱喘不休口血出皮毛焦皆由火燥焦卷之故若虛則有少氣不能報息耳聾嗌乾諸症而此諸症或由外傷治與足太陽所感病同法或邪盛鬱塞必於足太陽瀉之若傷於內者正氣衰金被殘賊必於足少陰養之使子能助母而金氣不至耗泄於足太陰培之使母能生子而金氣得以涵育昔人云補水培土是養金善法洵有然也抑猶有進者金性下沉隱於子胎腎家水火兩病肺俱能受其害故有時腎水上泛為痰肺受之則喘壅而嗽有時腎火上凌其母肺受之則喘息而鳴皆腎氣上逆而為病也要不外足太陽足太陰足少陰三經從而治之脈法脈經曰肺傷者其脈細緊浮數其人勞倦咳唾血肺病症經曰風寒入舍於肺名曰肺痺發咳上氣又曰大骨活大肉陷胸中氣滿喘息不便其氣動形期六月死真臟脈見乃與之期日注曰肺之臟也難經曰外症面白善嚏悲愁欲哭內症右有動氣按之牢若痛其病喘咳灑淅而寒熱也靈樞曰肺氣虛則鼻息不利少氣實則喘咳胸頻伸息肺病間甚經曰肺病者下晡慧日中甚夜半靜肺病治法經曰肺苦氣上逆急食苦以泄之注曰此肺氣有餘也肺欲收急食酸以收之用酸補之辛瀉之又曰肺病禁寒飲食寒衣肺絶侯經曰手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節傷皮節傷則爪活毛折毛折者毛先死丙日篤丁日死又曰肺絶三日死何以知之口張但氣出而不返一云口鼻虛張短氣仲景曰汗出發潤喘不休者此為肺絶肺氣滯澀保養法保生祕要曰凡人氣旺則血榮而潤澤氣絶則血活而滅形故氣虛弱滯澀而成病如澀於肺則肺氣不清液凝滯而為痰諸痰膹鬱皆屬肺上焦之疾或傳於大腸秋月金旺宜常呬吸以和其氣慎勿用諸肺則不厭其魄時秋初夏末熱氣酷甚宜少貪風涼一切行立坐臥飲食衣服皆慎之免傷背之腧穴中風之症説感此也肅殺之天殺中有生秋分之日戒傷生命大抵時至萬物收斂人心更要持守勿為馳逞發揚以散其氣肺脹肺家氣分病也仲景曰咳而上氣煩躁者為肺脹欲作風水發汗自愈又曰咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之又曰肺脹咳而上氣煩躁而喘脈浮者心下有水氣小青龍湯加石膏主之丹溪曰肺脹而嗽或左或有不得眠此痰挾瘀血礙氣而病宜養血以流動乎氣降火疏肝以清痰四物湯加桃仁訶子青皮竹瀝之類據二家説可知肺脹本為肺經氣分之病故宜以收斂為主宜訶子青黛丸清化丸即挾痰挾血者亦不離乎氣不得專議血專議痰也肺萎久嗽氣虛而熱在上焦病也其症之發必寒熱往來自汗氣急煩悶多唾或帶紅線膿血宜急治之宜舉肺湯元參清肺飲切忌升散辛燥溫熱仲景云或有患此症吐涎沫而咳者宜生薑甘草湯有吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多吐涎必溫之宜甘草乾薑湯又有火盛者宜人參平肺散有喘急而面浮者宜葶棗散大約此症總以養肺養氣養血清金降火為主若肺萎將變為癰又必兼理膿毒宜紫菀散脈法脈經曰左寸脈數虛澀肺萎也肺萎之因仲景曰熱在上焦者因咳為肺萎此從何得之説以或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之又曰寸口脈數其人渴口中反有濁唾涎沫者此為肺萎之病脈經曰肺萎咳唾咽燥欲飲水者自愈自張口者短氣也肺癰肺熱極而成病也其症痰中腥臭或帶膿也總治宜清金飲皆緣土虛金弱不能生水陰火爍金之敗症故補脾亦是要著而其條治之法如初起咳嗽氣急胸中隱痛吐膿痰急平之宜麥冬平肺飲或咳吐膿痰胸膈脹滿喘氣發熱急清之宜元參清肺飲或病重不能臥急安之宜寧肺桔梗湯或已吐膿血必以去膿補氣為要宜排膿散勿論已成末成總當清熱滌痰使無留壅自然易愈宜金鯉湯凡患肺癰手掌皮粗氣急脈數顴紅鼻煽不能飲食者皆不治脈法脈經曰右寸脈數實肺癰也但色白而脈兼短澀者生色赤而脈兼浮大者死肺癰之因仲景曰寸口脈數若口中辟辟燥咳胸中隱隱痛脈反兼滑此為肺癰息賁肺積病也在右脅下如覆盆狀令人灑灑寒熱背痛嘔逆喘咳發肺癰脈必浮而長皆由肺氣虛痰熱壅結也宜調息丸息賁丸當以降氣清熱開痰散結為主治肺病諸藥要品及方五肺實宜降氣清潤蘇子桑皮天冬貝母枇杷葉杏仁前胡白前知母瓜蔞根竹茹石膏黃芩麥冬車前子竹葉桑葉牛蒡子葶藶肺虛宜順氣清熱蘇子貝母百部沙參枇杷百合桑皮杏仁天冬五味子麥冬梨肉柿子無熱可加人參滋燥飲肺燥天冬麥冬生地花粉白芍秦艽加蜜童便服紫蘇飲子肺寒蘇葉桑皮青皮杏仁麻黃陳皮甘草五味子各一錢人參半夏各六分薑三片瀉肺湯肺熱山梔黃芩薄荷枳殼杏仁連翹桑皮桔梗甘草酒大黃各七分瀉白散肺實地骨皮桑皮各二錢甘草一錢或加知母貝母桔梗山梔生地麥冬亦可補肺散肺虛阿膠二錢牛蒡炒糯米各一錢馬兜鈴七分杏仁麩炒九個甘草五分治肺脹方五越婢加半豆湯總治麻黃石膏甘草半夏薑棗小青龍湯水氣桂枝麻黃乾薑酒白芍炙甘草細辛半夏五味子四物湯挾瘀川芎當歸白芍生地訶子青黛丸收斂訶子青黛杏仁海粉便香附瓜蔞仁半夏曲薑汁蜜丸含化清化丸總治貝母一兩杏仁五錢青黛二錢薑汁砂糖丸含化治肺萎方七生薑甘草湯吐咳生薑五錢炙甘草三錢人參二錢棗五枚甘草乾薑湯吐而不咳炙草四錢炮乾薑二錢人參平肺散火盛桑皮二錢知母人參地骨皮炙草各一錢天冬赤苓各八分陳皮青皮各五分五味子二十粒薑三片葶棗散喘急面浮炒葶藶為末大棗十枚煎湯去棗調末二錢服舉肺湯總治桔梗甘草天冬竹茹阿膠沙參貝母百合元參清肺飲又元參柴胡桔梗陳皮地骨皮茯苓麥冬苡仁人參甘草檳榔加童便一小杯沖服紫菀散肺萎成癰紫菀人參知母五味子桔梗貝母甘草茯苓阿膠薑治肺癰方六清金飲總治苡仁橘葉黃芩花粉貝母桑皮桔梗牛蒡白蒺藜麥冬平肺飲初起麥冬人參赤芍檳榔甘草赤苓陳皮桔梗元參清肺飲吐膿方詳上寧肺桔梗湯不臥桔梗貝母當歸黃耆枳殼桑皮防己瓜蔞仁甘草節五味子百合苡仁葶藶杏仁地骨皮知母咳甚倍百合身熱加柴胡便祕加大黃排膿散已成人參黃耆白芷五味子等分金鯉湯總治鯉魚重四兩者去腸勿見水入貝母末二錢縫好童便半碗浸之重湯煮至睛出去鱗骨將肉仍浸童便內頓熱一日分三次便肉俱食之其效至速治息賁方二調息丸總治陳皮蔻仁射干紫菀桑皮桔梗石咸海浮石旋覆花水泛丸息賁丸又川連一兩三錢厚朴八錢乾薑茯苓紫菀川椒各錢半人參二錢桂枝桔梗三稜天冬陳皮川烏蔻仁各一錢青皮五分巴霜四分茯苓另研餘為末篩出和茯苓末研勻再入巴霜研勻蜜丸梧子大初服二丸每日加一丸漸加至大便微溏再從兩丸加服積去大半便勿服咳嗽哮喘源流咳嗽肺病也然雖為肺之主病五臟六腑皆有之説肺不傷不咳睥不傷不久咳腎不傷火不熾咳不甚其大較也而咳與嗽異先不可不辨有聲無痰曰咳非無痰痰不易出也病在肺肺主聲故聲先而痰後有痰無聲曰嗽非無聲痰隨嗽出聲不甚響也病在脾脾藏痰故痰出而嗽止二者總因心火困土尅金所致因咳有痰重在咳肺為主急宜順氣肺惡溫燥橘紅貝母桔梗桑皮知母麥冬紫菀為要藥因痰致嗽重在痰脾為主速宜消痰脾惡寒潤二朮南星半夏為要藥清火兼之最是要法而致咳之由則有兩大頭腦一曰內傷七情飢飽是也一曰外感風寒暑濕是也而風寒暑濕所感竟有不咳者感太重徑傷臟腑不留於肺故不咳不然先中皮毛以次傳及五臟故亦不復咳七情飢飽所傷竟有不嗽者病尚淺止在本臟不上乾於肺故不咳否則臟氣受傷以次病及上焦故一時不遽咳所以傷寒以有嗽為輕七情之咳必久而後見也自表入者病在陽若用寒涼收斂必連綿不解變生他症故宜辛溫寧嗽湯或二陳湯加防風紫蘇之屬以求其屬散其邪肺清而嗽自愈自內生者傷其陰陰虛陽浮水涸金燥喉癢而咳最忌辛香助陽故宜甘潤宜保和湯滋陰清化丸以滋養肺水旺氣暢而咳自愈然外治雖宜散若病氣形氣俱虛又當補益以溫解如參蘇飲之用參桂枝湯之用甘芍實脾也脾實則肺金得養前邪易出後邪難入矣內治雖宜潤若命門火衰氣不化水不得概執滋陰之説而參羌附桂不妨酌用也然則內傷外感之殊不可先悉其源流乎而其發於五臟移於六腑者可更條析言之經曰肺咳之狀喘息有音甚則唾血宜以肺經藥治之如桔梗貝母瓜蔞桑皮蘇子花粉等咳不已大腸受之咳則遺尿引上加升麻引下加大黃主治餘糧湯心咳之狀心痛喉中介介如梗狀甚則咽腫喉痺宜以心經藥治之如黃連細辛鬱金麥冬遠志等咳不已小腸受咳則失氣氣與咳俱失引上加桔梗引下加木通小茴主治芍藥湯脾咳之狀有胠下痛引肩背甚或不可動動則咳劇宜以脾經藥治之如半夏二朮陳皮腹皮之屬咳不已胃受之咳則嘔或長蟲出引上加升麻引下加石膏益智厚朴主治烏梅丸肝咳之狀左脅下痛甚則不可以轉轉則兩胠下滿宜以肝經藥治之如柴胡前胡川芎青皮青黛等咳不已膽受之咳則嘔膽汁引上加川芎引下加青皮主治黃岑湯腎咳之狀腰背相引痛舌本乾咽作咸甚則咳涎宜以腎經藥治之如獨活天冬山萸故紙等咳不已膀胱受之咳則遺溺引上加羌活引下加橘核主治茯苓湯久嗽不已三焦又受之咳則腹滿不欲飲食引上加川芎引下加青皮主治木香順氣散心包絡咳心胸間隱隱作痛宜以心經藥治之如丹皮山梔肉桂等此經言臟腑相因之咳所當分別而治者也其餘又有肺脹痰挾瘀血或左或有不得眠動則喘急者宜四物加山梔紅花訶子青皮竹瀝薑汁等不得臥者不治又有肺勞熱生蟲如蠶咳逆氣喘謂之膏肓病針灸不至者宜驅二竪丸又有脾胃先虛不能製水水泛為痰水冷金寒而咳者宜六君子加減又有過服涼冷脾胃受傷寒水挾木勢而上侵肺胃前病末除新病更甚若進寒涼必至危殆者急補土母宜八味丸六君子湯加炮附又有因火爍肺金而咳者清金降火誰不知之岑連二冬知柏誤用必至更甚急補北方以瀉南方宜六味丸桔梗湯補陰後隨用參耆救肺使金土相生方可謂識先後著若用參耆於壯水之先陽火愈旺金愈傷矣以上皆臟腑餘症未可忽視者也且夫咳之為病有新久虛實之殊新咳者肺有實邪風則散之宜參蘇飲寒則發之宜二陳湯加紫蘇葛根杏仁桔梗熱則清之宜金沸草散去麻黃半夏加薄荷五味杏仁桑皮貝母茯苓桔梗枇杷葉之屬火則瀉之宜清火止咳湯濕則除之宜白朮湯痰則滌之宜加味二陳湯有久病忽咳病雖久而咳則暴亦為新咳必新傷風食也風則疏之宜消風寧嗽湯食則消之宜大安丸去連翹黃連加桔梗枳實等即愈矣久咳者屬虛屬鬱有由氣虛者宜補中益氣有由血虛者宜阿膠四物湯有由血虛火盛喘咳聲嘶者宜岑連四物湯有氣血兩虛者宜寧肺湯有虛勞嗽痰熱渴汗者宜滋陰清化丸有虛勞咳血痰喘者宜五汁膏有虛勞嗽一二聲無痰夜則發熱過則冷睡多夢者宜劫勞散有火鬱於肺咳則有聲無痰者宜桔梗湯有濕痰內鬱痰出則咳少止少項又咳者宜加味二陳湯而又有咳久傷脾滿面生瘡者宜人參蛤蚧散有久咳失音者宜杏仁膏清肺湯有久咳失氣者宜劫嗽丸有久咳面目浮腫者宜葶藶散有久咳不止諸藥不效者宜噙化丸立效方有久咳成癆者宜保和湯有久咳經年百藥不效餘無他症與勞嗽異者宜百部膏烏梅膏有痰鬱火邪在中成乾咳嗽者此症極難治先用開劑宜逍遙散重加桔梗後用補陰之品宜本事鱉甲丸加熟地當歸白芍麥冬阿膠茯苓之屬咳之為病又有四時晝夜之異春嗽春氣上升也宜清氣宜二陳湯加川芎風咳遇春即發為脾病健脾為主宜異央散加止嗽藥夏嗽炎火逼肺也無黃連不愈宜桔梗加石膏黃連秋嗽燥金用事也宜二陳湯加桑皮天冬秋禾發嗽交夏方愈乃寒包熱也還須解表宜二陳湯加柴胡葛根冬嗽風寒外束也亦須發散宜二陳湯加麻黃杏仁羌活防風五更嗽或五更痰多或清晨痰多總皆脾虛所致宜六君子湯加炮薑日夜不咳但朝晨咳幾聲火空則發也宜二陳加黃岑桔梗桑皮日夜亦嗽惟早晨嗽更甚胃中有食積至此時火氣流入肺中也宜瀉白散加知母或二母散五更嗽同上半日咳痰稠黃胃火也宜二陳湯加竹茹貝母石膏午後咳痰黑粘滯陰虛火動也宜六味作湯加止嗽藥黃昏咳腎經陽衰陰弱虛火上炎也當補脾肺生腎水不可專用嗽藥宜六味丸六君子湯間服不論大人小兒黃昏熟睡中忽咳兩三聲食積痰也消其痰而咳自止宜二陳湯加山楂神麯麥芽後半夜嗽風也宜二陳湯加防風日輕夜重咳血少也宜二陳湯多加當歸即止凡黃昏五更上半夜咳屬實後半夜咳屬虛此又不可不知者總而言之咳嗽之因共十有六一日風嗽風乘肺也其脈浮必兼鼻塞流涕聲重口乾喉癢憎寒發熱自汗惡風煩躁語未竟自咳宜款冬花散金沸草散二日寒嗽脾肺皆受寒邪也其脈弦微必兼面白口甘水反侮土寡于畏也腹中大寒痰白作泡口甘涎沫者胃寒不和必以辛甘熱去之宜紫蘇飲子半夏溫肺湯或有遇寒即發者乃寒包熱也解表則熱自除宜桔梗湯加麻黃防風杏仁陳皮紫蘇木通黃岑大概寒傷肺而咳者其脈緊必兼鼻塞聲重憎寒發熱無汗煩躁不渴胸緊甚至音啞宜二陳加麻黃杏仁桔梗三日熱嗽傷於暑熱而得嗽也其脈數必兼口燥聲嘶煩熱引飲或吐涎沫甚至咯血宜洗肺散岑半丸黃連化痰丸須知咳嗽面赤胸腹脅常熱惟足乍有時冷其脈洪滑者必熱痰留滯於內故嗽而胸滿也宜半黃丸小陷胸湯四日濕嗽濕傷脾也其脈濡細必兼骨節煩疼四肢沉重或有汗小便不利痰多宜白朮白朮丸五日鬱嗽即火嗽也其脈數必兼面赤或肺脹喘急睡不安痰少甚者乾咳而無痰乃腎水活涸邪火獨炎所致宜清化丸清金降火湯六日勞嗽虛勞咳嗽也其脈細數必兼盜汗出痰多作寒熱火升喘促説緣酒色過度虛勞少血津液內耗心火上炎遂使燥熱乘肺唾咯膿血上氣涎潮其嗽連續不已也宜人參清肺訶黎勒丸人參芎歸湯七日食積嗽傷食生痰久積發咳也其脈數硬必兼胸滿噫酸發熱或稠痰壅滯喘滿皆由胃火上炎衝逼肺氣久而不愈也此非青黛瓜蔞不除瓜蔞丸二母寧嗽湯總之凡有食積者必面青黃白不常面上如蟹爪路一黃一白者此又可望色而知也八曰氣嗽七氣積傷成咳也其脈浮洪滑數必兼上氣喘急痰涎凝結或如敗絮或如梅核滯塞咽喉吐不出咽不下多因七情鬱結或勞傷脾肺甚而多吐膿血漸成肺萎將作勞瘵也然氣嗽一症婦人多有之宜團參飲子蘇子降氣湯星香丸九曰痰嗽嗽動便有痰聲痰出即嗽止也其脈浮滑必兼胸膈滿痰涎多或寒熱交作面浮如盤緣濕痰在胃上干於肺也宜半瓜丸滴油散澄清飲其有一種發咳時直至頓吐飲食痰物俱盡方小安者此乃肝木尅脾土風痰壅盛所致也宜白圓子十曰乾嗽肺中無津液也其脈細澀必兼氣弱或促乃痰鬱火邪於肺中輕則連咳數十聲方有痰出重則雖多咳亦無痰故為乾咳嗽極難治始宜用苦桔梗以開之再用補陰降火之劑不已則成勞瘵在不得志者多患此宜乾嗽補肺膏加味二母丸瓊玉膏十一曰血嗽嗽而多唾瘀血也其脈浮芤而數必兼喉中有腥氣或因上焦有熱血瘀沉悶嗽聲連並氣不得透宜桑皮散或因打撲損傷肺氣作咳多吐黑血宜當歸散十二曰酒嗽傷酒而成也説酒大熱有毒或冷熱兼飲日久漸傷胃脘其氣結聚不流致成濕痰作嗽宜瓜蔞青黛丸瓜蔞杏連丸蜂薑丸十三曰久嗽諸般嗽久也説積痰留聚肺脘粘滯如膠以致氣不升降或上氣喘急宜蜂薑丸貝母湯加味百花膏並有至數十年不愈者宜馬兜鈴丸潤肺除嗽飲十四曰火嗽火熱嗽也其脈洪數必兼面赤煩渴引飲有聲痰少或由肺家積熱宜清肺飲或由傷寒潮熱痰盛胸脅痛宜柴胡枳桔湯或由火肺鬱脹氣急息重宜海青丸説以肺腎二經乃人身之化源二經有虧則化源絶故痰火益盛而嗽發不止也宜滋陰清化丸十五曰夜嗽陰虛嗽也多屬腎氣虧損火炎水涸或津液壅而為痰故夜間屬陰分陰氣相感故咳聲不絶至曉方緩或兼口苦胸痞脅痛多吐涎沫不進飲食故夜咳必用知母切忌生薑以其辛散恐復傷陰也古人多以六味丸加知柏天冬貝母橘紅治之所以滋化源也宜滋陰清化丸麻黃蒼朮湯十六曰天行嗽感時行之氣作咳也説因時令不正人多感冒以致痰盛寒熱或鼻塞聲重宜人參飲子一服散而亦有四時感受風寒作嗽不盡由一時天行之氣者宜參蘇飲由是以治諸咳庶幾用藥皆有關竅而罔弗奏央矣脈法咳嗽哮喘肺萎肺癰內經曰喘鳴肩息者脈實也緩則生急則死也脈訣曰咳嗽所因浮風緊寒數熱細濕房勞澀難右關濡者飲食傷肺左關弦短疲極肝衰浮短肺傷法當咳嗽五臟之嗽各視本部浮緊虛寒沉數實熱洪滑多痰弦澀少血形盛脈細不足以息沉小伏匿皆是死脈惟有浮大而嗽者生外證內脈參考調停正傳曰關上微為咳脈弦或緊為寒脈浮為風脈細為濕脈數為熱脈沉為留飲沉數為實熟洪滑為多痰脈浮軟者生沉小伏匿者死又曰喘脈滑而浮者生澀而數者死大抵宜浮遲不宜急數又曰咳逆脈浮而緩者易治弦急而按之不數者難治脈急或促或微皆可治脈代者死右關脈弦者木乘土位難治仲景曰咳唾膿血脈數虛為肺萎數實為肺癰脈經曰喘脈滑而手足溫者生脈澀而手足寒者死數者亦死為其形損故也又曰肺癰唾血脈緊強者死滑者生回春曰喘急脈沉肺脹停水氣逆填胸脈必沉取沉而實滑身溫易愈身冷脈浮尺澀難補入門曰咳逆上氣脈散者死散即數也咳逆脈數為火刑金故必死咳嗽之因內經曰人感於寒微則為咳甚則為泄為痛河間曰經云秋傷於濕冬生咳嗽者説傷濕積於脾也大抵秋氣宜清肅若反動之氣必上沖為咳嗽甚則動脾濕而為痰也是知脾無留濕雖傷肺氣亦不為痰若有痰而寒少熱多故咳嗽是咳嗽非專主於肺病以肺主皮毛而司於外故風寒先能傷之也經云五臟六腑皆能使人咳非獨肺也各以其時主之而受病焉非其時則傳以與之也所病不等風寒燥濕火皆能令人咳惟濕病痰飲入胃留之而不行上入於肺則為嗽假令濕在心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰各隨症用藥又曰無痰有聲曰咳肺氣傷而不清也無聲有痰曰嗽脾濕動而為痰也有痰又有聲則曰咳嗽耳喘咳由腎家虛直指曰腎虛不能納氣歸元故氣逆咳喘痰盛或喘或脹髓虛多唾足冷骨痿胸腹百骸俱為牽掣咳愈重聲愈乾當於受病之處圖之又曰肺出氣腎納氣凡咳嗽暴重動引百骸自覺氣於臍下逆奔而上此腎虛不能納氣也當以補腎為主毋徒寧肺咳嗽不治症靈樞曰咳而羸瘦脈堅大者死咳而脫形發熱脈小堅急者死入門曰凡咳喘至肺脹有咽瘡失音者必死脈數有熱喘嗽吐血上氣不得臥者死正傳曰久嗽不止成癆聲啞或喉中生瘡者不治丹溪曰咳嗽肺脹鬱遏不得眠者為難治也禁忌法入門曰凡久嗽忌用人參半夏陳皮等燥藥久喘亦忌人參凡氣嗽忌罌粟殼肉豆蔻等澀藥丹溪曰凡咳嗽口乾咽燥而有痰者忌南星半夏宜瓜蔞仁貝母若有飲水者又忌瓜蔞恐膩膈導引保生祕要曰伸足坐定雙捏兒訣用力撑起低頭躬身漸下以兩手扳足尖三次隨原訣用力仰起次咽津下降幽闕如此躬法二十四回養靜半香效運央保生祕要曰此症有三種或感風寒而嗽或因心火妄動災於肺竅但用歸元凝神一法封固火不上行肺竅不癢其嗽自止卻寒嗽持守微用閉法卻火嗽但用封固取靜後引腎水澆灌肺火周旋度數肺得水潤嗽自然止哮肺病也當先辨哮與喘與短氣三症之相似而不同李氏士材曰喘者促促氣急嗡嗡痰聲張口抬肩搖身擷肚哮者與喘相類但不似喘開口出氣之多而有呀呷之音呷者口開呀者口閉開口閉口俱有聲音呀呷二音合成哮字以痰結喉間與氣相擊故呷呀作聲短氣者呼吸雖急而不能接續似喘而無痰聲亦不抬肩但肺壅而不能下按士材分別三症至為精細臨症時所當詳察哮之一症古人專主痰後人謂寒包熱治須表散宜陳皮湯冬加桂枝竊思之大都感於幼稚之時客犯鹽醋滲透氣脘一遇風寒便窒塞道路氣息急促故多發於冬初必須淡飲食行氣化痰為主宜千金湯能治一切哮禁涼劑恐風邪難解也禁熱劑恐痰火易升也蘇子枳殼青皮桑皮桔梗半夏前胡杏仁山梔皆治哮必用之藥士材謂先於八九月末寒時用大承氣下其熱至冬寒無熱可包此法大妙而又有食哮宜清金丹有水哮宜水哮方有風痰哮宜千緡導痰湯有年久哮宜皂莢丸青皮散若服青皮散愈後宜用半夏八兩石膏四兩蘇子二兩丸服皆當隨症治之無不可以斷其根也宜定喘湯哮病證治入門曰哮以聲響言喘以氣息言綱目曰哮喘遇冬則發者有二症一由內外皆寒須用東垣參蘇溫肺湯一由寒包熱須用越婢加半夏湯表散之正傳曰喘促喉中如水雞聲者謂之哮氣促而連續不能以息者謂之喘喘肺病也內經論喘之因甚多獨諸病喘滿皆屬乎熱一語足為綱領王海藏云氣盛有餘便是火氣盛當作氣衰有餘當作不足肺氣果盛有餘則清肅下行豈復為喘皆以其火入肺炎爍真陰氣衰不足故喘所謂盛有餘者非肺之氣肺中之火也海藏誠發千古之精奧而猶末究火所由來火之有餘即水之不足諸逆衝上皆緣壯火食氣銷爍肺金真陰虛故火益旺其症多自小腹下火起而上左尺大而虛非四物陰血之劑可療下焦龍火亦非寒涼可降其挾痰者乃水挾木火而上非竹瀝枳半能消必當補瀉兼行宜六味作湯加麥冬五味子大劑濃煎服之則水自升火自降痰自消若六脈俱沉實遍身痰氣火氣坐臥不得則又不在此例宜黃連膏總之喘因雖多而其原未有不由虛者元氣衰微陰陽不接續最易汗脫而亡一時難救古人言諸般喘症皆屬惡候是也説人身氣血陰陽如連環式樣一般兩圈交合之中一點真陽命也牽扯和勻即呼吸調息也若不接續即見鼻扇唇青掀胸抬肚張口搖肩等狀脈亦不續無神即死故凡喘皆不可忽視也試條列之火鬱喘六脈俱澀或沉伏四肢厥冷拂拂氣促而喘以為有餘脈卻不緊數以為陰虛尺脈又鼓指寒熱俱難投惟當宣散畜熱宜逍遙散加黃連吳萸使之發汗既愈再養陰和陽宜六味丸乃佳水氣喘促乃水氣逆行乘肺肺得水而浮喘不能臥氣不宣通當從小便去之宜桂苓甘朮湯腎氣丸風寒外束喘喘必有力其氣粗有餘之喘也宜三拗湯勞碌氣虛喘必呼吸急促宜六君子湯胃虛喘抬肩擷肚喘而不休宜五味子湯食喘凡病初起即喘急多食或放屁或咬人或見壯脈皆食重之故消其食自愈宜資生丸痰喘動作便有痰聲宜先服定喘加瓜蔞三劑次照痰症治痰甚喘痰聲更甚喘不休宜神仙住喘湯氣喘呼吸急促無痰聲宜定喘湯火喘乍進乍退食則減已則發宜桔梗二陳湯暑喘遇暑熱即病清暑益氣湯濕喘不論內蒸外感皆胸滿張口促急以利水為要宜滲濕湯陰虛喘火自臍下上衝便喘不休宜四物加知柏麥冬五味間服六味丸肺癰喘必口燥胸中隱隱痛吐膿右寸脈數實以保金化毒為主宜桔梗湯加防風橘紅金銀花麥冬肺萎喘唾有膿血或濁痰宜紫菀散肺脹喘上氣煩躁目如脫狀脈浮而大宜越婢加半夏湯脈浮心下必有水氣宜小青龍加石膏藥後喘或其人素來勞倦氣虛或當病後用攻伐藥太過以致喘不能收宜補中益氣湯忽作喘必因感風感氣或多食飲酒而然須兼所感治之宜以定喘湯為主各加所感藥似喘非喘之喘由陽明之氣下行胃絡不和逆而上出也宜六君子湯似火非火之喘真元耗極腎氣上奔四肢厥冷面赤煩躁惡熱此非邪火乃命門真火離宮不歸兩寸浮數兩尺微弱用涼藥似稍快少頃依然此當細求其緒與以助元接真鎮墜之品宜六味丸腎氣丸生脈散送下覺氣稍定復用大劑以鎮於下或可回生宜大齊參耆加故紙牛膝阿膠小兒行走氣急作喘必是食食喘必兼感如感風疏風感氣開氣受驚鎮驚加入消食中自愈宜以平胃散為主各加所感藥老人動即作喘皆由虛衰必用補益不可專任定喘之劑宜嵩崖脾腎丸喘遇秋冬即發寒包熱也解表則愈宜陳皮湯喘不休汗出如油氣脫也不治惟獨參湯濃煎多服或可少延時日種種喘症皆當詳察治之至用藥通忌斂澀升發燥熱酸鹼之品降氣清火潤肺方為治喘平和之法宜通用蘇子桑皮枇杷葉前胡烏藥枳殼半夏山梔元參知母青黛黃岑梨肉貝母杏仁花粉桔梗橘紅天冬麥冬等孫慶曾先生云凡喘皆不可輕視言易治旨哉言乎誠見乎喘病之重而治喘之難也臨症者慎旃喘急形症肉經曰肺主氣形寒飲冷則傷肺故其氣逆而上行衝衝而氣急喝喝而息數張口抬肩搖身掀肚者是為喘丹溪曰喘急者氣因火鬱而成稠痰在肺胃也入門曰呼吸急促者謂之喘喉中有聲響者謂之哮虛者氣乏身冷痰如冰實者氣肚胸滿身熱便硬又曰有起居如故而息有音者乃肺之絡脈逆而不得隨經上下也又曰喘非風寒傷肺則痰火脹急風寒則祛散痰火則疏導但火熱者亦不可純用苦寒宜溫以劫之又曰凡喘未發以扶正為主已發以散邪為主喘由腎虛得效曰下元虛冷腎氣不得歸元上喘氣急安腎丸八味丸主之喘嗽聲嘶丹溪日聲嘶者由血虛受熱也蛤粉青黛蜜丸時常含化喘病不治症仲景曰凡喘煩躁無脈身冷神昏者死發汗如油汗出如珠不流抬肩擷肚喘而不休及膈前高起手足厥冷脈散及數者皆死直指曰汗出發潤喘者為肺絶身汗如油喘者為命絶直視譫語喘滿者不治諸有病篤正氣欲絶之時邪氣盛行都壅逆而為喘然則喘之危急又何可以尋常小症目之哉導引哮喘同保生祕要曰用手法於十一椎下脊中穴掐之六十四度擦亦如數兼行後央喘自然安運央哮喘同保生祕要曰以手摩擦兩乳下數遍後擦背擦兩肩定心咽津降氣以伏其喘治咳嗽方八十三寧嗽湯表病嗽桔梗半夏枳殼陳皮前胡葛根桑皮茯苓蘇葉杏仁甘草加薑蔥冬加麻黃取汗服此方後再用加味二陳湯一劑全愈不必多服二陳湯寒嗽半夏陳皮茯苓甘草保和湯內傷咳貝母知母天冬麥冬款冬花苡仁五味炙草紫蘇薄荷馬兜鈴紫菀桔梗百合阿膠當歸百部飴糖加薑失血加蒲黃生地小薊痰多加橘紅茯苓瓜蔞仁喘者去紫蘇薄荷加蘇子桑皮陳皮滋陰清化丸內傷咳天冬麥冬生地熟地知母貝母茯苓山藥粉五味子甘草蜜丸彈子大含化芍藥湯小腸咳白芍甘草各四錢煎餘糧湯大腸咳禹餘糧赤石脂烏梅丸胃咳烏梅細辛炮附桂枝人參黃柏乾薑黃連當歸蜀漆飯丸黃岑湯膽咳黃岑生薑半夏甘草茯苓湯膀胱咳茯苓桂枝生薑炙甘草木香順氣散三焦咳木香香附青皮陳皮厚朴蒼朮枳殼砂仁甘草四物湯肺脹川芎當歸白芍地黃驅二豎湯肺勞生蟲麥冬炮薑川椒黃耆人參肉桂百部白朮遠志肉細辛炙甘草杏仁蜜丸含化六君子湯水冷金寒咳人參茯苓白朮甘草半夏廣皮八味丸過服寒涼地黃萸肉山藥茯苓丹皮澤瀉附子肉桂六味丸火爍肺金地黃山藥萸肉丹皮澤瀉茯苓桔梗湯火鬱於肺桔梗香附山梔黃岑前胡貝母知母參蘇飲風嗽人參紫蘇葛根半夏前胡桔梗枳殼廣皮茯苓甘草木香金沸草散熱嗽金沸草麻黃前胡荊芥甘草半夏赤苓細辛加薑棗清火止咳湯火嗽枳殼杏仁黃岑石膏山梔瓜蔞霜桔梗桑皮知母貝母前胡甘草加生薑白朮湯濕嗽白朮三錢半夏橘紅茯苓五味各一錢半甘草五分薑五片人參飲子天行嗽人參桔梗五味子赤苓半夏各一錢半枳殼甘草各七分加薑麻黃蒼朮湯夜嗽麻黃蒼朮黃耆草蔻仁柴胡羌活防風歸尾炙草生草黃岑五味子加薑加味二陳湯痰嗽茯苓陳皮半夏甘草枳殼桔梗瓜蔞仁杏仁黃岑前胡山梔消風寧嗽湯新風嗽桔梗枳殼半夏陳皮前胡葛根茯苓紫蘇杏仁桑皮甘草大安丸食嗽白朮山查橘紅半夏神麯麥芽茯苓蘇子連翹黃連補中益氣湯氣虛嗽人參黃耆甘草陳皮白朮歸身升麻柴胡阿膠四物湯血虛嗽阿膠川芎當歸白芍地黃岑連四物湯聲嘶黃岑黃連麥冬川芎當歸白芍地黃寧肺湯氣血兩虛人參當歸白芍桑皮阿膠麥冬茯苓白朮熟地炙甘草五味子川芎五汁膏虛勞咳血天冬麥冬各二錢半生地薄荷各二錢貝母丹皮各一錢茯苓八分犀角羚羊角各五分梨汁藕汁萊蔔汁蔗汁人乳汁各二杯水八杯將諸藥煎至三杯去渣入五汁煉成膏收蜜二兩重湯頓半日劫勞散虛勞嗽白芍黃耆人參甘草熟地麥冬茯苓當歸五味阿膠半夏人參蛤蚧散久嗽生瘡人參蛤蚧杏仁甘草茯苓桑皮知母貝母杏仁膏失音杏仁三兩薑汁砂糖白蜜各一兩五錢桑皮木通一兩二錢半紫菀五味各一兩將後四味先熬三炷香去渣入前四味煉成膏含化清肺湯又五味子五倍子黃岑甘草等分劫嗽丸久嗽失氣訶子百藥煎荊芥蜜丸含化葶藶散浮腫葶藶隔紙炒鬱李仁桑皮各一錢旋覆花檳榔木通各八分大腹皮七分半加生薑噙化丸久嗽熟地阿膠五味子貝母款冬花杏仁人參炙草蜜丸立效方又五味子四錢貝母瓜蔞各五錢杏仁蘇梗天冬各一兩款冬花八錢蔥白七根川椒每歲一粒共為末入豬肺中荷葉包蒸熟五更作一次食盡大妙否則留第二日五更再食同淡燒酒食食完另飲陳酒少部安臥至曉百部膏經年咳百部只一味煎膏每含化烏梅膏又烏梅只一味煎膏每含化逍遙散乾咳自朮白荷當歸柴胡茯苓丹皮薄荷麥冬山梔牛膝甘草本事龜甲丸補陰龜甲五味地骨皮蜜丸食前鹽湯下異央散春嗽復發人參白朮茯苓甘草陳皮瀉白散晨嗽桑皮地骨皮甘草粳米人參茯苓知母黃岑款冬花散風嗽麻黃貝母阿膠杏仁炙草知母桑皮半夏款冬花加薑紫蘇飲子寒嗽蘇葉杏仁桑皮青皮陳皮五味麻黃甘草人參半夏加薑半夏溫肺湯胃虛冷嗽半夏細辛桂心旋覆花陳皮人參桔梗白