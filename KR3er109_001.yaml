子厚朴陳皮前胡神仙住喘湯痰甚黑丑頭末一錢明礬三分皂角四分木香三分人參一分共為末用萊蔔汁調下十服無不愈著桔梗二陳湯火喘茯苓陳皮半夏甘草桔梗枳殼黑山梔黃岑黃連清暑益氣湯暑喘人參黃耆蒼朮白朮升麻陳皮神麯澤瀉當歸青皮麥冬葛根甘草五味子滲濕湯濕喘蒼朮白朮甘草乾薑茯苓橘紅丁香加薑棗四物湯陰虛川芍當歸白芍地黃桔梗湯肺癰桔梗貝母當歸瓜蔞仁枳殼苡仁桑皮黃耆漢防己甘草節杏仁乾百合紫菀散肺萎紫菀知母貝母人參桔梗甘草茯苓阿膠五味子越婢加半夏湯肺脹麻黃石膏生薑甘草半夏大棗先煮麻黃去沫再入諸藥合煎小青龍湯水氣麻黃桂枝白芍細辛甘草乾薑半夏五味子補中益氣湯藥後喘人參黃耆歸身白朮甘草陳皮升麻柴胡生脈散似火非火人參麥冬五味子平胃散小兒蒼朮厚朴陳皮甘草加薑棗嵩崖脾腎丸老人熟地山萸山藥補骨脂益智仁砂仁丹皮茯苓澤瀉桂附子車前子牛膝蜜丸瓊玉膏乾咳生地十六斤搗絞取汁人參末一斤半茯苓末三斤自蜜煉去渣十斤上和勻入磁缸內以油紙五重厚布一重緊封缸口置銅鍋內水中懸胎令缸口出水上以桑柴火煮三晝夜鍋內水減用暖水添之日滿取出再用蠟紙緊封缸口納井中浸一日夜取出再入舊湯內煮一日夜以出水氣乃取出每取一二匙溫酒調服如不飲酒白湯下日進二三服如夏熱天置陰涼處或藏水中或埋地中製時終始勿犯鐵器服時忌食蔥蒜萊蔔醋酸等物
