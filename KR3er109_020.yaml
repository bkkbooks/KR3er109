body:
  text: 卷二十瘟疫源流瘟疫時行病也類於傷寒春夏秋三時俱有夏秋更甚皆因天之風雨不時地之濕熱鬱蒸胔骼之氣延蔓人觸之而病而死於是更增一種病氣死氣相漸染犯之者從口鼻入抵臟腑溷三焦正閉邪盈因而陽格於內營衛運行之機阻於表始必惡寒甚而厥逆逮陽鬱而通厥回而中外皆熱昏沉自汗此時邪伏膜原雖有汗熱亦不解必候伏邪潰表氣入內精氣達表戰栗大汗邪氣方出脈靜身涼猶或伏邪未盡亦必先惡寒再發熱至於發出方顯變症其症或從外解或從內陷外解者發煩戰汗自汗內陷者胸隔痞悶心下脹滿腹中痛燥結便祕熱結旁流協熱下利或嘔吐惡心譫語舌黃及苔黑芒刺等症脈則不沉不浮而數日夜皆熱日晡更甚頭疼身痛忌汗與下宜透膜原之邪宜達原飲若見各經加引經藥感輕者舌苔薄脈不甚數此必從汗解如不得汗邪結膜原表裡不通亦不可外逼強汗感重者舌苔如粉漬藥後反內陷舌根先黃漸至中央邪漸入胃矣須下之宜達原飲加大黃若脈長洪而數大此邪適離膜原欲表未表也宜白虎湯舌黃兼裡症此邪已入胃也宜大小承氣湯邪之離膜原每因元氣厚薄為久暫厚則邪易傳化薄則邪難傳化倘本有病又感邪能感不能化安望其傳不傳則邪不得去日久愈沉切勿誤進參芪且疫之傳有九總不越表裡之間一為但表而不裡二為但裡而不衰三為表而再表四為表裡分傳五為再表再裡或再表裡分傳六為先表後裡七為先裡後表八為表裡各偏勝九為不論表與裡其初發必重此九者之名目既審而九者之症治可詳曷言乎但表而不裡也其症頭疼身痛發熱似畏冷谷食如常無裡症此邪傳外由肌表出或斑消或汗解為順輕劑可愈有汗不透而仍熱者宜白虎湯有斑不透而仍熱者宜舉斑湯有斑汗並行俱不透者宜參用白虎舉斑二湯曷言乎但裡而不表也其症胸膈痞悶欲吐不吐吐亦不快宜瓜蒂散若邪傳裡之中下心腹脹滿不吐不嘔或燥結便閉或熱結旁流或協熱下利或大腸膠閉甚或有再發三發者俱宜承氣湯曷言乎表而再表也所發未盡膜原尚有隱伏之邪故隔數日再發熱脈洪大而數及其解也斑者仍斑汗者仍汗甚至於三發四發者宜清熱解肌湯曷言乎表裡俱傳也其始邪伏膜原尚在半表裡二症俱現必先令裡邪去自能達表或斑或汗隨宜升泄之病退而熱未除膜原尚有未盡之邪也宜三消飲若分傳至再三照前治之曷言乎再表再裡或再表裡分傳也此亦病氣如此非醫之疏於救治病家之失於調養也宜酌用清熱解肌湯三消飲普濟消毒飲子曷言乎先表後裡也其始但有表症宜達原飲其繼脈大且數自汗渴此邪離膜原未能出表耳宜白虎湯逮邪既從汗解三四日後仍發熱宜達原飲至後反加胸滿腹脹煩渴不食等症復傳裡矣宜達原飲加大黃曷言乎先裡後表也其始發熱有裡症下之便愈後又發熱反加有頭痛身重脈浮必當汗宜白虎湯服之不得汗液活也宜白虎湯加人參即解若大汗大下後表裡症悉去繼而一身盡痛身如被杖脈沉細此汗出太多陽氣不周骨寒而痛非表症也不必治陽回自愈曷言乎表裡偏勝也膜原伏邪發時若表症多而裡症少當治其表裡症兼之宜達原飲加枳實大黃若裡症多而表症少但治其裡表症自愈宜大柴胡湯曷言乎不論表裡初發必重也説以邪有行有伏正傷寒行邪也故依次傳經或汗或下立解若疫邪則先伏後行始伏膜原營衛所不關藥石所難治及其發時邪毒張熾內浸於腑外淫於經營衛受傷諸症漸纍然後得而治之方其浸淫之際邪毒在膜原此時但可疏利使伏邪易出宜香蘇散邪既離膜原乃觀其變或出表宜達原飲或入裡宜白虎湯然後可導邪而出邪盡方愈不得初發方張即為驚愕無措也古人云瘟疫莫治頭癆怯莫治尾其始但使邪毒速離膜原便是治法全在後段識得表裡虛實緩急重輕不致錯治自可全愈若久病後老年人酒色輩又加瘟疫自難支矣此瘟疫九傳症治也而其詳更有可條分薄析者説疫邪為病有從戰汗解者有從盜汗自汗解者有無汗而全歸胃者有大汗熱渴終得戰汗解者有胃氣壅抑必從下而得戰汗解者有汗解未三四日復發熱者有發黃因下而復熱發斑者有發斑即愈者有裡症急雖斑不愈者凡此皆尋常之變又有局外之變男子犯房事熱邪乘虛陷下焦以致夜熱便淋澀小腹脹用導赤五苓不效者宜大承氣湯便如注而愈女子經適來適止失血崩帶及心痛疝氣痰火哮喘凡此皆非常之變要之因疫而來他病但治疫為要有一二日舌苔白早服達原飲舌色變黃並胸膈滿痛大渴煩躁此邪傳裡也宜達原飲加大黃下之煩熱稍減晚又熱躁舌全黑刺鼻黑煤此邪毒瘀胃也宜大承氣湯抵暮大下夜半當熱退次早舌刺如失一日三變因其毒甚故傳變亦速用藥亦必緊緩劑則無救矣有初起脈數未至洪大邪尚在膜原止宜達原飲誤用白虎湯者必不能破結使愈或邪入胃必宜承氣湯誤用白虎湯徒伐胃氣反抑邪毒致脈不行反變細小勿更誤認陽症陰脈妄言不治因不敢下急宜承氣湯有表裡傳變無定者不得拘先解表後攻裡之説説邪在裡裡氣結滯不得外達即四肢未免微厥雖發汗不得愈必解其裡宜承氣湯裡氣一通多有自汗解者設下後脈浮而微數身微熱神思不爽此邪止浮於肌表也宜白虎湯便色清便蒸蒸汗解若下後脈數而空此則虛也宜人參白虎湯補之即汗解下後脈數而浮原當解至五六日無汗脈症不改此因數下血液活正氣微也宜人參白虎湯以涼解即得汗裡症脈沉下之改浮今不得汗二三日脈更沉者此膜原之邪仍瘀到胃也更宜下之或又脈浮宜白虎湯自愈或裡症下之愈幾日復熱非關飲食勞役乃膜原之邪復聚仍當下之但製輕劑耳有應下失下口燥舌乾而渴反熱減四肢時厥欲就暖此陽氣伏藏也既下厥回脈大而數舌上生津不思水飲此裡邪去而鬱陽暴伸也宜柴胡清燥湯去花粉知母加葛根有下後二三日舌又生苔邪未盡也再下之苔刺去煩熱留更下之已愈數日復熱復苔更下之勿忌生疑失治但其間或間日一下或三四日一下或下二日間一日其後輕重緩急或應用柴胡清燥湯或犀角地黃湯或承氣湯與多與少亦皆治法若不明必誤事有下後已愈腹中有塊按之痛常作蛙聲氣之升降不利此邪雖除宿結未清也不可攻須善調養常食粥結塊方下或堅黑如石又有病氣促月餘塊方消者此無形之結也有下後已愈大便十數日不行時嘔此名下膈説下不能通必及於上也必使宿垢盡下宜調胃承氣湯嘔自止切不可補總之疫邪貴早下但見舌黃心腹脹滿乘氣血未亂津液未活即當下之宜承氣湯不得拘下不嫌遲之説説疫氣多濕未便即結非如傷寒必俟結定而後攻也凡疫邪傳裡遺熱下焦小便不利邪無輸泄經氣鬱滯其傳為疸身目如金或用茵陳五苓散不效乃胃家移熱必以大黃奏央宜茵陳蒿湯凡疫邪胸滿喜嘔腹不滿欲吐不吐欲飲不飲此邪與痰飲結滯也必吐之宜瓜蒂散凡疫日久失下自利純黑水晝夜十數行口燥唇乾舌裂此熱結旁流也宜承氣湯去其宿垢頓止凡胃熱失下經氣為熱所鬱而為黃熱更不減搏血為瘀是因發黃而為畜血非因畜血而至發黃也但畜血一行熱隨血泄黃隨泄減矣治黃宜茵陳蒿湯治畜血宜桃仁承氣湯去桂枝甘草加丹皮當歸白芍凡疫邪留血分裡氣壅閉不下則斑不出出則邪解矣如下後斑出更不可下設猶有下症宜少與承氣緩服若大下則元氣損斑陷危矣必當托裡宜舉斑湯如下後斑隱反見循衣撮空脈微宜舉斑湯加人參三錢或得補復發出可不死凡胃移熱下焦氣分小便不利熱結膀胱也若移熱於下焦血分膀胱畜血也夫畜血症在小便利不利也故晝稍減夜熱譫語者瘀血也未行宜桃仁承氣湯下之後用犀角地黃湯調之凡失下循衣摸床撮空肉惕目不了了邪熱愈甚元氣將脫者不可竟下又不可不下宜陶氏黃龍湯既下急用生脈散加生薑當歸白芍知母陳皮甘草皆死中求生法也凡疫病邪不入胃必終始能食勿絶其食只少少與之耳凡大下後須善調理宜清燥養榮湯或有表留餘熱者宜柴胡養榮湯或有痰飲積而胸膈不清宜瓜貝養榮湯凡舌苔白邪在膜原變黃邪在胃沉香色苔老白不可下黃宜下黑急下下後苔不脫舌刺舌短舌裂舌硬舌卷白砂苔黑硬苔皆當下苔雖白倘別有下症宜達原飲加大黃則下之若大汗脈洪大而渴未可下也宜白虎湯惟目赤咽乾氣噴如火小便黃赤作痛揚手擲足脈沉數下之宜承氣湯有心下痛腹脹滿痛頭痛下之立止如初起不可下而有血液活竭者當用導法導之宜蜜煎法以其為虛燥也凡疫病在現症或輕雖有頭疼身熱自汗而飲食不絶力可行走脈又不浮不沉而數不得誤認為勞倦傷脾竟用補法以致不救凡疫痢相兼最危疫屬胃痢屬大腸大腸病而失傳送之職故糞不行下膿血谷食俱留停在胃直須大腸邪氣退胃氣通今大腸既病糞尚不行何能為胃載毒而出毒既不行最傷胃氣胃傷必死凡遇疫痢兼病在痢尤宜吃緊宜檳榔順氣湯凡孕婦疫發設用三承氣須隨症施治不可過慮慎勿生疑掣肘必致母子兩傷倘應下之症誤用安胎補劑熱毒愈熾胎愈不安急當下之以逐其邪當子母俱安若腹痛腰痛必墜無疑矣須預為病家言之也凡婦人病疫惟經水適來適斷崩漏産後與男子不同説經水適來邪不入胃而入血海勿以胃實攻之熱隨血下自愈宜小柴胡湯加赤芍丹皮生地如結胸狀者血因邪結也宜刺期門經水適斷血室乍空邪乘虛入難治與適來者有虛實之分也宜柴胡養榮湯新産亡血衝任空虛與素崩漏經氣久虛者亦如前治宜柴胡養榮湯若藥不行須和其性宜加生薑氣虛不運須助宣行宜加人參凡疫行小兒目吊驚搐十指鉤曲角弓反張切勿誤認驚風當與大人疫病同治但藥劑須輕小耳凡裡症下後臥幾日汗不止身微熱此表有餘邪邪盡汗自止若不能止小柴胡湯加廣皮嘔加半夏虛加人參不可用芪朮如已愈幾日後反得盜汗宜略用補法虛實之分在有熱無熱也下後邪去嘔止若復嘔胃虛也稍進粥飲調之凡感冒兼疫先治感冒宜上清散後治疫凡瘧疫相兼治疫而瘧自已凡方食肉病停積在胃因承氣連下惟下旁流臭水其病不通加人參一味即三四十日停積頓行應下失下真氣虛微及投承氣少頃汗出額上發際癢手足冷甚則戰栗心煩坐臥不安如狂此中氣已虧不勝藥力名曰藥煩如遇此症須多加生薑勻兩次服防嘔以上治疫之法既詳且盡更無挂漏矣而疫與傷寒異同處更有當辨者傷寒必有感冒之因惡風惡寒身疼頭痛發熱無汗脈浮緊為傷寒有汗脈浮數為中風若瘟疫無感冒之因始覺凜凜後但熱不惡寒雖飢飽勞役焦思怒鬱皆能觸發其邪然無所觸而自發者居多傷寒藥一汗即解疫發散雖汗不解傷寒不纏染疫則纏染他人傷寒邪從毛竅入疫邪從口鼻入傷寒感而即病疫感而後發傷寒汗解在前疫汗解在後傷寒可使立汗疫必俟其內潰方自汗盜汗戰汗傷寒不易發斑疫多發斑傷寒邪感在經以經傳經疫邪感在內邪溢於經經不自傳傷寒感發甚暴疫卻有淹纏幾日漸加重或忽加重傷寒初起必先發表疫初起必先疏利此皆其異焉者也而亦有其同焉者皆能傳胃故必皆用承氣導邪而出故始異而終同也傷寒之邪自外傳內原無根蒂惟傳法有進無退故下之皆愈疫之邪始匿膜原根深蒂固時發與營衛交並客邪由經之處營衛無不被傷故曰潰不潰則不能傳不傳則邪不出不出則病不愈乃疫下後或有不愈者何也説疫邪多表裡分傳因有一半向外邪傳留於肌肉一半向裡邪傳留於胃惟傳胃故裡氣結裡結表氣亦不通於是肌肉之表不即達肌表下後裡氣通表氣亦順向鬱肌肉者或斑或汗然後可謀治傷寒下後無此法雖曰終同實不同也至傷寒似陰者傷寒與疫皆有之若陰症似陽惟正傷寒為然疫必無此症夫陽似陰雖外寒而內必熱故小便必赤澀若陰似陽隔陽之症也上熱下寒故小便清白但以小便清白為據萬不失一此又宜辨也凡四損不可治大勞大欲大病久病後此四者氣血俱虛陰陽並竭正氣先虧邪氣自陷者是也且夫瘟疫有發於內者亦有見於外者茲更舉其症條列於下一曰大頭瘟俗呼為狸頭瘟又雷頭風亦謂之時毒頭痛腫大如斗此天行厲也因濕熱傷高巔之上其症狀發於鼻面耳項咽喉間皆赤腫無頭或結核有根令人多汗氣蒸初則憎寒壯熱肢體重頭面俱痛目不能開上喘咽喉不利甚則堵塞不能食飲舌乾口燥或恍惚不寧不速治十死八九宜人中黃丸普濟消毒飲子便硬加酒大黃一二錢緩服作丸噙化尤妙沈氏頭瘟湯至於潰裂膿出必反染人所以謂之疫癘大約冬溫後多有此症若額上面部琚赤腫痛脈數者屬陽明病宜普濟消毒飲子加石膏內實加大黃若發於耳之前後並額角旁紅腫此少陽也宜普濟消毒飲子加柴胡天花粉便實亦加大黃若發於頭腦項後並耳後赤熱腫痛此太陽也宜荊防敗毒散去人參加芩連甚則砭針刺之沈氏頭瘟湯一曰捻頭瘟喉痹失音項大腹脹如蝦蟆狀故亦名蝦蟆瘟宜荊防敗毒敗而正傳則謂天行一種大頭瘟從耳前腫起名為蝦蟆瘟從頤項腫起名為鸕鷀瘟此可參考一曰瓜瓤瘟胸高脅起嘔血如汁是也宜生犀飲便結加大黃渴加花粉虛加鹽水炒人參表熱去蒼朮加桂枝黃連便膿血去蒼朮倍黃土加黃柏便滑以人中黃代金汁一曰楊梅瘟遍身紫塊忽然發出黴瘡是也宜清熱解毒湯下人中黃丸並宜刺塊令出血一曰疙瘩瘟發塊如瘤遍身流走旦發夕死是也急宜用三稜針刺入委中三分出血服人中黃散一曰絞腸瘟腸鳴乾嘔水泄不通是此類絞腸痧急宜探吐之服雙解散一曰軟腳瘟即濕溫症便清泄白足腫難移是也不可輕下宜蒼朮白虎湯總之盛夏濕溫之症即藏疫癘一人受之為濕溫一方傳遍即為疫癘以春夏間濕熱暑三氣交蒸故也説春主厥陰肝木秋主陽明燥金冬主太陽寒水各行其政惟春分後秋分前少陰君火少陽相火太陰濕土三氣合行其事天本熱也益以日之暑日本烈也益以地之濕三氣交動時分時合其分也風動於中勝濕解蒸不覺其苦其合也天之熱氣下地之濕氣上人在氣交中無可避故病之繁且苛者惟夏月為最以無形之熱蒸動有形之濕即無病人感之亦為患況素有濕熱或下元虛人安得不患濕熱症乎是以其症忌發汗汗則濕熱混一中氣盡傷必死惟宜分解先扶中氣使中氣徐領其表裡上下分消故多愈也至若疫氣則邪正混合邪勝正衰轉眼立死苦寒則傷胃溫補則助邪如人中黃之類方合法別有瘴疫如嶺南春秋時月山嵐霧瘴之毒中於人發為寒熱溫瘧此其瘴毒亦從口鼻入也宜蒼朮升麻湯即如南方疫癘亦挾嵐瘴溪源蒸毒之氣者其狀熱乘上焦病欲來時令人迷困甚則發躁狂妄或啞而不能言語皆由敗血瘀於心毒涎聚於脾故也宜加味柴胡湯太無神朮散夫傷寒之邪先行身之背次行身之前次行身之側由外廓而入瘟疫之邪直行中道流布三焦甚者三焦相混上行極而下下行極而上傷寒邪行中久廓一表即散疫邪行中道表之不散傷寒邪入胃府則腹滿便鞭故可攻下疫邪布中焦散之下收下之復合此與治傷寒表裡諸法有何涉哉吳又可溫疫論治法精詳千古莫易雖論疫症者甚多皆莫越其範圍故此篇即就其書而裁竄之脈法靈樞曰尺膚熱盛脈盛躁者病溫也又曰熱病脈靜汗已出脈盛一逆也死不治脈經曰陽脈濡弱陰脈弦緊更遇溫氣變為瘟疫脈訣曰陰陽俱盛病熱之極浮之而滑沉之散澀惟有溫病脈散諸經各隨所在不可指名脈法曰溫病二三日體熱腹滿頭疼食飲如故脈直而疾八日死溫病四五日頭痛腹滿而吐脈來細而強十二日死溫病八九日頭身不痛目不赤色不變而反利脈來澀按之不足舉之卻大心下堅十七日死溫病汗不出出不至足者死溫病厥逆汗自出脈堅強急者死虛軟者死得效曰時疫之脈無定據隨時審思才得未可輕議醫鑑曰溫病穰穰大熱脈細小者死溫病下利腹中痛甚者死又曰熱病得汗脈安靜者生躁急者死及大熱不去者亦死熱病八九日當汗反不得汗脈絶者死瘟疫原由症治三因曰凡時行病者冬應寒反暖春發溫疫其症發熱腰痛強急腳縮不伸胻欲折目中生花或淅淅憎寒復熱春合溫反涼夏發燥疫其症身體戰掉不能自禁或內熱口乾舌破咽塞聲嘶夏合熱反寒秋發寒疫其症頭重頸直皮肉強痹或蘊而結核起於咽喉頸項之間布熱毒於皮膚分肉之中秋合涼反陰雨冬發濕疫其症乍寒乍熱損傷肺氣暴嗽嘔逆或體熱發斑喘咳引氣入門曰疫疾如有鬼癘相似故曰疫癘又曰春發瘟疫宜葛根解肌湯夏發燥疫宜調中湯秋發寒疫宜蒼朮白虎湯冬發濕疫宜甘桔湯表症宜荊防敗毒散半表裡症宜小柴胡湯裡症宜大柴胡湯宜補宜散宜降用人中黃丸治之醫鑑曰感四時不治之氣使人痰涎壅盛煩熱頭疼身痛憎寒壯熱項強睛疼或飲食如常起居如舊甚至聲啞或眼赤口瘡腮腫喉痹咳嗽稠粘噴嚏正傳曰瘟病初症未端的先以敗毒散治之看歸在何經隨經施治又曰九味羌活湯治瘟疫初感一二日間服之大效又曰凡治溫疫切不可作傷寒症治而大汗大下但當從手中治而用少陽陽明二經藥少陽小柴胡湯陽明升麻葛根湯即二方加減以治之可也瘟疫論喻嘉言曰人之鼻氣通於天故陽中霧露之邪者為清邪從鼻息而上入於陽入則發熱頭痛項強筋攣正與俗稱大頭瘟蝦蟆瘟符也人之口氣通於地故陰中水土之邪者從飲食濁味從口舌而下入於陰入則其人必先內栗足膝逆冷便溺妄出清便下重臍築湫痛正與俗稱絞腸瘟軟腳瘟符也然從鼻從口所入之邪必先注中焦以次分布上下故中焦受邪因而不治中焦不治則胃中為濁營衛不通血凝不流其釀變即現中焦俗稱瓜瓤瘟疙瘩瘟等則又陽毒疒雍膿陰毒遍身青紫之類是也此三焦定位之邪也若三焦邪混一內外不通臟氣燻蒸上焦怫鬱則口爛齦腫衛氣前通者因熱作使遊行經絡臟腑則為疒雍膿營氣前通者因召客邪嚏出聲啞咽塞熱壅不行則下血如豚肝然以營衛漸通故非危候若上焦之陽下焦之陰兩不相接則脾氣於中難以獨運斯五液注下下焦不合病難全矣治法未病前預飲芳香正氣藥則邪不能入此為上也宜屠蘇飲太倉公辟瘟丹七物赤散邪即入則以逐穢為第一義上焦如霧升而逐之兼發解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒營衛即通乘勢追拔勿使潛滋延蔓可也大頭瘟症治王海藏曰大抵足陽明邪火太盛為實少陽相火為熾濕熱為腫木盛為通多在少陽或在陽明陽明為邪首大腫少陽為邪出於耳之前後精義曰大頭瘟初發狀如傷寒五七日之間乃能殺人又曰大頭瘟俗謂之時毒常搐通氣散於鼻中取十餘嚏作放若搐藥不嚏不治如嚏出膿血治之易愈每日用嚏藥三五次以泄毒此是良法左右看病之人亦日用搐藥必不傳染又曰經三四日不解宜荊防解毒散七八日大小便通利頭面腫起高赤宜托裡消毒散兼針砭出血泄其毒氣十日外不治自愈若五日以前精神昏亂咽喉閉塞語音不出頭面大腫食不知味者必死丹溪曰大頭瘟此熱氣在高巔之上切勿用降藥入門曰大頭瘟治法當先緩而後急先緩者邪見於無形之處至高之分當用緩緩徐徐服之寒藥則用酒浸酒炒皆是也後急者邪氣入於中有形質之所此為客邪故須急急去之又曰服藥俱仰臥使藥氣上行又曰東垣普濟消毒飲子最妙人中黃丸亦妙瘟疫熱病不治症靈樞曰此症不可治者有九一汗不出大顴發赤噦者死二泄而腹滿甚者死三目不明熱不已者死四老人小兒熱而腹滿者死五汗不出嘔而下血者死七咳而衄汗不出出不至足者死八髓熱者死九熱而痙者死痙者股折瘛瘲齒噤齘也治瘟疫方四十七達原飲總治檳榔二錢厚朴知母白芍黃芩各一錢草果甘草各五錢白虎湯未表石膏知母甘草粳米大承氣湯入胃大黃芒硝枳實厚朴舉斑湯透斑當歸赤芍各一錢穿山甲二錢柴胡白芷各七分升麻五分瓜蒂散不吐山梔二錢赤小豆一錢二分瓜蒂一錢如無淡豉二錢代水煎分二服緩下清熱解肌湯發表葛根三錢黃芩赤芍各錢半甘草一錢三消飲餘邪人參白虎湯正微人參石膏知母甘草梗米大柴胡湯治裡香蘇散疏利香附三錢蘇葉二錢半陳皮一錢半蒼朮甘草各一錢薑三片蔥白二個柴胡清燥湯鬱陽當歸白芍生地陳皮花粉知母甘草柴胡燈心調胃承氣湯宿垢茵陳蒿湯胃熱茵陳二錢大黃五錢山梔一錢薑三片桃仁承氣湯瘀血桃仁十八粒大黃四錢芒硝二錢甘草桂枝各一錢犀角地黃湯下血後地黃一兩犀角白芍丹皮各錢黃龍湯元脫人參大黃芒硝厚朴枳實甘草當歸生脈散又人參五味子麥冬清燥養榮湯下後知母花粉當歸白芍生地陳皮燈心甘草柴胡養榮湯餘熱柴胡黃芩陳皮甘草生地當歸白芍厚朴大黃枳實薑瓜貝養榮湯痰飲瓜蔞貝母花粉當歸白芍知母蘇子橘紅薑小柴胡湯邪入血海柴胡黃芩人參半夏甘草薑檳榔順氣湯疫痢大黃厚朴枳實檳榔白芍生薑上清散感冒元參薄荷荊芥甘草歸尾熟軍桔梗陳皮黃芩枳殼川芎普濟消毒飲子大頭瘟酒黃連酒黃芩各五錢人參三錢陳皮桔梗元參柴胡甘草二各錢牛蒡子馬勃板藍根如無用青黛連翹各一錢升麻薑蠶各五分共為末取一半白湯調和時時呷之一半蜜丸彈子大每丸細嚼白湯送下或加防風薄荷川芎當歸共銼取末一兩水煎分二三次服之亦可腫甚宜砭刺出血泰和二年四月民多疫癘初覺憎寒或發熱或不熱身重次傳頭面腫甚目不能開上喘咽喉不利舌乾口燥俗云大頭天行染之多死東垣曰身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭面而為腫甚遂製一方名曰普濟消毒飲子服之皆愈人謂之仙方沈氏頭瘟湯又川芎一錢桔梗防風荊芥穗各一錢半柴胡七分黃芩歸尾各二錢此餘自製方也用以治大頭瘟初起一兩日者無不愈陽明邪盛者加葛根厚朴各錢半荊防敗毒散捻頭羌活獨活柴胡前胡人參桔梗枳殼茯苓川芎荊芥薄荷人中黃大力子各一錢防風一錢半緩服加金汁一匙尤妙生犀飲瓜瓤黃土五錢犀角二錢川連蒼朮各一錢金汁半杯沖岕片茶葉一大撮日三夜二服清熱解毒湯楊梅人參黃連黃芩白芍生地各三錢石膏羌活知母生薑各二錢甘草一錢半升麻葛根各一錢水一斗煎五升每服一升分日三夜二服人中黃丸又大黃三兩人中黃如無坑垢代之蒼朮麻油炒桔梗各二兩人參黃連防風各五錢香附薑汁拌不用炒一兩半神麯糊丸氣虛四君子湯下血虛四物湯下痰甚二陳湯下熱甚童便下通用清熱解毒湯下二三服人中黃散疙瘩辰砂雄黃各錢半人中黃一兩每末二錢薄荷桔梗湯下日三夜二服雙解散絞腸麻黃薄荷白芍當歸大黃防風芒硝連翹川芎各五錢黃芩桔梗石膏各一兩甘草二兩荊芥山梔白朮各五錢滑石三兩以上名防風通聖散滑石六兩甘草一兩以上天水散將通聖天水二散各一半和為粗末每周二兩水煎加薑三片蔥白二個熱服取汗即名雙解散九味羌活湯初感羌活防風各錢半蒼朮川芎黃芩白芷生地各錢二分細辛甘草各五分棗二蔥白二升麻葛根湯總治葛根二錢升麻白芍甘草各一錢薑二蔥白二葛根解肌湯春疫葛根三錢黃芩二錢赤芍錢半桂枝一錢甘草八分麻黃五分薑棗調中湯夏疫大黃一錢半黃芩白芍葛根桔梗赤苓藁本白朮甘草各一錢蒼朮白虎湯秋疫蒼朮石膏知母甘草梗米甘桔湯冬疫甘草桔梗大柴胡湯裡症托裡消毒散大頭瘟金銀花陳皮各三錢鹽黃芪花粉各二錢防風當歸川芎白芷桔梗厚朴角刺炒穿山甲炙各一錢蒼朮升麻湯瘴疫蒼朮一錢半半夏一錢厚朴陳皮枳實桔梗川芎升麻柴胡木通各七分黃連黃芩木香甘草各五分薑三加味柴胡湯又柴胡二錢黃芩人參半夏甘草枳殼大黃各一錢薑三棗二太無神朮散又蒼朮三錢陳皮厚朴各二錢石菖蒲藿香甘草各一錢薑三棗二一方無菖蒲有香附名神朮散氣散此專主山嵐瘴氣之妙方也屠蘇飲預防白朮兩八錢大黃桔梗川椒肉桂各兩半虎杖根兩二錢川烏六錢共銼盛絳囊十二月晦沉井中正月朔日早取藥入一瓶清酒中煎數沸東向飲之從少至老飲一杯其餘還沉井中取水飲之太倉公闢瘟丹又蒼朮八兩白朮烏藥黃連羌活各四兩川烏草烏細辛紫草防風獨活藁本白芷香附當歸荊芥肉桂甘松三奈白芍乾薑麻黃皂角甘草各二兩麝香三錢牛棗肉丸彈子大每取一丸燒之七物赤散又丹砂另研川烏炮各一兩花粉七錢半細辛羊躑躅炮薑白朮各五錢每末五分溫酒下取汗解再服一錢通氣散搐鼻元胡索錢半皂角川芎各一錢藜蘆五分躑躅花二分半用紙捻蘸藥搐於鼻中取嚏日三五次雄黃散塗鼻雄黃末水調以筆濃蘸塗鼻竅中雖與病人同床亦不相染初洗面後及臨臥點之太乙流金散佩燒羚羊角一兩雄黃礬石鬼箭羽各七錢半為粗末三角絳囊盛一兩帶心前並挂戶上又青布裹少部中庭燒之邪祟病源流邪祟內外因俱有病也其因於內者若癲邪鬱冒卒死等症皆緣自己元神不守恍恍惚惚造無為有如有見聞乃極虛之候非真為鬼邪所侮也其因於外者若十疰五尸中惡客忤鬼擊鬼打鬼排鬼魅鬼魘尸厥等症皆實有邪祟為患不問其人虛實強弱皆能犯之性命懸於呼吸不速救俱能殺人茲故條列之何謂癲邪凡人氣血衰耗元精不固或挾痰火瞀亂心神遂至視聽言動悉乖常度似癲非癲似醉非醉歌泣吟笑不一其態妄言妄見多生恐怖斯真元虛之極矣宜歸神丹加減鎮心丹何謂鬱冒凡人汗出太甚或血少氣並於血陽獨上而不下氣壅滯而不行雖平時無疾身忽如死不能引動目閉口呆不知人事即微知人亦惡聞聲響若有鬼神捕之須臾氣過血還即便蘇寤若眩冒然者婦人多有此症宜白微湯倉公散何謂卒死即靈樞三虛三實之説是也三虛者乘年之衰逢月之空失時之和因為惡風所傷逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之而三虛相搏者必見有五色非常之鬼遂致暴病卒亡亦皆由元神不完之故故其卒死之時口張目開手撒遺尿皆虛象也治必補氣間亦有壯實人而卒死者必目閉口噤手拳此為有異治又當散表不得用補藥宜備急丸清心丸至寶丹以上皆內因病何謂十疰五尸氣疰勞疰鬼疰冷疰食疰尸疰水疰土疰生人疰死人疰此謂十疰飛尸遁尸沉尸風尸注尸此謂五尸十疰五尸為病相似或因人死三年之外魂神化作風塵著人成病或逢年月之厄感魑魅之精因而癘氣流行身體令人寒熱交作昏昏默默不能的知所苦積久委頓漸成癆瘵肌肉盡削以至於死死後復傳疰他人慘至滅門可勝痛矣宜十疰丸桃奴丸八毒赤散太乙神精丹何謂中惡凡人偶入荒墳古廟郊野冷廁及人迹罕到之處忽見鬼物口鼻吸著鬼氣卒然昏倒不省人事四肢厥冷兩手握拳口鼻出清血白沫狂言驚忤與尸厥略同但腹不鳴心腹俱暖為異耳慎勿輕動其尸速令衆人圍繞打鼓燒火燒麝香安息香俟蘇方可移歸服藥治之宜桃奴丸太乙神精丹何謂客忤即中惡之類多於道路得之亦由感觸邪惡之氣故即時昏暈心腹絞痛脹滿氣衝心胸不速治亦能殺人當急取鹽如雞子大部青布裹燒赤納酒中頓服當吐出惡物然後服藥宜備急丸太乙神精丹何謂鬼擊鬼打鬼排卒著鬼氣如刀刃刺擊或如杖打之狀胸腹間痛不可按排擊處亦痛甚則吐衄下血此等病皆來之無漸卒然而死者也宜朱犀散太乙神精丹何謂鬼魅或為邪祟附著於體沉沉默默妄言譫語乍寒乍熱心腹滿手足冷氣短不能食飲宜八毒赤散蘇合香元或為山林窮谷妖狐迷亂精神減少日漸螺瘦能言未然禍福毫發皆驗人有念起即知其故宜辟邪丹蘇合香元或婦女與鬼邪相交每與交時神思昏迷口多妄語醒則依然如故面色嬌紅日久腹中作痞如抱甕然各曰鬼胎須服藥下之宜先服紫金錠再服回春辟邪丹何謂鬼魘人睡則魂魄外遊或為鬼邪魘屈其精神弱者往往久不得寤至於氣絶此症於客舍冷房中得之為多但聞其人夢中吃吃作聲便叫喚如不醒乃鬼魘也不得近前急喚但痛咬其足跟及大拇指甲邊並多唾其面若本有燈不可滅若本無燈不可用燈照如再不蘇移動處些子徐喚之以筆管吹兩耳以半夏皂角末吹鼻中蘇後服藥治之宜雄朱散其有鬼魘及卒鬼擊血漏腹中煩滿欲死者雄黃末吹鼻中又酒調一錢服之日三能化血為水又有夢中被鬼刺殺排擊忽吐衄下血甚而九竅皆血者急須治之宜獨活散何謂尸厥凡人卒中邪惡與臟氣相逆忤忽手足厥冷頭面青黑牙關緊閉腹中氣走如雷鳴聽其耳中如微語聲者即是尸厥言如死尸只脈動心胸暖氣不絶耳急以菖蒲汁灌之再服藥宜還魂湯朱犀散以上皆外因病然邪必乘虛而入茍元精充足陽氣壯盛亦未見邪祟之能為禍也故凡遇此等症者審知其虛必以補元為主審知其邪必以通神明去鬼惡為主其有挾寒挾火挾食挾痰者又當兼治之而自無弗愈矣脈法內經曰厥逆連臟則死連經則生注云連臟者神去故也千金曰脈來遲伏或如雀啄乃邪脈也若脈來弱綿綿遲伏或綿綿不知度數而顏色不變此邪病也脈來乍大乍小乍短乍長為禍祟脈也兩手脈浮浮細微綿綿不可知但有陰脈亦細綿綿此為陰蹻陽蹻之脈此亡人為祟也脈來洪大而弱者此社祟也脈來沉沉澀澀四肢重者土祟也脈來如飄風從陰趨陽者風邪也一來調一來速者鬼邪也脈經曰尸厥呼之不應脈絶者死反小者死又曰卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微者亦生得效曰欲知祟害心脈虛散肝脈洪盛或浮沉長短大小無定或錯雜不倫綱目曰疰脈浮大可治細數難治精義曰若脈沉沉澤澤四肢不仁者亡祟也或大而弱者社祟也脈來乍大乍小乍短乍長者則鬼祟也回春曰有人得病之初便譫語發狂六部無脈然切大指之下寸口之上卻有動脈此謂之鬼脈乃邪祟為之也邪祟症治內經曰邪客於手足少陰心腎太陰肺脾足陽明胃之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸名曰尸厥以竹管吹兩耳即蘇綱目曰凡尸厥鬱冒卒中卒死之類皆當發表仲景云鬱冒欲解必大汗出是也本事曰鬱冒由血少氣並者亦名血厥遺篇曰凡暴亡不出一時可救之雖氣閉肢冷若心腹溫鼻微溫目中神彩不轉口中無涎舌與陰卵不縮者皆可治立齋曰鬼胎症因七情相乾脾胃虧損氣血虛弱行失常道衝任乖違而致之者乃元氣不足病氣有餘也若見經候不調就行調補庶免此症治法以補元氣為主而佐以雄黃丸之類行散之濟陰綱目曰一婦人經閉八月肚腹漸大面色或青或黃用胎症之藥不效餘診視之曰面青脈澀寒熱往來肝經血病也面黃腹大少食體倦脾經血病也此鬱怒傷脾肝之病非胎也不信仍用治胎散之類不驗餘用加味歸脾逍遙二藥各二十餘劑諸症稍愈彼欲速效遂服通經丸一服下血昏潰自汗惡寒手足逆冷嘔吐不食餘用人參炮薑二劑漸愈卻邪導引法保生祕要曰用一指認真點尻尾穴而行泄法後二指由胸至脅分之運央保生祕要曰守黃庭或關元注念太乙救苦默咒以正其心邪自不見治邪祟方二十二歸神丹癲邪朱砂二兩入豬心內燈草縛定酒蒸二炊久另研人參棗仁茯神當歸各二兩琥珀另研遠志薑汁製龍齒各一兩金箔銀箔各二十片酒糊丸每服九丸至二九丸麥冬湯下此方兼治癲癇乳香人參湯下又治多夢不睡棗仁湯下加減鎮心丹又蜜黃芪天冬酒當歸熟地各一兩半麥冬生地山藥茯神各一兩五味子薑遠志人參各五錢蜜丸另將朱砂一錢為衣酒或米飲下五七十丸白微湯鬱冒白微當歸各一兩人參五錢甘草二錢半每粗末五錢水煎溫服倉公散又藜蘆瓜蒂雄黃白礬等分為末取少部吹入鼻中備急丸卒死大黃巴霜乾薑各二兩蜜和杵千下為丸卒死者熱酒化下三丸口噤者灌之溫水亦可能下咽即治此方乃急劑也張易老名為獨行丸牛黃清心丸又山藥七錢甘草五錢人參神麯炒蒲黃各二錢半犀角二錢肉桂大豆黃卷炒焦阿膠各錢七分半白芍朱砂飛麥冬當歸黃芩防風白朮各錢半柴胡桔梗杏仁茯苓川芎各錢二分半牛黃錢二分羚羊角麝香冰片各一錢雄黃八分白斂炮薑各七分半金箔百二十方留四十方為衣蒸棗肉研加煉蜜為丸每丸重一錢每服一丸溫水送下至寶丹卒死犀角朱砂雄黃琥珀玳瑁各一兩牛黃五錢冰片麝香各錢半金箔五十片以半為衣銀箔三十片安息香酒濾去渣土一兩熬膏為丸每重一錢每服一丸參湯下日二三服少加蜜丸亦可十疰丸尸疰雄黃巴霜各一兩人參麥冬細辛桔梗附子皂莢川椒甘草各五錢蜜丸每五丸溫水下此方並能治一切鬼氣桃奴丸中惡桃奴七個另研玳瑁鎊細末一兩安息香去渣一兩上三味同入銀石器熬成膏朱砂犀角各五錢琥珀雄黃各三錢麝香冰片牛黃各二錢桃仁十四個麩炒安息膏和丸芡實大陰乾密器封固安置靜室中每一丸人參湯下八毒赤散鬼附雄黃朱砂礬石丹皮附子藜蘆巴霜各一兩蜈蚣一條蜜丸小豆大冷水吞下十丸此方能治人一切染著鬼病太乙神精丹客忤丹砂曾青雄黃雌黃磁石各四兩金牙二兩半將丹砂二黃醋浸曾青酒浸紙封曬百日各研極細醋拌乾濕得宜納土釜中六一泥固濟安鐵腳環上高搘起以漸放火其火勿靠釜底一周時候冷出之其藥精飛化凝著釜上五色者上三色者次一色者下但如雪光潔者最佳若飛不盡再著火如前以雞翎掃取棗肉和丸黍米大平旦空心服一丸漸加一丸以知為度服此者五日內必吐利過則自安初服如黍米漸一丸至小豆大而止不得更大若服藥悶亂木防己湯飲之即安若欲解殺藥吃爛煮肥豬肉作土釜法取瓦盆二個可受二斗部者以甘土塗其內令極乾作六一泥法赤石脂牡蠣滑石黃礬蚯蚓泥各二兩以好醋和甘土裹石脂等四種火煅一伏時取出與蚯蚓屎同為末醋和如稠粥用之凡合此藥以四時旺相日天氣明齋戒沐浴合之治一切鬼氣病無不應驗久瘧變腫垂死者服一丸即吐差亦治瘧母癥瘕積聚服一丸漿飲送下諸卒死心下微溫者抉開口以漿飲調一刀圭與服以絳囊盛九刀圭係臂上以辟瘴疫時邪最妙朱犀散鬼擊犀角五錢朱砂麝香各二錢半每末二錢新汲水調灌蘇合香元鬼魅木香沉香麝香丁香檀香安息香熬膏白朮犀角香附蓽撥朱砂半為衣各二兩乳香冰片蘇合油入安息膏內各一兩安息膏丸每兩分作四十丸每取二三丸水酒任下辟邪丹又赤茯神人參鬼箭羽菖蒲遠志肉白朮蒼朮當歸各一兩桃奴五錢朱砂雄黃各三錢牛黃麝香各用一錢酒糊丸金箔為衣每丸如龍眼大臨臥木香湯下凡服此藥者諸邪鬼惡自然不敢近若更以絳囊盛五七丸懸身上並床帳中更妙紫金錠鬼胎五倍子去蟲土三兩山茨菰去皮焙二兩大戟洗焙兩半千金子去皮油一兩麝香三錢糯米粥杵千下丸每一料分作四十錠每服半錠病重者一錠薄荷湯下一名太乙紫金丹回春辟邪丹又虎頭骨二兩朱砂雄黃鬼臼蕪荑藜蘆鬼箭羽雌黃各一兩蜜丸彈子大囊盛一丸係臂上又於病者戶內燒之一切邪鬼不敢近此方兼治瘟疫並治男婦與鬼交者雄朱散鬼魘牛黃雄黃各一錢朱砂五分每末一錢於床下燒之再以一錢酒調灌下獨活散又獨活升麻川斷地黃各五錢桂皮一錢每末二錢白湯調下日二服還魂湯尸厥麻黃三錢杏仁二十五個去皮尖肉桂甘草各一錢水煎口噤者抉開口灌之藥下即醒一名追魂湯兼治中惡客忤鬼擊飛尸奄忽口噤氣絶雄黃丸鬼胎雄黃鬼臼莽草丹砂巴霜獺肝各五錢蜥蜴一枚炙蜈蚣一條炙蜜丸梧子大每服二丸空心溫酒下日二服即當利如不利加至三丸初下清水次下蟲如馬尾狀無數病極者下蛇蟲或如蝦蟆卵雞子或如白膏或如豆汁其病即除此方專治鬼胎腹痛又方名班元丸專治惑於妖魅狀如癥瘕並治一切氣血痛亦效班貓去頭足翅炒元胡索炒各三錢糊丸酒下或為末溫酒調下五分以胎下為度加味歸脾丸又加味逍遙散又
