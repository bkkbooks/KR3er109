body:
  text: 卷二十五身形門身形病源流人之生也得天地之氣化以成形是故頭圓象天足方象地四肢象四時五臟六腑象五行六極八節九竅象八風九星十二經二十四哄象十二時二十四氣三百六十五骨節象三百六十五度推之眼目象日月寤寐象晝夜喜怒象雷電涕泣象雨露寒熱象陰陽血脈象水泉毛發象草木齒骨象金石凡人所以備具於一身著莫不與天地假合以成形故前人屢中其旨而人自不之察故渺視其身而不能與天地為昭也惟其然故天有陰陽寒暑之愆人因有百疾之作亦於是而相應而百疾之作由於氣血之失常其明者能法陰陽和術數節飲食慎起居謹作勞保精存液以充其形故能形與神俱而百疾不作否則一失其常而或傷乎氣或傷乎血氣傷則餒血傷則槁種種病根悉因乎此又況風寒暑濕之感於外者在可禦不可禦之間飢飽勞役之傷於內者在或知或不知之際其來無端其始無迹又豈可以智計定哉然而疾之未作思有以預防之疾之既作必有以調治之是故醫者可以通神明而扶造化欲通神明而扶造化則必先於身形大概以知其故而審其原靈樞曰人生十歲五臟始定血氣始通真氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大盛肌肉堅固血脈充滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落鬢發斑白氣血平盛而不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減故目視不明六十歲心氣始衰善憂悲血氣解墮故好臥七十歲脾氣虛故皮膚活八十歲肺氣衰魂離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣乃去形骸徒具而已素問又曰人生四十陰氣自半起居衰矣年五十體重耳目不聽明矣年六十陰痿氣大衰九竅不和下虛上實涕泣俱出矣此人身氣血盛衰之原也臞仙曰精者身之本氣者神之主形者神之宅故神太用則歇精太用則竭氣太勞則絶是以人之生者神也形之托者氣也若氣衰則形耗欲長生者未之聞也類纂曰谷氣勝元氣其人肥而不壽元氣勝谷氣其人瘦而壽悟真篇注曰一身之中以精氣神為主神生於氣氣生於精修真之士不過煉治精氣神三物而已此人身形存滅之故也夫茍洞徹乎盛衰之原以無戾乎生滅之故則即身形之內亦何至有疾病之乘偶或乘之亦何不可以治之哉養生療病要法太乙真人七禁文曰一者少言語養內氣二者戒色欲養精神三者薄滋味養血氣四者咽津液養臟氣五者莫嗔怒養肝氣六者美飲食養胃氣七者少思慮養心氣人由氣生氣由神旺養氣全神可得真道凡在萬形之中所保者莫先於元氣又曰欲治其疾先治其心必正其心乃資其道使病者盡去心中疑慮思想一切妄念一切不平一切人我悔悟平生所為過惡便當放下身心以我之天而合於所事之天久之遂凝於神則自然心君泰寧性地和平知世間萬事皆空虛終日營為皆是妄想知我身皆是虛幻禍福皆是無有生死皆是一夢慨然領悟頓然解釋則心地自然清淨疾病自然安痊能如是則藥未到口病已忘矣此真人以道治心療病之大法也調養身形方二三精丸蒼朮天之精地骨皮地之精各淨末一升黑桑椹人之精二十升揉爛袋盛取汁將二藥末入汁中調勻入罐內密封口置棚上晝受日精夜受月精待自然煎乾為末蜜丸每十丸酒湯任下此方久服輕身延年面如童子延年益壽不老丹何首烏赤白各四兩米泔浸竹刀刮去皮切片黑豆煎汁浸透陰乾卻用甘草汁拌曬乾搗末不部蒸煮地骨皮酒洗曬乾白茯苓酒洗曬乾各五兩生地酒浸一宿曬乾熟地酒洗曬乾天冬酒浸三時曬乾麥冬酒浸三時曬乾人參各三兩蜜丸酒下三五十丸此方千益百補久服央難盡言筋骨皮肉毛發病源流筋也者所以束節絡骨絆肉弸皮為一身之關紐利全體之運動者也其主則屬於肝故曰筋者肝之合按人身之筋到處皆有縱橫無算而又有為諸筋之主者曰宗筋內經注謂陰毛橫骨上下之堅筋上絡胸腹下貫髖尻又經於背腹上頭項者是也筋之總聚處則在於膝靈樞云諸筋者皆屬於節節即膝也所以屈伸行動皆筋為之然則筋之有關於人身豈淺鮮哉試詳言筋病曰筋急曰筋緩曰筋攣曰筋痿曰筋惕曰筋傷曰筋結曰轉筋曰筋絶其名目如此靈樞皆以寒熱分急緩之由謂寒則反折而急熱則弛縱而緩得效又以筋急為寒急者堅強筋縮為熱縮者短促弛緩為濕緩者寬長又言但熱不會受寒亦使人筋緩是其意實以縮即為拘攣之義而但熱之緩不過舒長受濕之緩乃竟舒長無力分析尤為細密若仲景言血虛則筋急此又筋急之原由血脈不榮於筋之故也丹溪以四物湯治筋急本事方以養血地黃湯治筋急說本乎此然觀於筋急之原血虛即可知筋緩之原血熱無足疑者筋急宜酒煮木瓜粥筋緩宜五加皮散若夫熱勝風搏並於經絡風火相乘是以瞀瘈此即筋攣之由也故筋攣亦曰筋瘈瘈者瘈瘲即俗云搐是也其症亦往往作痛宜祛風滌熱湯經曰肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿則是筋痿實生於肝熱也膽附肝惟肝熱故膽泄筋膜乾而成痿者血液槁也宜紫葳湯傷寒發汗過多則傷其血血虛無以榮筋因拘急而惕惕然跳且四體百骸亦瞤瞤然動是筋惕肉瞤由於筋肉失養陶節庵謂宜用四物湯去地黃加人參茯苓半夏甘草作劑佐以五靈脂入生薑烏梅煎服自有神效以藥專主生血生血乃所以收汗宜真武湯此仲景法久行傷筋者筋主運動久行則太勞而致傷也宜養肝丸肝之經脈不調氣血失節往往有筋結之患不論骸體間纍纍然若胡桃塊狀是也宜以木杓打之三下自散丹溪以轉筋屬血熱恐但血熱猶不至患轉筋必先血熱於內而又感風寒之戰其症並有始轉於足大指轉上至大腿且近腰者宜四物湯加酒芩紅花南星蒼朮霍亂後轉筋緣胃大腸皆以榮宗筋暴吐暴瀉則胃大腸之津液驟亡宗筋失養故輕則兩腳轉筋重則至於遍體且入腹手足逆冷危在頃刻也宜木瓜湯理中湯加石膏靈樞曰筋絶九日死何以知之手足爪甲青呼罵不休手足爪甲色青者肝色也則知筋絶肝亦絶矣審是而筋之為病其可忽哉舒筋法得效曰此法治破傷後筋攣縮不能伸他病筋縮亦可大竹管長尺餘兩頭鑽一竅係以繩掛於腰間每坐舉足搓袞之勿計工程久當有效一人墜馬折脛腳筋攣縮不能行步遇道人傳以此法數日便愈如常骨也者所以為一身之撐架猶屋之有梁柱然也屋非梁柱不能豎人非有骨不能立也經言腎主骨又言骨者髓之府是惟腎氣足故髓充滿髓充滿故骨堅強也骨有本顴骨也凡人一身骨格有大有小骨大者顴必大骨小者顴必小驗之人人而靈樞之言益足信也凡人一身之骨最大者脊骨也經言膂骨以下至尾骶二十一顴長三尺脊節謂之顴脊窮謂之骶是不但為骨之最大且居中麗正一身之骨胥於是附猶屋之正梁且為一身之骨之主也而其為病約有四端一曰寒內經言人有身寒湯火不能熱厚衣不能溫然不凍栗者以是人素腎氣勝以水為事太陽氣衰腎脂活不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名骨痹是人當攣節也據經之言骨寒之病甚深非但浮淺惡寒之謂也宜溫腎散加附子肉桂虎骨一曰熱其熱從骨間蒸發按之雖不甚烙手然覺有鬱蒸不可耐狀有非飲湯引水所能解其板齒必乾燥以齒者骨之餘板齒尤諸齒之門戶骨熱故板齒乾燥即經言髓涸齒乾乃為骨熱病者是也宜滋陰降火湯加鱉甲地骨皮其或因骨熱至四肢緩弱不舉駸駸成骨痿之症矣一曰痿內經言腎氣熱則腰脊不舉骨活而髓減發為骨痿有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨活而髓虛故足不任身發為骨痿也據經之言骨痿之病由於骨熱非但尋常疲弱之謂也宜虎潜丸一曰痛人身之痛或由風淫濕滯或由血刺痰攻淺不過肌肉皮毛深亦止經格臟腑若入裡徹骨作酸作疼雖因寒因熱有不同要其損傷勞極為至甚而無加矣宜虎骨散二妙散他如久立傷骨骨傷之病或亦有痛者或漸至成痿者當受傷之初不可不急救也宜補骨脂牛骨髓鹿茸骨碎補逮至骨絶齒必黃落雖有藥餌不可救矣經故斷之為十日死骨病症治難經曰少陰者冬脈也伏行而濡骨髓者也直指曰骨為髓之藏髓者飲食五味之實秀也髓虛則骨虛勢所必至也又曰骨熱病當與骨蒸門參看資生曰扁鵲云病在腠理湯尉之所及也在血脈針石之所及也在腸胃酒醴之所及也其在骨髓雖司命無奈之何矣夫病在骨髓扁鵲以為難則骨髓有病病亦惙矣皮也者所以包涵肌肉防衛筋骨者也皮之外又有薄皮曰膚俗謂之活皮經言皮膚亦曰腠理津液滲泄之所曰腠文理縫會之中曰理腠理亦曰玄府玄府者汗孔也汗液色玄從空而出以汗聚於裡故渭之玄府府聚也皮之所主為肺故凡風寒之邪襲人肺先受之以其先入皮毛也邪著皮毛腠理開泄然後入於絡脈侵及於經發而為病其理然也皮之為病若㿀痧另詳本條若癮疹另詳本條若痤痱另詳本條若麻木另詳本條若靨痣另詳本條皆皮之病前既詳言茲可勿贅其所常有者無過痛癢兩端故經曰癢痛生於皮毛又曰諸癢為虛血不榮肌又曰諸痛皆屬於火也血虛之癢如蟲行皮中宜大料四物湯兼用澡洗藥反虛之癢淫淫不已宜四物湯加黃芩煎水調浮萍末服之風邪之癢癢甚難忍宜菊花散去石膏加薄荷酒後之癢癢如風瘡常搔至血出宜蟬脫散心實之痛深至肉間宜導赤散加減火灼之痛如欲炙手宜加減涼膈散風熱之痛癢痛相間宜上清散肺經火鬱之痛不可撫按宜瀉肺湯癢痛之因內外各異如此然為癢為痛又有因於火之微甚者河間云人近火微熱則癢熱甚則痛附近則灼而為瘡皆火之用或云痛為實癢為虛非謂虛為寒正謂熱之微甚此河間之論又於癢痛所因之外就火之一端以析癢痛者也若乃丹毒者亦皮之病人身忽然變赤如丹塗名赤瘤或因瘡而得琚赤者名瘡瘤皆游走無定狀如云氣總緣惡毒熱血蘊結命門遇君相二火合起致發此症其輕者亦緣風熱所致總治宜四順清涼飲外塗撥毒散又有皮膚忽起赤暈或發熱作癢或搔破出水名赤游風亦謂之丹毒然其症狀畢竟與丹毒稍異宜臨症分辨而游風之因起於脾肺氣虛腠理不蜜風熱相搏宜荊防敗毒散或專由風熱宜小柴胡湯加防風連翹或專由血熱所致宜四物湯加柴胡山梔丹皮治之但宜涼血消風清肝養血則火自息癢自止切不可單用祛風之藥反燥肝血使元氣虛而別生他症若素有病面上忽見紅點多死茲試舉毒游風之屬條列言之有赤瘤丹毒者宜無名異末蔥汁調塗立消有赤黑丹疥或癢或燥不急治遍身即死者宜白瓷研末豬脂調塗有五色丹毒俗名游腫犯之多死者宜榆白皮末雞子清調塗有火丹赤腫遍身著宜磨大黃汁頻塗有火焰丹毒從頭起者宜生蔥汁塗有火丹發足脛以上者宜鏡面草打汁服並敷有火霞丹毒從兩腳起如火燒者宜五加皮根葉燒灰煅鐵槽中水和塗有不拘何處火丹發而疼腫難忍者宜鱔頭血塗有煙火丹發從背起或兩脅及兩足其赤如火者宜景天草珍珠各一兩和搗如泥塗之有螢火丹從頭起亦名熱毒丹瘡者宜慎火草搗和苦酒塗有幼小火丹者宜黃芩末水調塗有一切熱毒丹腫腮痛者宜赤小豆末雞子白和塗有丹從臍起者宜檳榔末醋調塗有身面卒得赤斑或瘭子腫起不治即死者宜羊角燒灰雞子白和塗有身面丹腫如蛇纏狀者宜馬蘭草和醋搗塗有赤游丹發腫痛者宜瓜蔞末醋調敷雖然丹毒之發又有辨焉其痛者為丹毒其癢者為風丹有一切風丹發癢不止者宜炙穿山甲末一兩生甘草末三錢米飲調塗有冷風丹者宜白薑蠶散有遍身風癢如癮疹者宜凌霄花末酒下一錢立效有皮膚風熱遍身生如粟米者宜牛蒡子浮萍等分薄荷汁調酒下二錢日二次有遍身本發癮疹後變成瘡又癢又痛者宜薑蠶焙末二錢立愈有血風丹腫起疙瘩者宜浮萍汁和豆淋酒下有因酒而得風丹遍身癢者宜浮萍散且夫丹毒之發更有辨焉其色赤者為丹其色白者為瘼如前言冷風丹其色亦白即瘼之類也治瘼之法前人以酒調土朱服之得愈說瘼為脾病土能入脾朱能除白也白瘼宜消風散至若小兒血熱肌虛風邪相湊易發丹毒得之百日內者尤為危急宜消風散黑神散二方兼服外以金花散塗總之丹毒游風之發不問大人小兒或發手足或發腹上總以自腹生出四肢者為順而易治自四肢生入腹者為逆而難治不可不治也夫丹毒之發甚暴治丹毒之方甚多古人有十二種單方治一切丹毒但得於十二味中水苔生地生松毛蒴藿葉慎火草浮萍硝石豆葉以上皆搗爛敷豆豉大黃黃芩山梔以上皆為末水和敷用一二味即能取效良為簡便又不可不知也然而皮之為病且不特此也如人身體皮肉變色赤者為紫癜風白者為白癜風紫由風與血搏血不調和所生宜紫癜風方白由風與氣搏氣不調和所生宜追風丸三黃散總治紫白癜宜加減何首烏散又如面及頸項身體皮肉色變與肉色不同不痛不癢由肺風流注皮膚之間久之不去遂致浸淫遍體為白駁宜白駁方又如頸項胸前腋下自生斑點相連色微白而圓或紫不痛不癢由風邪積熱居於肺腑久之不散流溢皮膚為癧瘍風宜烏蛇散又如心常驚恐言語無定眼前見物如垂絲皮肉中或如桃李癮疹色赤黑手足頑麻刺之不痛身體生瘡痛癢如蟲行由惡風相觸及犯忌害初即覺皮毛變黑為烏癩又名黑癩宜大黑神膏又如語聲嘶嗄目視不明四肢頑痛身體發熱手足緩縱背膂拘急皮肉之內似生癮疹其色正白亦由風邪毒氣積久為白癩宜白花蛇散苦參酒又如肺氣不榮津液活涸皮聚毛落爪活甲錯肌膚乾澀而不滑潤為索澤宜八珍湯凡若此者皆皮之病凡屬司命所當一一詳審者也脈法仲景曰脈浮而大浮為風虛大為氣強風氣相搏以成癮疹身體為癢癢者名泄風久久為痂癩正傳曰脈浮而緩屬濕為麻痹脈緊而浮屬寒為痛痹脈澀而芤屬死血為木不知痛癢滑伯仁曰脈者血之波瀾發斑者血散於皮膚故脈伏也皮病症治河間曰癢得爬而解者爬為火化微則亦能癢甚則癢去者謂令皮膚辛辣而屬金化辛能散火故金化見則火化解矣入門曰丹毒入裡腹脹則死毒氣所走之處急以細針刺出惡血即消又曰溝渠中小蝦搗敷妙或伏龍肝雞子白調塗或鯉魚血鱔魚血芭蕉根汁藍葉汁水中苔塗之皆可肉也者所以主一身之肥瘦而驗氣血之盛衰者也內經曰肥而澤者氣血有餘肥而不澤者氣有餘血不足瘦而無澤者氣血俱不足此經但言其概也其實人之肥者血則實而氣必虛故行動多喘促氣虛也能耐寒而不能耐熱熱傷氣損其不足之氣則陽愈弱而偏於陰故不能耐熱也人之瘦者氣則實而血必虛故皮膚多燥澀血虛也能耐熱而不能耐寒寒傷血損其不足之血則陰愈虧而偏於陽故不能耐寒也此肥瘦之所以分也肉之為病最重者曰食㑊飲食多而易飢不生肌肉如死人也由胃中結熱消谷之故宜參苓元其次曰肉苛苛者𢂽重也由榮氣虛衛氣實之故宜前胡散其次曰肉痿胃乾而渴肌肉不仁無力以運由脾經傷熱之故宜清燥湯其次曰肉脫形肉瘦削而脫盡不能行動說脫者空也謂肉消而皮與骨著中空無有也此亦死症由真元內竭谷氣外衰之故宜谷靈丸至如瘡瘍雖愈有肉凸出小如豆大如李長至數寸名曰贅肉亦曰藟肉宜烏梅肉搗作餅貼肉上即消去又如手足忽生如豆甚至三個五個相連而生由風邪搏於肌肉所致名曰疣目宜烏雞膽汁日三塗之或杏仁燒研塗之又如肌肉間忽生紅粒撫之則痛如錐刺血虛襲風所致名曰肉刺可不必治以上皆肉病所及也若夫耳聾舌短背腫尿血大便赤泄則為肉絶之候矣經故斷之為六日死也肉病症治內經曰䐃為肉標䐃膝後肉如塊者資生曰贏瘦固瘵疾若素來清臞者非有疾也惟病後瘦甚久不復常謂之形脫與夫平昔充肥忽爾贏瘦飲食減少此為五勞六極之疾宜服滋補藥毛發也者所以為一身之儀表而可驗盛衰於衝任二脈者也夫毛發為血之餘似已然衝為血海任為陰脈之海二脈皆起胞中上循腹裡其浮而外者循腹右上行會於咽候列而絡唇口血氣盛則充膚熱肉血獨盛則滲皮膚生毫毛然則毛發之生皆由二脈之盛也明矣內經獨以屬腎者腎主精精即血也毛者統詞一身之毛及眉須髭髯前後二陰之毛皆是發者專指但即生於頭者言也須發之有無榮悴前人論之甚詳故不贅其有左右發際瘡起如粟米頭白肉赤痛如錐刺者為發際瘍皆因風熱上攻之故雖膿出無傷也宜防風通聖散然婦人多患之男子則少鬢疽者亦名鬢發生鬃發中初如蟲咬癮疹腫痛難見或由肝膽二經怒火或由三焦相火或由風熱血虛皆能生此症但由三焦相火者尤忌出膿以是經血少氣多也甚則發熱作渴宜柴胡清肝湯腫高痛極宜仙方活命飲逮大勢已定餘毒未除以參芪歸朮為主佐以川芎白芷金銀花速成其膿膿成仍以參芪等托而潰之至生肌收斂則全用補益脾虛加四君子湯血虛宜四物湯加參芪氣虛宜補中益氣湯小兒癩頭白禿瘡亦生發中宜松脂膏其一種狀如葡萄久而不膿者名鬈毛瘡宜苦楝根灰豬油調搽然若中陷四邊高色如黃蠟者乃是廣瘡不可作鬈毛瘡治也毛發原由症治醫說曰發屬心故上生稟火氣也眉屬肝故橫生稟木氣也須屬腎故下生稟水氣也入門曰膽榮於須腎華於發精氣上升則須潤而黑六八以後精華不能上升秋冬令行金削水活以致須發焦槁如灰白色養生者宜預服補精血藥以防之如張天師草還丹四物坎離丸五老還童丹之類染掠亦非上策治筋病方十酒煮木瓜粥筋急大木瓜酒水煮爛研作膏勢裹痛處冷即易一宿三五度便差五加皮散筋緩五加皮油松節木瓜每末二三錢酒下祛風滌熱湯筋瘈薄荷甘菊牛蒡子防風荊芥穗連翹竹葉紫葳湯筋痿紫葳天冬百合杜仲黃芩黃連萆薢牛膝防風蒺藜菟絲子四物湯筋惕川芎當歸白芍生地養血地黃湯筋急熟地生地白荷當歸阿膠麥冬白朮真武湯筋惕附子生薑白芍白朮茯苓養肝丸筋傷川芎當歸白芍熟地防風羌活蜜丸木瓜湯轉筋木瓜四錢吳萸二錢茴香一錢秋草四分紫蘇十葉薑三片鹽一撮烏梅一個理中湯又人參白朮甘草乾薑治骨病方五溫腎散骨寒熟地錢半牛膝肉蓯蓉巴戟麥冬五味子炙草各八分茯神炒杜仲乾薑各五分水煎服或為末酒下二錢亦可滋陰降火湯骨熱白芍錢三分當歸錢二分熟地白朮天冬麥冬各一錢生地八分陳皮七分蜜知母蜜黃柏炙草各五分薑三棗二虎潜丸骨痿龜板黃柏各四兩知母熟地各二兩牛膝三兩半陳皮七錢白芍一兩半乾薑五錢鎖陽虎骨當歸各一兩酒糊丸加附子尤妙虎骨散骨痛虎骨二兩白花蛇肉天麻白薑蠶牛膝防風酒當歸乳香肉桂各一兩全蠍炙草各五錢麝香一錢每末二錢酒下一方有自然銅白附子檳榔羌活白芷川芎各一兩地龍沒藥雄黃各五錢治白虎歷節風走痛如神二妙散又製蒼朮酒黃柏等分薑湯下一錢治皮病方二十六四物湯皮癢川芎當歸白芍地黃菊花散又甘菊防風枳殼羌活旋覆花石膏甘草蔓荊子蟬脫散又蟬脫薄荷等分每末二錢酒水調下上清散皮痛元參薄荷荊芥甘草歸尾桔梗陳皮黃芩川芎枳殼或加製大黃亦可導赤散又加減涼膈散又連翹二錢甘草錢半山梔黃芩薄荷桔梗竹葉各五分瀉肺湯又地骨皮桑皮各二錢知母貝母山梔桔梗麥冬生地甘草各一錢四順清涼飲丹毒蒸大黃當歸赤芍炙草各錢二分薄荷十葉撥毒散又寒水石二兩三錢石膏一兩黃柏甘草各二錢水調塗之芭蕉汁尤妙荊防敗毒散又荊芥防風羌活獨活柴胡前胡人參赤芍桔梗枳殼川芎甘草小柴胡湯又柴胡黃芩人參半夏甘草白薑蠶散又薑蠶蟬退防風甘草蒼耳子白芷川芎茯苓荊芥厚朴陳皮人參等分每末二錢豆淋酒下浮萍散又浮萍五錢防風黃芪羌活各三錢當歸二錢乾葛一錢麻黃五分生草四分量疾重輕分二三服水煎消風散白瘼黑神散小兒金花散又鬱金黃芩山梔甘草大黃黃連糯米等分為末蜜水調敷紫癜風方紫癜官粉五錢硫黃二錢為末雞子白調搽追風丸白癜首烏苦參蒼朮荊芥穗各四兩共為末用皂角二斤去皮弦子水煎膏和丸空心酒茶任下三五十丸三黃散又雄黃硫黃各五錢黃丹天南星活礬密陀僧各三錢先以薑汁擦患處再以薑片蘸藥擦後漸黑次日再擦黑散則無矣加減何首烏散紫白癜首烏石菖蒲蔓荊子苦參荊芥穗威靈仙甘菊杞子等分每末三錢蜜茶調下此方兼治癧瘍風白駁一切疥癬白駁方白駁硫黃草決明生半夏槲皮各一兩蛇脫一條二味燒研共為末清漆和調薄塗患處先用巴豆一粒中截擦白處再用藥烏蛇散癧瘍風烏蛇三兩犀角一兩防風羌活黃芩苦參各二兩人參丹參元參沙參肉桂秦艽川芎山梔升麻通草枳殼白蒺藜白鮮皮各一兩每末二錢酒下大黑神膏烏癩川烏川芎升麻防己黃柏藜蘆黃連明礬雄黃雌黃胡粉各五錢巴豆杏仁各十四粒松脂亂發各如雞子大一塊上銼如豆用豬油二升同煎以發煬為度棉濾去渣入雌雄黃礬胡粉攪勻收瓷器中每用塗瘡一日三四次每用藥以熱鹽湯洗過然後塗之毋及口眼白花蛇散白癩白花蛇酒浸晚蠶蛾去頭足翅威靈仙天麻槐子羌活防風枳殼白鮮皮蔓荊子各一兩炙草五錢每末二錢酒下日二次不拘時苦參酒又苦參五斤蜂房五兩猬皮一具水三斗煮一斗去渣浸細面五斤炊飯三斗如常作酒溫飲一二杯八珍湯索澤症人參白茯苓白朮炙甘草川芎當歸白芍地黃治肉病方四參苓元食㑊人參遠志赤苓菖蒲牛膝酒浸地骨皮各一兩蜜丸不拘時米飲下前胡散肉苛前胡白芷細辛官桂白朮川芎各三兩吳萸附子當歸各二兩川椒三錢上銼以酒茶三升拌勻窨一宿以豬油五斤入藥微煎候白芷黃色去渣煎成膏摩病處以熱為度清燥湯肉痿黃芪白朮各錢半蒼朮一錢陳皮澤瀉各七分赤苓人參升麻各五分生地當歸豬苓麥冬神麯甘草各三分黃連黃柏柴胡各二分五味子九粒谷靈丸肉脫黃芪人參牛膝當歸各一兩附子炮一個熟地茯苓各五錢杜仲蒼朮白朮肉桂杞子各三錢酒糊丸參湯下百丸治毛發病方十防風通聖散髮際瘍滑石錢七分甘草錢二分石膏黃芩桔梗各七分防風當歸身川芎赤芍大黃麻黃薄荷連翹芒硝各四分半白朮荊芥山梔各三分五釐薑三片柴胡清肝湯鬢疽柴胡山梔各錢半川芎黃芩人參各一錢桔梗連翹各八分甘草五分食後溫服仙方活命飲又穿山甲白芷防風赤芍甘草歸尾花粉貝母角刺各一錢陳皮金銀花各三錢沒藥乳香各一錢二味另研水酒各半煎送乳沒二末四君子湯又人參茯苓白朮炙草四物湯又川芎當歸白芍地黃補中益氣湯又人參黃芪當歸白朮升麻柴胡陳皮甘草松脂膏白禿松脂黃連各七錢半黃芩苦參各一兩蛇床子二錢半大黃活礬各五錢水銀兩半胡粉五錢合水銀入少水同研令無星為度共研勻臘豬油調塗瘡上張天師草還丹預防地骨皮生地石菖蒲酒煮菟絲子牛膝遠志等分蜜丸空心鹽湯下三五十丸修合忌鐵器四物坎離丸又熟地三兩生地兩半同酒浸打膏當歸二兩白芍兩半同酒炒知母一兩黃柏二兩同鹽酒浸炒側柏葉槐子各一兩同炒連翹六錢蜜丸盛磁盒內放地上七日曬乾收之酒下五六十丸五老還童丹又茯神赤石脂川椒炒出汗各一兩朱砂水飛乳香燈心同研各一兩俱另為末用雞子二個去清黃只將朱砂乳香各裝一殼內紙糊七重清絹袋盛之令人懷肚上常令溫暖朱砂懷三十五日乳香懷四十九日取出再研前三藥亦為末和勻蒸棗肉和丸空心酒下三十丸參湯下尤妙一月外加至四十丸又名遐齡萬壽丹附録毛發雜方眉毛不生方芥菜子半夏等分為末薑汁調搽數次即生治人無發方甜瓜葉搗汁塗之即生病後發落方鮮猴薑野薔薇嫩枝煎汁刷之令發長黑方桑葉生麻油煎過去渣沐發令長數尺須發黃赤方生地一斤生薑半斤各洗搗汁留渣用不蛀皂莢十條去皮弦蘸二汁炙汁盡為度同渣入罐泥固煅存性研末鐵器盛之每末三錢湯調停二日臨臥刷染須發即黑祕傳烏發方五倍子半斤研末銅鍋炒之勿令成塊如有煙起即提下攪之從容上火慢炒色黑為度以濕青布包扎足踏成餅收貯聽用每用時先以皂角水洗淨須發用五倍子末二兩酒炒紅銅末錢六分生礬六分訶子肉四分沒石子四分硼砂一分共研極細烏梅酸榴皮煎湯調勻碗盛重湯煮四五十沸待如飴狀以眉掠刷於須發上一時洗去再上包住次日洗去以桃核油潤之半月一染甚妙巫靈散膽礬五倍子百藥煎青胡桃皮酸石榴皮訶子皮木瓜皮豬牙皂角何首烏細辛等分為末蜜和如錢大常放木炭內培養勿令離炭用時以熱酒化開塗之金主緑雲油蔓荊子沒石子躑躅花訶子皮覆盆子白芷沉香防風附子零陵香生地芒硝公丁香旱蓮草各一錢半卷柏三錢上銼絹袋盛將清香油八兩浸入封過七日取擦頭上日三次巫靈散治須發黃白不澤此緑雲油能生發頭痛源流眩暈肝風病也內經曰頭痛巔疾下虛上實過在足少陰巨陽甚則入腎又曰蒙招尤目眩耳聾下實上虛過在足少陽厥陰甚則入肝經言下虛腎虛也腎虛者頭痛經言上虛肝虛也肝虛者頭暈夫腎厥則巔疾肝厥則目眩此其所以異也故內經又曰諸風眩掉皆屬於肝夫肝為風風陽邪也主動凡人金衰不能製木則風因木旺而扇動且木又生火火亦屬陽而主動風火相搏風為火逼則風烈火為風扇則火逸頭目因為旋轉而眩暈此則眩暈之本也若病發之故則有由外因者曰傷風眩暈必惡風自汗或素有頭風而發宜芎蒡散曰火熱上攻眩暈必煩渴引飲或暑月熱甚而發宜大黃散曰風痰閉壅眩暈必胸膈痞塞項急肩背拘倦神昏多睡或心忪煩悶而發宜天麻五錢川芎二兩蜜丸芡子大食後清茶嚼下一丸名天麻丸曰風熱上衝眩暈必胸中不利旋運欲倒或感受時邪而發宜川芎槐子末等分茶下三錢曰冒雨傷濕眩暈必鼻塞聲宜芎朮湯有由內因者曰痰飲眩暈眩而嘔吐頭重不舉是痰宜清暈化痰湯眩而心下悸是飲宜茯苓半夏湯曰氣鬱眩暈必七情過傷痰涎迷塞心竅眉棱骨痛眼不可開宜玉液湯曰虛衰眩暈宜滋陰健脾湯或內傷氣虛宜補中益氣湯或腎虛氣不歸元氣逆奔上宜十全大補湯或脾胃虛弱兼嘔吐泄瀉宜歸脾湯曰失血眩暈或吐衄太甚或便血過多或由傷胎或由産後或由崩漏或由金瘡跌撲撥牙往往悶絶不省人事宜當歸五錢川芎二錢半水酒煎日再服名芎歸湯曰老人陽虛每早起便暈須臾自定宜黑錫丹此則眩暈之由也然而內因外因之感發雖殊總必由於痰盛故有風熱痰作眩者宜玉壺丸茶調散合用有寒濕痰作眩者宜導痰湯加蒼朮秦艽有痰火兼虛作眩並遍身眩暈者宜半夏白朮天麻有氣血虛挾痰作眩者氣虛宜六君子湯血虛宜二陳湯加芎歸故曰無痰不作眩也而又有至於眩暈之甚但頭目不清利宜川芎散防風散或並耳鳴耳聾宜清神養榮湯且精神不爽咽乾鼻塞者宜沃雪湯皆由風濕熱痰涎鬱於精明之府也眩暈原由症治靈樞曰上虛則眩又曰上氣不足目為之眩此言虛眩又曰藏府筋骨血氣之精與脈並為目系上屬於腦後宅於項中故邪中於項因逢其身之虛其入深則隨眼係以入於腦入於腦則腦轉腦轉則引目係急目系急則引眩以轉矣此言風入而眩河間眩暈則嘔吐風熱甚也醫鑑曰眩暈者痰因火動也說無痰不能作眩雖因風者亦必有痰丹溪曰痰在上火在下火炎上而動其痰二陳湯加酒芩山梔黃連蒼朮羌活可以治之此言痰眩入門曰眩暈或云眩冒眩言其黑暈言其轉冒言其昏其義廣也又曰眩暈皆稱為上盛下虛說虛者氣與血也實者痰涎風火也正傳曰眩暈者中風之漸也肥白人四君子湯多加蜜黃芪加陳皮半夏少加川芎荊芥以清頭目黑瘦人二陳湯合四物湯加黃芩薄荷入竹瀝薑汁童便又曰凡眩暈語亂汗多下利時時自冒者虛極難治回春曰泄瀉多而眩暈時時自冒者難治頭暈腦痛及痰滯導引法保生祕要曰單搭膝坐二指點閉耳門及口眼鼻七竅之處躬身微力前努使真氣上升腦邪自散矣運央保生祕要曰注臍念想頭上痛處分兩邊運至心口開下念臍輪斡旋通關緊行至滯痰處著意多運周流遍腹顧念臍神暈頭暈導引法保生祕要曰此症情欲所傷氣衰血少心火上攻痰飲串肺為患日久變成勞瘵於肩井穴掐九九擦九九兼用後央自愈運央保生祕要曰緊閉地戶安神伏氣按腦及耳大暈要倚坐足掘勿交神氣自回得法因津咽下定神風頭旋肝風病也肝風盛則頭自搖動別無疾痛不自覺知治法與頭風略同總應以平肝為主也風頭旋症治綱目曰有一子患七年搖頭三年下血百方無效豫思之乃肝家血液盛外有風熱乘之肝木盛而尅脾土脾與肺是子母俱為肝所勝而血遂漬於大腸故便血不止遂處一方但損肝驅風而益脾用防風三兩花粉蜜黃芪羌活白芍各五錢犀角甘草各二錢半炙蛇殼鈎鈎麻黃各一錢棗肉丸食後薄荷湯下五七十丸只二服頭搖即止十餘服血止而下白又二服乃愈頭風風寒人腦髓病也凡人素有痰火風寒客之則熱鬱而悶痛故婦人多患此者無巾櫛故也總之新而暴者為頭痛深而久者為頭風頭風不速治必害眼其痛有正有偏丹溪曰凡偏頭風左為風虛右為痰熱丹溪雖分言之其實總屬於肝虛有痰治之者雖左風必用荊防羌薄左虛必用芎歸右痰必用蒼夏右熱必用芩膏其實補肝豁痰之品必當兼用補肝宜山藥木瓜棗仁羚羊角豁痰宜南星半夏蒼朮橘紅是所宜知者也凡患偏正頭風有兼惡寒頭面多汗者宜茶調散加生黃芪搐鼻出涎法大妙宜透頂散有兼鼻流臭涕他藥不效者宜芎犀丸有頭風冷者宜蕎麥面二升作餅更互合頭上微汗即愈有頭風熱痛者宜山豆根末油調塗兩太陽有頭風項強者宜八月後取荊芥穗作枕鋪床下立春日去之有頭風旋運痰逆惡心懶食者宜零陵香藿香葉莎草根等分每末二錢茶下日三服有偏正頭風並夾頭風連兩太陽穴痛者宜薑蠶末蔥茶下七八分及沈氏頭風丸有偏正頭風氣上攻不可忍者宜全蠍散有偏正頭風痛不可忍者宜龍香散有偏正頭風不拘遠近諸藥不效者宜牛腦丹有腦冷漏下者宜白雞冠子酒煎服效有頭腦鳴響狀如蟲蛀名曰天蟻者宜茶子末吹鼻效有頭風多白屑作癢者宜零陵香白芷煎汁入雞子白攪勻傅數十次終身不生各依症治之自無不效而半邊頭痛另有仙方宜乩仙方及外治法宜萆麻子紙卷亦俱效更有雷頭風者頭痛而成核塊頭面腫痛憎寒壯熱狀如傷寒病在三陽不可過用寒藥誅伐宜沈氏荷葉湯或頭中如雷之鳴為風邪所客故也腫核宜刺出血宜清震湯亦有因痰熱者痰熱者痰熱生風也宜祛痰丸更有夾腦風者兩太陽連腦痛是也宜透頂散更有大頭風者頭大如斗俗名大頭瘟天行時疫病也感天地不正之氣甚而潰裂出膿由邪客上焦之故宜普濟消毒飲其相類而病輕者名發頤腫在耳前後宜甘桔湯加薄荷荊芥連翹黃芩牛蒡子頭風症治醫鑑曰頭風之症索有痰飲或櫛沐取涼或久臥當風以致賊風入腦入項自頸以上耳目口鼻眉棱之間有麻痹不仁之處或頭重或頭暈或頭皮頑厚不自覺知或口舌不仁不知食味或耳聾或目痛或眉棱上下掣痛或鼻聞香極香聞臭極臭或只呵缺而作眩冒之狀熱者消風散冷者追風散頭風發時悶痛必欲棉裹者熱鬱也二陳湯加酒芩荊芥川芎薄荷石膏細辛婦人頭風宜養血祛風湯葉天士曰有氣血皆虛新涼上受經脈不和腦後筋掣牽痛倏起倏靜音乃陽風之邪宜荷葉邊苦丁茶蔓荊子甘菊連翹有內風頭痛瓷冷者宜杞子首鳥茯神柏子仁菊花炭櫓豆皮有痛在頭左腦後厥陰風木上觸者宜細生地白芍炒杞子柏子仁茯神甘菊有暑風濕熱混於上竅津液無以運行凝滯而成偏頭痛舌強乾涸者宜連翹石膏滑石甘草荷梗桑葉羚羊角蔓荊子有失血過多陰氣太傷陽氣浮越頭痛筋惕脈數虛而動當用鎮攝者宜人參阿膠牡蠣生地白芍天冬炙草正頭風痛靈樞曰凡手三陽從手走頭足三陽從頭走足是手足六陽脈俱上於頭面也又曰足太陽脈上額交巔直入絡腦別下項其病衝頭痛目似脫項似撥即正頭痛也偏頭風痛靈樞曰足少陽之脈起目鋭眦上抵頭角其病頭角額痛子和曰頭風之甚者久則目昏偏頭風痛者屬少陽相火久則目縮小大便祕澀皆宜出血而大下之入門曰偏頭痛年久大便燥目赤眩暈者此肺乘肝氣鬱血壅而然宜大承氣湯大下之外用大黃芒硝為末井泥調貼兩太陽穴乃能愈也日行頭風導引法保生祕要曰此症定宜先導引次行右法握固搭膝而坐以手捫兩耳塞兌閉目用意躬身前努使七竅之氣上攻邪氣自然退散矣運央保生祕要曰手腳屈拳閉口存想自泥丸而起漸想至湧泉候汗出而自愈說從頭汗上而下出邪氣淨降矣首風風傷於衛病也說沐則腠理皆開而風為陽邪善行而易入乘其腠之開邪遂襲而入則衛受之故成首風其症頭面多汗必惡風宜大川芎丸或沐浴後眩暈頭痛亦首風類宜白芷丸首風症醫說曰不概入頭風條例而獨立其名曰首風見此症專由沐後而得所以別於頭風之由於六淫七情者也古人就病定名意深哉腦風風邪客腦病也腦者居於頭說骨中百會穴分即其部也靈樞曰腦為髓之海髓海有餘則輕徑多力不足則腦轉耳嗚脛酸眩冒目無所見經文此言腦之本病也若風邪入於風府由風府而上入於腦則有腦風之症其狀項背怯寒腦戶穴冷宜神聖散亦有風邪但攻於上焦而邪氣上燻令人日夜頭痛不止者亦為腦風宜太陽丹宜分別治之也腦風原由內經曰髓者骨之充也髓傷則腦髓消爍體解㑊然不去也注云不去者不能行去也入門曰腦者髓之海諸髓皆屬於腦故上至腦不至尾骶皆精髓升降之道路腦疽膀胱經積熱病也如初起腫痛甚煩渴引冷脈數有力者由濕毒上壅如漫腫微痛渴不飲冷脈雖數而無力者由陰虛火熾濕毒宜黃連消毒飲陰虛宜六味丸若不成膿不潰腐陽氣虛也宜四君子湯加歸芪不生肌不收斂脾氣虛也宜十全大補湯然陽虛脾虛之患凡外症皆然不獨腦疽已也宜知之又有腦爍初起即如木橛上起頂門下至大椎發腫如火燒色青黑不潰只損外皮如犬咬去肉一般即潰亦不斂皆由陰精消爍之故此死症也古無治方又有腦癰皮薄易破此輕症宜清熱消毒飲非如腦疽皮厚難治急當內托也薛立齊言凡患腫毒欲成膿腐潰生肌收斂並用托裡為主此至言也故立齊於托裡消毒散一方多設加減法加減法載在前亦欲人知所以用之耳仙方活命飲亦癰疽初起之聖藥又有赤疽發太陽穴其形不拘大小以速破見膿既膿速斂為要以額角近連太陽皆要害處若腫滿太陽即成虛損難於收拾若既破而傷風水瘍科書言此症七日刺不得膿十日不穴必死誠有見於此症之不易療也至若太陽穴生癰疽與目相近不於五六日內急破之毒氣攻眼則眼合不開破後更傷風水則目睛必傷其癰疽發於眉頭者亦必攻人眼目發在眉後者又必攻入太陽皆要害處不可忽者頭瘍症治陳文治曰腦疽初起宜黃連消毒飲腫硬作痛繼以仙方活命飲一二劑說此病原屬虛火按之脈數而濡乃濕熱壅盛故用黃連消毒飲腫硬作痛乃氣血凝滯故用仙方活命飲並以甘溫之劑補益陽氣托裡而潰腐之不宜用苦寒傷其胃氣反致不得腐化凡瘡易消散易腐潰易收斂皆氣血壯盛故也可以類推又曰昔杜碧清患腦疽自藥不愈丹溪治之令服防風通聖散答曰已數服丹溪云宜皆以酒製杜悟急服乃瘥治頭痛方二十七羌活附子湯犯腦羌活附子防風黃芩升麻白芷甘草黃柏麻黃薑蠶蒼朮玉真丸下虛硫黃二兩石膏半夏硝石各一兩薑汁丸每二十丸薑湯下寒甚者去石膏加鐘乳粉灸關元穴補中益氣湯氣虛人參黃芪歸身白朮升麻柴胡陳皮炙草薑棗白虎湯陽明麻黃附子細辛湯少陰麻黃附子細辛生熟地黃丸肝風生地熟地枳殼甘菊防風牛膝羌活杏仁金石斛蜜丸每三錢食前用豆淋酒送下鉤藤散又鉤藤鉤陳皮半夏茯苓麥冬甘草石膏人參甘菊防風沉香降氣散怒傷沉香木香柴胡白芍細辛青皮陳皮蘇子清空膏頭痛羌活防風柴胡川芎黃連黃芩甘草每末三錢臨臥茶清下茶調散實痛黃芩二兩川芎一兩細茶三錢白芷五錢薄荷二錢荊芥四錢巔頂及腦痛加細辛藁本蔓荊子各三錢為末茶調下菊花散又甘菊旋覆防風枳殼羌活石膏蔓荊子甘草各錢半薑三片四物湯血虛川芎當歸白芍地黃加味調中益氣湯氣虛黃芪一錢人參炙草蒼朮各七分陳皮當歸川芎各五分木香蔓荊子升麻柴胡細辛各三分選奇湯因風防風羌活各三錢黃芩一錢甘草夏生冬炙八分香茹飲因暑香茹厚朴扁豆甘草清上瀉火湯因熱羌活藁本防風荊芥人參當歸知母黃柏黃芩黃連黃芪白朮升麻細辛甘草生地紅花蔓荊子此方奇效之至芎烏散氣厥川芎烏藥等分每末二錢以燒稱鎚淬酒下兼治産後頭痛補氣湯因熱升麻黃芪炙草細辛當歸木香一方有麻黃斟酌用之石膏散風熱石膏麻黃首烏葛根神芎散又蔓荊子青黛川芎各錢二分鬱金芒硝各一錢石膏一錢半細辛一錢薄荷二錢紅豆一粒為末搐鼻安神散鬱熱黃芪羌活黃柏各一兩防風二錢半酒知母酒生地柴胡升麻各五錢生甘草炙甘草各三錢每末五錢水煎服加蔓荊子五分川芎三分尤妙川芎散又薄荷羌活荊芥柴胡川芎甘菊細辛槐子茵陳香附石膏生甘草香砂枳朮丸傷食木香砂仁枳殼白朮紅丸子又三棱蓬朮乾薑青皮陳皮胡椒醋糊丸礬紅為衣葛花解醒湯傷酒人參茯苓木香陳皮砂仁神麯葛花蔻仁知母青皮豬苓乳香落盞散過散粟殼陳皮甘草桔梗柴胡乳香麻黃吳萸湯寒冷麻黃吳萸升麻蒼朮羌活藁本柴胡黃芩黃連黃柏半夏川芎細辛紅花蔓荊子治眩暈方八玉壺丸風熱南星半夏各一兩天麻五錢白面三兩蜜丸每三十丸先將水一碗煎滾下藥浮即熱輕輕撈起薑湯下茶調散又方詳上導痰湯寒濕半夏四兩南星枳實赤苓橘紅各一兩炙草五錢每末四錢加薑十片食後煎服十全大補湯元虛人參黃芪當歸白朮肉桂白芍熟地茯苓川芎炙草薑棗補中益氣湯氣虛人參黃芪當歸白朮柴胡升麻甘草陳皮四物湯血虛川芎當歸白芍熟地六君子湯挾痰人參茯苓白朮炙草半夏陳皮二陳湯又茯苓半夏陳皮甘草治頭風方十九茶調散偏正風方詳上透頂散搐鼻細辛二莖瓜蒂七個丁香三粒糯米七粒冰片麝香各分半先研藥細後入冰麝研勻每用豆部隨病人左右搐之良久出涎碗部乃愈芎犀丸臭涕川芎朱砂石膏片腦人參茯苓炙草細辛犀角山梔麥冬阿膠沈氏頭風丸兩邊痛煨天麻麩枳殼酒白芍炒黑瓜蔞仁於朮炭各一兩薑炒半夏麯煅蛤粉炒焦棗仁各兩半黃連吳萸五錢同炒去萸砂仁甘菊炙草各五錢酒歸身四兩沉香屑四錢檀香屑三錢金石斛三兩黑棗肉二十枚煎湯代水泛丸空心大棗湯下二錢此餘自製方也用之屢效全蠍散氣攻全蠍二十一個地龍六條土狗二個五倍子五錢為末酒調攤貼太陽穴上龍香散痛極地龍去土焙乳香等分為末每以一字作紙捻燈上燒煙以鼻㗜之牛腦丹頭風白芷川芎各三錢為末抹黃牛腦子上磁器內加酒頓熟乘熱食之盡量一醉醒則其病如失甚驗乩仙方半邊痛詩曰辛本羌蠶荷半夏防荊芎芷附天麻三分蘇草麻黃共水酒煎時加細茶萆麻子紙卷又萆麻子去殼五錢大棗去核十五個共搗如泥塗紙上用箸一只卷之去箸納鼻中良久取下清涕即止沈氏荷葉湯雷頭風落帚子三錢升麻川芎製茅朮各一錢先將鮮荷葉一張摺疊不得扯碎水二碗半煎至二碗再入藥加生薑三片煎七分服此餘自製方也每用一二帖即愈清震湯又升麻蒼朮荷葉各四錢食後服祛痰丸又薑製皂角半夏各一兩大黃酒浸紙包煨再浸煨三次二兩橘紅桔梗天麻各五錢片芩七錢薄荷三錢青礞石白芷甘草各一錢蒸餅丸臨臥茶下普濟消毒飲大頭風黃連黃芩各八分人參柴胡桔梗各五分元參橘紅甘草各四分牛蒡子連翹板藍根各一分馬勃二分薑蠶升麻各三分薄荷六分便祕加酒大黃一錢甘桔湯發頤甘草桔梗消風散熱頭風荊芥甘草各一錢人參白茯苓薑蠶川芎防風藿香羌活蟬脫各五分陳皮厚朴各三分加細茶一撮每末二錢茶下追風散冷頭風炮川烏熟石膏炒薑蠶荊芥穗防風川芎甘草各五錢製南星製白附子羌活天麻地龍全蠍白芷各二錢半炮草烏乳香沒藥雄黃各錢二分半每末五分臨臥茶酒下二陳湯熱鬱茯苓陳皮半夏甘草養血祛風湯婦人當歸川芎防風生地荊芥羌活細辛藁本石膏半夏甘草旋覆花蔓荊子各五分薑三棗二大承氣湯偏頭風治首風方二大川芎丸首風川芎四兩天麻一兩蜜和每兩作十丸每丸細嚼茶酒任下白芷丸又新白芷不拘多少銼以夢卜汁浸灑乾為末蜜丸彈子大每一丸細嚼荊芥湯下一名都梁丸凡頭風眩痛服之令人目明凡暴寒乍暖神思不清頭目昏暈並宜服之治腦風方二神金散腦風葛根半生半炒麻黃細辛藿香等等分為末每二錢薄荷荊芥湯下太陽丹又石膏二兩川烏川芎白芷甘草各一兩冰片二錢蜜同面糊丸每兩作十八丸東丹為衣食後蔥茶湯嚼下二三丸治腦疽方八黃連消毒飲腦疽酒黃連酒生地酒歸身羌活黃芪連翹各一錢澤瀉七分酒防己黃芩黃柏獨活防風藁本蘇木陳皮桔梗各八分酒知母四分人參甘草梢各五分一名黃連消毒散此方治腦疽背疽琚腫疼痛或麻木膏粱之人允宜用此六味丸陰虛地黃山藥山萸丹皮茯苓澤瀉四君子湯陽虛人參茯苓白朮炙甘草十全大補湯脾虛人參黃芪當歸白朮白芍肉桂熟地茯苓川芎炙草薑棗清熱消毒飲腦癰黃連山梔當歸連翹各一錢川芎白芍生地各錢半炙草八分金銀花二錢此方治癰疽發於陽腫痛發熱作渴托裡消毒散總治人參鹽黃芪酒當歸炒白芍川芎炒白朮茯苓各一錢白芷金銀花各七分炙草連翹各五分此方治胃氣虛弱或因尅伐不能潰散服此未成即消已成即潰腐肉自去新肉自生仙方活命飲又穿山甲炒黃白芷防風赤芍甘草貝母角刺歸尾花粉各一錢陳皮金銀花各三錢乳香沒藥各一錢二味另研為末先將藥水酒各半煎好送二末酒製防風通聖散腦疽附録瘍科選粹治腦疽方二羌活當歸湯酒黃連酒黃芩酒歸身各二錢羌活黃柏連翹各一錢炙甘草五分澤瀉獨活藁本各七分山梔防風各五分水三酒七煎食後服日進三帖三日乃愈追毒萬應針頭丸麝香二錢血竭蟾酥輕粉硇砂各三錢全蠍蜈蚣各一對全用冰片一錢蜜丸黍米大瘡頭用針挑破微有血出以藥一粒放進挑破眼內用棉紙說之周圍以津唾粘定不一時愈此丸治一切腦背惡瘡欲死一粒可愈
