body:
  text: 卷四脾病源流痞氣足太陰脾脈起大指端循指內側過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上膝股前廉入腹屬脾絡胃上鬲挾咽連舌本散舌下其支者復從胃別上鬲注心每日巳時氣血注脾足太陰脾經血少氣旺脾也者心君儲精待用之府也贍運用散精微為胃行精液故其位即在廣明之下與心緊切相承其職掌太倉之運量而以升為德其部當水谷之海故患濕其屬土配資生坤元故為十二經根本其勢居中央孤臟以灌四旁注四末故為六經內主其所以為脾如此古人謂為後天之本信然也說脾統四臟脾有病必波及之四臟有病亦必待養於脾故脾氣充四臟皆賴煦育脾氣絶四臟不能自生昔人云後天之本絶較甚先天之根絶非無故也凡治四臟者安可不養脾哉然經曰腹滿填脹支膈胠脅下厥上冒以為過在脾與胃者豈盡脾胃之過哉皆由中氣不足為病甚而入脾致脾經不運陽明之氣亦不勝是以不能出營衛升達上下也惟不升上故肺氣不行而上冒惟不達下故腎氣獨沉而下厥耳至若本經為病不外濕淫熱鬱兩端濕由水氣病則壅壅則傷氣氣虛而不運必腹脹胃痛腸鳴飧泄身重食不化熱由火氣病則不濡不濡則傷血血活而燥必胃氣厚善飢肉痿足不能行善瘛腳下痛口乾舌本強食即吐食不下煩心水閉黃疸脾約皆脾經病也治之者務使三焦之氣流轉和通則土潤而升不憂其燥而火氣不得病之土健而運不憂其濕而水氣亦不得病之矣脈法脈訣曰脾脈實兼浮消中脾胃虛口乾饒飲水多食亦肌虛單滑脾家熱口氣氣多粗澀即非多食食不作肌膚微浮傷客熱來去乍微疏有緊脾家痛仍兼筋急拘欲吐不即吐沖沖未得蘇若弦肝氣盛妨食被譏吁大實心中痛如邪勿帶符溢關涎自出風中見羈孤羈傷也脾為孤臟而受風傷故曰羈孤又曰右手第二指連脾四十五動無諸疑急動名為脾熱極食不能消定若斯欲知疾崽多因冷指下尋之慢極遲吐納不定經旬日骨氣忡心得幾時脾病證治靈樞曰有所擊仆若醉飽入房汗出當風則傷脾又曰脾臟營營舍意脾氣虛則四肢不用五臟不安實則腹脹大小便不利又曰邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛素間曰肝傳之脾病名曰脾風發痺腹中熱煩心出黃又曰脾熱者腹黃而肉瞤動又曰大骨活大肉陷胸中氣滿喘息不便內痛引肩項身熱脫肉真臟見十月之內死又曰脾病者日晡慧日出甚下晡靜又曰脾苦濕急食苦以燥之脾欲緩急食甘以緩之苦濕是有餘欲緩是不足又曰脾病禁溫食飽食濕地濡衣難經曰飲食勞倦則傷脾又曰外證面黃善嘻善思善味內證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也脾絶候靈樞曰是太陰氣絶則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌痿人中滿人中滿則唇反唇反者肉先死甲日篤乙日死又曰太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛焦而終矣仲景曰環口黧黑柔汗發黃者此乃為脾絶脾氣滯澀保養法保生祕要曰凡人氣旺則血榮而潤澤氣絶則血活而滅形故氣虛弱則滯澀而成病如澀於脾則胃口凝滯不剋飲食而多瀉泄久不疏通則成中滿之證諸濕腫滿皆屬於脾四季脾居土輕呼稍寬胸大病須服氣能伏養谷神說脾為一身之主氣滯於內卻內五藏之患滯於外防癤疥之憂皮裡隔膜有積熱而內外相感尤防疽毒所感者七情六欲而生也導引臞仙曰可大坐伸一腳屈一腳以兩手向後反掣各三五度亦可跪坐以兩手拒地回顧用力虎視各三五度能去脾臟積聚風邪喜食修養養生書曰常以季夏之月朔旦並四季之末十八日旭旦正坐中宮禁氣五息鳴天鼓十二通吸坤宮之黃氣入口十二咽之閉氣五十息治脾病諸藥要品及方二脾實宜除濕清熟白朮山梔豬苓澤瀉車前子茯苓滑石防風葛根白豆蔻枳實黃連脾虛宜甘溫辛酸大棗黃耆山藥扁豆子建蓮砂仁茯苓橘紅白豆蔻藿香木瓜白芍棗仁炙甘草益黃散脾虛腹痛泄利陳皮一兩訶子肉煨青皮炙甘草名五錢丁香二錢共為末每周二錢或三錢煎服一名補脾散瀉黃散脾熱口瘡口臭黑山梔錢半藿香甘草各一錢石膏八分防風六分共用蜜酒拌微炒水煎一名瀉脾散附載仲景分別標本方藥標不渴脈浮桂枝湯濕勝濡泄理中湯本渴欲引飲四逆湯亡液燥渴理中湯實有餘為濕氣茯苓乾薑人參陳皮青皮甘草氣白朮肉桂吳萸虛不足為燥血沙參益智麻仁郁李仁參耆氣木瓜烏藥自芍棗鹽腹脹滿虛芍藥實厚朴心腹痛虛寒人參芍藥實熱大黃黃芩臍腹痛白朮少腹痛男四物湯加阿膠茯苓寒小茴延胡索女四物湯加延胡川楝子熱大黃黃芩飧泄胃泄承氣湯白朮調中湯洞泄脾泄建中湯理中湯寒中大腸泄乾薑附子寒小腸泄承氣湯臟毒下血有鮮血不可下宜解化溏泄鶩泄天麻吳萸附子乾薑一法土鬱則奪之謂下之使無壅礙也脾之積曰痞氣經云在胃脘腹如盆大久則令人四肢不收黃疸飲食不為肌膚心痛徹背背痛徹心脈必浮大而長宜痞氣丸增損五積丸皆由脾氣虛及氣鬱所致治法宜健脾兼散結滯治痞氣方一痞氣丸痞氣黃連八錢厚朴五錢吳萸三錢黃岑白枋各二錢茵陳草砂仁乾姜各錢半茯苓人參澤瀉各一錢川烏川椒各五分桂心巴霜各四分丸法服法同息賁丸增損五積丸又黃連肝積五錢脾腎積七錢心肺積一兩半厚朴肝心肺積五錢脾腎積八錢川烏肝肺積一錢心腎脾積五分乾薑肝心積五分肺脾腎積一錢半人參肝心脾肺積二錢腎積五分茯苓錢半巴霜五分蜜丸梧子大初服二丸漸加以微溏為度治積塊不拘臍上下左右通用肝積加柴胡一兩川椒四錢莪朮三錢皂角崑布各二錢半心積加黃芩三錢肉桂茯神丹參各一錢菖蒲五分肺積加桔梗三錢天冬陳皮青皮白豆蔻各一錢紫菀川椒各一錢半脾積加吳萸黃芩砂仁各二錢澤瀉茵陳各一錢川椒五分腎積加元胡索三錢苦楝肉全蠍附子獨活各一錢澤瀉菖蒲各二錢肉桂三分丁香五分嘔吐噦源流嘔吐噦脾胃虛弱病也以氣血之多少而分東垣云嘔屬陽明其腑多血多氣氣血俱病故有聲有物而為嘔氣逆者散之故以生薑為主藥吐屬太陽其腑多血少氣血病故有物無聲而為吐以橘紅為主藥噦屬少陽其腑多氣少血氣病故有聲無物而為噦以半夏為主藥是三者皆本於脾虛或為寒氣所客或為飲食所傷或為痰涎所聚皆當分其經絡察其虛實以治之宜丁香半夏藿香陳皮茯苓生薑又有無物無聲者曰噁心乾嘔乃胃家氣血兩虛所致也宜橘紅湯入薑汁蔗漿細呷之雖潔古從三焦分治三因然三焦皆胃之地分故或胃口有熱而乾嘔宜梔子竹茹湯或胃口有痰而乾嘔宜二陳湯或乾嘔而手足厥冷總皆不離乎胃病者是試進究之邪在上脘之陽必氣停而水積故湯水之清濁混亂則為痰為飲為涎為唾變而為嘔邪在下脘之陰必血滯而食不消故食物之清濁不分則為噎塞為痞滿為痛為脹變而為吐邪在中脘之氣交者盡有二脘之病然上脘非不吐食也設陽中之陰亦病則食入即吐非若中脘之食已而為吐下脘之食久而吐耳宜生薑半夏湯下脘非不嘔也設陰中之陽亦病則吐嘔齊作然嘔少於吐非若上脘之嘔多於吐耳脈沉無力宜理中湯脈滑而實宜半夏生薑大黃湯下之中脘則當食畢之時也亦嘔亦吐謂之嘔吐宜橘紅半夏湯則上中下脘三因雖各有別何嘗有外於胃乎而尤所宜辨者中脘之嘔吐固均屬胃虛而必分寒熱其虛而挾寒者喜熱惡冷肢冷脈必細而滑宜理中湯冷服如服而仍吐去朮草之壅加丁沉立止其虛而挾熱者喜冷惡熱煩渴小便赤澀脈必洪而數宜二陳湯加山梔黃連竹茹枇杷葉葛根薑汁蘆根其中脘素有痰積遇寒即發者脈必沉而滑宜丁香白蔻砂仁乾薑陳皮半夏加薑汁白芥汁至盞部如痰滿胸喉湯藥到口即吐必先控其痰涎宜來復丹俟藥可進然後治之宜二陳湯加枳實砂仁桔梗厚朴薑汁虛加人參或素本中寒用熱藥太過亦至嘔逆宜二陳湯加沈香白蔻仁此皆嘔吐噦之大概也其所由正自多端有由七情得者宜理中湯加烏藥木香沉香有由陰虛火逆者宜薑汁炒熟地加檳榔黃柏沉香導之使下有由上焦氣壅而表實者宜半夏生薑有由怒中飲食嘔吐胸滿膈脹關格不通者宜二陳湯加木香青皮如不效加丁香沉香砂仁蔻仁厚朴藿香神麯薑棗有由氣滯者身熱臂痛食久則先嘔後瀉此上焦傷風開其腠理經氣失道邪氣內著也宜麥冬湯有食己暴吐脈浮而洪者此上焦火逆也氣降則火自消吐漸止宜桔枳湯加人參白芍有下閉上嘔者亦因火在上焦宜桔梗陳皮厚朴木香大黃以下之有由下焦實熱二便閉氣逆嘔吐者名曰走哺宜人參湯有由脾胃久傷而虛者宜焦米神麯陳皮人參薑棗以和之有噁心心下怏怏欲吐不吐者多由胃虛宜半夏陳皮茯苓白朮生薑有由客寒犯胃者宜理中湯有由肝火出胃者宜左金丸有由胃本經火盛者必面赤小便短赤或澀大便燥口苦或乾渴宜大黃葛根枳實石膏麥冬竹茹木瓜蘆根陳皮通草枇杷葉有由病久胃虛嘔吐者宜比和飲藿香安胃散有由大病後胃熱虛煩而嘔者宜竹葉石膏湯加薑汁服即止有由痰飲嘔吐者宜茯苓半夏湯有由水停心下而嘔者必心下怔忡若先渴後嘔宜赤茯苓湯若先嘔後渴宜豬苓散所當分別總之胃寒之脈沉遲微澀胃火之脈浮大而數痰膈之脈滑而兼數可憑脈辨之耳若夫食已心下痛隱隱不可忍吐出痛方止證名食痺吐食由胃氣逆而不下也亦有寒邪客於腸胃厥逆上出者亦有肝勝於脾風痰羈絆脾胃間脈弱而吐食者俱為食痺證宜茯苓半夏湯麥天湯吐酸一證皆由胃濕鬱而生熱從木化而為酸味法宜清之宜調氣平胃散若久而不化必至木盛土衰經云木欲實辛當平之辛為肺金之味故辛可勝酸金剋木也辛則必熱辛以制肝實熱以扶胃衰若濁氣不降但以寒藥投之非其治矣而或有宿食滯於胃脘以致吐酸者宜蒼朴陳甘或有停飲積於胸中以致吐酸者宜蒼半陳苓嘔苦水則由邪在膽膽上乘胃故逆而吐膽汁以致所嘔為苦水也宜吳萸黃連乾薑茯苓黃芩嘔清水則渴欲飲水水入即吐名為水逆宜神朮丸五苓散吐涎沫則以脾虛不能約束津液故涎沫自出宜六君子湯加益智仁生薑或以半夏乾薑等分為末吐膿仲景云嘔家雖有癰膿不必治膿盡自愈或用地黃丸煎湯服吐蛔則為胃中冷大凡蛔見苦則安見椒則伏見酸則不能咬也另詳諸蟲條宜理中湯加檳榔黃連川椒烏梅然而嘔吐又有總治之法宜白豆蔻湯脈法仲景曰病人脈數數為熱當消谷引食而反吐者何也以過發其汗令陽氣微膈氣虛脈乃數數為客熱不能消谷胃中虛冷故也脈經曰寸口脈數其人即吐寸口脈細而數數則為熱細則為寒數為嘔吐又陽脈緊陰脈數其人食已即吐又寸緊尺澀其人胸滿不能食而吐又脈緊而澀其病難治又脈弦者虛也胃氣無飲朝食暮吐回春曰嘔吐無他寸緊滑數微數血虛單浮胃薄芤則有瘀最忌澀弱嘔吐證治仲景曰嘔家雖有陽明證慎不可下逆之故也又曰嘔吐宜服薤白粥丹溪曰劉河間謂嘔者火氣炎上此特一端耳有痰隔中焦食不得下者有氣逆者有寒氣鬱於胃口者有食滯心肺之分新食不得下而反出者有胃中有火與痰而嘔者醫鑑曰嘔家聖藥是生薑千金之說信矣然氣逆作嘔生薑散之痰水作嘔半夏逐之生薑於寒證最佳若遇熱嘔不可無烏梅也吐病有三易老曰吐有三因乃氣積寒也皆從三焦論之上焦吐皆從於氣氣者天之陽也其脈而洪其證食已暴吐渴欲飲水大便燥結氣上衝胸而發痛其治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛脈浮而弦其證或先吐而後痛或先痛而後吐治法當以小毒藥去其積木香檳榔和其氣下焦吐者皆從於寒地道也脈沉而遲其證朝食暮吐小便清利大便閉而不通治法當以毒藥去其閉塞溫其寒氣大便漸通復以中焦藥和之不令大府閉結而自安也中焦去積宜紫沉丸嘔吐噦宜通大便直指曰陽明之氣下行則順今逆而上行謹不可泄固也然嘔吐者每每大便閉結上下壅遏氣不流行當思有以利導之東垣曰陰虛邪氣上逆窒塞嘔噦不足之證也此地道不通當用生地當歸桃仁紅花兼用甘草少加大黃芒硝以通其祕大便利嘔吐噦自止矣嘔吐噦不治證脈經曰嘔吐脈弱小便自利身微熱而厥者虛極難治入門曰凡吐如青菜汁者死此是乍然嘔吐非反胃比也傷食嘔吐導引保生祕要曰按寅卯辰時空心披衣起床正身直立雙手用力拏兩肘膊腳尖著地腳跟雙懸起倒力舂二九之數醉飽勿行恐傷臟腑運央保生祕要曰先呼濁次吸清歸臍閉目存心下丹田半晌運臍自安然治嘔吐噦方二十七橘紅湯乾嘔橘紅一味不拘多少煎服梔子竹茹湯胃熱山梔三錢陳皮二錢竹茹錢半加薑汁生薑橘皮湯厥冷生薑八兩橘皮四兩水七盞煎三盞逐漸微溫呷下生薑半夏湯上脘吐半夏生薑各三錢此即小半夏湯理中湯下脘吐人參白朮甘草生薑二陳湯挾熱茯苓陳皮半夏甘草麥冬湯氣滯麥冬蘆根人參竹茹陳皮白朮茯苓甘草玉竹生薑桔枳湯暴吐桔梗枳殼陳皮厚朴木香或加大黃利之左金丸肝火黃連吳萸等分粥丸白朮陳皮湯下調氣平胃散吐酸木香檀香砂仁蔻仁烏藥厚朴陳皮各一錢蒼朮錢半藿香錢二分甘草五分平胃散又蒼朮厚朴陳皮甘草五苓散嘔清水茯苓豬苓白朮澤瀉肉桂六君子湯涎沫人參白朮茯苓甘草陳皮半夏地黃丸吐膿人參湯走哺人參黃芩玉竹知母蘆根竹茹白朮陳皮梔子石膏白豆蔻湯總治白蔻藿香半夏陳皮生薑比和飲胃虛人參白朮茯苓神麯藿香陳皮秒仁甘草陳米先以順流水三升泡伏龍肝末澄取一升半煎藥加薑棗稍冷服日二三逐納而不吐另以陳米煎湯時呷藿香安胃散又橘皮五錢人參丁香藿香各二錢半每末二錢加薑三片煎竹葉石膏湯胃熱茯苓半夏湯痰飲赤苓半夏陳皮蒼朮厚朴赤茯苓湯停水豬苓散又豬苓赤苓白朮等分為末每二錢水調下薤白粥治嘔薤白二莖雞子白三枚粟米三合神朮丸吐清水茯苓半夏湯食痺麥芽茯苓半夏白朮神麯橘紅天麻薑麥天湯又麥冬天麻茯苓白朮半夏神麯陳皮薑紫沉丸去積陳皮五錢半夏神麯代赭石烏梅肉砂仁各三錢丁香檳榔各二錢沉香木香杏仁白朮各一錢蔻仁巴霜各五分醋丸黍米大每五十丸薑湯下此丸能治中焦吐食由食積與寒氣相格吐而疼痛者一法去白橘皮一個煨薑一塊煎湯下百丸日二服俟大便通不吐則止噎塞反胃關格源流噎塞脾虛病也反胃胃虛病也經云三陽結謂之膈三陽者大腸小腸膀胱也結者熱結也小腸結則血脈燥大腸結則後不便膀胱結則津液涸三陽俱結前後祕澀下既不通必反而上行所以噎食不下即下而復出乃陽火上行而不下降據此則噎塞反胃二者皆在膈間受病故通名為膈也潔古分吐症為三云上焦吐者皆從於氣食則暴吐此即噎塞病也中焦吐者皆從於積或先吐而痛或先痛而吐此病在中脘者另詳嘔吐條內下焦吐者皆從於寒朝食暮吐暮食朝吐此即反胃病也王太仆亦以噎塞為食不得入是有火屬熱反胃為食入反出是無火屬寒然其屬寒屬熱不可盡拘士材云脈大有力當作熱治脈小無力當作寒治色黃而活者為虛寒色紅赤而澤者為實熱以色合脈以脈合症庶乎無負斯為通論說二症由於脾胃均有寒熱各異陰陽或陰傷火旺法宜養血或脾傷陰盛法當溫補或健脾理痰不得偏任辛燥有妨津液或滋陰養血不得偏任清潤有害中州此臨症權衡之要也茲試為分列之噎塞原於脾家氣血兩虛而多半由血液活乾說人臟腑之津液流行灌溉百脈皆賴脾胃運行稍不運行即津液壅滯而陰血不榮故患噎塞推其原或起憂鬱至氣結胸中而生痰痰久成塊膠於上焦道路窄狹飲可下食難入病之初起有如此者宜香砂寬中丸又或有脾氣虧敗血液俱耗胃脘乾活小便閉大便如羊糞隧道澀而成病宜參用補氣運脾丸滋血潤腸丸此皆病之所由來也至有由火熱之氣衝逆者宜酌四生丸脈必數大有由痰飲阻滯者脈必結澀宜先用來復丹控其痰再用大半夏湯加茯苓枳殼竹瀝等有由七情鬱結者脈必沉澀宜香砂寬中丸有由瘀血積滯陽無陰不能施化陰失位陽伏其中傳化不變反行上者脈必芤澀宜滋血潤腸丸有因噎而聲不出者宜竹茹五味生薑有挾寒者脈必沉遲宜加附桂有挾熱者脈必洪數宜黃連木通有飲食才下痰涎聚住不得入或雖入而涎沫隨出者二症皆宜先用來復丹控去痰涎再用大半夏湯加茯苓枳殼竹瀝皂角活礬以薑汁為丸有大便燥結糞如栗塊者宜開關利膈丸惟噎而白沫大出糞如羊屎為不治之症總之因氣從氣治因血從血治因痰導之因火壯水制之不可專投辛香燥熱之品以火濟火至津液愈耗大便愈結甚而幽門不通上衝吸門便不可救矣惟有一種胃陽火衰不能運化者可暫以辛溫開其結滯繼仍以益陰養胃為主又有一等酒徒日日狂飲以致酒發熱熱生痰痰因火煎膠結不開阻塞道路水飲下咽亦覺痛澀此便不得如液槁津活之病投以當歸地黃濡潤之品恐血未必潤反助痰而難愈也其餘無論血液耗胃脘活遂道閉津液結為痰臟腑不得津液之潤而成噎症者治法始終以養血潤燥為主而辛香燥熱之品概勿輕下且噎必兼塞東垣云堵塞咽喉陽氣不得上出者名曰塞五藏之所生陰也血也陰氣不得下降者名曰噎六府之所生陽也氣也夫咽塞於胸膈之間令諸經不行口開目瞪氣悶欲絶當先用辛甘氣味升陽之品宜人參黃耆升麻柴胡當歸益智仁草豆蔻引胃氣以治其本加通塞之藥以治其標宜木香麥芽青皮陳皮寒月盛陰當瀉陰寒之氣宜乾薑吳萸暑月盛陽當散寒氣泄陰火之上逆宜益智仁川柏青皮陳皮冬三月陽氣內藏外助陽氣不得發汗內消陰火勿令泄瀉此閉藏固密之大要也宜以吳萸湯夏三月陽氣在外陰氣在內噎病值此時天助正氣而挫其邪氣不治自愈或不愈者陰氣太盛正氣不伸耳宜以四君子湯送利膈丸凡飲食入胃便吐涎沫如雞子白說脾主涎脾虛不能約束津液故涎沫自出非參朮益智不能攝也有梅核膈者喉中如有物膈間痛死血居多宜昆布當歸桃仁韭汁童便甚加大黃亦或因痰結宜滌痰丸醫鑑謂或結於咽喉時覺有所妨凝吐之不出咽之不下由氣鬱痰結而然者正指此也然此症總屬有形之物故非血即痰若氣則無形其非梅核膈可知矣反胃原於真火衰微胃寒脾弱不能納谷故早食晚吐晚食早吐日日如此以飲食入胃既抵胃之下脘復返而出也宜理中湯甚加附子若脈數為邪熱不殺谷乃火性上炎多升少降也宜異央散加連沉歸地若口吐白沫糞如羊屎則危必須養氣扶陽滋血益陰則肺無畏火腎漸生水津液自能榮潤腸胃而上亦能納下亦能通矣如咽喉閉胸膈滿暫宜開疏結滯然亦忌破氣過多中氣至不能運宜異央散加香砂枳朴痰涎壅滿胸膈急先控之宜來復丹然後從中治之宜滌痰丸亦有瘀血阻滯者宜代抵湯作丸如芥子大每三錢去枕仰臥細咽之亦有蟲聚而反出者宜牽牛丸亦有火衰不能生土其脈沉遲者宜八味丸加香砂仁李絳治反胃久閉不通攻補兼施每用小青龍丸漸次加之關局自透再用人參利膈丸然或服通劑過多血液耗竭轉加閉結宜另治之宜豬脂丸此外又有翻胃或痰或熱壅阻隔間故食入即翻而出非如反胃之早食必晚吐晚食必早吐也宜清熱二陳湯脈法脈經曰趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨食朝食暮吐暮食朝吐完谷不化名曰胃反醫鑑曰噎膈反胃脈浮緩者生沉澀者死沉澀而小血不足脈大而弱氣不足入門曰大小腸膀胱三陽結熱脈必洪數有力噎膈反胃症治丹溪曰血液俱耗胃脘乾槁其槁在上近咽之下水飲可行食物難入間或可入入亦不多名之曰噎其槁在下與胃相近食雖可入難盡入胃良久復出名之曰膈亦曰反胃大便祕少若羊屎然名雖不同病出一體其槁在賁門食入則胃脘當心而痛須臾吐出食出痛乃止此上焦之噎膈也或食物可下難盡入胃良久復出其槁在幽門此中焦之噎膈也其或朝食暮吐暮食朝吐其槁在闌門此下焦之噎膈也又曰張雞峰云噎當是神思間病惟內觀有養可以治之此言深中病情醫林曰噎膈之症不屬虛不屬實不屬冷不屬熱乃神氣中一點病耳綱目曰噎病皆生於血活血活則燥矣得病情合經旨者丹溪一人而已醫鑑曰噎膈俱有五五膈者憂恚寒食氣也在心脾之間上下不通或結咽喉時覺有所妨礙吐不出咽不下五噎者憂食勞氣思也飲食卒然阻滯而不下丹溪又曰胃脘乾活古方用人參以補肺御米以解毒竹瀝以消痰乾薑以養血粟米以實胃蜜以潤燥薑以去穢正是此意又曰噎膈反胃藥必和以童便竹瀝薑汁韭汁多飲牛羊乳為上策但不可用人乳以有七情烹飪之火也切不可用香燥藥宜薄滋味飲酒人加砂糖驢屎入內服以防生蟲鰲接噎塞反胃病雖服藥痊愈一年內切禁房欲若犯之必復發舊症而死此所屢見者非虛言也噎膈反胃宜通大便丹溪曰嘔吐而大小便不祕利藥所當忌也若大小腸膀胱熱結不通上為嘔吐膈食若不用利藥開通發泄則嘔吐何由止乎古人用三一承氣湯正是此意噎膈反胃不治症丹溪曰噎膈反胃年高者不治下如羊屎者不治不淡飲食不斷房室者不治氣血俱虛者則口中多出沫但見沫多出者必死鰲按反胃病但吐白洙猶可治也若吐黃沫不可治矣噎隔導引保生祕要曰行央宜帶飢以雙手繫梁將身下墜微納氣數口使氣衝膈盈滿兩腳踏步二九一度之數鬱隔氣逆胃口虛弱不藥而愈運央保生祕要曰此症始行調息而坐按周天計籌咽神水一斤意墜丹田次守艮背斡運縧胸或捘或散坐臥可行有動有靜百日成央關格即內經三焦約病也約者不行之謂謂三焦之氣不得通行也惟三焦之氣不行故上而吐逆曰恪下而不得大小便曰關其所以然者由寒氣遏絶胸中水漿不得入格因以成熱氣閉結丹田二便不得出關因以成也若但為寒遏而吐逆病止曰格以下不為熱祕也但為熱祕而無便病止曰關以上不為寒遏也若寒既在上熱又在下病則曰關恪以上下俱病也此症危急法難緩治宜先投辛香通竅下降之藥以治其上宜沉香丁香藿香蘇合香蔻仁蘇子冰片生薑陳皮次用苦寒利氣下泄之藥以通二便宜大黃黃柏知母牛膝木通滑石車前子說症既危急縱有裡虛亦須通後再補也而潔古云岐士材輩則又單以不得小便為關夫不得小便且為關大小便俱不得非關病之尤甚者乎宜調中益氣湯加檳榔以升降之宜丹溪兢兢於此而以為此症多死也然而古人竟用蕩滌下行之法誠為盡善宜芒硝湯大承氣湯其或元氣素虛當於補益中以升降之宜調中益氣加檳榔其有痰涎壅塞者又當於滲利中開散之宜枳縮二陳湯此皆當細察而酌治之者也脈法內經曰人迎脈大於氣口四倍名曰恪氣口脈大於人迎四倍名曰關又曰關格宜吐瀉關格原由靈樞曰邪在六腑則陽脈不和陽脈不和則氣留之而陽脈盛矣邪在五臟則陰脈不和陰脈不和則血留之而陰脈盛矣陰氣太盛則陽氣不得相營故曰格陽氣太盛則陰氣不得相營故曰關陰陽俱盛不得相營故曰關格關格者不得盡其命而死矣治噎塞反胃方二十二香砂寬中丸初起木香白朮香附陳皮蔻仁砂仁青皮檳榔茯苓半夏厚朴甘草加薑煉蜜丸補氣運脾丸脾虛人參白朮茯苓橘紅黃耆砂仁半夏甘草薑棗滋血潤腸丸血活當歸白芍生地紅花桃仁枳殼大黃沖韭汁四生丸火逆大黃黑醜皂角各一兩芒硝五錢每服二三十丸來復丹痰飲硝石硫黃各一兩為末同入磁器內微火炒柳條攪火盛恐傷藥力再研極細名曰二氣末再用水飛元精石一兩五靈脂去砂青皮去白陳皮去白各二兩醋糊丸豌豆大每三十丸空心米飲下此又名養正丹又名黑錫丹又名二和丹大半夏湯痰滯半夏人參白蜜開關利膈丸栗糞人參大黃當歸枳殼木香檳榔吳萸湯閉藏吳萸陳皮人參草蔻升麻黃耆薑黃薑蠶當歸澤瀉甘草木香青皮半夏麥芽四君子湯陰盛人參茯苓白朮炙草利膈丸又木香檳榔各七錢半大黃厚朴各二兩人參當歸藿香甘草枳實各一兩水丸理中湯反胃人參白朮甘草生薑異央散火熱人參茯苓白朮甘草陳皮滌痰丸痰壅南星半夏枳殼橘紅菖蒲人參茯苓竹茹甘草代抵當湯瘀血牽牛丸蟲聚牽牛大黃檳榔雄黃八味丸火衰熟地山藥山萸丹皮茯苓澤瀉附子肉桂豬脂丸血耗杏仁松仁白蜜橘餅各四兩豬油熬淨一杯同搗時時食之小青龍丸開關人參利膈丸總治木香檳榔各七錢人參當歸藿香甘草枳實各一兩大黃厚朴各二兩砂仁五錢清熱二陳湯翻胃半夏陳皮赤苓甘草人參白朮砂仁竹茹山梔麥冬各一錢薑三片棗二枚烏梅一個和中桔梗湯又半夏曲二錢桔梗白朮各錢半陳皮厚朴枳實赤苓各一錢薑三片水煎取清調木香檳榔末各一錢空心服三服後吐漸止又除木香檳榔末再加白芍二錢黃耆錢半煎服三一承氣湯泄利泄瀉源流泄瀉脾病也脾受濕不能滲泄致傷闌門元氣不能分別水谷並入大腸而成瀉故口渴腸鳴腹痛小便赤澀大便反快是泄固由於濕矣然經曰春傷於風夏生飧泄泄不有由於風者乎又曰暴注下迫皆屬於熱泄不有由於熱者乎又曰諸病水液澄徹清冷皆屬於寒泄不有由於寒者乎又曰清氣在下則生飧泄泄不有由於虛陷者乎惟曰濕盛則飧泄乃獨由於濕耳不知風寒熱虛雖皆能為病茍脾強無濕四者均不得而乾之何自成泄是泄雖有風寒熱虛之不同要末有不原於濕者也故為列論之其濕兼風者飧泄也肝受風邪煽而賊土至夏濕氣蒸鬱故脈弦腹鳴下利清谷宜平胃散加羌獨升柴其濕兼熱者下腸垢也腸胃有熱傳化失常而火性急速熏動濕邪故脈數溲赤澀所下皆稠粘垢穢宜六一散或胃苓加黃連其濕兼寒者鴨溏也濕為水氣又感寒邪則寒水之氣合從而化故脈沉遲溲清白所下澄徹清冷如鴨屎宜附子理中湯加肉果或以二朮陳皮乾薑吳萸砂仁紫蘇主之挾風者亦可參用但寒泄必早暮服藥說早服暖藥至暮藥力已盡無以敵一宿陰氣故不效故夜必再服其濕兼虛者虛泄也人之清氣本上升虛則陷下又為濕所侵遏濕勝氣脫故脈細而濡困倦少力遇飲食即瀉或腹不痛所下不禁多完谷不化宜四君子湯加升柴升陽除濕湯惟濡泄一症又名洞泄乃為濕自甚即脾虛泄也由土虛不能制濕腸胃不固濕反勝而成病故脈遲而緩小便不利身重腹不痛腸鳴漉漉所下多水宜四芩湯加二朮胃苓湯加草蔻士材云水液去多甚而轉筋血傷筋急也據此又濡泄之變症宜升陽除濕湯以上內經所言諸泄可得而審者也難經又有五泄實與內經之症約略相似說曰胃泄者飲食不化色黃即風乘濕也宜胃風湯曰脾泄者腹脹滿肢體重著中脘有妨面色萎黃泄注食即嘔逆即暑乘濕也宜香茹湯對桂苓甘露飲大加生薑治之曰大腸泄者食已窘迫大便色白腸鳴切痛即燥乘濕也宜五苓散曰小腸泄者溲而使膿血小腹痛即火乘濕也宜大承氣湯下之再以黃連解毒湯加歸芍治之次以芍藥柏皮丸止之曰大瘕泄者裡急後重數至圊而不能便莖中痛即寒濕而變為熱泄也宜八正散加木香檳榔通之次以天水散頓服之是難經所言雖定屬六氣而其以濕為主不與內經相合乎此外又有風泄惡風自汗或帶清血由春傷風夏感濕故其瀉暴宜胃風湯或瀉而風邪內縮必汗之宜桂枝麻黃湯又有食泄脈弦緊腹痛則泄泄後痛減宜治中湯酌加木香砂仁枳殼白朮山楂麥芽谷芽陳皮等味仍燒所傷之物服又有痰泄脈滑類弦溲少而赤肺悶食減久而神瘁此積濕成痰留於肺中故大腸不固也宜二陳加浮石青黛黃芩神麯薑汁竹瀝等味或用吳萸湯溫服碗部探吐痰涎泄自兩日內愈又有水泄腸鳴如雷一泄如注皆是水宜石膏補骨脂乾薑草烏等或車前子湯又有火泄即熱泄脈數實腹痛腸鳴口乾喜冷煩渴小便赤澀後重如滯瀉水痛一陳瀉一陳瀉後尚覺澀滯仲景謂之熱自利是也宜黃芩芍藥湯又有暑泄因受暑邪煩渴尿赤自汗面垢暴瀉如水宜茹苓湯桂苓甘露飲或以生薑炒黃連為君葛根升麻佐之若暑邪留伏於中以致久而成泄其病更甚宜玉龍丸若盛暑傷於外陰冷傷其中則為內外受迫宜連理湯又有傷酒泄素嗜酒而有積或一時酒醉而成病其症骨立不能食但飲一二杯經年不愈宜葛花解酲湯又有滑泄其泄不禁瀉久不止大孔如竹筒日夜無度宜固腸丸其或滑由氣虛陷下者宜補中益氣湯或大腸滑泄而小便精出者宜方全丸皆不可忽又有飧泄夕食曰飧食之難化者尤重於夕故此之飧泄專主夕食不化而泄言之與前所列諸飧泄不同說此症惟奪其食則一日可止再以藥滋養元氣宜八仙糕又有腎泄即五更泄一名晨泄又名瀼泄固由於腎虛失守藏之職宜補骨脂五味子山萸肉桂茴香山藥茯苓等每日清晨用大栗十枚煮食神效而亦有由於食者宜香砂枳朮丸有由於酒者宜葛花解酲湯有由於寒者宜理中湯夜飯前服又有脾腎泄由二經並虛朝泄暮已久而神瘁肉削宜四神丸又有暴泄太陽傳太陰大腸不能固禁卒然而下大便如水其中有小結糞硬物欲起又下欲了不了小便多清或身冷自汗氣難布息脈微嘔吐此寒也急以重藥溫之宜漿水散又有久泄厥陰經動下利不止脈沉遲手足厥逆涕唾膿血此症不易治大法以為風邪縮於內宜汗之是也宜桂枝麻黃湯亦有由真陰虛損元氣下陷而成者若非滋其本原則必胸痞腹脹小便淋澀多致不救宜四神丸補中益氣湯凡泄瀉之病止於此矣而治法亦靡有遺者士材九種治泄之法亦當參看說升提淡滲清涼疏利甘緩酸收燥脾溫腎固澀皆治泄者所不能外惟在酌其輕重緩急以用之耳總之此症不論新久皆太陰受病不可離白朮白芍甘草若四時下利者於前三藥外春加防風夏加黃芩秋加厚朴冬加附桂又必詳外症寒熱如手足逆冷自汗氣微雖暑亦可量投薑桂如燥渴煩熱悶亂脈實雖冬亦可酌用硝黃此又當權衡於臨時者也若老人諸泄則又不得拘滲泄分利之法以人生五十後升氣少降氣多滲泄分利是降而益降益其陰而重竭其陰也必用升提陽氣之品宜升麻柴胡獨活防風甘草佐以白朮附子補骨脂所謂濕寒之生以風平之又曰下者舉之是也至如飯後即便乃脾腎交虛之故耳說人惟脾與腎相濟所以有水谷之分若脾雖強盛能食而腎氣不足真火不能上行為胃腐熟水谷故飲食下咽不能消化留滯大府因成飧泄治之者惟使脾腎之氣交通宜神二神丸空心鹽湯送下則水谷自然剋化而此患除脈法靈樞曰病泄脈洪而犬者為逆素問曰泄而脫血脈實者難治正傳曰泄瀉脈緩時小結者生浮大數者死醫鑑曰泄瀉脈多沉傷風則浮傷寒則沉細傷暑則沉微傷濕則沉緩回春曰瀉脈多沉沉遲寒促沉數火熱沉虛滑脫暑濕緩弱多在夏月泄瀉症治經曰犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受入六府陰受入五臟入府則身熱不時臥上為喁吁入臟則填滿閉塞下為飧泄久為腸澼又曰大風人中則為腸風飧泄又曰倉廩不藏者是門戶不要也忡景曰大腸有寒則多鶩溏有熱則便腸垢入門曰腸垢言濕熱滯於腸中故亦曰滯下又曰凡泄皆兼濕初宜分利中焦滲利下焦久則升舉必滑脫不禁然後用澀藥止之又曰治泄補虛不可純用甘溫甘則生濕清熱亦不可用太苦苦則傷脾惟淡滲利竅為妙濟生曰治瀉之法先當分利水谷車前子煎湯調五苓散次則理正中焦理中湯治中湯治之二湯不效然後方可斷下用固腸丸石脂餘糧丸正傳曰治瀉諸藥多作丸子服之原病曰泄症凡谷肉消化不論色及他症便斷為熱夫寒泄而谷肉消化者末之有也或火性急速傳化失常完谷不化而為飧泄者間亦有之仲景謂邪熱不殺谷然熱得濕則為飧泄也醫鑑曰暴瀉非陽久瀉非陰通治用三白湯及燥濕湯辰砂益元散泄瀉宜升陽東垣曰暑月淋雨人多泄瀉乃濕多成五泄也經云在下者引而竭之又曰治濕不利小便非其治也法當以淡滲之劑利之然客邪寒濕之生自外入裡而甚暴若用利小便藥則是降之又降復益其陰而重竭其陽也滋以升陽之藥是為宜耳羌活獨活升麻各一錢半防風炙甘草各一錢煎服即愈也瀉與痢不同丹溪曰泄瀉之症水谷或化或不化並無努責惟覺困倦若痢不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相雜雖有痛不痛之殊而皆裡急後重逼迫懍懍赤白交下為異久泄成痢集咯曰太陰受濕而為水泄虛滑身重微滿不知谷味久則傳變而為膿為血是脾傳腎謂之賊邪故難愈若先痢後泄是腎傳脾謂之微邪故易愈靈樞曰腹鳴而滿四肢清而泄脈大是逆也不過十五日死又曰腹大而脹四末清脫形泄甚是逆也不及一時死脈經曰飧泄脈大手足冷難已脈小手足溫易已便色靈樞曰腸中寒則腸鳴飧泄熱則出黃如靡東垣曰瀉白為寒青黃紅赤色皆熱也或以青為寒者誤也傷寒少陰病了利純青水者熱在裡也利色紅者為熱心火之色或赤者熱之甚也色黑火熱亢極反兼水化也入門曰濕多成五泄如水傾下也治泄瀉方三十四平胃散風泄蒼朮厚朴陳皮甘草六一散熱泄滑石甘草胃苓湯又蒼朮厚朴陳皮甘草白朮茯苓豬苓澤瀉肉桂附子理中湯寒泄附子人參白朮甘草乾薑閃君子湯虛泄人參茯苓白朮炙甘草四苓湯濡泄茯苓白朮豬苓澤瀉升陰除濕湯又蒼朮柴胡防風羌活神麯陳皮豬苓澤瀉麥芽升麻炙甘草胃風湯胄泄人參白朮茯苓當歸白芍肉桂香茹湯脾泄香茹厚朴黃連扁豆子桂苓甘露飲暑泄滑石二兩赤苓澤瀉石膏寒水石甘草各一兩白朮肉桂豬苓各五錢每末一錢加蜜湯下漿水散暴泄半夏二兩炮薑肉桂附子炙甘草各五錢良薑二錢半每末五錢煎服大承氣湯小腸泄大黃芒硝厚朴枳實去芒硝即小承氣湯黃連解毒湯又黃連黃柏黃芩山梔芍藥柏皮丸又黃連黃柏當歸白芍八正散大瘕泄瞿麥扁畜木通山梔車前子大黃滑石甘草燈心治中湯食泄人參白朮甘草生薑青皮陳皮二陳湯痰泄茯苓甘草半夏陳皮吳茱萸湯又吳萸生薑人參大棗車前子湯水泄厚朴澤瀉車前子黃芩芍藥湯火泄黃芩芍藥甘草玉龍丸暑泄硫黃硝石滑石明礬連理湯又人參白朮甘草乾薑黃連茯苓茹苓湯又澤瀉二錢二分豬苓赤苓白朮扁豆子薑黃連香茹厚朴各一錢甘草三分八仙糕飧泄枳實白朮山藥各四兩楂肉三兩茯苓陳皮蓮肉各二兩人參一兩粳米五升糯米一升半共為末蜜三斤各蒸作糕焙乾萬全丸滑泄赤石臘炮薑各一兩胡椒五錢醋糊丸空心米飲下五七丸補中益氣湯久泄葛花解酲湯酒泄葛花青皮木香橘紅人參茯苓豬苓神麯澤瀉白朮乾薑香砂枳朮丸腎泄木香砂仁枳殼白朮四神丸脾腎泄肉果補骨脂吳萸五味子石脂餘糧丸斷下固腸丸滑泄龍骨附子訶子活礬丁香石脂良薑蔻仁砂仁木香糊丸三白湯通治白朮白芍茯苓炙草此為治瀉要藥燥濕湯又白朮白芍茯苓陳皮炙草此即三白湯加陳皮一味也二神丸飯後便補骨脂四兩肉豆蔻生二兩共為禾肥棗四十九個生薑四兩切片同棗煮去薑棗肉丸空心鹽湯下三五十丸一方肉蔻煨熟
