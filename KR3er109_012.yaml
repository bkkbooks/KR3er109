body:
  text: 卷十二六淫門風病源流毒風論經曰諸暴強直支痛緛戾裡急筋縮皆屬於風此厥陰風木為肝膽之氣乃臟氣所主之風也若八方之風不正則為邪氣故中於人而為病而其中人有四時之勝氣而襲之者如春勝長夏為木尅土長夏勝冬為土尅水以所勝入也有隨時隨臟而為病者以內氣不守外邪得入也故春病在頭善鼽衄夏病在臟善病胸脅長夏病在脾積風為寒善洞泄寒中秋病在肩背暑汗不出風襲腠膚善風瘧冬病在四肢善脾厥原其然者人之精為真陰為元氣之本惟冬藏精則內實雖夏之暑邪亦汗出而不得入若冬不藏又暑汗不出閉藏疏泄之道俱失則春溫夏熱秋瘧隨時隨臟而病矣此風邪所化之由也然風入五臟其症狀固各不同肺受風多汗惡風色皏然白善咳短氣晝猶與衛氣和而少差暮則與陰入內而劇診在眉上白色心受風多汗惡風善怒赫色赤風火相搏木火交熾神志昏亂故也心病則舌本強必言不快其診在口肝受風多汗惡風色微蒼肝本為風風反勝之則內氣不勝故多悲木氣動又多怒陰器病則妒陰妒陰者時憎女子也其診在目下脾受風多汗惡風色微黃土為風木所尅必身體怠惰四肢不欲動風勝土疏必不化食其診在鼻腎受風自汗惡風面龐然浮腫以邪入腎挾水氣上升故腫也脊痛不能正立以腎在其部也炲氣見以腎活也隱曲不利以腎氣傷也其診在肌上五臟受風不同病由以異如此然風之中人治必當早遲則五臟相傳以至於死如人初感風毫毛直皮膚閉而為熱是時當汗發之即己即或痹不仁腫痛可湯尉火灸之惟弗治病遂入舍於肺以自表入裡必先於肺風寒閉於此而不行故為肺痹發咳而喘急也然此猶在可發之時又弗治即從所尅而傳於肝為肝痹脅痛而出食也猶可治也又弗治再從所尅而傳於脾風熱相乘而為脾痹內則中熱煩心外則肌體出黃然此猶可藥之浴之以解表裡之風熱也又弗治再從所尅而傳於腎為疝瘕疝瘕者聚氣而痛之名少腹冤熱而痛出白而煩熱也邪聚下焦溲出白濁以熱結不散虧蝕真陰如蠱之吸血故名曰蠱此濁病名非蠱脹病名非蠱脹病也然此猶可治也又弗治再從所尅而傳於心筋脈相引而急病名曰瘈以心主血脈心病則血燥筋脈相引則手足攣掣是以名瘈也夫邪氣至心其病已極五臟氣皆息能無死乎此五臟相傳之次也有內傷而適與風邪會因加而發者此必嘗有所傷或傷濕而留於分肉血脈或墜跌打撲惡血留而不去或卒然喜怒不節氣有所逆或飲食失宜內有所傷或寒溫不時腠理閉而衛氣不通其開而冒露於風寒則邪在前風寒繼之二者相值則血氣凝結而為寒痹其或因熱而汗出受風雖非外感之邪風邪氣因加而發所謂合邪也夫邪之中人雖各有所入要歸於三部喜怒不節則傷臟臟傷病起於陰一也清濕襲虛則病起於下二也風雨襲虛則病起於上三也至於淫佚不可勝數然受病之始只在此三部故風雨寒濕不得虛邪不能獨傷人總之風善行而數變其傷人為病變態不一如風藏皮膚之間內不得通外不得泄又善行數變腠理開則衛失守而灑然寒玄府閉則陽內壅而熱煩悶其病則為寒熱矣至寒能衰飲食熱能消肌肉又寒熱交作之劇者矣又如風襲陽明入胃胃居中焦其脈上至目內眦其人肥邪不得正則目黃而留為熱中宜三黃丸加連翹梔子薄荷其人瘦外泄而寒則變為寒中矣宜加減白通湯又如風與太陽俱入行諸脈哄散行分肉之間與衛相犯能使肌肉䐜而生瘍氣凝不行能使肌肉不仁或胕熱其氣不清能使鼻柱壞而色敗皮膚瘍潰客於脈而不去其病則為癘風矣夫病至癘風風之入也深矣宜消風散追風散靡風丸換肌散毒瘡說附後若風中五臟六腑之哄則亦各入其門戶隨哄左右而偏中其病則為偏風矣宜全生虎骨散舒筋保安散以至循風府而上人腦戶其病則為腦風矣宜太陽丹神聖散飲酒後玄府易開而中之其病則為漏風矣宜白朮散葛花解醒湯入房汗出內耗其精而中之其病則為內風矣宜加味大補湯新沐後毛孔開而中之其病則為首風矣宜白芷丸風不散傳變而入大腸其病則為腸風而熱則下血宜清臟湯加減四物湯寒則食泄矣宜附子理中湯八仙糕且在腠理汗泄不止其病則為泄風矣宜玉屏散小建中湯病雖異名皆風之變然首風漏風泄風三症狀尤奇特首風則因沐而風中頭面故多汗惡風止作無時凡於風氣所發必先一日而甚頭極痛以陽性先而速也先至必先衰故次日少愈漏風則常多汗不可單衣食則汗出以風邪挾酒則陽氣散越故多汗也陽勝則身熱不惡寒故不可單衣也食長陽氣故食則汗出也甚或陽獨盛於上而喘息汗出不止而衣濡陽盛陰虛而口乾善渴身不能勞皆患漏風者所必見之狀泄風則表既不固而汗出如漬津涸故口乾液涸血虛故不能勞而身盡痛且汗多亡陽故令人寒也此風所部而受病之狀有不同也要之風為百病長凡寒暑濕燥火五者皆從風而入而風之為邪又有寒熱剛柔之不一則治之豈易事哉然古人云治風先治血血行風自滅固為治風疾者一定之法也脈法仲景曰脈浮而大者曰風又曰脈浮而數中風使然脈訣曰浮脈主表府病所居有力為風無力血虛浮遲表冷浮數風熱浮緊風寒浮緩風濕風病原由症治內經曰邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也又曰邪之所湊其氣必虛留而不去其病則實入門曰傷風則涕流鼻塞聲重又曰傷風症入肺者居多宜辛溫或辛涼之劑散之宜參蘇飲衝和散防風衝和湯又曰有汗而惡風此真感風症也醫說曰邪之中人或中於陰或中於陽上下左右無有恆常人方虛時及新用力飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經鰲按以上言外感之風病河間曰風病多因熱盛熱者風之體也風生於熱以熱為本而風為標也凡有風者即風熱病也內經曰風者百病之長也至其變化乃為他病丹溪曰凡濕生痰痰生熱熱生風鰲按以上言本氣之風病諸風病名醫說曰頭風多白屑毒風面上生瘡刺風狀如針刺腰痛如錐癇風急倒作聲發搐急緩頑風不識痛癢癧風頸項斑剝暗風頭旋眼黑不辨東西㾴風面生米點肝風鼻悶眼瞤兩瞼赤爛偏風口眼嘴斜節風肢節續斷指甲脫落脾風心多嘔逆酒風行步不前肺風鼻塞項疼膽風令人不睡氣風肉如蟲行腎風耳內蟬鳴陰間濕癢寒濕腳氣癱風半身不遂瘓風手足拳攣胃風不伏水土虛風風寒濕癢腸風脫肛瀉血腦風頭旋偏痛賊風發聲不響産風四肢疼痛骨風膝腫如槌膝風腿骨痛心風健忘多驚盛風言語蹇塞髓風臂膊酸疼藏風夜多盜汗血風陰囊濕癢烏風頭面腫塊皮風赤白瘢癬肌風遍體瘙癢體風身生腫毒閉風大便燥澀軟風四肢不舉緑風瞳人開大青風吐極青盲虎風發吼羊叫大風成片爛瘡附録毒風論起潜大弟婦患毒風一載有餘醫藥罔效商所以治之者故為論其源流並酌方劑論曰遍考方書瘋癬癘癩天泡楊梅棉花等瘡總皆有毒不但楊梅為毒瘡已也其獨稱楊梅為毒瘡一切瘋癬等不加以毒之名者亦世人傳習之故耳一切瘋癬等所受之毒或感天地診戾之氣或感山溪鬱遏之氣或感蛇虺蠱厲之氣此等氣由風飄蕩壯盛人觸之不侵虛弱人觸之即受而所受之處何經虛即何經受之當時不覺積久鬱於經絡淪及筋骨侵及肌肉則為一切瘋癬等恙發時又各因所發之經各有見症處且不特天地山溪蛇虺有毒也即尋常風寒暑濕之氣人受之久亦鬱為毒故有風毒寒毒暑毒濕毒之名受之輕者不過疥瘡等類受之重者即為一切瘋癬等恙無足怪也更不特風寒暑濕有毒也即如藥餌中草根樹皮及一切飲食之物亦皆有毒故又有藥毒食毒之名人有病偶服藥用之的當病即當之雖毒而人不受害若用違其性即病不能去而毒反留於身中久必發現為一切瘋癬等恙飲食不能節省不能顧忌亦然此一切瘋癬等恙為必有毒無足疑更無足怪也不知者每因傳習楊梅為毒瘡一語專以毒之一字歸於楊梅其他瘋癬等皆不敢以毒字加之一若提起毒字即如生楊梅瘡者故在醫家必諱而傳會之在病家必違而隱瞞之在旁人聞毒之一字亦且驚且怪以為何來此恙總皆不明之故也夫楊梅毒有由感受者有由傳染者一切瘋癬等恙亦能傳染人若非有毒何由傳染乎且非有毒何至筋骨脹急肌肉疼痛乎脹急疼痛既皆為毒寧有可不去之者乎然而去之未易矣其脹於筋骨者匪朝伊夕欲去之非使筋骨一清不可疼痛於筋骨者匪朝伊夕欲去之非使肌肉一松不可清之松之計惟有瀉之一法雖然瀉又難言之千金子乎巴豆霜乎恐瀉之不勝血氣愈耗精神愈敗也且用此等瀉只可暫時不可久行暫時之瀉毒之鬱於經絡淪及筋骨侵及肌肉者斷不能一時盡去既不能一時盡去亦徒耗其血氣徒敗其精神雖因一瀉毒亦稍去而餘毒仍鬱經絡也仍淪筋骨也仍侵肌肉也且稍去之時筋骨之脹急亦暫緩肌肉之疼痛亦暫止逮又久焉鬱於經絡者必更甚淪於筋骨者必更甚侵於肌肉者必更甚何也以未瀉之前血氣還充精神還實所謂鬱經絡淪筋骨侵肌肉者猶有血氣精神以禦之其為毒猶可言既瀉之後血氣耗精神敗所謂鬱經絡淪筋骨侵內肉者更無血氣精神以當之毒之浸灌橫決恐非言語可罄也雖然暫瀉尚不可可久瀉乎夫久瀉誠不可也計惟有瀉而不瀉之一法庶得血氣弗耗也庶得精神弗敗也血氣弗耗精神弗敗雖瀉無傷也雖久瀉無傷也何也瀉而不瀉也且瀉則可使毒去久瀉則可使毒盡去毒去而病自痊矣既不耗血氣既不敗精神毒去病痊而身可安矣況乎瀉而不瀉之時不但不耗其血氣並須養其血氣也不但不敗其精神並須助其精神也夫荀於瀉之時反能養其血氣助其精神亦何畏何疑而不瀉乎何畏何疑而不久瀉乎而又非行瀉之藥即能養其血氣助其精神也夫行瀉之藥何藥曰大黃行瀉而可久用之藥何藥曰九製大黃說大黃為將軍性猛速九製則將軍之性已除能使經絡筋骨肌肉間之積毒逐漸掃除而又無泄利之患且大黃雖瀉只行胸以下之積九製則自胸臆上至巔頂皆能追而去之以所製大黃以酒為主而酒氣上升故也且大黃行瀉有排山倒海之能用酒九製則性和緩不見其排倒而自覺其消磨故熟思病情病勢非用瀉而不瀉不瀉而瀉之九製大黃斷必不為央說以病者之性情日常多膠執十餘年來偏信無識無能說鬼話賺錢財之草頭郎中非挑箭風即針寒濕挑之針之之外又多服草頭藥已經十有餘載前所云草根樹皮皆有毒者在官料且然況於山野間採來本草不載之物有不毒者乎在採之者不計其毒不毒止欲為賺錢之計在服之者亦不問其毒不毒止欲冀其有益於身故積久服之而毒之凝聚不散者遂發為此症也此餘歷年來在家庭間親見情勢而直可斷為毒盛者也此症既由於毒而發現之初僅生頂發中以後漸及遍體今春病劇至臥不起渾身腫痛四肢不仁可見毒發以漸至此已為沉重非謀所以治之之方勢將為難療也春初脈象右寸關洪數弦大餘俱澀滯二月盡以來獨左關洪數餘皆濡弱近日愈多煩躁火性太甚肝風煽烈毒氣掀騰更可即脈即症而知之者也至於瘡形或大或小或成粒或成片其色紫而帶黑其形稍腫而浮既非若楊梅之掀紅濕爛如鼓釘如葡萄如棉花更非若癘風之潰癩零落如白雪如紫云而又兼似葡萄紫云等樣則謂之楊梅瘡固不可竟謂之紫云瘋亦不可而古人有毒祲成瘋之語說指如此症而言之也因古人有毒祲成瘋之號後世即約之為毒瘋二字此不在麻瘋癩瘋等例之內參考前賢治法惟丹溪最善其要雖分上下開手總以追取惡物蟲積為始然後隨症輕重因人強弱而調治之然猶諄諄致誡曰此疾雖治難愈若不絶嗜斷欲皆不免再發而終於不救可見此症之不可輕視而治之矣茲因病者誼關骨肉他人尚且醫救何況一家故積日夜思維總必以瀉而不瀉為主特製大黃再酌餘品成劑以治之以口舌所及一時難悉聽者又不能詳故特筆而書之以付起潜大弟其細審餘言庶於此病得救而亦不負吾拯治之心也所酌前後服方開附於後戊子春三月沈金鰲書治風病諸藥要品及方二十四升提發散升麻川芎防風葛根羌活香白芷柴胡紫蘇荊芥前胡獨活北細辛生薑藁本蔥白薄荷甘菊辛溫發散桂枝麻黃羌活防風白芷吳茱萸乾薑細辛獨活藁本川芎杜蘇子蔥白橘皮清涼發散薄荷麥冬知母竹葉甘菊金石斛石膏連翹蟬退牛蒡子三黃丸熱中黃連黃柏大黃加減白通湯寒中附子乾薑肉桂人參白朮半夏炙草草豆蔻此方兼治沉寒痼冷臍腹冷疼大便自利足脛寒而逆消風散癘風白芷全蠍人參各一兩每末二錢勿食晚飯次日空心溫酒調下身上微燥為效此方第一日服追風散又大黃六兩鬱金兩六錢皂角刺兩半共為末初服五錢或六錢入大風子油一錢半朴硝少部溫酒一碗調化五更空心服直待辰時又調藥酒一碗入熟蜜少部勿令患人知先以水盥漱淨然後服藥必以蜜解口切不可臥良久痛瀉數次以稀粥補之此方第二日服此藥老弱者難治五十以下者可治精神壯旺者十日內三服謂如初一日服消風散初二日服追風散初三日服磨風丸又如此周而復始瘦弱者十日內一服磨風丸又當歸川芎羌活獨活天麻細辛防風荊芥威靈仙麻黃首烏蔓荊子牛蒡子車前子豨蘞草蒼耳草各一兩曬乾為末酒糊丸溫酒下五十丸此方第三日服日二帖用燻洗敷糝藥燻洗藥地骨皮荊芥苦參細辛各二兩河水煎用大桶盛浸浴燻洗通身出血為度敷糝藥寒水石活礬硫黃各二兩蛇床子一兩朴硝五錢共為末臘豬油調敷燻洗敷糝二能治滿身瘡爛如神換肌散又烏蛇白花蛇地龍各一兩當歸細辛白芷天麻蔓荊子威靈仙荊芥穗甘菊苦參紫參沙參木賊草不灰木炙草白蒺藜天冬赤芍赤箭首烏石菖蒲胡麻子草烏蒼朮木鱉子川芎各二錢半每末五錢溫酒調下酒多為妙如無紫參不灰木亦可此方專治大風年深毛脫鼻塌深重者如神全生虎骨散偏風當歸兩半赤芍續斷白朮藁木虎骨各一兩烏蛇肉五錢每末二錢食後溫酒調下骨中疼痛加生地一兩此方專治半身不遂肌肉乾瘦名曰偏活舒筋保安散又木瓜五兩萆薢五靈脂白薑蠶牛膝川斷烏藥松節白芍天麻威靈仙黃芪當歸防風虎骨各一兩以好酒一升浸瓶中封口二七日取藥焙乾為細末每二錢以所浸藥酒半盞調服如酒完以米飲下此方能治左癱右瘓筋脈拘攣走注疼痛神聖散腦風葛根半生半炒麻黃細辛藿香葉各等分每末二錢荊芥薄荷酒下太陽丹又石膏二兩川芎川烏白芷甘草各一兩冰片二錢煉蜜同面糊丸每兩作十八丸黃丹為衣食後蔥茶嚼下二三丸腦寒之病皆因邪攻上焦令人頭痛晝夜不寧也惟此藥主之白朮散漏風防風二兩半白朮兩二錢牡蠣三錢每末二錢溫水下葛花解醒湯又葛花砂仁白豆蔻各五錢青皮三錢白朮乾薑神曲澤瀉各二錢人參茯苓豬苓陳皮各一錢半木香五分每末三錢白湯下得微汗則酒病去矣加味大補湯內風蜜黃芪人參白朮酒當歸茯苓白芍熟地各七分酒牛膝烏藥酒杜仲木瓜防風羌活獨活苡仁各五分附子肉桂沉香甘草各三分薑三棗二此方兼治氣血大虛左癱右瘓大川芎丸首風川芎四兩天麻一兩蜜和每兩作十丸每丸細嚼茶酒任下白芷丸又白芷不拘多少夢卜汁浸曬乾為末蜜丸彈子大每丸細嚼茶或荊芥湯下此方專治沐浴後眩暈頭痛令人目明凡暴寒乍暖神思不清頭目錯暈皆宜服清臟湯腸風生地一錢酒當歸黑地榆各八分黃芩黃柏山梔各七分白芍黃連阿膠側柏葉各六分炒槐角川芎各五分加減四物湯又川芎當歸生地側柏葉各一錢枳殼荊芥槐花炙甘草各五分薑三片烏梅一個此方能治腸風兼治便血附子理中湯又附子人參白朮乾薑炙草八仙糕又玉屏風散泄風白朮二錢半黃芪防風各一錢二分防風黃芪實表氣白朮燥內濕故效小建中湯又白芍五錢桂枝二錢炙草二錢薑五片棗四枚煎至過半去渣入飴糖一兩煎化服之芍藥味酸於土中瀉木為君飴糖甘草之溫補脾養胃為臣水挾木勢亦來侮土故或脈弦而腹痛桂枝辛熱佐白芍以去寒水薑棗甘辛溫發散陽氣行於經格皮毛為使建中之名始於此焉此方兼治虛勞裡急腹痛夢寐失精四肢酸疼手足煩熱咽乾口渴黃芪建中湯即本方加黃芪也治虛勞自汗及病後熱不退當歸建中湯即本方加當歸一兩也治血虛自汗桂枝附子湯即本方用桂枝五錢加附子半枚也治自汗漏不止每服七錢薑七棗二煎服參蘇飲外感人參蘇葉葛根半夏前胡桔梗枳殼陳皮茯苓甘草木香衝和散又蒼朮四錢荊芥二錢甘草一錢此方專治四時感冒風寒防風衝和湯又羌活防風各錢半白朮川芎白芷生地黃芩各一錢細辛甘草各五分薑三片蔥白三個一名加減衝和湯此方專治春夏秋感冒風寒頭痛身熱自汗惡寒脈浮緩附録沈氏毒風方五此皆餘自製方也沈氏毒風第一方始服九製大黃三錢薑製川烏六分炒全蠍三枚去毒蟬退十枚去翅足皂角刺二分苦參一錢白蒺藜炒三錢川連五分羌活七分獨活七分加豬胰子一兩服四帖後再服第二方忌食雞鴨魚蝦雞子鴨子韭芛蔥蒜一切生冷腥膩辛辣之物不忌則服藥不效最切房欲慎之慎之沈氏毒風第二方次服九製大黃三錢全當歸酒洗二錢赤芍三錢防風錢半羌活七分蟬退去翅足七枚荊芥穗錢半川連三分犀角四分黃芩一錢萆薢錢半木通七分加豬胰子六錢服十帖再服第三方或八帖或六帖總視病勢之輕減與否可也沈氏毒風第三方又次服九製大黃一錢當歸錢半川連二分羌活五分白蒺藜三錢防風一錢生首烏二錢木香三分加豬胰子四錢服十帖或八帖或六帖看病勢若能減去過半便服下丸藥沈氏毒風丸後服九製大黃三兩大生地二兩製首烏白蒺藜川山甲木瓜全當歸羌活牛蒡子胡麻便香附威靈仙鑽地風絡石各一兩豨蘞草皂角刺天麻苦參赤芍白芷丹參防風川芎荊芥獨活大風子肉川斷地骨皮秦艽各八錢茯苓皮桂枝陳皮柴胡蔓荊子元參沙參漢防己木通各七錢石菖蒲紅花遠志各五錢川烏草烏白花蛇各四錢木香瓜蔞仁生鬱金各三錢細辛白蔻仁各二錢共製為末棗肉為丸空心米湯下二錢壯盛人加至三錢如服一料未全愈即兩料三料亦可此方共用藥四十九種取七七之數也加棗肉為丸共成五十又符大衍之數也大衍之數五十其用四十有九今選四十九藥合丸共五十則體用兼備元氣渾淪又得少陽生長之氣以之治病何患不痊乎金鰲自志又此方不但治毒風並可治大麻瘋須眉俱落者紫靈瘋遍身腐爛者亦無不效沈氏洗風方常洗桃枝柳枝槐枝忍冬藤地骨皮松毛苦參皂莢各一兩皮硝二錢以河水煎湯盛桶內燻洗始則數日一次至後則半月或二十日一次將洗時務必先進飲食切不可空腹恐精神慮乏也感冒源流即傷風感冒肺病也元氣虛而腠理疏也經曰虛邪賊風陽先受之說風者天之陽氣其乘於人則傷衛衛者陽也故曰陽先受之衛又即氣也肺主氣脾生氣故傷風雖肺病而亦有關於脾以脾虛則肌肉不充肺虛則玄府不閉皆風邪之所由以入也說以風為百病長善行數變無微不入十二經十五絡五臟六腑皆能受風而為病或經絡受之由皮毛而入肌肉入腑或由口鼻受之而入胃入腸或入骨空肢節而必火與風易合肝木與風易引肺金在至高尤易感又況頭頂招風眼招風四肢受風濕古人云避風如避箭雖風之正者猶須避之況其為厲為邪者乎是故風感人於不覺初治則易散久則漸入於內六淫之邪每因緣以作難風固不可不慎治風亦不可不審也吾故論文風邪襲人不論何處感受必內歸於肺其症或頭疼身熱輕則否鼻必塞兼流清涕必惡風惡寒或聲重或聲啞甚者痰壅氣喘合口不開咳嗽咽乾自汗脈浮而緩此外感也春夏治以辛涼宜茶調散柴胡升麻湯秋冬治以辛溫宜參蘇飲人參敗毒散則肌表解而邪從汗散矣或素有痰熱壅遏於太陰陽明之間內有窠囊風邪易入若為之招引者昔人所謂風乘火勢火借風威互相鼓煽者此內因也治必以辛涼外發甘苦內和宜羌活衝和湯防風通聖散斯正不傷而邪自去矣又有重衣厚被肺因壅熱生風而在外風邪又適與之相襲其症亦聲重鼻塞咳嗽咽乾音啞此內外因也治以甘苦辛涼兼升散之品宜桔梗湯上清散菊花散邪自由內達外而解矣至有風熱兼傷者或先感風又受熱或先受熱又感風一時交發貴審其輕重而治之宜桔梗湯上清散菊花散或加味二陳湯若久而不愈其人必虛固不得專用疏散也陽虛宜加參朮陰虛宜加地黃五味倍門冬白芍然則感冒之症雖若輕微而要豈可忽視者乎脈法仲景曰脈浮而大者曰風又曰脈浮而數中風使然脈訣曰浮數風熱浮緊風寒浮緩風濕傷風症治入門曰傷風症屬肺者多宜辛溫或辛涼之劑散之戴氏云新咳嗽鼻塞聲重是也又曰有汗而惡風此真感風症也陶節庵曰惡風者風邪傷衛腠理不密由是惡風悉屬於陽非比惡寒乃有陰陽之別者有汗惡風脈浮緩者當解肌隨時用藥惡風發熱兼喘者羌活衝和湯若發汗太過衛虛亡陽遂漏不止惡風脈浮者桂枝湯加朮附惡風小便難四肢拘急難以屈伸者同上若風濕惡風不欲去衣骨節痛汗出短氣小便不利身微腫者甘草附子湯汗後七八日不解表裡俱熱時時惡風大渴舌乾燥而煩者人參白虎湯仲景曰太陽傷風其脈陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔桂枝湯主之又曰太陽兩傷風寒其脈浮緊發熱惡寒身痛不汗出而煩躁者大青龍湯主之活人書曰發熱惡寒煩躁手足溫為傷風候脈浮緊為傷寒脈是傷風見寒脈也若寒多熱少不煩躁手足微厥為傷寒候脈浮緩為傷風脈是傷寒見風脈也說脈似桂枝反無汗症似麻黃反煩躁是也導引法保生祕要曰先擦手心極熱按摩風府百餘次後定心以兩手交叉緊抱風府向前拜揖百餘俟汗自出勿見風定息氣海清坐一香飯食遲進則效矣運央保生祕要曰凡頭疼目脹背脹腰脹膝酸發熱者當先守艮背入定後用行庭運至風府用意繞回百度直行泥丸亦旋百度後分兩路旋眼胞漸入瞳人百度至鼻柱合行亦旋入深處多旋一會接上鵲橋經重樓行胸腹止於氣海睡時以兩手捻孩兒印兩腳屈指咬緊牙關意在氣海旋繞或繞入黃庭注念練至心純不覺真意自旋一貫前後間行邪氣無不散者疼脹自止或以手指於腦上著力分兩邊摩之及耳根處以指甲捻之至疼有導引之央治感冒方十五柴胡升麻湯春夏柴胡前胡升麻赤芍桑皮黃芩葛根荊芥石膏茶調散又茶葉川芎黃芩白芷薄荷荊芥參蘇飲秋冬人參蘇葉葛根半夏前胡桔梗枳殼陳皮茯苓甘草木香人參敗毒散又人參羌活桔梗柴胡前胡獨活川芎枳殼陳皮茯苓甘草羌活衝和湯內因羌活防風蒼朮甘草白芷生地川芎黃芩細辛薑防風通聖散又防風連翹川芎麻黃薄荷白荷當歸大黃黃芩桔梗石膏荊芥山梔白朮滑石甘草桔梗湯內外因桔便香附山梔黃芩川貝母知母前胡熱鬱湯又連翹薄荷黃芩麥冬瓜蔞實甘草竹葉鬱金上清散風熱元參薄荷荊芥甘草大黃歸尾桔梗陳皮黃芩枳殼川芎菊花散又甘菊防風羌活枳殼石膏蔓荊子旋覆花加味二陳湯又半夏陳皮當歸茯苓積實桔梗杏仁各一錢砂仁五分黃芩山梔各七分蘇子甘草各六分桂枝湯過汗桂枝白芍甘草甘草附子湯風濕甘草附子人參白虎湯汗後人參石膏知母甘草粳米凡用此方先煎石膏數十沸再入米及藥以米熟為度溫服大青龍湯兩傷麻黃去節桂枝炒杏仁石膏甘草薑三片棗二枚此方專治太陽中風脈浮緊惡寒發熱身疼痛不汗出而煩躁此傷風見寒脈者亦治傷寒脈浮數身不痛但重乍有輕時無少陰症此傷寒見風脈者陶節庵曰熱盛而煩手足自溫脈浮而緊此傷風見寒脈也不煩少熱四肢微厥脈浮而緩此傷寒見風脈也二者為營衛俱病法雖用大青龍湯此湯峻險不可輕用須風寒俱甚又加煩躁方可與之不若羌活衝和湯為神藥也一法用桂枝麻黃各半湯附桂枝麻黃各半湯桂枝白芍甘草麻黃杏仁薑棗中風源流中風風乘虛而為病也向來惟東垣主虛而河間則主火丹溪則主痰似乎各異不知惟虛也故無根之火發焉惟虛也故逆上之痰生焉特東垣舉其本河間丹溪各舉其標耳未有痰與火之發不由於虛者也且即河間主火而其論曰中風癱瘓非外中風邪亦非肝風獨盛由將息失宜心火暴盛腎水虛衰不能製之則陰虛陽盛而熱氣怫鬱心神昏冒筋骨不用卒倒無所知則其言腎水虛衰言陰虛陽盛中主乎火而論火之自發何嘗不以為由於虛乎丹溪主痰而其論曰西北氣寒為風所中誠有之矣東南氣溫多濕有風病者非風病也皆濕土生痰痰生熱熟生風也夫人身之氣根於脾主於肺茍脾氣充盛自能健運內因之濕何自生外來之濕何自感痰即不能為患矣然則痰之壅逆非由氣之虛弱不能健運乎亦可知曰火曰痰總由於虛虛固為中風之根也惟中風之病由於虛故腑虛則中腑臟虛則中臟血脈虛則中血脈而其症各別說中臟者病在裡多滯九竅有六經形症如唇緩二便閉屬於脾不能言屬於心聾屬於腎鼻塞屬於肺目瞀屬於肝邪之中較深治宜下之宜三化湯麻仁丸然亦不可過下以損榮血中腑者病在表多著四肢其症半身不遂手足不隨痰涎壅盛氣喘如雷然目猶能視口猶能言二便不祕邪之中猶淺且有六經形症如頭疼身熱項脊強屬於太陽目痛鼻乾不得臥屬於陽明口苦脅痛耳聾寒熱嘔吐屬於少陽腹滿自利咽乾屬於太陰舌乾口燥屬於少陰煩滿囊縮屬於厥陰而又有太陽經症無汗惡寒者宜麻黃防風杏仁甘草或有汗惡風者宜桂枝防風白芍甘草有陽明經症無汗身熱不惡寒者宜白芷石膏知母甘草或有汗身熱不惡風者宜桂枝葛根黃芩甘草有太陰經症無汗身涼者宜麻黃防風乾薑附子有少陰經症有汗不熱者宜麻黃桂枝杏仁防風附子甘草若無此四經之症在少陽厥陰二經則從二經治之宜柴胡黃芩連翹羌活甘草然以上種種形症不獨中腑為然即中臟中血脈者亦往往有之當臨時參酌為治惟中腑者必面加五色脈浮弦而多惡風大法必當汗之宜疏風湯小續命湯然亦不可過汗以損衛氣至如中血脈者病在半表半裡其症口眼嘴斜沉沉欲睡外無六經症狀內無便溺之危既不可汗又不可下惟以靜勝其躁以養血為主宜大秦艽湯養榮湯羌活愈風湯其有痿痹癱瘓頑麻或因痰而中宜滾痰丸三生飲龍星丹或因火而中宜涼膈散清氣宣風散或因暑而中宜香茹飲沈氏中暑湯或因濕而中宜行濕流氣散滲濕湯或因寒而中宜附子湯附子麻黃湯或因虛而中宜萬金湯寶回春湯或因氣而中宜木香調氣散順氣勻風散或因惡而中宜桃奴丸調氣平胃散雖所中之因不一皆為類中風說類中者卒倒偏活語言蹇澀痰涎壅盛皆與中臟腑血脈之真中風相類但無六經形症為異耳由中氣虛慮血液因而泣逆故虛風內煽至此生病也治必於補益藥中加治風之品宜以參芪為君歸地佐之加秦艽茯神竹瀝薑汁梨汁人乳最為穩妥雖然類中諸症既不可不別於真中風亦不得混於脫絶之症脫絶者何經曰中開者心絶手撒者脾絶眼合者肝絶遺尿者腎絶聲如鼾者肺絶皆由虛極而陽脫也若五症不全現者急用大劑參芪朮附進之或可救十中之一若誤服蘇合丸牛黃丸至寶丹活命金丹之類即不可救說古人製此等方藥皆辛香走竄為斬關奪門之將原為牙關緊塞兩手握固中臟之閉症而設故用牛黃入脾治肉麝香入腎治骨冰片入肝治筋惟邪氣深入者乃能驅出若施於中腑脫絶之症反掌殺人矣夫真中類中脫絶其各有別如此而士材於真中風又有分表裡分陰陽之說於中腑又有多兼中臟之說至為精審茲試撮其略曰真中風須分表裡病在表者照前六經形症治之在裡者便溺阻隔須下之宜三化湯若表裡俱見先解表後攻裡若內外邪已解而猶語言蹇澀半身不遂未能驟愈則以六君子湯為主加羌活防風秦艽當歸生地白芍久久服之榮衛自和此即古所稱大藥加麻黃即一旬之微汗加大黃即一旬之微利者是也如望春大寒之後則加人參半夏柴胡木通迎而奪少陽之氣望夏谷雨之後則加石膏黃芩知母迎而奪陽明之氣季夏濕土主令則加防己白朮茯苓生脾土之濕望秋大暑之後則加厚朴藿香官桂迎而奪太陰之氣望冬霜降之後則加桂附當歸勝少陰之寒又曰治中風須分陰陽陰中者或青或白或黑痰喘昏亂眩冒多汗甚者手足厥冷陽中者面赤唇焦牙關緊閉上視強直掉眩煩渴又曰中腑者多兼中臟如左關脈浮弦面目青左脅痛筋脈拘急肉瞤頭目眩手足不收坐踞不得此中膽兼中肝也宜犀角散左寸脈浮洪面赤汗多惡風心神顛倒語言蹇舌強口乾忡悸恍惚此中包絡兼中心也宜加味牛黃散右關脈浮緩或浮大面黃汗多惡風口嘴語澀身重怠惰嗜臥肌膚不仁皮內瞤動腹脹不食此中胃兼中脾也宜防風散右寸脈浮澀而短鼻流清涕面白多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也宜五味子湯左尺脈浮滑面目黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也宜獨活散士材之分晰施治如此詎非司命者所當加意哉總之治中風大法猝然昏倒必先順氣然後治風宜蘇合丸用竹瀝薑汁調灌如口不開急用吹鼻散吹入有嚏可治無則死亦須辨明氣血之所屬氣虛者右手足必不仁宜六君子湯加鉤藤薑汁血虛者左手足必不仁宜八珍湯加竹瀝鉤藤薑汁此其要法也若夫稟賦不齊七情異起六氣殊傷又難執一神明參活可也今將中風條款根由方治開列於後一曰口噤不開足陽明頷頰之脈急則口噤肝風乘胃故也急將皂莢乳香黃芪防風煎湯燻之然須大作湯液如蒸如霧乃得力南星冰片為細未擦牙齦或藜蘆鬱金末搐鼻或明礬一兩飛鹽五錢擦牙更用錢部棉裹安牙盡處甘草五寸截五段麻油浸透火炙抉口令咬之約人行十裡部又換一段從此灌藥甚便二曰口眼歪邪耳鼻常靜故風不作口眼常動故風易生搖風則血液衰耗無以養筋故筋脈拘急而口目為僻眦急不能卒視宜疏風飲急以桂技三兩酒煎濃汁以舊布浸之右歪拓左左歪拓右乳香二兩皂莢一兩燒煙燻之三曰語言蹇澀經曰足太陽脈貫舌本散舌下病則舌強又曰足少陰脈之正者係舌本又曰內奪而厥則為喑痱可見中風之正皆由腎脈之氣不能上循喉嚨挾舌本故不能言脾土不足痰涎湧盛而蹇澀故亦不能言也腎不足宜地黃飲子脾不足宜六君子湯至其所兼有緣風痰者宜滌痰有緣濕痰者清脾熱有緣迷心竅者清心火有緣風熱者清肝火有緣虛火上炎者壯水之主有緣虛寒厥逆者益火之原各隨症兼治之宜神仙解語丹滌痰湯八味丸加味轉舌膏隨所當用而施治四曰四肢不舉脈緩大有力者土太過也宜平胃散五苓散脈細小無力者土不及也宜補中益氣湯而或為血活筋急宜四物湯或為水旺風淫宜四物湯加防風鉤藤秦艽或為痰多宜六君子湯加秦艽天麻竹瀝薑汁五曰身體疼痛諸陽之經皆起手足循行於身體風寒客於肌膚始痹而痛宜蠲痹湯若挾濕熱宜當歸拈痛湯挾寒宜鐵彈丸挾虛皆是宜十全大補湯六曰痰涎壅盛肥人多中以氣盛於外而歉於內也人肥必氣急而肺盛肺金尅肝木故痰盛宜星香散二陳湯其有挾虛者宜上二方加參芪竹瀝有挾寒者宜上二方加桂附薑汁有實者宜木香湯送星香散有虛者宜六君子湯送星香散皆隨症酌治七曰遺尿不禁皆由脾虛下陷宜補中益氣湯加益智仁腎虛不能收攝也宜地黃飲子同生脈散八曰小便不利中風便不利說由自汗則津液外亡小便自少清熱止汗小便自行矣宜涼膈散當歸六黃湯九曰善飢善食風木太過凌虐中州脾土受攻求助於食法當瀉肝安脾則復其常矣宜青皮白芍湯十曰自汗盜汗或由於風多者宜桂枝湯或由於表虛者宜玉屏風散或由於陽氣虛者宜芪附湯皆宜順時審症至如盜汗更宜變通宜補中益氣湯送六味丸或當歸六黃湯作丸十一曰神氣昏瞀說由痰氣逆衛心主被障故昏不知人此係中臟而非中腑閉症而非脫症煎劑宜六君子湯加南星木香菖蒲遠志竹瀝薑汁丸劑宜至聖保命丹加減牛黃清肺心湯十二曰左癱右瘓說癱瘓及四肢頑麻骨節酸痛一切寒濕風氣與腎虛足膝無力治法皆同宜史國公酒其條款根由方治各各不同如此而前人又據經文分列中風四大法雖不外乎臟腑肢體間症治然其法亦不可不知一曰偏活即半身不遂由血氣偏虛邪氣留著於所虛之半邊阻隔脈道故手足活瘦骨間疼痛經言虛邪客於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏活是也而仲景又言言不變智不亂病在分腠之間則知經之榮衛乃病所發之由仲景之分腠乃病所寄之處也宜加減潤燥湯以治左偏祛風除濕湯以治右偏二曰風痱身無痛緩者四肢不舉或一臂不遂或左癱右瘓急則一身皆仰大約言變智亂者居多若言變甚智亂甚者難治而東桓卻以痱病為即邪入於裡而中臟者偏活為即邪在分腠之間而中腑者然則痱與偏活雖是兩疾其實痱即偏活之邪氣深者也宜換骨丹疏風順氣丸八寶回春湯三曰風懿亦名癔其病亦在臟腑間由痰水製火閉塞心竅故猝然昏倒舌強不言喉中窒塞噫噫有聲是也但此症有汗身軟者可治無汗身直者不易治前人斷為七日死良然總之風痱病有由脾實者由膏粱過甚之故故用疏風順氣丸以導之有由脾虛者由飲食失節之故故用八室回春湯以調之風懿病有由於熱者則以痰火鬱積而然非清火不可宜牛黃清心丸有由於虛者則以元弱痰橫之故非化痰不可宜導痰湯皆當分治四曰風痹經曰邪之所湊其氣必虛留而不去則為痹衛氣不行則為不仁又曰風之為病當半身不遂或但臂不遂者此為痹是也大約皆由汗出風吹血凝於膚之故另詳諸痹條內茲不細載四大法之外又有暴仆暴喑蒙昧及中風熱中風虛等症皆中風之流派而與中風症同而異異而同者也暴仆維何或因虛或因火或因痰忽然仆地精神恍惚口噤涎嘲與卒中風相似惟不搐搦遺尿為異耳宜審其為虛宜人參黃芪湯加竹瀝薑汗為痰宜省風湯為火宜防風通聖散而切治之亦可參用嚏法吐法開噤法暴喑維何其人平素腎必虛又為厲風所傷故語言蹇澀而喑其所以與中風語澀異者以此必足胻活細緩弱或耳聾或腰背相引痛經所謂腎氣內奪則舌喑足廢者是也宜腎瀝湯地黃飲子清神解語湯資壽解語湯蒙昧維何凡風中臟者其人必昏冒神情不爽若有物蒙蔽者然並有風犯於心心神不守致健忘驚悸者宜牛黃定志丸四白丹二參丹祛風至寶丹中風熱維何風因熱生熱勝則風動甚有風毒上攻頭面腫癢痰涎閉塞心胸煩熱大小便祕下注腰腫痛生瘡者不治亦能致癱瘓宜透冰丹天麻丸防風通聖散中風虛維何人至五六十歲氣血就衰乃有中風之病少壯無是也然肥盛之人或兼平日嗜欲太過耗其精血雖甚少壯無奈形盛氣衰往往亦成中風此即經所云中風虛症言本非中風之時乃因虛故亦中閃也法當和氣活血補虛去風為主宜萬金湯八寶回春湯審此求之中風之為病寧有或遺也哉要之中風之人氣必虛氣道必多滯直指曰治風良劑小續命為上排風湯次之然二藥主風不主氣須以人參順氣散烏藥順氣散佐助氣一流行風疏散矣據此可知單用風藥為非宜也然人參順氣散所以補氣虛烏藥順氣散所以宣氣滯臨時調劑又不可混用中風之人又必能食而其能食有二因一由肝木盛木盛尅脾土土受製求助於食故多食瀉肝治風則脾安脾安則食自少而病可以治一曰脾氣盛盛則下尅腎水水虧不能製火故食益多而病益劇急服安土滋水之藥不必多食則食自少而病可以治此又治中風者兩大端不可不知者也又有小中小中者何其風之中人不至如臟腑血脈之甚止及手足者是也若遇小中症切不可用正風藥深切治之或至病反引而向裡只須平和之劑調理雖未必為完人亦不至有傷性命也若風病既愈而根株未能悉撥隔一二年或數年必再發發則必加重或至喪命故平時宜預防之第一防房勞暴怒鬱結調氣血養精神又常服藥以維持之宜定風餅子庶乎可安故丹溪云宜常服小續命湯以防喑易老亦云如覺風動便服愈風湯以免倒仆說皆有見乎預防之為要也若男婦尋常涎潮於心卒然昏倒未即為中風者當即扶入室中正坐用醋炭燻之令氣衝口鼻其涎自歸經絡即自能省惟不可用薑湯及滴水入咽湯水一入痰涎永係於心必成痼疾脈法仲景曰寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚絡脈空虛賊邪不瀉或左或右邪氣反緩正氣獨急正氣引邪嘴噼不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟口即難言口吐涎沫又曰脈浮而大者曰風又曰脈浮而數中風使然得效曰凡中風之脈無不大者非熱也是風脈也脈訣曰中風口噤浮遲吉急實大數三魂孤又曰中風脈浮滑兼痰氣其或沉滑勿以風治或浮或沉而微而虛持危消痰風未可疏丹溪曰中風脈遲浮可治大數而極者死脈經曰大而浮遲者吉急而且疾者凶也似中真中論繆仲淳曰凡中風有真假內外西北地高風烈虛人猝為所中中臟死中腑成廢人中經絡可治必先解散風邪次再補養氣血此治真中風法以小續命湯桂枝麻黃附子羌活獨活防風白芷南星甘草為本若江浙閩粵川滇等處無剛風多濕熱人皆柔脆多熱多痰真陰既虧內熱彌甚煎熬津液凝結為痰壅塞氣道熱極生風亦猝然僵仆類中風症或不省人或語言蹇澀或口眼歪斜或半身不遂將發必先內熱口乾舌苦便祕溺赤河間謂是水不勝火丹溪謂是濕熱相火中氣中痰是也此即內虛暗風確係陰陽兩虛而陰虛為多與外來風邪迥別法當先清熱二冬甘菊白芍茯苓花粉順氣蘇子橘紅鬱金枇杷葉開痰貝母竹瀝白芥子瓜蔞仁以救其標次用治本益陰二冬菊花生地白芍歸身杞子五味子牛膝白膠人乳黃柏白蒺藜補陽人參黃芪鹿茸巴戟大棗若氣血兩虛則陰陽兼補似中問答繆仲淳曰或問有似中風眠不竟夕易醒心脈弦而不洪多怒肝脈弦而不長語蹇澀多痰身重溲速不能忍有餘瀝大便結左尺浮洪食少難化此何故答曰眠不竟夕易惺心血不足故脈弦不洪東垣云胃虛者多怒多怒肝氣必不和故脈弦不長弦為血少必自養藥未易瘳腎脈本沉浮者腎水不足腎有火則真陰虧津液耗不能養舌絡舌絡徑急故言不利火性急故小便大便皆見前症脈亦反浮洪也肺喜清肅惡煩熱熱則液活無以下滴而通水道或前熬成痰故聲重多痰氣道塞也不可用人參脾胃後天元氣之本脾陰虧則不能消胃氣弱則不能納飲食少則後天元氣無自生精血愈不足經曰脾損調飲食節起居適寒溫此至論也否則脾陰難復然其要又在戒暴怒使肝無不平之氣肝和則不賊土矣命門乃先天真陽所寄其壯也一由稟氣厚二由精不妄泄三由志無所鬱則年雖老而尤壯否則子後一陽不升不能燻糟粕化精微是火不生土脾胃益弱法當降氣和肝滋腎降氣則陽交於陰和肝則不賊土後天元氣日長腎足則真陰生津液足舌絡榮養則語言自利矣且世無不陰虛而中風者第須撥去一切使心火不炎則腎亦不燥此又治之之本也肥人多中風河間曰人肥則腠理致密而多鬱滯氣血難以通利故多卒中也醫鑑曰肥人多中風者以其氣盛於外而歉於內也肺為氣出入之道入胖者氣必急急則肺邪盛肺金尅木膽為肝之腑故痰涎壅盛治法先須理氣為急臟腑血脈之異易老曰中腑者面顯五色有表症而脈浮惡風寒拘急不仁或中身之前或中身之後或中身之側皆曰中腑其病多易治中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀二便祕結皆曰中臟其病多難治大抵中腑多著四肢中臟多滯九竅東垣曰中血脈則口眼嘴斜中腑則肢節廢中臟則性命危三者治各不同中風症治正傳曰中血脈而外有六經形症則從小續命湯加減及疏風湯治之中腑者先以加減續命湯隨症發其表如兼中臟則內有便尿之阻隔宜三化湯滋潤湯內無便尿阻隔外無六經形症宜養血通氣大秦艽湯養榮湯中臟者痰壅昏冒至寶丹之類或牛黃定志丸又曰風中五臟舌喑眼瞀宜排風湯加減排風湯但手足不遂語言蹇澀當從愈風湯以從中道久服大風悉去保生祕要曰因腠理不密風邪乘虛而入始於中風或起四肢麻木或不覺疼而時疼者皆因受風濕之過耳其有口眼歪斜風中經絡左身不遂死血為癱右身不遂痰濕氣弱為瘓而左右癱瘓為氣血兩虛也口嘴語澀皆因血虛火盛而心氣不潤宜當養心運動綱目曰初中倒時隨即蘇者宜治若不省者宜掐人中若痰壅宜吐口噤亦宜吐若口開手撒遺尿者為陽暴絶速宜大料參芪補接之丹溪曰氣虛卒中濃煎參芪加竹瀝薑汁服又曰凡中風多是老年因怒而成說怒火上升所以昏仆不省痰涎上壅治宜豁痰降火豁痰宜省風湯降火宜防風通聖散又曰風從汗散故治風多用發汗之藥又曰續命排風越婢悉能治風而千金多用麻黃以風邪非大汗不能除也若自汗更用麻黃反為大害鰲按中風多由氣血虛衰故多自汗者千金用麻黃或指壯盛人但為風痰所閉者言之未可概施於虛弱人也丹溪治風用續命煮散以為能復榮衛卻風邪所不可缺良然而換骨丹亦可參用直指曰卒中即用開噤噴嚏法次用攝生飲煎湯調蘇合香丸三丸灌下痰盛者加全蠍中風絶症得效曰口開心絶也遺尿腎絶也手撒脾絶也眼合肝絶也鼻鼾肺絶也皆不治五症中見一症尤可治說初中則眼合者多痰上則鼻鼾者多惟遺尿口開俱見為惡以心為五臟主腎為五臟根也綱目曰卒中風若面赤時黑主陽氣上散腎反尅心也兼遺尿口開氣喘者不治又曰中五臟之絡者口眼俱閉可治如口開眼合手撒鼻鼾遺尿及大吐大瀉下血吐血皆死丹溪曰肉脫筋痛發直頭搖上竄面赤如斑汗綴如珠吐沫直視者皆不治又曰動止筋痛名曰筋活無血滋筋故也不治又肝木尅脾土大便洞泄者亦不治偏活與痿病異綱目曰偏活者手足為邪氣阻塞脈道而然痿病則陽明虛宗筋縱帶脈不引而然痱病有言變志亂之症痿病則無之說痱病發於擊仆之暴痿病發於怠惰之漸明是兩疾也癱瘓導引法保生祕要曰如患右手以右手指右回頭目左而視左患亦如之各運氣二十四口如患左足坐平橙子上以左足踏右膝上左手托腳跟右手扳腳尖轉頭向左患右亦如之用力扳之能除風寒暑濕遠近癱瘓之症無不驗運央保生祕要曰三提三咽返念歸元氣積一元斡旋周天左邊氣永不通於右手行央著意引在左手右亦如之各運五口專氣須百日候到氣脈全偏風導引法保生祕要曰左偏於左內關穴掐之九九擦之九九次掐五指尖右亦如之運央保生祕要曰取效全用周天通關法治中風方九十二三化湯中臟厚朴大黃枳實羌活各三錢水二碗急火煎至一碗服麻仁丸又厚朴白芍枳實各四兩大黃八兩麻仁三兩另研杏仁三兩蜜丸疏風湯中腑麻黃三兩益智仁杏仁各一兩升麻五錢每用末五錢水煎大秦艽湯血脈秦艽石膏甘草川芎當歸白芍羌活獨活防風黃芩白朮白芷熟地生地茯苓細辛天寒加生薑春夏加知母養榮湯又當歸川芎白芍生地石菖麥冬遠志陳皮烏藥茯苓枳實黃連防風羌活秦艽半夏南星甘草各六分竹茹一錢薑三片羌活愈風湯又羌活炙草防風黃芪川芎獨活人參麻黃細辛枳殼知母甘菊薄荷白芷當歸杜仲秦艽柴胡半夏厚朴熟地前胡杞子地骨皮蔓荊子各二兩茯苓黃芩各三兩生地蒼朮石膏白芍各四兩肉桂一兩大寒後多加半夏人參柴胡木通谷雨後多加石膏黃芩知母季夏加防己白朮茯苓大暑加厚朴藿香肉桂霜降後加當歸肉桂附子此方治風中腑中臟先以本藥之後用此方調理凡中風內邪盡外邪除當服此方以行導諸經久則大風悉去清濁自分榮衛自和矣易老云此方療肝腎虛筋骨弱精神昏語言難或瘦而偏活或肥而不遂或恐而健忘或喜而多思思忘皆精不足也能安心養神調陰陽使無偏勝滾痰丸因痰大黃黃芩沉香青礞石百藥煎水丸三生飲又生南星生白附子生川烏各一錢木香五分薑十片一名順氣散此方治卒中風痰塞昏仆不省脈沉無熱者龍星丹又陳膽星朱砂各三錢黃連黃芩各二錢全蠍防風薄荷各一錢冰片牛黃麝香各三字加青黛一錢蜜丸櫻桃大別以朱砂為衣不拘時每噙化一丸凡中風多是濕土生痰痰生熱熱生風此方既治風熱又兼理痰凡風熱痰無不治也涼膈散因火連翹二錢大黃芒硝甘草各一錢薄荷黃芩梔子各五分竹葉七片蜜少部煎至半入硝清氣宣風散又當歸白朮白芍各一錢川芎羌活半夏生地薑蠶各八分蟬退赤苓各六分防風甘菊枳殼陳皮荊芥升麻黃連山梔各五分甘草生三分薑三棗二此方兼治風熱香茹飲因暑香茹厚朴扁豆子甘草沈氏中暑湯又川連六發吳萸五粒泡水一二匙拌知母一錢乾薑一分泡水一二匙拌遠志一錢石菖蒲汁四五匙拌川貝母二錢熟艾半分泡水一二匙拌枳實磨汁八分羚羊角一錢瓜蔞仁三錢麥冬二錢西瓜翠衣五錢此金鰲自製方也此方專治暑邪直中心肝二經不頭疼不發熱時躁煩舌短手足牽搐者附子麻黃湯因寒麻黃白朮人參附子乾薑甘草附子湯又生附子白芍肉桂人參甘草茯苓各一錢白朮錢半薑七片滲濕湯因濕蒼朮白朮茯苓陳皮豬苓澤瀉香附川芎砂仁厚朴甘草燈心生薑行濕流氣散又苡仁二兩茯苓兩半蒼朮羌活防風川烏各一兩每末二錢酒或蔥白湯調下此方兼治風寒濕痹麻木不仁手足煩軟萬金湯因虛川斷杜仲防風茯苓牛膝細辛人參肉桂甘草當歸各八分川芎獨活熟地秦艽各四分此方專能治風補虛及手足風纍驗若手指無力不半劑可愈本香調氣散因氣木香丁香檀香藿香砂仁蔻仁甘草加鹽少部順氣勻風散又白朮二錢烏藥一錢半人參天麻各一錢沉香青皮白芷木瓜紫蘇葉甘草各五分薑三片一方有枳殼一錢一名勻氣散此方專治中風氣虛不遂調氣平胃散因惡木香檀香蔻仁砂仁烏藥藿香蒼朮厚朴陳皮甘草加薑桃奴丸又桃奴七個另研玳瑁鎊細末一兩安息香去渣一兩上三味同入銀石器熬成膏再用朱砂犀角各五錢琥珀雄黃各三錢麝香冰片牛黃各二錢桃仁十四粒麩炒共為末安息香膏和丸芡實大陰乾密器封固安放靜室每一丸人參湯下犀角散膽肝犀角石膏甘菊川芎天麻人參羌活獨活黃芪白朮黃芩枳殼當歸防風棗仁白芷甘草羚羊角此以下至獨活散五方皆須察病人氣血之虛加補氣血藥加味牛黃散包絡心羚羊角白鮮皮牛黃麝香犀角龍齒防風天麻獨活人參沙參茯神升麻遠志甘草冰片朱砂鐵粉麥冬天竺黃防風散胃脾防風麻黃人參川芎附子肉桂黃芪赤苓棗仁白朮桑皮獨活甘草羚羊角五味子湯大腸肺五味子杏仁肉桂炙甘草防風赤芍川芎川椒獨活散膀胱腎川菊獨活防子當歸石菖蒲防風天麻川芎肉桂山萸肉枳殼丹參牛膝萆薢甘草細辛白朮以上五方皆中腑而兼中臟者攝生飲初服南星半夏各錢半木香蒼朮細辛菖蒲甘草各一錢薑七片此方治卒中不省無熱者蘇合丸又犀角白朮香附朱砂訶子蓽撥木香檀香麝香丁香安息香各二兩龍腦香燻陸香蘇合香各一兩六君子湯氣虛人參茯苓白朮炙草半夏陳皮四物湯血虛川芎當歸白芍地黃八珍湯氣血虛人參茯苓白朮炙草川芎當歸白芍地黃疏風飲口眼人參黃芪當歸白芍秦艽升麻防風葛根蘇木鉤藤紅花加酒地黃飲子語言熟地巴戟山萸附子茯苓菖蒲遠志麥冬官桂肉蓯蓉金石斛五味子薑三棗二薄荷五葉此方治中風舌喑足廢腎虛其氣厥不至舌下神仙解語丹又白附子菖蒲遠志全蠍羌活南星天麻薑蠶等分蜜丸薑湯下五七十丸一名解語丸滌痰湯又南星半夏枳實橘紅人參菖蒲竹茹茯苓甘草加薑八味丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂加味轉舌膏舌喑連翹遠志柿霜薄荷菖蒲山梔防風桔梗黃芩甘草犀角大黃川芎元明粉朱砂為衣蜜丸食後臨臥各二錢薄荷湯下平胃散肢廢蒼朮厚朴陳皮甘草五苓散又白朮肉桂茯苓豬苓澤瀉蠲痹湯體疼當歸白芍羌活薑黃黃芪甘草薑棗當歸拈痛湯又葛根升麻防風羌活茯苓豬苓知母甘草人參苦參茵陳澤瀉白朮蒼朮當歸鐵彈丸又五靈脂二兩川烏一兩乳香沒藥各五錢麝香二錢水丸彈子大每一丸薄荷酒下此方專治中風嘴斜癱瘓涎潮語澀筋攣骨痛應是風疾無不治之十全大補湯又人參茯苓白朮甘草川芎當歸白芍地黃黃芪肉桂星香散痰涎南星木香加薑二陳湯又茯苓陳皮半夏甘草生脈散遺尿人參麥冬五味子當歸六黃湯易汗當歸生地熟地黃柏黃芩黃連黃芪青皮白芍湯善飢青皮白芍柴胡山梔人參白朮茯苓甘草桂枝湯風邪桂枝白芍甘草薑棗玉屏風散表虛芪附湯氣虛六味地黃丸氣虛熟地山萸山藥丹皮澤瀉茯苓加減牛黃清肺心湯神昏人參茯神麥冬山藥膽星白朮雄黃甘草犀角朱砂牛黃冰片麝香金箔羚羊角棗肉加蜜丸至聖保命丹又貫衆一兩生地七錢大黃五錢板藍根青黛各三錢朱砂牛黃蒲黃薄荷珍珠冰片各錢半麝香一錢蜜丸金箔為衣史國公酒癱瘓當歸虎骨羌活鱉甲防風萆薢牛膝秦艽蠶沙杜仲各二兩杞子五錢茄根八兩無灰酒十斤加減潤燥湯左偏酒白芍二錢當歸錢二分川芎茯苓白朮南星半夏天麻各一錢酒生地熟地薑汁炒鹽炒陳皮酒炒牛膝酒黃芩棗仁各八分桃仁羌活防風薄桂各六分酒紅花炙草各四分酒黃柏三分加竹瀝薑汁一名愈風潤燥湯此方專治左半身不遂屬血虛與死血祛風除濕湯右偏白朮錢二分酒當歸茯苓酒黃蓮酒黃芩陳皮赤芍半夏蒼朮烏藥枳殼羌活各一錢人參川芎桔梗防風各八分白芷七分炙甘草五分薑五片此方專治右半身不遂換骨丹風痱蒼朮槐實桑皮川芎白芷人參防風首烏威靈仙蔓荊子各一兩苦參五味子木香各五錢冰片麝香各五分以麻黃煎膏和搗萬杵每兩作十丸朱砂為衣每取一丸磨溫酒半盞以物合定不透氣食後臨臥各呷咽之衣覆取汗即自差此方專治中風嘴斜癱瘓及暗風風癇疏風順氣丸又製大黃五兩車前子二兩半檳榔郁李仁火麻仁菟絲子牛膝山藥萸肉各二兩枳殼防風獨活各一兩蜜丸此方兼治大便祕結真良方也久服精神康健尤宜老人八寶回春湯又白芍錢二分黃芪八分白朮六分茯神半夏各五分附子人參麻黃黃芩防己香附杏仁川芎當歸陳皮防風肉桂乾薑甘草熟地生地各四分沉香烏藥川烏各三分薑三棗二此方八味去風八味和氣八味活血說氣血和平榮衛調順則風症自去故治一切風虛症牛黃清心丸風懿山藥七錢甘草五錢人參蒲黃神曲各二錢半犀角二錢大豆黃卷肉桂阿膠各錢七分半白芍麥冬黃芩當歸防風朱砂白朮各錢半柴胡桔梗杏仁茯苓川芎各錢二分半牛黃錢二分羚羊角冰片麝香各一錢雄黃八分白斂炮薑各七分半金箔一百二十方內四十方為衣大棗肉二十枚蒸研膏和煉蜜丸每重一錢溫水下此方專治卒中風不省人事痰涎壅精神昏語言塞口眼嘴斜手足不遂等症導痰湯又半夏南星赤苓枳實橘紅甘草本方加香附子烏藥沉香木香名順氣導痰湯加黃芩黃連名清熱導痰湯加羌活白朮名祛風導痰湯加遠志菖蒲朱砂黃連名寧神導痰湯此方專治中風痰盛語澀眩昏防風通聖散暴仆滑石錢七分甘草錢二分石膏黃芩桔梗各七分防風當歸川芎赤芍大黃麻黃連翹薄荷芒硝各四分半白朮荊芥山梔各三分半薑五片此方冶風熱燥三者之總劑也腎瀝湯暴喑羊腎一具生薑二兩切磁石兩七錢水一斗煮取五升再入元參白芍茯苓各兩二錢半黃芪川芎五味子肉桂當歸人參防風甘草各一兩再煮取一升分二服此方專治腎臟風語音蹇澀清神解語湯又南星半夏各一錢當歸川芎白芍生地麥冬遠志菖蒲陳皮茯苓烏藥枳實黃連防風羌活甘草各五分竹茹錢半加薑汁童便竹瀝沖服此方專治中風痰迷心竅語言蹇澀不省人事資壽解語湯又羚羊角桂枝各一錢羌活甘草各七分半防風附子棗仁天麻各五分竹瀝五匙薑汁一匙此方專治風中心脾舌強不語說心之別脈係於舌本脾脈亦挾咽連舌本散舌下也牛黃定志丸蒙昧朱砂半夏各二兩雄黃天麻甘草烏蛇肉各一兩西珀七錢半牛黃冰片全蠍薑蠶附子牛膝南星各五錢麝香二錢半蜜丸芡子大人參薄荷湯嚼下一丸此方專治心臟中風昏冒精神不守此藥壓驚鎮心化涎安神祛風至寶丹又滑石兩半川芎當歸各兩二錢半甘草一兩白芍防風各七錢半白朮六錢半石膏黃芩桔梗熟地天麻人參羌活獨活各五錢梔子三錢連翹荊芥薄荷麻黃大黃芒硝黃連黃柏細辛全蠍各二錢半蜜丸彈子大細嚼茶酒任下此即通聖散加味此方專治風中臟昏冒及風熱二參丹又丹參熟地天冬各兩半茯苓甘草麥冬各一兩人參遠志朱砂菖蒲各五錢蜜丸清晨以羌活愈風送或臨臥再以羌活愈風湯送下四白丹此方專治中風後健忘能養神定志和血四白丹又甜竹葉三兩白芷一兩白朮白茯苓砂仁香附防風人參川芎甘草各五錢薄荷羌活獨活各二錢半細辛知母各二錢白檀香藿香各一錢半牛黃冰片各五分麝香一字蜜丸每丸重一錢臨臥以羌活愈風湯下此方專治中風昏冒能清肺氣養魂透冰丹風熱製川烏二兩再鹽炒去鹽威靈仙大黃山梔茯神茯苓蔓荊子益智仁仙靈脾天麻白芷各五錢京墨醋煅細研麝香各一錢二分蜜和搗千杵丸桐子大薄荷汁同溫酒下二三丸此方專治風熱毒上攻頭面腫癢痰涎壅塞口乾胸煩下注腰腳腫痛生瘡大小便祕及癱瘓等症天麻丸又生地四兩羌活三兩半當歸二兩半天麻牛膝萆薢元參杜仲獨活各兩半附子五分蜜丸小續命湯又防風錢半防己肉桂杏仁黃芩白芍人參川芎麻黃甘草各一錢附子五分薑三棗二一方無附子防己有當歸石膏此方專治卒中風不省人事嘴斜癱瘓喑麻木眩暈初中無汗表實等及治一切諸風症凡中風六脈浮緊風氣太盛心火爆升痰涎壅遏於經絡之中宜小續命湯用附子以其稟雄壯之資而有斬關奪將之勢能引人參輩並行於十二經以追復其散失之元陽又引麻黃防風杏仁輩散表開腠理以驅其在表之風寒又引當歸川芎輩入血分行血養血以滋養其虧損之真陰或加石膏知母以降胃火或加黃芩以清肺金若病勢稍退精神稍復輒當改用丹溪之法以補氣血消痰之劑以調養其本氣此急則治其標與夫標而本之之治也排風湯又麻黃獨活赤苓各一錢白朮肉桂川芎杏仁白芍防風當歸甘草各八分白鮮皮五分薑三棗二人參順氣散氣虛麻黃人參川芎陳皮白芷白朮厚朴桔梗甘草各一錢乾葛七分半人參乾薑各五分薑三片棗二枚薄荷七葉烏藥順氣散氣滯麻黃陳皮烏藥各錢半川芎薑蠶枳殼桔梗各一錢乾薑五分甘草三分薑三棗二此方專治一切風疾先服此疏通氣道然後進以風藥又治癱瘓及歷節風定風餅子防再發天麻川烏南星半夏薑蠶川芎茯苓生甘草等分薑汁丸芡子大作餅子朱砂為衣每一餅細嚼薑湯下此方亦能預防風疾滋潤湯中臟當歸生地枳殼厚朴檳榔大黃麻仁杏仁各一錢羌活七分酒焙紅花三分此方治風中臟二便閉澀先服此藥後以羌活愈風湯調理至寶丹又犀角朱砂雄黃西珀玳瑁各一兩牛黃五錢冰片麝香各錢半金箔五十片半為衣銀箔三十片安息香酒濾去沙土淨一兩熬帶和勻一兩作四十丸每奶人參湯下日二三服安息香性硬難化倉卒難用如欲急用煉蜜丸亦可此方兼治卒中急風不語不省人事加減排風湯又天麻二錢蒼朮一錢防風川芎羌活獨活各八分麻黃七分白鮮皮當歸白芍白朮半夏赤苓黃芩杏仁甘草各四分薑三片加減續命湯中腑防風錢半防己桂枝杏仁黃芩人參白芍川芎麻黃甘草各一錢附子五分薑三棗二此小續命湯方也凡風中腑今人不分表裡虛實故張易老授東垣以六經加減之法如太陽中風無汗惡寒麻黃續命主之本方倍麻黃防風杏仁也有汗惡風桂枝續命主之本方倍桂枝白芍杏仁也陽明中風無汗身熱不惡寒白虎續命主之本方桂枝黃芩加葛根一錢四分也太陰中風無汗身涼附子續命主之本方倍附子甘草加乾薑七分也少陰中風有汗無熱桂枝續命主之本方倍桂枝附子甘草也六經混淆係之於少陽厥陰或肢節攣痛或麻木不仁羌活連翹續命主之本方一兩加羌活一錢連翹錢半也省風湯去痰防風南星各二錢半夏黃芩甘草各一錢薑十片此與導痰湯相合煎服尤妙可以散風豁痰降火此方專治卒中風不省有熱者續命煮散風虛桂皮七分半防風獨活人參當歸細辛葛根白芍川芎熟地遠志半夏甘草荊芥穗各五分薑三片開關散開噤南星末五分冰片一字研和以中指蘸藥末揩齒二三十度其口自開每用半錢至一字端午日合尤佳一法以烏梅肉和南星細辛末擦牙口自開便可下藥三陽之筋並絡入頷頰扶於口諸陽為風寒所客則筋急故口噤不開巴豆燻法又巴豆去殼紙包捶油去豆以紙捻作條送入鼻內或加皂角末尤良或燒煙燻鼻內亦可通關散取嚏細辛皂角薄荷雄黃各一錢為末每少部吹入鼻中有嚏可治無嚏不可治一方南星半夏皂角等分為末用如上法此方專治卒中風中噤不省氣寒用以吹鼻通頂散又石膏二錢藜蘆川芎細辛人參甘草各四分共為末每取一字吹鼻即提起頂中發即蘇有嚏可治無嚏不可治搐鼻通天散又川芎細辛藜蘆白芷防風皂角薄荷等分為末用如上法皂角散取吐皂角萊蔔子等分為末每二錢水煎盡服即吐巴豆丸又巴豆二枚去皮膜白礬如拇指大一塊為末上二味瓦上煅令豆焦赤為度蜜丸芡實大每一丸棉裹放患人口中近喉處良久吐痰立愈此二方專治中風痰塞吐之立愈雖垂死者亦效燻法黃芪防風湯濃煎數斛置於床下令氣如煙霧燻之口噤自能漸開此方部胤宗治王太後中風法也丹溪曰中風脈沉口噤非大補不可若用有形湯藥緩不及事燻以黃芪防風湯使口鼻俱受之此非智者通神之法不能也說人之口通乎地鼻通乎天口以養陰鼻以養陽天主清故鼻不受有形而受無形地主濁故口受有形而兼受無形也
