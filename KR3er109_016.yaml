body:
  text: 卷十六濕病源流經曰諸濕腫滿皆屬脾土此言土濕過甚則痞塞腫滿之病生經故又曰諸痙強直積飲痞膈中滿吐下霍亂體重肘腫肉如泥按之不起皆屬於濕也説太陰濕土乃脾胃之氣也然則濕之氣病內外因固俱有之其由內因者則本脾土所化之濕火盛化為濕熱水盛化為寒濕其為症狀發熱惡寒身重自汗筋骨疼小便祕大便溏腰疼肘腫肉如泥腳如石墜其為脈必緩浮緩濕在表沉緩濕在裡弦緩風濕相搏治法則以燥脾利溲為主宜五苓散加蒼朮半夏厚朴其由外因者則為天雨露地泥水人飲食與汗衣濕衫其為症狀頭面如裹滯重骨節疼手足酸軟腿膝胕腫挾風痰則麻兼死血則木動邪火則腫疼或疝氣偏墜目黃其為脈亦必緩治法則以燥濕祛風為主宜除溫羌活湯虛者獨活寄生湯濕病之因內外不同如此然不論內外其燻襲乎人多有不覺非若風寒暑熱之暴傷人便覺也至病之為患於身者其部分尤不可不辨如濕在上宜防風風能燥濕猶濕衣懸透風處則乾也濕在中宜蒼朮猶地上有濕灰多則滲乾也濕在下宜利小便猶欲地乾必開水溝也濕在周身宜烏藥羌活等濕在兩臂宜桑條威靈仙等濕在兩股宜牛膝防己萆薢等分其部位而治之而一身之患有不盡去者乎且同一濕也而有中濕寒濕風濕濕痹濕熱濕溫酒濕及濕痰破傷濕之不齊焉中濕者其脈沉而微緩腹䐜脹倦怠且濕喜歸脾流於關節四肢疼痛而煩或一身重著久則浮腫喘滿昏不知人挾風則眩暈嘔噦挾寒則攣拳掣痛內經曰面色浮澤是為中濕此尤顯而可驗者也宜除濕湯加味朮附湯寒濕者雖夏月亦覺清涼多中於血虛之人發則關節不利牽掣作痛宜虎骨官桂當歸若腰下冷重或痛便為腎著宜腎著湯前輩云凡濕以尿赤而渴為濕熱以尿清不渴為寒濕是其驗也風濕者太陽經感風與濕相搏其骨節酸疼不能轉側者濕氣也其掣而不能屈伸者風也其汗出身寒脈沉微短氣小便清而不利者寒閉也其惡風者表虛也其或微腫者陽氣不行也然雖惡風寒宜微汗之不得用麻黃葛根輩便其大汗若使大汗則風去濕留反能為患宜除濕羌活湯濕熱者肢節疼肩背重胸滿身疼流走脛腫作疼宜當歸拈痛湯疼甚加倍服之或有氣如火從腳下起入腹此亦濕鬱成熱而作宜二妙丸加牛膝防己濕痰者痰涎流注肌肉間時作酸疼宜祛濕痰湯濕溫者兩脛逆冷胸腹滿多汗頭痛妄言必其人嘗傷於濕因而中暑暑濕相博則發濕溫其脈陽濡而弱陰小而急治在太陽不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重暍如此死者乃醫殺之宜蒼朮白虎湯酒濕者亦能作痹症口眼嘴斜半身不遂渾似中風舌強語澀當瀉濕毒不可作風病治而汗之宜蒼朮湯破傷濕者因破傷皮肉而入水濕口噤身強直者是也宜用甘草湯調服煅牡蠣末二錢仍取末敷瘡口濕痹詳在風門此風寒暑等當各因所兼而治之者也至其傷濕之故則有緣腎虛者必身重腰冷如坐水中不渴小便利宜腎著湯有由體氣虛弱者必身重或便溏宜清燥湯有因坐臥濕地當風涼致腰背足膝疼偏活拘攣者宜獨活寄生湯有因年老衰及女人腎虛血竭致腰腳疼者宜獨活寄生湯有由下焦冷濕致身重腰冷卻能飲食者宜乾薑散有緣風濕相搏夏月身重如山者宜勝濕湯所由既異為治亦殊辨之誠宜切矣若夫濕流關節一症身體煩疼為病尤劇其夾風者必加煩熱流走拘急其夾寒者必加攣痛浮腫濕症宜茯苓川芎湯夾風宜防風湯夾寒宜加減五積散三者合則成痹矣另詳痹症此皆不可不知者也總之濕之中人必原於虛強壯者無慮也治濕之法惟當滲利小便別無他法也古書有加減二陳湯法以之治濕頗極神效奉為蓍蔡可也脈法難經曰濕溫之脈陽濡而弱陰小而急脈訣曰傷濕之脈細濡濕熱之脈緩大脈訣曰脈浮而緩濕在表也脈沉而緩濕在裡也活人書曰身痛脈沉為中濕脈浮為風濕人門曰寸口陰脈緊者霧露濁邪中於少陰之分名曰渾陰寸口陽脈緊或帶澀霧露清邪中於上焦太陽之分名曰潔陽中霧露之氣也陰陽脈俱緊者上下二焦俱中邪也必吐利後脈不緊手足溫則愈若陰陽脈俱緊口中氣出唇口乾燥踡臥足冷涕出舌苔滑勿妄治也暑濕異處內經曰地之濕氣感人害人皮肉筋脈説濕傷形形傷故痛仲景曰濕傷關節則一身盡痛活人書曰風濕相搏則骨節煩疼濕則關節不利故痛人門曰暑病多無身痛説傷氣而不傷形故也濕病類傷寒活人書曰中濕風濕濕溫皆類傷寒中濕之由風雨襲虛山澤蒸氣濕流關節一身盡痛風濕者其人先中濕又傷風也其人中濕因又中暑名曰濕溫又曰傷寒有五其一為中濕説風濕之氣中人為病發熱與溫病相類故曰濕溫故難經曰濕溫之脈陽濡而弱陰小而急也濕病原由症治內經曰因於濕首如裹大筋緛短小筋弛長注云受熱則縮而短得濕則引而長鉤元曰濕病本不自生因火熱怫鬱水液不能宣通停滯而生水濕也仲景曰太陽病關節疼痛而煩脈沉而細者此名中濕亦曰濕痹又曰病者一身盡疼發熱日哺所劇者此名風濕丹溪曰濕本土氣火熱能生濕土故夏熱則萬物潤為涼則萬物燥也夫熱鬱生濕濕生痰故用二陳湯加酒芩羌活防風去風行濕説風能勝濕也又日濕者土濁之氣實為諸陽之會其位高其氣清其體虛故聰明得以係焉濕氣燻蒸清氣不行沉重而不爽利似乎有物蒙冒之失而不治濕鬱為熱熱留不去熱傷血不能養筋故大筋為拘攣濕傷筋不能束骨故小筋為痿弱又曰濕上甚而熱治以苦溫佐以甘辛平胃散主之濕在上宜微汗而解不欲汗多故不用麻黃乾葛宜微汗用防己黃芩湯濕在中下宜利小便此滲淡治濕也五苓散主之入門曰霧露濁邪中下焦名曰渾陰氣為栗令人足脛逆冷小便妄出或腹痛下利宜理中湯四逆湯霧露清邪中於上焦名曰潔陽令人發熱頭痛項強頸攣腰痛脛酸宜九味羌活湯藿香正氣散正傳曰濕家治法大概宜發微汗利小便使上下分消是其治也醫鑑曰太陽發汗太多因致痙濕家大發汗亦作痙説汗太多則亡陽不能養筋故筋脈緊急而成痙其症身熱足冷項頸強急時頭熱面赤目赤獨頭面搖卒口噤背反張者是也繆仲淳曰傷於暑濕而成癱瘓四肢不能動宜用自然銅燒紅酒浸一夜川烏頭炮五靈脂蒼朮酒浸各一兩當歸二錢酒浸為末酒糊丸每七丸酒下覺四肢麻木即止只虛人有火未宜輕用其有中濕骨痛者白朮一兩酒三盞煎一盞頓服不飲酒以水代之至如尋常濕氣作痛則取白朮熬膏白湯點服葉天士曰時令濕熱之氣觸自口鼻由募原以走中道遂至清肅不行不飢不食但濕乃化熱之漸致機竅不為靈動與形質滯濁有別此清熱開鬱必佐芳香以逐穢為法宜用括蔞皮桔梗香豉黑山梔枳殼鬱金降香末又曰本人體壯有濕近長夏陰雨潮濕著於經絡身痛自利發熱仲景云濕家大忌發散汗之則變痙厥脈來個弱而緩濕邪凝遏陽氣病名濕溫濕中熱氣橫衝心包絡似致神昏四肢不暖亦手厥陰見症非與傷寒同法也藥用犀角連翹心元參石菖蒲野赤豆皮金銀花煎送至寶丹又曰仲景云小便不利者為無血也小便利者血症諦也此症是暑濕氣蒸三焦彌漫以致神昏乃諸竅阻塞之兆至小腹硬滿大便不下全是濕鬱氣結彼夯醫猶以滋味呆鈍滯藥與氣分結邪相反極矣當用甘露飲法豬苓浙茯苓寒水石晚蠶沙皂莢子去皮又曰厥陰為病必錯雜不一瘧痢之後肝臟必虛發症左脅有痞腹中傀儡外堅脅下每常汨汨有聲惡虛就實常有寒熱胃中不知飢而又嘈雜吞酸脈長而數顯然厥陰陽明濕熱下滲前陰陽縮而為濕熱症也須用升發陽明胃氣滲泄厥陰濕熱其症自愈蒼朮半夏茯苓橘紅當歸通草茴香柏子仁沙蒺藜川楝子即為丸方治濕病方二十三五苓散內因肉桂白朮茯苓豬苓澤瀉除濕羌活湯外因蒼朮藁本羌活防風柴胡升麻獨活寄生湯外因虛獨活桑寄生熟地牛膝杜仲秦艽白芍細辛人參茯苓當歸防風甘草薑加味朮附湯中濕附子二錢白朮炒甘草赤苓各錢半薑七棗二水煎日再服才見身痹三服後當如冒狀勿怪説朮附並行皮中逐水氣故耳除濕湯又半夏蒼朮厚朴各錢半陳皮藿香各七分半甘草五分薑七棗二當歸拈痛湯濕熱羌活茯苓人參葛根升麻當歸蒼朮知母苦參防風澤瀉豬苓白朮茵陳草炙甘草祛濕痰湯濕痰茯苓膽星半夏羌活獨活當歸黃芩白朮蒼朮陳皮薄荷甘草香附防己威靈仙腎著湯腎虛炮薑茯苓白朮炙甘草如小便赤大便泄加蒼朮陳皮丁香清燥湯體氣虛黃芪黃連神曲豬苓五味子柴胡甘草白朮蒼朮麥冬陳皮生地茯苓人參澤瀉當歸黃柏升麻乾薑散下焦乾薑茯苓白朮甘草勝濕湯風濕羌活防風蒼朮甘草黃連黃柏豬苓澤瀉茯苓川芎湯濕症茯苓桑皮防風蒼朮麻黃赤荷當歸官桂甘草川芎棗防風湯夾風防風葛根羌活秦艽桂枝甘草當歸杏仁黃芩赤苓薑水煎入酒少部服加減五積散夾寒茯苓白芷半夏川芎當歸陳皮甘草乾薑桔梗赤芍蒼朮麻黃厚朴加味二陳湯總治陳皮半夏茯苓甘草加製蒼朮羌活黃芩因症加減法附後如或濕在上頭重嘔吐倍蒼朮濕在下足脛肘腫加升麻濕在內腹脹中痞加豬苓澤瀉濕在外身重浮腫倍羌活取汗肥人濕沉困怠惰是氣虛加人參白朮瘦人是濕熱倍黃芩加白朮白芍瘦白亦是氣虛照肥人治之防己黃芪湯濕在上防己黃芪各三錢白朮二錢甘草錢半薑三棗二平胃散又蒼朮厚朴陳皮甘草單蒼朮膏又蒼朮一味熬膏二陳湯熱生濕茯苓甘草半夏陳皮藿香正氣散清邪霍香白芷茯苓紫蘇厚朴白朮陳皮桔梗關夏甘草大腹皮九味羌活湯又羌活白芷細辛生地防風蒼朮甘草川芎黃芩薑四逆湯濁邪附子乾薑甘草理中湯又人參白朮炙草乾薑痰飲源流痰飲濕病也經曰太陰在泉濕淫所勝民病飲積又曰歲土太過時雨流行甚則飲發又曰土鬱之發太陰之復皆病飲發內經論痰飲皆因濕土以故人自初生以至臨死皆有痰皆生於脾聚於胃以人身非痰不能滋潤也而其為物則流動不測故其為害上至巔頂下至湧泉隨氣升降周身內外皆到五臟六腑俱有試罕譬之正如云霧之在天壤無根底無歸宿來去無端聚散靡定火動則生氣滯則盛風鼓則湧變怪百端故痰為諸病之源怪病皆由痰成也然天之云霧陽光一出即消散無蹤人身之痰若元陽壯旺亦陰濕不凝而變滅無迹其理固相同也茲即痰之在一身著言之在肺曰燥痰其色白咯出如米粒多喘促寒熱悲愁脈必澀宜利金丸在心曰熱痰其色赤結如膠而堅多煩熱心痛口乾唇燥喜笑脈必洪宜半黃丸在脾曰濕痰其色黃滑而易出多倦怠軟弱喜臥腹脹食滯脈必緩宜白朮丸或挾虛宜六君子湯挾食宜保和丸挾暑宜消暑丸挾驚宜妙應丸各宜從脾分治在肝曰風痰其色青吐出如沫多泡四肢悶滿躁怒二便閉脈必弦宜川芎丸加半夏南星防風丸在腎曰寒痰其色有黑點吐出多稀多小便急痛足寒逆心恐怖脈必沉宜胡椒理中丸或加星半此痰之由於五臟者也若由於外感而生者一曰風痰多癱瘓奇症頭風眩暈暗風悶亂或搐搦瞤動宜青洲白圓子二日寒痰即冷痰也骨痹四肢不舉氣刺痛無煩熱凝結清冷宜溫中化痰丸溫胃化痰丸三曰濕痰身重而軟倦怠困弱宜山精丸三仙丸四曰熱痰即火痰也多煩熱燥結頭面烘熱或為眼爛喉閉癲狂嘈雜懊憹怔忡其色亦黃宜清氣化痰丸清熱導痰湯五曰鬱痰即火痰鬱於心肺間久則凝滯胸膈稠粘難咯多毛焦咽乾口燥咳嗽喘促色白如活骨宜節齋化痰丸六曰氣痰七情鬱結痰滯咽喉形如敗絮或如梅核咯不出咽不下胸膈痞悶宜清火豁痰丸七曰食痰飲食不消或挾瘀血遂成窠囊以至痞滿不通宜黃瓜蔞丸八曰酒痰因飲酒不消或酒後多飲茶水但行酒次日即吐飲食不美嘔吐酸水等症宜瑞竹堂化痰丸九曰驚痰因驚痰結成塊在胸腹發則跳動痛不可忍或成癲癇在婦人多有此症宜妙應丸以上如風寒濕火等痰雖與五臟所發者或有相似然內因與外因畢竟有別此外又有相火咳血痰宜滋陰清化丸胃熱鬱結臭痰宜清胃湯加減用鬱氣凝聚成塊痰宜清氣化痰丸脾氣不運柔痰宜參朮健脾丸骨節空處結核痰宜滾痰丸風氣發湧所生白沫潮痰宜生鐵落湯鬱火凝結久成痰毒宜先服舟車神佑丸次服尋痰湯勞損所生如雞蛋白痰即俗所謂白血宜金匱腎氣丸加消痰藥心膽被驚神不守舍或痰迷心竅妄言妄見宜壽星丸風痰注痛或在腰腳或在手臂宜躑躅花丸上膈風熱痰實宜桔梗蘆散頑痰壅遏胸膈久而不化宜青緑丸胸胃中有痰頭痛不欲食宜礬吐法痰血凝聚致成結胸宜紫芝丸陰虛火動生痰不堪用燥劑宜五味天冬丸中脘氣滯痰涎煩悶頭目不清宜三仙丸種種不一總由氣血陰陽升降怫逆而成雖然同焉是物稠粘者為痰清稀者即為飲飲有八一曰留飲水停心下背冷如手掌大或短氣而渴四肢歷節痛脅痛引缺盆咳嗽轉甚脈沉是也久則骨節蹉跌恐致癲癇也宜導痰湯二曰痰飲水走腸中轆轆有聲是也宜苓桂朮甘湯三曰癖飲水癖在兩脅下動搖有聲是也宜十棗湯三花神佑丸四曰溢飲水流四肢當汗不汗身體疼重是也宜大青龍湯五曰懸飲飲後水流脅下咳唾引痛是也宜十棗湯六曰伏飲膈滿嘔吐喘咳寒熱瓷出惡寒腰背痛身瞤惕是也宜倍朮丸七曰支飲咳逆倚息短氣不得臥形如腫是也宜五苓散八曰流飲飲水流行遍體俱注無定在是也宜三花神佑丸此外又有飲食胃寒或飲茶過多致成五飲及酒癖宜薑桂丸或患支飲時苦冒眩宜澤瀉湯飲癖嘔酸嘈雜脅痛食減宜蒼朮丸冷飲過度遂令脾胃氣弱不能消化飲食入胃皆變成冷水反吐不停宜赤石脂散種種不一總由飲食水漿乘時失度而成雖然曰痰曰飲之外又有非痰非飲時吐白沫不甚稠粘者脾虛不能攝液故涎沫自出也宜六君子湯加生薑益智仁或以半夏乾薑等分為末服之又有時吐酸水非關食滯者必由停飲所致也宜蒼半苓陳湯又有嘔清水者渴欲飲水水入即吐此名水逆也宜五苓散又有痰極腥臭或帶膿血者必肺胃癰也肺宜清金飲胃宜葵根湯凡此皆痰飲之屬也要之治痰治飲不外理脾理氣兩法説脾胃健運自無痰故曰治痰先理脾胃氣道順津液流通亦無痰故曰治痰必理氣但昔人云脾喜溫燥惡寒潤宜以二朮星夏為要藥矣肺喜涼潤惡溫燥宜以二母二冬地黃桔梗為要藥矣旨哉斯言其誠有不可混治者乎然而土能生金金不能助土脾痰斷不可用肺藥肺痰稍助脾以生肺痰自益消也是在臨症時消息之可耳脈法仲景曰脈雙弦者寒也偏弦者飲也又曰肺飲不弦但苦喘短氣又日脈沉而弦者此懸飲內痛又曰脈浮而細滑者傷飲提綱日痰脈弦滑三因曰飲脈皆弦微沉滑丹溪曰久得澀脈必費調理以痰膠固脈道阻塞也醫鑑曰脈沉弦細謂大小不勻俱痰飲為病也痰涎飲不同直指曰優於包絡隨氣上浮客肺壅嗽而發動者痰也聚於脾元隨氣上溢口角流出而不禁者涎也惟飲生於胃腑為嘔為吐此則胃家之病又曰水與飲同出而異名人惟脾土有虧故所飲水漿不能傳化或停心下或聚脅間或注經絡或溢膀胱往往因此成疾又曰飲者因飲水不散而成病痰者因火炎燻灼而成疾故痰稠濁飲清稀痰飲藥宜分治繆仲淳日夫痰之生也其出非一藥亦不同由於陰虛火炎上迫乎肺肺氣熱則煎熬津液凝結為痰是謂陰虛痰火痰在於肺而本於腎治宜降氣清熱益陰滋水法忌辛溫燥熱補氣等藥由於脾胃寒濕生痰或飲啖過度好食油面豬脂以致脾氣不利壅滯為痰甚至流於經絡皮裡膜外或結塊或不思食或徹夜不眠或卒然眩僕不知人事或發癲癇或昔肥今瘦或叫呼異常或身重腹脹不便行走或泄瀉不止或成癱瘓種種怪症皆痰所為故昔人云怪病多屬痰暴病多屬火有以夫此病在脾胃無關肺腎治宜燥脾行氣散結軟堅法忌滯膩苦寒濕潤等藥及諸般厚昧由於風寒之邪鬱閉熱氣在肺而成痰嗽齁喘病亦在肺治宜豁痰除肺熱藥中加辛熱辛溫如麻黃生薑乾薑之屬以散外寒則藥無格拒之患法忌溫補酸收等藥病因不齊藥亦宜異利潤利燥及利發散各有攸當非可混而施也夫世每以痰飲混稱藥亦混投殊不知痰之與飲其由來正自有別其狀亦殊痰質稠粘飲惟清水特其色有異或青或黃或緑或黑或如酸漿或優於腸胃或上支胸脅刺痛難忍或流於經絡四肢則關節不利支飲上攻為心痛為中脘痛甚則汗出為嘔吐酸水苦水黃水等種種各異或發寒熱不思飲食及不得安眠皆其候也此症多因酒後過飲茶湯則水漿與腸胃中飲食濕熱之氣凝而為飲或因情抱抑鬱飲食停滯不得以時消散亦能成飲總之必由脾胃有濕或脾胃本虛又感飲食之濕則停而不消此飲之大略也治宜燥濕利水行氣健脾為主乃為得也其藥大都以半夏茯苓白朮人參為君佐以豬苓澤瀉以滲泄之白豆蔻陳皮以開散之蘇梗旋覆以通暢之東垣五飲丸中有人參其旨概可見矣痰病似邪祟東垣曰血氣者人之神也神氣虛乏邪因而入理或有之若夫血氣兩虛痰客中焦妨礙升降不得運用致十二官失職視聽言動皆有虛妄以邪治之必死先宜多飲薑鹽湯探吐或多灌竹瀝香油次服消痰藥餌辮痰色入門曰寒痰清濕痰白火痰黑熱痰黃老痰膠痰飲原由症治丹溪曰凡有痰者眼皮及眼下必有煙灰黑色又曰凡病百藥不效關脈伏而大者痰也控涎丹下之又曰脾虛不能尅製腎水多唾痰唾而不咳者宜八味丸又曰大病後多唾痰此胃冷也又曰病人多唾白沫乃胃口上停寒也又曰凡病久淹延卒不死者多因食積痰飲所致所以然者因胃氣亦賴痰積所養飲食雖少胃氣卒不便虛故也又曰痰在膈上必用吐法瀉亦不能去脈浮者宜吐膠固稠濁者必用吐又曰痰在經絡中非吐不可此中就有發散之意不必在出痰也又曰凡用吐藥升提其氣便吐也又曰氣實痰熱結者難治入門曰一切痰症食少肌色如故一切水症脅硬心下怔忡又曰痰新而輕者味淡色清白稀薄久而重者黃濁稠粘凝結咯不出漸成怒味酸辛腥臊咸苦甚至帶血而出但痰症初起頭痛發熱類外感表症久則潮咳夜重類內傷陰火痰飲流注支節疼痛又類風症但痰症胸滿食減肌色如故脈滑不勻不定為異耳又曰俗云十病九痰誠哉斯言又曰痰厥者皆因內虛受寒痰氣阻塞手足厥冷麻痹暈倒脈沉細也回春曰凡臂難遍身骨節痛坐臥不寧痰入骨也又曰眼黑而行步吟呻舉動艱難入骨痰也其症必遍身骨節痛眼黑面土色四肢痿痹屈伸不便者風濕痰也眼黑氣短促者驚風痰也眼黑頰赤或面黃者熱痰也咯之不出者痰結也脅下痛作寒熱咳嗽氣結亦痰結局方曰胸中有寒則喜唾痰資生經日痰涎病不一惟癆瘵有痰為難治最宜早灸膏肓四花穴全嬰方曰肺胃虛則生粘痰痰涎滯咽喉如曳鋸聲時或瘛瘲或因吐瀉所致脾虛肺亦虛痰涎流溢變成癲癇尤為難治得效曰有痰飲流注者人忽胸背手腳腰隱痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定不可便用風藥及妄施針灸亦不可疑為風毒結聚欲為癰亂用藥貼此乃痰涎伏在心膈上下變為此疾能令人頭痛難舉神昏意倦多睡食少味痰唾稠粘夜間喉中如鋸聲多流涎手足冷痹氣脈不通亦不得認為癱痿凡有此疾只服控涎丹其疾如失丹溪曰有痰核塊者人身上中下有塊如腫毒多在皮裡膜外此因濕痰流注作核不散間其平日好食何物用藥吐下之方用消痰散核之劑如二陳湯加大黃連翹柴胡桔梗薑黃連白芥子水煎入竹瀝多服自消醫鑑曰痰飲流注於胸背頭項腋胯腰腿手足聚結腫硬或痛或不痛按之無血潮雖或有微紅亦淡薄不熱堅如石破之無膿或有薄血或清水或如紫汁又有壞肉如敗絮或如瘰癧在皮肉間如雞卵可移動軟活不硬惟覺咽喉痰結作寒作熱回春曰渾身有腫塊或骨體串痛都濕痰流注經絡也痰火導引保生祕要曰伸足坐定以雙手掐兒訣撑起用力低頭躬身而下扳足尖三次如訣用力而起咽津下降幽闕躬起二十四回守運後央運央保生祕要曰取靜千晌用十六字提咽指腰存想念茲在茲次運尾閭八九度入靜自然痰火自降治痰飲方五十一利金丸燥痰桔梗貝母陳皮枳殼茯苓甘草薑半黃丸熱痰南星半夏黃芩等分薑汁浸蒸餅研丸薑湯下四五十丸白朮丸濕痰南星半夏白朮湯浸蒸餅丸食後薑湯下六君子湯挾虛人參茯苓白朮炙草半夏陳皮保和丸挾食山楂神曲半夏橘紅茯苓麥芽連翹黃連萊蔔子水泛丸消暑丸風挾暑茯苓半夏甘草薑汁糊丸忌見生水每五十丸薑湯下入夏後不可缺也妙應丸濕挾驚甘遂大戟白芥子糊丸梧子大臥時薑湯下七丸至十丸氣實痰猛者量加丸數或加朱砂為衣痛甚加全蠍酒痰加雄黃驚痰成塊加穿山甲鱉甲蓬朮元胡索即控涎丹防風丸風痰防風川芎甘草天麻蜜丸重一錢朱砂為衣荊芥湯化下一丸川芎丸又川芎薄荷桔梗甘草防風細辛蜜丸每丸重三分食後臥時茶清嚼一丸胡椒理中丸寒痰胡椒甘草蓽撥良薑細辛陳皮乾薑白朮款冬花蜜丸每服三十丸至五十丸青州白圓子寒痰半夏七兩南星三兩白附子二兩川烏五錢上為細末水浸春五夏三秋七冬十朝夕換水日數足取絹袋中濾過其渣再研濾以盡為度澄清去水曬乾又為未糯火粥和丸緑豆大薑湯下三五十丸溫中化痰丸又青皮陳皮良薑乾薑等分醋糊丸米飲下五十丸溫胃化痰丸又半夏三兩炮薑陳皮白朮各二兩薑汁糊丸薑湯下二三十丸山精丸濕痰蒼朮二斤黑桑椹一斗取汁將蒼朮收浸九次曬乾入杞子地骨皮末各一斤蜜丸溫湯下百丸三仙丸又半夏南星各一斤為末薑汁調作餅放篩中將艾葉説發黃色造成曲收之此須三四月造每曲四兩入香附末二兩薑汁糊丸薑湯下五十丸清氣化痰丸熱痰半夏二兩陳皮赤苓各一兩半黃芩連翹山梔桔梗甘草各一兩薄荷荊芥各五錢薑汁糊丸薑湯下五十丸此方乃二陳湯合涼膈散也清熱導痰湯又瓜蔞仁黃連黃芩南星半夏陳皮赤苓桔梗白朮人參各七分枳實甘草各五分薑三棗二衝竹瀝薑汁節齋化痰丸鬱痰天冬黃芩橘紅海粉瓜蔞仁各一兩芒硝鹽水炒香附桔梗連翹各五錢青黛二錢蜜入薑汁少部丸芡子大細嚼一丸開水下清火豁痰丸氣痰製大黃二兩半白朮枳實陳皮各二兩山梔半夏酒黃連酒黃芩南星各兩半貝母一兩二錢連翹花粉茯苓神曲白芥子各一兩元明粉七錢青礞石以焰硝一兩同煅如金色青黛甘草各五錢沉香二錢竹瀝為丸茶清下五七十丸黃栝蔞丸食痰栝蔞仁神曲半夏曲查肉等分瓜蔞汁丸薑湯竹瀝下五十丸瑞竹堂化痰丸酒痰半夏南星生薑白礬皂角各四兩同入砂鍋內水煮以南星無白點為度去皂角不用再入青皮陳皮葛根蘇子神曲麥芽查肉萊蔔子香附杏仁各一兩薑汁糊丸食後臨臥茶酒任下五七十丸滋陰清化丸相火痰天冬麥冬生地熟地知母貝母茯苓山藥花粉五味子甘草蜜丸噙化清胃湯胃痰升麻當歸黃連丹皮生地清氣化痰丸鬱氣痰半夏南星白礬皂角乾薑先將白礬等三味用水五碗煎三碗入星夏浸二日再煮至星夏無白點曬乾又用萊蔔子橘紅青皮杏仁葛根山楂神曲麥芽香附蒸餅丸每六七十丸茶湯下如素厚味胸滿痰盛內多積熱鬱結者無不愈如脾胃虛弱切忌參朮健脾丸脾不運人參白朮茯苓陳皮炙甘草白芍當歸薑棗滾痰丸結核大黃黃芩青礞石沉香百藥煎水丸空心白湯下三錢此藥但取痰積自腸中次第而下並不刮腸大瀉為痰家聖藥生鐵落湯潮痰生鐵落先煮水入石膏三兩龍齒茯苓防風各兩半元參秦艽各一兩煎好再加竹瀝半小杯此方專取生鐵落重墜之性能降痰熱之鬱結於腸胃經絡者舟車神佑丸痰毒甘遂芫花大戟大黃青皮黑牽牛頭末陳皮木香檳榔輕粉水丸椒子大空心服五丸日三服如痞悶者多服反煩滿宜初服二丸每服加一丸以快利為度導痰湯又半夏南星赤苓枳實橘紅甘草食後薑湯下三四錢水煎亦可金匱腎氣丸白痰熟地山藥山萸丹皮茯苓澤瀉附子肉桂牛膝車前子壽星丸被驚天南星一斤先掘土坑一尺以炭火三十斤燒赤入酒五升滲乾乃安南星在內盆覆定以灰塞之勿令走氣次日取出為末朱砂二兩琥珀一兩共為末薑汁糊丸每三十丸至五十丸人參菖蒲湯下日三服躑躅花丸注痛躑躅花南星並生時搗作餅甑上蒸四五遍以稀葛囊盛之監時取焙為末蒸餅丸每服三丸溫酒下腰腳骨痛空心服手臂痛食後服大良桔梗蘆散上膈桔梗蘆生研末白湯調服一二錢探吐青緑丸頑痰石青一兩石緑五錢水飛為末曲糊丸緑豆大每服十丸溫水下吐去痰一二碗能不損人礬吐法痰辟白礬一兩水二升煮一升納蜜半合頻服須臾大吐不吐飲少熱湯引之紫芝丸痰血五靈指飛半夏湯泡等分薑汁糊丸每飲下二十丸五味天冬丸陰虛天冬一斤浸洗去心淨肉十二兩五味子水浸去核取肉四兩並曬乾不見火搗丸每茶下二十丸日三服苓桂朮甘湯痰飲桂枝白朮茯苓甘草大青龍湯溢飲麻黃桂枝甘草杏仁石膏薑棗十棗湯懸飲芫花甘遂大戟水杯半先煎大棗十枚取八分入藥末七分平旦溫服病不除再服五分五苓散支飲茯苓白朮豬苓澤瀉肉桂三花神佑丸流飲蒼半苓陳湯酸水蒼朮半夏茯苓陳皮清金飲肺癰刺蒺藜苡仁橘葉黃芩花粉牛蒡子貝母桑皮桔梗葵根湯胃癰葵根一兩黃芪白朮各三錢倍朮丸伏飲肉桂乾薑白蜜丸每三十丸米飲下八味丸不咳熟地山萸丹皮茯苓澤瀉附子肉桂薑桂丸五飲白朮一斤炮乾薑肉桂各八兩蜜丸每服二三十丸澤瀉湯支飲澤瀉五兩白朮二兩水二升煮一升分二服赤石脂散吐水赤石指一斤搗篩服方寸匕酒飲任下稍加至三匕服盡一斤終身不吐痰水又不下痢補五臟令人肥健有人痰飲諸藥不效用此遂愈蒼朮丸飲癖蒼朮一斤去皮切片為末油麻五錢水二錢濾研汁大棗五十枚煮去皮核搗丸每空心湯下五十丸增至一二百丸忌桃李雀肉服三月而疾除若再常服不嘔不痛胸膈寬利初服時必覺微燥以山梔末湯解之久服自不覺燥諸疸源流黃胖諸疸脾濕病也疸有五曰黃疸曰谷疸曰酒疸曰女勞疸曰黃汗其名各別仲景謂當以十八日為期治之十日以上瘥反劇為難治其故何也説疸病既成則由淺而深當速治曰十八日者五日為一候三候為一氣若其病延至十五日又加三日則一氣有餘雖未滿四候而愈則竟愈故曰為期過此則根漸深而難撥曰治之十日以瘥者言至十日外必宜瘥倘不瘥而反劇必不若初治之可取效而為難治矣此仲景言諸疸之期也古人謂黃疸之為病如罨曲罨醬濕熱鬱蒸變色大抵濕勝則所蒸之色若燻黃黑晦熱勝則所蒸之色若橘黃鮮亮最宜分別而燻黃黑晦一症若兼一身盡疼乃是濕病非疸當從濕治宜除濕羌活湯茯苓滲濕湯疸則身未有疼者試即五疸形症治法詳言之如遍身面目悉黃寒熱食即飢黃疸也經言目黃者曰黃疸以目為宗脈所聚諸經之熱上燻於目故目黃可稔知為黃疸也宜茵陳五苓散連服以小便清為度若無汗則汗之宜桂枝黃芪湯腹滿小便澀出汗則斟酌下之宜酌用硝黃湯腹滿欲吐但以雞翎探吐之嘔則止之宜小半夏湯如食已頭眩寒熱心中怫鬱不安久則身黃谷疸也因飢飽所致亦名胃疸以胃氣蒸衝得之經曰已食如飢者胃疸是也宜茵陳湯如身目黃腹如水狀心中懊憹不食時欲吐足脛滿小便黃赤面黃而有赤斑酒疸也因酒後胃熱醉臥當風水濕得之宜梔子大黃湯加味柴胡湯若但心滿不食尿赤則不用前劑宜當歸白朮湯或變成腹脹漸至面足腫及身急須培土宜藿香扶脾飲如薄幕發熱惡寒額黑微汗手足熱腹脹如水小腹滿急大便時溏女勞疸也實非水濕因房事後醉飽而成經所云溺黃赤安臥者黃疸正理論謂得之女勞者是也宜加味四君子湯若兼小便不利解之宜滑石散兼身目黃赤小便不利清理之宜腎著湯如不渴汗出同梔子水染衣黃汗也因脾熱汗出用水澡浴水入毛孔而成宜黃芪湯以上五疽之異所可分按者也然而五疸之中惟酒疸變症最多説以酒者大熱大毒滲入百脈不止發黃而已溢於皮膚為黑為腫流於清氣道中則脹或成鼻癰種種不同也黑疸詳在後其餘又有陰黃乃傷寒兼症四肢重自汗背寒身冷心下痞硬瀉利小便白脈緊細空虛此由寒涼過度變陽為陰或太陽太陰司天之歲寒濕太過亦變此症宜茵陳四逆湯又有虛黃口淡怔忡寒熱溲白耳鳴腳軟怠惰無力凡鬱不得志人多生此症宜人參養榮湯又有風黃身不黃獨目黃其人肥風不外泄故也宜青龍散又有瘀血發黃身熱小便自利大便反黑脈芤而澀常用藥下盡黑物為度宜桃仁承氣湯又有天行疫癘以致發黃者俗謂之瘟黃殺人最急宜茵陳瀉黃湯濟生茵陳湯五疸之外又有可歷舉者如此大約疸症渴者難治不渴者易治治之之法上半身宜發汗下半身宜利小便切不可輕下惟有食積當用消導宜茵陳湯餘則以利水除濕清熱養胃為主總治諸疸宜化疸湯茯苓澤瀉湯故丹溪以為五疸不必細分但以濕熱概之也夫丹溪之言雖若太簡其實五疸之因不外飲食勞役有傷脾土不能運化脾土虛甚濕熱內鬱久而不泄流入皮膚於周身故色若塗金溺若薑黃耳則是不可不辨者諸疸之症而治之有要者丹溪之言極為真切也特治之之時既概以濕熱復能察各症之由加藥以瘳之更為對症先誤耳至於治疸之藥不宜多用寒涼必君以滲泄佐以甘平斯濕可除熱易解若太寒涼重傷脾土恐變為腹脹此防於末然者也若既成腹脹者治法必須疏導濕熱於大小二便之中總之新起之症惟通用化疸滲濕二湯及久病則宜補益宜參朮健脾湯色疸久加黃芪扁豆子若疸病久而口淡咽乾發熱微寒或雜見虛症赤白濁又當參酌治之宜當歸秦艽散久而虛必溫補宜人參養榮湯或四君子湯下金匱腎氣丸若素虛弱避滲泄而過滋補以致濕熱增甚又不在久病調補之例而亦有服對症藥不效耳目皆黃食不消者是胃中有乾糞也宜飲熬豬油量人氣稟或一杯或半杯日三次以燥糞下為度即夫諸黃之為病其源流症治亦既詳言之矣若夫黑疸為症尤重故特表而出之大約黑疸專由女勞亦兼由於酒惟此二者有以致之其他疸病雖有變症必不致黑試舉仲景之言以證之金匱曰額上黑微汗出手足中熱薄幕即發膀胱急小便自利名曰女勞疸腹如水狀不治説言黃雖必由傷脾而致傷之原有因腎者額為心部黑為水色腎邪重則水勝火而黑見於額也手勞宮屬心足湧泉屬腎水火不相濟故熱又以幕交於酉酉主腎因原有虛熱衛氣並之即發於手足而熱也膀胱為腎腑臟虛則腑急然雖急而非熱流膀胱之比故小便仍利也逮至腹如水狀則脾精不守先後天俱絶矣其可治乎此女勞之所以成黑疸也又曰黃家日晡所發熱而反惡寒此為女勞得之膀胱小腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治消礬散主之仲景為立方因詳辨女勞疸症其初亦未遽即黃故如日晡發熱反惡寒少腹滿身盡黃等症皆與他疸病相類惟額黑足熱膀胱急小便利為女勞所獨以正愈虧而邪愈肆故曰因作黑疸説至是而腎邪遍於周身不獨額上見黑而周身漸黑且腎邪遍於腸胃不獨周身黑而大便亦黑腹脹如水狀者水肆則土敗時溏泄者土敗則不堅然曰似水則非真水故曰此女勞之病非水也至於腹滿則土之敗已極腎邪益不能製而何可治乎然則黑疸之為病固自有由而黑疸之云黑所以專屬女勞之傷腎者言也宜沈氏黑疸方其又曰酒疸下之久久為黑疸目青面黑心中如噉蒜狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之者以酒疸始亦本黃或因誤下則陽明病邪從支別入少陰故積淅而腎傷腎傷故亦從腎色而變為疸也惟其然肝腎同原故肝亦病而目青腎氣上乘而面黑且腎邪乘土故大便俱黑土傷則痹故皮膚不仁腎邪盛而正氣虛故脈浮弱似此種種竟同女勞之疸何以辨其為酒疸不知腎元雖病而其實酒熱未除故心中如噉蒜皆酒積之為味也雖誤下傷腎而黑然實因酒而脈終浮故黑色中猶帶微黃不如女勞疸之純黑也然則酒疸之黑雖亦由傷腎而要與女勞有別矣宜沈氏黑疽方餘故曰黑疽專由女勞兼由於酒曰專曰兼其亦可知矣雖然疸至於於黑危險極矣雖立治之之法亦未必盡效毌徒咎醫之不良也脈法脈訣曰五疽實熱脈必洪數其或微澀悉屬虛弱直指曰疸脈緩大者順弦急而堅者逆諸疸原由症治仲景曰寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色心黃瘀熱以行入門曰經云濕熱相交民病疸疸即黃疸陽而無陰也又曰諸發黃皆小便不利惟瘀血發黃小便自利説熱結下焦則熱傷下焦而小便不利血結下焦則熱但耗血而不耗津液故小便自利也海藏曰凡病當汗而不汗當利小便而不利皆生黃説脾主肌肉四肢寒濕與內熱相合故也正傳曰五疸同是濕熱終無寒熱之異仲景曰脈沉渴欲飲水小便不利者必發黃丹溪曰凡時行感冒及伏暑未解宿食未消皆能發黃時行疫癘亦能發黃人最急又曰黃疸因食積者下其食積其餘但利小便為先小便利黃自退千金方曰傷寒病遇太陽太陰司天若下之太過往往變成陰黃寒水太過士氣不及往往變成此疾繆仲淳曰凡黃有數種傷酒黃誤食鼠糞亦作黃因勞發黃多痰涕目有赤脈益憔悴或面赤惡心者是也用秦艽五錢酒半升浸絞取汁空腹服或利便止就中飲酒人易治屢用得效又法黃疽谷疸用龍膽苦參丸酒疸用茵陳蒿酒豬項肉丸甚至心下懊痛足脛滿小便黃飲灑發赤黑黃斑者由大醉當風入水所致用黃芪散女勞疸因大熱大勞交接後入水所致身目俱黃發熱惡寒小腹滿急小便難用二石散其氣短聲沉者用月經灰酒其體重不眠眼赤如朱心下塊起若瘕者十死一生之症宜烙舌下灸心哄關元二七壯以婦人內衣燒灰酒服二錢時行黃疸用小麥湯走精黃疽多睡舌紫甚面裂若爪甲黑者多死用豉五錢牛脂一兩煎過棉裹烙舌去黑皮一重濃煎豉湯飲之急黃欲死用雄雀糞湯化服之立蘇癇黃如金好眠吐涎用白鮮皮湯婦人黃疸經水不調因房事觸犯所致用蠟礬丸徐忠可曰仲景言黃疸初時由風兼挾寒濕後則變熱然其立方雖有谷疸茵陳蒿湯主之女勞疸消礬散主之酒疸梔子大黃湯主之正黃疸發汗桂枝加黃芪谷氣實豬膏發煎兩解表裡茵陳五苓散有裡無表大黃消石湯真寒假熱小半夏無表裡而虛小建中湯之別未常專於治風專於治寒專於治濕惟清熱開鬱而為肺為胃為脾為腎分因用藥絶不兼補豈非治黃疸法以清熱開鬱為主雖亦有汗下之説而破氣與溫補大汗及大下皆非所宜乎黃胖宿病也與黃疸暴病不同説黃疸眼目皆黃無腫狀黃胖多腫色黃中帶白眼目如故或洋洋少神雖病根都發於脾然黃疸則由脾經濕熱蒸鬱而成黃胖則濕熱未甚多蟲與食積所致必吐黃水毛發皆直或好食生米茶葉土炭之類宜四寶丹有食積用消食之劑宜神曲紅曲山楂谷芽麥苛蔔子針砂消食平肝其央最速不可缺又須帶健脾去濕熱之品治之無不愈者宜二朮茯苓澤瀉力役人勞苦受傷亦成黃胖病俗名脫力黃好食易飢怠惰無力宜沈氏雙砂丸此又在蟲食黃病之外者黃胖症治得效曰食勞疳黃一名黃胖夫黃疸者暴病也故仲景以十八日為期食勞黃者久病也至有久而終不愈者正傳曰緑礬丸褪金丸二方治黃胖病最捷繆仲淳曰脾病黃腫者用青礬四兩煅成赤珠子當歸四兩酒醉浸七日焙百草霜三兩為末以浸藥酒打糊丸梧子大每服五丸至七丸溫水下一月後黃去立效又脾勞黃病針砂四兩醋淬七次乾漆燒存性二錢香附三錢平胃散五錢為末蒸餅丸湯下又好食茶葉面黃者每日食棐子七枚以愈為度入門曰黃病愛吃茶葉者用蒼朮白朮各三兩石膏白芍黃芩南星陳皮各一兩薄荷七錢砂糖煮神曲糊丸空心砂糖水吞下五七十丸又黃病吃生米者用白朮一錢半蒼朮一錢三分白芍陳皮神曲麥芽山楂茯苓石膏各一錢厚朴七分藿香五分甘草三分砂糖末一匙沖服治黃疸病方三十七除濕羌活湯濕似疽蒼朮藁本羌活防風升麻柴胡茯苓滲濕湯諸疸茵陳茯苓豬苓澤瀉白朮蒼朮陳皮黃連山梔秦艽防己葛根食後服桂枝黃芪湯又桂枝白芍甘草生薑大棗黃芪此治無汗須熱服須臾飲滾水以助之即汗如無汗再服硝黃湯又大黃硝石黃柏山梔小半夏湯又半夏生薑茵陳湯谷疸茵陳山梔大黃梔子大黃湯酒疽山梔大黃枳實淡豉葛根加味柴胡湯又茵陳草柴胡黃芩半夏黃連淡豉葛根大黃當歸白朮湯又茵陳草當歸白朮黃芩甘草半夏枳實前胡茯苓棗仁藿香扶脾飲又炙甘草厚朴半夏藿香木香陳皮麥芽日二服加味四君子湯女勞人參黃芪茯苓白朮炙草白芍扁豆薑棗滑石散又滑石錢半活礬三分為末大麥湯下腎著湯又升麻防風蒼朮白朮羌活獨活茯苓豬苓柴胡葛根甘草澤瀉人參神曲黃柏又方四苓合四物去川芎加茵陳麥冬滑石黃芪湯黃汗黃芪赤芍茵陳石膏麥冬淡豉甘草生薑竹葉茵陳四逆湯陰黃茵陳附子甘草乾薑濟生茵陳湯疫疸茵陳四錢大黃二錢山梔一錢茵陳瀉黃湯又茵陳草葛根薑黃連山梔白朮赤苓白芍人參木通木香薑棗人參養榮湯虛黃人參當歸白芍陳皮黃芪肉桂白朮炙草熟地茯苓遠志五味薑棗青龍散風黃防風荊芥首烏生地威靈仙每末一錢食後開水下日三次桃仁承氣湯血黃大黃芒硝厚朴枳實桃仁化疸湯總治茵陳蒼朮木通山梔茯苓豬苓澤瀉苡仁停滯加神曲麥芽山楂酒疸加葛根苜蓿勞加當歸紅花瘀血加琥珀丹皮紅花紅曲蒲黃桃仁五靈脂延胡索參朮健脾湯久疽人參白朮茯苓當歸陳皮白芍炙草大棗當歸秦艽散又川芎當歸白芍熟地茯苓秦艽白朮陳皮半夏炙草四君子湯又人參茯苓白朮炙草金匱腎氣丸又熟地八兩山萸山藥各四兩丹皮茯苓澤瀉各三兩附子肉桂各一兩牛膝車前子各兩半硝礬散黑疸硝石礬石燒等分為末大麥粥汁服方寸匕日三服病隨大小便去小便正黃大便正黑是其候也硝能散虛鬱之熱為體輕脫而寒不傷脾礬能卻水而所到之處邪不復侵合而用之散鬱熱解腎毒其於氣血陰陽汗下補瀉等治法毫不相涉所以為佳沈氏黑疸方又茵陳蒿四兩搗取汁一合瓜蔞根一斤搗取汁六合衝和頓服之必有黃水自小便中下如不下再服此金鰲自製方也簡便方單用瓜蔞根汁以泄熱毒為黑疸良方餘復加茵陳汁以為濕邪引導較為真切故用之輒效也龍膽苦參丸谷疸勞疸龍膽草一兩苦參三兩牛膽汁丸梧子大食前以生大麥苗汁或麥飲下五丸日三服不減稍增谷疸照原方勞疸再加龍膽一兩山梔子三七枚更妙豬膽汁丸亦可茵陳蒿酒酒疸茵陳蒿四根山梔七枚大田螺一個連殼打爛以百沸白酒一大盞沖汁飲之豬項肉丸又豬項肉一兩剁如泥甘遂末一錢和作丸紙包煨香食之酒下當利出酒布袋也黃芪散又黃芪二兩木蘭一兩每末方寸匕酒下日三服二石散女勞滑石石膏等分為末每方寸匕大麥汁服日三次小便大利愈腹滿者不治月經灰酒又女人月經和血衣灰酒服方寸匕日二服三日瘥小麥湯時行小麥七升竹葉五升切石膏三兩水一斗半煮取七升細服盡劑愈白鮮皮湯癇黃白鮮皮茵陳蒿等分水二鐘煎服日二服蠟礬丸婦人白礬黃蠟各五錢陳皮三錢化蠟作丸以調經湯下治黃胖方四四寶丹黃胖使君子肉二兩檳榔南星製各一兩以此三味為主如吃米加麥芽一斤如吃茶葉加細茶一斤如吃土加堊土一斤如吃炭加黑炭一斤蜜丸空心砂糖水送下五十丸緑礬丸又五倍子炒黑神曲炒黃各八兩針砂炒紅醋淬緑礬薑汁炒白各四兩薑汁煮棗肉丸溫酒下六七十丸米飲下亦可終身忌食蕎麥麵犯之必再發不治褪金丸又針砂醋淬便香附各六兩白朮蒼朮各二兩半陳皮神曲麥芽各兩半厚朴甘草各一兩面糊丸米湯下五七十丸忌魚腥濕面生冷等物有塊加醋三稜醋蓬朮各一半沈氏雙砂丸脫力黃針砂四兩炒紅紅醋淬至白色砂仁一兩生研香附便浸炒五錢皂礬白饅頭包煅紅一兩廣木香生研一兩大麥粉三升胡桃肉四兩生搗如泥同黑棗一斤煮爛去皮核為丸每服一錢半脫力勞傷陳酒下一切黃病米飲下每病不過服四兩多至六兩無不愈此金鰲自製方也用以治脫力黃及一切黃神效附載楊氏黃病方二餘糧丸總治脫力勞傷黃病及一切黃胖病仙方也餘糧石醋煅一斤海金沙醋炒二兩皂礬浮麥醋炒四兩豨蘞草酒炒二兩益母草蜜酒炒二兩百草霜醋炒二兩香附便浸鹽酒炒四兩茵陳酒炒二兩烏龍尾醋酒炒二兩廣皮焙二兩砂仁薑汁炒二兩白蔻仁烘二兩松夢茶焙脆二兩木香曬二兩生地酒煮曬二兩歸身炒二兩白芷二兩陳香櫞切片曬二兩川貝母去心曬二兩川椒曬二兩延胡索酒炒二兩漆渣炒煙盡二兩大棗六斤煮取肉作丸豌豆大朝七暮八開水送下以病愈為度香附丸治同上香附童便浸炒一斤針砂醋煅一兩厚朴薑汁炒五兩甘草炒一兩陳皮去兩白芍炒五兩製蒼朮五兩山楂肉炒黑五兩茯苓乳蒸曬焙三兩青皮炒六兩苦參炒春夏二兩秋冬一兩白朮土炒三兩醋糊丸每一錢米飲下弱者七八分白朮湯下忌一切生冷油膩腥發磁硬之物服過七日手心即涼內有紅暈起調理半月即愈矣虛弱人宜佐以四君子湯
