body:
  text: 卷六心病源流伏梁心痛心癰手少陰心脈起心中出屬心係下鬲絡小腸其支者從心係上挾咽係目係其直者複從心係上肺下出脇下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端次注於手太小腸經每日午時周身氣血俱注於心手少陰心經少血多氣十二經皆聽命於心故為君位南方配夏令屬火故為君火十二經之氣皆感而應心十二經之精皆貢而養心故為生之本神之居血之主脈之宗說神以氣存氣以精宅其理洵不誣也惟心精常滿故能分神於四臟惟心氣常充故能引精於六腑此所以為心之大概也心與腎連經曰心舍脈其主腎經不以其剋而反以為主故必腎水足而後心火融腎水不足必至心火上炎而心與腎百病蜂起矣故心當無病時養之之法有二一從本經以養其氣勿過思抑志或事未至而迎事已往而戀使神明耗散若過用其心則傷其氣氣傷並傷其精而神無以為守試觀孔子毋意毋必毋固毋我孟子必有事焉勿正勿忘勿助養心之法至孔孟為已極孔孟並末嘗言醫其所以養心曷嘗有外於是哉一從腎經以養其精勿縱情房慾勿貪戀女色致相火常炎不能握固若守腎無節則傷其精精傷遂傷其氣而水不能制火陰不能為陽宅而水氣因以凌心矣是以象川翁曰精能生氣氣能生神榮衛一身莫大於此養生之士先寶其精精滿則氣旺氣旺則神旺神旺則身健身健則少病朱丹溪曰主閉藏者腎司疏泄者肝二臟皆有相火而其繫上屬於心心君火也感則動心動則相火亦動而精自走可知精之走泄固由於腎累於肝傷於心一病則俱病象川丹溪明揭其旨固可為千古養心家炯戒也然則心失所養而心病腎失所養而心不亦病乎且夫心主血血即精也心氣原自有餘特精傷而失血心便不足故血盛則神明湛一血衰則志氣昏蒙凡火之有餘皆由血之不足而血之不足又能使火益就衰也然則心病之有餘不足詎得與運氣司天之火淫火鬱徒屬乎火者同視哉亦惟握精以固其氣養陰以凝其神以調劑其有餘不足使歸於和而已以上皆言心之所由致病與養其心所以至於無病也然而病不能已試據經以觀心之病經曰心病者胸中痛脇支滿脇下肩背胛間痛兩臂內痛虛則胸腹痛大脇下與腰相引痛就經所言病皆在血脈而不在心何也以心為血脈之主故其實其虛皆不見本臟而在血脈其在血脈必先於在經絡者病之也若胸腹腰脇間皆心與心包之所在做先病於本經也其虛而腹胸大則緣脾胃不上納氣於心而然虛而脇下與腰相引痛又緣肝腎不上貢精於心而然此其病非止於本經絡可由本經絡而推者也經又曰若心經絡病者動則嗌乾心痛渴而欲飲以及所生病目黃脇痛懦臂內後廉痛厥掌中熱痛其皆為本經絡病固已而其病卻能及心說支脈挾咽病則通於心故嗌者心火必炎故心痛火炎則陰耗而心液乾故必渴且心部在陽明心痛而熱及陽明陽明亦必熱故渴而欲飲目黃等症皆心脈熱逆之故所謂經絡病而及心者如此經又曰精氣並於心則喜驚而奪精汗出於心又曰憂思則傷心何謂歟喜者心之浮陽心好勝精氣並於心則心有餘故陽浮動而喜驚者肝膽虛怯之氣肝膽失利不能衛心故心氣內空而奪精神不守榮而汗出思者心之神明思而弗遂則憂憂思不已必神明內擾而往來憧憧故傷心凡諸心病皆由於不能養精以馭氣而使神以氣存氣以精宅也欲求心無病者可不於此加之意哉脈法脈訣曰心脈芤陽氣作聲或時血痢吐交橫溢關骨痛心煩躁更兼頭面赤騂騂大熱由來面赤風燥痛面色與心同微寒虛惕應寒熱急則腸中痛不通實大相兼並有滑舌滑心驚語話難單滑心熱別無病澀無心力不多言沉緊心中逆冷痛弦時心急又心懸又脈訣曰五臟不同各有本脈左寸之心浮大而散仲景曰心傷者其脈弦心病緣由症治靈樞曰邪在心則病心痛善悲時仆眩又曰心藏脈脈舍神心氣虛則悲實則笑不休素間曰腎傳之心病筋脈相引而急病名曰瘛又曰心熱者色赤而絡脈溢也又曰大骨活大肉陷胸中氣滿喘不休內痛引肩項期一月死真臟脈見乃與之期日又曰心病者日中慧夜半甚平旦靜又曰心苦緩急食酸以收之注曰苦緩心氣虛也又曰心欲軟急食鹹以軟之用鹹補之甘瀉之又曰心病禁溫食熱衣難經曰憂愁思慮則傷心仲景曰心家陰氣衰者為癲陽氣衰者為狂又曰心傷者勞倦則頭面赤而下重心中痛而自煩發熱臍上跳其脈弦此為心藏傷所致也難經曰外症面赤口乾善笑內症臍上有動氣按之牢若痛期病煩心心痛掌中熱而啘有是者心也無是者非也手少陰無腧靈樞曰少陰者心脈也五臟六腑之大主也其臟堅固邪不能容容則傷心心傷則神去而死故諸邪在於心者皆在心包心包者心主之脈也故少陰無腧又曰其外經病而臟不病故獨取其經於掌後銳骨之端即神門也心絕候靈樞曰手少陰氣絕則脈不通脈不通則血不流血不流則色不澤故其面黑如漆柴者血先死壬日篤癸日死仲景曰形體煙煤直視搖頭者此為心絕脈經曰心絕一日死何以知之肩息回視立死一云二日死心氣滯澀保養法保生秘要曰凡人氣旺則血榮而潤澤氣絕則血活而滅形故氣虛弱滯澀而成病如滯於心心為身之主統領血海故心血少則神不定寢不安百病集作諸痛癢瘡痍皆屬心火當常呵以泄其火吸以和其心諸心切勿食穢氣觸我靈夏至夜半後地氣一陰生大熱勿食冷受寒霍亂侵並忌房中事元氣離命門大抵當甚暑人善於養心則無秋患時當飲六一燈心湯豆蔻香茹水醉飽勿頂風前臥慎此則無患矣心臟修養養生書曰常以四月五月朔望清旦面南端坐叩金梁九漱元泉三靜思注想吸離宮赤色氣入口三吞之閉氣三十息心臟導引臞仙曰可正坐以兩手作拳用力左右互相築各六度又可正坐以一手按脘上一手向下托空如重石又以兩手相叉以腳踏手中各五六度能去心胸間風邪諸疾閉氣為之良久閉目三咽津三叩齒而已心之積曰伏梁起臍上大如臂上至心下久則令人煩心身體脛股皆腫環臍而痛脈沉而芤皆由心經氣血兩虛以致邪留不去也治宜活血涼血散熱通結宜伏梁丸斯得之矣伏梁有二症內經曰帝曰病有小腹盛上下左右皆有根此為何病可治否岐伯曰病名曰伏梁裹大膿血居腸胃之外不可治治之每切按之致死矣帝曰人有身體股胻皆腫環臍而痛是為何病岐伯曰病名伏梁此風根也其氣溢於大腸而著於膏肓之原在臍下故環臍而痛不可動之動之為尿澀之類此二病同名而實異也心痛包絡病實不在心也心為君主不受邪或君火衰盛大寒觸犯心君亦或汗血沖心素無心病卒然大痛無聲咬牙切齒舌青氣冷汗出不休手足青過節冷如冰是為真心痛旦發夕死夕發旦死若不忍坐視或使心經寒散亦可死中求活宜用豬心煎湯去渣麻黃肉桂附子乾薑如但爬床搔席面無青色四肢不厥痛亦不至無聲即非真心痛由包絡捧心或寒或痰或蟲或食上干包絡脂膜緊急作痛宜各從其類審脈用藥總治宜必應湯夫心主諸陽又主陰血故因邪而陽氣鬱者痛陽虛而邪勝者亦痛因邪而陰血凝注者痛陰虛而邪勝者亦痛其痛分九種曰食必飽悶噫敗卵氣由食生冷或食物過多也宜青皮丸曰飲必噁心煩悶時吐黃水甚則搖身作水聲由傷水飲痰涎積聚也宜小胃丹胃苓湯熱飲加黃連甘遂褰飲加肉桂茯苓蒼朮半夏水飲流注胸膈痛宜三花神佑丸曰風因傷風冷或肝邪乘心兩脇引痛也宜羌活荊芥等曰寒外受寒當溫散內受寒當溫利久則寒必鬱當疏解總治宜朮附湯虛寒當溫補宜歸脾湯加乾薑肉桂菖蒲腎寒乘心痛則心懸如飢泄利下重宜五積散寒氣客背哄之脈則血脈澀血脈澀則血虛血虛則痛其哄注於心故相引而痛宜桂枝四七湯神效散曰熱必身熱煩躁掌熱口渴便秘面目赤黃大熱作痛由積熱攻心或暑熱入心也宜金鈴子散剪紅丸甚者宜大承氣湯痛不止熱未清也宜清中湯曰悸勞役則頭面赤而下重自煩發熱脈弦臍上跳心中痛由心傷也宜辰砂妙香散加味四七湯曰血脈必澀壯盛人宜下宜代抵當湯虛弱人須補而帶行宜四物湯加桃仁穿山甲肉桂心蓬朮降香飲下作呃亦須行之宜手拈散曰蟲必面色青黃有白斑唇紅能食或食後即痛或痛後即能食或嘔噦涎沫或吐青水凡吐水者蟲痛不吐水冷心痛也蟲心痛小兒多有之上半月蟲頭向上易治先以雞肉汁或蜜糖飲之隨服妙應丸或剪紅丸曰疰鬼疰也必心痛神昏卒倒昏憒妄言或口噤由卒感惡也宜蘇合丸此所謂九種心疼也顧經言心痛未有不兼五臟者經曰厥心痛與背相控善瘛如從後觸其心傴僂者腎心痛也宜神中保元神聖復氣湯腹脹胸滿胃脘當心痛上支兩脇咽膈不通胃心痛也宜草豆蔻丸清熱解鬱湯如以錐針刺其心心痛甚者脾心痛也宜訶子散復元通氣散色蒼蒼如死狀終日不得太息肝心痛也宜金鈴子散內外邪犯心之包絡或他臟之邪犯心之支脈故心亦痛此厥心痛也謂之厥者諸痛皆肝腎二經氣逆上衝又痛極則發厥也但分寒熱二種手足厥逆冷汗尿清不渴氣微力弱而心痛則寒厥心痛也宜朮附湯身熱足冷煩躁脈洪大而心痛甚則熱厥心痛也宜金鈴子散清鬱散經又曰陽明有餘上歸於心滑則病心疝心痛引少腹滿上下無定處溲便難者取足厥陰肝心痛腹脹嗇然大便不利取足太陰脾心痛短氣不足以息取手太陰肺心痛引背不得息取足少陰腎以上皆他臟之病干之而作痛者非心本經自病也治法當兼用各臟藥經又曰邪在心則病心痛喜悲時眩仆此則包絡受邪痛在腑不在臟者也經又曰手少陽三焦脈動則病嗌干心痛渴而欲飲此則別絡受邪痛在絡不在經者也二者之痛皆因怵惕思慮傷神涸血而然宜補心湯而亦有卒心痛脈洪數者宜黃連一兩煎湯頓服如按之痛減則為虛宜酸收不應辛散宜歸脾加乾薑肉桂菖蒲有心膈大痛嘔逆發厥藥不納者趁勢以鵝毛探吐痰盡而痛自愈內服藥宜南星安中湯有蛔蟲嚙心者痛有休止或吐蛔蛔動則噁心嘔吐宜烏梅丸蕪夷散心痛之不同如此總之七情之由作心痛食積痰飲瘀血作胃痛二語正是分明曷言乎心痛由七情也經云喜則氣散怒則氣上憂則氣沉思則氣結悲則氣消恐則氣下驚則氣亂除喜之氣能散外餘皆足令心氣鬱結而為痛也然心痛亦有虛實按之痛止者虛也宜參朮散按之痛反甚者實也宜梔萸丸凡痛多用溫散之藥獨不可用補氣血藥以氣旺不通則痛愈甚也脈法脈訣曰心腹痛脈沉細宜浮大弦長命必殂又曰沉弦細動皆是痛症心痛在寸腹痛在關下部在尺脈象顯然丹溪曰心痛左手脈數熱多也脈澀有死血也右手脈緊實是痰積也脈大必是久病也兩手脈堅實不大便可下之痛甚者脈必伏正傳曰心脈微急為痛微大為心痺引背痛短而數或澀者心痛心痛症治入門曰心痛引背多屬風冷心痛嘔瀉難以俯仰多屬熱丹溪曰凡心胃痛須分新久若明知身受寒冷口吃寒物而得者於初得之時當與溫散如桂枝四七湯之類或溫利之如九痛元之類若得之稍久則成鬱鬱久必生熱熱久必生火若溫散溫利則助火添邪由是方中多以山梔為熱藥之向導則邪易除正易復痛易安又曰心胃痛須用劫藥痛乃止如倉卒散山梔四十九枚連皮炒附子一個炮去皮臍共為粗末每三錢水一盞酒半盞煎七分入鹽少部服加川芎一錢尤妙能治氣自腰腹間攣急疼痛不可屈伸痛不可忍自汗如洗手足冷而垂死者又如愈痛散五靈脂延胡索蓬朮良薑當歸等分共為末每二錢醋湯調服能治急心痛胃疼又曰心胃痛用山梔劫藥止之又複發前藥必不效可加元明粉一錢服之即止矣飲食禁忌丹溪曰心胃痛日數多雖不吃飯不死若痛止便吃物即復發必須三五日服藥方可吃物導引保生秘要曰於足三里掐之九九擦也九九運行後央痛氣降而癒運央保生秘要曰行歸元逐痛處流行胃火自然發散此導引運央二法不但治心痛兼治胃口痛心癰心熱病也經曰諸痛癢瘡瘍皆屬心火其發於他經者且莫不由於心火況本經積熱而即發於本經部位者乎其所以致熱之故則必其平日好飲酒或嗜食辛辣熱物以致日久凝聚而生此症也宜先用涼血飲次服加味十奇散心癰症治靈樞日巨闕穴名隱隱而痛者心疽上肉微起者心癰也入門曰心癰者於胸乳間生蜂窠癰發靈樞經所謂一名井疽狀如豆大三四日起不早治則入於腹七日死急用疏導心火之藥宜用清心丸清心散內固清心散瀉心湯瘍科選粹曰心癰發胸乳間者名井疽若在鳩尾者最緊要係心熱極盛者當導心火緩則不救小便澀者清心散或涼膈散去硝黃加白芷花粉木通瞿麥大便秘者內固清心散涼膈散去硝加白芷花粉生地發於膺名甘疽其色青狀如谷實瓜蔞常苦寒熱不急治十日死死後出膿治心病諸藥要品及方五心實宜降火清熱黃連石膏甘草麥冬牡丹皮犀角滑石竹葉燈心童便如大便結燥須大黃芒硝發狂譫語亦如之心虛宜益氣補血人參炙草圓眼茯神金石斛生黃棗仁丹參遠志五味子鹿茸丹砂炒鹽琥珀柏子仁龍齒金箔牛黃麥冬代赭石桔梗竹瀝貝母鬱金陳膽星鉤鉤白芍黃連元參沙參竹茹當歸黃耆枸杞子黃岑黃柏牡蠣天冬紫石英錢氏安神補虛水飛朱砂一兩麥冬牙硝寒水石茯苓山藥甘草各五錢冰片二分半蜜丸每兩作三十丸每丸砂糖水化下醒心散心虛熱人參麥冬遠志茯神五味子石菖蒲生地等分長一瀉心湯瀉心熱黃連不拘多少為極細末每服二分半或五分或一錢溫水調下導赤散心熱生地木通甘草各一錢竹葉七片此雖治心熱實小腸之藥也十味導赤散實熱黃連黃岑麥冬半夏茯苓木通生地甘草地骨皮各用五分薑五片此治心臟實熱一切口舌生瘡驚悸煩渴諸症附載仲景大法及分別標本方藥有餘為熱氣牛黃黃連冰片天竺黃血朱砂生地黃柏不足為寒氣人參茯苓乾薑菖蒲血地黃當歸肉桂心盛則生熱子能令母實實則瀉其子心虛熱收內母能令子虛虛則補其母逆則多盛大黃川黃連大則病進熟地黃朱砂心悸汗多桂忮少陰柴胡陰症茯苓雜病朱砂痞悶虛半夏寒白朮乾薑濕茯苓澤瀉實枳實熱大黃黃連燥木瓜芍藥痞心下有水枳實澤瀉自朮心下無水木瓜芍藥旋覆花之心下痞雜病半夏芍藥傷寒甘草瀉心湯下之脇下痛虛芍藥柴胡實牡蠣柴胡一法火鬱則發之渭汗之令疏散也標黃連子能令母實實則瀉其子本地黃先者自病丁與丙同治治伏梁方二伏梁丸總治黃連一兩半人參厚朴各五錢黃岑桂枝丹參茯苓各一錢乾薑菖蒲巴霜川烏各五分紅豆蔻二分蜜丸服法詳息賁症增損五積丸通治黃連厚朴川烏乾薑人參茯苓藥品分量加減製法俱詳息賁症治心痛方三十九必應湯類心痛延胡索香附艾灰歸身砂仁薑青皮丸食痛青皮山楂神麯麥芽草果小胃丹飲痛芫花甘遂大戟大黃黃柏白朮煎膏丸菔子大臨臥湯下一錢欲利空心服之胃苓湯又蒼朮厚朴陳皮甘草白朮茯苓豬苓澤瀉肉桂薑棗朮附湯寒痛白朮附子甘草歸脾湯虛弱人參黃耆當歸白朮茯神棗仁遠志桂圓木香甘草薑棗金鈴子散熱痛金鈴子延胡索痛止當與香砂枳朮丸剪紅丸又蓬莪朮京三稜雄黃木香尖檳榔貫仲乾漆陳皮大黃糊丸每五十丸米湯下清中湯大熱黃連山梔陳皮茯苓半夏甘草草豆蔻薑加味歸脾湯悸痛人參黃耆當歸白朮茯神棗仁遠志桂圓木香甘草薑棗加菖蒲肉桂代抵當湯血痛四物湯虛弱川芎當歸白芍生地手拈散呃痛延胡索五靈脂草果沒藥等分為末每三錢熱酒下妙應丸蟲痛檳榔一兩二錢黑牽牛頭末三錢大黃雷丸錫灰蕪夷木香使君子肉各一錢蔥白煎濃湯露一宿和丸栗米大每四錢五更蔥湯下如取寸白蟲以石榴根皮煎湯下小兒服一錢或五分天明取下蟲物此丸不損真氣有蟲則下蟲有積即下積有氣即消氣一服見效蘇合丸疰痛白朮犀角訶子朱砂蓽拔香附木香檀香沉香丁香麝香安息香薰陸香蘇合香油補心湯絡痛人參當歸茯神遠志地黃甘草柏子仁南星安中湯膈痛烏梅丸蛔痛烏梅十五個黃連七錢半當歸川椒細辛附子人參肉桂黃柏各三錢醋浸烏梅取肉打和為丸米飲下一二十丸蕪夷散又蕪夷雷丸各五錢乾漆一錢共為末溫水調下二錢小兒服五分三花神佑丸因飲五積散因寒桂枝四七湯因寒桂枝半夏各二錢灑白芍一錢半茯苓厚朴枳殼各七分人參紫蘇葉炙甘草各五分薑三棗二九痛元因冷附子三兩吳萸人參乾薑炮巴霜各一兩狼毒五錢蜜丸梧子大溫酒下三五丸神效散又木香青皮陳皮麥牙枳殼三稜蓬朮神麯肉桂白芷白芍甘草延胡索補骨脂各七分蓽澄茄丁香各三分薑三棗二辰砂妙香散悸痛黃耆山藥茯苓茯神薑遠志各一兩人參桔梗甘草各五錢辰砂三錢木香二錢半麝香一錢每末二錢蓮肉湯下加味四七湯又半夏二錢赤苓厚朴各錢二分茯神蘇葉各八分薑遠志炙甘草各五分薑三棗二石菖半寸大承氣湯實熱神保元腎心痛全蠍七個巴霜十粒木香胡椒各二錢半朱砂錢半為衣蒸餅丸薑湯下五七丸神聖復氣湯水先一日用酒柏酒連酒生地枳殼俱用新水浸再用新水浸川芎蔓荊子細辛以上七味各三分又羌活柴胡各一錢藁本甘草各八分半夏升麻各七分當歸六分郁李仁防風人參各五分附子炮薑各三分白葵花三朵去心碎水五盞煎至二盞入黃耆草蔻各一錢橘紅五分煎至一盞乃入前浸兩藥連水傾入煎至一盞去渣熱服參朮散因虛人參白朮炮薑白豆蔻縮砂仁丁香陳皮甘草各一錢薑三片加炒蚌粉二錢尤妙梔萸丸氣實山梔兩半吳萸香附各二錢半蒸餅丸生薑生地煎湯下二三十丸草豆蔻丸胃心痛枳實二兩草蔻煨白朮各一兩麥芽神麯半夏各五錢乾薑青皮陳皮各二錢炒鹽五分蒸餅丸白湯下清熱解鬱湯又山梔一錢半枳殼川芎香附各一錢炒黃連蒼朮各七分陳皮薑炭炙草各五分薑三片煎服戒飲食半日一服即止訶子散脾心痛炮訶子厚朴炮薑草果陳皮炒良薑茯苓神麯麥芽炙草等分為末每三錢入鹽少部痛時煎服復元通氣敬又白醜頭末二兩穿山甲炙炒茴香各一兩五錢去白陳皮延胡索炙草各一兩木香五錢共為末每二錢薑湯下清鬱散厥心痛半夏陳皮蒼朮茯苓便香附神麯薑黃連薑梔子各一錢川芎六分薑炭五分炙草三分薑三片倉卒散劫藥黑山梔四十九個大附子一個炮為粗末每三錢水酒鹽少部煎服愈痛散又五靈脂延胡索蓬朮炒良薑當歸等分為末每二錢醋湯調服心頭痛方總治歌曰三個烏梅三個棗七粒杏仁一處搗麝香一粒用酒煎永不心疼直到老烏梅棗子俱去核杏仁泡去皮尖麝香如小綠豆部共搗如泥黃酒一杯煎兩沸溫服正痛時服之婦人尤神效當時即止治心癰方七涼血飲總治木通瞿麥荊芥薄荷白芷花粉赤芍麥冬生地山梔連翹車前甘草備八分加燈心竹葉一名引兵先鋒能退潮止渴解熱令毒內消加味十奇散又人參黃耆當歸肉桂川芎白芷防風桔梗厚朴甘草乳香沒藥共為末每三錢溫酒調服不飲酒麥冬湯下此即十宣散加乳香沒藥也一名固壘元帥不論已成末成服之內消年衰氣弱者尤宜清心丸又黃連一兩茯神赤苓各五錢蜜丸米湯下諸痛癢瘡瘍皆屬心火此藥主之清心散又遠志赤苓赤芍生地麥冬知母甘草各一錢薑三棗二加黃連尤效瀉心湯又大黃錢半黃連黃岑山梔漏蘆澤蘭連翹蘇木各七分內固清心散又白豆蔻人參朱砂赤苓雄黃綠豆朴硝甘草皂角各一錢冰片麝香各一分共為末每一錢蜜水調下涼膈散又連翹山梔大黃薄荷黃岑各七分甘草一錢八分朴硝四分竹葉十片怔忡源流卑諜怔忡心血不足病也人所主者心心所主者血心血消亡神氣失守則心中空虛怏怏動搖不得安寧無時不作名曰怔忡或由陽氣內虛宜人參黃耆白朮炙甘草茯神或由陰血內耗宜人參麥冬當歸地黃圓眼或由水飲停於心下水氣乘心侮其所勝心畏水不自安宜茯苓茯神白朮半夏橘紅或急急富貴戚戚貧賤或事故煩冗用心太勞甚至一經思慮便動皆當以養心血調心氣清熱豁痰為主宜酌用清鎮湯如心火熾又須安神宜安神丸或由汗吐下後正氣孱弱宜人參黃耆白朮白芍或由榮衛俱涸脈來結代而心惕不寧宜養心湯或由虛弱怔忡而臥不安宜棗仁湯或思慮多而怔忡兼不寐便濁宜養榮湯或心虛怔忡而兼自汗宜參歸腰子或由痰為火動而時作時止宜二陳湯或由憂愁悲苦致心虛而動宜歸脾湯或由氣鬱不宣而致心動宜加味四七湯加薑汁竹瀝或陰火上衝怔忡不已甚至頭暈眼花齒髮脫落或見異物或腹中作聲急應滋陰降火加養心之品宜四物湯加知母黃柏如久服降火藥不愈為無根失守之火宜八味丸或由所求不遂或過縱自悔吁嗟夜語真若有失宜溫膽湯加人參柏子仁朱砂為衣日進三服以上皆怔忡所致之由也若心澹澹動此係包絡所生病宜鎮胞湯說心為君火包絡為相火火陽主動君火之下陰精承之相火之下水氣承之則為生氣而動得其正若乏所承則煩熱而為心動法當補其不足以安神氣未瘥則求其屬以衰之若由於痰飲者當用逐水消飲之劑宜二陳湯芎夏湯況乎各臟有痰皆能與包絡之火合動而為怔忡隨所犯而補瀉之更須調乎包絡若各臟移熱於心以致包絡火動者治亦如之然則怔忡固由於虛所以致此怔忡之症則各有異亦安可不察之哉脈法靈樞曰手厥陰之脈甚動則心中澹譫大動怔忡形症內經曰膽病者亦心中澹澹如人將捕又曰太陽司天褰淫所勝則病心澹澹大動寒傷心主也注曰澹澹水搖貌此屬水病直指曰心虛而停水則胸中滲漉虛氣流動水既上升心火惡之心不自安使人有怏怏之狀是為怔衝又曰怔忡因驚悸久而成也綱目曰怔忡惕惕然心動而不寧無時而作者是也又曰心澹澹動者因痰動也謂非驚怕而心自動也資生曰內經謂胃絡名虛裡貫膈絡肺出左乳下其動應衣虛而有痰則動更須臾發一陣熱者是也怔忡治法入門曰怔忡因驚悸久而成也痰在下火在上參胡溫膽湯加黃連梔子當歸貝母氣鬱者金箔鎮心丸停飲者二陳湯加茯苓檳榔沉香麥冬直指曰心下有水氣怔忡宜五苓散醫鑑曰怔忡亦曰怔忪與驚悸同看宜益榮湯薑朮湯四物安神湯朱雀丸加味寧神丸天王補心丹卑惵心血不足病也與怔忡病一類其症胸中痞塞不能飲食如癡如醉心中常有所歉愛居暗室或倚門後見人即驚避無地每病至數年不得以癲症治之也宜天王補心丹人參養榮湯古庵腎丸治怔忡方二十二清鎮湯勞心茯神棗仁遠志菖蒲石蓮當歸生地貝母麥冬柏子仁如犀角朱砂西珀龍齒牛黃麝香等病深者方可酌加之不得概用也安神丸心火黃連六線朱砂五錢生地二錢半炙甘草當歸各二錢養心湯脈結代黃耆當歸茯神茯苓川芎半夏各錢半遠志棗仁人參五味子柏子仁各一錢炙甘草五分如覺胸中有聲便是停水加赤苓檳榔棗仁湯虛弱黃耆棗仁茯苓遠志蓮子各錢二分人參當歸茯神各一錢炙甘草陳皮各五分養榮湯思慮當歸小草黃耆棗仁茯神木香人參白芍麥冬炙甘草柏子仁各一錢參歸腰子虛弱人參歸身各五錢豬腰一只去筋膜細切同煎並腰子藥汁食之二陳湯痰火茯苓陳皮半夏甘草芎夏湯心動加味四七湯氣鬱半夏二錢赤苓厚朴各錢二分蘇葉茯神各八分薑遠志炙甘草各五分石菖蒲半寸薑七片棗二枚歸脾湯憂愁人參黃耆當歸白朮茯神遠志棗仁龍眼木香炙草薑棗四物湯陰火川芎當歸白芍生地八味丸游火熟地山萸山藥丹皮澤瀉茯苓肉桂附子溫膽湯包絡動人參茯神遠志朱砂金石斛生地麥冬棗仁甘草五味子柏子仁參胡溫膽湯痰火香附二錢四分橘紅錢二分半夏枳實竹茹各八分人參茯苓柴胡麥冬桔梗備六分甘草四分薑三棗二此即加味溫膽湯能治心膽虛怯觸事易驚涎與氣搏變生諸症金箔鎮心丸氣鬱膽星一兩朱砂西珀天竺黃各五錢牛黃雄黃真珠各二錢麝香五分蜜丸每兩作三十丸金箔為衣薄荷湯下一丸兼治癲癇驚悸怔忡一切痰火之疾五苓散水氣肉桂白朮茯苓豬苓澤瀉益榮湯統治黃耆當歸小草棗仁麥冬茯神白芍柏子仁紫石英各一兩木香人參甘草各五錢上銼每七錢加薑五棗二煎服此方專治思慮過度耗傷心血恍惚怔忡一切之症薑朮湯又白薑生白朮赤苓半夏曲各二錢桂皮甘草各二錢上銼每五錢加薑三棗二煎服此治虛人停飲怔忡四物安神湯又當歸白芍生地熟地人參白朮茯神棗仁黃連炒柏子仁炒麥冬竹茹各七分棗二枚炒米一撮烏梅一個另研辰砂五分沖服此治心中無血如魚無水怔忡跳動之症朱雀丸又茯神二兩沉香五錢蒸餅丸辰砂五錢為衣人參湯下五十丸此治心神不定恍惚健忘火不下降時複振跳之疾加味寧神丸又生地兩半當歸白芍茯神麥冬陳皮貝母各一兩薑遠志川芎各七錢棗仁黃連甘草各五錢蜜丸辰砂為衣棗湯下五七十丸此治心血不足驚悸怔忡健忘恍惚一切痰火之疾天王補心丹又酒生地四兩酒黃連二兩石菖蒲一兩人參酒當歸天冬麥冬五味子棗仁柏子仁元參丹參茯神桔梗遠志各五錢蜜丸辰砂為衣臨臥竹葉燈心湯下此能寧心保神令人不忘除怔忡定驚悸養育心神治卑惵方三人參養榮湯統治白芍錢半人參黃耆陳皮肉桂當歸白朮炙甘草各一錢熟地五味子茯苓各八分遠志五分薑三棗二天王補心丹又見上古庵心腎丸又熟地生地山藥茯神各三兩當歸澤瀉鹽酒炒黃柏各一兩半山萸杞子酥炙龜板牛膝黃連丹皮酥炙鹿茸各一兩生甘草五錢蜜丸朱砂一兩為衣空心鹽湯或溫酒下此治勞損心腎虛而乍熱驚悸怔忡遺精盜汗目暗耳鳴腰痛腳痿之疾久服烏鬚黑髮令人有子驚悸悲恐喜怒憂思源流驚者心與肝胃病也內經言驚屬之肝胃但心氣強者雖有危險觸之亦不為動惟心氣先虛故觸而易驚也然則因所觸而發為驚者雖屬肝胃受其驚而輒動者心也故驚之為病仍不離乎心其由乎肝者何也肝屬木屬風風木多震動故病驚駭也其由乎胃者何也胃多氣多血血氣壅則易熱熱故惡火而易驚且胃氣厥則為憂懼故惡人之煩擾而驚陽明屬土土畏木故聞木聲而驚也大抵驚之因多由於外或耳聞大聲或目見異物遇險臨危當其外有所觸心忽一虛神氣失守神去則舍空舍空則液與痰涎著於包絡之間宜控涎丹加朱砂遠志多致目睛不轉不能言短氣自汗體倦坐臥不安多異夢忽驚覺多魘宜溫膽湯獨活湯琥珀養心丹與悸恐不同若因大驚而病者脈必動如豆粒寸脈止而複來曰動而無頭尾急當鎮定之宜黃連安神丸有由腎虛而驚者宜人參黃耆當歸白朮元參陳皮黃柏有由膽虛而驚者宜人參枳殼肉桂五味子棗仁熟地杞子柏子仁有由肝膽俱虛百藥不效者須補腎宜酒化鹿角膠空腹廿五錢極效古人謂肝無虛不可補補腎正補肝也有被物驚心跳不寧者宜秘方有心氣不足神不定而驚者宜妙香散有肝虛受風臥若驚狀者宜珍珠母丸有血虛而驚者宜朱砂安神丸有由痰盛而驚者宜加味定志丸有思慮過度者宜清心補血湯有氣血俱虛者宜養心湯皆當求其端而治之而驚始可安矣脈法脈訣曰心中驚悸脈必結代正傳曰寸口脈動而弱動為驚弱為悸又曰肝脈動暴有所驚駭得效曰驚則脈顫顫者動也入門曰驚傷膽則脈動驚病形症內經曰血並於陰氣並於陽故為驚狂綱目曰驚者心卒動而不寧也三因曰因事有所大驚而成者名曰心驚膽攝病在心膽經其脈必大動丹溪曰驚悸者有時而作大概屬血虛與痰瘦人多是血虛肥人多是痰飲時覺心跳者亦是血虛入門曰驚悸因思虛過度及大驚恐而作甚則心跳欲厥又曰驚悸當補血安神宜靜神丹寧志元若氣鬱驚悸宜交感丹加味四七湯正傳曰心虛而痰鬱遇險臨危觸事喪志使人有惕惕之狀是為驚悸悸者心痺病也非緣外有所觸自然跳動不寧其原由水衰火旺故心胸躁動宜天王補心丹或水停心下心為火而惡水故築築跳動不自安宜茯苓飲子半夏麻黃湯或汗吐下後正氣虛而悸不得臥宜溫膽湯此皆病之由也總而論之要不外乎心傷火動火鬱痰生二語其為症狀舌強恍惚善悲丹溪以血與痰概之虛宜天王補心丹痰宜辰砂遠志丸可以識其端矣悸病形症仲景曰心悸者水懼火也惟腎欺心故為悸傷寒飲水多必心下悸又曰食少飲多水停心下甚者則悸微者短氣三因曰五飲停畜閉於中脘使人驚悸屬飲家綱目曰水飲為症必頭眩心悸悲者心肝兩虛病也凡人心氣虛神失所守肝虛又不能生之則志不能伸已無暢遂之致而金來乘木肺氣複與相並肺本主悲故遂生悲病也所謂善悲者不必實有可悲之事心中只是怏悒不快雖遇可喜亦只強為歡笑而已宜加味溫膽湯安神補心湯脈法得效曰悲則脈結或云緊入門曰悲傷心包則脈必緊悲病原由內經曰肺在志為悲又曰心虛則悲悲者則憂又曰精氣並於肺則悲又曰悲則氣消又曰肺主殺故其志為悲靈樞曰悲哀動中則傷魂又曰悲哀動中者竭絕而失生恐者心腎肝胃病也心藏神神傷則心怯而恐火傷水也胃屬土腎屬水土邪傷水則為恐肝者腎之子水強則膽壯水衰則血虛故易恐而恐者又腎之情志故心肝胃三經皆有恐病其原莫不由於腎也此則內經之旨也故恐病由心者宜鎮其神宜定志丸加金銀箔琥珀犀角龍齒等恐病由腎者宜壯其氣宜四君子湯倍茯苓恐病由膽與肝者宜養其陰宜酸棗仁湯去黃耆蓮肉加山萸丹皮白芍恐病由腎本經傷者宜壯其水宜人參散去肉桂加牛膝遠志脈法得效曰恐則脈沉入門曰恐傷腎則脈必沉脈經曰人恐怖其脈何狀師曰脈形如循絲累累然其面白脫色也又曰人楚者其脈何類師曰脈浮而面色乍白乍赤也恐病原由內經曰腎在志為恐又曰胃為恐注云胃熱則腎氣微弱故為恐又曰精氣並於腎則恐由心虛而腎氣並之故為恐靈樞曰足少陰之脈病善恐又曰恐懼而不解則傷精又曰恐者神散盪而不收又曰恐則氣下注云上焦固禁下焦氣遠故氣不行矣子和曰肝藏血血不足則恐綱目曰恐與驚相似然驚者為自不知也恐者為自知也說驚者聞聲乃驚恐者自知如人將捕之狀及不能獨自坐不能獨自臥或夜必用燈者是也喜者心肺二經病也凡人心有所樂則動動而其氣達於外為喜其氣即肺氣也肺氣舒鬯喜迺以成然是喜也或觸乎事或因乎境為情之正中庸所謂喜怒哀樂發而皆中節謂之和者是也若過其節則情盪而不能收心肺二臟俱傷矣二臟既傷而病於是作矣宜定志丸加天冬麥冬顧安可逞情怒志為哉脈法得效曰喜則脈散入門曰喜傷心則脈虛喜病原由內經曰心在志為喜又曰心實則笑笑則喜鰲按心實者邪氣實於心也邪氣或痰或火是也又曰暴喜傷陽又曰喜怒傷氣又曰喜怒不節寒暑過度生乃不固又日喜則氣緩說喜則氣和志達榮衛通利故氣緩矣靈樞曰喜樂者神盪散而不藏又曰喜樂無極則傷魄魄為肺神也怒者肝膽病也怒本情之正惟發不中節則肝膽之氣橫逆而二經遂傷且木盛剋土久必傷脾怒所以為病也程子云因是人有可怒之事而怒之聖人之心本無怒如此用怒便是情之正便是發而中節之和豈至成病今所謂怒者以肝膽屬木木性本直木勢必伸稍有所鬱不能遂其直達之性不能順其上伸之勢因激而成怒則此怒已非情之正已非中節之和即其怒已是病況木鬱則激激則橫橫則變生諸症有不可意計測者矣程子又云治怒為難惟剋己可以治怒此聖賢治怒之法也餘亦云治怒為難惟平肝可以治怒此醫家治怒之法也言肝而膽在其中宜香甘散脈法得效曰怒則脈激入門曰怒傷肝則脈必濡怒病原由內經曰肝在志為怒又曰暴怒傷陰又曰大怒則氣絕而血菀於上菀鬱也使人薄厥又曰血並於上氣並於下心煩惋善怒又曰怒則氣逆甚則嘔血及飧泄矣又曰膽為怒綱目曰怒在陰陽為陰閉遏而不得伸也憂者肺與脾病也肺居華說之頂下通心肝之氣心有所愁苦而不樂則上搏乎肺而成憂故憂為肺病肺與脾同稱太陰同行氣以給眾臟肺既成憂病則閉結不解氣固於內而氣不通氣不通則大小便閉而傷脾故憂又為脾病宜靜神丹歸脾湯脈法得效曰憂則脈澀入門曰憂傷肺則脈必澀憂病原由內經曰肺在志為憂憂則氣沉靈樞曰愁憂不解則傷意意為脾神也又曰憂則隔塞否閉氣脈斷絕而上下不通也思者脾與心病也脾之神為意意者心之所發也由發而漸引焉曰思則當其發屬在脾及其思屬在心故玄晏先生曰思發於脾而成於心也中庸曰有弗思思之弗得弗措論語曰君子有九思孟子曰心之官則思是思固不可不用者然思之太過則流盪失節必至傷神神傷百病蜂集矣其何以堪故或有勞心思慮損傷精神致頭眩目昏心虛氣短驚悸煩熱者宜清心補血湯有思慮傷心致心神不足而不能寐者宜養心湯有憂思過度令人惕然心跳動而不自安者宜靜神丹有思慮太甚致心氣不足忽忽善忘恐怯不安夢寐不祥者宜定志丸有思慮太甚心血耗散竟至怔忡恍惚者宜益榮湯有因思勞傷心脾致健忘失事言語顛倒如癡者宜歸脾湯有思力太猛心神失守致痰涎聚於心包漸成癡癲者宜加味茯苓湯凡此皆思之病也皆過用其思之病也乃若過用其悲憂恐懼亦有類於此者治法大約可以相參脈法得效曰思則脈沉一云結入門曰思傷脾則脈必結又曰凡七情之脈惟氣口緊盛而已細分之乃有如此等項之不同也思病原由內經曰脾在志為思又曰思則氣結注云聚心不散故氣亦停留而結也靈樞曰因志而存變謂之思因思而遠慕謂之慮又曰怵惕思慮則傷神神傷則恐懼流淫而不止也治驚方十四控涎丹去痰甘遂大戟白芥子等分糊丸淡薑湯下七丸溫膽湯涼魘半夏枳實竹茹陳皮茯苓甘草薑棗黃蓮安神丸大驚黃連朱砂生地甘草歸頭秘方物驚豬心一個劈開入朱砂於內紙包火煨熟食之大效朱砂安神丸血虛黃連六錢甘草生地各三錢半當歸二錢半朱砂一錢半蒸餅丸黍米大津唾咽二三十丸加味定志丸痰盛茯苓三兩遠志石菖蒲各二兩人參一兩琥珀鬱金各五錢朱砂為衣清心補血湯思慮人參當歸茯神白芍棗仁麥冬川芎生地陳皮山梔炙草五味子妙香散神虛麝香一分木香二分半遠志肉黃耆山藥茯苓茯神各一錢人參桔梗甘草各五分朱砂三分珍珠母丸肝虛受風珠母熟地當歸人參棗仁犀角茯苓沉香龍齒柏子仁朱砂為衣蜜丸薄荷金銀器煎湯下三錢養心湯氣血虛茯苓茯神當歸生地薑遠志黃耆各八分柏子仁川芎棗仁各七分半夏曲六分炙甘草肉桂各三分五味子十四粒停水怔忡加赤苓檳榔靜神丹養血酒當歸酒生地薑遠志茯神各五錢石菖薄黃連各二錢半朱砂二錢牛黃一錢金箔十五片豬心血和丸黍米大金箔為衣燈心湯下五十丸寧志元又人參茯苓茯神山梔琥珀當歸棗仁酒遠志各五錢乳香朱砂石菖蒲各二錢半蜜丸棗湯下三十丸交感丹氣鬱香附一斤長流水浸三日炒茯神四兩蜜丸彈子大每一丸細嚼再以製香附茯神甘草各一錢水煎名降氣湯送下加味四七湯又半夏二錢赤苓厚朴各一錢二分茯神蘇葉各八分薑遠志炙甘草各五分薑七片棗二枚石菖蒲半寸治悸方五天王補心丹水衰火旺人參當歸天冬柏子仁五味子麥冬丹參元參茯苓棗仁遠志桔梗生地黃連蜜丸茯苓欽子水停茯神麥冬赤苓半夏橘紅檳榔沉香甘草半夏麻黃丸又半夏麻黃等分蜜丸日三服每服一錢溫膽湯正虛方詳上辰砂遠志丸痰涎辰砂遠志人參茯神石菖蒲各五錢川芎山藥鐵粉麥冬半夏曲細辛天麻白附子南星各一兩生薑五兩打汁入水煮糊丸朱砂為衣臨臥薑湯下一錢治悲方二加味溫膽湯總治半夏枳實竹茹各八分香附二錢四分陳皮一錢二分人參茯苓柴胡麥冬桔梗各六分甘草四分薑三片棗二枚此即參胡溫膽湯安神補心湯又當歸生地茯神黃岑各一錢三分麥冬二錢白芍白朮各一錢遠志棗仁各八分川芎七分元參五分甘草三分治恐方四定志丸心恐人參菖蒲茯苓茯神遠志白朮麥冬朱砂四君子湯胃恐人參茯苓白朮甘草酸棗仁湯肝恐棗仁遠志黃耆蓮肉人參當歸茯苓茯神陳皮甘草薑棗心經有熱加黃連生地麥冬木通人參散腎恐人參枳殼桂心甘菊茯神山萸五味子杞子各七錢半柏子仁熟地各一兩黃為末酒下二錢治喜方一定志丸總治方詳上治怒方一香甘散總治香附甘草各一兩共為末每三錢白湯下治憂方二靜神丹總治方詳上歸脾湯又當歸龍眼棗仁遠志人參黃耆茯神白朮各一錢木香五分甘草三分薑五棗二治思方七清心補血湯損傷人參一錢二分當歸白芍茯神棗仁麥冬各一錢川芎生地黑山梔炙甘草陳皮各五分五味子十五粒此方一名補血湯又名當歸飲養心湯不寐茯苓茯神當歸生地各一錢蜜黃耆薑遠志各八分柏子仁川芎棗仁各七分半夏曲六分人參五分炙甘草肉桂各三分五味子十四粒薑三片怔忡加檳榔赤苓靜神丹心跳方詳上定志丸恐怯人參茯苓茯神各三兩菖蒲薑遠志各二兩朱砂一兩半為衣蜜丸益榮湯恍惚黃耆當歸小草棗仁柏子仁麥冬茯神白芍紫石英各一兩木香人參甘草各五錢用末七錢加薑五棗二煎服歸脾湯傷心脾方詳上加味茯苓湯痰聚人參半夏陳皮各一錢半益智仁茯苓香附各一錢甘草五分薑三片烏梅一個煩躁健忘源流煩躁心經熱火病也內熱心煩曰煩故煩者但心中鬱煩也外熱身躁故躁者並身處熱躁也內熱屬有根之火其原本於熱凡但煩不躁及先煩後躁者皆易治外熱屬無根之火其原本於寒幾但躁不煩及先躁後煩者皆難治傷寒亦有煩躁症及先躁後煩者皆難治傷寒亦有煩躁症其所主屬肺腎二經與此心經主病者不同故傷寒之煩氣也火入於肺也傷寒之躁血也火入於腎也若諸虛煩熱又與傷寒相似但不惡寒身頭皆不痛脈不緊數耳切不可汗下誤攻必害玆即心經所主煩躁而歷言之有身不熱頭昏口乾不寐者是心虛煩宜人參竹葉湯有煩熱誤汗熱益甚致嘔者宜陳皮湯有內熱頭痛氣短心悶亂者宜竹茹湯有煩熱睡臥不寧者宜遠志湯有憂思成虛煩勞病者宜小草湯有腎虛心躁煩下部瘦弱小便痛者宜八味丸其不得一例視之也明矣若夫傷寒煩躁另詳本條煩躁原由內經曰夏脈者心也不及則令人煩心又肝虛腎虛脾虛皆令人體重煩冤健忘心腎不交病也心不下交於腎則濁火亂其神明腎不上交於心則精氣伏而不用火居上則因而為痰水居下則因而生躁故惟補腎而使之時上養心而使之善下則神氣清明志意常治而自不健忘矣其為症可枚舉也或思慮過度而病在心脾宜引神歸舍丹歸脾湯或素多痰飲宜茯苓湯或痰迷心竅言語如癡而多忘宜導痰湯送下壽星丸或精神短少宜人參養榮湯或上盛下虛宜養心湯或上虛下盛宜龍眼湯或心火不降腎水不開神志不寧宜朱雀丸或勤政勞心讀書刻苦宜安神定志丸或稟賦陰魄不足神志虛擾宜定志丸孔聖枕中丹或年老神衰而善忘宜加減固本丸健忘之故約略盡矣健忘原由症治靈樞曰上氣不足下氣有餘腸胃實而心肺虛虛則榮衛留於下久之不以時上故易忘也又曰腎盛而不止則傷志志傷則漸忘其前言內經曰血並於下氣並於上亂而善忘丹溪曰健忘精神短少者多亦有痰者入門曰怔忡久則健忘由心脾血少神虧也醫鑑曰健忘者陡然而忘其事盡心力思量不來也主心脾二經治法必先養心血理脾土以寧神定志藥調理之治煩躁方六人參竹葉湯心虛竹葉人參甘草熟半夏麥門冬石膏粳米或去石膏加茯苓淮小麥亦可陳皮湯誤汗陳皮甘草人參竹茹竹茹湯內熱麥冬小麥炙甘草人參熟半夏茯苓竹茹遠志湯煩熱遠志黃耆當歸麥冬人參金石斛茯神各七分甘草五分甚者加竹葉知母小草湯憂思小草黃耆當歸麥冬金石斛各一錢人參棗仁各錢二分炙甘草五分加竹葉八味丸腎虛熟地山萸山藥丹皮茯苓澤瀉肉桂附子治健忘方十三引神歸舍丹心脾膽星二兩朱砂一兩附子七錢豬肉血丸黍米大每五十丸萱草根湯下歸脾湯又龍眼人參黃耆當歸白朮茯神棗仁遠志木香甘草薑棗茯苓湯痰飲半夏陳皮茯苓甘草香附益智仁人參各一錢烏梅一個竹瀝二匙薑汁二匙導痰湯痰迷半夏南星赤苓枳實陳皮甘草薑壽星丸又薑遠志人參黃耆白朮甘草當歸生地白芍茯苓陳皮肉桂膽星琥珀朱砂五味子豬心血薑汁糊丸加減固本丸老人熟地天冬各一兩半麥冬炙甘草茯苓各一兩人參石菖蒲遠志朱砂各五錢蜜丸此方兼治中風後善忘人參養榮湯神短白芍一錢半人參黃耆陳皮肉桂炙甘草當歸白朮各一錢五味子熟地茯苓各八分遠志五分薑棗養心湯上盛天冬麥冬菖蒲遠志白朮熟地人參茯神牛膝當歸黃耆木通龍眼湯上虛龍眼丹參人參遠志麥冬茯神黃耆甘草升麻柴胡朱雀丸心腎不交沉香一兩茯神四兩人參三兩蜜丸安神定志丸勞心人參白朮茯苓茯神菖蒲遠志麥冬棗仁牛黃朱砂龍眼熬膏加蜜丸日三服定志丸稟弱人參茯苓茯神各三兩菖蒲遠志各二兩朱砂一兩半為衣蜜丸孔聖枕中丹又鱉甲龍骨遠志菖蒲不寐多寐源流夢魘不寐心血虛而有熱病也然主病之經雖專屬心其實五臟皆兼及也說由心血不足者或神不守舍故不寐宜歸脾湯琥珀養心丹有由肝虛而邪氣襲之者必至魂不守舍故臥則不寐怒益不寐以肝藏魂肝主怒也宜珍珠丸有由真陰虧損孤陽漂浮者水虧火旺火主乎動氣不得寧故亦不寐何者肺為上竅居陽分至高腎為下竅居陰分最下肺主氣腎藏氣旦則上浮於肺而動夜則下入於腎而靜仙家所謂子藏母胎母隱子宮水中金也若水虧火旺肺金畏火不納腎水陰陽俱動故不寐法宜清熱宜六味丸加知柏有由胃不和者胃之氣本下行而寐亦從陰而主下非若寤之從陽主上今胃氣上逐則壅於肺而息有音得從其陰降之道故亦不寐宜橘紅甘草金石斛茯苓半夏神麥山查總之不寐之由在肝則不快之狀多見左在肺則不快之狀多見於右在心則不快之狀多見於上部之中在胃則不快之狀多見於胸腹之中在腎則不快之狀多見於下部之中須分經而治若因雜症所致及傳經移邪又當細究試詳言之勞心之人多不寐宜養心湯治之年高之人多不寐宜六君子湯加黃耆棗仁痰多之人多不寐宜溫膽湯虛煩之人多不寐宜酸棗仁湯此其大較也而亦有通宵不寐者宜安臥如神湯有寐即驚醒者宜鱉甲羌活湯有喘不得寐者宜蘇子竹茹湯有虛勞煩熱不寐者宜棗半湯有肝虛驚悸不寐者宜四君子湯加白芍棗仁有大病後虛煩不寐者宜二陳湯加芡實竹茹有方臥即大聲鼾睡少頃即醒由於心肺有火者宜加味養心湯有不能正偃由於胃不調和者宜和胃湯兼肺氣盛必瀉肺宜參白散有勞心膽冷夜臥不寐者宜定志元加棗仁柏子仁朱砂乳香為衣或加味溫膽湯有癲狂病發火盛痰壅不寐者宜辰砂散有傷寒吐下後虛煩不寐者宜酸棗湯有心膽俱怯觸事易驚夢多不祥虛煩不寐者宜溫膽湯有失志鬱抑痰涎沃心怔忡不寐者宜溫膽湯加味溫膽湯加味二陳湯有思慮過度因脾主思致脾經受邪兩手脈緩經年累月不寐者宜益氣安神湯有神氣不寧每臥則魂魄飛揚覺身在床而神魂離體驚悸多魘通夕不寐者此名離魂症由肝藏魂肝虛邪襲魂無所歸故飛揚離體也宜前後服真珠母丸獨活湯不寐之症狀固如此其多矣說可忽乎哉總之怔忡以下諸病都緣痰涎沃心心氣不足以至變生種種若涼心太過則心火愈微痰涎愈盛漸至難治故必以理痰順氣養心安神為第一義不寐原由形症靈樞曰壯者之氣血盛其肌肉潤氣道通榮衛之行不失其常故晝不精而夜滿老者之氣衰其肌肉活氣道澀五臟之氣相搏其榮氣衰少而衛氣內伏故晝不精而夜不眠內經曰人有臥而有所不安者藏有所傷及精有所倚人不能知其病則臥不安又曰肺者藏之說也肺氣盛則肺大不能偃臥又曰胃不和則臥不安夫不得臥而喘也是水氣之害也鄭康成曰口鼻之呼吸為魂耳目之聰明為魄以耳目與口鼻對言則口鼻為陽耳目為陰以耳目口鼻與藏府對言則耳目口鼻為陽藏府為陰故陽氣行陽分二十五度於身體之外則耳目口鼻皆受陽氣所以能知覺視聽動作而寤矣陽氣行陰分二十五度於臟府之內則耳目口鼻無陽氣運動所以不能知覺而寐矣回春曰傷寒及雜病多睡者陽虛陰盛也無睡者陰虛陽盛也喜明者屬陽元氣實也喜暗者屬陰元氣虛也睡向外者屬陽元氣實也睡向壁者屬陰元氣虛也綱目曰人臥則血歸於肝今血不靜臥不歸肝故驚悸而不得臥也多寐心脾病也一由心神昏濁不能自主一由心火虛衰不能生土而健運其原有如此者試言其症狀體重或浮而多寐濕勝也宜平胃散加防風白朮食方已即困倦欲臥脾氣弱不勝食氣也俗名飯醉宜六君子湯加山查神麯麥芽四肢怠惰而多寐氣弱也宜人參益氣湯長夏懶怠四肢無力坐定即寐肺脾兩經之氣本弱複為炎暑所逼也宜清暑益氣湯病後多眠身猶灼熱餘邪未清正氣未復也宜沈氏葳蕤湯狐惑症舌白齒晦面目乍白乍赤乍黑變異無常四肢沉重默默多眠大病後腸胃空虛三蟲求食食人五臟食其喉則為惑其聲啞上唇必有瘡宜三黃瀉心湯食其肛則為狐其咽乾下唇必有瘡宜雄黃銳散此症殺人甚急當急治也通用宜黃連犀角湯治惑桃仁湯風溫陽脈浮滑陰脈濡弱發熱咽乾口苦微惡寒閉目欲眠少陰伏邪發出更感太陽客邪也宜黃岑湯加桂枝石膏甚則葳蕤湯加減亦有陰陽俱浮具如前症太陽受邪誤發汗也宜麻黃升麻湯去二麻薑桂取汗即癒熱病得汗後脈沉細身冷喜臥脈沉細昏沉不省陽氣遏也急與藥令四肢溫暖不爾有熟睡死者宜四逆湯傷寒諸般多寐症各詳本條玆不贅惟汗下後酣眠者為正氣已復可勿藥也醫者察其由治其症神而明之其庶幾矣多寐原由形症靈樞曰足太陽有通項入於腦者正屬目本名曰眼系在項中兩盤間人腦乃別陰躋陽躋陰陽相交陽入陰陰出陽交於目內眦陽氣盛則瞋目陰氣盛則瞑目又曰腸胃大則衛氣行留久皮膚濕則分肉不解其行遲夫衛氣者晝行於陽夜行於陰故陽氣盡則寐陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不精則目滿故多臥矣入門曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於陰故目不滿衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹻滿不得入於陽故目閉夢者神與魂魄病也心藏神中虛不過徑寸而神明居焉故心者神明之舍而神即精氣之所化成靈樞曰兩精相搏謂之神隨神往來謂之魂並精出入謂之魄是神魂魄三者固非判然不相屬者也自人心多欲神明外馳因而氣散於內血隨氣行榮衛紛亂魂魄不安於是乎百疾作疾作者神離故也故太上貴養神其次才養形凡欲神之存乎舍也凡欲神之存乎舍而百疾不作也若夫夢者亦神不安之一驗耳凡人形接則為事神遇則為夢神役乎物則魂魄因而不安魂魄不安則飛揚妄行合目而多夢又況七情擾之六淫感之心氣一虛隨感而應諺云日之所接夜之所夢洵有然也宜別離散益氣安神湯若古之真人其寢不夢非神存之故哉夢而魘則更甚者或由心實則夢驚憂奇怪之事而魘宜靜神丹或由心虛則夢恍惚幽昧之事而魘宜清心補血湯甚有精神衰弱當其睡臥魂魄外游竟為鬼邪侵迫而魘者此名鬼魘宜雄朱散另詳邪祟條中甚矣夢非細故也其如太上之養神而可哉五藏虛實為夢內經曰肝氣虛則夢菌香生草實則夢伏樹下不敢起心氣虛則夢救火陽物實則夢燔灼脾氣虛則夢飲食不足實則夢築垣說屋肺氣虛則夢見白物見人斬血藉藉實則夢兵戰腎氣虛則夢舟船溺人實則夢伏水中若有所畏恐淫邪成夢靈樞曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔灼陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚飢夢取甚飽夢與肝盛夢怒肺盛夢哭泣心盛夢善笑恐畏脾盛夢歌樂身體不舉腎盛夢腰脊兩解不屬又曰厥氣客於心則夢邱山煙火客於肺則夢飛揚見金鐵奇物客於肝則夢山林樹木客於脾則夢邱陵大澤壤屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢游行客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑街衢客於膽則夢訟斗自刳客於陰器則夢接內客於項則夢斬首客於脛則夢行走而不能前及居深地窌苑中客於股肱則夢禮節起拜客於胞腹則夢溲與便魂魄為病仲景曰邪客使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人多畏合目欲眠夢遠行而精神離散魂魄妄行治不寐方二十五歸脾湯心血少人參黃耆當歸白朮茯神龍眼遠志棗仁木香甘草薑棗琥珀養心丹又琥珀龍齒菖蒲遠志人參茯神棗仁當歸柏子仁黃連生地朱砂牛黃豬心血丸黍米大金箔為衣燈心湯下二錢珍珠丸肝虛珍珠麝香各三錢熟地當歸各兩半棗仁人參柏子仁各一兩犀角茯神沉香各五錢冰片一錢虎睛一對蜜丸朱砂金箔為衣日午夜臥各用薄荷湯下五十丸六味丸陰虧熟地八兩山藥山萸各四兩丹皮茯苓澤瀉各三兩養心湯勞心當歸黃耆茯苓茯神川芎半夏遠志炙草人參肉桂五味柏子仁薑棗六君子湯高年人參茯苓白朮炙草半夏陳皮溫膽湯痰多陳皮半夏茯苓甘草枳實竹茹薑棗酸棗仁湯虛煩石膏二錢半人參棗仁各錢半知母赤苓甘草各一錢肉桂五分薑安臥如神湯通宵茯苓茯神白朮山藥寒水石煅棗仁各一錢遠志炙草各七分朱砂五分人參四分鱉甲羌活湯驚醒鱉甲棗仁羌活獨活川芎防風人參甘草黃耆牛膝五味蔓荊子蘇子竹茹湯喘氣蘇子竹茹橘皮桔梗甘草六一散煩躁滑石甘草棗半湯虛煩棗仁二兩研極細入水二杯取汁半夏二合煮爛入地黃汁一合更煮時時呷之四君子湯肝虛人參茯苓白朮甘草二陳湯病後茯苓陳皮半夏甘草加味養心湯心肺火茯苓茯神黃耆半夏歸身川芎各二錢半炙甘草二錢柏子仁遠志肉桂人參五味子棗仁各一錢二分薑棗加羚羊角犀角俱磨沖和胃湯胃不和瀉白散肺盛桑皮地骨皮黃岑燈心馬兜鈴山梔黃連桔梗竹葉大青元參連翹定志丸膽冷人參茯苓茯神各三兩菖蒲薑遠志各二兩朱砂一兩內半為衣蜜丸辰砂散癲狂上好辰砂一兩乳香光瑩者炒棗仁各五錢共為細末先量病人酒量幾何置病人靜室中以藥作一服溫酒調下飲至沉醉但勿令吐如不飲隨量取醉服訖令臥說好病淺者半日至一日病深者三日熟睡令家人潛伺之勿驚勿喚待自醒即神魄定矣萬一驚覺不可複治加味溫膽湯失志香附二錢四分橘紅一錢二分半夏竹茹枳實各八分人參茯苓柴胡麥冬桔梗各六分甘草四分薑三片棗二枚加味二陳湯又益氣安神湯傷脾當歸茯苓各一錢生地麥冬棗仁遠志人參黃耆膽星竹葉各八分甘草黃連各四分薑三棗二真珠母丸離魂真珠母七錢半熟地當歸各一兩半人參棗仁柏子仁犀角茯神各一兩沉香龍齒各五錢蜜丸朱砂為衣每四五十丸薄荷湯下日二服此方真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類龍齒虎睛人皆以為鎮心藥不知龍齒安魂虎睛定魄龍能變化故魂游而不定虎能專靜故魄止而有守魄不寧者宜用虎睛魄飛揚者宜用龍齒獨活湯又獨活羌活人參前胡細辛半夏沙參茯苓棗仁甘草五味子各七分薑三片烏梅一個治多寐方十平胃散濕勝蒼朮厚朴陳皮甘草六君子湯脾弱方詳上人參益氣湯氣弱黃耆一錢半人參防風升麻各七分熟地六分生地白芍各五分生草一分炙甘草三分五味子二十粒肉桂二分清暑益氣湯暑倦蜜炙黃耆一錢人參六分薑炒白朮麻油炒蒼朮醋炒升麻神麯陳皮各五分炙草當歸麥冬黃柏各三分五味子九粒酒煨葛根澤瀉青皮各二分徐徐服沈氏葳蕤湯病後葳蕤茯苓棗仁石膏各一錢人參七分熱服此余自製方也用之頗效三黃瀉心湯狐惑大黃黃連各二錢黃岑一錢共作粗末以麻沸湯一盞浸之良久去渣分溫再服雄黃銳散又雄黃青葙子苦參黃連各二錢桃仁一錢共為末以生艾汁和如棗核大絲綿裹納下部如無生艾即以乾艾五錢煎濃汁代之黃連犀角湯又黃連犀角烏梅木香桃仁各一錢空心服治惑桃仁湯又桃仁生槐子碎艾葉各二錢四逆湯熱病治夢方五別離散總治白朮一兩天雄肉桂乾薑茜根各五錢茵芋葉桑寄生各五錢細辛菖蒲各二錢共為末每取二錢空心白湯下熱者去天雄薑桂加知母黃柏各三錢當歸生地各五錢此方能治心風男夢見女女夢見男用此去邪使不複見故曰別離益氣安神湯又當歸茯神各一錢生地麥冬棗仁遠志人參蜜黃耆膽星竹葉各八分甘草黃連各四分薑三棗二清心補血湯夢魘人參一錢二分當歸白芍茯神棗仁麥冬各一錢川芎生地陳皮山梔炙甘草各五分五味子十五粒水煎服靜神丹又酒當歸酒生地薑遠志茯神各五錢菖蒲黃連各二錢半辰砂二錢犀黃一錢金箔十五片豬心血丸黍米大金箔為衣燈心湯下五十丸雄朱散鬼魘牛黃雄黃各一錢朱砂五分每取一錢床下燒之再取一錢酒調灌下
