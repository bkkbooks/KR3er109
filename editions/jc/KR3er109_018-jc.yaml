body:
  text: 卷十八內傷外感門內傷外感源流脫營失精內傷外感內外因所生病也外感者風寒暑濕燥火六淫之邪感乎一身內傷者飲食勞役七情之逆傷及五臟外感當瀉不當補內傷當補不當瀉治法迥別故外感有頭疼發熱之候不可誤斂內傷亦有頭疼發熱之候不可誤汗東垣云左手人迎脈大於氣口為外感右手氣口脈大於人迎為內傷外感寒熱齊作而無間內傷寒熱間作而不齊外感惡寒雖近火不除內傷惡寒則就溫即解外感惡風乃不禁一切風內傷惡風惟惡些小賊風外感顯在鼻故鼻氣不利壅盛而有力內傷顯在口故口不知味而腹中不得和外感邪氣有餘故發言壯厲且先輕後重內傷元氣不足故出言懶弱且先重後輕外感手背熱手心不熱內傷手心熱手背不熱外感頭疼不止至傳裡方罷內傷頭疼則時作時止外感起即著床非扶不起筋攣骨痛內傷怠惰嗜臥四肢不收外感不能食然口則知味而不惡食內傷則惡食而口不知味外感三日後谷消水去邪氣便傳裡必渴內傷邪在血脈中有餘故不渴若飢餓內傷房勞太過比之內傷飲食尤為不足當大補回陽尤恐或遲切不可誤作外感治若傷寒溫病熱病濕病比之尋常感冒尤為險重當按經對症速去其邪切不可誤作內傷治內傷外感之相反而治法之不同如此醫者安可不先了然於心以使了然於臨症時哉內傷脈法仲景曰跌陽脈浮而數浮傷胃數傷脾邪氣獨留心中即飢邪熱不殺谷潮熱發渴又曰寸口脈弱而遲弱者衛氣微遲者榮中寒榮為血血寒則發熱衛為氣氣微者心內飢飢而虛滿不能食也寸口脈弱而緩弱者陽氣不足緩者衛氣有餘噫而吞酸食卒不下氣填於膈上也注曰胃中有未消谷故噫而吞酸寸口脈緊胸中有宿食不化脈緊如轉索無常者有宿食也東垣曰陽脈滑而緊滑則胃氣實緊則脾氣傷待食不消者此脾不和也脈浮滑而疾者此食不消脾不磨也脈訣曰內傷勞役豁大不禁若損胃氣隱而難尋內傷飲食滑疾浮沉正傳曰有寸氣口脈急大而數時一代而澀此飲食失節勞役過甚太過之脈也右關胃脈損弱甚則隱而不見但內顯脾脈之大數浮緩時一代此飲食不節寒溫失所之脈也右關脈沉而滑此宿食不消之脈也丹溪曰宿食不消則獨右關脈沉而滑經云脈滑者有宿食是也外感脈法東垣曰左手人迎脈緊盛大於氣口一倍為外感之邪李士材曰左為人迎辨外因之風以左關乃肝膽脈肝為風臟故曰人迎緊盛作傷於風勿以外因兼求六氣鰲按士材專論人迎故但主風若云外感則統言六淫之邪自外相感者其脈各詳於諸雜病中故玆不臚列辨內外傷症方廣曰外感內傷乃病之大關鍵丹溪言內傷症皆以補益為主看所挾而兼用藥但先生之言引而不發予今補之如內傷挾外感者則於補中益氣湯內春加川芎柴胡防風荊芥紫蘇薄荷夏加葛根石膏麥冬薄荷升麻柴胡秋加羌活防風荊芥冬加麻黃桂枝乾薑之類入門曰若顯內症多者則是內傷重而外感輕當以補養為先若顯外症多者則是外感重而內傷輕宜以發散為主內傷原由症治入門曰飲食傷食養陰飲養陽飲食無過則入於口達於脾胃入於鼻藏於心肺氣法相承陰陽和調神乃自生說精順五氣以為靈若食氣相惡則傷其精神受五味以成體若食味不調則傷其形也又曰勞倦傷手按心口不痛飲食傷手按心口痛王安道曰勞倦傷誠不足也飲食傷尤當於不足之中分其有餘不足何者飢餓不飲食與飲食太過雖皆失節然飢餓不飲食者胃氣空虛此為不足固失節也飲食自倍而停滯者胃氣受傷此不足之中兼有餘亦失節也東垣曰勞倦亦有二焉勞力純傷氣勞心兼傷血房勞傷腎與勞倦相似七情動氣脈與飲食無二鰲按食傷與不能食另詳源流於後此條特因前人言勞倦飲食二傷雜出故類摘於此以上言勞倦飲食二傷之異內經曰勞則氣散氣短喘促汗出內外皆越故氣耗矣又曰陰盛生內熱奈何曰有所勞倦形氣衰少谷氣不盛上焦不行下脘不通而胃氣熱熱氣燻胸中故內熱入門曰經言陰虛生內熱勞倦傷之原也說此陰虛指身中之陰氣與水谷之味耳又曰房勞傷腎與勞倦相似均一內傷發熱症也勞倦因陽氣之下陷宜補其氣以升提之房勞因陽火之上升宜滋其陰以降下之一升一降迥然不同又曰七情動氣脈與飲食無二說飲食七情俱能閉塞三焦燻蒸肺胃清道肺為氣主由是而失其傳化之常所以氣口脈獨緊且盛其症嘔泄痞滿腹痛亦相似但傷食則惡食七情難作飽卻不惡食東垣曰喜怒不節起居不時有所勞倦皆損其氣氣衰則火旺火旺則乘脾土脾主四肢故困熱無氣以動懶於言語動作喘乏表熱自汗心煩不安當息心靜坐以養其神以甘寒瀉其熱火酸味收其散氣甘溫調其中氣正傳曰經言勞者溫之損者益之夫勞則動之太過而神不寧矣故溫之溫者養也溫之者調其飲食適其起居從容以待其真氣之複常也東垣乃謂宜溫藥以補元氣而瀉火邪又以溫能除大熱為內經所云而考內經並無此語不能無疑也又經言形不足者溫之以氣其溫字亦是滋養之義非指溫藥也以上單言勞倦傷內經曰水谷之寒熱感則害人六腑又曰陰之所生本在五味陰之五宮傷在五味注曰陰五臟也丹溪曰傷食症亦有頭痛發熱但身不痛為異耳又曰補脾胃藥內必用心經藥以火能生土故也古方用益智仁正是此意又曰張易老枳朮丸用白朮二兩補脾枳實一兩消痞東垣加陳皮一兩和胃一補一瀉簡而又當故能治飲食不消心下痞悶之症說以用藥大法所貴服之強人胃氣令益厚雖重食猛食多食亦不複致傷也又曰酒雖與水同體然傷於腸胃則升之不散降之不下鬱於氣分逐氣升降而半有消耗如人飲醇酒則小便少此其可驗故治法宜汗宜利小便為主後世與傷飲食法同治大謬又曰酒性喜升氣必隨之痰鬱於上尿澀於下肺受賊邪金體必燥恣飲寒涼其熱內鬱肺氣得熱必大傷耗其始病淺或自汗或心脾痛尚可發散而去之及久而病深則為消渴為黃疸為肺萎為內癖為鼓脹為失目為哮喘為勞嗽為癲癇為難明之疾可不慎乎得效曰久飲酒者臟腑積毒致令蒸筋傷神腐腸損壽東垣曰飢餓胃虛為不足故須補益飲食停滯為有餘故須消導又有物滯氣傷必須消補兼行者亦有物暫滯而氣不甚傷者宜消導獨行不須兼補亦有既停滯而複自化者不須消導但當補益以上單言飲食傷回春曰脾胃俱實則過時而不飢多食而不傷脾胃俱虛則不能食而瘦與之食則少食不與則不思食飢飽不知又曰食少而肥者難肥而四肢不舉說脾困邪勝也食多而瘦者胃伏火邪於氣分則能食雖多食而不能生肌也以上言脾胃虛實東垣曰食入則困倦精神昏冒而欲睡者脾虛弱也又曰脾胃不節損其胃氣不能尅化散於肝歸於心溢於肺食入則昏冒欲睡得臥則食在一邊氣暫得舒是知升發之氣不行也回春曰勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒以上言食後昏倦入門曰凡內傷脾胃始則四肢困熱無氣以動表熱自汗心煩不安胃氣熱熱氣燻胸中為內熱症宜以甘溫補中益氣東垣曰凡脾胃症調治差誤或妄下之則末傳為寒中複遇時寒則四肢厥逆心胃絞痛冷汗出夫六氣之勝皆能為病惟寒毒最重陰主殺故也宜溫胃益中以上言內傷病始為熱中終為寒中原病曰四方溫涼不同嗜欲因以成性若移舊土多不習伏必以飲食入腸胃腸胃不習疾病必生故有不伏水土病入門曰不伏水土病與濕瘴同原皆可隨水土風氣冷熱加減用藥然總宜以扶脾健胃為主不可妄治以上言不伏水土病與內傷同脫營失精失志病也經曰嘗貴後賤名曰脫營嘗富後貧名曰失精雖不中邪病從內生身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於榮注云血為憂煎氣隨悲滅故外耗於衛內奪於榮也說人如憤恨必傷肝思慮必傷脾悲哀必傷肺若後貧後賤之人憂愁思慮憤恨悲哀無一不有故內傷臟腑傷則各經火動並傷元氣日漸日深病發則飲食無味神倦肌瘦也治之可不察其由哉宜內服鎮心丹升陽順氣湯外用香鹽散日擦牙齒自愈脫營失精治法東垣曰心者君主之官神明出焉凡恚怒悲忿憂思恐俱皆損元氣心者神之舍心君不寧化而為火火者土神之賊也故曰陰火太盛經營之氣不能頤養於神乃脈病也人心之神真氣之別名也得血則生血生則脈旺脈者神之舍若心生凝滯則七神離形而脈中惟有火矣善治病者惟在調和脾胃使心無凝滯或生歡欣或逢喜事或居溫和或食滋味或見可欲事則爽然如無病矣說胃中元氣得舒伸故也鰲按東垣此論雖未專主脫營失精病而脫營失精病所以調治安養之者亦當如是故錄之治內傷諸藥要品消導積滯山楂草果檳榔神曲麥芽京三棱枳實枳殼紅曲厚朴橘紅蓬莪朮砂仁谷芽藿香萊菔子開解鬱結青皮陳皮砂仁蔻仁枳殼枇杷葉枳實鬱金蘇子烏藥木通紫厚朴木香檀香藿香蒼朮降香補益虛衰人參白朮歸身山藥百合菟絲子黃芪蒼朮建蓮龍眼熟地肉蓯蓉茯苓茯神扁豆子治外感諸藥要品發散風寒川芎藁本甘草白芷桔梗桑白皮細辛防風荊芥前胡紫蘇苦杏仁薄荷石膏升麻柴胡麻黃川羌活生薑獨活細辛蔥白桂枝乾薑疏泄風熱石膏知母甘草麥冬前胡淡竹葉桔梗薄荷葛根桑皮治脫營失精方三加減鎮心丹內服天冬黃芪熟地酒歸身各一兩半麥冬生地山藥茯神各一兩五味子遠志肉人參各五錢蜜丸朱砂為衣升陽順氣湯又黃芪二錢人參半夏各一錢神曲七分半當歸草蔻仁陳皮丹皮升麻柴胡各五分黃柏炙草各二分半薑三片香鹽散擦牙大鼠骨一具煅炒川椒乳香炙各二兩白蒺藜青鹽各一兩傷食不能食源流此篇當與內傷外感總論源流參看傷食脾虛病也脾家之氣虛故所食之物皆足為害傷食之脈左手平和右手氣口緊盛傷食之症必胸膈痞塞噫氣如敗卵總治宜保扁丸平胃散胃苓湯為主且傷食者必惡心吞酸宜加橘皮半夏山梔黃連傷食者必多吐瀉宜焦朮神曲陳皮薑棗傷食者必惡飲食宜陳皮山藥扁豆蓮子茯苓自芍山楂砂仁谷芽麥芽草果草蔻仁傷食者必不能消化宜以谷芽麥芽肉豆蔻為主傷食者必頭疼發熱宜石斛柴胡白朮炙甘草麥芽陳皮白芍凡此皆其症之所兼及者也至於所傷之物既種種不同宜各用主治之藥詳載手後所傷之候又有乍傷宿食之各異乍傷宜平胃散宿食宜大安丸所傷之因又有兼寒宜理中湯加丁香蔻仁兼濕宜除濕湯加麥芽神曲兼痰宜調氣平胃散之各殊皆當審所傷之輕重元氣之虛實臟腑之強弱時候之寒暖或當消導或當補益或當以消導為主而兼補益或當以補益為主而兼消導且於消導補益之中或當兼疏散或當兼滲泄或當兼下利各隨宜以治之慎勿專任攻伐致戕天和有太過之弊斯稱王道不能食脾胃俱虛病也東垣云脾胃旺能食而肥脾胃虛不能食而瘦此之謂也故治之者必當知不食之故由於脾胃之虛急當補益宜補中益氣湯而不可用誅伐使元氣愈虛斯為要著或補之不效更當兼補其母使火以生土土自健運宜八味丸二神丸補母不效更當兼顧其子使金不竊母之氣以自救致脾胃益虛則土自能保宜茯苓人參桔梗甘草惟審知脾胃中或有積滯或有實火或有寒痰或有濕飲而元氣未衰邪氣方甚者方可稍用消導而仍以補益為主宜異央散香砂枳朮丸其有挾鬱者開之宜育氣丸動氣者平之宜異央散加木香沉香上焦濕熱阻氣者開提之宜枇杷葉蘇子杏仁黃芩降香土瓜蔞皮胃傷惡食絡虛風動浮腫者和解之宜人參檀香泥新會皮炒荷葉蒂炒粳米心營熱入胃汁全虧不飢不食假寐驚跳者調攝之宜鮮生地竹葉心金銀花火麻仁麥門冬生知母脾胃虛不能消化水谷胸膈痞悶腹脅膨脹連年累月食減嗜臥口無味者通快之宜消谷丸腹中虛冷不能食食輒不消羸弱生病者溫暖之宜蒼朮丸時病後胃氣未和知飢不納者調養之宜茯神棗仁川石斛知母鮮蓮子鮮省頭草夫然後脾胃益快自然進食矣脈法靈樞曰脈小而寒者不嗜食東垣曰右手氣口脈大於人迎一倍為內傷飲食傷食不食症治靈樞曰善飢而不嗜食以精氣並於脾熱氣留於胃胃熱則消谷谷消故善飢胃氣上則胃脘寒故不嗜食也內經曰太陰所謂惡聞食臭者胃無氣故也入門曰惡聞食臭者膀胱移熱於小腸也又曰口多嗜味陰虛火動故也陰虛則口中有味陽虛則口中無味也丹溪曰惡食者胸中有物宜導痰補脾又曰不進食服脾藥不效者說腎氣虛弱真元衰削是以不能消化飲食譬之釜中水谷下無火力終日米不熟其何能化黃魯直日服菟絲子數匙十日外飲啖如湯沃雪亦此理也又曰一室女因事忤意鬱結在脾半年不食但日食蕎麥數口或饅頭彈子大深惡粥飯予意脾氣實非枳實不能開以溫膽湯去竹茹與數十帖而安內經注曰思則氣結者係心不散故氣亦停留而為結也得效曰思傷脾者脾在志為思思則氣化不行精衰中脘不得飲食腹脹滿四肢怠惰治所傷諸物主治之藥傷酒輕者葛根葛花枳椇子神曲黃連白蔻仁甚者甘遂黑牽牛子傷谷輕者麥芽谷芽神曲砂仁甚者內金傷曲萊菔子薑酒煎傷茶輕者薑黃芝麻甚者萸椒薑傷肉輕者山楂阿魏甚者硝石硼砂傷菜丁香麝香肉桂傷蛋蔻仁橘紅豆豉薑汁傷魚鱉紫蘇陳皮木香薑汁白馬尿專治鱉積傷狗肉杏仁山楂傷糯米大麥面研末酒服傷瓜魚炙食瓜皮煎湯治傷食方七保和丸總治查肉二兩半夏橘紅麥芽神曲茯苓各一兩連翹萊菔子黃連各五錢胃苓湯又蒼朮厚朴陳皮甘草茯苓豬苓白朮桂心澤瀉薑棗此方即平胃五苓二散合用又名對金錠子平胃散乍傷蒼朮厚朴陳皮甘草大安丸宿食山楂神曲半夏橘紅茯苓麥芽連翹菔子黃連白朮此即保和丸加白朮一兩也理中湯兼寒人參白朮甘草生薑除濕湯兼濕蒼朮厚朴半夏各錢半藿香陳皮各七分半甘草五分薑七棗二調氣平胃散兼氣木香檀香藿香砂仁蔻仁烏藥厚朴蒼朮陳皮甘草治不能食方八補中益氣湯總治人參黃芪當歸白朮陳皮甘草柴胡升麻八味丸補火地黃山藥山萸茯苓丹皮澤瀉附子肉桂二神丸又補骨脂四兩肉豆蔻二兩共為末大棗四十九枚生薑四兩同煮爛棗去皮核去薑搗丸豁湯下三錢異央散消補人參茯苓白朮甘草橘紅溫膽湯脾結陳皮半夏茯苓甘草枳實竹茹薑棗如心虛加人參棗仁心內煩熱加黃連麥冬口燥舌乾去半夏加麥冬五味花粉表熱未清加柴胡內虛大便自利去枳實加白朮內熱心煩加山梔育氣丸挾鬱木香丁香藿香檀香砂仁蔻仁人參白朮茯苓炙草山藥橘紅青皮蓽澄茄每末二錢木瓜湯下消谷丸通快神曲六兩炒烏梅肉炮薑各四兩麥芽三兩蜜丸每米飲下五十丸日三服蒼朮丸溫暖製蒼朮二斤神曲一斤蜜丸每三十丸米湯下日三服大冷加乾薑三兩腹痛加當歸三兩羸弱加炙甘草二兩諸鬱源流諸鬱臟氣病也其原本由思慮過深更兼臟氣弱故六鬱之病生焉六鬱者氣血濕熱食痰也諸鬱之脈皆沉六鬱所挾則兼芤澀數緊滑緩或沉結促代最宜細診說鬱者滯而不通之義百病皆生於鬱人若氣血衝和病安從作有怫鬱當升不升當降不降當化不化或鬱於氣或鬱於血病斯作矣治鬱之法不外內經所言木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之數語後之解者以吐訓達而以燒鹽三兩溫湯二升畢達之義以汗訓發而以升麻柴胡羌活防風畢發之義以下訓奪而以檳榔枳實大黃厚朴畢奪之義以解表利小便訓泄而以橘紅蘇子桑皮木通豬苓澤瀉畢泄之義以遏製衝逆訓折而以黃柏一味畢折之義用之有應有不應以五者僅為一偏之治不知立言者原無過解之者自誤也王安道張介賓皆能擴充內經之旨餘因撮其要而為之論夫達者通暢之義木鬱風之屬臟應肝腑應膽主在筋爪傷在脾胃症多嘔酸木喜條鬯宜用輕揚之藥在表疏其經在裡疏其臟但使氣得通行均謂之達若專用吐謂肺金盛抑製肝木則與瀉肺氣舉肝氣可矣何必吐謂脾濁下流少陽清氣不升則與抑胃升陽可矣又何必吐木鬱固有吐之之理而以吐總該達字則未也直達鬱湯發者越之也火鬱之病為陽為熱臟應心腑應小腸三焦主在脈絡傷在陰分凡火之結聚斂伏者不宜蔽遏當因其熱而解之散之升之揚之如腠理外蔽邪熱怫鬱則解表取汗以散之如龍火鬱甚非苦寒沉降之劑可治則用升浮之品佐以甘溫順其性而從治之汗未足以概之也宜發鬱湯奪者直取之謂也濕滯則土鬱臟應脾腑應胃主在肌肉四肢傷在血分當理其滯滯在上宜吐滯在中宜伐滯在下宜瀉皆奪也奪豈止於下哉宜奪鬱湯泄者疏利之也金鬱之病為斂閉為燥塞臟應肺腑應大腸主在皮毛聲息傷在氣分或解表或利氣皆可謂泄利小便是水鬱治法與金鬱無關宜泄鬱湯折者調製之也水之本在腎標在肺實土可以製水治在脾壯火可以製水治在命門自強可以帥水治在腎分利可以泄水治在膀胱凡此皆謂之折非獨抑之而巳宜折鬱湯內經言五鬱之旨其有可闡明而得之者也而丹溪又謂病之屬鬱者八九須視所挾以開導之因分氣血濕火食痰為六鬱又謂六者有相因之勢氣鬱則留濕濕滯則成火火鬱則生痰痰滯則血凝血凝則食結而遂成痞塊故著越鞠丸通治諸鬱以香附理氣川芎調血蒼朮開濕山梔治火神曲療食痰鬱加貝母此以理氣為主不易之品也若濕盛加白朮茯苓血甚加桃仁紅花火盛加黃芩青黛食甚加山楂厚朴痰盛加膽星浮石此又因病而變通之法又春加防風夏加苦參秋冬加吳萸乃經所云升降浮沉則順之寒熱溫涼則逆之也此法最為穩當雖然丹溪以越鞠通治諸鬱固屬不易而既分為六鬱則其症其治又有不可不詳者如求謀橫逆貧窘暴怒悲哀思慮皆致胸滿脅痛脈必沉澀是氣鬱宜氣鬱湯內香附川芎木香是要藥又木香調氣散胸脅痛者兼血鬱盛怒叫呼挫閃飢飽勞役致胸脅間常如針刺痛或能食小便淋大便紅脈沉芤而澀是血鬱宜血鬱湯內桃仁紅花香附並加青黛川芎要藥霧露風雨坐臥濕衣濕衫皆致身重疼痛首如物蒙倦怠好臥陰寒則發脈沉澀而緩是濕鬱宜濕鬱湯內蒼朮川芎赤苓並加白芷為要藥又滲濕湯不發熱常覺自蒸不能解目蒙口渴舌燥便赤脈沉而數是熱鬱或昏瞀或肌熱悶之烙物皆是熱鬱宜火鬱湯又青黛香附蒼朮川芎山梔為要藥酸噯腹滿不能食黃疽鼓脹痞塊脈緊實是食鬱宜食鬱湯內神曲蒼朮香附並加山楂醋炒針砂為要藥動則喘滿或嗽寸脈沉而滑是痰鬱宜痰鬱湯內香附瓜蔞南星海浮石為要藥又升發二陳湯且不特是也經云五鬱之發乃因五運之氣有太過不及遂有勝複之變由是推之六氣著人皆能鬱而致病如風邪襲人而鬱頭痛目脹鼻塞聲重者是宜神朮散寒之所鬱嘔吐清水腰腹痛㿗疝癥瘕下利清白者是宜五積散散且如傷寒之邪鬱於衛鬱於營或鬱在經在腑在臟皆是其方治詳傷寒書可參看暑熱或鬱必為陰寒所遏陽氣不得發越頭痛肢節痛大熱無汗者是宜六和湯蒼朮白虎湯濕氣之鬱結在三焦宜正氣散加防己大豆黃卷瘟疫之邪所鬱客於募原其方治詳溫疫篇可參看風寒濕三氣雜感而鬱致成痹症其方治詳諸痹篇可參看總之結不解散即謂之鬱此又外感六氣而成者要之內經之論五鬱是言臟氣論六氣之鬱是言客氣丹溪論鬱是言病氣皆當稔悉此外又有憂愁思慮之鬱先富後貧曰失精先貴後賤曰脫榮此鬱開之極難然究不外木達火發之義趙獻可則又謂東方生生之氣在木治木諸鬱自散加味逍遙散最妙柴胡薄荷能升能清逆無不達兼以陳皮川芎白芍損肝之過丹皮山梔瀉肝之實木盛土衰甘朮扶之木傷血病者當歸養之木實火燥茯神寧之少加吳萸為反佐取其氣燥入肝辛熱疏利散劑之後繼以六味丸加柴胡白芍前之用逍遙散者風以散之也繼之用六味丸者雨以潤之也獻可之法雖進一步然消息得宜亦有至理治鬱者惟以五鬱為本詳察六氣之害參用丹溪獻可之論庶乎得之矣總之凡治諸鬱均忌酸斂滯膩宜開發志意調氣散結和中健脾如是止耳否則非其治也脈法正傳曰鬱脈多沉伏或促或結或代丹溪曰積脈弦堅鬱脈沉澀諸鬱原由症治明理曰氣血恬和百病不生一有怫鬱諸疾生焉鬱者病結不散也丹溪曰治鬱之法順氣為先降火化痰消積分多少而治蒼朮川芎總解諸鬱正傳曰熱鬱而成痰痰鬱而成癖血鬱而成癥食鬱而成痞滿此必然之理也醫鑑曰六鬱為積聚癥瘕痃癖之本又曰六鬱治法通用六鬱湯越鞠丸加味越鞠丸越鞠保和丸繆仲淳日心氣鬱結用羊心一具同番紅花水浸一盞入鹽少部徐徐塗心上灸熱食之令人心安多喜若憂鬱不伸胸膈不寬者貝母去心薑汁炒研薑汁面糊丸每服七十丸白蒺藜湯下葉氏醫案曰鬱損心陽陽墜入陰為淋濁由情志內傷即為陰虛致病說心藏神神耗如潰諸竅失司非偏寒偏熱藥可治必得開爽冀有向安宜妙香散又曰悲泣乃情懷內起之病病生於鬱形象漸入按之堅硬正在心下用苦辛降當先從氣結治宜黃連乾薑半夏薑汁茯苓連皮瓜蔞又曰驚惶忿怒都主肝陽上冒血沸氣滯瘀濁宜宣通以就下誤投止塞舊瘀不清新血又瘀絡中匝月屢屢反複究竟肝膽氣血皆鬱仍宜條達宣揚漏瘍在肛得體中稍健設法用旋覆花新絳青蔥管炒桃仁柏子仁治諸鬱方二十六達鬱湯治木升麻柴胡川芎香附桑皮橘葉白蒺藜發鬱湯治火丹皮柴胡羌活葛根遠志菖蒲蔥白細辛奪鬱湯治土蒼朮藿香香附陳皮砂仁蘇梗生薑草蔻仁省頭草泄鬱湯冶金柴菀貝母桔梗沙參香附砂仁白蒺藜折鬱湯治水白朮茯苓豬苓澤瀉肉桂丁香木通白蔻仁越鞠丸總治香附蒼朮川芎山梔神曲水丸或加陳皮半夏茯苓砂仁甘草蘇子卜子氣鬱湯治氣香附蒼朮橘紅半夏貝母山梔茯苓川芎甘草柴蘇木香檳榔血鬱湯治血丹皮紅曲通草香附降香蘇木山楂麥芽桃仁韭汁穿山甲濕鬱湯治濕蒼朮白朮厚朴赤苓半夏川芎羌活獨活香附甘草生薑火鬱湯治火連翹薄荷黃芩槐仁麥冬甘草鬱金竹葉全瓜蔞食鬱湯治食蒼朮厚朴川芎陳皮神曲山梔枳殼炙草香附砂仁痰鬱湯治痰蘇子半夏前胡炙草當歸陳皮沉香以上名蘇子降氣湯今加瓜蔞淨仁膽星枳實香附浮石如虛加黃芪寒冷加肉桂神朮散治風蒼朮藁本白芷細辛羌活川芎甘草五積散治寒當歸白芷茯苓半夏川芎白芍甘草枳殼麻黃桂皮陳皮桔梗厚朴蒼朮乾薑薑棗正氣散治濕藿香柴蘇白芷茯苓白朮陳皮厚朴桔梗甘草半夏曲大腹皮薑棗六和湯治暑人參白朮半夏砂仁茯苓扁豆藿香厚朴杏仁木瓜炙草香茹薑棗蒼朮白虎湯又製蒼朮知母石膏甘草粳米加味逍遙散總治茯苓白朮白芍當歸柴胡甘草以上名逍遙散加山梔丹皮六味丸又熟地黃山藥山萸茯苓丹皮澤瀉木香調氣散治氣木香烏藥香附枳殼青皮陳皮厚朴川芎蒼朮各一錢砂仁五分桂枝甘草各三分薑三片升發二陳湯治痰半夏二錢赤苓陳皮川芎各一錢半柴胡升麻防風甘草各一錢薑三片六鬱湯開泄香附蒼朮神曲山梔連翹陳皮川芍赤苓貝母蘇葉枳殼各一錢甘草五分薑三片六鬱湯通治香附二錢川芎蒼朮各一錢半陳皮半夏各五分薑三片附加減法氣鬱加木香檳榔烏藥蘇葉濕鬱加白朮羌活防己熱鬱加黃連連翹痰鬱加南星瓜蔞海粉血鬱加桃仁丹皮韭汁食鬱加山楂神曲麥芽越鞠保和丸又白朮三兩山查二兩蒼朮川芎神曲香附陳皮半夏枳實茯苓酒黃連酒當歸各一兩山梔萊服子連翹木香各五錢薑汁化蒸餅丸此方能開鬱行氣消積散熱加味越鞠丸又薑蒼朮川芎香附神曲山梔各四兩陳皮白朮黃芩各兩半查肉二兩糊丸妙香散心陽色欲傷源流色欲傷精氣神病也說以三者相因不能離貳嘗考養生家言精能生氣氣能生神榮衛一身莫大於此養生之士先寶其精精滿則氣壯氣壯則神旺神旺則身健身健而少病內則五臟敷華外則肌膚潤澤容顏光彩耳目聰明老當益壯矣此養生者以精氣神為主而尤以精為寶也又按醫家言氣者神之祖精乃氣之子氣者精神之根蒂也又言凡陰陽之要陽密乃固故曰陽強不能密陰氣乃絕陰平陽秘精神乃治陰陽離決精氣乃絕此醫者亦以精氣神為主而尤以精為寶也然則欲神之旺必先使氣之充欲氣之充必先使精之固男女居室雖生人之大欲所存為聖王所不能禁然使行之有節保之有方陰陽交接之間亦何至受傷何至受傷而成病其所以受傷者乃淫欲無充之故也靈樞經曰五谷之津液和合而為膏內滲入於骨空補益髓腦而下流於陰股陰陽不和則使液溢而下流於陰下過度則虛虛則腰背痛而脛酸真詮云五臟各有藏精並無停泊於其所說人未交感精涵於血中未有形狀交感之後欲火動極而周身流行之血至命門而變為精以泄焉故以人所泄之精貯於器拌少鹽酒露一宿則複為血矣據此則知血者五谷之津液所充而精者又人身之血所由以化精顧不甚重歟而猶謂可或傷歟且夫欲之不可縱也良非無故養生書曰凡覺陽事輒盛若一度製得則一度火滅一度增油若不能製縱欲施瀉即是膏火將滅更去其油不可不謹自防也觀於添油滅火之論人茍精傷無度而其為病且有不可勝言者詎第如靈樞經云脛酸腰痛而已乎若夢遺若滑泄若尿精若白淫若漏精種種名狀不可指屈而其後必至然羸瘦漸成癆瘵若水流下不可收挽若火燎原不可救滅此無他精傷則氣餒氣餒則神散合精氣神而皆為病故即精氣神而不能葆也即精氣神而不能葆故極精氣神所生之病益複戕其精氣神而無不委頓以至於死也嗟乎色欲之為害一至於此而其詳有可得而言者其或心火旺腎水衰心有所欲速於感動疾於施泄歟宜大鳳髓丹金鎖思仙丹其或君火偶動相火隨之而妄思淫泄歟宜黃連清其或陰虛火動夜必成夢夢則多泄泄則愈虛虛則愈夢歟宜保精湯鹿角散其或少壯氣盛情欲動中所願不遂意淫於外致成夢泄歟宜豬苓丸其或經絡熱而焚燎心經熱而恍惚閉目即若有見無夜不夢無夢不泄歟宜清心丸其或始由房勞太甚精傷竅滑無論夢與不夢合目即遺歟宜樗根皮丸其或肝腎兩傷精氣衰弱脈象空虛悲愁欲哭面色夭白為脫精脫神歟宜巴戟丸固精丸其或陽虛精脫未交先泄或乍交即泄滑瀏不禁歟宜芡實丸鎖陽丹其或無故精流不止日夜皆然其屬危急歟宜秘元丹約精丸其或房勞邪朮損傷腎氣莖中時痛時癢白物隨溲而下或陰莖挺縱不收名為白淫歟宜先服瀉心湯以降心火次服白龍丸以補腎元其或濕熱傷脾脾多痰積下滲而遺泄歟宜樗根白皮丸其或腎陽虛微精關滑泄自汗盜汗夜多夢與鬼交歟宜豬腎丸其或元氣虛寒精滑不禁大腑溏泄手足厥冷歟宜陽起石丸其或莖強不痿精流不住常如針刺捏之則痛病名強中為腎滯隔疾歟宜韭子煎其或大吐大泄後四肢厥冷不省人事或交接後小腹腎痛外腎搐縮冷汗出均為脫陽危症須臾則不救歟宜先以蔥白炒熱熨臍後服蔥白酒其或腎臟精氣虧相火易動難製致夢遺精濁煩勞即發頻年不愈歟宜潜陽填髓丸其或腎中有火精得熱而妄行頻頻精泄不寐心嘈久必成腎消之症歟宜清腎湯其或陰氣走泄濕熱乘虛下陷墜自腰中至囊環跳膝說諸處可見久遺八脈皆傷歟宜先服豬苓湯以清濕熱後服湖蓮丸以固真元其或神傷於上精敗於下心腎不交久傷精氣不複歟宜先服參朮膏接服寇氏桑螵蛸散以寧神固精收攝散亡乃澀以治脫之法其或暑濕熱鬱脾胃受傷色黃神倦氣餒致成遺泄症歟宜歸脾湯去黃芪桂圓加龍骨益智仁其或陰精走泄陽不內依欲寐即醒心動震悸氣因精奪歟宜青花龍骨湯其或讀書夜坐陽氣上升充塞上竅痰多鼻塞能食上盛下衰寐則陽直降而精下注有夢而泄歟宜補心丹其或真陰損傷而五志中陽火上燔為喉嚨痛下墜為遺精髓日耗骨痿無力日延活槁歟宜早服補心丹晚服桑螵蛸散其或知識太早精血未滿而泄必關鍵不攝始而精腐變濁久則元精滑溢口咸氣脹歟宜六子丸其或屢因嗔愁肝陽升則上湧氣衝心熱嗆咳失血墜則遺精暮熱晨汗脈象虛數為陰陽樞紐失固歟宜攝真湯其或腎氣失納陽浮不肯潜伏致諸氣皆升絡血隨氣上溢肉瞤心悸頭面熱四末汗兩足跗腫冷走動吸短欲喘多夢而遺由精傷以及神離氣怯歟宜葆真止泄丸凡若此者固皆色欲過度少陰受傷甚而連及各臟腑所生病也雖然色欲之傷雖先及腎而其原實由於心與肝何言之丹溪曰主閉藏者腎也司疏泄者肝也二臟皆有相火而其係上屬於心心君火也為物所感則易動心動則相火亦動矣丹溪此言直窺乎好淫者之隱而言之也說人當交接之先未嘗不由心動者心一動相火遂翕然而起相火起精氣之涵畜於中者亦一時暗動迨至交接則傾倒而出之而精藏少減於此知節或隔部久再行精藏之少減者亦已充滿雖交無傷若不知節日日行甚或日幾度行之則精之涵畜於內者有去無來而精藏空虛矣如是而腎有不傷者乎腎既傷則水之涸者火益盛腎家龍火會合肝家雷火燔灼真陰煎熬血液由是而潮熱而骨蒸而活槁而羸瘦而尷怯變生種種年壽日促矣且不特此也初因君火不寧久則相火擅權精元一於走而不固精藏中容或有留剩及日夜所息谷食所滋者雖不交會亦暗流而疏泄或因夢寐而遺或因小便而出或因聞見而流即精之受傷益致精病所謂傷者是也說至此精遂涸而不能複氣遂餒而不能充神遂渙而不能聚矣吁其可慨哉是故知命惜身著必當知精為一身之寶而節欲以儲之經頌曰道以精為寶寶時宜秘密施人即生人留己則生己結嬰尚未可何況空廢棄棄損不覺多衰老而命墜此言精之不可妄去也欲不妄去其精舍節欲何由哉且夫欲之當節自少至老莫水皆然而尤要者則惟幼少與衰晚二候孔子曰少之時血氣未定戒之在色說以人當十五六時情竇乍開欲火萌動若有所遇而此心之勃不能已者乘其血氣之初旺往往有溺而不返之憂由是而縱情逞意日喪其寶將初旺之血氣不但無極旺之時且於是而日耗而百疾生矣故養生書曰男子二八未泄之時其一身之精通有一升六合此其時成數也稱得一升積而滿者至三升損而喪之者不及一升精與氣相養氣聚則精盈精盈則氣盛精盈氣盛則神足人年十六後精泄凡交一次則喪半合有喪而無益則精竭身慮故欲不節則精耗精耗則氣衰神悴而病至病至則身危噫精之為物其人身之至寶乎觀於此言益可知二八精通之後即宜謹守其身矣況於未至二八精氣尚澀而可逞心淫盪乎夫壯盛之年其當謹慎色欲不必言矣內經曰人生八八數精髓竭當節其欲說以人至五十始衰六十則更衰定當閉精勿泄以養天和由是生氣強固而能長久此至人之道也倘宜節而不知節當絕而不能絕腎精不固以至神氣減少者五臟皆有精勢必連及他臟而肝精不守目眩無光矣肺精不足肌肉瘦削矣心精不充昏冒恍惚矣脾精不堅齒發脫落矣豈非以腎臟主水受諸臟之精而藏之為都會關司之所故腎精耗則諸臟之精亦耗腎精竭則諸臟之精亦竭歟故養生書曰人年四十以下多有放恣四十以上即頓覺氣力衰退衰退既至眾病蜂起久而不治遂至不救若年過六十有數旬不得交合而意中平平者自可閉固也觀於此言益可知年近衰晚即當秘密其精而勿失矣況推之七十八十而可弗慎惜其身命乎雖然精之具足於身著固貴節欲以保之矣而所以保之之要又當審乎煉精之訣補精之味真詮曰煉精者全在腎家下手內腎一竅名玄關外腎一竅名牡戶真精未泄乾體未破則外腎陽氣至子時而興人身之氣與天地之氣兩相吻合精泄體破則吾身陽生之候漸晚有丑而生者次則寅而生者又次則卯而生者有終不生者始與天地不相應矣煉之之訣須半夜子時即披衣起坐兩手搓極熱以一手將外腎兜住以一手掩臍而凝神於內腎久久習之而精旺矣又曰內經言精生於谷又言精不足者補之以味然醲鬱之味不能生精惟恬澹之味乃能補精洪範論味而曰稼穡作甘世間之味惟五谷得味之正但能淡食谷味最能養精凡煮粥飯而中有厚汁滾作一團者此米之精液所聚也食之最能生精試之有效真詮之言煉精補精是殆於節欲保精而外又得所以養精生精之妙矣人果遵而行之亦何患精之不充乎精之既充更何患氣之不壯神之不固乎此篇當與遺泄淋濁虛癆等篇參看脈法脈訣曰遺精白濁當驗於尺結芤動緊二症之的脈經曰澀脈為精血不足之候丈夫脈澀號曰傷精醫鑑曰微澀傷精色欲傷原由症治靈樞曰恐具而不解則傷精精傷則骨廢痿厥精時自下又曰精脫者耳聾內經釋曰腎藏天一以慳為事志意內治則精全而澀若思想外淫房室太甚則固有淫佚不守輒隨溲尿而下仲景曰失精家小腹弦急陰頭寒目眩發落脈極虛芤遲為亡血失精男子失精女子夢交桂枝龍骨牡蠣湯主之黃庭經曰急守精室勿妄泄閉而寶之可長活集要曰西番人多壽考每夜臥常以手掩外腎令溫暖此亦一術也直指曰邪容於陰神不守舍故心有所感夢而後泄也本事曰夢遺不可作虛冷亦有經絡熱而得之嘗治一人至夜脊心熱夢遺用珍珠粉丸豬苓丸遺止而終服紫雪脊熱始除清心丸亦佳又曰腎藏精說腎能攝精氣以育人倫者也或育或散皆主於腎今腎氣衰則一身之精氣無所管攝故妄行而出不時豬苓丸一方正為此設入門曰夢遺全屬心說交感之精雖常有一點白膜裹藏於腎而元素以為此精之本者實在乎心日有所思夜夢而失之矣宜黃連清心飲又曰夢與鬼交而泄精亦曰夢遺專主於熱用知柏牡蠣蛤粉若損傷氣血不能固守而夢遺者當補以八物湯吞樗根皮丸又曰其不御女漏者或聞淫事或見美色或思想不遂或入房太甚宗筋弛縱發為筋痿而精自出者謂之白淫宜乎滲漏而不止也宜加減珍珠粉丸又曰欲心一動精隨念去莖中癢痛常如欲小便然或從小便而出或不從便出而自流者謂之遺精比之夢遺尤甚八物湯中吞珍珠粉丸又曰少時欲過陽脫而遺泄者宜金鎖正元丹戴氏曰夢遺精滑皆相火所動久則有虛面無寒也又曰不因夢而自泄者謂之精滑皆相火之所動也宜巴戟丸補真玉露丸固精丸鎖陽丹正理曰日啖飲食之精熟者益氣此生於谷故氣從米人身之中全具天地陰陽造化之氣人年三十而氣壯節欲少勞則氣長而緩多欲勞倦則氣少而短氣少則身弱身弱則病生病生則命危綱目曰夢遺屬鬱滯者居大半庸工不知其鬱但用澀劑固脫殊不知愈澀愈鬱其病反甚嘗有一男子夢遺醫與澀藥反甚先與神芎丸大下之卻服豬苓丸遂痊可見夢遺屬鬱滯者為多也又曰一人虛而泄精脈弦大服諸藥不效後用五倍子一兩白茯苓二兩為丸服之而愈五倍澀泄之央敏於龍骨蛤粉等類也醫鑑曰童男陽盛情動於中志有所慕而不得遂成夜夢而遺精慎不可補清心乃安朝服清心蓮子飲喜服定志丸無不愈者治色欲傷方四十一大鳳髓丹心火炒黃柏二兩砂仁鹽水炒一兩甘草五錢熟半夏豬苓茯苓紅蓮須益智仁各二錢五分上為極細末用鹽水和丸梧子大空心糯米飲吞下五十丸或七十丸效一名封髓丹金鎖思仙丸又蓮須蓮子芡仁等分金櫻子膏丸空心鹽湯下三十丸月後見效即不走泄如久服精神固能成地仙黃連清心飲君相火黃連生地當歸甘草酸棗仁茯神遠志人參蓮肉等分每粗末五錢水煎保精湯陰虛川芎當歸白芍地黃薑汁炒麥冬酒黃柏蜜知母薑黃連童便炒山梔薑炭熟牡蠣萸肉各五分鹿角散又鹿角屑鹿茸各一兩茯苓七錢半人參茯苓川芎當歸桑螵蛸補骨脂煅龍骨韭子酒浸一宿焙各五錢柏子仁甘草各二錢半每服五錢加薑五片棗二枚粳米百粒水煎空心服豬苓丸少壯半夏一兩豬苓末二兩先將一半炒半夏令色黃不令焦出火毒只取半夏為末糊丸候乾再用前豬苓一半同炒微裂入砂鍋內養之空心溫酒或鹽湯下三五十丸說半夏有利性而豬苓導水即腎閉導氣使通之意一名半苓丸半夏用生而大者礬水浸三宿曬乾破如豆大清心丸經絡熱黃柏一兩為末冰片一錢蜜丸每十五丸空心麥冬湯下樗根皮丸竅滑樗根白皮炒為末酒糊丸然此性涼而燥不可單服以八物湯送下為佳八物湯又人參白朮茯苓甘草川芎當歸白芍熟地各一錢二分一名八珍湯巴戟丸肝腎巴戟肉蓯蓉五味子菟絲子人參白朮熟地補骨脂茴香覆盆子龍骨牡蠣益智仁等分蜜丸每三十丸米飲下日二服虛甚八物湯下固精丸又黃柏知母各一兩牡蠣芡實連須茯苓遠志各三錢龍骨二錢山萸五錢山藥糊丸朱砂為衣空心鹽湯下五十丸芡實丸陽虛芡實五百個七夕蓮花須萸肉各一兩沙蒺藜五兩覆盆子二兩龍骨五錢蜜丸空心蓮肉湯下六七十丸鎖陽丹又桑螵蛸三兩龍骨茯苓各一兩糊丸茯苓鹽湯下七十丸秘元丹精流龍骨酒煮焙靈砂水飛各一兩砂仁訶子小者煨取肉各五分糯米糊丸溫水下十五丸加至三十丸約精丸又韭子霜後採者一斤酒浸一宿焙龍骨二兩酒調糯米粉丸空心鹽湯下三十丸瀉心湯房勞黃芩二兩黃連生地知母各一兩甘草五錢每粗末五錢水煎服一名黃連瀉心湯白龍丸又鹿角牡蠣各二兩生龍骨一兩酒糊丸空心溫酒或鹽湯下三五十丸大能固精樗根白皮丸濕熱炒韭子一兩炒白芍五錢鹽黃柏鹽知母煅牡蠣各三錢白朮枳實茯苓升麻柴胡各二錢神曲糊丸空心鹽湯下五十丸豬腎丸陽虛豬腎一枚去膜入附子末一錢濕紙包煨熟空心食之飲酒一杯不過三五服效陽起石丸虛寒陽起石煅鐘乳粉各等分酒煮附子末面糊丸空心米飲下五十丸以愈為度韭子煎莖強家韭子破故紙各一兩每末三錢水煎服日三即住蔥白酒脫陽蔥白三七莖打爛用酒煮灌之陽氣即回潜陽填髓丸煩勞熟地八兩川斛膏線膠各四兩湖蓮芡實各三兩麥冬茯神五味沙苑子各二兩遠志一兩金櫻膏丸清腎湯腎火焦黃柏生地天門冬茯苓煅牡蠣炒山藥湖蓮丸固真熟地五味芡實茯苓湖蓮山藥參朮膏心腎人參白朮熬膏米飲送下桑螵蛸散又人參茯神遠志菖蒲桑螵蛸龍骨龜板當歸歸脾湯暑濕熱人參白朮茯神棗仁龍眼肉黃芪當歸遠志木香炙草生薑大棗青花龍骨湯氣奪龜板去牆削光一兩桑螵蛸殼青花龍骨飛各三錢抱木茯神三錢二分人參當歸各一錢補心丹讀書人參丹參元參天冬麥冬生地茯神遠志棗仁當歸朱砂菖蒲桔梗柏子仁五味子六子丸識早生菟絲子粉蛇床子覆盆子沙苑子家韭子五味子鰉魚膠丸攝真湯嗔怒魚鰾生龍骨桑螵蛸芡實茯苓五味子秋石衝服葆真止泄丸陽浮水煮熟地人參秋石拌龍骨杞子五味子山藥茯神牛膝炭桂枝龍骨牡蠣湯失精桂枝龍骨牡蠣白芍生薑各三兩甘草二兩大棗十二枚水七升煮三升分三服珍珠粉丸夢遺黃柏新瓦上炒赤真蛤粉各一斤真珠三兩水丸空心溫酒下百丸法曰陽盛乘陰故精泄黃柏降心火蛤粉澀而補腎陰易老方無真珠紫雪又黃金寒水石石膏滑石磁石升麻元參甘草沉香木香丁香朴硝硝石朱砂麝香犀角羚羊角加減珍珠粉丸又黃柏半生半炒蛤粉各三兩滑石二兩樗根皮一兩乾薑炒褐色青黛各五錢神曲糊丸空心酒下七十丸此方黃柏降心火除濕熱蛤粉咸補腎滑石利竅樗皮大燥濕熱青黛解鬱降火乾薑斂肺氣下降生陰血鹽製炒微黑用之金鎖正元丹少時補真玉露丸陽虛茯苓龍骨韭子酒炒菟絲子酒浸煮等分蜜丸空心酒或鹽湯下五十丸後以美膳壓之宜火日修合神芎丸下藥定志丸虛泄人參茯苓茯神各三兩菖蒲遠志各二兩朱砂一兩半為衣蜜丸米湯下五七十丸
