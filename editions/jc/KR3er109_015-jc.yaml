body:
  text: 卷十五暑病源流伏暑暑風暑瀉疰夏經曰諸病喘嘔暴注下迫霍亂轉筋身熱瞀鬱小便濁赤皆屬於熱經言熱不言暑者固以熱即是暑而此數病皆傷暑之見症故前人言中暑亦混言中熱也然而暑與熱畢竟有辨試觀仲景特中夏月熱病之旨謂本伏寒研發而金匱複出中暍之條正恐人誤認為熱病之自內而發不知中暍之自外來而入也其皆治以白虎湯者以中暑之發熱大渴齒燥汗出而喘與熱病無異故皆以甘寒去熱苦寒降火甘溫益中必加人參因津耗也其不宜辛溫表散者以夏月則人身內陰外陽暑之中人必傷氣分昔人所謂風寒必顯有餘有餘為邪暑氣必顯不足不足為正是也所以香茹辛散止宜乘涼飲冷遏抑陽氣或致霍亂者可用非強力作勞內傷重而受暑者之所宜也宜以白虎湯為主清暑益氣湯為輔甘露飲十天水散皆可酌用說以凡暑病多生於元虛氣弱之人氣本虛暑複傷氣無氣以動故治暑急補氣惟肺虛有火者乃忌參朮也試先即仲景書推闡之仲景曰太陽中暍發熱惡寒身熱而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚說以此屬陰陽俱虛陽虛故脈弦細陰虛故脈芤遲若汗之不益傷陽溫針不益傷陰乎甘寒之劑所宜用仲景又曰太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之說以此為火令爍金肺傷而氣虛以致膀胱不足而表亦虛說膀胱太陽經主表也宜以救肺為急故用本湯也仲景又曰太陽中暍身熱疼痛而脈微弱此以夏月傷冷水水行皮中所主也一物瓜蒂湯主之說以此因夏月暑熱以水盥洗水邪鬱遏令火而成中暍也瓜蒂能使胸中邪氣皆吐下之喻嘉言云金匱治熱一以白虎治熱以夏熱必犯上傷肺耗津液用以救肺孫思邈之生脈散李東垣之清暑益氣湯皆祖之矣一以瓜蒂治濕以濕淫上甚亦先傷肺故外漬之水得以乘毛孔而聚皮間皮者肺之合也用瓜蒂或吐或下則肺氣不壅皮間之水得以下趨何後如河間通苓散子和桂苓甘露飲但宗仲景五苓之例以為導濕消暑竟不能祖瓜蒂之製以治上焦濕熱清肺金而別製一方也喻氏發明二方之妙如此然亦止就中暍之方治言之於暑病則未盡也且中暍與暑病固有異欲以中暍盡概暑病不可也說傷暑之脈必虛中暍之脈則微弱故有異也故夫暑病大端先分兩項一曰傷暑一曰中暑傷暑者靜而得者也陰症也或納涼廣廈起居不節汗出煩躁面垢背微惡寒手足微厥甚則灑然毛聳腠理開則灑灑然寒閉則蒸蒸熱悶此心包之火不勝時火故反微惡寒也倘坐臥陰涼表虛不任風寒若誤以外感作治必害宜清暑益氣湯或涼亭水閣密樹濃陰過受涼快為寒所襲頭疼惡寒發熱肢體拘急是感寒之類脈必弦緊宜消暑十全散或脾氣虛弱汗多惡寒宜十味香茹飲或過傷飲食生冷泄瀉嘔吐霍亂者宜六和湯藿香正氣散此概治傷暑之法也而其所及之症有吐利腹痛氣逆發熱頭疼煩渴肢冷疼前板齒寒無汗脈虛或遲或伏昏悶者宜香茹飲有身熱小便不利者宜益元散有吐瀉寒熱喘咳痞滿體腫倦臥便赤者宜六和湯有發熱嘔血者宜黃連二錢酒煎服有暑天身熱頭疼燥渴者宜麥冬湯有暑天發渴者宜生津丸以上皆傷暑之屬所當分別而治之者也中暑者動而得者也陽症也或遠行勞役大熱而渴陽氣內伏熱合於腎為水不勝火發熱煩渴氣息喘促日晡病減此脾胃大虛也宜補中益氣湯去升麻加五味子麥冬黃連黃柏澤瀉或農夫田野及慣於役力之人過受燔灼頭角額痛發熱大渴引飲脈洪大宜地漿水煎蒼朮白虎湯或年老及虛汗之人不宜用寒涼宜稍加溫藥行之宜竹葉石膏湯少加熟附子或平昔陰虛多火不可用溫藥宜白虎加人參竹葉湯凡以中暑皆太陽經分之症甚或卒倒不省人事切忌香茹等溫散之品說既中熱複以辛溫傷其氣如火益熱矣故香茹只可治傷暑不可治中暑此概言中暑之法也而其所及之症有夏月勞苦卒然昏暈甚而苦死者少與冷水即死亦禁臥冷地濕地急移其人於陰處再以熱土放臍上拔開作竅令人尿其中以生薑或蒜搗汁和童便或熱湯送下外用布蘸立蘇後徐用藥宜麥冬湯人參白虎湯此急救法也又有煩渴口燥悶亂者先以布蘸熱水熨臍中氣海或掬土放臍令人更溺之俟蘇以米湯徐灌之然後隨症調治宜六和湯清暑益氣湯隨症加減凡中暑者必傷氣宜清暑益氣湯傷暑亦可用以上皆中暑之症所當分別而治者也夫傷暑中暑皆暑病之重且大者故傷暑則暑熱之邪傷在肉分中暑則暑熱之邪傷及臟腑而又有尋常感受暑氣致腹痛水瀉者乃胃與大腸感邪之故或惡心嘔吐者乃胃口有痰飲而又感邪之故此皆名胃暑是暑病之輕且小者宜黃連香茹散清暑十全飲解暑三百湯治之亦當分別而治然則暑病亦有無汗脈弦細者此雖是暑亦必由過襲陰涼身中陽氣為其所遏故心煩肌膚火熱無汗非暑邪也不可全用表藥宜消暑十全飲暑月腠理易開香茹熱服便能汗出故不必用表也倘人迎脈緊而氣口反大咳嗽目疼鼻流清涕額與眉棱骨痛此又被風矣宜選奇湯至有內傷夾暑者暑月房勞兼膏粱水果雜進至周身陽氣不伸脈沉細或弦緊面垢無汗惡寒四肢厥逆拘急霍亂嘔吐宜冷香飲子或吐利兼作脈微欲絕或虛浮而散此為緊病急當救之毌緩宜漿水散或胃暑伏熱引飲過多及恣啖生冷致脾胃受寒必腹痛嘔泄水谷不分脈沉而緊宜大順散又有夾水傷暑者汗出當風浴起當風或冷水浸澡或坐臥於地以至水濕畜於身中適又感受暑邪生病非全由暑傷也宜香茹飲必溫散之又有暑瘵者暑月火能爍金不禁辛酒脾火暴盛勞熱躁煩火動心脾以致喘咳忽吐衄頭目不清胸膈煩渴不寧即老樨亦有此病昧者以為勞瘵不知此由火載血上非真陰虧損而為虛勞也宜歸身生地防風黃連知母山梔荊芥黃芩桔梗木通元參甘草貝母白茯苓陳皮薄荷麥冬五味等酌為一帖煎服黃連香茹飲亦可又有暑痿者暑天膏粱之人陽事頓痿此不可全用熱藥亦不可全用涼藥宜黃連解毒湯合生脈散又有攪腸痧者暑月不頭疼發熱但覺小腹痛或心腹俱痛脹痞不能屈伸皆水火流注臟腑故先小腹後及心腹俱痛非陰症也宜六和湯藿香正氣散大抵此症以探吐痰涎為主宜二陳湯加厚朴山梔或用炒鹽湯探吐又有霍亂者暑氣入腹惡心腹痛上吐下瀉瀉水如注此暑火暴發升降不利清濁不分所瀉者皆五臟津液宜速止之宜胃苓湯甚者桂苓甘露飲此症有挾食積者切不可下總當立止為上再商食積若吐瀉無物或上下關閉竟不吐瀉但心腹絞痛令人立斃此為乾霍亂亦即絞腸痧宜急以鹽湯探吐或探吐得通可救即定後周時勿進米氣得食又發戒之又有暑瘍者夏月頭面外項赤腫或咽喉腫痛或腿足掀腫長至數寸不能步履而頭痛內燥日夜發熱不止與凡癰毒發熱哺甚旦止者不同宜敗毒散及石膏黃連等說熱一解腫自消全無膿血非外科症也又有暑瘡者周身發泡如碗如杯如桃如李光亮脆薄中有臭水由濕熱之水泛於皮膚也宜黃連香茹飲黃連解毒湯甚者內實便閉口疳臭穢外以鮮荷花瓣貼之中藥周時可平宜涼膈散或承氣湯以上種種皆暑病之兼及者也要之暑病所由之經固屬太陽亦有由陽明者發熱汗大出微惡寒為太陽矣面赤大汗煩渴喘急即陽明也甚者脈洪大昏不知人有似熱症但忽輕忽重為異耳太陽宜艽苓散去桂加香茹陽明宜消暑丸故平人偶然被暑必身熱背惡寒汗出口渴煩躁悶亂痰逆惡心或吐瀉轉筋小便閉澀指間微寒宜五苓散去桂合益元散用若脾胃素弱上焦不足暑濕鬱蒸肢體困倦頭重心煩飽悶喘促早晚寒日午熱此氣血俱虛也宜清燥湯清暑益氣湯或夏月汗太多風犯汗孔身體重痛肢節麻或渴或不渴或小便黃澀此風鬱汗濕與暑相搏也宜益元散加蔥頭故人當濕熱盛時如梅天夏雨體倦神疲胸滿促肢冷或氣高喘身煩熱溺黃赤大便溏自汗不食須預防暑病宜清暑益氣湯加滲濕藥虛弱人當暑體倦神疲胃不和食無味須預防暑病安樂人當暑惡寒身重昏眩寒熱嘔吐腹痛乃夏屍感寒非暑病也宜溫辛散辛苫人勞甚暑病須培其氣宜人參白虎湯總當分別而治之者也而治法大要惟以清心利小便解暑毒補真氣為主即脈虛喘促逆冷卒昏暈此熱傷陰氣切不可用溫藥以助陽而耗陰脈法仲景曰傷暑脈虛又曰脈虛身熱得之傷暑脈訣曰暑傷於氣所以脈虛弦細芤遲體狀無餘三因曰中暑之脈陽弱陰虛微遲似芤本事曰暑脈弦細芤遲何也說寒傷形熱傷氣氣傷則氣消而脈虛弱所以弦細芤遲皆虛脈也正傳曰暑脈虛而微弱或浮大而散或隱而不見夫微弱隱伏皆虛類也活人書曰中暑與熱病相似但熱病脈盛中暑脈虛以此辨之張鳳逵曰脈理論劉複真云暑脈虛而微弱按之無力又脈來隱伏弦細芤遲皆暑脈也脈虛身熱得之傷暑中暍脈虛而微者是也寒病傳經故脈日變溫熱不傳經故不變寒病浮洪有力易治芤細無力準治無脈不治溫熱不然溫有一二部無脈者暑熱有三四部無脈者被火所逼而伏非絕無也於病無妨攻之亦易照經用辛寒火散脈起病愈矣說溫熱病發在一二經始終在此更不傳遞別經者其一二經或洪數則經弱且伏依經絡調之伏者起洪者平乃愈征也鰲按此篇言熱病即指暑病而言非謂伏寒夏發之熱病也暑病原由症治節齋曰夏至日後病熱為暑暑者相火行令也夏月人感之自口齒而入傷心包絡經其為症煩則喘渴靜則多言身熱而煩心大渴引飲頭痛自汗倦怠少氣或下血發黃甚者火熱製金不能平木搐搦不省人事東垣曰夏至陽盡陰生氣浮肌表散於皮毛腹中之陽虛矣世言夏月伏陰在內此陰字有虛之義若作陰冷誤甚火盛之時流金爍石何陰冷之有孫真人製生脈散令人夏月服之非為虛而何真指曰傷暑之症面垢自汗身熱背寒煩悶大渴倦怠少氣毛聳惡寒或頭疼或霍亂或四肢厥冷或身體無痛中暑之症則六脈沉伏冷汗自出悶絕而昏不知人矣伏暑症暑久伏病也說人受暑邪當時即發謂之暑病若熱毒之氣既已受之或為些小風寒所固此毒遂漸漸入內優於三焦腸胃之間或秋或冬久久而發此暑毒優於人身之內者也宜消暑丸香茹飲亦有夏月曝書曝衣暑氣未散隨即收藏至秋冬近之其氣亦從口齒而入入而即發此暑毒伏於物而觸於人者也故伏之一字雖同其所以伏則異然此二端其變生之病或霍亂吐瀉或泄痢腹痛或瘧發寒熱皆能致之皆當細詢其因以為治宜香茹飲藿香正氣散甚或有身熱足冷者其勢則甚危矣宜五苓散下來複丹伏暑症治仲景曰伏暑之症背寒面垢少有勞身即熱口開前板齒燥小便已灑灑然毛聳入門曰每於夏月後發者為伏暑也又曰伏暑者即冒暑久而藏伏者也其嘔渴惡心下血及年深暑毒不差者宜酒蒸黃連丸其煩渴引飲或泄利者宜桂苓甘露散其腸澼下痢赤白癃閉者宜益元散其暑邪伏久傷肺喘咳煩渴氣促者宜清肺生脈飲其大煩大渴及霍亂後渴者宜濯熱散暑風因暑而感生風病也病人忽手足搐昏迷不省脈浮而虛急先以溫水化蘇合丸灌之俟醒再用藥宜黃連香茹飲加羌活二錢大效若嘔吐宜加陳皮藿香小便不利宜加茯苓豬苓澤瀉滑石有痰宜加生薑大渴宜去半夏加花粉瀉利不止宜加白朮轉筋宜加木瓜腹滿身重難以轉側口不仁面垢譫語遺尿此熱兼暍也宜白虎湯各當加減為治或更病熱重搐搦厲聲吟呻角弓反張如中惡之狀亦或先病熱服表散藥後漸成風病譫語狂呼亂走氣力百倍此亦暑風與陰風不同宜解散化痰不可汗下宜竹葉石膏湯去參米加黃連知母日久脾胃弱必兼溫補若脈實必須吐之若欲預卻則以壯元為主宜四君子湯生脈散凡患暑風誤作癇治必不救暑風症治得效曰中暑複傷風搐搦不省人事曰暑風入門曰暑風暑厥者但以手足搐搦為風手足逆冷為厥並宜二香散或人參羌活散合香茹飲服之醫鑑曰夏月感寒者乃取涼之過也或納涼致風寒以傷其外或食生冷以傷其內故也若感暑風痰塞喘急六和湯倍半夏加羌活川芎又曰感冒暑風身熱頭痛或泄瀉嘔吐以二香散主之又曰凡暑月傷風傷寒悉以二香散解表發散暑瀉專受暑而成瀉利病也其原有新有久新者暑毒入於口齒傷於腸胃數日間其邪即發或挾食或挾濕以致煩渴尿赤自汗面垢腹痛所瀉如水直注日夜無度宜以炒黃連為君葛根升麻佐之或桂苓甘露飲久者暑邪留於三焦腸胃之間以致久而成泄所瀉亦是水但不如新者之暴迫直注其兼症亦相同宜玉龍丸此新久之別也而其症之所現雖同屬暑瀉其為治又有當分辨者如暑傷心脾嘔吐泄瀉或霍亂轉筋及浮腫瘧痢宜六和湯如暑熱引飲過多致水暑交並而上吐下瀉宜解暑三白散如傷暑上吐下瀉而兼煩亂宜香朴飲子如暑月煩渴引飲過多脾胃停積冷濕致成吐瀉宜大順散以上數條皆難混治若受暑而瀉別無他故則惟清暑足已宜消暑十全飲香茹湯其或有盛暑傷於外陰冷傷於內為內外受迫者此症更重非可易視矣宜連理湯桂苓元縮脾飲此暑瀉諸症當與泄瀉條參看暑瀉症治醫鑑曰腹痛水瀉者胃與大腹受暑惡心嘔吐者胃口有痰飲而又受暑也宜消暑十全飲疰夏脾胃薄弱病也然雖由脾胃薄弱亦必因胃有濕熱及留飲所致昔人謂痿發於夏即名疰以疰夏之症必倦怠四肢不舉羸瘦不能食有類於諸痿故也然疰夏與痿其原畢竟有異且痿為偶患之疾此為常有之事凡幼弱人多有之故必以清暑益氣健脾扶胃為主也故前既列夏痿之症於暑病篇而此又詳及疰夏宜參歸益元湯生脈散為主酌加白朮半夏陳皮茯苓扁豆子白芍木瓜澤瀉炙甘昔亦可疰夏症治仲景曰平人脈大為勞極虛亦為勞夫勞之為病其脈浮又手足煩熱寒精自出腳酸削不能行小腹虛滿春夏劇秋冬瘥謂之疰夏病東垣曰仲景言脈大者極虛者氣損也春夏者時助邪也秋冬瘥者時勝邪也黃芪建中湯治之可也丹溪曰人遇春末夏初頭痛腳弱食少身熱世俗謂之疰夏病屬陰虛元氣不足宜補中益氣湯去升柴加黃柏白芍麥冬五味子有痰加南星半夏又曰疰夏病宜服生脈散參歸益元湯東垣曰暑夏宜補氣說以夏至陽盡陰生腹中之陽虛也今人夏月服生脈散為此故耳治暑病方四十白虎湯總治石膏煨知母甘草粳米桂苓甘露飲又茯苓豬苓白朮滑石各二兩寒水石炙甘草澤瀉各一兩肉桂三錢共為末水下一方有人參香茹此方兼治伏暑煩渴引飲天水散又滑石六兩甘草一兩此即六一散之別名也瓜蒂湯中暍瓜蒂十四個水一升煮五合頓服解暑三白湯冒暑茯苓澤瀉白朮各二錢薑三片燈草二十莖消暑十全飲寒襲香茹一錢半扁豆厚朴蘇葉白朮赤苓藿香木瓜白檀香各一錢甘草五分此方兼治傷暑吐瀉十味香茹飲脾虛香茹錢半厚朴扁豆人參白朮茯苓黃芪木瓜甘草各七分六和湯食傷香茹厚朴各錢半赤苓藿香扁豆木瓜各一錢砂仁半夏人參杏仁甘草各五分薑三棗二一方加麩炒黃連一錢名清暑六和湯藿香正氣散生冷白朮白芷茯苓厚朴桔梗紫蘇藿香炙草陳皮半夏大腹皮薑棗香茹飲傷暑香茹扁豆厚樸甘草益元散小便少滑石甘草麥冬湯燥渴石膏知母白芍茯苓山梔竹茹麥冬白朮扁豆人參陳皮烏梅蓮肉甘草生津丸發渴白糖烏梅薄荷柿霜硼砂蜜丸噙化補中益氣湯脾胃人參竹葉麥冬石膏半夏甘草梗米薑汁蒼朮白虎湯役勞石膏蒼朮知母甘草梗米竹葉石膏湯虛汗人參竹葉麥冬石膏半夏甘草粳米薑汁白虎加人參竹葉湯虛火石膏知母粳米甘草人參竹葉人參白虎湯昏暈人參石膏粳米甘草知母選奇湯被風羌活錢半防風黃芩各一錢甘草八分食後稍熱服冷香飲子內傷生附子草果橘紅甘草各一錢薑五片冷服漿水散又附子肉桂乾薑甘草各五錢良薑半夏各二錢半漿水即淡醋每八分多至一錢調下如虛熱喘乏加人參汗多加黃芪五味子桂苓甘露飲霍亂滑石二兩茯苓澤瀉寒水石石膏甘草各一兩白朮豬苓肉桂各五錢每末一錢薑湯或開水下一方加人參香茹大順散夾暑甘草乾薑杏仁官桂等分先將甘草用白砂炒次入薑再次入杏仁炒然後篩去砂入桂共為末每三錢開水下五苓散身熱白朮肉桂澤瀉茯苓豬苓來複丹又倭硫黃元精石硝石青皮陳橘皮五靈脂醋糊丸綠豆大每三十丸空心米湯下黃連香茹散暑風香茹二錢厚樸錢半黃連七分半水煎入酒少部冷服四君子湯壯元人參茯苓白朮甘草生脈散又人參麥冬五味子黃連解毒湯暑痿黃連黃柏黃芩山梔二陳湯絞腸痧茯苓半夏陳皮甘草胃苓湯霍亂蒼朮厚朴陳皮甘草白朮茯苓豬苓澤瀉肉桂敗毒散暑瘍茯苓甘草枳殼桔梗柴胡前胡薄荷羌活獨活川芎連翹防風荊芥金銀花薑三片一名連翹敗毒散此方兼治一切痛疽初發憎寒壯熱甚者頭痛拘急狀似傷寒涼膈散暑瘡大黃芒硝山梔連翹黃芩甘草薄荷為末竹葉生蜜湯下承氣湯又大黃芒硝厚朴枳實消暑丸陽明半夏一斤醋煮茯苓甘草各半斤薑汁糊丸每二錢水下清燥湯氣血虛黃芪黃連神曲五味子柴胡豬苓甘草白朮蒼朮麥冬生地陳皮茯苓澤瀉人參當歸升麻黃柏溫辛散保養木香陳皮羌活蒼朮紫蘇厚朴薑蔥朱砂安神丸又黃連六錢甘草生地各三錢半當歸錢半朱砂五分蜜丸黍米大津下三十丸清肺生脈飲暑傷肺黃芩二錢人參麥冬當歸生地各一錢五味子十粒清暑益氣湯總治蒼朮一錢半黃芪升麻各一錢人參陳皮神曲澤瀉各五分酒黃柏當歸青皮麥冬葛根甘草各三分五味子九粒此方以蒼曲青陳澤瀉五種理脾餘十味清暑補氣李東垣清暑益氣湯變症加減法附後其法曰如心火乘脾乃血受火邪而不升發陽氣優於地中地者脾也必用當歸和血少用黃柏以益真陰如脾胃不足之症須少用升麻乃足陽明太陰引經藥也使行陽道自脾胃左達少陽行春令生物之根也更少加柴胡使諸經有遷生發陰陽之氣以滋春之和氣也如脾虛緣心火亢盈而乘其土也其次肺氣受邪為熱所傷必多用黃芪甘草次之人參又次之三者皆甘溫陽藥也脾始虛肺氣先絕故用黃芪以益皮毛之氣而填腠理不令自汗而損元氣也上喘氣短懶言必用人參以輔之心火乘脾必用炙草以瀉火熱而補脾胃中元氣甘草最少恐濕滿也若脾胃之急痛並脾胃太虛腹中急縮腹皮急縮者卻宜多用經曰急者緩之若從權必用升麻以引之恐左遷之堅邪盛卒不肯退反致項上及臀尻肉添而反行陰道故引以行陽道使清氣他出右遷而上行以和陰陽之氣也若中滿去甘草咳甚去人參口乾嗌乾加乾葛如脾胃既虛不能升浮為陰火傷其生發之氣榮血大虧榮氣優於地中陰火煎熬血氣虧少且心包與心主血之血減則心無所養致心亂而煩病名曰悗悗者心惑而煩悶不安也是由清不升濁不降清濁亂於胸中周身血氣逆行而亂經曰從下上者引而去之故當加辛溫甘劑以生陽陽生而陰長或曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生陰血也更加當歸和血又宜稍加黃柏以救腎水說甘寒瀉實火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之說將補腎水使腎水旺而心火降抉持地中陽氣也如氣浮心亂則以朱砂安神丸鎮之得煩減勿再服以防瀉陽氣之反陷也如心中痞亦少加黃連氣亂於胸為清濁相乾故以陳皮理之能助陽氣之升而散滯氣又助諸甘辛為用故長夏濕土客邪火旺可從權加二朮澤瀉上下分瀉其濕熱之氣濕熱太盛主食不消化故食減不知殼昧加炒曲以消之更加人參麥冬五味瀉火益肺氣助秋損也此乃伏中長夏正旺之時藥也鰲按東垣加減法極精當極周密良為本方變化之妙但血氣虛弱者固用無不效若壯盛人不但無央恐反助濕火則又不可不斟酌也治伏暑方十消暑丸治伏暑半夏八兩赤苓甘草各四兩用醋二升煮半夏醋乾共炒為末薑汁糊丸每四五十丸開水下藥下即蘇香茹飲又方詳上藿香正氣散又方詳上五苓散又方詳上來複丹又方詳上酒蒸黃連丸又黃連四兩酒七合浸一夜蒸乾為末面糊丸每二三十丸熱水下以胸膈涼不渴為驗一名小黃丸桂苓甘露散又滑石一兩石膏寒水石澤瀉葛根白朮赤苓甘草各五錢人參桂皮藿香各二錢半木香一錢二分半每末二錢白湯下益元散又滑石六兩炙甘草一兩一名六一散又名天水散又名神白散本方加乾薑五錢名溫六丸治因寒吐瀉反胃本方加紅曲五錢名清六丸治濕熱泄俱以飯丸清肺生脈飲又黃芩二錢當歸生地人參麥冬各一錢五味子十粒濯熱散又白礬五倍子烏梅肉甘草各一兩共為末入白面四兩拌勻每二錢新汲水調下一名龍須散治暑風方九黃連香茹飲暑風香茹三錢厚朴錢半黃連七分半入酒少部水煎冷服一名黃連香茹散白虎湯又方詳上竹葉石膏湯又人參竹葉麥冬石膏半夏甘草粳米四君子湯又方詳上生脈散又方詳上二香散又香茹香附各二錢蒼朮蘇葉陳皮各一錢厚朴扁豆甘草各五分薑三片木瓜二片蔥白二莖人參羌活散又羌活獨活柴胡前胡枳殼桔梗人參赤苓川芎甘草各六分天麻地骨皮各三分薄荷三葉香茹飲又香茹厚朴扁豆子甘草六和湯又香茹厚朴各錢半赤苓藿香扁豆木瓜各一錢砂仁杏仁半夏人參甘草各五分薑三棗二本方加麩炒黃連一錢名清暑六和湯治暑瀉方十一桂苓甘露飲暑瀉滑石二兩茯苓澤瀉寒水石石膏甘草各一兩白朮豬苓肉桂各五錢每末二錢薑湯調下玉龍丸又硫黃消石滑石明礬水丸六和湯又方詳上解暑三白湯又方詳上香朴飲子又香茹錢半厚朴扁豆赤茯苓澤瀉陳皮木瓜半夏人參烏梅肉蘇葉各七分甘草五分薑三棗二大順散又甘草切長一寸二兩乾薑杏仁肉桂各四錢先將甘草以白砂同炒次入薑同炒次入杏仁同炒篩去砂入桂為末每二錢水煎溫服如煩躁井水調下消暑十全飲又香茹一錢半厚朴扁豆子蘇葉白朮赤苓藿香白檀香木瓜各一錢甘草五分香茹湯又香茹三錢厚朴扁豆子赤苓各一錢半甘草五分水煎服或為末湯點二錢服他暑藥皆不及此連理湯又人參白朮乾薑茯苓黃連炙甘草桂苓丸又肉桂赤苓等分蜜丸每兩作八丸每一丸井水化下縮脾飲又砂仁錢半草果烏梅肉香茹甘草各一錢葛根扁豆子各七分薑五治疰夏病方四參歸益元湯疰夏當歸白芍熟地茯苓麥冬各一錢陳皮酒黃柏酒知母各七分人參五分甘草三分五味子十粒棗二枚米一撮生脈散又方詳上黃芪建中湯又白芍桂枝生薑甘草大棗飴糖黃芪補中益氣湯又方詳上附錄服藥總法周禹載曰傷暑傷寒溫涼諸症皆邪氣欺正氣也用藥如對敵藥入則邪漸退藥力盡而邪又漸熾必一服周時即詳勢診脈藥對則日夜連進三五服以邪退病實為主此法惟仲景傷寒論孫思邈千金方中載之孫曰夏天日五夜三服冬天日三夜五服必期病退而後止如禦敵者愈驅愈逐加精銳盪平而後班師此萬全之勝算也自宋以後此法不傳故取效寡而活人之央疏愚用此法屢獲神奇之效瘧疾源流諸瘧暑病也邪入於陰則陰實陽虛而發寒邪入於陽則陽實陰虛而發熱經故曰寒熱更作陰陽相移也說暑邪傷或舍皮膚之內與衛氣並居因隨日行陽夜行陰之衛氣並行而得陽則外出得陰則內搏是以有日作之瘧或邪舍深而內搏於陰則邪在臟矣在臟者其行遲不能隨衛氣之行陽行陰以準外出內搏之候故陰常與陽爭不得出而有間日一作之瘧或邪與衛氣會於六腑有時相守不能相爭因又有休數日一作之瘧此內經論瘧之精蘊有可悉其源流者也然瘧雖原於熱而瘧之發實因於寒與風經曰夏傷於暑汗大出腠理開發因淒滄之水寒藏皮膚中秋傷風則病成夫所謂水者因浴而受水之氣也所謂寒者因暑乘涼而反受寒也是水寒之氣當盛夏之時與暑熱之邪並伏皮膚之內迨秋風外束而新涼之陰欲入暑陽從內拒之暑陽欲挾水寒之氣而出新涼之陰又從外遏之陰陽相搏而成瘧此瘧所以原於暑而發必因於寒與風也特風寒之感必有重輕有先後經曰先傷寒後傷風故先寒後熱病名寒瘧固已其曰先傷風後傷寒故先熱後寒病名溫瘧者其先傷之風乃由盛暑汗出當風所感之風言非指新秋外束之風言也既當風而受風複因貪涼而反受寒此風與寒之邪均伏於皮膚內至秋重又感風而作也其曰肺素有熱氣盛於身發則陽氣盛其氣不及於陰而但熱不寒者又名癉瘧凡此皆指應暑之瘧言之其實四季之氣寒熱相劫皆能為瘧經所云秋病者寒甚冬病者寒不甚春病者惡風夏病者多汗是也故於溫瘧複中之曰溫瘧者得之冬中於風寒氣藏於骨髓至春陽大發邪不能自出因遇大暑腠理發泄兼有所用力邪與汗皆出此病藏於腎自內而出之外者據是推之四時皆能為瘧益信矣至發之時有或晚或早者以邪必客風府風府者項骨第一節之位項骨有三節脊骨二十一節共二十四節下為尾骶骨邪自風府日下一節故發晚二十五日直至骶骨二十六日邪複自後而前入於脊內以注伏膂之脈由是邪在伏膂循脊上行為自陰就陽卻無關節之陰其邪亦日退九日即出缺盆而發漸早故瘧之發無論日與間日其邪隨經絡以內搏者必俟衛氣相會合病乃發也總之邪之淺者日隨衛氣為出入衛氣一日一夜與邪氣會於風府瘧即相應而發邪之深者即留著於內不能日隨衛氣出入須俟衛氣周流適與邪氣相值而相值之候或間日或休數日相值之時或早或晚既不能拘故病亦不能日發且不能有定時耳瘧之為義如是盡矣試進詳治之之法古人云有汗欲其無汗養正為先宜參苓芪朮等秋冬加桂枝無汗欲其有汗散邪為急宜柴胡葛根石膏羌活薑皮人參蒼朮等其大旨也要而論之瘧之發如冰冷如火熱如風雨驟至猝不可當其病為逆殊不易治而究其故要皆中氣不足脾胃虛弱暑邪與風寒乘虛客之而作故治之者莫先於清暑益氣祛風消痰兼理脾胃而又隨經隨症投藥解散之則庶幾其有濟矣何則瘧之作六經皆有現症足太陽症腰痛頭疼且重遍身骨痛小便短赤寒從背起先寒後熱熱止汗出難已說邪在三陽盛於表故汗出不收也宜羌活黃芩湯加減足陽明症頭疼鼻乾渴欲引飲不得眠先寒灑淅寒甚久乃熱甚則煩躁畏日月火光熱去汗出說以陽明為熱甚之腑寒勝之故先寒久乃熱也畏日月火光者熱腑而為陰邪所掩故觸乎熱反畏之也宜大劑竹葉石膏湯加減足少陽症口苦耳聾胸脅痛或嘔身體解㑊見人惕惕然寒不甚熱不甚熱多汗出甚說以病在半表裡故寒熱俱不甚邪在膽而怯故心惕少陽主木火故熱多且汗出甚解㑊者倦怠不耐煩也宜小柴胡湯加減又上三陽經瘧大約多熱多渴亦易得汗急宜大劑以逐暑邪除熱渴去頭疼宜辛寒如石膏知母柴胡甘寒如葛根麥冬竹葉梗米苦寒如黃芩為君兼寒甚者用辛溫如薑皮桂枝脾胃虛弱飲食不消者補以參朮佐以蔻仁砂仁草蔻麥芽枳殼陳皮山楂神曲以為消導下午或空日兼服扶脾開胃之藥大補元氣宜參朮健脾湯自然易瘳士材李氏云在太陽曰風熱瘧宜汗陽明曰熱瘧宜下少陽曰風熱瘧宜和其法亦可臨時酌用足太陰症不樂善太息不嗜食先寒後熱或寒多若脾瘧必寒從中起善嘔嘔已乃衰然後發熱熱過汗出乃已熱甚者或渴否則不渴喜火說以脾喜樂病則否上焦痞塞故好太息而不嗜食太陰主裡邪不易解故多寒熱脾病及胃故善嘔也宜桂枝湯加減參用建中湯脾寒諸瘧宜橘皮散足厥陰瘧腰痛少腹滿小便不利如癃狀意恐懼易太息先寒後熱甚者色蒼蒼如欲死或頭疼而渴說以厥陰之脈環陰器抵少腹布脅肋故多腰腹小便之病凡小水不利為癃如癃者病不在小水而在邪之隱急數欲便也肝氣不足故恐懼而太息宜先用三黃石膏湯以祛暑邪次用鱉甲牛膝湯加減足少陰症腰痛脊強口渴嘔吐甚小便短赤欲閉戶牖而處寒從下起寒熱俱甚熱多寒少其病難已說以少陰主裡則陰氣上衝故嘔吐甚腎病則陰虛陰虛故熱多寒少病在陰故欲暗處腎陰臟而邪居之故難已也宜先用人參白虎湯次用鱉甲牛膝湯加減以上治六經諸瘧悉本繆仲淳法是知三陽瘧其邪淺發在夏至後處暑前三陰瘧其邪深發在處暑後冬至前其大較也三陰三陽瘧俱有日作間作之症前輩謂三陽瘧定日作三陰瘧定間日者非也獨三日瘧即經所云休數日作者乃必發於三陰耳故必審其脈症知為何經然後決經治之丹溪謂為作於子午卯酉日者少陰經瘧作於寅中巳亥日者厥陰經瘧作於辰戌丑未日者太陰經瘧亦是審驗三陰經法宜以鱉甲牛膝為君加入引經藥作於夜而使燥者加當歸脾胃弱者勿加佐以薑皮熱甚勿人大劑與之既審知何經而施治其或有痰兼去痰宜加檳榔半夏有癖兼除癖宜加常山經絡阻礙兼透經絡宜加川山甲若止暑結榮分則檳榔等俱無所用宜鱉甲香茹生薑此治三日瘧之大法也邪氣深伏並能為五臟瘧如肺瘧則心寒寒甚則熱熱時善驚如有所見說以肺為心覆寒邪乘所不勝故心寒心氣受傷故善驚也宜桂枝加芍藥湯心瘧則煩心甚欲得清水反寒多而不甚熱說以邪在心故煩欲得水以解心陽臟而邪居之則陽虛陰盛故反寒多不甚熱也宜桂枝黃芩湯肝瘧則面青太息狀若死說以肝氣蒼肝鬱則氣逆故太息木病則強故若死也宜四逆湯脾瘧則寒時腹痛熱時腹鳴鳴已汗出說以脾至陰而邪居之故寒而腹痛寒已而熱脾氣得行故腹中鳴鳴已陽氣外達故汗出而解也宜小建中湯橘皮散腎瘧則腰脊痛大便難目暄暄然手足寒說以腎脈貫脊開竅於二陰故腰脊大便病目不明水虧也手足寒陰厥也宜桂枝加歸芍湯但前既言六經瘧而此又言五臟瘧者以前就經言邪只中諸臟之經此就部言邪並中諸臟之部故非重複也此外又有風寒暑濕痰食血勞瘴疫鬼牝瘧母等症士材謂為瘧之兼病非因而成瘧者是也然既有此等兼病則必有其所由然與其所以治風瘧者自感風而得風為陽邪故其症先熱後寒惡風自汗頭疼煩躁宜川芎白芷細辛青皮檳榔紫蘇寒瘧者自感寒而得與經言寒瘧不同寒為陰邪故先寒後熱且寒多熱少惡寒無汗攣痛而慘宜薑桂厚朴草果等附子亦可酌用暑瘧者專受暑而得與凡瘧之因暑而反受風寒以成者不同故但熱不寒或多熱裡實不泄煩渴而嘔肌肉消削宜益元散香茹飲小柴胡湯參用之或加竹瀝濕瘧者感受濕氣而成其症寒熱相等小便不利身體重痛肢節煩疼嘔逆脹滿宜參用胃苓湯除濕湯五苓散加味二陳湯痰瘧者痰結胸中與凡瘧所挾之痰更甚故寒熱乍已胸中滿悶不退或頭疼肉跳吐食嘔沫甚則昏迷卒倒皆是痰涎強聚之故宜二陳湯導痰湯食瘧者飲食不節食滯痰生所致故寒已複熱熱已複寒寒熱交並飢不能食食則脹滿嘔逆腹痛亦名胃瘧宜青皮陳皮砂仁蔻仁麥芽草果山楂神曲血瘧者或衄血或便血或女人月事適來皆是血症宜於治瘧藥中加桃仁蓬朮延胡索等勞瘧者以真元不足表裡俱虛或作勞或房勞所致故病發於陰即久瘧也其症寒熱甚微寒中有熱熱中有寒最難調治宜補中益氣湯酌加鱉甲牛膝首烏瘴瘧者感受山嵐濕澗之毒氣以至敗血瘀心瘀涎聚脾故乍寒乍熱迷困發狂或哂而不言嶺南最多此症宜小柴胡湯加大黃木香疫瘧者一方長幼相似因染時行不正之氣變成寒熱須參氣運用藥宜五瘟丹不換金正氣散鬼瘧者亦感時行不正之氣以至成瘧寒熱日作或甚或不甚每發必胡言亂語見神見鬼多生恐怖宜蒼朮白芷桃仁雄黃牝瘧著陽氣素虛又久受陰濕陰盛陽虛故但寒不熱氣虛而泄宜柴胡薑桂湯或加黃芩至於瘧母者緣治之失宜營衛虧損邪伏肝經挾血挾痰挾食脅下結成塊是也必以補虛為主不可輕用攻劑宜參用小柴胡湯四君子湯加鱉甲肉桂射乾牡蠣砂仁三棱青皮而猶有未盡者更陳列之瘧必由中氣虛若用破氣藥則中氣愈傷邪不得解甚則中滿不思食作泄惡寒口乾種種變生急難醫治如或遇此速宜培補真氣宜六君子湯瘧病必挾痰所謂無痰不成瘧是也然痰有寒熱之分不容概治熱痰以貝母為君竹茹竹瀝橘紅茯苓瓜蔞霜佐之寒痰發瘧寒多不渴以半夏白朮橘皮為君薑皮佐之瘧病必挾風有風者先治其邪宜以首烏為君白朮橘皮為臣葛根羌活薑皮為佐不頭疼去羌活瘧有暑濕熱之邪內伏百藥不效者尤宜詳審或稍下之亦可宜青蒿蒼朮枳實瘧有寒甚而因於虛者治必兼補兼散宜以甘溫如參芪朮為君辛甘如薑皮桂枝為佐瘧發在陰分者不得概有陽分藥宜以當歸牛膝為君佐以乾薑如熱甚而渴去薑加知母麥冬竹葉鱉甲等瘧發日久多熱不解者必本陰虛當益陰除熱宜鱉甲牛膝為主瘧發日久多寒不解者必本陽虛當補中益氣宜以參芪朮為主瘧發日久並寒與熱不歇者為有根根者何水飲敗血結癖是也說水飲皆能生寒熱敗血為暑熱之毒結癖為瘧母而有結癖者脅必痛以癖必結於脅下也凡此皆為寒熱不歇之根故挾水飲者當逐水飲挾敗血者當消暑毒有結癖者當攻其癖能隨症疏利之寒熱自除矣直指云瘧多用常山以水在上能吐之水在中下能破其結而下其水斯言良是也此皆治瘧之要法不可不知者若瘧後變症惟痢最為危急而其變痢之由有因暑邪太盛解散不早即或解散不能通暢以至陷入於裡變而為痢者急用表裡分消之法以治之宜以芩連芍草滑石紅曲以消裡葛根升柴以治外脾胃弱加人參扁豆蓮肉連進大劑以痢愈為度痢愈瘧亦止即不止其發亦輕仍隨經隨症施治有因誤下邪氣隱於內變而為痢者則必兼腹滿腫脹嘔惡不思食等證法宜逐邪去滯以培土宜芩連芍草滑石紅曲葛根柴胡人參蓮肉等及陳皮藿香厚朴薑皮亦以痢愈為度此二因者症之最急治之之藥必宜大劑若膽小雖用藥不謬終不去病以致遷延不救其次瘧勞或素有弱症而又患瘧以致舊病更深或因瘧煎熬日久頓精神衰耗內熱不清肌肉消削浙至往來潮熱致成癆瘵急宜察其何經受病以補益調理之宜補中益氣湯八味丸為主其次厥瘧總由氣血虧虛調理失宜或因寒而厚衣重被至發熱不去過傷於暖或因熱而單衣露體雖過時猶然至又感寒遂成厥瘧治者當分別寒熱不得混施湯劑熱厥宜升陽散火湯寒厥宜建中湯及附桂吳萸俱可酌用或兼氣虛參用參芪益氣湯或兼血虛參用四物湯以上種種諸法固合瘧之症變為治矣寧患有未瘳乎至如似瘧非瘧一症亦惡寒亦發熱亦或連日作或間日作而其與瘧分別處惟在乎脈不必弦皆由感冒風寒忽覺毛寒股栗百骸鼓撼嘔不能食未幾而發熱有似瘧狀也其或有熱多者宜小柴胡湯或有寒多者宜人參養胃湯或有內傷虛者宜補中益氣湯加山楂麥芽蔻仁以扶脾胃皆宜隨症施治自止矣然傷寒癆病各有如瘧各宜從本病施治即痰飲㿗疝積聚傷食暑濕燥火癰疽瘡毒等症俱有寒熱似瘧者須細間其原不得概認為瘧脈法要略曰瘧脈自弦弦數多熱弦遲多寒弦小緊者宜下之弦遲者可溫之弦而緊者可發汗浮大者可吐之弦數者風發也以飲食消息止之脈經曰瘧脈自弦微則為虛代散則死丹溪曰瘧脈多弦但熱則帶數寒則帶遲亦有病久而脈極虛微無力似乎不弦然必於虛數之中見弦但不搏手耳細察之可也醫鑑曰弦短者傷食弦滑者多痰虛微無力為久瘧回春曰瘧脈遲緩者病自愈瘧疾形症內經曰陰陽交爭陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷太陽虛則腰背頭項痛三陽俱虛則陰氣勝陰勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而咳故欲飲冷入門曰衛虛則先寒營虛則先熱表邪多則寒多裡邪多則熱多表裡相半則寒熱相等丹溪曰人之榮衛晝行於陽陽表也夜行於陰陰裡也榮衛行到病所不通乃作寒栗鼓振頭頷中外皆寒腰脊俱痛此邪氣入於內也寒戰俱已內外皆熱頭痛如破渴欲飲冷煩滿欲吐自汗此邪氣發於外也三因曰暑瘧則單熱溫瘧則多寒寒瘧則先寒後熱風瘧則先熱後寒餘皆先寒後熱又曰陽不足則陰邪出表而與陽爭乃陰勝而為寒陰不足則陽邪入裡而與陰爭乃陽勝而為熱若邪入而正氣不與之爭則但熱而無寒陽不足則先寒陰不足則先熱東垣曰身後則為太陽太陽者膀胱水寒也身前為陽明陽明者大腸金燥也少陽之邪在其中近後膀胱水則惡寒近前陽明金則發熱故往來寒熱而為瘧瘧發日數丹溪曰三日一發者受病一年間日一發者受病半年連日發者受病一月二日連發住一日者氣血俱受病也又曰三日一發陰經受病最重入門曰陽為腑邪淺與榮衛並行一日一件陰為臟邪深橫連膜原不能與正氣並行故間日蓄積乃作或三四日一作久則必為瘧母瘧發時刻保命曰從卯至午作者邪在外也從午至酉作者邪在內也從酉至子作或至寅作者邪在血分也入門曰陽為子時至巳陰為午時至亥如作審卯而退於未中或作未中而退於子丑皆謂之陰陽不分須用藥趲早或移時分定陰陽然後陽瘧截住陰瘧升散瘧發晝夜宜分治醫鑑曰氣虛則日發宜補中益氣湯加半夏黃芩六君子湯血虛則夜發宜麻黃黃芩湯柴胡芎歸湯瘧疾治法保命曰太陽曰寒瘧宜汗正陽明曰熱瘧宜下少陽曰風瘧宜和三經皆謂暴瘧在三陰俱曰溫瘧宜汗下和瘧者老瘧也故曰久瘧又曰太陽瘧宜桂枝羌活湯麻黃羌活湯陽明瘧宜柴苓湯人參白虎湯少陽瘧宜柴胡桂枝湯柴胡加桂湯三陰瘧總宜白虎桂枝湯麻黃白朮湯太陽陽明合瘧宜桂枝芍藥湯桂枝石膏湯三陽合瘧宜桂枝黃芩湯以和之正傳曰傷寒餘熱未盡重感於寒而變瘧名曰溫瘧亦名風瘧此為傷寒壞症其症先熱後寒不得作正瘧疾治入門曰桂枝湯治太陽白虎湯治陽明小柴胡湯治少陽意甚明白挾痰合二陳湯挾食合平胃散尿澀合五苓散便閉合大柴胡湯無汗加葛根蒼朮有汗加黃芩白朮氣虛加人參白朮熱甚加芩連寒多加草果口渴加烏梅夜作加桃仁赤芍日久加常山檳榔吐之治瘧之法盡矣又曰瘧無汗宜用柴胡升麻川芎多汗宜用白朮烏梅得效曰瘧疾者陰陽交爭寒熱互作用藥須半生半熟半冷半熱乃收十全之央說所以分陰陽解寒熱也直指曰凡瘧方來與正發時不可服藥恐藥病交爭轉為深害須未發兩時之前或發日清晨與服仍節飲食避風寒遠酒色慎起居無不愈醫鑑曰如瘧疾寒熱大作此太陽陽明合病也謂之大爭寒作則必戰動熱發則必汗泄經曰汗出不愈知為熱也不治之恐久而傳入陰經故宜用桂枝芍藥以解之若服此湯後寒熱轉甚者知太陽陽明少陽三經合病也故又宜桂枝黃芩湯以和之瘧疾難治不治症靈樞曰寒熱脫形脈堅搏逆也死不治得效曰久瘧複作虛浮不食者難治久瘧腰脊強急瘈瘲者必不治瘧疾導引法保生秘要曰平身坐定雙手擦掌撫腎囊兩肘靠膝以聲勢向前躬而後抑如此用力起五九之數約汗透身輕爽而自愈慎風邪瘧疾運央保生秘要曰定艮起念運上風門穴多著工夫說風感此透也漸運入內又散出外上泥丸降心頭推開或吐而愈不吐亦愈治瘧方四十六羌活黃芩湯太陽瘧羌活黃芩陳皮前胡豬苓甘草知母如口渴即兼陽明宜倍知母加麥冬石膏渴而汗少或無汗加葛根如深秋或冬無汗加薑皮因虛汗少或無汗加人參麥冬薑皮因虛汗多加黃芪桂枝汗止即去桂枝若素有熱勿入桂枝代以白芍五味子若發於陰加當歸小便短赤或澀加六一散春溫以茯苓豬苓代之桂枝羌活湯又桂枝羌活防風甘草各一錢半此方能治太陽瘧自汗頭項痛腰脊強麻黃羌活湯又麻黃羌活防風甘草此方能治太陽瘧無汗即前方去桂枝用麻黃也柴苓湯陽明瘧柴胡一錢六分澤瀉一錢三分赤苓豬苓白朮各七分半半夏七分黃芩人參甘草各六分桂心三分薑三片竹葉石膏湯又竹葉石膏人參麥冬甘草生粳米無汗或汗少嘔者加葛根虛而作勞加人參汗多加白朮痰多加橘紅貝母得汗即解寒熱俱甚渴甚汗多寒時指甲紫黯者加桂枝小柴胡湯少陽瘧柴胡黃芩人參半夏甘草薑棗渴者去半夏加石膏麥冬肺熱去人參倍麥冬加知母有痰不渴加貝母白朮茯苓薑皮陰虛有熱雖嘔吐忌用半夏生薑恐損津液至聲啞加竹茹橘皮茯苓烏梅麥冬柴胡桂枝湯又柴胡二錢甘草五分薑三棗二此方能治少陽瘧寒熱乍往乍來柴胡加桂湯又柴胡三錢黃芩桂枝各二錢半半夏一錢甘草四分薑三棗二桂枝芍藥湯二陽瘧桂枝一錢赤芍知母石膏黃芩各二錢桂枝石膏湯又石膏知母各三錢黃芩二錢桂枝一錢桂枝黃芩湯三陽瘧柴胡二錢石膏知母各一錢半人參黃芩半夏甘草各一錢二分桂枝一錢參朮健脾湯凡瘧總服人參橘紅茯苓白蔻仁山楂麥芽藿香白朮白芍山藥肺火去參朮加麥冬石斛烏梅停食必惡食倍山楂加神曲傷肉食加黃連紅曲傷谷食加枳實草果傷面食加萊菔子食消即已單用本方胃素有濕痰其症不渴寒多方可用半夏橘紅蒼朮白朮大劑與之嘔甚加薑皮白虎桂枝湯三陰瘧石膏四錢知母二錢桂枝甘草各一錢粳米一合三陰瘧其脈如平無寒但熱骨節煩疼時便難朝發暮解暮發朝解此方治之麻黃白芍湯又麻黃桂皮青皮陳皮半夏曲白芷蘇葉赤苓白朮桔梗細辛檳榔甘草各七分薑三片棗二枚桂枝湯太陰瘧桂枝芍藥甘草薑棗有痰加陳皮白朮建中湯又橘皮散脾寒諸瘧廣皮八兩去白切薑汁浸過一宿砂罐內重湯煮乾焙研末每服三錢大棗十枚去核水一碗煎至半碗發前服即以棗下之此方非寒極甚者勿與服三黃石膏湯厥陰瘧鱉甲牛膝湯又鱉甲牛膝當歸陳皮柴胡熱甚而渴倍鱉甲加花粉麥冬知母脾胃弱或溏泄去當歸加人參寒甚寒多指甲青黯加人參薑皮桂枝肺火忌用參止多服本方人參白虎湯少陰瘧陽明瘧人參石膏知母甘草粳米凡少陰瘧先用本方加桂枝以祛暑邪後加鱉甲牛膝熱甚倍知母加麥冬寒甚加桂枝熱甚而嘔加竹茹人參陳皮用桂枝牛膝者肝腎同一治也桂枝加芍藥湯肺瘧桂枝芍藥甘草薑棗芍藥倍用桂枝黃芩湯心瘧桂枝芍藥甘草黃芩薑棗四逆湯肝瘧附子乾薑甘草小建中湯脾瘧桂枝芍藥甘草飴糖薑棗桂枝加歸芍湯腎瘧桂枝芍藥甘草當歸薑棗芍藥倍用益元散暑瘧滑石甘草朱砂香茹飲又香茹厚朴扁豆子甘草胃苓湯濕瘧蒼朮厚朴陳皮甘草白朮肉桂茯苓豬苓澤瀉除濕湯又蒼朮厚朴陳皮甘草白朮茯苓半夏藿香加味二陳湯又半夏陳皮茯苓甘草黃芩羌活蒼朮二陳湯痰瘧半夏陳皮茯苓甘草導痰湯又半夏南星赤苓枳實廣橘紅甘草生薑不換金正氣散又蒼朮二錢厚朴陳皮藿香半夏甘草各一錢薑一片棗二枚五瘟丹疫瘧黃連火戊癸年為黃柏水丙辛年為君黃芩金乙庚年為君甘草土甲己年為君香附木丁壬年為君紫蘇葉各一兩為君者倍入皆生用冬至日製為未用錦紋大黃三兩熬成膏為丸彈子大朱砂雄黃為衣再貼金箔每一丸井華水磨服補中益氣湯勞瘧晝發瘧人參黃芪白朮甘草陳皮歸身升麻柴胡柴胡薑桂湯牝瘧柴胡乾薑桂枝黃芩花粉牡蠣甘草六君子湯瘧母晝發瘧人參白朮茯苓甘草半夏陳皮調中益氣湯瘧癆人參黃芪白朮甘草當歸白芍柴胡升麻陳皮五味子歸脾湯瘧癆人參黃芪當歸白朮棗仁遠志茯神圓眼木香甘草薑棗八味丸瘧癆熟地山藥山萸丹皮茯苓澤瀉附子肉桂升陽散火湯熱厥瘧升麻柴胡羌活獨活葛根白芍防風甘草理中湯寒厥瘧人參白朮炮薑炙草參芪益氣湯氣虛瘧人參黃芪白朮五味麥冬陳皮炮附子炙甘草四物湯血虛瘧川芎當歸白芍熟地麻黃黃芩湯夜發瘧麻黃三錢黃芩二錢桂心一錢甘草一錢半桃仁十五個臨臥服桃仁味甘苦辛肝者血之海血受邪則肝氣燥經所謂肝苦急急食甘以緩之桃仁散血緩肝謂邪氣深遠而入血故夜發乃陰經有邪此湯乃發散血中風寒之劑也柴胡芎歸湯又柴胡葛根川芎各一錢桔梗當歸赤芍藥人參厚朴白朮白茯苓陳皮各七分紅花甘草各三分薑三片棗二枚烏梅一枚此方能治夜發之瘧引出陽分而散後再服人參截瘧飲自愈矣人參載瘧飲截一切瘧人參白朮茯苓當歸青皮厚朴柴胡黃芩知母酒常山草果醋鱉甲各八分肉桂甘草各三分薑三片棗三枚烏梅一個桃仁七粒水煎露一夜五更空心服渣再煎朝服糖拌烏梅下藥忌雞魚豆腐面食辛辣物此方虛人尤妙截瘧飲又黃芪二錢人參白朮茯苓各錢半砂仁草果橘紅各一錢五味子八分甘草六分烏梅三個薑三片棗二枚此方治虛人久瘧不止極效截瘧方又人參自四錢至一兩薑皮或生薑相配露一夜發日五更服必止甚者連進二服或三服如貧以白朮代參夜發者加當歸無不應手取效此必久瘧料無處邪內滯方可服人參養胃湯似瘧非瘧人參白朮橘紅半夏曲丁香木香藿香神曲麥芽茯苓砂仁厚朴建蓮甘草各七分薑三片附載倪涵初治瘧四方第一方廣皮薑半夏茯苓威靈仙各一錢製蒼朮薑厚朴柴胡黃芩各八分青皮檳榔各六分炙甘草三分頭痛加白芷加薑三片上咀片如法炮製河井水各一杯煎九分飢時服渣再煎服此方平胃消痰理氣除濕有疏導開先之央受病輕者二貼即愈勿再藥可也若二貼後病勢雖減而不全愈必用第二方少則三貼多則五貼而已第二方生首烏三錢知母醋鱉甲各二錢白朮威靈仙當歸各一錢茯苓活黃芩柴胡陳皮各八分炙甘草三分薑三片井水河水各一杯煎八分加無灰酒五分再煎一沸空心服渣再煎服此方補瀉互用虛實得宜不用人參黃芪屏去常山草果平平無奇卻有神效即極弱之人犯極重之病十貼後立有起色央奏萬全所云加減一二即不靈應者正此方也第三方黃芪當歸各一錢二分人參白朮各一錢柴胡陳皮各八分升麻四分炙甘草三分或加首烏二錢炒知母一錢或又加麥芽一錢青蒿子八分皆可薑一片棗二枚水二杯煎八分半飢時服三五貼元氣充實永不發矣方雖有三第二實為主方既不刻削亦可峻補央獨歸之其第三方專為有力者設若貧家只多服第二方可也瘧之為害南人患之北人尤甚弱者患之強者尤甚雖不至遽傷人命然不治則發無已時治之不得其道則邪怒內伏正氣日虛久而久之遂不可治予所定三方甚為平易無奇絕不入常山草果等劫劑且不必分陽瘧陰瘧連日間日三日及非時瘧人無分老幼疾不論久近此三方不用加減惟按次第服之無不應手而愈也久瘧全消方威靈仙醋莪朮炒麥芽各一兩生首烏二兩金毛狗脊八錢青蒿子黃丹穿山甲水煮切細炒成珠醋鱉甲各五錢如小兒加炙雞肫皮五錢用山藥粉一兩飴糖一兩水一小碗為糊丸每半飢時薑湯下二三錢凡處暑後冬至前或間日或非時纏延日久須治瘧母予嘗酌定此方以治人服不半料無不全愈收央附載繆仲淳治瘧諸法及諸藥要品熱多貝母麥冬葛根竹葉知母黃芩柴胡烏梅首烏鱉甲牡蠣石膏橘紅滑石牛膝茯苓寒多桂枝薑皮人參白朮蒼朮黃芪歸身炙草半夏橘紅蔻仁草蔻仁汗多人參白朮黃芪秋冬加桂枝無汗葛根柴胡石膏羌活薑皮人參蒼瘧母鱉甲射乾牡蠣三棱砂仁肉桂人參青皮陳皮甘草痢疾源流諸痢暑濕病也大抵痢之病根皆由濕蒸熱壅以至氣血凝滯漸至腸胃之病惟由濕熱故多偏於燥裡急後重小便赤澀皆其症也惟由氣血鬱滯故血主於心而熱鬱傷血者心亦由是而病氣生於肺而凝滯傷氣者肺亦由是而病至心之表為小腸肺之表為大腸二經出納水谷轉輸糟粕而胃又為二經之總司故心移病小腸則血凝而成赤痢肺移病大腸則氣結而成白痢而血與氣之凝結必挾飲食痰涎始成積滯其飲食痰涎皆貯於胃故痢之病不離乎胃此病起心肺而及於胃者也亦有胃家本經濕熱傳染於大小腸者則以大小腸為出納轉輸之官而胃家飲食痰涎之積滯必由大小腸出故病又從胃而及二經其所痢又必兼黃說以黃為土色也則就所痢之色其或是赤可知病因於血即病根於心其或是白可知病因於氣即病根於肺其或是黃可知病因於飲食痰涎即病根於胃從其根而治之各投以引經之藥為向導心黃連細辛肺桔梗升麻白芷蔥白胃白芷升麻葛根大黃豈可概從湯胃之說乎哉特所謂從根而治者傷氣分則調氣益氣宜導氣湯異央散四七湯木香化滯湯傷血分則和血補血宜阿膠四物湯四物地榆湯加山梔槐花等傷胃分則安胃養胃宜胃苓湯香砂枳朮丸保和丸固各有所主矣而要法則必先祛暑邪兼滲濕宜茹苓湯勝濕湯雖病在氣血亦必兼理脾胃為主經云安谷則昌絕谷則亡此之謂也至於痢久則傷腎則以腎為胃關開竅於二陰病既或由心肺而及胃以注於二經或專由胃以及大小腸而注於二經總未有不傷腎者故治必當補腎宜熟地炭丹皮沉香山藥遠志黃柏使命門之火旺有以生土將飲食自進垢滯自化矣此各經致痢之原不可不別而治也若但拘痢無止法一言概行攻伐必愈損血耗氣或又拘初則行久則澀之語每至固澀之後壅滯氣血變為腫脹喘急宜木香調氣湯蘇子降氣湯非不審其經以治其根而及其流之過哉總之痢之由於氣者必疏通之由於血者必調和之由於飲食痰涎者必推盪之以至由氣血而傷及脾胃必培補中宮宜歸脾湯六君子湯由氣血與脾胃而傷腎必峻補元陽如附桂五味補骨脂赤石脂禹餘糧等俱可選用此治痢之大凡也然而病之由來不一更變無窮固不得不求其詳也試條舉之或發痢冒暑而成自汗發熱面垢嘔渴腹痛小便不通此暑濕積滯皆有之宜香茹飲五苓散藿香正氣散中加木香黃連香茹或初發時即裡急後重所下無多才起腹又痛此濕熱凝滯之故宜藿香正氣散加木香黃連枳殼或檀香乳香冰片麝香或裡急登圊反不出則由於氣滯宜蘇子降氣湯木香化滯湯重者承氣湯或裡急而頻見汗衣則為氣脫宜理中湯補中益氣湯去當歸加肉果或後重而至圊稍減則為火迫宜治痢方中加黃連為主或後重而至圊不減則為虛滑宜真臟湯或後重而到圊轉甚則為下陷宜治痢方中加升麻舉之甘草緩之或腹中疼痛不止則由肺邪鬱在大腸宜桔梗蘇子為君白芍甘草陳皮木香當歸以佐之惡寒加乾薑惡熱加黃連虛弱用建中湯一方枳殼黃連等分槐花一兩拌炒去槐花用二味煎好入乳香沒藥各八分為治腹痛神妙之品或大孔痛宜分寒熱為治熱治於下宜芩連槐花木香檳榔挾寒理中湯外以炒鹽熨之或痢已止但虛坐努責不得解則由血虛宜四物湯去川芎加紅花陳皮甘草或老人深患痢呃逆最宜小心宜黃柏末米飲丸參苓米湯下或胎前作痢不可輕用傷胎藥宜芩連白芍炙草橘紅枳殼紅曲蓮肉略用升麻亦可未滿七月勿用滑石或產後作痢積滯雖多腹痛雖極不可輕用盪滌藥如大黃芒硝之類恐傷胃氣致不可救宜人參白朮當歸紅曲升麻炙甘草滑石益母草惡露未盡者兼治之宜加乳香沒藥砂仁血虛者稍清理之宜加阿膠以上總言治痢之法也而赤白之人發亦有宜別者赤則如下膿血由脾經受濕也宜蒼朮地榆湯下血不止熱毒凝滯也宜鬱金散純下血而色鮮紅心家伏熱也宜犀角丸赤痢久而百法不效脈沉弦而左為甚穢物甚少但有紫黑血水此瘀血也宜乳香沒藥歸尾桃仁木香檳榔甚者加大黃白則如鼻涕如凍膠此由氣分致病亦名冷痢宜先用沉香木香蔻仁砂仁次用理中湯加木香甚有不能食者宜肉果陳米赤白痢則赤白各半此由冷熱不調也宜小駐車丸又有水谷痢由脾胃氣虛不能消化水谷糟粕不聚變而為水谷痢也飧泄亦曰水谷痢當參看宜保和丸又有膿血痢凡膿血稠粘裡急後重皆屬於火故內經曰溲澀而使膿血言病因也又曰知氣行而血止言治法也故易老云行血則便膿自愈調氣則後重自除重劑則以大黃湯下之輕劑則以芍藥湯和之然而所便膿血自有三部如脈沉惡寒或腰痛臍下痛此中部血也非黃芩不能治如煩躁先便膿後見血此上部血也非黃連不能治如脈沉惡寒先見血後便膿此下部血也非地榆不能治但此便膿血與前赤痢下如膿血者不同以前則濕病此則火病也又有風痢惡風鼻塞身重色青或純下清水宜蒼朮防風湯或所下似痢非痢似血非血宜蒼廩湯或純下清血宜露風湯又有寒痢所下白如鴨溏腸鳴痛墜不甚宜理中湯訶子肉湯日久則宜補腸宜黃連補腸湯又有濕痢腹脹甚身重下如黑豆汁或赤黑混濁此危症也宜加味除濕湯又有熱痢與暑痢似同而異背寒齒乾面垢煩冤燥渴引飲皆暑症不宜輕用熱藥其冷熱蘊積腸胃間滑泄垢膩者名腸垢即為熱痢宜芩連芍藥湯又有氣痢狀如蟹渤拘急獨甚宜氣痢丸又有疫痢一方一家之內上下大小傳染相似是疫毒痢也當察運氣之相勝以治之宜人參敗毒散加芍藥至噤口一症食不得入到口即吐尤為危急以胃氣絕或毒氣上衝心肺症兼頭疼心煩手足濕熱不易治也宜倉廩湯而其致噤之故又各有異有因宿食未化噎而不下者宜加山楂麥芽神曲枳實有因邪留胃中脾氣因滯澀者宜加黃連枳殼厚朴有因水飲痰涎積聚者宜加二朮二苓半夏重者加甘遂有因火炎氣衝者宜加芩連枳殼茯苓桔梗橘紅菖蒲等有因胃家虛冷嘔逆者宜加桂薑苓朮有因積膩太多惡氣燻蒸者宜加香連枳樸大黃等有因肝邪乘脾而嘔吐者宜加香連白芍吳萸青皮陳皮各以所因治之仲景用參連石菖粳米煎湯細呷大妙又有休息痢所謂屢止屢發久而不愈者或因補澀太早積滯未清宜香連丸加茯苓枳實或因飲食不節宜香連丸加白朮枳殼神曲山楂或因房欲不戒宜補中益氣湯加木香肉果或因虛滑太甚卻無積滯宜粟殼椿白皮人參白朮木香梗米亦各以所因治之又有五色痢所下五色俱有乃脾胃食積及四氣相並或濕毒甚盛故也當先通利宜秘方養藏湯又有毒痢或痧毒內陷致有膿血各藥不效此險症也宜忍冬藤為君地榆丹砂犀角汁佐之至如下後痢已減便久而不能全愈此由虛也然不可驟用澀藥恐因澀而腸胃不利反作痛宜白芍茯苓木香甘草升麻陳皮或應用澀藥須倍加砂仁陳皮和之香參丸亦可久痢已成壞病變態百出當勿拘脈症概用補益以治之宜參附香砂芪朮亦或得生久痢變成痛風皆調攝失宜之故宜補中益氣湯加羌獨虎骨松節乳香黃柏蒼朮桃仁總之痢之為患艱澀難出者急與疏通滑潤易出者酌為兜澀然或疏通而誤用巴豆牽牛等味以致洞泄腸開而斃或兜澀而誤投訶子粟殼亞芙蓉肉豆蔻等味以致便閉腹脹或濕熱上攻肢節腫脹拘攣作痛而死罪皆由醫者之妄耳可不慎乎哉脈法仲景曰下痢脈微弱數者為欲目前雖發熱不死下痢脈大者為未止下痢日十餘行脈反實者死脈經曰腸澼下膿血脈沉小留連者生數疾且大有熱者死脈訣曰下痢微小卻為生脈大而浮洪卻無差日又曰無積不痢脈宜滑大浮弦急死沉細無害丹溪曰見痢身涼脈細者生身熱脈大者死辨便色入門曰熱痢紫黑色寒痢白如鴨溏濕痢下如黑豆汁風痢純下清水氣痢狀如蟹沫積痢色黃或如魚腦虛痢白如鼻涕凍膠蠱疰痢黑如雞肝又曰血寒則凝痢色必紫黑成塊或雜膿血說膿為陳積血為新積也痢疾原委醫鑑曰滯下之症內經所載有血溢血泄血便泄下古方則有消膿血及泄下近世並呼為痢疾名雖不同其實一也痢疾宜從六淫例治繆仲淳曰滯下者俗呼為痢疾皆由暑濕與飲食之積滯膠固而成其症類多裡急後重數登圊而不便或發熱或口渴或惡心不思食何莫非暑之標症也必用六一散黃連芍藥為主而後隨其所苦為之增損傷氣分則調氣益氣傷血分則行血和血然未有不先治暑而可獲者矣治病必求其本其斯之謂歟痢疾四大忌倪涵初曰痢為險惡之症生死所關不惟時醫治之失宜而古今治法乾家多不得其道是以不能速收全效今立方何以為奇倪氏三方附後不泥成法故奇也立論何以為妙即此四大忌論不膠成說故妙也然其藥品又不外乎常用之味有識者切不可更張勿為庸醫所誤遵而用之百試百效者也又曰古今治痢皆云熱則清之寒則溫之初起盛熱則下之有表症則汗之小便赤澀則分利之此五者舉世信用如規矩準繩之不可易予謂惟清熱一法無忌餘則犯四大忌不可用也何謂四大忌一曰忌溫補痢之為病由於濕熱蘊積膠滯於腸胃中而發宜清邪熱導滯氣行瘀血而其病即去若用參朮等溫補之藥則熱愈盛氣愈滯而血亦凝久之正氣虛邪氣盛不可療矣此投溫補之劑為禍最烈也二曰忌大下痢因邪熱膠滯腸胃而成與溝渠壅塞相似惟用磨刮疏通則愈若用承氣湯大下之譬如欲清壅塞之渠而注狂瀾之水壅塞必不能清無不岸崩堤塌矣治痢而大下之膠滯必不可去徒傷胃氣損元氣而已正氣傷損邪氣不可除壯蓄猶可弱者危矣鰲按此條之論應為凡治痢而必用大下者戒固不可不遵若邪積滯壅遏太甚三焦不能宣通飲食不能容納並有氣閉不得升降者痢下雖多終不能一時通而正氣為邪氣遏塞日久亦不免傷殘如此等症非用大黃等推盪之亦未易奏效總在臨時酌劑不可固執耳但即用下藥亦催大黃一味為無弊不得已佐以元明粉亦可其餘如牽牛巴豆等慎勿輕投也三曰忌發汗痢有頭痛目眩身發寒熱者此非外感乃內毒燻蒸自內達外雖有表症實非表邪也若發汗則正氣已耗邪氣益肆且風劑燥熱愈助熱邪表虛於外邪熾於內鮮不斃矣四曰忌分利利小便者治水瀉之良法也以之治痢則大乖矣痢因邪熱膠滯津液活澀而成若用五苓等劑分利其水則津液愈活而滯澀更甚遂至纏綿不已則分利之為害也若清熱導滯則痢自愈而小便自清又安用分利為哉鰲按此誠百試百效之良法餘於此一症素畏其險惡用心調治經今二十餘年百試百驗既而身自患之試驗益精然後能破諸家之迷障而為奇妙之方論是用述其顛末以拯人之疾苦而悉登諸壽域也八痢危症入門曰一冷痢白積二熱痢赤積三冷熱不調積下赤白四疳痢黃白積或見五色五驚痢青積不臭六休息痢屎黑如魚腸七膿痢腹脹肛痛便臭八蠱疰痢下紫黑血如豬肝總以小駐車丸真人養臟湯治之白痢變症直指曰凡泄利無已變作白膿點滴而下用溫脾藥不愈法當溫腎說腎主骨髓白膿者骨髓之異名也其症面色微黑骨力羸弱的見腎虛當為用破故紙當歸木香肉桂乾薑之屬治痢用藥大法入門曰色黑大黃色紫地榆色紅黃芩色淡生薑色白肉桂色黃山楂痛甚木香山梔鰲按生薑肉桂二味雖痢色淡白亦當斟酌用之未可遽定為金針也痢疾吉凶辨脈經曰下痢有發熱而渴脈弱者自愈下痢脈數有微熱汗出今日愈內經曰下痢如魚腦髓者半生半死身熱脈大者半生半死下痢如塵腐色者死下純血者死忡景曰下痢手足厥冷無脈者灸之灸之不溫脈不還反微喘者死下痢脈絕手足冷晬時脈還手足溫者生脈不還者死入門曰下痢譫語直視及厥躁不得眠汗不止無脈者死得效曰下痢身涼能食小便通易愈身熱多汗渴甚小便不利手足厥冷灸不溫兼微喘不食者死永類鈐方曰痢不治症脈大身熱鴨屎發渴咳逆五色紅水噤口唇紅手足冷氣喘皆是也痢後煩渴欲飲為心絕小便絕不通為胃絕又日下痢小便不通或絕無者此毒氣並歸一臟胃乾者必死省翁曰小兒之痢重傷胃氣全不飲食名曰噤口肛門寬大深黑可畏腹肚疼痛裡急後重鮮血點滴名曰刮腸日夜頻並飲食直過名曰滑腸皆為惡候又曰小兒痢谷道不閉黃汁長流者不治治痢方四十二導氣湯調氣益氣大黃黃連木香江枳殼檳榔黃芩當歸白芍異央散又人參白朮茯苓甘草陳皮四七湯又茯苓半夏厚朴蘇葉薑木香化滯湯又當歸柴胡木香陳皮草蔻仁香附甘草紅花半夏胸滿加枳殼桔梗腹脹加厚朴枳實小腹痛甚加青皮檳榔熱加山梔氣痛加烏藥怒倍柴胡阿膠四物湯和血補血阿膠川芎當歸白芍藥地黃四物地揄湯又川芎當歸白芍地榆胃苓湯又蒼朮厚朴陳皮甘草白茯苓豬苓白朮澤瀉肉桂香砂枳朮丸又木香砂仁枳殼白朮保和丸又山楂神曲半夏陳皮萊菔子麥芽黃連茯苓連翹小駐車丸赤白痢黃連三兩阿膠一兩半一當歸一兩乾薑五錢醋糊丸米湯下四五十丸大承氣湯氣滯大黃芒硝厚朴枳實小承氣湯又生大黃厚朴枳實茹苓湯祛暑香茹黃連厚樸扁豆茯苓豬苓白朮澤瀉甘草勝濕湯除濕蒼朮羌活防風甘草黃柏黃連豬苓澤瀉蘇子降氣湯氣滯蘇子半夏前胡炙草陳皮當歸沉香木香調氣湯脹喘木香藿香砂仁蔻仁甘草歸脾湯補中人參黃芪當歸白朮茯神棗仁炙草桂圓遠志木香薑棗六君子湯又人參白朮茯苓甘草廣橘皮半夏香茹飲暑濕香茹厚朴扁豆甘草五苓散又茯苓豬苓澤瀉白朮肉桂藿香正氣散又藿香紫蘇白芷茯苓大腹皮厚朴白朮半夏陳皮桔梗甘草理中湯氣脫虛寒房欲人參白朮炮薑甘草補中益氣湯又人參黃芪白朮歸身炙甘草陳皮升麻柴胡真人養臟湯虛滑人參訶子白朮白芍當歸木香肉桂甘草肉果粟殼建中湯肺鬱白芍桂枝甘草飴糖薑棗蒼朮地揄湯脾濕蒼朮地榆鬱金散熱毒鬱金槐花甘草食前豉湯下犀角丸心熱犀角朱砂各二錢牛黃人參各三錢丸如麻子大燈心龍眼湯下二錢倉廩湯噤口風痢人參枳殼茯苓炙甘草前胡川芎羌活獨活桂枝柴胡加薑陳米香連丸總治黃連吳萸炒去吳萸木香等分醋糊丸香參丸久痢木香四兩苦參酒炒六兩甘草一斤熬膏丸每服三錢白痢薑湯下赤痢甘草湯下噤口痢砂仁蓮肉湯下水瀉豬苓澤瀉湯下此方必痢久方可用早服不得大黃湯膿血痢大黃一兩切好酒二盞浸半日煎一盞半去渣分二次頓服以利為度此方用酒煎者欲上至顛頂外徹皮毛也芍藥湯又白芍二錢黃連黃芩歸尾各一錢大黃七分木香檳榔甘草各五分桃仁五粒去皮尖行血則便膿愈調氣則後重除此方是也蒼朮防風湯風痢蒼朮防風麻黃生薑露風湯又杏仁七粒樗根皮掌大一塊烏梅一個草果一個石榴皮半個青皮二個甘草一寸薑三片煎好去渣露一宿次早空心溫服黃連補腸湯寒痢黃連四錢赤苓川芎各三錢石榴皮地榆各五錢伏龍肝二錢銼作末每服八錢煎服自效加味除濕湯濕痢半夏厚朴蒼朮各一錢二分廣藿香陳皮赤苓各七分木香肉桂甘草各五分加薑三棗二芩連芍藥湯熱痢白芍二錢黃芩黃連廣木香枳殼各一錢半陳皮一錢炙甘草三分氣痢丸氣痢訶子皮陳皮厚朴各五錢蜜丸火湯下三十丸羚羊角丸蠱疰痢黃連二兩羚羊角黃柏各一兩五錢茯苓一兩蜜丸茶下茜根丸又茜根犀角丹皮當歸黑地榆黃連枳殼白芍等分醋糊丸秘方養臟湯五色痢栗殼一錢半陳皮枳殼黃連木香烏梅厚朴杏仁炙草棗二枚黑豆三十粒附載倪涵初治痢三方初起第一方川連一錢二分黃芩白芍查肉各一錢二分枳殼厚朴檳榔青皮各八分當歸地榆甘草各五分紅花酒炒三分桃仁一錢去皮尖研如粉木香二分水二碗煎一碗空心服渣再煎服此方不拘紅白噤口裡急後重身熱頭痛皆可服如單白者去地榆桃仁加橘紅四分木香三分滯澀甚者加灑炒大黃二錢服一二劑仍去之若用一劑滯澀已去不必用第二劑用大黃於壯盛之人亦不可拘二錢之數此方用之於痢起三五日神效用之於旬亦效惟十日半月外則當加減矣另詳於左加減第二方川連酒炒六分生用四分黃芩酒炒六分生用四分白芍酒炒六分生用四分山楂一錢桃仁六分當歸五分廣橘紅青皮檳榔地榆各四分甘草炙三分生用二分紅花三分木香二分煎服法照前如延至月餘脾胃弱而虛滑者法當補理其方另具於下補理第三方川連黃芩各酒炒六分白芍酒炒四分廣皮六分白朮土炒當歸人參炙甘草各五分煎服法照前以上三方如婦人有孕去桃仁紅花檳榔以上三方隨用隨效其有不效者必初時服參朮補劑太早補塞邪氣在內久而正氣已虛邪氣益盛纏延不止欲補而澀之則助邪欲清而疏之則愈滑遂至不可救藥雖有奇方無如之何則初起即投溫補殺之也附載繆仲淳治痢諸法及諸藥要品腹痛宜和黃連四錢白芍三錢炙甘草一錢半黃柏一錢升麻七分煎服胃弱宜和前方去黃柏加人參三錢橘紅二錢蓮子四十粒裡急宜解前方加當歸二錢後重宜除前方加枳殼檳榔各一錢半木香汁七匙口渴小便赤澀短少或不利宜利前方加枳殼檳榔滑石各一錢半身重宜除濕茯苓澤瀉脈弦宜去風秦艽防風風邪內閉宜汗麻黃白芷葛根身冷自汗宜溫附子乾薑赤多宜清山楂紅曲烏梅膿血稠粘宜重藥竭之大黃芒硝白多宜溫吳茱萸鶩溏為利宜溫木香肉桂惡心飲嘔即噤口痢宜清胃人參扁豆白芍以綠色升麻六七分佐之久痢不止宜斂人參三錢茯苓二錢砂仁一錢五分肉果煨一錢
