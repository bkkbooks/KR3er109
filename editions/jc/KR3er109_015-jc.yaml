  - {type: 'tls:div-start', offset: 4258, content: '', id: KR3er109_jc_015-d17.d2d6, level: 3, head_text: 暑瀉專受暑而成瀉利病也其原有新有久新者暑毒入於口齒傷於腸胃}
  - {type: 'tls:head', offset: 4258, content: '', id: KR3er109_jc_015-d17.d2.d6.h1s1}
