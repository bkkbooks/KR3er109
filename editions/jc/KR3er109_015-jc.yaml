  - {type: 'tls:div-start', offset: 3495, content: '', id: KR3er109_jc_015-d17.d2d4, level: 3, head_text: 伏暑症暑久伏病也說人受暑邪當時即發謂之暑病}
  - {type: 'tls:head', offset: 3495, content: '', id: KR3er109_jc_015-d17.d2.d4.h1s1}
