body:
  text: 卷九遺泄源流遺泄腎虛有火病也腎元虛虛火流行以致精海脫滑遺於夜而不遺於晝者晝陽夜陰惟陰虛故遺於陰分也晝亦有遺者陽亦虛也求其所屬則由心肝腎之火相挾而成說心藏神肝藏魂腎藏精夢中所主之心即心之神也夢中所見之形即肝之魂也夢中所泄之精即腎之精也要之心為君肝腎為相未有火動而相火不隨之者故寐時神遊於外欲為雲雨則魂化為形從而行焉精亦不容不泄矣治法當先治其心火而後及其餘宜黃連清心飲飲茯神湯加減此遺泄之大旨也而其實五臟皆能致病五臟所致之病亦各有異如心病而遺必血脈空虛本縱不收肺病而遺必皮革毛焦喘急不利脾病而遺必色黃內消四肢倦怠腎病而遺必色黑髓空肝病而遺必色青筋痿各有所見之症參以六脈自然無誤至於病之所因更可歷舉有因思想無窮神氣浮游者宜朱砂龍骨磁石鎮之有因思久成痰迷於心竅者宜豬苓丸有因思想傷陰者宜大鳳髓丹有因思想傷陽者宜鹿茸益精丸有陰陽俱虛者宜茯神遠志丸有因用心過度者宜遠志蓮肉龍齒茯神山藥有因思欲不遂者宜妙香散有因色慾過度下元虛憊滑泄不禁者宜六味丸加鹿茸牡蠣肉蓯蓉龍齒五味菟絲子有因壯年盛滿流溢者宜生地黃柏知母蓮子黃連茯神石菖遠志有因脾胃濕熱氣化不清而分注膀胱者亦混濁稠厚陰火一動精隨而出此則不待夢而自遺者宜二陳湯加二朮知柏有因飲酒厚味太過痰火為殃者宜二陳湯加二朮升柴有因經絡熱而得之至夜必脊心熱而遺者宜豬苓丸清心飲有因真有鬼魅相感者由正氣本虛欲心妄動之故脈息必乍大乍小乍有乍無或兩手如出兩人或寸尺各為一等或綿綿無度數而顏色不變宜人參茯神遠志以養其正生地當歸棗仁以安其神朱砂雄黃沉香麝香安息香鬼箭羽虎頭骨以辟其邪移房於向陽處令多人伴之此為正治以上種種所因既各不同其為遺為泄亦異或小便後出多不可禁或不小便而自出或莖中癢痛常如欲小便狀或夢與女交皆當分別施治大約陽虛者急補氣宜增損藥令湯鹿茸大補湯陰者急益精宜大補陰丸大造丸補天大造丸陽強者急泄火而已宜補陰瀉火湯滋陰降火湯至仲景治手足煩熱咽乾口燥或悸衄而遺者此陽上升而不降陰獨居內而為夢失用小建中湯和之此世俗所不易知也總而言之大凡精滑易泄宜澀之澀之無央當瀉心火清理之而又無央宜以補中益氣為主兼用升柴羌獨以升舉之甘草棗肉以緩之山萸五味烏梅棗仁以收之脈法脈訣曰遺精白濁當驗於尺結芤動緊二症之的正傳曰兩尺洪數必便濁遺精遺泄屬心丹溪曰主閉藏者腎主疏泄者肝二臟皆有相火而其係上屬於心心君火也為物感則動心動則火亦動動則精自走雖不交會亦暗流而疏泄矣直指曰精之主宰在心精之藏製在腎心腎氣虛不能管攝因小便而出者曰尿精因見聞而出者曰漏精入門曰初因君火不寧久則相火擅權精元一於走而不固甚則夜失連連日亦滑流不已黃連清心飲治之千金曰邪客於心神不守舍故心有所感夢而後泄也遺泄屬鬱綱目曰夢遺屬鬱滯者居大半若但用澀劑固脫必愈澀而愈鬱其病反甚必先以神芎丸或沉香和中丸大下之然後以加減八味湯吞滋腎丸百丸自癒或以導赤散煎服之亦可遺泄導引保生秘要曰用出頭葫蘆一個口上安帶得法套行具而如意睡法如陽物每夜覺起時勿失其候急起暖衣提運三十六足數運胸散四肢照此勤心行之永無患矣運央保生秘要曰常要守靜存心念臍勿令弛放後意想一條水下膀胱絛尾閭分行二路上兩腎分左右運收臍輪臨臥時摩擦足心及腎哄穴曲一足而側臥精自固矣治遺泄方二十三茯神湯總治茯神遠志棗仁人參菖蒲茯苓黃連生地當歸甘草蓮子豬苓丸痰迷半夏一兩豬苓一兩同炒黃色而退去火氣單取半夏糊丸候乾另用豬苓一兩同炒微裂鹽湯下大鳳髓丹傷陰川柏二兩砂仁一兩炙草五錢半夏豬苓茯苓蓮鬚益智仁各二錢半芡實糊丸鹿茸益精丸傷陽鹿茸蓯蓉桑螵蛸巴戟肉杜仲菟絲子益智仁禹餘糧川楝子當歸各二兩韭子補骨脂山萸赤石脂龍骨各五錢乳香酒煮糯米糊丸食前茯苓湯下五七十丸茯苓遠志丸兩虛人參龍齒茯神遠志菖蒲知母黃柏妙香散思欲山藥茯神遠志黃耆各一兩人參炙草桔梗各五錢木香二錢半朱砂三錢麝香一錢熔黃蠟四兩茯苓四兩作塊同煎六味丸色欲熟地山藥山萸丹皮茯苓澤瀉二陳湯濕痰陳皮半夏茯苓甘草小建中湯仲景法白芍二錢桂枝生薑甘草飴糖各一錢補中益氣湯總治人參黃耆當歸白朮陳皮甘草升麻柴胡黃連清心飲精滑黃連生地甘草當歸人參茯神棗仁遠志蓮子神芎丸鬱滯沉香和中丸又黑牽牛頭末二兩三錢滑石二兩大黃一兩二錢木香黃岑檳榔枳殼青礞石青皮陳皮各五錢沉香二錢水丸茶清下加減八味湯又熟地二錢山萸山藥各一錢酒澤瀉茯苓丹皮各八分五味子錢半肉桂五分此方用蜜丸名加減八味丸滋腎丸又黃柏知母並酒炒各一兩肉桂五分水丸箜心下一名泄腎丸導赤散又生地木通甘草各一錢竹葉七片增損樂令湯陽虛半夏錢半人參黃耆陳皮茯苓當歸肉桂細辛前胡麥冬白芍甘草各七分附子熟地各三分半遠志二分薑三棗二鹿茸大補湯又肉蓯蓉杜仲各一錢白芍白朮附子肉桂人參五味子金石斛半夏各七分鹿茸黃黃茯苓當歸熟地各五分甘草二分半薑三棗二大補陰丸陰虛酒黃柏酒知母各四兩熟地龜板各六兩豬脊髓和煉蜜丸此方乃降陰火滋腎水之要藥大造丸又紫河邊一具如法洗淨盛竹器長流水中浸一刻以回生氣盛小瓦盆於木甑或瓦甑內蒸極熟如糊先傾取自然汁將河車於石臼中搗千下同汁和勻生地四兩龜板杜仲天冬黃柏各兩半牛膝麥冬歸身各兩二錢人參一兩五味子五錢河車泥加米糊丸鹽酒溫酒任下日再服補天大造丸又河車一具照前法製熟地酒當歸酒茴香酒黃柏白朮各二兩生地酒炒酒牛膝天冬麥冬杜仲各兩半五味子杞子各七錢陳皮乾薑各二錢側柏葉向東枝者焙二兩河車泥丸米飲溫酒任下百丸日再服熬按前大造丸能治六脈虛微血氣衰弱乃滋陰補陽之聖藥也此補天大造丸專能壯元陽滋腎水有天地交泰之妙如房室過度五必煩熱者服之神效雖至虛癆亦宜久久服之並能延年益壽補陰瀉火湯陽強白芍白朮當歸各一錢三分熟地川芎蜜知母天冬各一錢蜜炒黃柏陳皮各七分酒生地炙草各五分炒乾薑三分生薑三片滋陰降火湯又白芍錢三分當歸錢二分熟地黃麥冬白朮各一錢酒生地八分陳皮七分鹽黃柏鹽知母炙甘草各五分萎三片棗二枚五淋二濁源流胞痺尿血白淫五淋二濁皆腎病也淋者滴瀝澀痛濁者小便混濁而不清凡人腎有二竅一出溺一出精淋病則由溺竅濁病則由精竅二者絕不可以相蒙近醫不能分辨淋病以濁藥治之濁病以淋藥治之宜其難愈古方書列五淋之名曰熱曰氣曰虛曰膏曰沙石以揭其概宋元後又分石勞血氣膏冷六症至為詳盡而究其原則皆由陰陽乖舛清濁相乾或膀胱畜熱由水道瘀塞所以欲通不通滴瀝澀痛為溺竅病也丹溪以赤濁屬血白濁屬氣或又以赤為心虛有熱由思慮而得白為腎虛有寒因嗜欲而得皆非定論說皆出於精竅其白者為敗精流溢其赤則由虛滑精化不及赤末變白此虛之極也玆分列而款舉之淋病之原大約由腎虛膀胱有濕熱說膀胱與腎為表裡俱主水水入小腸與胞行於陰為溲便若腎虛而膀胱有濕熱則因腎虛致小便澀數因膀胱濕熱致小便澀數而且澀則淋瀝不宣小腹弦急痛引於臍此石勞血氣膏冷所由成也說石淋者膀胱畜熱積成如湯在瓶中日久結成白鹼也治須清積熱滌去沙石則水道自利宜如聖散神效琥珀散勞淋者多思慮負重遠行勞於脾也宜補中益氣湯與五苓散分進專由思慮者亦傷脾宜歸脾湯若強力入房施泄無庋勞於腎也宜生地黃丸黃耆湯亦有縱慾強留不泄淫精滲下而作淋者宜益元固真湯血淋者小腹硬莖中痛欲死血瘀也以一味牛膝煎膏大妙但虛人恐損胃耳宜四物湯加桃仁牛膝通草紅花丹皮而亦有因血虛者應以養榮為主宜六味丸加側柏車前或八珍湯送益元散如血色鮮紅脈數而有力心與小腸實熱也宜柿蒂湯血色黑黯面色活白尺脈沉遲下元虛冷也宜金匱腎氣丸亦有血熱過極反兼水化而色黑者非冷也宜赤豆綠豆麻仁乾柿黃連側柏竹葉葛根藕汁黃柏生地丹皮當以脈症辨之氣淋者氣實則滯而不通臍下妨悶而痛也宜沉香散瞿麥湯或由氣虛急須補益宜八珍湯倍茯苓加牛膝杜仲膏淋者似淋非淋小便如米泔如鼻涕此精溺俱出精塞溺道故意欲出不快而痛也宜鹿角霜丸沉香丸大天沉香散海金沙散冷淋者必先寒戰小便澀數竅中腫痛說冷氣與正氣交爭冷氣勝則寒戰成淋正氣勝則寒戰解而得便也大約多由腎虛宜金匱腎氣丸肉蓯蓉丸沙淋者莖中有沙澀痛尿卒不易出有細沙沉在缸底膀胱陰火煎熬津液凝結也輕則為沙重則為石宜二補丸以上諸證治法悉本古人最為不易此外又有過服金入房太甚敗精強閉流入胞中而成淋病者宜海金沙散又有濕痰日久汪滲而成淋病者宜滲濕湯加減又有淋而小腹脹甚者宜瀉腎湯又有婦人產後成諸淋者宜白茅湯不論亭石淋皆治皆當分治另有一症名胞痺風寒濕邪客胞中氣不能化出故胞滿而水道不通小腹膀胱皆痛且痛而澀於小便也詳在膀胱篇濁病之原大抵由精敗而腐者居半由濕熱流注者居半其症莖中皆如刀割火灼而溺自清利惟竅端時有穢物如米泔如粉糊如瘡膿如目眵淋瀝不斷與便溺毫不相混故曰是精病非溺病也而臟腑所主則各有異大約血虛而熱甚者為赤濁此屬火心與小腸主病氣虛而熱微者為白濁此屬金肺與大腸主病其致濁之由有因思慮過度心虛有熱者宜地骨皮湯金蓮丸辰砂妙香散有由心經伏暑者宜四苓散加香茹麥冬人參蓮肉以上皆赤濁症所由有因嗜慾過度腎虛有寒者宜清心蓮子飲飲有因脾精不斂者宜蒼朮難名丹有因混痰流注者蒼朮二陳湯有因腎虛下隱者宜補中益氣湯有小便如常少頃即澄濁物或如米泔色者宜萆薢分清飲有稠粘如膏莖中澀痛為精塞竅道而非熱淋者宜加味清心飲有莖中不痛脈來無力為下元虛冷者宜鹿茸補澀丸有莖中大痛便赤口渴脈來滑數者宜二苓清利飲有挾寒者小便必清白宜萆薢分清飲內補鹿茸丸有挾熱者便必黃赤宜清心蓮子飲香苓散以上皆白濁症所因有赤白濁小腹痛不可忍者當作寒治宜東垣酒煮當歸丸脈法脈訣曰遺精白濁當驗於尺結芤動緊二症之的又曰便血則芤數則赤黃實脈癃閉熱在膀胱正傳曰兩尺洪為數必便濁遺精脈經曰淋脈盛大而實者生虛細而澀者死醫鑑曰淋病之脈細數何妨少陰微者氣閉膀胱女人見之陰中生瘡大實易愈細澀則亡淋病原由症治丹溪曰淋症所感不一或由房勞陰虛火動也或由忿怒氣動火生也或由醇酒厚味釀成濕熱也積熱既久熱結下焦所以淋瀝作痛初則熱淋血淋久則煎熬水液稠濁如膏如沙如石也夫散熱利小便只治熱淋血淋而已其膏沙石淋必須開鬱行氣破血滋陰方可也古方用琥珀鬱金開鬱也木香青皮行氣也蒲黃牛膝破血也黃柏生地滋陰也東垣治小腹痛用黃柏青皮夫青皮疏肝黃柏滋腎小腹乃肝腎部位也濁病原由症治得效曰先正有言夏則土燥而水濁冬則土堅而水清此其理也水火既濟則土自堅其流清矣小便白濁說脾有虛熱而腎不足土邪於水也入門曰赤白濁皆因脾胃濕熱中焦不清濁氣滲入膀胱也丹溪曰小便濁主濕熱有痰有虛赤屬血白屬氣與痢疾帶下同治又曰凡便濁治法概宜燥濕降火兼升舉之如陳湯加二朮升柴白芍醫旨曰赤白濁肥人多混痰瘦又多虛火又曰凡便濁必兼服加減珍珠粉丸回春曰赤白濁其狀漩面如油光彩不定漩腳澄下凝如膏糊或如米泔赤膿皆濕熱所傷也淋濁導引保生秘要曰於腎哄照海氣海掐之九九擦亦九九兼用後央運央保生秘要曰用雙手抱兩膝吹吸念臍下縧尾閭升氣降回吸而咽之尿血溺竅病也其原由於腎虛非若血淋之由於濕熱其分辨處則以痛不痛為斷說痛則血淋不痛則為尿血也而以尿血亦為有火者非宜太極丸無比山藥元尿血分辨直指曰大風小腸有氣則小便脹小腸有血則小便澀小腸有熱則小便痛痛者血淋不痛者尿血白淫熱鬱病也一名蠱內經曰脾傳之腎病名曰疝瘕小腹冤熱而痛出白一名曰蠱注云腎脈貫脊屬腎絡膀胱故小腹冤熱而痛溲出白液也據此則脾受風邪而傳於腎風能煽熱故邪熱內結真精不守而白物游淫而出此所以名白淫又邪熱既結則火能消爍脂肉如蠶之蝕物然此所以又名蠱病白淫也經又曰想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫據此則為淫慾過度腎傷所致即子和所謂莖中作痛痛極則癢或陰莖挺縱不收或出白物如精隨溲而下得之於房勞及邪術者是也治以降心火為要宜半苓丸清心蓮子飲此外又有精傷白濁亦名白度說由房失節以致傷精流出一似白濁宜清心蓮子飲甚且小便中推出髓條也宜治小便白濁流出髓條方凡諸白淫總治宜金箔丸白龍丸非皆精竅病乎故附於此自淫所屬戴人曰遺尿閉癃陰痿脬痺精滑白淫皆男子之疝也血涸不月腰膝上熱足躄嗌乾閉癃小腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕也熬按尿血淋病之屬白淫溺病之屬不得相混治淋病方二十六神效琥珀散石淋琥珀桂心滑石大黃膩粉磁石木通木香冬葵子等分為末每二錢燈心蔥白湯下如聖散又馬蘭花白茅根甜葶藶車前子麥冬檀香連翹等分渴加黃岑補中益氣湯勞淋人參黃耆歸身白朮升麻柴胡陳皮甘草五苓散又肉桂心豬苓茯苓白朮澤瀉歸脾湯又圓眼肉黃耆白朮棗仁茯神各一兩木香五錢炙草二錢半咀片每用五錢煎加薑棗生地黃丸又生地黃耆各兩半防風鹿茸茯神遠志瓜蔞仁黃岑各一兩人參兩二錢半當歸五錢赤芍蒲黃戎鹽各七錢半炙草七錢車前子滑石末各二兩蜜丸益元固真湯又甘草梢二錢山藥澤瀉各錢半人參茯苓蓮鬚巴戟升麻益智仁酒黃柏各一錢黃耆湯又人參黃耆茯苓磁石旱蓮草五味子滑石末各一兩桑皮七錢半枳殼黃岑各五錢四物湯血淋川芎當歸白芍地黃六味丸又地黃山藥山萸丹皮澤瀉茯苓八珍湯又人參茯苓白朮甘草川芎當歸白芍生地益元散又甘草滑石柿蒂湯又柿蒂黃柏黃連生地側柏葉丹皮白芍木通茯苓澤瀉金匱腎氣丸冷淋熟地山萸山藥丹皮茯苓澤瀉附子肉桂牛膝車前子沉香散氣淋沉香石葦滑石當歸瞿麥赤芍白朮甘草冬葵子王不留行瞿麥湯又瞿麥穗木通大黃黃連桔梗當歸枳殼羌活肉桂射乾腹皮延胡索牽牛子鹿角霜丸膏淋鹿角霜茯苓秋石糊丸大沉香散又沉香陳皮黃耆榆白皮韭子瞿麥滑石黃岑甘草沉香丸又肉蓯蓉沉香滑石荊芥黃耆磁石海金沙丸又海金沙滑石各一兩甘草二錢半每末二錢麥冬燈心湯下肉蓯蓉丸冷淋肉蓯蓉熟地山藥牛膝金石斛官桂檳榔甘草附子細辛黃耆黃連二神散沙石海金沙七錢半滑石五錢共為末每二錢入蜜少部以木通麥冬車前子湯下琥珀散又琥珀滑石各二錢木通木香鬱金當歸篇蓄各一錢共為末每次三錢竹葉湯下蘆葉湯更妙滲濕湯濕痰蒼朮白朮茯苓豬苓陳皮澤瀉川芎香附厚朴砂仁甘草生薑燈心瀉腎湯脹滿大黃二錢切片水浸一宿磁石錢六分石菖生地各一錢元參細辛各八分芒硝赤苓黃岑各六分甘草四分煎至半入大黃煎好去渣入硝攪勻空心服白茅湯產後白茅根五錢瞿麥茯苓各錢半冬葵子人參各錢二分半蒲黃桃膠滑石各七分甘草五分紫貝二個煅江魚牙四個煅分二帖加薑三片燈心二十莖煎服或為末木通湯下二錢治濁病方十六地骨皮湯心虛熱生地麥冬黃耆山藥五味子地骨皮淡竹葉四苓散伏暑茯苓豬苓白朮澤瀉金蓮丸思慮石蓮肉茯苓龍骨天冬柏子仁麥冬當歸棗仁遠志紫石英乳香龍齒等分蜜丸朱砂為衣辰砂妙香散又山藥茯苓茯神黃耆薑遠志各一兩人參桔梗甘草各五錢朱砂三錢木香二錢半麝香一錢每末二錢蓮肉湯下蒼朮難名丹脾不斂製蒼朮四兩金鈴子茴香各七錢半破故紙川烏茯苓龍骨各一兩酒糊丸朱砂為衣東垣酒煮當歸丸小腹痛清心蓮子飲腎虛寒黃耆麥冬甘草車前子地骨皮蓮肉茯苓人參黃岑遠志菖蒲蒼朮二陳湯濕痰蒼朮白朮茯苓陳皮甘草半夏補中益氣湯腎虛陷人參黃耆歸身白朮陳皮甘草升麻柴胡萆薢分清飲泔濁革薢烏藥菖蒲益智仁入鹽少部一方加茯苓甘草加味清心飲竅塞石蓮茯苓菖蒲人參遠志車前子麥冬白朮益智仁澤瀉甘草有熱加薄荷少部鹿茸補澀丸下虛冷人參黃耆菟絲子桑螵蛸蓮肉茯苓肉桂山藥附子鹿茸桑皮龍骨補骨脂五味子二苓清利飲莖痛生地麥冬茯苓牡蠣澤瀉甘草豬苓黃岑黃柏車前子內補鹿茸丸挾寒鹿茸刺蒺藜肉蓯蓉菟絲子蛇床子桑螵蛸陽起石肉桂心嫩黃耆炮附子紫菀香苓散挾熱茯苓茯神遠志山藥人參黃耆桔梗甘草木香白朮朱砂麝香豬苓澤瀉肉桂加減珍珠粉丸通治黃柏半生半炒蛤粉各三兩滑石二兩樗皮一兩青黛乾薑各五錢炒神麯打糊丸空心酒下五七十丸黃柏降陰火除濕熱蛤粉鹹補腎滑石利竅樗皮大燥濕熱青黛解鬱火乾薑斂肺氣下降生陰血鹽炒微黑用之治尿血諸藥要品及方二總治尿血藥阿膠茅根地黃床子戎鹽蒲黃牛膝人乳蓯蓉胡麻杜仲川斷天冬麥冬五味山萸山藥丹皮車前知母黃柏鱉甲青蒿白芷人參當歸苧根鹿茸荷葉烏梅鬱金香附地榆韭子澤瀉棕灰竹茹琥珀山梔槐花乳香荊刺陳墨側柏葉延胡索菟絲子旱蓮草龍膽草鹿角膠鹿角霜毛鹿角杞子沙苑子柏子仁地骨皮益母草淡豆豉專治小便血條太極丸總治黃柏二兩六錢屬木知母一兩四錢屬水補骨脂二兩八錢屬火胡桃肉一兩二錢屬金砂仁五錢屬土蜜丸空心鹽湯下三五十丸無比山藥丸又五味子六兩肉蓯蓉四兩菟絲子杜仲各三兩山藥二兩赤石脂茯神山萸巴戟牛膝熟地各一兩蜜丸酒或米湯下治白淫諸藥要品及方六房勞過度鹿茸附子官桂紫菀地黃黃耆杞子牛膝杜仲川斷山萸天冬麥冬山藥丹皮知母黃柏車前菟絲子蛇床子刺蒺藜沙苑子桑螵蛸肉蓯蓉陽起石五味子地骨皮思想無窮黃連麥冬茯苓遠志石蓮當歸龍骨棗仁龍齒天冬乳香茯神菟絲子柏子仁紫石英肉蓯蓉丸蠱淫蓯蓉茯苓黃耆澤瀉牡蠣龍骨當歸五味子等分蜜丸酒下半苓丸腎傷半夏一兩破如豆大豬苓末二兩先將一半炒半夏令色黃不令焦出火毒只取半夏為末糊丸候乾更用前豬苓末一半同炒微裂入砂瓶養之空心酒鹽湯任下三五十丸清心蓮子飲精傷黃耆麥冬甘草車前子地骨皮蓮肉茯苓黃岑人參遠志肉菖蒲白濁流出髓條方髓條棗仁白朮人參茯苓茴香補骨脂益智仁牡蠣等分青鹽酒糊丸空心酒或米湯下三十丸金箔丸總治晚蠶蛾炒補骨脂韭子酒浸菟絲子山萸龍骨各一兩蜜丸空心酒下三十丸此方亦治夢泄白龍丸又鹿角霜牡蠣各二兩生龍骨一兩酒糊丸空心酒或鹽湯下三十丸此方不但白淫且能固精壯陽諸厥源流諸厥真元虛病也手足逆冷為厥經曰陽氣衰於下則為寒厥四肢逆冷身冷面青踡臥手指甲青暗腹痛不渴小便自利大便溏完谷不化不省人事脈微遲陰氣衰於下則為熱厥四肢厥逆身熱面赤唇燥口乾舌苦目閉或不閉煩渴小便短澀大便燥結不省人事脈滑數夫寒厥者即陰厥宜急補陽宜理中湯或附桂乾薑吳萸俱可酌用熱厥者即陽厥宜急補陰宜岑連山梔石膏知母童便甚者可用硝黃下之說以人之陰陽無氣皆起於下故少陰之上名為太陽以真陽之主本於陰也太衝之地名曰少陰以真陰之歸根在腎也夫陽氣自而下今衰於下是不下矣是寒獨勝也陰氣自下而上今衰於下者足五指之表為三陽之所起而足下足心又為三陰之所聚足心又少陰腎之湧泉陰氣既衰而陽勝陽乘陰位故熱厥必從足下也故凡人病陰虛者足心必熱也寒厥起於足下又必從五指而上於膝者以陰氣起於五指之裡集於膝下而聚於膝上陽氣衰則陰氣勝陽不勝陰其厥反從陽分而上故必起於五指而上寒至膝然寒非外入而由內生故凡病陽虛者手足必多寒皆自指端始故二厥之成皆以陰虛溯寒厥之由必其人壯秋冬奪於所用既於陰盛時多欲不休以奪腎中精氣則精虛於下其氣取足於上是以下氣上爭下而不上故不能復陽氣於是氣去則陽虛寒氣因而上逆又以精虛無火不能固脾元而氣衰於中中氣不能滲榮其經絡於是陽氣日損陰氣獨存手足為之寒也溯熱厥之由必酒入胃而傷脾陰至陽氣入而精氣竭不能榮其四肢又數醉飽入房使氣聚脾中不得散酒氣谷氣相搏熱盛於中故熱偏於身內熱而溺赤也要此二厥惟傷真元乃有是病後人不明但以手足寒或以腳氣為厥反以此二症謬為中風夫風病多經絡受傷厥病由真精內奪如指厥為風因以風治厥亦大謬矣夫厥逆分陰陽皆內經之精旨餘即詳論之如上而陰陽不從則氣逆而上凡十二經寒熱之厥亦可據經以析其義也經曰太陽之厥腫首頭重足不能行發為眴仆說以太陽根起少陰其氣得陰故下行於足虛則逆上而上盛故腫首頭重逆上則不能下行故不能行而眴仆也又曰陽明之厥癲疾欲走呼腹滿不得臥面赤而熱妄言妄見說以陽明本氣盛血多今氣勝其血則陽邪實而神明亂故癲欲走呼氣盛不行在腹故腹滿胃逆故不得臥陽明脈在面故赤熱神明亂極故妄言見也又曰少陽之厥暴聾頰赤脇痛肺不可以運說以少陽與厥陰並行而起於下故經和而無病今相火上炎而無陰其脈入耳下頰車故聾而腫為火壅也脇痛其部氣逆不和胻不運少陽氣不能及下也又曰太陰之厥腹滿䐜脹後不利不欲食食則嘔不得臥說以陰為陽根陽為陰使三陰不副陽則三陽厥三陽不為陰使則三陰亦厥太陰雖陰盛常秉少陽之氣以為和故無病今太陰獨陰無陽不能下行且逆上脾既不運胃氣亦阻故滿而脹不能行氣於三陰則腎氣亦不效用故不利不食中氣壅也食則嘔氣壅愈逆也不得臥胃不和也又曰少陰之厥口乾溺赤腹滿心痛說以少陰兼水火陰陽二氣若失所涵蓄其氣必偏發而上故少陰恆兼寒熱二厥且又為十二經厥逆之主也今此厥陰虛火厥也本脈循喉嚨絡膀胱故口乾溺赤不為胃關而上行故腹痛不貢精於心而反上乘心故心痛經又言少陰不至者厥不至亦兼水火也又曰厥陰之厥少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內熱說以厥陰本陰絕不絕者為陽生也今虛而為純陰則無氣是以當其部位腫痛而脹純陰結而不舒則下焦氣不化故涇溲不利肝主筋筋無氣故好臥而屈膝脈環陰器故陰縮腫當所過脈不行故胻內熱鬱則熱也又曰手太陰厥逆虛滿而咳善嘔沫說以肺為元氣之主虛則不能治節而氣上逆故咳虛滿者上焦之滿虛而無實也滿則咳矣本脈循中焦胃口逆則精不能散故嘔沫也又曰手少陰厥陰厥逆心痛引喉身熱死不可治二經屬火皆神明之治也其主血脈而俱厥則陰精無以承陽矣陽獨亢則自焚故心痛其係上挾喉故引喉身熱者血脈膹張也心為臟腑之大主逆之故死也又曰手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰說以小腸為心之下流屬帶脈之間其氣逆必使其經俱逆本脈人耳至目內外眦故耳聾泣出從缺盆循頸故項強小腸連嗌屬脊故腰病也又曰手陽明少陽厥逆發喉痺嗌腫痙說以手陽明大腸為胃下流手少陽三焦為胃孔道其氣皆逆必從其經上逆大腸脈上頸貫頰三焦脈出缺盆上項故皆發喉痺嗌腫曰痙者手臂肩背強直也以上十二經之厥亦內經之要旨也然而內經言厥更豈止是哉又曰有厥逆而病在太陰盛在胃頗在肺者太陰脈細如發而身熱如炭頸膺如格人迎躁盛喘息氣逆一日數十溲其為病死不治說以脈如發又多溲必臟氣不足中氣不攝故溲為之變也乃熱留在胃陽明方盛見於人迎身膺則如炭如格此陽不入陰故盛在胃陽不入陰故太陰細微喘息氣逆頗在肺也欲瀉邪則陰虛於裡欲補虛又陽實於外所謂不表不裡陽症陰脈之類也安得不死又曰厥有腹滿暴不知人者說以陰氣盛於上則不守於下而脾腎肝三經之氣不化故腹滿脹陽氣盛於上則陽氣上而邪氣逆逆則陽氣亂而神明失守故不知人也又曰有厥逆而為頭痛數歲不已者說以所犯大寒內至骨髓髓以腦為主故寒逆而至於腦今頭痛齒亦痛是邪之逆於上亦名厥逆也又曰有病膺腫頸痛胸滿腹脹者此厥逆也治之須其氣並而治之說以腫痛脹滿皆在上中二焦此以陰並於陽下逆於上正所謂厥逆也故治之不可灸灸必為喑不可石石必為狂惟以其氣並者以既逆之後必漸通然後隨其盛衰而調之可無偏絕之患也此四條經皆以發明厥逆之餘疾故復列而論之乃後人複標寒熱屍痰氣食暴七厥之名雖其為病不外乳內經之所及然其疑狀療治有不可不備者大約手足寒者為寒厥宜附子理中湯而寒厥又有因氣虛者宜參耆益氣湯又有手足冷表熱裡寒下利清谷食入即吐脈沉者宜四逆湯又有獨指尖冷者則名清厥宜理中湯以上寒厥所統手足獨熱者為熱厥宜火鬱湯而熱厥又有兼游赤者宜升陽散火湯又有便秘者宜大柴胡湯又有譫語身冷遺溺自汗者宜白虎湯又有煩渴躁妄失下而手足冷甚但不過肘或身冷而反見陰象者正為熱極似寒俗工妄謂變成陰症急用熱藥助陽十無一生矣宜白虎湯又有婦人熱入血室因而發厥者宜以童便為君加赤芍生地牛膝丹皮桃仁以上熱厥所統屍厥者由胃犯不正之氣或因吊死登塚飛屍鬼擊致陰氣上盛下部空虛手足冷肌膚起粟頭面青黑錯言妄語不省人事宜蘇合丸藿香正氣散或有身脈不動形體無知狀如死屍者須先用藥令其蘇蘇宜返魂丹灌之然後隨其臟氣以治寒則熱之熱則寒之閉則通之以上屍厥所統若夫痰厥則由寒痰迷心隊道不行故四肢厥冷僵仆卒倒咽作聲口吐沫不省人事氣喘脈弦也宜導痰湯容有暴不知人類於卒中但末卒仆如一切中狀喉中痰如曳鋸者必先用藥探吐其痰宜瓜蒂散然後治之宜清氣化痰丸導痰湯以上痰厥所統氣厥則緣暴怒傷陰四肢冰冷卒然而仆口出冷氣其脈必浮宜蘇子降氣湯且有暴怒氣逆昏暈痰塞牙緊似中風者宜順氣散以上氣厥所統至如暴厥者由於傷血其脈芤先用藥灌醒宜薑汁調蘇合丸然後察脈治之如冷過臂膝唇與指甲青黑者皆不治或遇暴厥可用急治之法宜蒲黃酒以上暴厥所統又如食厥者醉飽後感風寒或著惱而飲食填塞胃氣不行變為異常急猝之症宜和保丸或因酒而得亦名酒厥宜二陳湯加青皮葛根以上食厥所統總之凡治氣食屍痰四厥皆以降痰順氣溫中為要今擬加減之法四厥可治矣其法以茯苓甘草枳殼半夏桔梗陳皮六味為主藥如遇屍厥宜加蒼朮雄黃遠志菖蒲檀香沉香乳香木香等古人以忍冬藤葉一味煎膏治屍厥大妙可採用遇痰厥宜加南星薑汁瓜蔞霜等遇氣厥宜加烏藥木香香附青皮砂仁等遇食厥本宜吐宜加厚朴枳實山查麥芽蒼朮等依此治之自無不效然此寒熱屍痰氣食暴七厥之外更有氣虛厥有所勞傷氣弱不能運行之故也宜補中益氣湯更有血虛厥或吐溺崩漏產後所致也宜芎歸養榮湯更有風厥手足搐搦是也宜小續命湯更有骨厥骨活爪痛者是也宜四七湯更有骭厥身立如椽者是也宜四七湯更有痺厥即腳氣頑麻腫痛是也初發時必身痛肢節腫痛宜羌活導滯湯後用當歸拈痛湯更有蛔厥由於胃寒蛔蟲攻胃故手足厥冷而必吐蛔也宜安蛔散互詳諸蟲門厥之為類不一如是獨熱厥一症竟變成痿者或由腎肝虛陰血失養而又房慾不絕以致自踝以下常覺熱痛宜五獸三匱丸養血壯筋健步丸或由醇酒膏梁滋火於內逼陰於外致相火熾而乘陰位兩腳痿弱甚且臍膝尻陰皆冷精滑不固法當瀉相火而復真陰使陰復其位則病自痊矣宜滋腎丸神龜滋陰丸若誤投熱劑反瀉其陰而助其陽立斃之道也此則厥症之變出者業師孫慶曾論厥之說曰厥症有數種總在肝風痰火龍雷之火上衝作厥相火上衝陽明氣塞作厥膽怯心虛痰火氣閉作厥元虛氣逆作厥風邪寒閉作厥古人又有屍厥痰厥風厥寒厥痙痓癇角弓反張皆似厥極驚人極難辨識得真勿驚忙候脈息面色看清動作厥狀而治之大指掐拳內凶掐拳外輕脈大浮洪有力易醒脈細沉伏數急不連貫凶面青環口青唇白鼻青孔黑人中吊危此論極為秘要故書於此脈法內經曰脾脈緩甚為痿厥又曰脈至如喘名曰暴厥暴厥者不知與人言又曰厥逆連臟則死連經則生注云連臟死者神去故也丹溪曰痰病得澀脈必費調理說痰膠固脈道阻塞必至卒厥也仲景曰寸口脈沉大而滑沉則為實滑則為氣實氣相搏血氣入臟即死人腑即愈此為卒厥不知人何謂也師曰唇青身冷為入臟即死身溫和汗自出為入腑即愈脈經曰屍厥呼之不應脈伏者死脈大反小者死又曰卒厥腹大四肢滿脈大而緩者生緊而浮者死緊細而微者亦生熬按渚厥之脈大約沉微不數是寒沉伏而數是熱細是氣虛芤大是血虛浮是風浮數而滑是痰脈至如喘是氣沉滑緊疾是食浮澀而緊是痺洪大而渭是蛔察其脈合其症厥病雖繁寧有遁形乎諸厥原由症治內經曰腎虛則清厥意不樂又曰下虛則厥又曰邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若屍名曰屍厥以竹管吹其兩耳即蘇綱目曰厥論寒熱皆由腎之精氣內竭而然也又曰王太僕云厥者氣上逆也世謬傳為腳氣內經謂寒厥者手足寒也熱厥者手足熱也說陽衰於下則為寒厥陰衰於下則為熱厥陰陽之氣不相接續則為厥仲景曰屍厥者脈動而無氣氣閉不通故靜如死也還魂湯主之又曰卒然不省人事全如死屍但氣不絕脈動如故或脈無倫次乍大乍小或微細不見而心胸暖者是也入門曰厥症多以不勝乘其所勝如腎移寒於脾則為寒厥心移熱於腎則為熱厥寒厥宜十全大補湯加附子或當歸四逆湯熱厥宜升陽散火湯火鬱湯又曰屍厥之症卒死脈猶動四肢逆冷腹中氣走如雷鳴聽其耳中如微語聲者是也急用硫黃散朱犀散如無用薑汁半盞酒一盞煎百沸灌下又曰凡屍厥鬱冒卒死卒中之類皆當發表仲景所謂鬱冒欲解必大汗出是也又曰凡卒厥者口張目開手撒遺尿為虛宜補氣目閉口噤手拳為實宜發表遺錄曰風暴厥不出一時可救之雖氣閉絕四肢冷若心腹溫鼻微溫目中神彩不轉口中無涎沫卵不縮者皆可活也備急丸治之靈樞曰清氣在陰濁氣在陽榮氣順脈衛氣逆行清蝕相干亂於臂脛則為四厥亂於頭則為厥逆頭重眩仆丹溪日氣上厥逆屬陽無寒之理覺惡寒者乃火極似水也急與退熱清氣湯醫旨曰痰厥者皆因內虛受寒痰氣阻塞手足厥冷麻痺暈倒脈沉細宜服加味二陳湯鶴頂丹又曰蛔厥者胃寒所生胃中冷則吐蛔不可用冷藥宜理中湯加炒川椒檳榔煎水吞下烏梅丸得效曰經云蟲貫心則殺人欲驗之心腹大痛不可忍或吐青汁黃水出涎沫或吐蟲發有休止宜蕪荑散類聚曰風厥者四肢漐習也四肢漐習者四肢動而不止也似瘛瘲而無力不得伸縮者也回春曰凡人卒然暈倒口噤不能言目不識人四肢不舉等症多因飲食過度變為異常之疾必須審問若果飲食之後或著氣惱用薑鹽湯多灌探吐之後服加味六君子湯即癒治諸厥方四十一理中湯寒厥人參白朮甘草乾薑附子理中湯又附子人參白朮甘草乾薑十全大補湯又人參茯苓白朮炙草川芎當歸白芍生地黃耆肉桂薑三棗二當歸四逆湯又參耆益氣湯氣虛人參黃耆白朮五味麥冬附子陳皮甘草四逆湯寒厥附子乾薑甘草升陽散火湯熱厥升麻葛根羌活獨活葛根白芍防風生草炙草火鬱湯又羌活升麻葛根白芍人參柴胡甘草各一錢防風五分蔥白三寸大柴胡湯便秘柴胡黃岑半夏白芍大黃枳實薑棗白虎湯譫語石亭知母甘草粳米蘇合丸屍厥犀角白朮香附朱砂訶子蓽撥木香檀香沉香麝香丁香安息香燻陸香龍腦蘇合香油丸藿香正氣散又藿香白芷茯苓紫蘇厚朴白朮陳皮甘草半夏桔梗大腹皮返魂丹又朱砂雄黃玳瑁麝香白芥子安息香熔為丸黍米大每服五分硫黃散又硫黃一兩焰硝半兩研極細分三服好酒一盞同煎覺焰起傾於盞內說著候溫灌服之如人行五里又進一服不過三服即蘇朱犀散又犀角五錢朱砂麝香各二錢半每末二錢新汲水調灌導痰湯又南星半夏枳實赤苓陳皮甘草薑加味二陳湯又半夏陳皮當歸茯苓枳實桔梗杏仁各一錢良薑砂仁各五分木香肉桂甘草各三分薑五片鶴頂丹又明礬一兩猩紅五錢或黃丹亦可每取末一匙入磁器內熔化乘熱作丸櫻桃大每一丸薄荷湯下清氣化痰丸又半夏南星白礬皂角乾薑各四兩先將白礬三味水五碗煎三碗卻入星夏浸兩日再煮至星夏無白點曬乾同橘紅青皮蘇子菔子山查神麯杏仁葛根麥芽香附各二兩蒸餅丸此丸專治膏梁厚味人腦滿痰盛之症若脾胃虛者必受害切不可輕用蘇子降氣湯氣厥蘇子半夏前胡炙草當歸陳皮沉香虛加黃耆冷加肉桂八味順氣湯又茯苓白朮白芷香附青皮陳皮烏藥甘草退熱清氣湯又柴胡陳皮赤苓各一錢半夏枳殼各八分便香附七分川芎五分木香炙草各三分砂仁七粒薑三片蒲黃酒暴厥蒲黃一兩炒褐色清酒十杯沃之溫服備急丸又大黃乾薑巴霜各二兩蜜和搗千杵丸小豆大卒厥者取三丸熱酒吞下口不開酒化灌之下咽即活此方專治諸卒死暴疾百病及中惡客忏鬼擊鬼打面青口噤奄忽氣絕張易老名獨行丸乃急劑也還魂湯屍厥麻黃三錢杏仁二十五粒肉桂甘草各一錢水煎灌服噤口者斡開口灌之藥下立蘇保和丸食厥山查神麯半夏橘紅麥芽茯苓菔子連翹黃連加味六君子湯又香附錢半白朮茯苓陳皮半夏各一錢人參七分木香砂仁各五分甘草三分薑三片棗二枚蘇葉十片二陳湯總治茯苓半夏甘草陳皮補中益氣湯氣虛人參黃耆當歸白朮升麻柴胡甘草陳皮芎歸養榮湯血虛川芎當歸熟地白芍麥冬杞子黃柏知母甘草小續命湯風厥麻黃人參黃岑白芍甘草川芎杏仁官桂附子防風防己薑四七湯骨厥半夏曲茯苓蘇葉厚朴薑棗羌活導滯湯痺厥羌活獨活當歸防已大黃枳實當歸拈痛湯又當歸獨活炙草黃岑人參茵陳升麻葛根苦參蒼朮知母澤瀉豬苓防風白朮安蛔散蛔厥烏梅丸又烏梅十五個黃連七錢半當歸川椒細辛附子肉桂人參黃柏各三錢醋浸烏梅取肉搗極爛和勻作丸每米飲下一二十丸或二三十丸芫荑散又蕪荑雷丸各五錢乾漆炒煙盡一錢每末二錢溫水調服小兒半錢五獸三匱丸變痿鹿茸血竭虎脛骨酒牛膝金毛狗脊燎去毛各一兩即五獸也如法為末另用附子一個去皮剜去中心入朱砂細末一兩填滿又用木瓜一枚去皮剜去中心入附子於內以附子末說口即三匱也卻以三匱坐於瓷器內重湯蒸至極爛取出和五獸末打丸芡子大木瓜酒下養血壯筋健步丸又熟地四兩酒牛膝薑杜仲酒當歸鹽黃柏蒼朮各二兩酒白芍一兩半鹽黃耆鹽補骨脂山藥五味杞子人參菟絲子白朮虎脛骨龜板各一兩防風六錢酒防已五錢酒羌活三錢豬脊髓七條入煉蜜丸鹽湯下神龜滋陰丸又酥炙龜板四兩鹽黃柏鹽知母各二兩杞子五味子鎖陽各一兩乾薑五錢酒糊丸鹽湯下滋腎丸又酒黃柏酒知母各一兩肉桂半錢水丸空心白湯下諸癇源流諸癇腎經病也內經專主腎經失職而河間則以為熱甚風燥乃其兼化丹溪又主痰與熱士材又兼主肝腎而或兼風火要當據內經為的諸家之說當參考以為酌治之法庶諸癇無遁情經曰二陰急為癇厥二陰者足少陰腎也說其症在腎氣之厥而邪傷在陰與筋以腎氣主少陰與樞少陰逆而樞失則氣塞於經而上行少陰脈係舌本故塞喉音隘不容發若獸嗎然也經時必止者氣複反則已是以不與癲同也又曰心脈滿大癇瘈筋攣肝脈小急癇瘈筋攣足少陰筋病主癇瘈及痙說心脈滿而癇瘈者腎逆而心火鬱也逆於肝者肝陰先不足而腎氣逆之故肝脈小急亦癇瘈筋攣也凡癇必兼瘈少陰厥而後癇也又曰陽維從少陰至太陽動苦肌肉痺及下部不仁又苦顛仆羊鳴甚者失音不能言說陽維維於諸陽而從少陰至諸陽是陰為陽根也故能維諸陽而少陰陰邪從而至諸陽故能塞諸陽之會而患肌痺等症羊鳴失音者少陰氣不至則為喑也又曰陰維從少陽斜至厥陰動苦顛癇僵仆羊鳴失音說陰維從少陽至厥陰是陽為陰鼓也動在少陽故能鼓諸陽而為維而少陽既衰陰邪遂壅亦能全塞諸陰之會而筋絡相副故亦患顛癇等症此雖不拈少陰而厥陰之方闔亦少陰之失樞也觀內經之言則諸癇為患可識其皆由於腎矣若河間主熟故專以清涼為主丹溪主痰與熱故以星半岑連為主而熱多者清心痰多者行吐然後用安神平肝如歸地牛黃朱砂青黛柴胡川芎金銀箔之類士材兼主腎肝故以為癇症之發厥由腎中龍火上升而肝家雷火相從而助惟有肝風故搐搦搐搦則通身脂液逼迫而上隨逆氣以吐出於口也諸家之可參考如此總而論文諸癇之原雖根於腎而諸癇之發實應五臟如馬癇之張口搖頭作馬嘶者則應乎心牛癇之目正直視腹脹作牛吼者則應乎脾豬癇之喜吐沫作豬叫者則應乎腎雞癇之搖頭反折喜驚作雞嗚者則應乎肝羊癇之揚目吐舌作羊聲者則應乎肺須各對其經而治之而所發之候亦可據以辨驗經絡如晨朝發者病在足厥陰肝黃昏發者病在足太陰牌平旦發者病在足少陽膽日中發者病在足太陽膀胱亥時發者病在足陽明胃中夜發者病在足少陰腎須務加引經藥肝柴胡吳萸脾升麻葛根白芍膽柴胡青皮膀胱羌活胃白芷石膏腎肉桂知母獨活千金方又云先身體熱瘈瘲驚啼而後發脈浮洪者為陽癇病在六腑肌膚之間易治宜妙香丸先身冷不驚掣啼叫病發脈沉者為陰癇病在五臟骨髓之內難治宜五生丸引神歸舍丹此又以陰陽辨驗其法較為便捷總之五癇之應五臟所以識其由發時之分六經所以審其病症狀之別陰陽所以異其治固非有矛盾也故陽癇必由痰熱客心胃聞驚而作甚則不聞驚亦作宜用寒涼藥陰癇亦本痰熱緣醫用寒藥太過損傷脾胃變而成陰宜用溫補燥濕藥此施治之不可混也然而為標為本亦更有辨說癇症之成有從標而得者止在經脈不通有從本而得者必深人兩腎動氣夫兩腎動氣是臟腑之根呼吸之門生氣之本也生氣者陽從陰極而生即蒼天之氣所自起之分也故經曰蒼天之氣清淨則意志治順之則陽氣固雖有賊邪不能害或經脈引入外咸內傷深入於根本傷其生化之原則命門相火自下逆上塞其音聲迫出鳥獸之音遍身之液與脾之涎沫迫而上湧流出於口涎潮於心故卒倒不知人也小兒又有胎癇得之母腹中其母孕時有所大驚氣上而不下精氣並居故子生即發為癇疾宜燒丹丸而從古療癇惟子和法最善其法汗吐下並施若虛而不勝吐下者則以豁痰清火為主如南星木香竹瀝菖蒲全蠍人參黃岑麥冬所用方藥無不取效宜龍腦安神丸五癇丸參朱丸師其意而用之可也至篙崖則專取二蹻治之亦屬徑路可尋其法以晝作者為陽蹻宜升陽湯夜作者為陰蹻宜四物湯加柴胡瓜蔞半夏南星黃柏知母遠志棗仁菖蒲是也此皆前人之可取以為則者也然而癇病日久必成窠囊宜厚朴丸窠囊日久中必生蟲宜妙央丸或與行痰宜追風祛痰丸滌熱宜清心溫膽湯除驚宜驚氣丸寧神宜歸神丹癇病已癒須防再發宜斷癇丹或十全大補加棗仁遠志朱砂麥冬金箔銀箔必經年峻補才保無虞然後再加調養宜六味丸庶乎可耳脈法脈訣曰癲癇之脈浮洪大長鰲按諸癇之脈大約沉實弦急者皆不可治諸癇症治綱目曰痰在膈間則眩微不僕痰溢膈上則眩盛僕倒熬按凡痰病皆然不獨癇也而不知人名之日癲大人日癲小兒日癇其實一也又曰僕倒不省皆由邪氣逆上陽分而亂於頭中也癲癇者痰邪逆上也痰邪逆上則頭中氣亂頭中氣亂則脈道閉塞孔竅不通故耳不聞聲不識人而昏眩僕倒也又曰凡癲癇僕時口中作聲將省時吐涎沫省後又複發時作時止而不休息中風中寒中暑屍厥之類則僕時無聲省時無涎後不再發入門曰有五肝曰雞癇心曰馬癇脾曰牛癇肺曰羊癇腎曰豬癇以病狀偶類故為名其實不外乎痰火與驚三者而已諸方曰宜燒丹丸身熱脈浮為陽癇宜妙香丸心涼脈沉為陰癇宜五生丸肥人多痰宜加味壽星丸瘦人火盛霞清心滾痰丸痰迷心竅宜金箔鎮心丸痰火俱盛宜甘遂散吐下之因驚者宜抱膽丸因怒者宜寧神導痰湯心藏虛損氣血不足宜滋陰寧神湯清心溫膽湯婦人癇宜加味逍遙散朱砂膏五癇遘治宜五癇丸六珍丹錢氏五色丸癇愈再發宜斷癇丹治諸癇方二十九龍腦安神丸總治冰片麝香牛黃各三錢犀角茯苓人參麥冬朱砂各二兩金箔二十五方牙硝二錢地骨皮桑皮甘草各一兩蜜丸芡子大日三服五癇丸總治白附子五錢半夏南星烏蛇全蠍各二兩皂角二兩打碎用水平碗浸透揉汁去渣同白礬二兩煎乾蜈蚣半條殭蠶一兩半朱砂雄黃各一錢半麝香三分薑汁糊丸每服三十丸此方不問新久癲癇皆治參朱丸又人參蛤粉朱砂等分豬心血丸金銀湯下三十丸升陽湯陽躋連節麻黃防風各八錢蒼朮一兩半炙甘草五錢空心服四物湯陰躋川芎當歸白芍熟地厚朴丸窠囊黃連二兩半厚朴川椒川烏各兩半柴胡吳萸紫菀菖蒲桔梗茯苓官桂乾薑皂角人參各一兩巴霜五錢蜜丸每五六十丸薑湯下春夏再加黃連二兩秋冬再加厚朴二兩人參菖蒲各兩半妙央丸生蟲丁香木香沉香胡黃連各五錢乳香麝香熊膽大黃各兩半白丁香三百粒輕粉四錢半雄黃青皮黃岑黃連各五錢半黑醜三稜蓬朮陳皮甘草雷丸鶴蝨各一兩赤小豆三百粒巴豆七粒蕎麥兩六錢作糊丸每丸重一錢朱砂為衣陰乾水化服追風祛痰丸行痰半夏末二兩分二份一皂角汁浸作曲一薑汁浸作曲南星三兩一半白礬水浸一日夜一半皂角水浸一日夜防風天麻殭蠶白附子煨皂角同炒各一兩全蠍活木香白礬各五錢薑汁糊丸朱砂為衣薑湯下七八十丸清心溫膽湯滌熱陳皮半夏茯苓枳實薑黃連竹茹白朮菖蒲香附當歸白芍各一錢麥冬八分川芎遠志人參各六分甘草四分分二帖加薑三片驚氣丸除驚蘇子一兩附子木香白花蛇殭蠶橘紅天麻南星各五錢全蠍二錢半冰片麝香各五分朱砂二錢半半為衣蜜丸龍眼大每一丸蒲荷湯或酒下若去附子加鐵粉尤妙此方專治因驚失心遂成癲疾發則涎潮昏塞醒則精神若癡之證歸神丹寧神塊朱砂二兩入豬心內燈草紮酒蒸二炊久取出另研棗仁茯神人參當歸各二兩西珀薑遠志龍齒各一兩金銀箔各二十片酒糊丸梧子大初服九丸漸至二九丸麥冬湯下癲癇甚者乳香人參湯下多夢不睡棗仁湯下斷癇丹止癇黃耆鈎鈎細辛甘草各五錢蛇殼一條燒存性蟬殼全者四枚牛黃一錢棗肉丸每二十丸參湯下十全大補湯又人參白朮茯苓甘草川芎當歸白芍地黃黃耆肉桂加糯米六味丸保養地黃山萸山藥茯苓丹皮澤瀉燒丹丸胎癇元精石輕粉各一錢粉霜硼砂各五分研細入寒食面一錢水丸成餅再用麵裹煨黃去面再研水丸如米大一歲兒五丸二歲十丸溫水下取下惡物為度先服此丹繼必以四物湯入黃連再隨時令加減且令淡味以助藥力須數月方癒妙香丸陽癇朱砂九錢牛黃冰片麝香膩粉各三錢巴霜三十五粒金箔九方煉黃蠟六錢入蜜少部和勻每兩作三十丸每用一丸米湯下取利下一切惡毒痰涎為度如要藥力速行以針刺一眼冷水浸少時服其效更速此疏抉腸胃制伏水火之劑也五生丸陰癇南星半夏川烏白附子黑豆各生用一兩薑汁湖丸每三丸或藍丸淡薑湯送下引神歸舍丹又膽星二兩朱砂一兩便附子七錢豬心血丸每五十丸萱草根湯下加味壽星元去痰薑半夏六兩南星三兩朱砂一兩西珀活礬各五錢母真珠一錢薑汁湖丸朱砂為衣薑湯下三五十丸清心滾痰丸火盛酒蒸大黃黃岑各四兩礞石同焰硝煅犀角皂角朱砂各五錢沉香二錢半麝香五分水丸朱砂為衣溫水下七十丸金箔鎮心丸痰迷膽星一兩朱砂西珀天竺黃各五錢牛黃雄黃真珠各二錢麝香五分蜜和每兩作三十丸金箔為衣每一丸薄荷湯下甘遂散痰火甘遂末一錢豬心血和勻將豬心批兩片入藥於內合以線紮皮紙濕包煨熟取藥出入朱砂末一錢勻和分作四丸每一丸將所煨豬心煎湯化下如大便下惡物即止不效再服一丸抱膽丸因驚黑鉛三兩先入銚熔化次下水銀二兩候結成砂子再下朱砂乳香末各一兩乘熱用柳木槌研勻丸如芡子大每一丸空心井水下病者得睡切莫驚動覺來即安再服一丸可除根矣寧神導痰湯因怒薑半夏二錢製南星橘紅枳殼赤苓甘草各一錢薑五片水煎此即導痰湯也加遠志菖蒲黃岑黃連朱砂名曰寧神導痰湯若加香附烏藥沉香木香名順氣導談湯加黃岑黃連名清熱導痰湯加羌活白朮名祛風導痰湯滋陰寧神湯心虛川芎當歸白芍熟地人參白朮遠志南星各一錢棗仁甘草各三分酒黃連四分薑三片加味逍遙散婦人白芍白朮各一錢二分地骨反知母當歸各二錢茯苓麥冬生地各八分山梔黃柏各五分桔梗甘草各三分朱砂膏又棗仁人參赤苓各一兩西珀二錢半朱砂乳香各五錢每末一錢燈心大棗湯調下或蜜丸簿荷湯下亦可錢氏五色丸通治真珠另研雄黃熬備一兩鉛三兩水銀二錢半同鉛熬結砂子朱砂五錢再共研極細面糊丸小麻子大薄荷湯下三四丸六珍丹又水銀兩半用黑鉛一兩同熬成屑雄黃雌黃真珠各一兩丹砂水飛五錢為極細末蜜和杵二三萬下丸梧子大薑棗湯下五丸大便秘結源流大便不通脾約症大便秘結腎病也經曰北方黑水入通於腎開竅於二陰說以腎主五液津液盛則大便調和若為飢飽勞役所損或素嗜辛辣厚味致火邪留滯血中耗散真陰津液虧少故成便秘之症此其原可按經而得之者也若條分之則有由胃實者善飲食小便赤宜七宣丸有由胃虛者不能飲食小便清利宜厚朴湯有由大腸實者腹滿屎鞭宜麻仁丸有由血虛者液活發渴宜益血潤腸丸有由熱秘者面色赤六脈數實脹悶口舌瘡時欲得冷宜四順清涼飲參用木香檳榔丸重者承氣湯有由冷秘者面色白而黑六脈沉遲小便清白時欲得熱宜藿香正氣散加官桂枳殼有由風秘者風搏肺臟而肺與大腸表裡因傳大腸宜潤腸丸小續命湯去附子倍芍藥加竹瀝有由氣秘者氣不升降谷氣不行善嘻宜蘇子降氣湯加枳殼有由相火游走臟腑者宜大黃牽牛散有由血熱者宜當歸潤燥湯有由風熱鬱滯者宜疏風潤腸丸有由血分活燥者宜潤麻丸有由津液亡失或活竭者宜蓯沉丸五仁丸有由幽門不通者宜通幽湯有由三焦不和氣不升降胸膈痞滿者宜搜風潤腸丸有由氣壅滯而兼有熱者宜四磨湯六磨湯有由本有風病而大便秘者宜皂角元有由病後血氣末複或產後去血過多及發汗利小便者宜八珍湯倍當歸加肉蓯蓉蘇子有婦人風秘者宜大麻仁丸至老人便秘亦各有故不可概施方劑如由腸胃積熱致二便燥澀宜疏風順氣元如專由風秘宜小皂角丸如由虛而兼風秘宜二仁丸如由虛而兼氣秘宜橘杏丸如由虛而兼血秘宜蘇麻粥三仁粥皆當分別然總之老年氣血虛津液往往不足切不可輕用硝黃恐重竭其溥液致秘結更甚也總治宜八珍湯倍當歸加肉蓯蓉蘇子杏仁陳皮倘或陰寒脈卻實又微覺躁宜於溫暖藥中略加苦寒以去熱躁躁止勿加如陰躁刻欲就冷兩尺虛或沉細而遲不得用寒藥宜理中湯極冷服如或不效則用外導之法宜蜜煎加鹽皂角各五分冷秘宜醬瓜薑熱秘宜豬膽汁脈法醫鑑曰大便秘結脾脈沉數下連於尺為陽結二尺脈虛或沉細而遲為陰結右尺脈浮為風結又曰老人虛人秘結脈雀啄者難治回春曰燥結之脈沉伏勿疑熱結沉數虛結沉遲若是風燥右尺浮肥秘結症治仲景曰脈浮而數能食不大便此為實名曰陽結期十七日當劇脈沉而遲不能食身體重大便反硬名曰陰緒期十四日當劇入門曰燥屬少陰津液不足以辛潤之結屬太陰有燥屎以苦泄之易老曰實秘者物也虛秘者氣也丹溪曰實秘宜滌盪腸胃開結軟堅如硝黃枳實厚朴承氣湯之類是也虛秘宜滋養陰血潤燥散結如歸地桃仁麻仁黃岑潤燥湯之類是也海藏曰桃杏仁俱治大便秘當以氣血分之晝則便難行陽氣也宜杏仁夜則便難行陰血也宜桃仁老人虛人大便燥秘脈浮在氣宜杏仁陳皮脈沉在血宜桃仁陳皮所以俱用陳皮者以手陽明大腸與太陰肺為表裡也東垣曰血燥以桃仁酒大黃通之氣燥以杏仁枳實通之風燥以麻仁大黃利之氣澀不通以郁李仁皂角仁潤之氣壅便秘以人參歸身麻仁大黃開之秘結導引保生秘要曰以舌頂上腭守懸癰靜念而液自生俟滿口赤龍攪動頻漱頻吞聽降直下丹田又守靜咽數回大腸自潤行後央效運央保生秘要曰左手撫臍用意推旋開五臟向後落大腸九曲行去或升腎水洗潤大腸九曲而通瀉之大便不通亦腎病也說秘結者不過時常燥結艱於下利而已若不通則往往十日半月不便閉塞阻隔甚至胸腹脹滿代悶欲絕而其原則各有由大約熱邪入裡則胃有燥屎三焦伏陽則澤液中乾此固由大腸之挾熱者也宜潤腸丸虛人陰冷而血乾活老人陽衰而氣道塞此則由大腸之挾冷者也宜潤腸湯腹脹痛悶胸痞咳嘔此又由宿食留滯者也宜脾積元腸胃受風乾燥涸澀此又由風氣燔灼者也宜大麻仁丸肺氣壅蔽不能下降大腸而諸氣之道路因以閉塞噫逆泛滿此又由氣失升降之常者也宜桔梗枳殼湯然則大便之不通夫豈可與秘結之症同焉混視哉大便不通症治正傳曰久病腹中有實熱大便不通潤腸丸微利之不可用峻利之藥醫鑑曰大便閉服承氣湯之類不通者四物湯加檳榔枳殼桃仁紅花又曰大便不通宜靈寶丹大黃飲子老人虛人宜潤腸丸潤腸湯婦人宜通神散產前後宜調導飲外治宜宣積丸提盆散丹溪曰古方通大便皆用降氣之劑說肺氣不降則大便難於傳送用杏仁枳殼沉香訶子等是也老人虛人風人津夜少而秘者宜以藥滑之用麻仁脂麻阿膠等是也若妄以峻劑逐之則津液走氣血耗雖暫通而即複秘或更生他病矣脾約液活症也仲景論陽明傷寒自汗出小便數則津液內竭大便必難其脾為約脾約丸主之說液者肺金所布肺受火爍則津液自竭而不能行清化之令以輸於脾是肺先失傳送之職脾亦因爽轉輸之權而大便有不燥結者乎但仲景以脾約丸主之恐只宜於古而不盡宜於今說古人壯實開泄猶可今人氣血多有不充此丸以大黃為君當大病後或東南人虛羸恐雖熱甚而偶誤服此必脾愈弱而腸愈燥也故本病只宜以滋養陰血使陽火不熾為上宜當歸潤燥湯蓯沉丸潤腸丸必審知其人強壯或熱結太甚或西北充實之人猶可以脾約丸投之否則宜謹慎也脾約症治成無己曰胃強脾弱約束津液不得四布但輸膀胱故小便數而大便難製脾約丸以下脾之結燥丹溪曰脾約症在西北以開結為主在東南以潤燥為央治大便秘結方三十一七宣丸胃實大黃一兩木香檳榔訶子皮桃仁十二粒蜜丸水下五十丸以利為度厚朴湯胃虛厚朴陳皮白朮甘草枳實半夏曲薑棗麻仁丸大腸實麻仁杏仁厚朴枳實赤芍藥大黃蜜丸每二十丸臨臥服取利益血潤腸丸血虛當歸熟地荊芥枳殼麻仁杏仁蓯蓉蘇子將熟地麻仁杏仁同杵千下加蜜丸空心下五六十丸木香檳榔丸熱秘木香檳榔枳殼杏仁青皮皂角郁李仁半夏曲四順清涼飲又大黃甘草當歸赤芍各一錢加薄荷十葉承氣湯又大黃芒硝厚朴枳實薑藿香正氣散冷秘茯苓白芷紫蘇藿香厚朴白朮陳皮桔梗半夏大腹皮甘草潤腸丸風秘麻仁另研羌活大黃歸尾桃仁另研蜜丸小續命湯又麻黃人參黃岑赤芍川芎甘草杏仁官桂防己防風附子薑蘇子降氣湯氣秘蘇子半夏厚朴前胡陳皮甘草當歸沉香薑虛加肉桂黃耆八珍湯病後人參茯苓白朮炙草川芎當歸白芍熱地理中湯陰躁人參乾薑白朮甘草大黃牽牛散相火大黃一兩黑牽牛頭末五錢共為末每三錢手足冷者酒調下手足熱者蜜湯下當歸潤燥湯血熱當歸大黃熟地甘草桃仁麻仁各一錢生地升麻各七分紅花二分先取七味煎至半入桃仁麻仁再煎至半空心服疏風潤腸丸風熱麻仁二兩半桃仁二兩皂角燒存性兩三錢大黃羌活各一兩防風當歸各三錢蜜丸白湯下皂角元風人羌活防風牙皂枳殼桑皮檳榔杏仁麻仁白芷陳皮等分蜜丸湯下三五十丸有熱加大黃潤麻丸血燥麻仁桃仁生地當歸枳殼各一兩蜜丸白湯下蓯沉丸亡津肉蓯蓉二兩沉香一兩麻仁汁打糊丸空心米飲下五仁丸又橘紅四兩另研桃仁杏仁各一兩柏子仁五錢郁李仁二錢松子仁一錢二分半各另研蜜丸空心米飲下通幽湯幽門秘升麻桃仁歸身各錢半生地熟地各七分炙草紅花各二分煎好調檳榔末五分服搜風潤腸丸三焦郁李仁一兩木香檳榔青皮陳皮沉香槐角枳殼枳實三稜煨大黃各五錢蜜丸空心米飲下一方加萊菔子五錢更妙四磨湯氣滯檳榔烏藥木香沉香等分各濃磨水共取盞中七分煎三五沸微溫服六磨湯兼熱即上四磨湯加大黃枳殼等分磨濃汁服大麻仁丸婦人木香檳榔枳殼各一兩麻仁炒大黃各三錢蜜丸疏風順氣元腸胃熱大黃酒蒸七次五兩車前子二兩半郁李仁檳榔麻仁酒菟絲子酒牛膝山藥萸肉各二兩枳殼防風獨活各一兩蜜丸此方專治大便秘結真良方也久服精神康健百病不生尤宜老人小皂角丸風秘皂角炙枳殼炒等分蜜丸二仁丸又杏仁麻仁枳殼訶子肉等分橘杏丸氣秘橘皮杏仁等分蜜丸蘇麻粥順氣蘇子麻仁不拘多少等分水浸研濾取汁和粳米作粥食三仁粥老虛桃仁海松子仁各一合郁李仁一錢搗爛取汁和米作粥服治大便不通方十四潤腸丸挾熱當歸生地枳殼桃仁麻仁等分蜜丸鰲按此方酌加大黃黃岑亦可潤腸湯挾冷麻仁盞半水研濾去皮取汁脂麻半盞水研取汁桃仁研泥一兩荊芥穗為末一兩共合和入鹽少部煎代茶飲之以通利為度半硫丸冷甚薑半夏末硫黃研極細等分薑汁浸蒸餅丸薑湯或酒下三五十丸大麻仁丸風秘方詳上桔梗枳殼湯氣壅四物湯潤血川芎當歸白芍生地靈寶丹推積木香沉香乳香各五分巴霜二錢大棗三枚蒸取肉打丸綠豆大每服二丸或三丸涼水送下如欲利三行先吃涼水三口然後用涼水送下如欲五行六行依數吃水大黃飲子熱燥生地二錢煨大黃杏仁梔子升麻枳殼各一錢人參黃岑甘草各五分薑五片豉二十一粒烏梅一個潤腸湯久閉蜂蜜一兩香油五錢朴硝一撮水一杯煎數沸通神散婦人大黃芒硝桃仁郁李仁各一兩木香五錢每末二錢米湯下脾積丸宿食蓬朮一兩半三稜一兩青皮五錢良薑以醋煮切片焙乾木香百草霜巴霜各二錢半面糊丸麻子大陳皮湯下五七十丸調導飲產前後當歸川芎防風枳殼各一錢二分甘草三分薑三棗二空心煎服宣積丸外治巴豆去殼乾薑韭子良薑硫黃甘遂檳榔等分飯丸如雞子黃大早朝先以椒湯洗手麻油塗手掌握藥一丸移時便下欲止則以冷水洗手提盆散又草烏為極細末蔥白一枚切去根其頭上有汁濕蘸草烏末納肛門中即通此即霹靂箭能治大小便不通治脾約症方四脾約丸總治大黃蒸四兩枳實厚朴赤芍各二兩麻仁兩半杏仁一兩二錢半蜜丸空心湯下五十丸蓯沉丸又言詳上潤腸丸又杏仁麻仁枳殼陳皮各五錢阿膠珠防風各二錢半蜜丸每五十丸老人蘇子湯下壯者荊芥湯下當歸潤燥湯又當歸大黃熟地甘草桃仁麻仁各一錢生地升麻各七分紅花二分先將七味煎至半入桃仁麻仁煎至半空心服一名潤燥湯
