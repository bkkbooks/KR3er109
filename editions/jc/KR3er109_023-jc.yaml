body:
  text: 卷二十三耳病源流耳屬足少陰腎之寄竅也耳所致者精精氣調和腎氣充足則耳聰若勞傷氣血風邪乘虛使精脫腎慮則耳聾是腎為耳聾之原也宜益腎散六味丸肉蓯蓉丸然腎竅於耳所以聰聽實因水生於金說肺主氣一身之氣貫於耳故能為聽故凡治耳聾必先調氣開鬱昔人用磁石羊腎丸以開關竅者以聾之為病多由痰火鬱絡非磁石鎮墜烏桂椒辛菖蒲辛散以通利老痰則鬱火何由而開入門謂愈後以通聖散和之是也雖然耳之聾正自有辨左聾屬足少陽之火其原起於忿怒宜龍膽湯右聾屬足太陽之火其原起於色欲宜滋陰地黃丸左右俱聾屬足陽明之火其原起於醇酒厚味宜酒製通聖散清聰化痰丸然三者之病由於忿怒者更多以肝膽之火易動也以上皆耳聾之原也由是而耳之為病有不可勝言者矣何言之五臟六腑十二經脈有絡於耳者其陰陽經氣有時交並並則臟氣逆而厥厥氣搏入耳是為厥聾宜流氣散當歸龍薈丸耳為宗脈所附脈虛而風邪湊之風入於耳使經氣否而不宣是為風聾必兼頭疼之症宜防風通聖散若風虛宜桂星散若風熱宜開痰散皆從風聾例有勞役傷其血氣淫欲耗其精元瘦瘁力疲昏昏憒憒是為勞聾能將息使血氣和平則其聾漸輕總之或因房勞精脫宜益腎散人參養榮湯加鹽炒知柏或因腎經素虛宜燒腎散或因腎氣虛而久聾宜薑蠍散以開之皆當分治有大病後耳觸風邪與氣相搏其聲嘈嘈而鳴眼見黑花謂之虛聾宜四物湯加鹽酒炒知柏腎氣丸加磁石黃柏菟絲子補骨脂其勞役脫氣者別治宜六味丸加知母黃柏遠志菖蒲並鹽水炒其由陰虛火動者別治宜六味丸加知母黃柏遠志菖薄並鹽水炒有雨水入耳浸漬腫痛謂之濕聾宜涼膈散倍入酒大黃酒黃芩加羌活防風荊芥或五苓散加陳皮枳殼紫蘇生薑外用吹耳之法宜黃龍散有腎氣虛風邪傳經絡因入於耳邪與正相搏而卒無聞者謂之卒聾亦曰暴聾宜芎芷散清神散或由厥逆之氣如經云少陽之厥暴聾者皆卒聾也須用塞耳法宜蒲黃膏龍腦膏而此六者之外又有怒氣厥逆氣壅於上而聾者宜流氣散清神散有氣實而鳴且聾者宜神芎丸有氣閉而忽聾者宜甘草湯再以甘遂丸塞耳有肝膽火盛耳內蟬鳴漸至於聾者宜聰耳蘆薈丸有小兒即耳聾者腎竅通耳風邪乘三焦邪隨其經入耳內邪正搏而氣停塞滯也宜通鳴散有腎熱耳聾者宜燒鐵投酒中飲之以磁石塞耳日易夜去之有火風侵竅而耳鳴者宜驅風清火湯有暑邪竅閉而耳忽聾者宜鮮荷葉湯有因大聲喊叫右耳失聰以外觸驚氣內應肝膽膽脈絡耳震動其火風之威致鬱而阻竅成聾者當治少陽忌食腥濁宜清膽湯有男子真陰未充虛陽易升乘竅致形體日瘦咳嗽耳聾左耳尤甚者亦須清少陽宜清熱解鬱湯有年久耳聾者宜勝金透關散然耳聾者音聲閉隔竟一無所聞者也亦有不至無聞但聞之不真者名為重聽其症之來或由風氣壅耳常覺重聽頭目不清宜清神散聰耳湯或由腎經熱致右耳聽事不真宜地黃湯不得竟為耳聾而以治聾方藥投之若乃耳鳴者聾之漸也惟氣閉而聾者則不鳴其餘諸般耳聾未有不先鳴者夫鳴何以故靈搏原作薄據文義改樞曰上氣不足耳為之苦鳴又曰髓海不足則腦轉耳鳴又曰耳者宗脈所聚胃中空則宗脈虛宗脈虛則下流脈有所竭故耳鳴內經曰一陽獨嘯少陽厥也注云嘯謂耳鳴一陽謂膽三焦膽三焦脈皆入耳故氣逆上而耳鳴正傳曰腎水活涸陰火上炎故耳癢耳鳴不治必至聾聵醫鑑曰痰火上升兩耳蟬鳴漸欲聾據此數說亦可知耳鳴之所由來矣總之右耳屬腎左耳屬肝其鳴之故必先由肝腎之氣虛又為風火痰氣之所乘故其嗚也或如蟬噪或如鐘鼓或如水激不一而足而其為治亦有當分者如正氣與風邪相擊而虛鳴須先散邪宜芎芷散腎氣虛宗脈虛風邪乘入而鳴須先祛邪下氣宜五苓散加枳橘薑蘇吞青木香丸而後加以和養宜芎歸飲痰火升上而鳴須理痰清火宜加減龍薈丸通明利氣湯複聰湯腎精不足陰虛火動而鳴須溫腎益精宜補腎丸滋腎通耳丸大約由於痰火者其鳴盛由於腎虛者其鳴微此其辨也肝家本來火甚或為風乘痰客而鳴須選清肝兼治風痰宜加減龍薈丸風熱酒熱上貫於耳而鳴須用擴清之法宜通聖散加柴枳荊桔青皮南星卒然而嗚且失聰須以開通為主宜蠍梢挺子此則耳鳴之症也至於耳之雜症不一可得而悉言之若耳中本有津液風熱搏之津液結硬成塊壅塞耳竅氣脈不通疼痛不止亦令耳聾名曰耵耳宜梔子清肝湯柴胡聰耳湯耵耳由來亦複有辨不止風熱相搏一端也有風溫之邪上鬱耳耵右脹者宜馬勃散有左耳耵痛舌白脈數由體質陰虛挾受暑風上焦氣鬱須用辛涼輕藥者宜菊葉苦丁山梔飛滑石連翹淡竹葉有暑熱上鬱耳耵作脹咳嗆氣熱當清者宜六一散加杏仁連翹殼淡竹葉川貝母白沙參有頭重耳耵脹緣少陽相火上鬱須以辛涼清解上焦者宜羚羊角湯有先起咳嗽繼而耵耳脹痛延綿日久不愈由本陰虧風溫相觸未經清理外因傷及陰分少陽相火陡起至入暮厥痛愈劇須先清降後議育陰者宜益元散加菊葉苦丁川貝金銀花綠豆皮鮮荷梗葉有諸般耵耳出膿水且臭宜穿山甲燒存性麝少部吹之日三四次愈或乾結不出者宜白蚯蚓入蔥葉中化為水滴耳令滿不過數度即易挑出有勞傷氣血熱氣乘虛入於其經隨鬱而成耵耳或出膿水者宜柴胡聰耳湯外吹紅棉散此則耵耳之症也耳腫耳膿者乃風邪乘少陰經上入於耳熱氣聚則腫而生痛成膿宜蔓荊子散荊芥連翹湯或風熱上壅腫痛日久膿出膿不去則塞耳成聾宜鼠粘子湯犀角飲子或由肝氣壅滯三焦火動宜龍膽湯然大人則有虛火實火之分小兒則有胎熱胎風之別虛火若何必耳內蟬鳴或重聽出水作癢外不琚腫宜金匱腎氣丸加菖蒲四物湯實火若何必耳根耳竅俱腫甚則寒熱交作疼痛無時宜柴胡清肝湯胎熱若何或洗沐水誤入耳作痛生膿初起月內不必治項內生腫後毒盡自愈月外不瘥治之宜紅棉散敷之胎風若何初生風吹入耳以致生腫出膿宜魚牙散吹之此外又有肝風鬱滯其內生瘡有膿者宜東垣鼠粘子湯抑肝消毒散外以三仙散吹之有耳出臭膿宜竹蛀屑胭脂坯子等分麝少部共末吹之或出血宜龍骨末吹之或耳疳出膿者宜抱出雞卵殼炒黃為末油調灌之疼即止有耳出膿汁或聾而鳴屬上焦風熱者宜蔓荊子散有耳中忽大痛如有蟲蠕動或膿出或血出或水出或乾痛者宜蛇殼燒存性以鵝翎管吹入即止有耳內濕瘡腫痛或有膿水者宜涼膈散加酒大黃酒黃芩刑防羌活以解上焦風熱外用蛇床子黃連各一錢輕粉一字為末吹之有耳後忽然腫痛悉屬肝火者此症恆見於婦女急當平肝降火兼舒鬱宜柴胡清肝湯龍膽瀉肝湯若有表症兼發寒熱散之宜荊防敗毒散有耳後腮旁忽然腫痛悉屬陽明蘊熱者宜清胃敗毒散或含化三清救苦丹有耳根連牙床腫痛悉屬上焦風熱鬱抑者宜升麻白芷連翹荊芥防風薄荷甘草桔梗枳殼酒芩酒連花粉赤芍牛蒡生地等若熱甚加蒸大黃有風毒耳腫痛出血宜柳糞化水取清汁調白礬末少部滴之或卒熱腫痛宜木鱉仁一兩大黃赤小豆各五錢為末每以少部生油調塗之或底耳腫痛汁水不絕者宜桑螵蛸一個燒存性麝少部研末摻入神效有膿先洗淨以愈為度有風溫發熱左耳後腫痛者宜乾荷葉苦丁連翹山梔有耳熱出汗作癢由於痰火者宜元參貝母湯有耳癢一日一件直爬出血略愈明日又作悉屬腎虛致浮毒上攻者此不可以常法治必先忌酒面雞鵝豬羊一切辛熱之物及房欲至四十九日服藥乃有效宜透水丹元參貝母湯有耳內外生瘡由肝經血虛風熱宜當歸川芎湯柴胡清肝湯逍遙散或肝經燥火風熱宜柴胡清肝湯梔子清肝湯必寒熱作痛宜小柴胡湯加山梔川芎甚有內熱口乾屬腎經虛火者宜加味地黃丸有耳輪生瘡名耳發疽屬手少陽三焦經熱者宜涼膈散有耳生爛瘡宜棗子去核包青礬煅研香油調敷耳後月蝕瘡宜燒蚯蚓糞豬油和敷兩耳凍瘡宜生薑汁熬膏塗皆作腫痛者以上皆發腫痛癢瘡膿之症也雖然此皆由內發者亦有外侵之患可勿論諸歟如飛蟲之入耳也宜雞冠血滴入即出膽礬末和醋灌即出螻蟻之入耳也宜鯪鯉甲燒研水調灌入即出馬蝗之入耳也宜田中泥一盆貼枕耳邊即出蚰蜒之入耳也宜牛乳少少滴入即出若入腹飲一二升即化水羊乳亦佳蜈蚣之入耳也宜炙豬肪掩耳自出亦治諸蟲蟻入耳蚤蝨之入耳也宜菖蒲末炒熱絹袋盛枕之即出飛蠅之入耳也宜皂角蟲研同鱓魚血點之諸物之誤入耳也宜三寸長弓弦一頭打散注著耳中徐徐粘引而出種種之害雖非常有然其治法有不可不備者故為遍考方書類係於此總之耳病之原風則腎脈必虛熱則腎脈必數虛則腎脈必澀氣鬱則腎脈必沉滯此為久病之脈暴病則必浮洪若兩尺相同則陰火上衝矣說以腎發竅於耳故耳病必以腎脈為消息再兼診他脈此其大法也脈法脈經曰左寸洪數心火上炎兩尺洪數相火上炎其人必遺精夢泄而耳或鳴或聾又曰病耳聾脈大者生沉細者難治醫鑑曰腎脈浮而盛為風洪而實為熱細而澀為虛回春曰耳病腎虛遲濡其脈浮大為風洪動火賊沉澀氣凝數實熱塞久病聾者專於腎責暴病浮洪兩尺相同或兩尺數陰火上衝耳病原由症治綱目曰耳目之陰血虛則陽氣之加無以受之而視聽之聰明失耳目之陽氣虛則陰血不能自施而聰明亦失則耳目之聰明必血氣相須而始能視聽也入門曰聾在右男子多有之以多色欲也聾在左女子多有之以多鬱怒也聾兼左右膏梁之家多有之以多甘味也又曰久聾腎氣虛耳絕不聞者難治薛立齋曰耳鳴脈數黑瘦人屬血虛四物加山梔柴胡右寸關大於左無力倦怠色黃白屬中氣虛補中益氣湯加減若氣血俱虛八珍湯加柴胡若因怒便聾或鳴屬肝膽氣濁小柴胡加芎歸山梔又曰耳聾耳鳴須分新久虛實忽因大怒大醉而聾或鳴者屬痰火又分輕重治中年及病後虛弱人悉屬虛但分氣血耳治之必大補氣血滋陰製火使虛火下伏陽氣上行充塞流動則九竅咸利而聾鳴悉除經曰腎氣通於耳耳和則知五音矣瘍科選粹曰耳中生毒皆由足少陰手少陽二經風熱上壅所致其症有五曰耵耳亦曰耳濕常出黃膿有耳風毒常出紅膿有纏耳常出白膿有耳疳生瘡臭穢有震耳耳內虛鳴時出清膿雖症有五而其源歸一又有耳蕈耳痔不作膿亦不寒熱外無臃腫但外塞不通纏綿不已令人耳聾用黃連消毒飲仙方活命飲治之若寒熱間作內外紅腫疼痛日增者為耳癰用活命飲加升麻桔梗或一粒金丹以下之亦有寒熱大作痛不可忍耆疔也以疔治之又曰肝火左脈弦數其人多怒耳鳴或聾宜平肝伐木龍膽瀉肝湯不已龍薈丸葉天士曰腎開竅於耳心亦寄竅於耳心腎兩虧肝陽亢逆故陰精走泄陽不內依是以耳鳴時閉但病在心腎其原實由於鬱鬱則肝陽獨亢令膽火上炎當早服丸料以補心腎用熟地四兩龜板二兩麥冬牡蠣白芍建蓮茯神各兩半五味磁石各一兩沉香辰砂各五錢砂為衣午服湯藥以清少陽以膽經亦絡於耳也用女貞子三錢生地二錢半夏活草二錢赤苓錢半丹皮山梔各一錢生甘草四分又曰七八十而耳聾乃理之常也說老人雖健下元已怯是下虛上實清竅不主流暢惟固補下焦使陰火得以潜伏用磁石六味丸加龜甲五味遠志耳病導引法保生秘要曰凡搓掌心五十度熱閉耳門空觀次又搓又閉又觀如此六度耳重皆如此導法兼以後央無不應驗運央保生秘要曰用意推散其火男則用逆收藏於兩腎之間女則用逆歸藏於兩乳之下或耳中或按耳門內若蟬鳴咽津液降氣安耳重導引法保生秘要曰定息坐塞兌咬緊牙關以脾腸二指捏緊鼻孔睜二目使氣串耳通竅內覺哄哄然有聲行之二三日竅通為度運央保生秘要曰時常將兩耳返聽於歸元取靜或存閉口中氣及鼻中氣使不妄出單意想從耳中出又收返聽耳自然聰矣修養法養生書曰以手摩耳輪不拘遍數所謂修其城郭以補腎氣以防聾聵也又曰養耳力者常飽治耳病方七十五透鐵關法總治活磁石二塊銼如棗核大搽麝香少部於磁石尖上塞兩耳竅中口內含生鐵一塊候一時兩耳氣透颯颯有聲為度勤用三五次即愈矣此方專治一切耳聾透耳筒又椒目巴豆肉石菖蒲松脂各五分共為末以蠟熔化和勻作筒子樣棉包納耳中日易一次神效此方專治腎氣虛耳鳴如風水聲或如鐘磬響或卒暴聾皆效通神散又蠍子全者一個土狗一個地龍二條白礬半生半活雄黃各五分麝香二分半共為末用蔥白蘸藥入耳中閉氣面壁坐一時三日一用自愈此方大治耳聾凡邪氣閉塞或由於虛而為聾聵者當用透關通氣之藥故特先列三方於前以備採用益腎散腎虛磁石巴戟沉香菖蒲川椒等分每末二錢用豬腰一個細切和蔥白食鹽紙包煨空心酒下六味丸又熟地山藥山萸丹皮茯苓澤瀉磁石六味丸老年磁石熟地山藥山萸丹皮茯苓澤瀉人參養榮湯勞損人參茯苓白朮甘草當歸白芍熟地黃芪遠志肉桂陳皮五味子薑棗調中益氣湯病後人參黃芪蒼朮甘草陳皮木香升麻柴胡此即補中益氣湯去當歸白朮換木香蒼朮也流氣散厥聾防風通聖散風聾防風荊芥麻黃連翹薄荷川芎當歸白芍白朮山梔大黃芒硝黃芩石膏桔梗甘草滑石薑蔥酒製通聖散右聾即防風通聖散諸藥俱用酒炒倍入酒煨大黃再用酒炒三次水煎食後服磁石羊腎丸耳聾磁石三兩煅再用蔥白木通各三兩同煮一伏時取石研水飛用二兩川芎菟絲子白朮川椒防風棗肉茯苓細辛草葛遠志川烏木香當歸黃芪鹿茸各一兩肉桂六錢半石菖蒲兩半熟地二兩羊腎二對酒煮爛搗加酒糊丸空心溫酒或鹽湯下五十丸此方總治一切耳聾補虛開竅行鬱疏風去濕桂星散虛聾肉桂二分川芎五分當歸六分細辛木香麻黃甘草木通南星白蒺藜各三分菖蒲八分白芷四分紫蘇五分開痰散風熱芎芷散虛聾川芎一錢半白芷細辛陳皮蒼朮菖蒲厚朴半夏木通肉桂蘇葉甘草各七分薑三蔥白二清神散氣壅甘菊羌活薑蠶各五分木通川芎防風荊芥木香甘草菖蒲各四分每末二錢米湯下神芎丸氣實大黃黃芩牽牛子滑石水丸通鳴散小兒菖蒲遠志各一兩防風柴胡麥冬各五錢甜葶藶細辛各二錢杏仁十四個磁石一錢每末五分蔥湯下菖蒲丸又菖蒲一寸巴豆七粒研分七丸每一丸綿包塞耳內滋陰降火湯右聾生地當歸黃柏知母川芎赤芍菖蒲薑風加防風痰加膽星火盛加元參當歸龍薈丸左聾當歸龍膽草蘆薈甘草甘菊花黃芩荊芥生地赤芍痰加薑製半夏加減龍薈丸痰火酒龍膽酒當歸黑山梔黃芩青皮各一兩酒蒸大黃柴胡青黛各五錢蘆薈膽星各三錢木香二錢半麝香五分神麯糊丸鹽湯下二十丸日三服後用針砂酒以通氣針砂酒又針砂三錢銅銚內炒紅以陳酒一杯將針砂淬入待溫砂亦澄下飲酒四物湯虛火川芎地黃白芍當歸金匱腎氣丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂車前子牛膝柴胡清肝湯實火柴胡黑山梔各一錢半黃芩川芎人參各一錢連翹桔梗各八分甘草五分食後溫服此方專治肝膽三焦風熱怒火之症紅棉散胎熱乾胭脂二錢活礬三錢麝香一分半共研末先將綿卷去膿汁再將棉蘸藥末卷入耳內涼膈散濕聾連翹甘草薄荷山梔黃芩大黃芒硝五苓散又茯苓澤瀉白朮白芍肉桂魚牙散胎風江魚牙煅研和冰麝少部吹入蠍梢挺子卒鳴川山甲一大片以蛤粉炒赤蠍梢七個麝香少部共為末以麻油化蠟和作挺子棉裹塞之梔子清肝湯耵耳山梔菖蒲柴胡當歸黃芩黃連丹皮甘草牛蒡子先以生豬脂地龍百草霜為末和蔥汁捏如棗核大棉包塞耳幾日待軟挑出後服此藥荊防敗毒散腫痛荊芥粉草連翹川芎羌活獨活五加皮各七分角刺穿山甲炒歸尾防風蒼朮酒防己地骨皮各一錢白鮮皮金銀花各錢三分土茯苓一兩煎好加酒食後服此方兼治楊梅瘡初發者蔓荊子散熱風膿炙草桑皮升麻木通甘菊花前胡赤芍生地麥冬蔓荊子赤苓各七分薑三棗二桃花散吹耳石灰十兩麻油半盞大黃一兩煎汁半盞石灰炒紅入油汁慢火炒如桃花色抑肝消毒散瘡膿山梔黃芩連翹防風荊芥甘草赤芍歸尾燈心金銀花渴加天花粉三仙散吹耳膽汁炒黃柏酒炒紅花冰片少部龍膽瀉肝湯肝火清胃敗毒散胃熱赤芍歸尾甘草黃芩連翹花粉荊芥酒大黃金銀花三清救苦丹又大黃二兩薑蠶一兩共為末入活礬一錢蜜丸彈子大咽化此方兼治發頤肉蓯蓉丸腎虛肉蓯蓉山萸石菖蒲金石斛巴戟磁石鹿茸菟絲子茯苓各二兩沉香川椒各一兩聰耳蘆薈丸肝膽火熟大黃蘆薈青黛柴胡各五錢龍膽草當歸青皮山梔黃芩各一兩木香南星各二錢麝香五分神麯糊丸黃連消毒飲耳痛仙方活命飲又穿山甲白芷防風赤芍薄荷甘草歸尾花粉貝母皂角剌各一錢金銀花陳皮各三錢乳香沒藥各一錢二味另研末水酒煎送乳沒二味水煎亦可一粒金丹又沉香乳香木香各五分巴霜一錢半即玉樞丹又名紫金錠各為末照末數和勻用黑棗丸芡實大每一丸量人虛實先呷水一口行一次胃實人只可呷三四口再用水下一丸米飲止之磁石六味丸老年熟地山萸山藥丹皮茯苓澤瀉磁石