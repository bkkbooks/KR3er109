生瘡腫痛由肺本經火甚也宜黃芩湯或口鼻生疳蝕爛亦為肺脾胃三經之熱宜青錠搽患處日數次又有鼻痛者由風邪與正氣相搏竅道不通故痛也宜通氣驅風湯如痰火衝肺亦令鼻膈隱痛宜二陳湯加山梔桔梗麥冬黃芩又有鼻上紅腫似瘡非瘡俗名酒皶鼻者由飲酒血熱濕熱上攻於肺外禦風寒血凝不散而成也宜疏風散荊防瀉白散赤鼻方亦有不飲酒而色赤者名肺風瘡由血熱鬱肺不散也宜清肺飲子或四物五苓二方合用加黃芩黃柏又有粉刺者與皶鼻肺風三名同種粉刺屬肺皶鼻屬脾二者初起俱色紅久則肉匏發腫宜枇杷葉丸外以白龍散塗或洗總皆血熱滯而不散之故又有面鼻紫黑者面為陽中之陽鼻居面之中一身之血運到此皆為至清酒家則酒氣燻蒸面鼻血為極熱熱血遇寒污濁凝滯而不行故色成紫黑也急宜化滯血生新血宜清酒四物湯氣弱加酒黃芪鼻之為病如此總之肺和則鼻自無病安可不急急於手太陰以圖治哉脈法正傳曰左寸脈浮緩為傷風鼻塞流涕右寸脈浮洪而數為鼻衄鼻鼽也鰲按鼻皶之脈右亦洪數鼻病原由症治正傳曰鼻淵者外寒束內熱之症又曰鼻色青腹中痛苦冷者死靈樞曰鼻頭色青為痛色黑為勞色赤為風色黃為便難色鮮明者留飲也三因曰鼻頭微白者亡血也赤者血熱也酒家多有之本草單方曰鼻中諸疾有鼻淵鼻鼽鼻窒鼻瘡及痘後鼻瘡並用辛夷研末入麝少部蔥白蘸入數次甚良其專治鼻淵腦瀉用藕節川芎焙研為末每二錢米飲下或腦崩流汁鼻中時流黃水腦痛名控腦砂有蟲食腦中也用絲瓜藤近根三五尺燒存性每一錢酒下以愈為度又以兒茶末吹之良其鼻中瘜肉用狗頭灰方寸匕苦丁茶半錢研末吹之即成水或同硇砂少部尤妙又用地龍炒一分牙皂一挺為末蜜調塗清水滴盡即除其齆鼻作臭用雞腎一對與脖前肉等分入豉七粒新瓦焙研雞子清和作餅安鼻前引蟲出其鼻瘡膿臭有蟲也用苦參活礬一兩生地汁三合水二盞煎三合少少滴之又元參末塗之或以水浸軟塞之其疳蝕口鼻文蛤燒灰臘豬油和塗又人中白一錢銅綠少部研敷甚或穿唇透頰數日欲盡急用銀屑一兩水三升銅器內煎一升日洗三四次其鼻皶赤疱用密陀僧二兩研細人乳調夜塗旦洗亦治痘瘡㿀黶又桑黃能除肺熱故治赤鼻及肺火成癰其鼻擦破傷貓頭上毛剪碎唾粘傅之鼻病修養法養性書曰常以手中指於鼻梁兩邊揩二三十遍令表裡俱熱所謂灌溉中岳以潤於肺也常去鼻中毛謂神氣出入之門戶也鼻淵導引法保生秘要曰用中指尖於掌心搓令極熱熨搓迎香二穴可時搓時運兼行後央此法並治不聞香臭運央保生秘要曰歸元念縧過命門想腎水升上昆侖降臍次從左乳下經絡推至湧泉噓而吸之又行鼻間運患處則從左鼻助推至左湧泉後又念臍縧過腎哄想水灌頂歸覆臍或頰紅及鼻但推紅處撤散升腎水洗腫久自退矣鼻血導引法保生秘要曰開二目鼻朝天吸氣得法咽吞如此久吸久咽血見津而自回兼行後央氣脈自和也運央保生秘要曰觀鼻端定神漸運入內逆上頂門轉下於背經元海溯湧泉而定神治鼻病方三十三川芎茶調散風寒川芎薄荷羌活甘草防風荊芥白芷細辛為末茶調下抑金散肺熱細辛白芷防風羌活川芎各八分桔梗陳皮茯苓各七分當歸身一錢黃連清肺散肺火通草散鼻癰通草炮附細辛蜜丸棉裹塞辛夷消風散瘜肉辛夷黃芩薄荷甘菊川芎桔梗防風荊芥甘草生地赤芍黃芩清肺飲又天花粉川芎當歸赤芍生地防風葛根連翹紅花各一錢黃芩二分薄荷三分辛夷荊芥散又辛夷一錢荊芥黃芩南星半夏麯神麯白芷蒼朮各八分蝴蝶散又蝴蝶一味煅棉包塞星夏湯鼻淵南星半夏蒼朮神麯細辛白芷甘草黃芩酒炒黃連酒炒瓜礬散痔瓜蒂四錢甘遂一錢活礬螺殼灰草烏灰各五分麻油調作丸每日一次塞鼻內令達痔上即化水愈辛夷膏又辛夷二兩細辛木通木香白芷杏仁各五錢羊髓豬脂各二兩石器內慢火熬膏赤黃色待冷入冰麝各一錢為丸棉裹塞鼻數日脫落即愈輕黃散瘜肉杏仁輕粉各一錢雄黃五分麝香少部臥時點鼻內涼膈散鼻瘡桔梗黃芩防風荊芥花粉山楂枳殼赤芍甘草疏風散皶鼻防風荊芥薄荷黃芩甘草赤芍歸尾燈心白蒺藜荊防瀉白散又防風荊芥桔梗連翹元參赤芍甘草生地黃芩桑皮青黛葛花金銀花赤鼻方又枇杷葉白果芽茶芭蕉根蜜丸黍米大每二錢湯下四物湯肺風川芎當歸白芍生地五苓散又白朮澤瀉茯苓肉桂豬苓枇杷葉丸粉刺枇杷葉八錢黃芩四錢花粉二錢甘草一錢酒丸每一錢五分白湯下忌火酒煎炒辛熱之物真君妙貼散又奇授藿香湯鼻淵廣藿香五錢水一碗煎七分加豬膽汁一枚和服若將膽汁熬膏入藿香末一兩作丸每二錢湯下亦可天麻餅子又防風散又防風三錢黃芩麥冬人參甘草川芎各二錢羌活衝和湯鼻塞參蘇飲又蓽澄茄丸又薄荷葉二錢荊芥穗一錢蓽澄茄二分蜜丸櫻桃大含化南星飲又南星二錢沸湯泡二次焙乾大棗七個甘草少部同煎食後服三四貼後其硬物自出腦氣流轉髓涕自收再以蓽撥香附大蒜肉搗作餅紗襯貼囟門熨斗熨之芎藭散又芎藭檳榔麻黃肉桂防己木通細辛白芷菖蒲各七分木香川椒甘草各三分半薑三片蘇葉七片勝濕湯瘜肉白朮三錢人參乾薑白芍附子茯苓桂枝甘草各七分半薑棗瀉白散又地骨皮桑皮各二錢甘草一錢或加知母貝母生地麥冬桔梗山梔亦可鼻不聞香臭方鼻塞薄荷三錢細辛白芷羌活防風當歸川芎半夏桔梗赤茯苓陳皮各一錢黃芩湯鼻瘡酒黃芩山梔桔梗赤芍荊芥穗桑皮麥冬薄荷連翹各一錢甘草三分通氣驅風湯鼻痛烏藥一錢半川芎白芷桔梗陳皮白朮甘草各一錢麻黃枳殼人參各五分薑三棗二口齒唇舌病源流口者脾之竅也能知五谷之味又諸經皆會於口病則口中之味隨各經而異如肝熱則口酸肝乘脾亦口酸宜小柴葫湯加龍膽草青皮甚者當歸龍薈丸心熱則口苦或生瘡宜涼膈散瀉心湯肝移熱於膽亦口苦內經言膽癉是也注云肝主謀膽主決或謀不決為之急怒則氣上逆膽汁上溢故也宜龍膽瀉肝湯脾熱則口甘或臭內經言脾癉是也說癉者熱也宜瀉黃散三黃湯胃熱亦口甘若虛則口淡熱宜清胃湯虛宜養胃進食湯肺熱則口辛宜甘桔湯瀉白散更有甚而喉腥者宜加減瀉白散腎熱則口咸宜滋腎丸虛火鬱熱蘊於胸胃之間則口臭宜加減甘露飲或心勞味厚之人亦口臭宜加減瀉白散或肺為火爍亦口臭宜消風散加減瀉白散或吐膿血如肺癰狀而口臭他方不應宜升麻黃連丸臟腑積熱則口糜口糜者口瘡糜爛也宜局方涼膈散心熱亦口糜口瘡多赤宜花粉末摻之肺熱亦口糜口瘡多白宜黃柏蓽撥末摻之良久以水漱口膀胱移熱於小腸亦口糜宜移熱湯柴胡地骨皮湯心脾有熱亦口糜宜升麻散三焦火盛亦口糜宜回春涼膈散中焦氣不足虛火上泛亦口糜或服涼藥不效宜理中湯陰虧火泛亦口糜宜四物湯加知柏內熱亦口糜並咽喉腫痛宜冰柏丸或口瘡臭腐多膿宜赴筵散摻之傷寒狐惑蟲蝕其臟則上唇生瘡蟲蝕其肛則下唇生瘡是臟腑之病未嘗不應諸口凡口瘡者皆病之標也治者當推求其本焉而所以推求之法不外乎五味之異以察五臟之屬耳別有內疳瘡生上腭如蓮蓬蒂下垂初小漸大必宜以小鉤刀去其根燒鐵烙以止其血然後以雄黃輕粉粉霜白芷白斂為細末以敷之仍以槐枝起其牙一二時部瘡口自合次日膿出另當以藥敷之宜生肌散若上腭腫硬內熱體倦作渴乃多骨疽也宜補中益氣湯腎氣丸多服之其骨自出也夫多骨疽多有發於手背足背等處不專在上腭者其症皆腫硬一塊久而脫去一骨者便是其原均屬腎虛腎主骨也或由瘡疽潰久不能收斂總因氣血不足腎水素虧複為寒邪所觸致患處之骨腫突而起日漸長高先宜用蔥熨法使寒邪祛散接補榮氣其骨自脫骨脫之後仍服補劑宜十全大補湯腎氣丸苦誤用尅伐藥則元日虛邪反甚取危之道也此則統治多骨疽之法特詳悉於此凡生他處者依法治之可也至取多骨有法亦宜考求宜取朽骨法又有懸癰亦生上腭狀若紫葡萄屬肺三焦二經之病亦發寒熱至口不得開舌不得伸縮惟欲仰臥鼻出紅涕乃肺三焦積熱所致宜黃連消毒飲外以琥珀犀角膏敷之繆仲淳以為疑即內疳瘡恐屬二症不得混視大約內疳瘡稍輕懸癰較重總之人之口破皆由於火而火必有虛實之分色淡色紅之別虛火血色淡白斑點細陷露龜紋脈虛不渴此由思煩太甚多醒少睡虛火動而發也宜四物湯加知柏丹皮肉桂以為引導實火色紅而滿口爛斑甚者腮舌俱腫脈實口乾此由飲酒厚味心火妄動而發也宜涼膈散外敷赴筵散其餘若飲酒口糜宜田螺煮汁飲若天行口瘡宜五倍子末摻之吐涎即愈若年久口瘡宜天冬麥冬元參等分蜜丸含化若口疳臭爛宜先以蛇床子湯漱口後以款冬花黃連末等分津調餅子敷之少頃其瘡立消若口角爛瘡宜燕巢泥研敷良若鵝口白瘡宜地雞即鼠婦又名濕生蟲研水塗之愈若吻上燕口瘡宜箸頭燒灰敷若口舌爛瘡胸膈疼痛宜焦豉末含一宿即瘥若白口惡瘡狀似木耳不拘大小男女皆有宜五倍子青黛等分在研末筒吹之若口齒氣臭燻出人不可近宜川芎白芷等分蜜丸含之常以香茹煎湯漱口種種雜病皆當兼治者尤氏口齒唇舌治法方藥詳載於咽喉門後鴃者互考之可也脈法脈訣曰左寸洪數心熱口苦右寸浮數肺熱口辛左關弦數膽虛口苦倘若洪實肝熱口酸右關沉實脾熱口甘洪數則口瘡或重舌木舌回春曰口舌生瘡脈洪疾速若見脈虛中氣不足口舌生五味得效曰心氣通於舌能知五味脾氣通於口亦知五谷之味又曰口之味熱勝則苦寒勝則咸宿食則酸煩躁則澀虛則淡勞鬱則臭凝滯則生瘡以口之津液通乎五臟臟氣偏勝則味應於口入門曰傷胃陽虛則口中無味傷腎陰虛則口中有味醫鑑曰龍腦雞蘇丸治胃熱口臭肺熱喉腥脾熱口甜膽熱口苦肝熱口酸及胸中鬱熱等症大效口病原由症治入門曰口臭者胃熱也直指曰口臭一症乃熱氣蘊積胸膈之間挾熱而衝發於口也綱目曰小兒口瘡白礬或吳萸為末醋調塗腳心效此小兒之難用藥者又曰小兒口瘡黃柏青黛等分冰片少部為末竹瀝調敷之乳母宜服瀉心湯涼膈散丹溪曰小兒口瘡巴豆肉一粒研爛黃丹少部和捏作餅外用紙護貼眉心半刻部去之立效或以薄荷自然汁拭口內亦效口乾導引法保生秘要曰左右足心每搓三十六回按時吐納津回即咽六度數周為定運央保生秘要曰以舌卷上腭凝玄雍穴貫一窟涼水漸提至口洗齒黃庭經曰玉池清水灌靈根注曰玉池者口也清水者津液也靈根者舌也齒者腎之標骨之本也齒又為手足陽明經所過上齒隸坤土足陽明胃脈貫絡也止而不動喜寒惡熱下齒屬手陽明大腸脈絡也嚼物動而不休喜熱惡寒故為病不一甚則動搖齦斷袒脫作痛不已虛則齒豁活焦而搖落矣然而齒之為病大約有七一為風熱痛由外風與內熱相搏齒齦腫痛有膿水流出且臭穢是也急以荊芥煎湯含漱內服藥宜犀角升麻湯二為風冷痛雖痛而齦不腫亦不蛀日漸動搖是也宜溫風散並以開笑散含漱三為熱痛由腸胃間積熱故齦腫爛臭穢宜涼膈散加酒大黃為君知母石膏升麻為佐噙咽效又內有濕熱被風冷所鬱而作痛宜當歸龍薈丸又胃中有熱而痛喜冷惡熱宜清胃散瀉胃湯又酒家因酒熱常患牙痛宜以冷水頻頻含漱久年齒痛黑爛脫落必吸涼稍止乃膏粱濕熱之火所蒸也必下之宜調胃承氣湯加黃連此等是也四為寒痛由客寒犯腦故齒連頭而痛宜羌活附子湯細辛散此與厥逆頭痛略同當參考若寒熱俱痛者則為寒熱痛宜當歸龍膽散五為痰毒痛由素有熱熱生痰痰流毒痰毒灌注經絡上攻牙齒而痛更兼痰盛咳嗽宜二陳加細辛枳殼烏薑棗煎服再以薑黃蓽撥等分煎湯候溫以舌浸湯內涎自流出六為瘀血痛由風熱挾攻齦間令血出瘀滯故痛如針剌宜加減甘露飲加升麻或以五靈脂醋煎含漱效若齒痛齲數年不愈者亦當作陽明畜血治之凡好飲者多致此疾宜桃仁承氣湯料細末蜜丸服之七為蟲蝕痛由飲食餘滓積齒縫間腐臭之氣淹潰致齒齦有孔蟲生其間蝕一齒盡又蝕一齒至如疳𧏾必殺蟲而愈宜一笑散定痛散蜂窩散古方書又有齒齲者謂齒蠹也即齒蟲蝕而痛也而此七者之外又有牙齦紅腫而頰俱腫頭面盡痛者實熱也宜升麻石膏湯有牙齦腫痛頭面不腫或頭面腫牙齦反不甚紅腫者皆虛火也上一症宜滋陰抑火湯下一症宜疏風散有本陽明受風引煙燻之煩熱反致頰車連唇口多腫痛盛者宜犀角升麻湯有腎經虛而黑爛腫痛者宜安腎丸有胃家實火上攻牙縫出血宜清胃散或胃虛火動牙縫腐爛以致淡血常流不已者宜蘆薈丸人中白散摻之有陰虧體質被溫邪之氣上衝齒痛連頭巔者宜玉女煎有厥陰火鬱而巔頂屬厥陰地位因致上結核齦腫痛者宜犀角羚羊角元參知母生草連翹黑山梔夏活草金銀花有因服熱藥上下齒痛不可忍引腦痛滿面熱喜寒惡熱者宜清胃散有風痛者遇風即痛先發浮腫隨後作痛者宜消風散有虛氣攻牙痛血出或癢痛者宜骨碎補二兩切瓦鍋緩火炒黑為末擦牙吐咽俱可且不獨治牙痛牙動將落者擦之不複動有風熱積壅一切牙痛並口氣者宜紫金散有腫高而軟者內必有膿宜針刺膿出自愈有牙根腐爛出血不止者宜犀角地黃湯外擦人中白散有牙宣露痛而出血者宜乾絲瓜藤煅搽即止並以地骨皮煎湯漱有齒縫中血滲出者宜苦參一兩活礬一錢研搽日三驗有牙根出血不止者宜含川芎多瘥有出血不止甚至動搖者宜白蒺藜研末旦旦擦之有牙齒挺長出一二分者宜常咋生地妙有齒日長漸至難食名髓溢病者宜白朮煎湯漱服效有牙根腫極痛微赤有白泡舌尖粉碎者宜兒茶散吹之有疳𧏾牙齦臭爛多膿唇頰穿破不愈者宜膽礬散血竭散麝香散及秘方有牙癰名附牙由陽明熱毒者必先刺出惡血後服藥宜清胃散黃連消毒飲有牙癰後頰車穴閉口不能張由體屬陰虛內熱脈細數上出其病在絡藥餌一時難效者宜宣通絡痹方有骨槽風又名穿腮毒者由憂愁驚恐悲傷思慮所致初起生耳下及頸項隱隱皮膚之內有小核漸大如胡桃牙齦腫痛寒熱大作腐爛不已日增紅腫或左或右或上或下牙關緊急不能進食必用鵝翎探吐風痰內速服藥宜黃連解毒湯仙方活命飲加元參桔梗柴胡黃芩忌刀針及點藥如破傷入風虛火上升嘔吐血痰臭穢不食必至不可救矣有腎元虛乏牙齦宣露動搖者必當大補宜八味丸還少丹小兒鑽牙疳者牙根尖穿出牙根外內芒刺觜唇作痛用針挑破牙面好肉以手取去本牙出血不止以濕紙貼換二三次其血自止又戒厚味牙可複生宜犀角地黃湯外以百藥煎五倍子青鹽煅各錢半銅綠一錢為末日摻二三次神效兼治一切牙齦疳蝕又小兒牙疳並小兒口瘡其色通白及為風疳蝕透宜白薑蠶炒黃拭去蠶上黃肉毛研末蜜和敷之立效他如齒壅乃齦間長出努肉也由好食動風物之故宜生地汁一杯皂角數片炙熱淬汁內再炙再淬汁盡為度曬為末敷之愈又如斗齒乃被打傷動搖也宜蒺藜根灰敷之動牙即牢又如齒折多年不生宜雄鼠脊骨煅研末日日揩之甚效又如齒齘乃睡中上下齒相摩有聲由胃熱故也宜取本人臥席下塵一捻納口中勿令知即差又如齒齼由多食酸之故宜嚼胡桃肉良又如齒黃其由積垢者勿論大約脾腎二經之熱所致也宜燒糯糠取白灰日日揩擦以上種種皆齒所生病不容忽視者也脈法醫鑑曰右關脈洪數或弦而洪腸胃中有風熱而痛尺脈洪大而虛者腎家虛主齒動疏豁相火上炎而痛回春曰齒痛腎虛尺濡而大火炎尺洪疏落豁壞右寸關數或洪而弦此屬腸胃風熱多涎齒病原由症治靈樞曰胃惡熱而喜清冷大腸惡清冷而喜熱入門曰胃絡脈入齒上縫其病喜寒飲而惡熱飲大腸絡脈入齒下縫其病喜熱飲而惡寒飲又曰熱牙痛怕冷水冷牙疼怕熱水不怕冷熱乃風牙痛東垣曰胃有實熱上齒痛尤甚醫鑑曰上爿牙痛亦屬腎經虛熱下爿牙痛屬手陽明虛熱有風又曰齒齦宣露動搖者腎元虛也扁鵲曰病人唇腫齒焦者死脾腎絕也又曰病人齒瘡忽變者十三日死少陰絕也又曰病人陰陽俱竭其齒如熟小豆者死齒病修養法養性書曰齒宜朝暮叩以會神一云以集身神若卒遇惡當叩左齒三十六名曰打天鐘若辟邪穢叩右齒名曰擊天磬若存念至真叩中央齒名曰鳴天鼓千金方曰每晨起以一捻鹽納口中以溫水含揩齒及叩齒百遍為之不絕不過五日齒即牢密類聚曰凡人患齒不能食果菜者皆齒露也為鹽湯含漱叩齒神效上唇隸腎下唇隸脾兩腮牙根隸胃唇病因火居多但不可過用涼藥必兼消散所謂火鬱則發之也其症有唇口瞤動或生核者宜苡仁湯有心脾受熱唇舌燥裂口破生瘡者宜瀉黃飲若兼大渴引飲則熱之極矣宜和中清熱湯竹葉石膏湯有脾火盛而口唇生瘡或多食易飢者宜芍藥湯有唇黃泡腫者宜烏頭炒灰研墨香油調塗然此皆唇病之常耳更有唇一症又名緊唇又名瀋唇其狀口唇緊小不能開合不能飲食大是奇病不急治則死而其症有為腫為實之分宜苡仁湯外用黃柏散白灰湯敷之良此皆唇病之屬也唇病症治丹溪曰唇瘡久不差八月藍葉搗取汁洗不過一二日愈又白荷花瓣貼之神效如開裂出血者即止繆仲淳曰唇腫黑痛癢不可忍用四文大錢於石上靡豬脂塗之不過數遍愈又曰口唇緊小不能開合飲食不治殺人作大炷艾安刀斧上燒令汗出白布拭塗之日五度仍以青布燒灰酒服又曰瀋唇緊裂鱉甲及頭燒研敷之一法屠幾垢燒存性香油或豬脂調敷之瘍科選粹曰繭唇用五倍子二錢密陀僧甘草各少部各為細末另用粗皮嫩黃柏一兩將三末水調塗黃柏上炙乾又換以藥盡為度將黃柏劈開片子臨臥時貼唇上天明即愈一方以青皮燒灰敷之舌為心苗舌本絡於脾口故舌病多屬心而其病之最重者有六一為木舌由心脾熱壅舌腫粗大漸漸硬塞滿口氣不得吐如木之不和軟者然不急治即塞殺人宜黃連湯清熱如聖散琥珀犀角膏外以針日砭八九次令出血二三盞自然腫消痛減說舌為心苗心主血故血出而愈再用藥敷之可也宜龍腦破毒散五分指蘸擦又硼砂末以生薑片蘸揩少時即消一為重舌亦由心脾熱盛舌根下生形如小舌口不能聲飲食不通須急服藥先開關竅宜如聖勝金錠再瀉心火宜青黛散一味黃連湯外以針刺出惡血以竹瀝調黃柏末塗之其有著頰裡及上腭如此者名曰重腭其著齒齦上如此者名曰重齦皆刺去惡血內服藥宜青黛散一為舌長舌短舌吐長不能收名曰陽強舌縮短不能言名曰陰強陽強之症如仲景言傷寒熱病後犯房得病為陰陽易舌出數寸而死又如醫說言傷寒熱病後舌出寸餘累日不收必以片腦為末摻舌上應手而縮須用五錢方效又如入門言一婦因產子舌出不收醫以朱砂敷其舌令作產子狀兩女扶挾之乃于壁外擲瓦盆於地作聲聲聞而舌收是也陰強之症如靈樞言足厥陰氣絕則舌卷而短厥陰者肝也肝主筋聚於陰器而絡於舌本故肝絕則舌卷囊縮又言舌者心之官心病者舌卷而短是也一為舌上生苔則由邪氣傳裡津液結搏之故若邪在表者舌無病也方其邪初傳裡之時胸中之寒與丹田熱火相激則苔生而滑迨寒變為熱則舌苔不滑而澀以熱耗津液滑者已乾也若熱聚於胃則舌苔便黃至熱已極則舌苔黑色黑為腎色病已傳入少陰故靈樞曰熱病口乾舌黑者死入門曰凡舌黑俱係危症也若舌色淡黑如淡墨一般乃腎虛火炎為無根之火與苔黑不同一為舌生芒刺皆由熱結之故或因心勞火盛而生瘡菌宜琥珀犀角膏或因脾熱而舌苔乾澀如雪宜冰柏丸或因畜熱而舌燥澀如楊梅刺宜厚片生薑蘸蜜丸揩立消或因熱結而舌生紅粟點宜竹瀝調寒水石末塗之一為自嚙舌頭靈樞曰自嚙舌者厥逆走上脈氣皆至也少陰氣至則嚙舌少陽氣至則嚙頰陽明氣至則嚙唇據此則舌頰唇各從其所屬經氣逆而上嚙也俱宜神聖複氣湯六者之外又有舌心生瘡及破裂者宜黃連瀉心湯有舌頭忽然腫硬如石血出如湧泉者宜蒲黃散有不硬惟腫痛流血者宜涼血清脾飲犀角地黃湯有舌腫滿口不能出聲者宜蒲黃散有舌卒腫大如豬肝狀滿口不治則殺人者宜醋調釜底墨塗舌下脫則更傅須臾即消有舌腫咽痛咽生息肉者宜秤錘燒紅淬醋一盞飲之效有舌下忽高腫起核名舌塾者宜舌墊方有舌上無故出血者宜犀角地黃湯黃連瀉心湯舌病之不一如此夫安得不悉心求治哉再由舌病推之有因呵欠頰車蹉跌但開不能合者令飲大醉俟睡熟以皂角末搐鼻令嚏即自正或以南星為末薑汁調敷以帛縛合二宿當愈有但合不能開者速取鹽梅二個取肉擦牙即當口開若既開又不能合再用鹽梅擦兩牙候能開合即止不擦服去風藥宜冰柏丸薄荷蜜如卒然牙關緊急水不能入亦同此治又有頷骨脫離者令伊坐穩一人用手揉臉一二百下令伊口張開一人用兩大拇指入伊口內拿定牙外用兩指將下頷往上兜即入口正矣此皆前人妙法故參取之脈法脈訣曰右關洪數為重舌木舌回春曰口舌生瘡脈洪疾速若見脈虛中氣不足舌病症治靈樞曰足太陰氣絕則唇反唇反者死唇者舌之本唇反者肉先死也綱目曰舌卷而短若唇青卵縮者必死肝絕故也得效曰舌本爛熱不止者逆入門曰舌胎白而滑以生薑蘸蜜擦之若黃赤燥澀以新青布蘸水頻擦之輕者易脫重者難脫必須大下之津液還而苔自退矣補斷舌法回春曰舌頭被人咬去先以乳香沒藥煎水噙口中止痛後即將水銀寒水石黑鉛輕粉硼砂研細抹上即長全有效入門曰跌撲穿斷舌心血出不止以鵝翎蘸米醋頻拭斷處其血即止仍用蒲黃杏仁硼砂噙化而安醫林曰大人小兒偶含刀在口割斷舌頭已垂幸而未脫急用雞子白軟皮袋好用破血丹即花粉三兩赤芍二兩薑黃白芷各一兩研極細蜜調塗舌根斷處卻以蜜調蠟稀稠得所敷在雞子皮上說性軟能透藥性故也當勤添敷三日舌接住方去雞子皮只用蜜蠟勤敷七日全安治口病方三十三冰柏丸內熱冰片一錢川黃柏薄荷葉硼砂各五分蜜丸含化赴筵散臭爛銅綠白礬各一錢為末摻舌上溫醋漱之赴筵散多膿黃芩黃柏黃連山梔乾薑細辛等分四物湯虛火川芎當歸白芍生地龍腦雞蘇丸口臭消風散又荊芥甘草各一錢人參茯苓川芎薑蠶防風藿香羌活蟬殼各五分陳皮厚朴各三分加細茶或為末每二錢茶下亦可涼膈散實火防風荊芥桔梗黃芩山楂花粉枳殼赤芍甘草小柴胡湯口酸柴胡黃芩人參半夏甘草當歸龍薈丸又當歸龍膽草蘆薈甘草黃芩荊芥生地赤芍甘菊瀉心湯口苦黃連不拘多少為極細末每服二分半或五分或一錢溫水下龍膽瀉肝湯又柴胡一錢黃芩七分甘草人參黃連天冬龍膽草山梔麥冬知母各五分五味子七粒忌辛熱物瀉黃散口甘山梔一錢半藿香甘草各一錢石膏八分防風六分三黃湯又黃芩黃連山梔石膏赤芍桔梗陳皮茯苓各八分白朮甘草各三分烏梅一個清胃湯又養胃進食湯口淡甘桔湯口辛甘草桔梗瀉白散又地骨皮桑皮各一錢甘草一錢或加知母貝母桔梗山梔麥冬生地亦可滋腎丸口咸酒黃柏酒知母各一兩肉桂心五分水泛丸湯下百丸加減瀉白散口腥桑皮二錢桔梗錢半地骨皮炙甘草各一錢黃芩麥冬各五分五味子十五粒知母七分日二服忌酒面辛熱物加減甘露飲口臭熟地生地天冬黃芩枳殼枇杷葉茵陳草金石斛甘草各一兩犀角三錢每取末二錢水煎服此方內犀角一味甚有道理有奇效升麻黃連丸又酒黃芩二兩黃連一兩升麻薑汁青皮各五錢生甘草三錢舊檀二錢蒸餅丸彈子大每丸細嚼白湯下局方涼膈散口糜連翹二錢大黃芒硝甘草各一錢薄荷黃芩山梔各五分加竹葉七片蜜少部同煎至半入硝去渣服移熱湯又生地木通甘草竹葉茯苓豬苓澤瀉白朮等分煎服此即導赤四苓二散合方也柴胡地骨皮湯又柴胡地骨皮各二錢半回春涼膈散又連翹錢二分黃芩黃連山梔桔梗薄荷當歸生地枳殼赤芍甘草各七分理中湯又生肌散上腭木香二錢黃丹活礬各五錢輕粉錢半共末豬膽汁拌曬再研細摻或吹此方乃解毒去腐搜膿之劑非竟自生肌也說毒盡則肌自生耳十全大補湯多骨人參茯苓白朮炙草川芎當歸白芍熟地肉桂黃芪薑棗金匱腎氣丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂牛膝車前子補中益氣湯又取朽骨法又石膽丹砂雄黃礬石磁石等分用瓦盒收貯炭燒三日夜啟開以雞翎掃取說上煙灰注瘡內則惡肉破骨盡出黃連消毒飲懸癰琥珀犀角膏又琥珀犀角辰砂各一錢茯神人參棗仁各二錢為極細末另研冰片二分半煉蜜調膏每用彈子大一塊麥冬濃煎湯化下一日五服神效治齒病方三十四升麻石膏湯腫痛升麻石膏防風荊芥歸尾赤芍連翹桔梗甘草薄荷黃芩燈心熱甚加酒大黃滋陰抑火湯齦腫當歸生地荊芥防風黃柏知母丹皮甘草燈心白蒺藜火甚加丹參疏風散不腫防風荊芥薄荷黃芩歸尾赤芍甘草燈心白蒺藜清胃散胃熱黃芩黃連丹皮生地升麻石膏薑黃散風熱蟲薑黃細辛白芷為末擦牙須臾吐涎鹽湯漱口安腎丸腎虛蓯蓉白朮山藥桃仁川烏萆薢巴戟石斛蒺藜補骨脂蜜丸細辛散風蛀荊芥細辛各一錢砂仁鶴蝨各五分白芷川椒草烏各二分皂角五錢蓽撥錢半為末揩牙蘆薈丸胃火蘆薈銀柴胡川連胡黃連元參牛蒡子桔梗山梔石膏薄荷升麻甘草羚羊角人中白散又人中白二錢兒茶一錢黃柏末薄荷葉青黛各六分冰片二釐漱淨口吹之若走馬疳吹此藥涎從外出者吉入裡者兇玉女煎陰虧熟地麥冬牛膝知母生石膏柴金散風熱大黃瓶內燒存性為末早晚揩牙漱去神效無比黃連消毒飲牙癰宣通絡痹方又羚羊角白薑蠶川桂枝尖煨明天麻炒丹皮黑山梔鉤藤鉤消風散風痛甘草荊芥各一錢人參茯苓川芎薑蠶防風藿香羌活蟬退各五分陳皮厚朴各三分細茶葉二分煎服或為末每二錢茶下冰硼散火痛犀角地黃湯齦爛犀角生地赤芍山梔丹皮甘草黃芩燈心口渴加麥冬兒茶散白泡兒茶一味為末加冰片少部吹膽礬散牙疳胡黃連五分膽礬兒茶各五釐為末敷秘方又皂角用片瓦刮去外皮每二錢入鹽錢二分瓦上炙乾研末吹立效犀角升麻湯風熱犀角一錢半升麻羌活防風各一錢川芎白芷白附子各五分日二服溫風散風冷當歸川芎細辛白芷蓽撥藁本蜂房各一錢煎服仍含漱吐之開笑散又白芷細辛良薑蓽撥川椒香附蜂房等末每末二錢水煎含漱或擦之涼膈散熱痛桔梗黃芩防風荊芥花粉山楂赤芍枳殼甘草當歸龍薈丸又龍膽草當歸蘆薈甘草黃芩荊芥生地赤芍菊花瀉胃湯又當歸川芎赤芍生地黃連丹皮山梔防風薄荷荊芥甘草各一錢或加石膏亦可調胃承氣湯又羌活附子湯寒痛麻黃附子白芷防風炒薑蠶各一錢黃柏羌活蒼朮各七分黃芪升麻炙草各五分水煎食後服當歸龍膽散寒熱痛麻黃升麻龍膽草黃連草蔻各一錢生地歸梢白芷羊脛骨灰各五分為末擦二陳湯痰毒茯苓陳皮半夏甘草加減甘露飲瘀血熟地生地天冬黃芩茵陳枳殼枇杷葉金石斛甘草各一兩犀角三錢每末二錢煎服桃仁承氣湯又一笑散疳𧏾川椒為末巴豆一粒研成膏飯和作丸棉裹安蛀孔內即愈定痛散又當歸生地細辛乾薑白芷連翹苦參川椒黃連桔梗烏梅甘草各一錢水煎噙漱後咽下蜂窩散又蜂房一個每孔內入胡椒川椒各一粒用碗盛之入水令滿加黃柏如指大三片於內以碟說紙封固重湯煮二炷香取出候溫噙漱之良久吐出治唇病方五苡仁湯唇核苡仁漢防己赤小豆炙甘草各錢半竹葉石膏湯大渴竹葉石膏人參半夏炙草麥冬梗米瀉黃飲子風熱白芷升麻黃芩枳殼防風半夏金石斛各一錢甘草五分和中清熱湯唇瘡知母黃柏青黛桔梗甘草生地赤芍花粉丹皮上唇腫生瘡氣實者加酒大黃氣虛者加酒川連下唇腫生瘡亦加川連黃柏散繭唇黃柏二兩蜜陀僧五倍子甘草各二錢將後三味末塗柏上炙乾刮片貼唇治舌病方十二桃花散生瘡延胡索一錢黃連黃柏各五分青黛蜜陀僧各三分吹黃連瀉心湯舌心瘡薑黃連甘草生地歸尾赤芍木通連翹防風荊芥蒲黃散舌血海螵蛸炒蒲黃各一錢摻涼血清脾飲腫痛生地當歸黃芩白芍連翹防風薄荷石菖甘草傷酒加青黛傷厚味加大黃枳殼山楂脾火加薑黃連犀角地黃湯又犀角生地赤芍山梔丹皮黃芩甘草燈心口渴加麥冬舌墊方舌塾防風荊芥白芷細辛羌活獨活香附陳皮燈心黃連湯木舌酒黃連酒當歸酒生地山梔麥冬赤芍各一錢犀角薄荷甘草各五分食後服清熱如聖散又連翹錢半惡實黃連各一錢山梔花粉各七分枳殼柴胡薄荷荊芥各五分甘草三分燈心二團稍冷服琥珀犀角膏又人參棗仁茯神各二錢犀角琥珀朱砂各一錢冰片一分蜜丸彈子大麥冬湯化日三五丸青黛散重舌黃連黃柏各三錢牙硝青黛朱砂各六分雄黃牛黃硼砂各三分冰片一分先以薄荷末抹口中再以藥摻此方兼治咽瘡腫冰柏丸舌苔黃柏薄荷硼砂等分冰片減半蜜丸彈子大含化此方兼治口舌生瘡粟神聖複氣湯嚙舌酒黃連酒黃柏酒生地枳殼各三分另用新水浸又取蔓荊子打碎細辛川芎各三分另用新水浸又取羌活柴胡各一錢藁本甘草各八分半夏升麻各七分當歸六分郁李仁人參防風各五分炮薑附子各三分白葵花三朵去心打碎水五大盞煎至二盞入黃芪煨草蔻仁各一錢橘紅五分同煎至一盞乃入前浸兩藥再煎至一大盞去渣空心熱服
