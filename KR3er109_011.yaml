body:
  text: 卷十一奇經八脈門沖脈病源流沖脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海此與任脈主身前之陰經曰沖脈為病氣逆而裡急又曰上衝作躁熱又曰咳唾手足厥逆氣從少腹上衝胸咽面翕然熱如醉下流陰股小便難持又曰暑月病甚則傳腎肝為痿厥四技如火或如冰心煩仲景曰寒氣客脈不通氣因鳴動應手起關元隨腹直上疝瘕遺溺脅支滿煩女子絶孕動氣在上下左右不可發汗與下合此數條觀之沖脈既為十二經之海而下為血海又與督脈為十二經之道路及與任脈陽明脈會於氣街則督任二脈皆可謂之衝故古人不分衝任督而總名曰太衝如經云廣明之後即為太衝是也說太衝云者以一身為精氣上升言之不止為血海言之也然衝任督雖同起下極畢竟三脈分行故衝則獨主血海而其所以主血海以其為先天精氣之主能上灌諸陽下滲諸陰以至足跗故其治常在血海也若陰陽和而精氣足則陽和之精升運於一身之間自然無病稍有不調必逆而上僭而其為病一曰寒逆陽不足也脈來中央實堅徑至關尺寸俱牢直上直下症見胸中寒少腹痛中滿暴脹疝瘕遺溺脅支滿煩女子絶孕宜理中湯去白朮或加肉桂一曰火逆陰不足也脈來陰陽俱盛兩手脈浮之俱有陽沉之俱有陰症見咳唾躁熱上搶心眩仆四肢如火心煩恍惚癡狂宜加味補陰丸此等脈症皆衝之病仲景以動氣在上下左右俱不可發汗與下者凡以衝氣逆則陰精虛陰精虛則陽氣竭故不可汗下也況乎發汗與下必右犯肺左犯肝上犯心下犯腎諸經皆受害矣犯肺則奈何汗之氣躁而逆故衄渴苦煩氣隔飲水即吐下之津液內渴而不下故咽燥鼻乾頭眩心悸皆衝氣犯肺肺受其害所見之症也宜五苓散犯肝則奈何汗之傷血而引肝上逆故頭眩汗不出筋惕肉潤下之傷氣故腹內拘急食下動氣反劇身雖有熱臥則欲踡皆衝氣犯肝肝受其害所見之症也宜防風白朮牡蠣湯犯心則奈何汗之氣逆上衝正在心端下之掌握熱煩身上浮冷熱汗自泄欲得水自灌皆衝氣犯心心受其害且汗下則心液泄故見如是等症也宜甘李根湯犯腎則奈何汗之必寒起無汗心中大煩骨節苦疼目暈惡寒食則反吐谷不能進下之腹脹滿卒起頭暈食則清谷不化心下痞皆衝氣犯腎腎受其害腎主五液汗下則五液耗故見如是等症也宜大橘皮湯以是知衝不治則血海治臍之上下左右皆無犯而病自愈也此則仲景之微旨促景之良法也然其氣實起於少陰發於厥陰若三陰之開合失職則本原之真水真火兩虛而為患種種必犯於衝經言衝病傳肝腎而為痿厥者三陰之患犯衝則又不止於痿厥二症為衝之自致矣奇經八脈總說瀕湖曰凡人身有經脈絡脈直行曰經旁支曰絡經幾十二手三陽三陰足三陽三陰是也絡凡十五十二經各有別絡而脾又有大絡並任督二絡為十五也共二十七氣相隨上下如泉之流不得休息故陽脈營於五臟陰脈營於六腑陰陽相貫莫知其紀終而復始其流溢之氣入於奇經轉相灌輸內溫臟腑外濡腠理奇經凡八脈不拘制於十二正經無表裡配合故謂之奇說正經猶溝渠奇經猶湖澤正經之脈隆盛則溢於奇經故秦越人比之天雨降下溝渠溢流湖澤此發靈素末發之祕也八脈散在群書者可考而悉也沖脈經行諸穴內經曰衝為經脈之海又名血海其脈與任脈皆起於少腹之內胞中其浮而外者起於氣衝一名氣街在少腹毛中兩旁各二寸橫骨兩端動脈宛宛中足陽明穴也並足陽明少陰二經之間循腹上行到橫骨足明去中行二寸少陰去腹中行五分沖脈行於二經間橫骨在陰上橫骨中宛如半月去腹中行一寸半夾臍左有各五分上行歷太赫橫骨上一寸氣穴即胞門太赫上一寸少陰沖脈之會四滿氣穴上一寸中注四滿上一寸肓哄中注上一寸商曲肓哄上一寸石關商曲上一寸陰都石關上一寸通谷陰都上一寸幽門通谷上一寸凡二十四穴脈法脈經曰兩手脈浮之俱有陽沉之俱有陰陰陽皆盛此衝督之脈也衝督之脈為十二經之道路也衝督用事則十二經不復朝於寸口其人苦恍惚狂癡又曰脈來中央堅實徑至關者沖脈也又曰尺寸俱牢直上直下此乃沖脈胸中有寒疝也沖脈經行原委靈樞曰衝任皆起胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血月下數脫血任衝並傷脈不榮其唇口故髭鬚不生宦者去其宗筋傷其沖脈血寫不復皮膚內結唇口不榮故須亦不生天宦不脫於血而任衝不盛宗筋不強有氣無血唇口不榮故鬚亦不生又曰沖脈者五臟六腑之海也其上者出於頏顙滲諸陽灌諸精其下者注於少陰之大絡起於腎下出於氣街循陰股內廉斜入膕中伏行肝骨內廉並少陰之經下入內踝之後入足下其別者並於少陰滲三陰斜入踝伏行出屬跗下循跗上入大指之間滲諸絡而溫足脛肌肉故其脈常動別絡結則跗上不動不動則厥厥則寒矣內經曰三陰之所交結於腳也踝上各一行者此腎脈之下行也名曰太衝王啓玄曰腎脈與沖脈並下行循足行而盛大故曰太衝一云沖脈起於氣街街直而通故謂之衝又曰心臟在南故前曰廣明沖脈在北故後曰太衝足少陰腎與沖脈合而盛大故曰太衝兩脈相合為表裡也沖脈在脾之下故曰其衝在下名曰太陰沖脈相通諸經王海藏曰手少陰三焦相火為一腑右腎命門為相火心包主亦名相火其脈同診腎為生氣之門出而治臍下分三岐上衝夾臍過天樞上至膻中兩乳間元氣所係焉又足三焦太陽之別並足太陽正路入絡膀胱約下焉三焦者從頭至心心至臍臍至足為上中下三焦其實真元一氣也故曰有臟無腑脈訣云三焦無狀空有名寄在胸中膈相應一云其腑在氣街中上焦在胃上口治在膻中中焦在胃管治在臍旁下焦在臍下膀胱上口治在臍經曰原氣者三焦之別使也腎間動氣者真原一氣分為三路人之生命也十二經之根本也瀕湖曰三焦即命之用與衝任督相通者人身四海內經曰海有東西南北人亦有四海以應之胃者水谷之海其輸上在氣街下至三裡沖脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉膻中者為氣之海其輸上在於柱骨之上下前在人迎腦為髓之海其輸上在於說下在風府氣海有餘氣滿胸中挽息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足常想其身小狹然不知其所病水谷之海有餘則腹滿水谷之海不足則飢不受食髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥中病症治內經曰治痿獨取陽明者何也陽明者五臟六腑之海也主宗筋宗筋主束骨而利機關沖脈者經脈之海主滲灌溪谷與陽明合於宗筋會於氣街而陽明為之長皆屬於帶脈絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用治之當各補其營而通其哄調其虛實和其逆順筋脈骨肉各以其時受月則病已謂肝甲乙心丙丁脾戊己王氣法時月也李東垣曰秋冬之月胃脈四道為沖脈所逆脅下少陽脈二道而反上行名曰厥逆其症氣上沖咽不得息而喘息有音不得臥宜調中益氣湯加吳萸五分隨氣多少用之夏月有此乃大熱之症用黃連黃柏知母各等分酒洗炒為末白湯和丸每服一二百丸空心白湯下即以美膳壓之不令停留胃中直至下元以瀉沖脈之邪也說此病隨四時寒熱溫涼治之又曰凡氣上衝或兼裡急或作躁熱皆沖脈逆也若內傷病此宜補中益氣湯加炒黃連黃柏知母以泄沖脈又曰凡腎火旺及任督沖三脈盛者宜用酒炒黃柏知母亦不可久服恐妨胃也又曰凡腹中刺痛或裡急宜多用甘草或虛坐而大便不得者皆屬血虛血虛則裡急宜用當歸又曰氣逆裡急膈咽不通大便不行者宜升陽瀉熱湯主之又曰麻木厥氣上衝逆氣上行妄聞妄見者宜神央丸主之又曰暑月病甚則傳腎肝為痿厥痿乃四肢痿軟厥乃四肢如火或如冰心煩沖脈氣逆上甚則火逆名曰厥故痿厥二病多相須也經曰下氣不足則痿厥心悗宜以清燥去濕熱之藥或生脈散合四苓散加酒洗知柏以泄其濕熱李瀕湖曰濕熱成痿乃不足中之不足也全要峻補之藥千金方曰咳唾手足厥逆氣從小腹上衝胸咽其面翕熱如醉因復下流陰股小便難時復冒者寸脈沉尺脈微宜茯苓五味子湯以治其氣衝胸滿者去桂治沖病諸藥要品及方十三沖逆宜降氣泄熱陳皮當歸沉香木香吳茱萸黃耆地黃檳榔白朮川黃連黃岑黃柏知母理中湯寒逆加味補陰丸火逆黃柏知母各四兩牛膝杜仲巴戟熟地山萸各三兩蓯蓉茯苓杞子遠志山藥鹿茸龜板各二兩蜜丸鹽湯下八九十丸此方補陰虛瀉陰火五苓散右動防風白朮牡蠣散左動防風白朮牡蠣粉等分每末二錢酒或米飲下日二三服此方專治動氣誤發汗筋惕肉瞤者甘李根湯上動李根皮五錢桂枝錢半當歸白芍茯苓黃岑各一錢半夏甘草各五分薑三片大橘皮湯下動陳皮三錢竹茹二錢人參甘草各一錢薑五片棗三枚調中益氣湯厥逆黃耆二錢人參蒼朮炙甘草各一錢陳皮升麻柴胡各四分木香二分水煎服補中益氣湯內傷黃耆人參當歸白朮陳皮甘草升麻柴胡升陽瀉熱湯氣衝柴胡陳皮升麻赤苓枳殼香附甘草白芍神央丸又生脈散燥熱人參麥冬五味子四苓散又茯苓豬苓白朮澤瀉茯苓五味子湯氣逆茯苓五味子各二錢肉桂甘草各一錢任脈病源流任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目此與沖脈主身前之陰古人以任脈為陰沉之海以其起於中極之下會陰也按其脈之所到既上中極即與足厥陰太陰小陰之脈並行循關元歷石門氣海又會足少陽沖脈於陰交歷建裡再會手太陽少陽足陽明之脈於中脘以上喉嚨再會陰維之脈於天突廉泉至目下之中央承泣而終是任脈固起於真陰而陰無陽不生猶地之統於天而地氣之上通必由天氣之下降兩相濟而後能通不然竅陰沍寒必至成痞閉也人身之有天癸乃天之元氣降則為精氣以充於地則真陰自生既生而漸至於充然後地氣通太沖脈由是始旺月事以時下而易於有子若無子者必其任脈虛以致中衰血竭地氣不通故也然而真陰最難充滿非年歲既至谷氣充實天元必不堅定故天癸亦不至然則真陰之盛有不由於真陰之實者乎經曰年四十而陰氣自半言乎陽極而衰為陰所襲故曰陰半說此陰已為竅陰非真陰也此雖真陰衰實真陽衰也故任脈為病非陰之自病實由於陰中無陽如經云男子內結七疝女子帶下瘕聚皆原結陰之故耳若經又云脈來丸丸橫於寸口者為任脈此脈已為陰氣所襲故動苦少腹繞臍下引橫骨陰中切痛宜奪命丹一捏金散又苦腹中有氣如指上搶心拘急不得俯仰也宜木香順氣散和氣湯則此雖為無陰之症何莫非無陽之症乎所謂真陰之盛必由於真陽之實益可見矣任脈經行諸穴脈經曰任為陰脈之海其脈起於中極之下少腹之內會陰之分在兩陰之間上亍而外出循曲骨橫骨上毛際陷中上毛際至中極臍下四寸膀胱之募同足厥陰太陰少陰並行腹裡循關元臍下三寸小腸之募三陰為任脈之會歷石門即丹田一名命名在臍下二寸三焦之募氣海臍下一寸半宛宛中男子生氣之海會足少陽沖脈於陰交臍下一寸當膀胱上口三焦之募循神闕臍中央水分臍上一寸當小腸下口會足太陰於下脘臍上二寸當胃下口歷建里臍上三寸會手太陰少陽足陽明於中脘臍上四寸胃之募也上上脘臍上五寸巨闕鳩尾下一寸心之募也鳩尾蔽骨下五分中庭膻中下一寸六分陷中膻中玉堂下一寸六分玉堂紫宮下一寸六分紫宮華說下一寸六分華說璇璣下一寸璇璣天突下一寸上喉嚨會陰維於天突廉泉天突在結喉下四寸宛宛中廉泉在結喉上舌下中央上頤循承漿與手足陽明督脈會唇下陷中環唇上至下齦交復出分行循面系兩目下之中央至承泣而終目下七分直瞳子陷中二穴凡二十七穴按難經甲乙經卻無循曲以下之說脈法脈經曰寸口脈來緊捆實長至關者任脈也又曰橫寸口邊脈丸丸者任脈也任病源由症治楊氏曰任者妊也此是人生養之本故曰任脈起中極之下內經曰女子二七而天癸至任脈通太沖脈盛月事以時下七七任脈虛太沖脈衰天癸竭地道不通故形壞而無子又曰上月音者治其缺盆中鰲按此言治謂針炙之也與脈經言動苦少腹繞臍下引橫骨陰中切痛取關元穴治之之治同靈樞曰缺盆之中任脈也名曰天突其側動脈人迎足陽明也瀕湖曰任沖之別絡名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔治任病方四奪命丹陰襲吳萸一斤一分酒浸一分醋浸一分童便浸一分白湯浸並焙乾澤瀉二兩酒面糊丸空心鹽湯下此方兼治奔豚疝氣上沖小腹引痛一捏金散又延胡索川楝肉全蠍茴香每末二錢酒下此方亦治奔豚疝氣上衝及小腸氣臍腹大痛木香順氣散氣痛木香香附檳榔青皮陳皮厚朴蒼朮枳殼砂仁炙草和氣湯又木香紫蘇檳榔陳皮半夏香附青皮甘草乳香沒藥七疝源流七疝任脈病也經曰任脈為病男子內結七疝女子帶下瘕聚七疝者狐沖㿗厥瘕㿉癃㿉是也凡內外邪所感皆能使陰陽不和陰偏勝則寒氣衝擊陽偏勝則熱氣內壅皆致任脈為疝而肝則佐任脈以生化者故疝病原於任必及於肝若專主肝而不及任背內經矣非也專主任而不及肝昧乎病之源流矣亦非也說疝病在中極之中少腹之間總諸陰之會而上於關元無不由任脈為之以任總諸陰之所聚也乃其症或由於熱或由於寒或由於勞或由於虛而犯陰傷筋則同故其病皆在陰其傷皆在筋其動為風其聚如山所以有疝之名也經又曰少陰脈滑病肺風疝太陽脈滑病腎風疝少陽脈滑病肝風癌歷觀經旨雖各經皆病非俱從任脈起然各經所受之邪必與任脈相犯故心肝脾肺腎五經皆統系之曰疝言風者肝心陽氣為風任之陰氣為疝肝既佐任以生化故病必相及而以風與疝並稱也惟肝佐任故其病曰少陽有餘病筋痺肝風疝者此少陽之相火犯陰傷筋而動肝木之風因聚肝而為疝也太陽與腎風寒合邪傷陰而聚於腎故腎亦有疝又厥陰位下焦總諸筋其氣壅而不升則亦病疝故經有厥陰有餘病陰痺滑則病狐風疝之語總之內外邪所感攻於臟腑則為腹中之疝會於陰器則為睪丸之疝正自有辨士材云疝之為病受熱則腹內牽引作痛受濕則腫脹纍垂虛亦腫墜血分不移氣分多動睪丸有兩左屬水生肝木木生心火三者皆司血統納左之血者肝也右屬火火生脾土土生肺金三部皆司氣統納右之氣者肺也是故諸寒收引則泣而歸肝下注於左丸諸氣憤鬱則濕聚而歸肺下注於右丸且睪丸所絡之筋非盡為厥陰太陰陽明之筋亦入絡也故患左丸者痛多腫少患右丸者痛少腫多其論甚確可據而依也試詳七疝之症經曰從少腹上沖心而痛不得前後為沖疝說既上沖心又二便不通能上而不能下也宜木香散經又曰肝所生病為狐疝說上抵少腹下環陰器皆肝部分受疝之處一切疝病非肝木受邪即肝自病狐疝乃其自病曰狐者以出入不常也宜二香丸蜘蛛散經又曰三陽為病發寒熱其傳為㿗疝說三陽者小腸膀胱膽也小腸膀胱皆在下體膽與肝為表裡故皆能致疝曰㿗者丸腫大如升如斗頑㿗不仁也宜蠲痛丸楊氏麝香丸茱萸內消丸金鈴散若木腎則不痛另詳前陰條內經又曰黃脈之至也大而虛積氣在腹中有厥氣名曰厥疝說肝木乘脾故大而虛肝木主上升怒則氣上逆曰厥者脾受肝邪氣逆有積也宜蟠葱散烏頭桂枝湯四神丸經又曰脾傳之腎病名疝瘕少腹冤熱而痛出白說脾受肝邪又傳於腎則脾失運化之常入遇寒水之臟則留而成形曰瘕者狀如黃瓜是也氣不得申曰冤宜二香丸加味通心飲丹溪云陽明受濕熱傳入太陽發熱惡寒小腹悶痛此亦疝瘕之屬宜沈氏散瘕湯經又曰足陽明之筋病㿉疝腹筋急又曰肝脈滑甚為㿉疝說以肝木乘胃故既曰陽明之病又曰肝之病也曰㿉者以必裡膿血甚則下膿血也宜橘核丸橘核散荔枝橘核湯經又曰脾脈微大為疝氣滑甚為㿉癃又曰腎脈滑甚為㿉癃說以內裡膿血外小便祕由脾邪傳腎之故也宜加味通心散加味通心飲此內經七疝有可考而得之者也後張氏又立寒筋血氣狐水㿉七名內惟狐疝一名與內經同然其言症則主寒濕下注囊中宜丁香楝實丸四炒川楝丸亦或由於痰飲下注宜二陳湯加青皮香附蒼朮名雖同而實與內經肝自為病之旨有異至其曰寒疝則囊冷結硬如石陰莖不舉或控睪丸而痛此說得之坐臥濕地或寒月涉水或值雨雪或坐臥風冷也宜青木香丸當歸四逆湯其曰水疝則囊腫痛或腫如水晶或濕癢出黃水或按小腹有水聲此說得之於飲水醉酒入內適遇風寒之氣聚於囊中也宜腰子散祕傳茱萸內消散其曰筋疝則陰莖腫脹或下膿裡急筋縮或莖中痛痛極則癢或挺縱不收或隨溲下白物如精此說得之次房勞及邪朮所使也宜加減柴苓湯龍膽瀉肝湯其曰血疝則狀如黃瓜在小腹兩旁橫骨兩端約紋中俗名便癰者此說得之盛暑入房氣血滲入脬囊留而不去結成癰腫膿少血多或情欲太濃當泄不泄所致也宜復元通氣散神聖代針散其曰氣疝則上連腎哄下及陰囊偏墜而痛或不痛此說得怒號哭氣鬱而脹號怒罷氣即散者是也宜氣疝飲聚香飲子其曰㿉疝則陰囊如升斗不癢不痛者是此說得之地氣脾濕故江淮間多有之女人陰戶凸出亦名㿉疝小兒亦有生成如此者乃胎中宿疾然而㿉疝不一有玉莖腫硬引臍絞痛甚則陰縮肢冷囊上生瘡名曰卵㿉出水不止者死有素多濕熱因怒激火昏眩手搐面黑睪丸能左右相過名曰氣㿉者而膀胱氣名曰水㿉小腸氣名曰腸㿉此四者皆㿉疝也治之之法同宜橘核丸橘核散天台烏藥散總之後世之人嗜欲紛而病日多即疝氣一症有不止於內經名目者故張氏增立七疝實足補內經之未備茲因按其名而詳參症治庶醫者不至臨時束手若巢氏強分厥癓寒氣盤胕狼自附內經之七疝則適見其支離矣曾何益於經旨乎且經以疝症屬肝任理固然已而猶有未盡者必其人腎虛寒濕邪乘虛客之遂成疝病丹溪謂與腎經絶無相干者誤也設使精氣充實安得有疝故有此病者補氣通腎氣除濕宜人參黃耆橘核合歡子荔枝核川楝子牛膝木瓜杜仲萆薢巴戟若陰虛有熱兼宜清熱宜生地石斛虛寒而痛必溫腎宜小茴仙茅補骨脂虛熱而痛必清火宜黃柏車前子濕盛必除濕宜茯苓蒼朮若夫先因濕邪為病後成濕熱者用藥亦宜分寒熱先後二途此疝由於腎又所宜知也丹溪又云睪丸連小腹急痛或有形或無形或有聲或無聲人皆以為經絡得寒收引而痛不知八始於濕熱壅遏又因此感濕熱被鬱故作痛也宜枳實桃仁山梔吳萸山查生薑以治之濕勝成㿗疝加荔枝痛甚加鹽炒大茴香痛處可按加桂枝丹溪此言更足備前人未備之旨此外又有奔豚疝氣少腹控睪而痛上沖心腹者夫奔助本腎之積也今曰奔豚疝氣乃其入素有腎積復因傷寒之邪沖突下焦致其發動如江豚之奔沖皆由真氣內虛水結不散氣與之搏故發奔豚雖有當表當攻之症然切不可汗下丹溪謂宜用理中湯加肉桂赤茯苓去白朮主之又謂桂能泄奔豚茯苓能伐腎邪若白朮助土剋水燥腎閉氣是以去之言誠是也宜奪命丹胡蘆巴丸一捏金散有受寒重腹痛裡急者宜當歸羊肉湯有因虛而成疝痛按之少減者宜烏頭梔子湯加桂枝薑糊丸以川烏治外束之寒山梔子治內鬱之熱也有疝氣久不愈者宜木香楝子散種種諸疝病其由來既各不同而其為症亦自有異能依法治之曷引瘳歟脈法內經曰心脈搏滑急為心疝肺脈沈搏為肺疝腎脈肝脈大急沉皆為疝又曰肝脈滑甚為㿉疝心脈微滑為心疝腎肝滑甚為癃㿉又曰脈急者曰疝瘕小腹痛又曰三陽結為癃三陰急為疝注云太陽受寒血聚為瘕太陰受寒氣聚為疝脈訣曰疝脈弦急積聚在裡牢急者生弱急者死沉遲浮澀疝瘕寒痛痛甚則伏或細或動正傳曰寸口脈弦而緊弦緊相搏則為寒疝入門曰內經皆以滑脈為疝脈經曰疝瘕積聚脈弦急者生虛弦小者死疝病原由症治靈樞曰疝者寒氣結聚之所為也內經曰病在小腹腹痛不得大小便名曰疝得之寒又曰小腹控睪引腰脊上衝心甚出清水及為噦噫邪在小腸也丹溪曰疝者睪丸連小腹急痛也有痛在睪丸者有在五樞穴邊者皆足厥陰之經也自素間以下皆謂之寒豫思之此病始於濕熱在經鬱而至久又感寒氣外束故痛若只作寒論恐為末備人有踢冰涉水終身不病此者無熱故也說大怒則火起於肝醉飽則火起於胃房勞則火起於腎火積久母能生子虛濕氣便盛厥陰肝木其性急速火性又暴為寒所束宜其痛之太暴也有以烏頭梔子湯服之其效亦敏然濕熱又須分多少而治濕甚腫多㿉病是也又曰疝痛屬濕熱痰積注下作病因寒有而發也又曰疝痛之症或因風寒外襲或因怒氣上衝小腹作痛上連脅肋甚則搐搦反張咬牙戰掉冷汗交流須臾不救綱目曰疝名雖七寒疝即疝之總名也水疝即㿉疝之屬氣疝即狐疝之屬血疝即癰癤之屬惟筋疝罕見之亦下惡瘡之屬也又曰小腹痛有三肝病小腹引脅痛小腸病小腹引睪丸腰脊痛膀胱病小腹痛腫不得小便直指曰疝之為病外腎小腹作痛或攻刺腰脅或走游背膂或冷氣搶心或手足厥冷有壯熱惡寒者有灑淅寒熱者有不得大小便者有下泄者有自汗者有積聚如杯如臂如盤如桃李其於陰間則卵有大小而上下不常囊有腫脹而痛止無定挾冷觸怒則塊物上衝心胸心平氣和則塊物歸入囊中又曰治法大要以流行疏利為先毋曰腎虛得病不敢疏泄說腎為邪氣所乾若不逐去病根病何由愈倘或姑息補住使大小便祕而不通邪氣入腹衝心危殆必矣又曰甚或挾虛而發脈不甚沉緊而豁大無力者是也其痛亦輕惟沉重墜牽引耳當以朮為君疏導藥佐之疏導即桃仁山查枳實梔子茱萸川楝玄胡索丁香木香之類是也又曰諸疝以手按之大痛者為實不痛者為虛又曰惟是逆氣長噓中脘停酸躁悶煩擾甚至嘔吐最為惡候說脾土不濟腎水上乘必為酸汁或為痰涎遂成暴吐大小二便關格閉塞而腎汁胃汁皆自其口出也如此者大抵不救方廣曰疝症古方用辛溫以散之是治其標也丹溪以為痰飲食積死血流注歸於肝經用辛平以豁痰消積去瘀是治其本也夫疝痛有定處是有形之積也非痰食血相聚而何若無形之氣則走注滿腹流散遍體矣本事曰此雖因虛而得不可以虛驟補經云邪之所湊其氣必虛留而不去其病即實故必先滌去所畜之邪然後補之諸藥多借巴豆氣者說謂此也入門曰四氣七情疝通用五苓散說豬苓澤瀉分陰陽以和心小腸白朮利腰臍間濕與死血茯苓利膀胱水木得桂則活用以伐肝木又曰通治宜胡蘆巴丸又曰疝病虛甚上為嘔吐下有遺精者危正傳曰劫疝痛藥烏頭梔子並炒研細順流水入薑汁調服梔子以降濕熱烏頭以破寒鬱皆下焦之藥而烏頭為梔子所引其性急速不容胃中停留也又方桂枝山梔炒川烏薑炒薑汁糊丸薑湯下三四十丸大能劫痛三因曰凡疝病非痛斷房事與厚味不可用藥疝痛導引法類聚曰坐舒兩腳以兩手捉大拇指使足上頭下極挽五息止引腹中氣遍行身體去疝瘕病又導引保生祕要曰用手緊鼎幽闕納氣數口而緊緊頂閉納之立效運央保生祕要曰因欲火積滯外腎復感冷氣故作脹痛不可勝言注意從外腎提氣到內腎右運二七遍即從內腎想一火提到頂門外略凝而後行吹吸之法治七疝方三十七木香散衝疝木香陳皮乾薑良薑訶子枳實川芎草蔻仁黑牽牛蜘蛛散狐疝蜘蛛十四枚微炒肉桂五分每服用一錢二香丸又木香香附各三兩查肉二兩三棱醋炒蓬朮醋炒薑黃南星各一兩黃連與吳萸同炒蘿卜子橘核桃仁山梔各五錢薑汁糊丸蠲痛丸㿗疝元胡索一兩川楝肉茴香各五錢白丑頭末當歸良薑青皮木香烏藥各二錢半全蠍七個薑汁糊丸燒棉灰調酒送下三五十丸此方兼治小腸氣膀胱氣一切疝痛楊氏麝香丸又木香胡椒各一兩全蠍巴霜各四錢麝香一錢蒸餅丸麻子大朱砂為衣熟水下五七丸此方無麝香即神保元此方能尋諸處痛凡膀胱氣脅下痛最難治此藥主之茱萸內消丸又山萸吳萸川楝子馬蘭花大茴香青皮陳皮山藥肉桂各二兩木香一兩酒湖丸酒下五十丸此方治腎虛寒疝偏墜引痛奔豚痃癖等症金鈴散又川楝肉三十枚切片巴豆肉三十枚切片同炒色焦去巴豆茴香炒等分再入木香一錢半每末二錢水酒各半煎蔥白湯沖服此方兼治膀胱小腸氣腫痛蟠蔥散厥疝蒼朮甘草各一錢三棱蓬朮茯苓青皮各七分丁香皮砂仁檳榔各五分延胡索肉桂乾薑各三分共為粗末加蔥白一莖煎此方專治脾胃虛冷心腹攻刺連胸脅膀胱小腹腎氣作痛烏頭桂枝湯又大川烏一個蜜一盞同煎減半取出炒肉桂白芍各三錢三分甘草二錢半分作二貼入薑三片棗二枚及前蜜煎去烏頭代附子名蜜附湯此方專治風寒疝氣入腹刺痛陰縮手足逆冷四神丸又吳萸醋灑各半分浸焙蓽澄茄青木香各五錢香附一兩糊丸鹽湯下加味通心飲疝瘕瞿麥木通梔子黃芩連翹枳殼甘草川楝子各一錢燈心二十長莖車前草五葉此方兼治小腸疝氣熱痛小便不通沈氏散瘕湯又桃仁枳實山梔山楂澤瀉木通赤苓此餘自製方也用治疝瘕及小腸膀胱氣痛不得小便者無不效荔枝橘核湯㿉疝荔枝橘核桃仁甘草茯苓白朮枳殼山楂延胡索橘核丸又炒橘核鹽酒炒海藻鹽酒炒昆布鹽水洗海帶麩炒桃仁炒川楝子各一兩酒炒延胡索厚朴枳實肉桂木香木通各五錢酒糊丸酒或鹽湯下六七十丸久不消加醋炒硼砂二錢此方治四種㿉疝卵核腫脹偏有大小或硬如石或少腹絞痛甚則囊腫潰爛出黃水此方治四種㿉疝之久者橘核散又橘核一錢半桃仁十五枚山梔子一錢川烏吳萸各五分各炒為粗末煎橘核單止痛烏頭散寒鬱山梔除濕熱又引烏頭速下不令胃中停留用之甚捷此方亦治四種㿉疝腫痛此方治四種㿉疝之新者二方各別加味通心散㿉癃木通山梔連翹黃芩甘草瞿麥枳殼歸尾桃仁山楂川楝燈心車前草丁香楝實丸狐疝當歸附子川楝肉茴香各一兩右銼好酒三升煮乾焙為末每藥末一兩入丁香木香各二錢全蠍十三個延胡索一兩上並為末與前末拌勻酒糊丸空心酒下百丸凡男子七疝女子帶下皆屬於風全蠍治風聖藥川楝茴香皆入小腸經當歸延胡和血止痛疝氣帶下皆積寒邪在小腸之間故以附子佐之丁香木香為引導也四炒川楝丸又川楝肉一斤作四分一用麩皮一合班貓四十九枚炒黃一用麩皮一合巴戟一兩炒一用麩皮一合巴豆四十九粒炒一用鹽一兩茴香一合炒並以麩皮黃色為度只取川楝肉再加木香破故紙各一兩酒糊丸每五十丸鹽湯下日三服此方兼治一切疝氣腫痛縮小久服斷根二陳湯又茯苓陳皮半夏甘草青木香丸寒疝黑丑頭末三兩補骨脂蓽澄茄檳榔各二兩青木香一兩水丸鹽湯下當歸四逆湯又當歸一錢二分附子肉桂茴香各一錢白芍柴胡各九分延胡索川楝子茯苓各七分澤瀉五分腰子散水疝黑丑白丑並炒等分取頭末豬腰子批開入藥末三錢川椒五十粒小茴香百粒以牽牛末遍摻之濕紙包扎好煨令香熟空心溫酒嚼下取下惡物便愈祕傳茱萸內消散又吳萸半酒半醋浸一宿焙山萸馬蘭花醋浸焙川楝肉肉桂黑丑頭末鹽炒茴香延胡索去白青皮去白陳皮海藻白蒺藜桃仁大香各五錢酒糊丸鹽湯或酒下此方專治陰㿉偏大或生瘡出黃水加減柴苓湯筋疝柴胡澤瀉各一錢半夏赤苓豬苓白朮山楂山梔荔枝核各七分無荔枝核以橘核代之此方兼治諸疝因濕熱腫痛出水龍膽瀉肝湯又龍膽草柴胡澤瀉各一錢車前子木通赤苓酒洗生地酒拌當歸山梔黃芩甘草各五分復元通氣散血疝白丑頭末二兩茴香穿山甲各兩半去白陳皮延胡索炙甘草各一兩木香五錢每末二錢酒或薑湯下神聖代針散又乳香沒藥當歸白芷川芎製芫青各一錢共為末每服一分甚者五分先點好茶一盞次糝藥末在茶上不得吹攪立地細細呷之此方兼治諸疝剌痛氣疝飲氣疝黃連以吳萸煎水浸炒二錢人參白朮各一錢白芍陳皮各七分甘草三分薑三片聚香飲子又乳香沉香檀香木香藿香丁香各八分薑黃烏藥桔梗肉桂甘草延胡索各四分薑三棗二此方專治七情所傷結成疝氣天台烏藥散㿉疝川楝子十個將巴豆十四粒同麩炒黑色去麩豆烏藥木香茴香良薑青皮各五錢檳榔三錢每末一錢酒下痛甚炒薑熱酒下理中湯奔豚奪命丹又吳萸一斤作四分一酒浸一醋浸一白湯浸一童便浸並焙乾澤瀉二兩酒糊丸鹽湯空心下一名四製茱萸丸胡蘆巴丸又白丑頭末茴香各二兩川烏巴戟肉吳萸各兩半川楝子胡蘆巴各一兩酒糊丸空心酒下二三十丸一捏金散又延胡索川楝肉全蠍茴香每末二錢熱酒下神效此方兼治小腸氣臍腹痛當歸羊肉湯寒痛羊肉一斤生薑五兩當歸二兩水八升煮三升每服七合日三服烏頭梔子湯因虛川烏頭末山梔子木香楝子散久疝石菖蒲青木香荔枝核萆薢川楝子每末二錢入麝少部茴香炒鹽用熱酒沖調下督脈病源流督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海其別與厥陰脈同會於巔此主身後之陽人身陰陽原氣皆起於下經曰廣明之後即為太衝太衝之地屬之少陰少陰之前乃為厥陰其部有血海嘗與太衝騰精氣而上灌滲陰陽可知元氣固起於下精氣亦起於下矣嘗按精氣之自下而上也實分三道其陽者起胞中從少陰之後行太陽夾脊之中道上巔歷百會都庭以統宗諸陽其名曰督其陰者起中極之下胞中由前陰地道而上行陽明之表中循關元歷承漿上與督脈會以統宗諸陰其名曰任其中央一道起胞中循血海騰精氣而上上行伏臍積於胸中為宗氣以司呼吸會於咽喉其名曰衝是三脈者同起於胞中一源而三歧故古人統三者而總名之曰太衝且三者之氣與陽明胃氣同住中州亦與營俱行於十二經故三者之氣能貫於一身也而督之所以為督從可識矣楊氏曰督之言郵也是人陽脈之都綱呂氏亦曰陽脈之海下極者長強也長強乃督脈之別名下極者尾骶骨也以其循脊上項散頭故實則脊強而厥虛則頭重夫脊強者五痓之總名其症卒口噤背反強而瘛瘲也而督之所以為病又從可識矣督脈經行諸穴內經曰督乃陽脈之海其脈起於腎下胞中至於少腹乃下行於腰橫骨圍之中央係溺孔之端男子循莖下到篡女子絡陰器合篡間俱繞篡後屏翳穴前陰後陰之間也別繞臀至少陰與太陽中絡者合少陰上股內由會陽在陰尾尻骨兩旁凡二穴貫脊會於長強穴在骶骨端與少陰會並脊裡上行歷腰哄二十一椎下陽關十六椎下命門十四椎下懸樞十三椎下脊中十一椎下中樞十椎下筋縮九椎下至陽七椎下靈台六椎下神道五椎下身柱三椎下陶道大椎下大椎一椎下與手足三陽會合上門項後入發際五分會陽維入係舌本上至風府項後入發際一寸大筋內宛宛中會足太陽陽維入腦中循腦戶枕骨上強間百會後三寸後頂百會前一寸半上巔歷百會在頭中央旋毛中前頂百會前一寸半囟會百會前三寸即囟門上星囟會前一寸至神庭囟會前二寸直鼻上入發際五分為足太陽督脈之會循額中至鼻柱經素髎鼻準頭也水溝人中也會手足陶明至兌端唇上端入齦交上齒縫中與任脈足陽明交會而終凡三十一穴督脈別絡自長強走任脈者由小腹直上貫臍中央上貫心入喉上頤環唇上係兩目之下中央會太陽於目內眦睛明穴見陰蹻下上額與足厥陰同會於巔入絡於腦又別自腦下項循肩胛與手足太陽少陽會於大杼第一椎下兩旁去脊中一寸五分隱中內挾脊抵腰中入循膂絡腎脈法脈經曰尺寸俱浮直上直下此為督脈腰脊強痛不得俯仰大人癲病小兒風癇又曰脈來中央浮直上下動者督脈也動苦腰背膝寒督病原由症治靈樞曰頭中央之脈督脈也名曰風府內經曰風氣循風府而上則為癲癇風入腦則為風目眼寒注云腦乃督脈足太陽之會故也又曰督脈生疾從小腹上衝心而痛不得前後為衝疝女子不孕癃閉遺溺嗌乾治在骨上謂橫骨上毛際中曲骨穴甚者在臍下營臍下一寸陰交穴注云此乃任衝二脈之病不知何以屬之督脈李厥明云督脈雖行於背而別絡自長強走任脈者則由小腹直上貫臍中貫必入喉上頤環唇而入於目之內眦故顯此諸症王注說未深考爾又曰督脈實則脊強反折虛則頭重難經曰督脈為病脊強而厥海藏云此病宜用羌活獨活防風荊芥細辛藁本黃連大黃烏頭附子蒼耳子之類張潔古曰督者都也為陽脈之都綱任者妊也為陰脈之妊養王海藏曰陰蹻陽蹻同起跟中乃氣並而相連任脈督脈同起中極之下乃水溝而相接滑伯仁曰任督二脈一原而二歧一行於身之前一行於身之後人身之有任督猶天地之有子午可以分可以合分之見陰陽之不離合之見渾淪之無間一而二二而一者也李瀕湖曰任督二脈人身之子午也乃丹家陽火陰符升降之道坎水離火交媾之鄉魏伯陽參同契云上閉則稱有下閉則稱無無者以奉上上有神德居此兩孔穴法金氣亦相須崔希范天元入藥鏡云上鵲橋下鵲橋天應星地應潮歸根竅復命關貫尾閭通泥丸大道三章直指云修丹之士身中一竅名曰玄牝正在乾之下坤之上震之西兌之東坎離交媾之地在人身天地之正中八脈九竅十二經十五絡聯輳虛間一穴空懸黍珠醫書謂之任督二脈此元氣之所由生真息之所由起修丹之士不明此竅則真息不生神化無基也哄琰注參同契云人身血氣往來循環旦暮不停繄有任督二脈人能通此二脈則百脈皆通黃庭經言皆在心內運天經晝夜存之自長生天經乃吾身之黃道呼吸往來於此也鹿運尾閭能通督脈龜納鼻息能通任脈故二物皆長春此數說皆丹家河車妙旨也治督脈病諸藥要品及方四總治羌活荊芥秦艽細辛黃連附子蘇合丸強厥白朮犀角香附朱砂訶子蓽撥冰片木香檀香沉香麝香丁香安息香燻陸香蘇合香油藿香正氣散又大腹皮茯苓白芷紫蘇厚朴白朮陳皮藿香桔梗甘草川芎茶調散頭重薄荷川芎荊芥羌活白芷甘草防風細辛每末二錢食後茶清下白芷丸又白芷二兩蘿卜汁浸曬乾為末蜜丸彈子大每一丸細嚼茶清或荊芥湯下帶脈病源流帶脈橫圍於腰狀如束帶所以總約十二經脈及奇經中七脈者也按內經衝任二脈與陽明合於宗筋會於氣街皆屬於帶脈而絡於督脈則太衝所以能上養心肺者須賴帶脈之持之一身二十七氣之上下流行亦賴帶脈為之關鎖且其氣整齊堅固有以牢持於上下之間而一身之強力亦賴帶脈以出說力出於膂膂在季脅之下即帶脈所在也故經云身半以上天氣主之身半以下地氣主之中為天樞天樞在氣交之分正指帶脈而言也故人茍上而心脾抑鬱氣不運行下而肝腎虛敗真陰不榮必致停濕為熱下注於小腸血海之間其病自作矣何言之中分不運必病腹滿陰陽兩虛中分弱而不能鎮定必病腰溶溶如坐水中心脾上鬱肝腎下虛邪熱留連而為滯淫必病赤白帶陽不能勝不能固守於天樞陰氣得以襲之必病左右繞臍腰脊痛衝心腹邪客於太陰之絡必病腰痛引小腹控眇季脅下空軟處不可以養息此皆帶脈所生病也是知一身上下機關全在於帶帶不能自持其氣其症皆陷下而不上矣可不知帶之為病求其源而升降補瀉哉帶脈經行諸穴內經曰帶脈者起於季脅厥陰之章門穴在季脅骨端肋尖盡處為足厥陰足少陽二經之會同足少陽循帶脈穴在季脅下一寸八分陷中屬足少陽經圍身一周如束帶然又與少陽會於五樞帶脈下三寸維道章門下五寸三分凡八穴脈法脈經曰脈來關部左右彈者帶脈也帶病原由症治靈樞曰足少陽之正至膕中別走太陽而合上至腎當十四椎出屬帶脈注云帶脈總束諸脈使不妄行如人束帶而前垂故名婦人惡露隨帶脈而下故謂之帶下張潔古曰帶脈之病太陽主之可灸章門三壯仲景曰大病瘥後腰以下有水氣牡蠣澤瀉散主之若不已灸章門穴海藏曰小兒㿗疝可灸章門三壯而愈以其與帶脈行於厥陰之分而太陽主之也子和曰十二經與奇經七脈皆上下周流惟帶脈起少腹之側季脅之下環身一周絡腰而過如束帶狀而衝任二脈循腹脅夾臍旁傳流於氣衝屬於帶脈絡於督脈衝任督三脈同起而異行一源而三歧皆絡帶脈因諸經上下往來遺熱於帶脈之間客熱鬱抑白物隨溲而下綿綿不絶是為白帶皆從濕熱治之與痢同法赤白痢乃邪熱傳於大腸赤白帶乃邪熱傳於小腸也劉宗厚曰帶下多本於陰虛陽竭營氣不升經脈凝澀衛氣下陷精氣積滯於下焦奇經之分醞釀而成以帶脈為病得名亦以病形而名白者屬氣赤者屬血多因醉飽入房服食躁熱所致亦有濕痰流注下焦者腎肝陰淫濕勝者或驚恐而木乘土位濁液下流或思慕無窮發為白淫所謂二陽之病發心脾也或餘經濕熱屈滯於少腹之下或下元虛冷子宮濕淫治之之法或下或吐或發中兼補補中兼利燥兼升發潤兼溫養或收澀或溫補諸例不同亦病機之活法也巢元方曰腎著病腰痛冷如水身重腰如帶五千錢小便利因勞汗出衣裡冷濕而得久則變為水也千金方用腎著湯三因方用滲濕湯東垣用獨活湯主之附載仲景大法諸藥要品及方九血崩而成活四物湯崩者澀劑收白芍白堊艾葉黃芩血閉久而成竭四物湯閉者破劑通三棱牛膝桃仁紅花黃芪鯪鯉甲炙肉桂破血三法初治四物湯加紅藍花調肉桂黃芪次治四物湯加紅藍花調鯪鯉甲桃仁肉桂童便酒煮尤佳三治四物湯加紅藍花調沒藥散四物湯春加川芎風勝也夏加白芍火勝也秋加當歸金勝也冬旺水勝又加熟地以益之若血旺必無服四物之理以其血衰而煩以此補之故加熟地也既可服四物知其血衰之甚也故用加之耳丁香脾積丸腹滿三棱蓬朮青皮丁香木香醋煮高良薑巴霜皂莢燒存性百草霜少部糊丸麻子大白湯下二三十丸壯本丹腰冷酒杜仲鹽補骨脂茴香各一兩酒蓯蓉酒巴戟青鹽各五錢每用豬腰子二個批開入藥末五錢扎好紙包煨熟以黃酒一頓送下祕傳帶下方帶下青葙子菟絲子各二錢棉於肉炒令煙盡四錢共為細末分作十服清晨將壯生鴨蛋一個挖一小孔入藥在內攪和黃白中將紙封孔飯上蒸熟以黃酒食之輕者八九服重著一二十服無不效如赤帶每料加熟石膏一錢愈後再服丸藥以補之加味龍虎散陰襲蒼朮一兩全蠍三錢草烏附子各二錢天麻三錢每末一錢空心豆酒調下此方兼治風寒腰痛筋骨拳攣速效散邪客川楝肉巴豆五粒同炒去豆鹽炒茴香蜜炒補骨脂各一兩每末一錢熱酒下牡蠣澤瀉散水氣腎著湯腎著白朮二錢半炮薑赤苓各錢半炙草五分滲濕湯腰重茯苓豬苓白朮澤瀉蒼朮陳皮黃連山梔秦艽防己葛根獨活湯又當歸連翹各錢半羌活獨活防風澤瀉肉桂各一錢防己黃柏大黃甘草各五分桃仁留尖九粒酒水各半煎此方兼治閃挫勞役腰痛如折陽維陰維脈病源流陽維脈起於諸陽之會由外踝而上行於衛分陰維脈起於諸陰之交由內踝而上行於營分所以為一身綱維也人身陽脈既統於督陰脈既統於任矣而諸陽諸陰之散見而會著又必有以維係而主持之故有陽維以維諸陽陰維以維諸陰要其所以能維者必從陰陽根柢之處以發其氣氣之極盛而後能維之說陽維則從少陰斜至太陽發足太陽之金門而與手足少陽陽明會於陽白是其所從起者少陰而所會者皆陽也所會皆陽則所維自皆陽矣陰維從少陽斜至厥陰發足少陰之築賓至項前而終是其所從起者少陽而所發所至者皆陰也所發所至皆陰則所維自皆陰矣然陽維既為諸陽之維而反起於少陰陰維既為諸陰之維而反起於少陽者何也少陰為諸陰根柢之氣維於陽者必起於此是陰為陽根也少陽為諸陽根柢之氣維於陰者必起於此是陽為陰根也所謂互為其根者是也故二脈又為營氣之綱領仲景云病常自汗榮衛不相和諧宜桂枝湯反煩不解先刺風池風府卻與桂枝湯愈此二穴乃陽維之會也以病寒熱自汗本桂枝湯症服之而不愈者乃陽維脈病也故必先針陽維諸會之穴以刺受病之處然後再服桂枝湯自無不愈也其曰榮衛不和者是衛氣不與榮血和也潔古云陰維為病苦心痛者其治必在足少陽三陰交此其處乃陰維所起也按仲景法太陰症則用理中湯少陰症則用四逆湯厥陰症則用當歸四逆湯吳茱萸湯參其法酌其劑以治陰維之病乃潔古所以治足少陽三陰交之意也如是而二維之病何憂弗愈哉陽維經行諸穴內經曰陽維起於諸陽之會其脈發於足太陽金門穴在足外踝下一寸五分上外踝七分會足少陽於陽交為陽維之郤在外踝上七寸斜屬二陽之間循膝外廉上髀厭抵少腹側會足少陽於居髎在章門下八寸監骨上陷中循脅肋斜上肘上會手陽明手足太陽於臂臑在肘上七寸兩筋陷中肩髃下一寸過肩前與手少陽會於臑會天髎臑會在肩前去肩端三寸宛宛中天髎在缺盆中間上毖骨際陷中央卻會手足少陽足陽明於肩井在肩上陷中缺盆上大骨前一寸五分入肩後會手太陽陽蹻於臑前在肩後大骨下𩨹上廉隱中上循耳後會手足少陽於風池在耳後發際陷中上腦空承靈後一寸半夾玉枕骨下陷中承靈正營後一寸半正營目窗後一寸目窗臨泣後一寸臨泣在瞳人直上發際五分陷中下額與手足少陽陽明五脈會於陽白眉上一寸直瞳人相對循頭入耳上至本神而止本神在直耳上入發際中凡經共三十二穴陰維經行諸穴內經曰陰維起於諸陰之交其脈發於足少陰築賓穴在足內踝上五寸腨肉分內為陰維之郤上循股內廉上行入小腹會足太陰厥陰少陰陽明於府舍在腹哀下三寸去腹中行四寸半上會足太陰於大橫腹哀大橫在腹哀下一寸五分腹哀在日月下一寸五分並去腹中行四寸半循脅肋會足厥陰於期門直乳下一寸半上胸膈挾咽與任脈會於天突廉泉天突在結喉下四寸半宛宛中廉泉在結喉下二寸中央是穴凡一十四穴脈法脈經曰寸口脈從少陰斜至太陽是陽維脈也動苦肌肉痹癢皮膚痛下部不仁汗出而寒又苦癲什羊鳴手足相引甚者失音不能言又曰寸口脈從少陽斜至厥陰是陰維脈也動苦癲癇僵仆羊鳴又苦僵仆失音肌內痹癢應時自發汗出惡風身洗洗然也二維病原由症治難經曰陽維陰維者維絡於身灌溉諸經者也陰陽不能自相維則怏然失志溶溶緩慢貌不能自收持又曰陽維為病苦寒熱陰維為病苦心痛張潔古曰衛為陽主表陽維受邪為病在表故苦寒熱營為陰主裡陰維受邪為病在裡故苦心痛陰陽相維則營衛和諧矣營衛不諧則怏然失志不能自收持矣何以知之仲景云病常自汗是衛氣不與營氣和也宜桂枝湯和之又云服桂枝湯反煩不解先刺風池風府卻與桂枝湯此二穴乃陽維之會也謂桂枝後尚自發熱惡寒其脈寸浮尺弱而反煩為病在陽維故先針此二穴又曰陰維為病主心痛治在三陰之交太陰症則理中湯少陰症則四逆湯厥陰症則當歸四逆湯吳茱萸湯主之李瀕湖曰陽維之脈與手足三陽相維而足太陽少陽則始終相聯附者寒熱之症惟二經有之故陽維為病亦苦寒熱說衛氣晝行於陽夜行於陰陰虛則內熱陽虛則外寒邪氣在經內與陰爭而惡寒外與陽爭而發熱則寒熱之在表而兼太陽症者有汗當用桂枝無汗當用麻黃寒熱之在半表半裡而兼少陽症者當用小柴胡湯加減治之若夫營衛惵卑而病寒熱者黃芪建中及八物湯主之潔古獨以桂枝一症屬之陽維似未擴充至於陰維為病主心痛潔古獨以三陰溫理之藥治之則寒中三陰者宜矣而三陰熱厥作痛似未備矣說陰維之脈雖交三陰而行實與任脈同歸故心痛多屬少陰厥陰任脈三氣衝上而然暴痛無熱久痛無寒按之少止者為虛不可按近者為實凡寒痛兼少陰及任脈者四逆湯兼厥陰者當歸四逆湯兼太陰者理中湯主之凡熱痛兼少陰及任脈者金鈴散延胡索散兼厥陰者失笑散兼太陽者承氣湯主之若營血內傷兼夫任衝手厥陰者則宜四物湯養榮湯妙香散之類因病藥之如此則陰陽虛實庶乎其不差矣鰲按潔古據仲景法以桂枝方治陽維理中三方治陰維舉其要也故餘前論亦據之瀕湖於陽維增黃芪建中三方於陰維增金鈴散七方備其用也餘故附録之又曰叔和以癲癇屬陽維陰維靈樞以癲癇屬陽蹻陰蹻二說文異旨同說陽維行衛分諸陽之會陰維行營分諸陰之交陽蹻行一身左右而主陽陰蹻行一身左右而主陰邪在陰維陰蹻則發癲邪在陽維陽蹻則發癇癇動而屬陽陽脈主之癲靜而屬陰陰脈主之大抵二疾當取之四脈之穴分其陰陽而已王叔和曰診得陽維脈浮者暫起目眩陽盛實苦肩息灑灑如寒診得陰維脈沉大而實者苦胸中痛脅下支滿心痛其脈如貫珠者男子兩脅下實腰中痛女子陰中痛如有瘡狀治二維病方十五桂枝湯陽維桂枝白芍甘草薑棗麻黃湯又黃芪建中湯又八物湯又人參茯苓白朮甘草川芎當歸白芍地黃理中湯陰維人參白朮甘草乾薑四逆湯又附子乾薑甘草當歸四逆湯又當歸桂枝白芍細辛甘草通草大棗吳茱萸湯又吳萸人參薑棗金鈴散又金鈴子延胡索各一兩每末二錢酒下痛止與枳朮丸去其餘邪延胡索散又延胡索當歸蒲黃赤芍官桂各一錢薑黃木香乳香沒藥各七分炙草五分薑三片此方兼治女人血結胸心腹作痛連腰脅脊膂上下攻刺甚作搐搦失笑散又承氣湯又大黃芒硝枳實厚朴養榮湯又當歸白芍生地熟地赤苓山梔麥冬陳皮各一錢人參甘草各五分棗二枚烏梅一個四物湯又川芎當歸白芍熟地各一錢二分半一方春倍川芎夏倍芍藥秋倍熟地冬倍當歸春加防風夏加黃芩秋加天冬冬加桂枝按此方通治血病當歸和血歸經白芍涼血補腎生地生血寧心熟地補血滋腎川芎行血通肝妙香散又陽蹻陰蹻脈病源流陽蹻脈起於跟中循外踝上行於身之左右主一身左右之陽陰蹻脈起於跟中循內踝上行於身之左右主一身左右之陰所以使機關之矯捷也蹻以矯舉為義其脈之剽悍同於衛氣而皆上出目內眦然皆有孔道與衛不同按其脈則陰出陽而交於足太陽陽入陰而交於足少陰其氣之行每從根柢陰陽和合以為蹻舉而上榮大會於目故目之開合皆宜若目氣不榮則目不合矣經曰陰脈榮其臟陽脈榮其腑者言乎入陰則榮臟入陽則榮腑也又曰蹻脈有陰陽何者當其數男子數其陽女子數其陰者男子陽用事其蹻在陽故數其陽女子陰用事其蹻在陰故數其陰也至其為病陽蹻則陰緩而陽急陽急則狂走目不昧潔古云裡和表病為陰不病而陽病陽病則寒其治風池風府若在陽表當汗桂枝湯麻黃湯若在陰裡當下承氣湯陰蹻病陽緩而陰急陰急則陰厥足脛直五絡不通潔古云表和裡病為陽不病而陰病陰病則熱甘草乾薑湯二蹻之病異治二蹻之法亦異也要而論文奇經八脈惟帶脈橫束於膂不與七脈同而七脈則皆起於太陽少陰雖或統宗衆會孔道之各有殊其實皆自下而上源不甚遠古人止言太衝不分督任蹻維說有分之而不盡可分者固即謂太衝之義也此又不可不知也夫陽蹻經行諸穴內經曰陽蹻者足太陽之別脈其脈起於跟中出於外踝下足太陽中脈穴在外踝下五分陷中容爪甲白肉際當踝後繞跟以僕參為本在踝骨下陷中拱足得之上外踝上三寸以附陽為郤在外踝上三寸足太陽穴也直上循股外廉循脅後髀上會手太陽陽維於臑哄在肩後大骨下胛上廉陷中上行肩髆外廉會手陽明於巨骨在肩尖端上行兩叉骨罅間陷中會手陽明少陽於肩髃在髆骨頭肩端上兩骨罅陷宛宛中舉臂取之有孔上人迎夾口吻會手足陽明任脈於地倉夾口吻旁四分外如近下有微脈動處同足陽明上而行巨窖夾鼻丸旁八分直瞳子平水溝復會任脈於承泣在目下七分直瞳子陷中至目內眦與手足太陽足陽明陰蹻會於睛明穴見陰蹻下從睛明上行入發際下耳後入風池而終風池在耳後夾玉枕骨下發際陷中凡共經二十二穴陰蹻經行諸穴內經曰陰蹻者足少陰之別脈其脈起於跟中足少陽然谷穴之後然谷在內踝前下一寸陷中同足少陰循內踝下照海在內踝下五分上內踝之上二寸以交信為郤交信在內踝骨上少陰前太陰後廉筋骨間直上循陰股入陰上循胸裡入缺盆上出人迎之前至咽嚨交貫衝脈入頄內廉上行入目內眦與手足太陽足陽明陰蹻會於睛明而上行睛明在目內眦外一分宛宛中凡經行八穴張紫陽八脈經云八脈者衝脈在風府穴下督脈在臍後任脈在臍前帶脈在腰陰蹻脈在尾閭前陰囊下陽蹻脈在尾閭後二節陰維脈在項前一寸三分陽維脈在項後一寸三分凡人有此八脈俱屬陰神閉而不開惟神仙以陽氣衝開故能得道八脈者先天大道之根一氣之祖采之惟在陰蹻為先此脈才動諸脈皆通次督任衝三脈總為經脈造化之原而陰蹻一脈散在丹經其名頗多曰天根曰死戶曰復命關曰邦都鬼戶曰死生根有神主之名曰桃康上通泥丸下透湧泉倘能知此使真氣聚散皆從此關竅則天門常開地戶永閉尻脈周流於一身貫通上下和無自然上朝陽長陰消水中火發雪裡花開所謂天根月窟閒來往三十六宮都是春要知酉南之鄉乃坤地尾閭之前膀胱之後小腸之下靈龜之上此乃天地逐日所生無根産鉛之地也醫家不知有此李瀕湖曰丹書論及陽精河車皆往往以衝任督脈命門三焦為說未有專指陰蹻者而紫陽八脈經所載經脈稍與諸家之說不同然內景隧道惟返觀者能照察之其言必不相謬也脈法脈經曰寸口脈前部左右彈者陽蹻也動苦腰背痛又為癲癇僵僕羊鳴惡風偏活𢂽痹身體強又曰微澀為風癇並取陽蹻在外踝上三寸直絶骨是穴跗陽穴也又曰寸口脈後部左右彈者陽蹻也動苦癲癇寒熱皮膚淫痹又為少腹痛裡急腰及髖窖下相連陰中痛男子陰疝女子漏下不止髖髀骨也窖腰下穴也又曰陰蹻脈急當從內踝以上急外踝以上緩陽蹻脈急當從外踝以上急內踝以上緩難經曰陰絡者陰蹻之絡陽絡者陽蹻之絡二蹻脈原由症治靈樞曰目中赤痛從內眦始取之陰蹻交信穴也又曰風痙反折先取足太陽及膕中及血絡出血若中有寒邪取陰蹻及三毛上及血絡出血瀕湖所謂足太陽京骨穴也在足外側小指本節後大骨下赤白際陷中針三分灸七壯膕中委中穴在曲膝後橫文中針三分陰蹻取交信穴在內踝骨上少陰前太陰後廉筋骨間三毛大敦穴也在足大指外側三毛中肝脈之井也針三分灸三壯血絡者視其處有絡脈盛滿者出其血也又曰陰蹻陽蹻陰陽相交陽入陰陰出陽交於目鋭眦陽氣盛則瞋目陰氣盛則滿目又云五谷入於胃也其糟粕精液宗氣分為三隊故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化而為血以榮四脈內注五臟六腑以應刻數焉衛氣者出其悍氣之疾而先於四末分肉皮膚之間而不休焉晝行於陽夜行於陰常從足少陽分間行於五臟六腑今厥氣客於臟腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹻陷不得入於陽則陰氣虛故目不瞑也治當補其不足瀉其有餘以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至甲乙經曰人病目閉不得視者衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰滿不得入於陽則陽氣虛故目閉也病目不得滿者衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽盛不得入於陰則陰氣虛故目不瞑也瀕湖曰靈樞有云足太陽之筋為目上綱足陽明之筋為目下綱寒則筋急目不合熱則筋縱目不開又云壯者血氣盛肌肉滑營衛不失其常故晝精而夜滿老人氣血哀氣道澀衛氣內伐故晝不精而夜不滿又云多臥者腸胃大而皮膚澀分肉不解衛氣行遲故也張子和云思氣所至為不眠為嗜臥巢元方云脾病困倦而嗜臥膽病多煩而不眠王叔和云水流夜疾有聲者土休故也人亦應也人夜臥則脾不動搖脈為之數疾也一云脾之候在瞼瞼動則知脾能消化也脾病則瞼澀嗜臥矣數說皆言目閉目不滿雖不言及二蹻說亦不離乎陰陽營衛虛實之理可互考也張潔古曰蹻者捷疾也二脈起於足使人蹻疾也陽蹻在肌肉之上陽脈所行通貫六腑主持諸表故名為陽蹻之絡陰蹻在肌肉之下陰脈所行通貫五臟主持諸裡故名為陰蹻之絡陰蹻為病陰急則陰厥脛直五絡不通表和裡病陽蹻為病陽急則狂走目不昧表病裡和陰病則熱可灸照海陽陵泉在膝下一寸外廉陷中足少陽之合也筋病治此陽病則寒可針風府風池風府在項後入發際一寸大筋內宛宛中督脈太陽陽維之會也又曰在陽表者當汗之在陰裡者當下之又癲癇晝發灸陽蹻夜發灸陰蹻治二蹻病方五桂枝湯陽蹻桂枝白芍甘草薑棗麻黃湯又麻黃桂枝甘草杏仁薑棗承氣湯又半夏湯又長流水八升揚萬遍取其清五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令至一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已久者三飲而已甘草乾薑湯陰蹻甘草乾薑
