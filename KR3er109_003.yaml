body:
  text: 卷三大腸病源流大腸癰臟毒附手陽明大腸脈起於次指內側之端循指上廉出虎口兩骨之間上入手背外側兩筋陷中循臂上廉入肘外廉行懦外前廉上肩出髃骨前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒還出挾口交人中左之右右之左上挾鼻孔次注足陽明胃經每日卯時氣血俱注大腸手陽明大腸經血氣俱盛為胃化物之器惟大腸耳故經曰大腸者傳道之官變化出焉其經與足陽明相接故亦謂手陽明也是固為陽明胃所器使止屬供役動用之物其腑無靈亦非當陽之用豈謂其能有陽明之職事乎又以營氣之隧道與肺相接故經絡得與肺為表裡豈謂其能與肺為互用乎經又曰脾胃大小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而以為出入者也是皆至陰之類通乎土氣則經固指大腸等為陰矣以其為陽者不過以臟腑之內外言之以臟居內故為陰腑居外故為陽耳然則以臟內腑外而分陰陽只以地分為分別使人曉然於臟腑之有異若經以為至陰之類則就其職任言之以陽為主而陰為從大腸等皆效用於陽明胃故其實為陰也固知讀書者當不以詞害志矣乃王氏叔和必以其脈定為陽在寸口肺脈上羅氏淡生又必以肺在上為陽主諸關前主秋令而謂不可以大腸當之且以脈經並無脈狀而謂知其無加於肺脈之浮澀夫大腸所由隧道既與肺相接而與肺為表裡則其營氣相通而肺脈既浮澀大腸脈亦因相通而無異也且天下惟靈者能自主大腸之腑既無靈其何能自主而別為脈狀乎其無加於肺脈之浮澀亦宜矣故叔和脈訣誠屬偽撰而多穿鑿淡生詆之而其説亦未甚圓靈也耍之大腸所由之隧道雖與肺相屬而為表裡大腸之絡實與陽明胃接經故其病亦與胃同與肺無涉即經絡自病延及於肺亦止在經絡不與傷寒之傳經必及於臟腑相似也故大腸實則病耳後肩孺肘臂外皆痛臍腹或腹脹不通氣滿皮膚堅便鞭腸風下血宜瀉白散若虛則耳鳴耳聾虛熱或便閉不通或腹痛而泄利腸鳴脫肛宜實腸散然則大腸之為器亦概可見矣大小腸連係入門曰大小腸之係自膈下與脊膂連心腎膀胱相繫脂膜筋絡散布包裹然各分紋理羅絡大小腸與膀胱其細脈之中乃氣血津液流走之道也大腸外候靈樞曰鼻隧以長以候大腸又曰肺主皮皮厚大腸厚皮薄大腸薄皮緩腹裹大者大腸大而長皮急者大場急而短皮滑者大腸直皮肉不相離者大腸結又曰天樞以下至橫骨長六寸半過則回腸廣大不滿則狹短大腸病症靈樞曰大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立又曰腸中寒則腸鳴飧泄腸中熱則出黃如糜素間曰腸痺者數飲而出不得中氣喘急時發飧泄仲景曰大腸有寒多鶩溏有熱便腸垢入門曰腸虛則嗚又寒氣相搏則為腸鳴靈樞曰胃惡熱而喜清冷大腸惡清冷而喜熱兩者不和調之以飲食衣服寒溫中適乃不致邪僻也大腸絶侯脈經曰大腸絶不治何以知之泄利無度知絶則死矣大腸癰因七情飲食或經行産後瘀血留積以致大腸實火堅熱所生病也經云關元穴屬小腸天樞穴屬大腸丹田穴屬三焦其穴分隱痛者為疽上肉微起者為癰是古人之分大小腸癰只以發現於本部位者名之而其為病則相似故古人之書概曰腸癰也仲景云腸癰為病小腹腫而強按之則痛小便數似淋時時汗出發熱而復惡寒身皮甲錯腹皮急腫狀甚者腹脹大轉側有水聲或繞臍生瘡膿從瘡出或有出臍者惟大便下膿血者自愈仲景之言雖統大小腸癰皆然其中有當分辨者如小便數似淋惟小腸癰有之大便下膿血則又大腸癰症居多説小腸癰竟有膿血從小便中出者若大湯癰膿血斷無出自小便者也其致病之由總因濕毒鬱積腸內卻又有寒熱之分其腹皮急按之濡身不熱者乃陰寒所成宜牡丹散內託十宣散加茯苓其小腹痞堅按之痛身發熱者乃結熱所成宜大黃牡丹湯黃黑散固不可不辨也然所謂寒要是濕邪寒冷之氣蘊結所謂熱亦是濕邪鬱熱之氣淹留耳而其治之之方當分先後或脈遲緊則膿尚末成急解毒使無內攻兼須止痛宜通腸飲或大黃湯下之或脈滑數則膿已成以下膿為主宜太乙膏或脈洪數小腹疼尿澀則為膿滯以宣通為要宜牡丹散或腹濡痛時時下膿則由元虛當於下膿藥中兼補益宜丹皮散或潰後疼痛過甚淋瀝不已則為氣血大虧須用峻補宜參耆地黃湯而其尤要者凡患大小腸癰切不可使病人著驚驚則腸斷而死坐臥轉側皆宜徐緩嘗少進稀粥靜養調攝飲食不可過飽庶可保生脈法仲景日趺陽脈滑而數知當尿膿也脈經曰腸癰之脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為敗濁脈訣曰腸癰難知脈滑可推數而下熱腸癰何疑遲緊末膿下以平之洪數膿成不下為宜叔和云關內逢芤腸裡癰腸癰症治丹溪曰腸癰大腸有積熱死血流注宜桃仁承氣湯加秦艽連翹下之瘍科選粹曰腸癰小腹堅腫按之則痛肉色如鼓或亦微腫小便如淋汗出憎寒其脈遲緊膿末成者急服大黃湯神效其腹中痛煩躁不安或腹脹不食小便澀者薏苡仁湯瘀血腸癰小腹硬痛者四物延胡湯小腹脹脈滑數或裡急後重時時下血者排膿散腸癰不治症瘍科選粹曰大便或臍間出膿者不治臟毒專由大腸血熱或平素喜食辛燥煎煿之物而成病也生在肛門內大腸盡處往往潰爛至肛門外治法大約與腸癰相仿而主藥必以忍冬藤麥冬為主並多加地榆蒲黃庶乎有瘳治大腸病諸藥要品及方二大腸實宜涼血清熱生地黃連槐花大黃枳殼桃仁黃岑石膏知母芒硝檳榔地榆生甘草白芍葛谷防風荊芥炒紅曲蒲黃麻仁豬膽汁側柏葉郁李仁白頭翁忍冬藤大腸虛宜補氣生津人參黃耆麥冬白芍蜂蜜炙草芝麻麻仁天冬生地當歸蘆薈白朮升麻蓮子吳萸肉果木瓜扁豆葛谷柴胡黃柏防風連翹五味肉蓯蓉補骨脂赤石脂瀉白散大腸實生地二錢赤苓芒硝各一錢陳皮竹茹山梔黃岑黃柏各五分薑三片棗二枚實腸散大腸虛厚朴肉果訶子皮砂仁陳皮蒼朮赤苓各一錢木香炙草各五分薑三棗二枚附載仲景分別標本方藥標石膏葛根本槐花白芍麻仁治腸癰方十三通腸飲末成忍冬藤歸尾白芷皂角刺乳香沒藥甘草苡仁花粉或用礬一兩黃占一兩為丸大妙大黃湯又大黃朴硝各一錢丹皮白芥子桃仁各二錢空心溫服下後以參耆補之太乙膏丸已成元參白芷生地當歸赤芍肉桂大黃各一兩淨黃丹十二兩丹皮散下膿人參丹皮白芍茯苓黃耆苡仁桃仁白芷當歸川芎各一錢甘草五分木香三分參耆地黃湯補益人參黃耆茯苓熟地山藥丹皮山萸薑棗牡丹散因寒人參丹皮天麻茯苓苡仁黃耆桃仁白芷當歸川芎各一錢官桂甘草各五分木香三分內託十宣散又人參黃耆鹽水浸焙酒當歸薑厚朴桔梗肉桂川芎防風白芷甘草各等分為末每三錢溫酒調服不飲酒木香湯調下一方加白芍大黃牡丹湯因熱大黃芒硝各錢半瓜蔞仁丹皮桃仁各二錢半服此有膿即下膿無膿即下血一方有冬瓜仁無瓜蔞仁神效黃黑散又大黃一兩取末四錢半破故紙一兩取末二錢牛蒡子一兩取末一錢黑牽牛一兩取末二錢上和勻分二服每取一帖蜜水調空心服以利為度桃仁承氣湯積熱死血薏苡仁湯煩躁苡仁瓜蔞仁各三錢丹皮桃仁各二錢四物延胡湯瘀血當歸延胡索各一錢川芎白芍生地各五分桃仁紅花牛膝各七分空心服大便祕加大黃排膿散排膿黃耆當歸金銀花白芷穿山甲防風瓜蔞仁連翹甘草各一錢腸鳴源流腸鳴大腸氣虛病也惟大腸之氣先虛故一切病俱湊之而成是症大小腸部位小腸在胃之左胃下口曰幽門即小腸上口小腸盤十六曲至下口曰闌門主別清濁即大腸上口大腸即回腸當臍之右亦盤十六曲至廣腸廣腸者即直腸至肛門其所以鳴者一由中氣虛若用破氣藥雖或暫止亦不愈宜補中益氣湯加炮薑一由臟寒有水宜理中湯加肉桂茯苓車前一由火欲上升擊動其水宜二陳湯加黃連黃岑山梔一由泄瀉宜升陽除濕智半湯一由下氣暫止復響宜益中湯一由疾行如囊裹水之聲宜河間葶藶丸其症雖不同而其鳴或空或實或上或下或高或低可按而知也腸鳴病症靈樞曰大腸病者腸中切痛而鳴濯濯又曰腹痛腸鳴氣上衝胸喘不能久立邪在大腸也又曰腸中寒則腸鳴飧泄入門曰腸虛則鳴又寒氣相搏則為腸鳴治腸鳴方六補中益氣湯元氣虛人參黃耆當歸白朮柴胡升麻陳皮炙甘草理中湯臟寒人參白朮甘草乾薑二陳湯火擊水茯苓陳皮半夏甘草智半湯泄瀉益智仁半夏各五分蒼朮四錢防風二錢白朮茯苓白芍各一錢薑益中湯下氣人參白朮黃連黃岑枳殼乾薑甘草河間葶藶丸疾行甜葶藶澤瀉杏仁椒目桑白皮豬苓各五錢蜜丸蔥湯下取利脫肛源流肛門癢痛附脫肛大腸氣虛病也大腸之氣虛衰下陷又或兼有濕熱故成此症雖治不同要以升提為主宜人參白朮升麻炙甘草李士材云脫肛一症最難用藥熱則肛門閉寒則肛門出宜內外兼治誠哉是言也內宜服磁石散外宜用鐵鏵湯洗總之脫肛或由於氣虛者補益為急宜補中益氣湯重用參耆升麻或由於胃家之熱移注大腸者兼宜清熱宜四君子湯兼黃連黃柏而外以澀劑煎湯洗之自平又或脫肛而痛由熱留於下者當清理大腸宜槐花木香由於寒者急用溫劑宜理中湯此治脫肛之大法也至其虛實寒熱變遷不同是在臨症按脈時神而明之庶無差誤脫肛之由回春曰脫肛者肛門翻出也肺與大腸為表裡腎主大便肺腎虛者多有此症參耆湯升之脫肛症治直指曰脫肛一症氣聚不散也裡急而不得出外脹而不得入先以枳殼散糝敷則氣散消矣又曰難經云病之虛實出者為虛入者為實肛門之脫非虛之故然哉其有産婦用力過多及小兒叫號弩氣並久痢不止風邪襲虛亦有此病據此則脫肛之症回春專以腸痔當之非也腸痔只脫肛中一症耳入門曰脫肛者氣下陷也肺主魄門肺熱則肛門縮入肺寒則肛門脫出必須溫肺補胃如補中益氣湯加訶子樗根皮少部或蝟皮散俱可其血熱者四物湯加黃柏升麻虛熱者縮砂散肛門癢痛濕與火病也大腸有濕流注於肛門則作癢宜秦艽羌活甚或生蟲其癢難當治法與蟲痔相同宜神應黑玉丹扁蓄湯外以苦楝根煎湯熏洗大腸有火鬱閉不宣則肛門作痛宜七聖丸秦艽白朮丸甚或大便燥硬弩出腸頭下血宜當歸郁李仁湯皆當分別肛門名象入門曰肛門者大腸之下截也一曰廣腸言其廣闊於大小腸也又曰魄門言大腸為肺之府肺藏魄故曰魄門也肛者言處似車肛形也肛門癢痛症治丹溪曰凡人醉飽行房忍泄前陰之氣歸於大腸木乘火熱而侮燥金故火就燥也大便必祕其疾甚者必以苦寒瀉火以辛溫和血燥潤疏風止痛是其治也宜秦艽白朮丸七聖丸寬腸丸當歸郁李仁湯治脫肛方七磁石散總治磁石煅研極細食前米飲下補中益氣湯氣虛人參黃耆當歸白朮升麻柴胡陳皮炙草四君子湯胃移熱人參茯苓白朮炙甘草理中湯挾寒人參白朮乾薑炙草猬皮散溫補猬皮鱉甲各一個燒存性磁石醋淬七次五錢桂心三錢共為末每二錢空心米飲下仍用草鞋底炙熱按入忌房事四物湯血熱川芎生地當歸白芍縮砂散虛熱砂仁黃連木賊草等分為末每二錢米飲調下治肛門癢痛方六秦艽蕪活湯治癢羌活錢半黃耆各一錢防風七分升麻麻黃柴胡炙草各五分藁本三分細辛紅花各一分此方兼治痔漏成塊下墜不任其癢者神應黑玉丹蟲癢猬皮四兩豬懸蹄二十五只牛角腮三兩亂發敗棕各二兩槐角兩半苦楝根兩二錢半雷丸芝麻各一兩銼碎磁器內煅存性為末入乳香去油五錢麝香二錢和勻酒糊丸先嚼胡桃肉一枚以溫酒吞下三五十丸空心食前晚三服除根兼治諸痔扁蓄湯又扁蓄一握水一升煮取五合去渣隔夜先不食明晨空心飲之蟲即下小兒同法七聖丸治痛郁李仁泥一兩半羌活一兩煨大黃八錢桂心檳榔木香川芎各五錢蜜丸白湯下三五十丸微利即愈切不可快利其痛更甚脈訣曰積氣生於脾臟旁大腸疼痛陳難當此藥主之寬腸丸便閉黃連枳殼等分面糊丸米飲下五十丸當歸郁李仁湯腸出下血郁李仁皂角仁煅各一錢枳實七分秦艽麻仁歸梢生地蒼朮各五分煨大黃澤瀉各三分胃病源流胃癰胃痛足陽明胃脈起於鼻孔交顛中傍納太陽之下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出人迎循頰車上耳前過客主人循髮際至額顱其支者從人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者入中指外間其支者別跗上入大指間出其端次注於足太陰脾經每日辰時周身氣血俱注於胃足陽明胃經多氣復多血脾與胃俱屬土脾內而胃外以臟腑言之也脾陰而胃陽以表裡言之也脾主運而胃主化以氣化言之也故脾與胃相連顧胃當相火居正之地而其地又為太陽少陽部位相合而明之處故曰陽明凡三焦膽之所遊部心包絡之所總司皆與胃同有腐熟水谷之妙經曰陽明者午也午為夏之中相火之本職又三陽之合氣故於十二經氣獨盛血獨旺熱極多而心包絡之代心以主相火者皆與胃同其央用也故就胃言之實營衛之大主五臟之宗主其氣騰而上盛則脈倍見於人迎其精充而下輸則脈湧盛於趺陽仲景治病必三部候脈兩手之外必兼診兩夾喉動脈之人迎兩足趺之趺陽良有以也説以腎為先天之根胃為後天之本胃強則後天強而先天於以補助胃絶則後天絶雖先天足恃七日不食亦死故胃雖屬腑其脈能大見於寸口而五臟亦待以養也夫胃之腑既氣獨盛血獨旺熱獨多故其為病亦皆實熱有餘之症試觀狂虐溫淫汗出鼽衄口喎唇疹腮腫喉痺斑黃狂亂譫妄潮熱登高而呼棄衣而走罵詈不避親疏凡其在經在絡在腑無不以氣實血熱為顯症非以其腑為兩陽合明之故乎仲景曰陽明之為病胃家實也是實固指氣獨盛血獨旺熱獨多所發之病皆屬有餘而言非僅燥滿便鞭下焦堅實之謂也雖然胃家病雖屬有餘而亦時形不足譬如相火既虛不能為胃蒸化胃氣即不能旺氣不旺即怯而不支故亦有虛寒之症試觀灑灑振寒善伸數欠顏黑惡人與火聞水聲惕然而驚心欲動獨閉戶牖而處身以前皆寒栗胃中寒䐜脹陽明之虛寒有如此者安得泥胃家實之一言概從有餘治之哉凡此症病為實為虛皆可按內經而繹之者也胃病虛實內經曰胃脈實則脹虛則泄東垣曰胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或食而肥雖肥而四肢不舉胃病症治靈樞曰飲食不下隔塞不通邪在胃脘也又曰胃中寒則手魚際之絡脈多青胃中熱則手魚際之絡脈多赤又曰面熱者足陽明病兩跗之上脈豎堅者足陽明症此為胃脈也入門曰不思飲食心腹脹痛嘔噦噁心噫氣吞酸面黃肌瘦怠惰嗜臥常多自利或發霍亂及五噎八痞膈氣反胃等症皆宜平胃散千金曰脾胃虛弱飲食不進面黃肌瘦胸膈痞悶食不消化或噫氣吞酸以養胃進食湯治之東垣曰胃實宜平胃散胃虛宜異央散不進飲食宜養胃進食湯胃絶候內經曰胃終者口目動作善驚妄言色黃其上下經盛不仁則終矣脈經日胃絶五日死何以知之脊痛腰中直不可反復胃癰胃陽遏抑病也聖濟總録云胃脘癰由寒氣隔陽熱聚胃口寒熱不調血肉腐壞氣逆於胃故胃脈沉細陽氣不得上升人迎熱甚令人寒熱如虐身皮甲錯或咳嗽或嘔膿血若脈洪數膿已成也急用排膿之劑脈遲緊屬瘀血也急當議下否則毒氣內攻腸胃並腐其害不小但此症又不比肺癰之可認茍不嘔膿血末免他誤矣瘍家可不知方脈之理乎據此則知胃癰之症端由胃陽之遏然其所以致遏實又有因不但寒也必其人先有飲食積聚或好飲醇醪或喜食煎煿一種熱毒之氣纍積於中又或七情之火鬱結日久復感風寒使熱毒之氣填塞胃脘胃中清氣下陷故胃脈沉細惟力風寒所隔故人迎緊盛也若有此二脈非胃癰而何然症之成也必以漸而治之之法亦不可混施如初起寒熱如瘧咳唾膿血宜射干湯後必有風熱固結唇口潤動者宜薏苡仁湯有因積熱結聚著宜清胃散芍藥湯有胸乳間痛吐膿血腥臭者宜牡丹散宜各因其症而以藥瘳之也脈法內經曰診此者當候胃脈其脈當沉細沉細者氣逆也逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也胃癰症治靈樞曰中脘穴屬胃隱隱痛者胃脘痛也入門曰外證寒熱如瘧胃濁肺益失養故身皮甲錯或咳或嘔或唾膿血射干湯主之千金內消散內消沃雪湯東垣托裡散皆可服胃痛邪干胃脘病也胃稟沖和之氣多氣多血壯者邪不能干虛則著而為病偏寒偏熱水停食積皆與真氣相搏而痛惟肝氣相乘為尤甚以木性暴且正尅也痛必上支兩脅裡急飲食不下膈咽不通名曰食痺謂食入即痛吐出乃止也宜肝氣犯胃方説以肝木相乘為賊邪腎寒厥逆為微邪挾他臟而見症當與心痛相同但胃經本病或滿或脹或嘔吐吞酸或不食或便難或瀉痢或面浮黃四肢倦怠此等本病必與客邪參雜而見説胃病有因外吸涼風內食冷物卒然痛者宜二陳湯加草蔻仁乾薑吳萸有因寒者宜草果厚朴良薑菖蒲寒且甚者宜蓽澄茄一粒納去核棗中水草紙包煨存性或酒或米湯下日一枚七日愈有因火者宜清中有因瘀血者宜桃仁承氣湯有因氣壅者宜沉香降氣湯有因酒者宜乾薑蔻仁砂仁有因痰者宜南星安中湯如甚加白螺螄殼煅過一錢且有痰火者宜白礬朱砂醋糊丸薑湯下有因諸蟲者宜剪紅丸有因食而按之滿痛者宜大柴胡湯有因虛寒者宜理中湯胃痛形症有可歷舉如此總之七情之由作心痛食積痰飲瘀血作胃脘痛二語正是分明曷言乎爾如食積痰飲瘀血皆儲於胃中者故其為病而痛為胃脘痛也然胃痛必有虛實總以按之痛止者為虛宜參朮散按之痛反甚者為實宜梔萸丸其大較也至於痛甚者脈必伏是又不可不知其用藥之法凡痛必須溫散切不可補氣以氣旺不通則反甚也顧安可忽視乎哉脈法脈訣曰沉弦細動皆是痛症心痛在寸腹痛在關下部在尺脈象顯然胃痛症治丹溪曰凡心胃痛須分新久明知身受寒口吃冷而得者初得時即溫散或溫利稍久則鬱鬱久則熱熱久生火便不可用溫必以山梔為熱藥向導又曰凡痛宜分寒熱蟲血四條寒溫之熱清之血散之蟲殺之又曰心胃痛須用劫藥痛方止如倉卒散愈痛散皆能治之又曰心胃痛用山梔劫藥又發前藥必不效加元明粉一錢即止又曰心胃痛時雖數日不吃飯不死若痛止便吃物即復發必三五日服藥方可吃治胃病諸藥要品及方三胃實宜清熱散結大黃枳實知母石膏淡竹葉葛根青黛大青甘草夏活草神麯連翹山查麥牙麥門冬黃連陳皮木瓜竹茹金石斛通草茯苓蘆根胃虛宜清熱益氣人參白朮蓮肉陳皮扁豆子茯苓白芍木瓜石膏金石斛滑石香茹厚朴麥冬炒澤瀉葛根兼寒加生薑砂仁白蔻仁兼熱加蘆根蔗漿竹茹枇杷葉平胃散胃實蒼朮二錢陳皮一錢四分厚朴一錢甘草六分薑三片棗二枚異央散胃虛人參茯苓白朮甘草陳皮薑棗養胃迸食湯不食人參茯苓白朮炙草蒼朮陳皮厚朴神麯麥芽附載仲景分別標本方藥標葛根升麻犀角石膏知母升麻葛根湯白虎湯標之本調胃承氣湯本調胃承氣湯本之標人參白虎湯實能食大黃芒硝巴霜輕粉虛不能食白朮蒼朮生薑乾薑神麯麥芽草蔻仁大棗甘草煩陽梔子陰香豉陽肉桂附子陰吳萸烏頭不得眠煩山梔知母躁棗仁食制則吐謂之嘔生薑木通湯食入則吐謂暴吐生薑葳蕤湯食已則吐謂嘔吐橘紅半夏湯食久則吐謂反胃水煮金花丸食再則吐謂翻胃易老紫沉丸旦食不能暮食則吐半夏生薑大黃湯胃實腸虛能食能便枳實厚朴赤石脂餘糧丸胃虛腸實不食不便枳實枳殼白朮蜜理中丸胃實腸實能食不便大黃巴豆牽牛胃虛腸虛不食能便白朮厚朴枳實理中湯關則不得小便關者甚熱之氣關無出之由故曰關關者氣太盛陰氣不得營也格則壅而吐逆格者甚寒之氣格無入之理故曰格格者陰氣太盛氣不得營也關格陰陽俱盛不能相營故曰關關格者不得盡其命而死矣口苦寒則補胃熱則瀉膽舌乾水多沈液四君子湯五物厚腸湯水多活燥麥冬飲子治胃癰方八射干湯初起射干去毛山梔赤苓升麻各一錢赤芍錢半白朮五分薏苡仁湯風熱苡仁防己赤小豆炙草等分清胃散積熱歸身生地丹皮黃連各錢半升麻三錢石膏二錢細辛三分黃岑一錢二分芍藥湯又赤芍石膏犀角麥冬木通朴硝薺苨升麻元參甘草牡丹散臭膿丹皮地榆苡仁黃岑各錢半赤芍桔梗升麻甘草敗醬各一錢千金內消散癰末成大黃三錢金銀花二錢酒歸尾錢半木鱉子赤芍白芷乳香沒藥角刺薑蠶瓜蔞仁花粉各一錢甘草節五分穿山甲三片蛤粉炒水酒煎內消沃雪湯又歸身白芍甘草節黃耆射干連翹白芷貝母陳皮角刺花粉穿山甲金銀花木香青皮乳香沒藥各五分酒大黃錢半水酒煎東垣托裡散又金銀花當歸各二錢大黃牡蠣花粉角刺連翹朴硝各六分赤芍黃岑各四分水酒煎治胃痛方十三肝氣犯胃方食痺烏藥汁七匙枳殼汁五匙白芍汁二十匙木香汁五匙灶心土一錢炒砂仁三分將二味煎湯沖諸汁服二陳湯因風茯苓陳皮半夏甘草清中湯因火黃連山梔陳皮茯苓半夏草蔻甘草加薑桃仁承氣湯因瘀沉香降氣湯因氣沉香香附烏藥砂仁甘草加鹽南星安中丸因痰剪紅丸因蟲雄黃木香檳榔三稜莪朮貫仲乾漆陳皮大黃大柴胡湯圈食理中湯虛寒人參白朮甘草乾薑參朮散因虛梔萸丸因實倉卒散劫藥山梔四十九個連皮炒大附子一個炮去臍為粗末水一杯酒半杯煎七分入鹽少部服加川芎一錢尤妙此方能治氣自腰腹間攣急疼痛不可屈伸痛不可忍自汗如洗手足冰冷垂死者愈痛散劫藥五靈脂元胡索莪朮良薑當歸等分為末每二錢淡醋湯調服此方兼治急心痛霍亂源流霍亂胃虛病也內經有水濕火熱肝木勝土厥氣上逆之不同推而廣之風寒暑毒之由於外因飲食鬱結之由於內因者皆能致病其症心腹脹痛嘔吐泄瀉憎寒壯熱頭痛眩暈先心痛則吐先腹痛則瀉心腹俱痛則吐瀉交作或手足冷或自汗甚而轉筋入腹則死要皆由中氣素虛或內傷七情或外感六氣或傷飲食或中邪惡污穢氣及毒氣往往發於夏秋陽熱外逼陰寒內伏使人陰陽否隔卒然而病偏於陽者多熱偏於陰者多寒治法惟以祛脾胃之濕為主復察所感諸邪之氣而散之然脾胃有虛實感邪有陰陽尤當熟審向來論治者不一須參究而歸於的是如劉河間主火熱孫思邈主飲食積朱丹溪極贊為先哲諦論而復申其説以為內有積外有感陽不升陰不降張子和主風濕暍三氣合而為邪其意以濕土為風木所尅又為炎暑蒸鬱故嘔吐者暑熱之變泄瀉者土濕之變轉筋者風木之變李士材兼主濕熱風暑虛實而分別治之羅謙甫專主氣不和故以地漿為治使氣和而吐瀉自止其法最妙古復庵則隨病之緣感人之虛實分晰施治而大旨則重痰故其法必用蘇合丸以通否塞次進藿香正氣散加木香吞來復丹以控痰涎若瀉已甚不用來復丹瀉而不吐胸膈痞悶必用濃鹽湯探吐不論已末吐並服藿香正氣散間服蘇合丸吐而不瀉心腹大痛頻欲登圃苦於不通則以木香枳殼煎湯飲之若隔而不下仍須來復丹引導下行若吐瀉不止元氣耗散或水粒不入或口渴喜冷或惡寒戰掉手足逆冷或發熱煩躁揭去衣被此並非熱由內虛陰盛也則用附子理中湯或四逆湯俱冷服霍亂已透餘瀉未止腹有餘痛一味扁豆葉煎服按羅古兩家之法誠能得治霍亂之三昧者醫者遵守之可也然其病因亦有當細審者手足厥逆氣少神清不渴不熱小水清白因於寒也宜四逆湯加鹽少部身熱煩渴氣粗口苦齒燥小水短赤因於暑也宜黃連香茹飲冷服四肢重著骨節煩疼胸膈滿悶因於濕也宜除濕湯腹痛下濁物因於多食寒冷也宜六和湯倍用藿香加木香紫蘇腹痛不可近因於食積停滯也宜香砂枳朮丸加木香蔻仁心胸迷悶氣結不舒因於七情內鬱也宜七氣湯霍亂而兼轉筋因於肝木剋脾土也卻與肝經血虛轉筋不同宜平胃散加桂枝木瓜柴胡以上皆霍亂之兼證所形即其兼證遂可知其所感以為治也總之邪在上必當吐即已吐仍使吐之以提其氣宜鹽湯探吐法邪在下必當瀉量其人之氣稟病之輕重以投藥宜於霍亂藥中加大黃至霍亂已只須米湯調養慎勿便與谷食若吐瀉過多四肢逆冷不省人事急用製南星末三錢薑五片煎極熱服一服可救或半夏末薑汁服或白礬一錢沸湯下亦效然後以藥治之加味薑附湯雖至幾死但有一點胃氣存者亦可救先用前南星末等法再服回生散又如吐瀉既多津液暴亡以至煩渴引飲不止宜麥門冬茯苓白朮散又如吐瀉後虛煩不得眠宜既濟湯參胡三白湯皆宜察治至如霍亂後陽氣衰絶或遺尿不知氣脫不語膏汗如油如脂燥欲食水四肢不收或脈微細而舌卷囊縮皆屬死候説霍亂輕者手足溫和脈來洪大自然易治重者厥逆脈脫臍腹絞痛舉體轉筋尚未入腹猶有可治急當溫補以回陽復脈宜附子理湯建中湯至妊娠霍亂先吐或腹痛吐瀉必由於熱宜香茹散或加蘇梗頭痛體疼發熱必挾風宜藿香正氣散去厚朴加防風蘇梗患此者防損胎産後霍亂藏府虛微飲食不消觸冒風冷所致也其有熱而欲飲水者宜五苓散有寒而不欲飲水者宜理中湯有虛冷者宜附子理中湯或來復丹皆宜分別異鄉人初到他方不伏水土亦吐利兼作宜加正氣散若乾霍亂即俗云絞湯痧亦由胃氣虛猝中天地邪惡污穢之氣鬱於胸腹間上不得吐下不得瀉以致腸胃絞痛異常胸腹驟脹遍體紫黑頭頂心必有紅發急尋出拔去之急以三稜鎞針刺委中擠出熱血可立蘇更用新汲涼水入鹽兩部恣飲得吐瀉即止委中穴在兩膝下灣橫紋中間兩筋之中刺入一分然後用藥治之宜蘇合香藿香檀香乳香芒硝童便川芎白芷蒼朮及二陳湯藿香正氣散必效切不可用涼藥但藥必冷服切忌火酒薑蒜谷氣米飲熱湯入口即死慎之慎之更有進者乘船坐車發暈嘔吐亦屬霍亂之類宜大半夏湯其大吐瀉渴欲飲水者往往至於死急飲童便或己便可救或以白礬末一錢百沸湯點稍溫服亦可脈法得效曰霍亂脈浮洪可救微遲而不語氣少難治丹溪曰脈多尖或絶醫鑑曰脈代者霍亂代而亂者亦霍亂又關脈滑為霍亂吐利又滑而不勻必是霍亂吐利脈代勿訝脈訣曰滑數為嘔代者霍亂微滑者生澀數凶斷正傳曰脈微澀或代散或隱伏或虛大或結促不可斷以死脈亂故也又曰浮大而洪者為可救微弱而遲者為難救霍亂所由經曰五鬱之發發病嘔吐霍亂注下又曰太陰所至為中滿霍亂吐下又曰歲土不足風乃大行民病飧泄霍亂體重腹痛筋骨搖並啓元子曰皆脾熱所生也入門曰霍亂多責於熱故夏秋為盛寒月亦由伏暑霍亂證治入門圃邪在上焦吐而不利邪在下焦利而不吐邪在中焦吐利並作輕者只曰吐利重者乃曰霍亂以揮霍變亂也甚則轉筋入腹必死得效曰人之臟腑冷熱不調飲食不節生冷過多起居失宜露臥當風使風冷之氣歸於三焦傳於睥胃脾胃得冷不能消化水谷致令真邪相干飲食變亂於腸胃之間心腹疼痛發作吐利或兼發熱頭疼體痛心腹刺痛虛煩或轉筋拘急疼痛或嘔而無物或四肢逆冷煩悶昏塞而欲死海藏曰凡霍亂渴為熱不渴為寒千金方曰陽明屬胃大腸以養宗筋吐瀉津液暴亡宗筋失養輕者兩腳轉筋而已重者遍體轉筋入腹手足逆冷危甚風燭矣倉卒間急以鹽填臍中炮艾不計壯數雖已死而胸中有暖氣者立省急用木萸散木瓜食鹽吳萸各五錢同炒加茴香蘇葉甘草煎服再研蒜塗兩足心雖昏危入腹者亦效霍亂不治證綱目曰霍亂轉筋入腹四肢厥冷氣欲絶如脈洪大可治脈微而舌卷囊縮不治得效曰兼喘煩躁者不治脈微遲氣少不語難治入門曰大渴大躁大汗遺尿者死回生散救之回春曰乾霍亂吐瀉不得胸腹脹硬而唇青黑手足冷過腕膝六脈伏絶氣喘急舌短囊縮者死治霍亂方二十六蘇合丸總治白朮青木香犀角香附安息香朱砂訶子檀香沉香麝香丁香冰片蓽撥燻陸香蘇合香各一兩共為末用安息香熬膏並蘇合香油蜜丸彈子大蠟封藿香正氣散又藿香白芷紫蘇茯苓大腹皮厚朴陳皮白朮桔梗半夏甘草來復丹又倭硫黃硝石青皮陳皮元精石五靈脂醋糊丸每三十丸空心米湯下附子理中湯陰盛附子人參白朮甘草乾薑四逆湯又附子乾薑甘草黃連香茹飲因暑黃連香茹扁豆厚朴甘草除濕湯因濕蒼朮藁本羌活防風升麻柴胡六和湯食冷香茹砂仁半夏人參杏仁赤苓甘草木瓜厚朴扁豆藿香香砂枳朮丸食滯木香砂仁枳殼白朮七氣湯情鬱半夏厚朴白芍茯苓人參桂心紫蘇橘紅平胃散轉筋蒼朮厚朴陳皮甘草建中湯回陽白芍桂枝生薑甘草黑棗飴糖香茹散妊娠黃連香茹厚朴甘草五苓散産後茯苓豬苓白朮澤瀉肉桂理中湯又人參白朮甘草生薑二陳湯乾霍亂茯苓半夏陳皮甘草回生散吐瀉過多藿香陳皮各五錢加味薑附湯又炮薑附子人參各一錢半炙草七分麥門冬湯煩渴麥冬二錢陳皮半夏白朮茯苓各一錢小麥半合人參甘草各五分薑三片烏梅一個一名九君子湯茯苓白朮散又滑石一兩寒水石石膏澤瀉甘草各五錢白朮茯苓人參桂枝各二錢半每末三錢開水下薑湯亦可此方兼治中暑霍亂參胡三白湯虛煩人參五分柴胡白朮白茯苓白芍當歸陳皮麥冬山梔甘草各八分五味子十粒薑二片烏梅一個燈心一圈既濟湯又麥冬二錢人參竹葉炙甘草半夏附子各一錢薑五片粳米百粒加減正氣散不伏水土蒼朮二錢厚朴藿香陳皮砂仁香附半夏甘草各一錢薑二片棗一枚燈心十根大半夏湯船車暈半夏陳皮赤苓各二錢半薑五片鹽湯探吐法吐法用極鹹鹽湯三碗熱飲一碗指探令吐不吐再服一碗吐訖仍飲一碗三吐乃止此法極良不傷人地漿法總治於牆陰掘地約二三尺部入新汲水攪之澄清服一杯既取土氣安養中宮又取牆陰無燥熱氣又取新汲水能解熱鬱説陰中之陰能治陽中之陽也諸痿源流諸痿熱傷血脈病也説火熱之邪傷及血脈皆能發為經筋骨髓血脈肌肉皮毛之痿然其病之源則以肺為主以肺燥居土主氣畏火而行治節必金清而後氣行充於一身之筋骨血肉皮毛間何至於痿若起居失度嗜欲無端飲食非宜以致火動熱邪乘金肺先受剋內則葉焦外則皮毛虛弱由是而著於筋脈骨肉則病生痿跫所以然者肺為諸臟之長又為心説一切起居嗜欲飲食皆足傷氣氣傷即肺受之而亦傷且心火上乘肺氣虛而受其乘必金病為喘鳴金失清肅火留不去故肺熱葉焦五臟因肺熱自病氣不行發為痿跫也乃古人治痿獨取陽明者何也經云真氣與谷氣並而充身又云陽明為藏府之海陽明虛則五藏無所稟不能行氣血濡筋骨利關節故肢體中隨其不得受水谷氣處而成痿又云衝為十二經之海主滲灌溪谷與陽明合於宗筋而陽明為之長皆屬於帶脈絡於督脈陽明虛則宗筋緩故足痿不用統觀經旨欲除肺熱必先除陽明之熱而養其陰調其虛實和其逆從斯宗筋潤筋骨束機關利而病已也試舉五臟所生痿病言之經曰肺氣熱葉焦則皮毛虛弱急薄而行痿蹩説肺痿者皮毛痿也躄者足弱不能行也宜犀角桔梗湯經又曰心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地説心痿者脈痿也下脈指三陰在下之脈樞折挈者四肢關節之處如樞紐之折而不能提挈脛縱者縱緩也宜鐵粉丸經又曰膽氣熱則膽泄口苦筋膜乾筋膜乾則筋縱而攣發為筋痿説肝痿者筋痿也膽附於肝肝熱則膽泄故口苦筋膜受熱則血液乾故拘攣而為筋痿也宜紫葳湯經又曰脾氣熱則胃乾而渴肌肉不仁發為肉痿説脾痿者肉痿也脾與胃以膜相連而開竅於口故脾熱則胃乾而渴且精耗而肌肉不仁也宜二陳湯加人參黃耆經又曰腎氣熱則腰脊不舉骨活而髓減説腎痿者骨痿也腰者腎之府腰貫脊主髓故腎熱而見證若此也宜金剛丸此五痿者必外徵之色肺熱色白而毛敗心熱色赤而絡脈溢肝熱色蒼而爪活脾熱色黃而肉濡腎熱色黑而齒稿必然之理也而五痿之外又有屬濕熱者宜加味二妙丸有屬濕痰者宜二陳湯加朮黃柏竹瀝薑法有屬血虛者宜四物湯二妙丸合用有屬氣虛者宜四君子湯二妙丸合用再加當歸地黃龜板虎骨有屬食積者宜木香檳榔丸有屬死血者宜歸梢湯有屬脾氣太過者必四肢不舉宜大承氣湯下之有屬土氣不及者亦四肢不舉宜四君子湯加當歸有熱而痿厥者宜虎潛丸有痿發於夏者即俗名疰夏另詳疰夏條宜清暑益氣湯以上十證皆痿之屬非可混治也昔東垣治痿總以黃柏為君黃耆為佐而無一定之方隨其證之為痰為濕為熱為寒為氣為血各加增藥味活潑製方其真善於治痿者乎然必其人能休息精神淡泊滋味尤是頂門一針另有陰痿則由命門火衰下焦虛寒之故另詳本條宜鹿茸散脈法內經曰睥脈緩甚為痿厥脈經曰診人痿蹩其脈虛者生緊急疾者死脈訣曰尺脈虛弱緩澀而緊病為足痛或是痿病子和曰痿脈多浮而大痿病證治河間曰痿謂手足痿弱無力以運動也由肺金本燥燥之為病血衰不能養榮百骸故手足痿弱不能運動猶秋金旺則草木痿落病之象也痿猶萎也子和曰痿之作也皆五月六月七月之時午者少陰君火之位末者濕土庚金伏火之地申者少陽相火之分故病痿之人其脈脬大丹溪曰肺金體燥而居上主氣畏火者也脾土性濕而居中主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿之病作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此又曰痿病切不可作風治用風藥正傳曰蒼朮黃柏治痿之聖藥也又曰肝腎俱虛筋骨痿弱宜加味四斤元五獸三匱丸濕熱痿弱宜神龜滋陰丸三妙丸加味二妙丸長夏暑濕成痿宜健步丸四製蒼白丸清燥湯冶痿方二十一犀角桔梗湯肺痿黃耆石斛天冬麥冬百合山藥犀角通草桔梗黃岑杏仁秦艽鐵粉丸心痿鐵粉銀屑黃連苦參石蜜龍膽草龍齒牛黃秦艽丹皮白鮮皮地骨皮紫葳湯肝痿紫葳天冬百合杜仲黃芩黃連萆薢牛膝防風菟絲子白蒺藜二陳湯脾痿茯苓陳皮半夏甘草金剛丸腎痿萆薢杜仲肉蓯蓉菟絲子等分灑煮豬腎打泥為丸加味二妙丸因濕歸梢防己草解蒼朮黃柏牛膝龜板四物湯血虛川芎白芍當歸生地二妙丸又蒼朮黃柏四君子湯氣虛人參茯苓白朮甘草木香檳榔丸食積木香檳榔白朮枳實陳皮香附歸梢湯死血歸梢赤芍莪朮桃仁紅花大承氣湯睥太過大黃芒硝厚朴枳實虎潛丸痿厥龜板黃槄各四兩熟地知母各二兩牛膝三兩半陳皮七錢乾薑五錢白芍一兩半鎖陽虎骨當歸各一兩加附子更妙酒糊丸治痿厥如神清暑益氣湯疰夏黃耆升麻蒼朮白朮人參神麯澤瀉陳皮黃柏當歸麥冬乾薑青皮五味子炙甘草加味四斤元肝腎虛酒牛膝兩半川烏虎脛骨肉蓯蓉各一兩乳香沒藥各五錢蒸木瓜一個搗如泥和酒糊丸溫酒或淡鹽湯下七十丸五獸三匱丸又鹿茸酥炙血竭虎脛骨酥炙牛膝酒浸金毛狗脊燒去毛各一兩共為末即五獸也另用附子一個去皮臍去中心入朱砂細末一兩填滿木瓜一個去皮去中心入附子於內以附子末説口即三匱也卻以三匱正坐於磁缸內重湯蒸極爛和五獸末搗丸木瓜酒下血竭一名麒麟竭神龜滋陰丸濕熱龜板酥炙四兩鹽黃柏鹽知母各二兩五味子杞子鎖陽各一兩乾薑五錢酒糊丸鹽酒下此治膏粱之人濕熱傷腎腳膝痿弱三妙丸又製蒼朮六兩酒黃柏四兩牛膝二兩此治濕熱下流兩腳麻木痿弱或如火烙之熱皆濕熱也健步丸長夏暑濕防己一兩羌活柴胡滑石酒花粉炙甘草各五錢防風澤瀉各三錢苦參川烏各一錢肉桂五分酒糊丸蔥白荊芥湯下四製蒼白丸又黃柏二斤以人乳童便米泔各浸八兩酥炙八兩浸炙各宜十三次蒼朮八兩用川椒補骨脂川芎五味子各炒二兩揀去諸味只取柏朮蜜丸早酒午茶晚白湯各下三五十丸清燥湯又黃耆白朮各錢半蒼朮一錢陳皮澤瀉各七分赤苓人參升麻各五分生地當歸豬苓麥冬神麯甘草各三分黃連黃柏柴胡各二分五味子九粒水煎服
