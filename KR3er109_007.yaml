body:
  text: 卷七癲狂源流癲狂心與肝胃病也而必挾痰挾火癲由心氣虛有熱狂由心家邪熱此癲狂之由癲屬腑痰在包絡故時發時止狂屬臟痰聚心主故發而不止此癲狂之屬癲之患雖本於心大約肝病居多狂之患固根於心而亦因乎胃與腎此癲狂兼致之故經曰癲疾始生先不樂頭重痛視舉犖目赤啼呼喘悸反僵而及骨與筋脈皆滿若脈大滑久自已脈小堅急死不治孟不樂者肝乘心也頭重痛肝氣上顛也視舉肝之目系急也目赤肝火上炎於竅也啼呼喘悸肝滿乘心而惑志失神也反僵急在筋也及骨與筋脈皆滿則與癇瘛同但無止時也脈大滑久自已陽搏於陰而脈滑陰猶盛也小堅急死不治肝之真臟見也惟及骨與筋脈皆滿故骨筋脈皆能患癲而症狀各異故經曰骨癲疾者頤齒諸腧分肉皆滿而骨居汗出煩冤筋癲疾者身拳攣急脈癲疾者暴仆四肢之脈皆脹縱脈滿若嘔多沃沫氣下泄者不治説骨筋脈之癲皆癲病之所統而及嘔多沃沫氣下泄總承諸癲言之凡患癲者皆以如此而不治也嘔多胃氣逆沃沫脾運已弛氣下泄腎關不守且二者俱無胃氣故不治也經曰狂之為病先自悲也喜忘善怒善恐少臥不飢已而自高賢也自辨智也自尊貴也善詈罵日夜不休又好歌樂妄行不休多食善見鬼神此言心疾或由於有所大恐大喜大憂大驚以至失神之為患也然而邪並於陽明亦能發狂上屋登高呼棄衣走罵詈不避視疏説邪者熱邪也陽明之部心君所居其部熱勢必及心是以亦失神也此言熱病也若夫心腎不交二陰二陽兩傷之氣交至則腎水空而龍火逆上與陽明之熱交並亦能惑志失神而癲狂罵詈所謂腎精不守不能主理使心火自焚也此言虛病也又有所謂怒狂者陽氣因暴折而難訣少陽膽木挾三焦相火大陽陰火而上升也古人治法先奪其食使下長氣於陽飲以生鐵落飲使金以制木木平則火降也此言陽厥病也此癲狂之症候王叔和云陰附陽則狂腰以上至頭熱腰以下寒也説陰氣不能治於內則附陽而上升陽無承而不下降故上熱而下寒陽附陰則癲腰以下至足熱腰以上寒也説陽氣虛不能衛於外則附陰而下陷故下熱而上寒此癲狂陰陽相附之異癲因謀望失志抑鬱無聊而成狂因陽氣遏抑不能疏越而得要必由心神耗散氣虛不能勝敵故痰與火得猖狂犯上而為是二疾此癲狂之原本相同癲為久病狂為暴病癲病多喜狂病多怒癲有時人不覺是癲之輕者狂有時人不及防是狂之驟者癲病痰火一時忽動陽陽相爭亦若狂之狀狂病痰火經久煎熬神魂迷瞀亦兼癲之狀此癲狂之形勢宜辨治癲先以吐劑涌去痰涎宜控涎丹次進安神之劑宜琥珀散治狂先奪其食次下其痰瀉其火下痰宜山查丸瀉火宜生鐵落飲此治癲狂之大要而癲之病有因驚得者宜抱膽丸有因怒得者宜寧神導痰湯有因心臟虛損氣血不足者宜清心溫膽湯有因痰迷心竅者宜金箔鎮心丸有因痰火俱盛者宜甘遂散吐下之有因思慮過度者宜歸脾湯有因心經畜熱或時煩躁眼鼻覺熱者宜岑連清心丸有因陰虧不時暈倒痰壅搐搦者宜滋陰寧神湯有因心氣不足神不守舍者宜歸神丹有因大病後心虛神散無氣羸弱者宜歸神丹有因痰為驟壅發為怪異狀者宜清心滾痰丸有因久年癲疾氣血俱耗者宜活虎丹有癲疾愈而復發作止無常者宜斷癇丹若婦人而患癲皆由血分不調宜加昧逍遙散或心風血迷之故宜甘遂散狂之病有因上焦者宜生鐵落飲有因陽明實者宜承氣湯有因熱入血室狂不知人者宜牛黃解熱丸有因火盛而為徉狂奔走者宜當歸承氣湯有因心經邪熱狂亂而精神不爽者宜牛黃瀉心湯黃連瀉心湯有因驚憂得之痰涎久留於心竅者宜鬱金丸有因風涎暴作氣塞倒仆者宜通泄散有因失魄狀若神靈所憑者宜填心丹有因失心失志或思慮過多積成痰涎留在心包者宜葉氏雄朱丸有因勞神太過致傷心血驚悸不寧若有人捕漸成心疾癲狂者宜辰砂寧志丸有因悲哀動中而傷魂魂傷則狂妄不精不精則不正當以喜勝之以溫藥補魂之陽者宜驚氣丸有因喜樂無極而傷魄魄傷則狂狂者意不存人當以恐勝之以涼藥補魄之陰者宜鬱金丸苦參丸有癲狂初起者宜寧志化痰湯有癲狂久不愈者宜鬱金丸此治癲狂之詳法或緣痰火鬱結而癲狂宜清心滾痰丸牛黃清心丸或緣風痰迷心竅而癲狂宜鐵粉散鬱金丸或緣癲狂而不得睡臥宜辰砂散其或癲或狂均可審其原而以方治之此治癲狂之通略脈法內經曰癲疾脈搏大滑久自已脈小堅急死不治又曰癲疾脈虛別可治實則死靈樞曰凡脈急甚皆為癲狂厥疾脈訣曰癲癇之脈浮洪大長滑大堅實痰畜心狂又曰大堅疾者癲狂得效曰恍惚癲狂實大為順沉細為逆癲病原由內經曰癲得之於母腹中名為胎病其母有所大氣上而不下精氣並居故令子發為癲疾也又曰厥成為癲疾又曰邪搏陽為癲疾綱目曰痰邪逆上頭中氣亂脈道閉塞孔竅不通故昏眩而倒仆也以其病在頭巔故曰癲疾又曰大人曰癲小兒曰癇其實一也鏊按大人亦有患癇者另詳諸癇條中綱目以大人小兒分癲癇而以為實屬一症恐非是癲與癇不同綱目曰癲者異常也若平日能言癲則沉默平日不言癲則呻吟甚而僵仆直視心常不樂言語無倫如癡如醉癇則卒然暈倒咬牙作聲吐涎沫不省人事隨後醒癲癇又與中風不同綱目曰癲癇仆時口中作聲將醒吐涎沫省後又發時作時止而不休息中風中寒中暑尸厥之類則仆時無聲省時無沫後不時發狂病原由內經曰怒狂生陽也陽氣者因暴折而難訣故善怒也病名曰陽厥又曰陽明病甚則登高而歌説以四肢為諸陽之本陽盛則四肢實故能登高也棄衣而走以熱盛於身故欲棄衣也妄言罵詈以陽盛則使人罵詈不避也不欲食故妄走也又曰邪入於陽則狂又曰陰不勝其陽則狂癲病異處內經曰多喜曰癲多怒曰狂難經曰重陰者癲重陽者狂入鬥曰癲者異常也精神癡呆言語失倫狂者凶狂也輕則自高自是好歌好舞重則逾垣上屋又甚則不避水火且欲殺人此痰火壅盛而然也直指曰陽虛明實則癲陰虛陽實則狂綱目曰癲謂僵仆不省也狂謂妄言妄走也經有言狂癲疾者又言癲病為狂者是癲狂為兼病也醫鑒曰癲者顛倒錯亂於癇於狂皆兼病也故有癲癇癲狂之名治癲方十六控涎丹總治甘遂去心大錢去皮白芥子等分糊丸薑湯下七丸壯者可十餘丸琥珀散又琥珀人參茯神遠志菖蒲乳香棗仁朱砂為衣甘遂散因痰甘遂末一錢豬心血和勻將豬心切開入末於內合以線縛濕紙包煨熟取藥入辰砂末一錢和勻分作四丸每一丸將所煨豬心煎湯化下如大便下惡物即止如不效再下一丸寧神導痰湯因怒南星半夏枳實赤苓橘紅甘草遠志菖蒲黃岑朱砂抱膽丸因驚水銀二兩朱砂乳香各一兩黑鉛一兩半將鉛入鍋令化入水很結成珠子次下乳香朱砂乘熱和勻丸芡實大空心井花水下一丸此丸亦治狂病金箔鎮心丸痰迷膽星一兩天竺黃琥珀朱砂各五錢牛黃雄黃珍珠各二錢麝香五分蜜丸金箔為衣薄荷湯下清心溫膽湯心虛陳皮半夏茯苓枳實竹茹白朮菖蒲香附當歸白芍薑黃連各一錢麥冬八分川芎遠志人參各六分甘草四分薑三片歸脾湯思慮龍眼棗仁黃耆白朮人參茯神木香炙草遠志當歸薑棗岑連清心丸心熱黃岑黃連花粉茯神麥冬丹參牛黃菖蒲遠志士志承氣湯胃實大黃芒硝枳實厚補滋陰寧神湯陰虧當歸川芎白芍熟地人參茯神白朮遠志南星各一錢棗仁甘草各五分酒黃連四分薑三片歸神丹病後大塊朱砂二兩入豬心內燈草扎好灑蒸二炊久取出另研棗仁茯神人參當歸各二兩西珀薑遠志龍齒各一兩金箔各二十片為衣酒糊丸每九丸至二九丸麥冬湯下甚者乳香人參湯下多夢不臥棗仁湯下清心導痰丸疢火酒大黃黃岑各四兩青礞石同焰硝煆如金色犀角皂角朱砂各五錢沉香二錢半麝香五分水丸朱砂為衣水下六七十丸活虎丹久癲活蠍虎一個剪取四足爪細矸入朱砂冰片麝香各少部研勻先用礞石散控下痰涎次用薄荷湯調此藥作一服化下勿令病人知之恐不肯服也此藥能補心神心全則病差斷癇丹復發黃耆鈎鈎細辛甘草各五錢蛇退一條燒存性蟬殼全者四枚牛黃一匙棗肉丸梧子大小兒服者緑豆大每二十丸人參湯下加味逍遙散婦人柴胡酒當歸酒白芍白朮茯苓各一錢炙甘草五分丹皮山梔各八分薑薄荷葉治狂方十九山楂丸息治生鐵落飲又先煮鐵落水入石膏三兩龍齒茯神防風各一兩半無參秦艽各一兩煎好入竹瀝承氣湯胃實大黃芒硝枳實厚補驚氣丸補魂附子木香橘紅薑蠶麻黃天麻葛根白花蛇各五錢蘇葉一兩冰片麝香各五分朱砂一錢為衣蜜丸圓眼大薄荷湯下一丸通泄散風涎瓜蒂末三錢加輕粉一匙水半合調勻灌之良久涎自出如末出含砂糖一塊下咽涎即出鬱金丸補魂朱砂鬱金白礬苦參丸又苦參一味蜜丸每十丸薄荷湯下牛黃解熱丸熱入血室牛黃錢半朱砂鬱金丹皮各三錢冰片甘草各一錢蜜丸當歸承氣湯火盛當歸大黃各一兩芒硝七錢甘草五錢共為末每一兩加薑五片棗十枚煎黃連瀉心湯又黃岑二兩黃達生地知母各一兩甘草五錢共為末每五錢水煎牛黃瀉心湯又生大黃一兩牛黃冰片朱砂各一錢共為末每三錢薑汁蜜水調下一名南極延生湯清心滾痰丸痰結此即上清心導痰丸鐵粉散痰迷真鐵粉半夏南星白附子羌活各二兩生川烏一兩半朱砂琥珀白殭蠶各一兩活礬五錢全蠍五十個金箔三十片共為末每四錢薑汁調下或水調亦可本事方曰鐵粉不但化痰鎮心至於摧抑肝邪特異若多恚怒肝邪本盛鐵粉能制伏之也鎮心丹失心朱砂活礬等分水丸芡子大每一丸參湯下葉氏雄朱丸又朱砂雄黃各一錢半白附子一錢豬心血丸另用朱砂為衣每五丸七丸九丸人參菖蒲湯下無人參黃耆代之辰砂寧志丸勞神辰砂二兩用酒二升煮酒存二盞留用薑遠志菖蒲棗仁乳香當歸茯苓茯神各七錢人參五錢豬心一個研如泥並酒丸臨臥棗湯下寧志化痰湯又膽星半夏陳皮茯苓薑黃連天麻人參棗仁菖蒲各一錢薑五片煎服再服養血清心湯棄血清心湯又當歸生地各一錢半人參白朮薑遠志茯神棗仁川芎各一錢甘草五分辰砂散不臥塊朱砂一兩棗仁乳香各五錢服法詳上不寐方中通治癲狂方五清心滾痰丸痰火方詳上牛黃清心丸又方詳上鐵粉放風痰方詳上鬱金丸又方詳上辰砂散不寐方詳上不寐方中諸汗源流涕目涎唾睡則汗出醒則倏收名曰盜汗不分寤寐不因勞動自然汗出名曰自汗諸汗心虛病也汗者心之液故其為病雖有別因其原總屬於心然腎又主五液心陽虛不能衛外而為固則外傷而自汗亦腎陰衰不能內菅而退藏則內傷而盜汗故汗之病專屬心汗之根未有不兼由心與腎且腎陰既衰心血必不足以精即是血心虛必本於腎虛腎虛必至於心虛也而自汗盜汗二者又有冷熱之分寒氣乘陽虛而發汗必冷熱氣乘陰虛而發汗必熱又有熱火過極反兼勝己之化者汗亦冷此不可不細辨也夫汗固為心與腎二經之虛其實五臟虛衰皆能致汗其專由心虛而汗者法當益其血脈宜當歸六黃湯其專由腎虛而汗者法當助其封藏宜五味子湯若由肺虛而汗則必固其皮毛宜黃耆六一湯由脾虛而汗則必壯其中氣宜補中益氣湯由肝虛而汗則必禁其疏泄宜白芍湯五臟所致之汗各有治法如此然此皆五臟之氣先虛而後汗出非汗之出分屬於五臟經云驚而奪精汗出於心宜遠志柏子仁持重遠行汗出於腎宜人參肉桂疾走恐懼汗出於肝宜棗仁山藥搖休勞苦汗出於脾宜人參白朮飲食過飽汗出於胃宜陳皮白朮則又當因乎汗之由以分治其臟腑至若肺主氣又主皮毛肺虛則表不能衛而汗從肺自出宜玉屏風散思慮太過當心一片津津而汗從心自出宜天王補心丹名曰心汗胃家虛水谷氣脫散而汗從胃自出宜補氣運脾丸邪在內玄府不閉而汗從腎自出宜無比山藥丸邪在表腠理不閉而汗從腎自出宜調榮活絡飲又皆臟腑兼及之餘症也而陰陽氣血之際尤不容不察説陰虛者陽必湊故發熱自汗宜當歸六黃湯陽虛者陰必乘故發厥自汗宜黃耆建中湯肌胅澀而尺脈滑榮血自涸者必多汗宜當歸六黃湯氣虛而陽弱者必體倦自汗宜耆附湯氣不順者必多汗宜小建中湯加白芍肉桂木香甘草薑棗陰陽偏勝者必多汗宜黃耆湯陰火盛者必多汗宜正氣湯臟腑之陰拒格衛氣浮散於外無所依歸者必多汗宜玉屏風散諸虛不足羸瘠活瘦心忪驚湯者必多汗宜牡蠣散病後氣血俱虛者必多汗宜十全大補湯審乎此而陰明陽氣血各得其理矣他如津脫者汗大泄宜調衛湯痰盛者汗自流宜理中降痰湯火氣上蒸冒濕者必作汗宜涼膈散表虛者汗出溱溱宜丹溪治汗湯濕勝者汗滲肌肉宜調衛湯胃熱者多於食後汗下如雨宜二甘湯飲酒中風者惡風少氣汗出如浴內經謂之漏風其狀或多汗常不可單衣食則汗出甚則身熱喘息衣常濡口乾善渴不能勞事者宜白朮散以上七症悉自汗之患所當治者也惟汗出如珠如油如膠淋漓而揩拭不逮者皆不可治人有汗出額上偏多者以頭為諸陽所會故蒸熱而汗此就無病者言之也又以左頰屬肝右頰屬肺鼻屬脾頦屬腎額屬心三焦之火涸其腎水溝渠之水迫而上屬於心故血虛而偏多汗此就有病者言之也宜額汗方若頭汗出齊頸而還則為血症宜四物湯加減濕邪搏陽亦汗出頭額宜參用勝濕湯調衛湯水結胸無大熱亦汗出頭額宜小半夏湯加茯苓陽明胃實亦汗出頭額宜調胃承氣湯而又有手足汗者液自胃府旁達於外則手足自汗有熱聚胃府逼而出之者此陽明病也必當下宜大柴胡湯有手足汗用涼藥補藥俱不效者此陰陽不和經絡不調也宜八物湯加半夏茯苓為君川烏白附子為佐使即止有兩腋汗腳心汗久不愈者此濕熱流注也宜牡礬丹而又有陰囊汗者則為腎虛陽衰宜安腎丸小安腎丸有陰囊汗出久而生瘡其癢甚苦搔之不足後必自痛者則為濕熱流注宜牡礬丹而又有血汗者汗出污衣甚如蘇木水湔染即內經之衊症刖由膽經受熱血遂妄行又與手少陰氣并故成此症宜定命散亦或由大喜傷心者則以喜必氣散血隨氣行故成此症宜黃耆建中湯兼用小麥麥門冬金銀器煎湯調下妙香散亦或有産婦血汗者則以氣血虧耗也宜猬皮散而又有黃汗者則以汗出時入水澡浴濕熱內鬱之故宜耆陳湯另詳黃疸門若乃汗多不止其陽亡脫名曰亡陽症其身體必冷多成痹寒或四肢拘急宜桂枝附子湯又陽虛亡陽汗不得出亦名曰亡陽症必致頭眩身栗宜陶氏再造散以上總指自汗言經曰腎病也者寢汗出憎風説腎傷則陽衰陽衰則衛虛所虛之衛行於陰分當目瞑之時無氣以固其表則腠理開而盜汗出醒則行陰之衛氣復於表而盜汗止法當益氣補陰降火則自愈宜當歸六黃湯四制白朮散牡蠣散或盜汗良方此其大較也或有緣陰火盛者宜正氣湯或有緣肝熱甚者宜龍膽散或有緣氣血兩虛者宜當歸地黃湯或有緣諸虛不足者宜參耆湯其病雖同而源則異以上總揩盜汗言然則自汗盜汗烏容忽視之也哉脈法內經釋曰尺膚澀而尺脈滑此自汗而血涸津脫也脈訣曰汗浮虛或澀或濡軟散洪大渴飲無餘又曰肝脈浮虛或濡或澀自汗在寸盜汗在尺仲景曰寸脈微尺脈緊其人虛損多汗知陰常在絶不見陽也又曰傷寒脈浮而遲面熱赤而戰惕者當汗出解也脈遲者為無陽不能作汗其身必癢脈經曰男子平人虛微細者喜盜汗出汗即津液內經注曰腠理發泄汗出溱溱是為津津滲於孔竅留而不行者是為液貿生曰津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消經瘦耳數鳴東垣曰大腸主津小腸主液二腸受胃之榮氣乃能行津液於上焦灌溉皮毛充實腠理若飲食不節胃氣不足二腸無所稟受故津液涸竭也汗因濕熱內經注曰陽氣上搏陰能固之則蒸而為汗難經曰腎邪入心為汗正傳曰心為君火脾胃為濕土此濕熱相搏而為汗明矣綱目曰衛氣虛則多汗榮血虛則無汗矣丹溪曰風病多汗風散氣故也痰症亦多汗頭眩逆也火氣上蒸胃中之濕亦作汗諸汗症治內經曰汗出偏沮使人偏活正傳曰盜汗者陰虛榮血之所主也宜補陰降火明理曰頭者於諸陽之會邪搏諸陽津液上湊則汗見於頭本事曰頭者二陽之會説三陰之脈至胸而遠凡有頭汗出自是陽虛故曰汗出為陽微是陰不得有汗也得效曰凡心腋汗大人乃心血溢盛而常發赤者是也小兒因驚得之有人患心腋盜汗久不止用參歸腰子以收斂心血遂愈其方人參當歸各五錢豬心一個破作數片並心內血以水二碗先煮豬心至一碗半乃入二藥同煎至八分取清汁即吃豬心以汁送下令盡入門曰凡發汗過多則陽虛不固汗出多則津液亡而小便難四肢者諸陽之本液脫者骨屬屈伸不利是以四肢拘急也仲景曰柔汗發黃為脾絶釋云柔為陰柔柔汗即冷汗也一云油汗即黏汗也醫鑒曰內經言絶汗注謂汗出如珠不流復旋轉也説以六陽氣俱絶絶汗乃出朝占夕死夕占朝死東垣曰凡內傷及一切虛損之症自汗不止者總用補中益氣湯少加附子麻黃根浮小麥其效如神但升柴必用蜜水制炒以殺其升發勇悍之性又欲其引參耆等藥至肌表也又曰仲景桂枝湯治外感風邪自汗之聖藥也黃耆建中湯治外感氣虛自汗之神劑也補中益氣湯治內傷氣虛自汗之妙方也汗出凶症苴指曰份寒熱病汗出發潤一不治也汗出如油二不治汗凝如珠三不治入門曰傷寒熱病頭汗如珠不流者陽脫即死活人書曰傷寒陽病自汗有九症皆有治法陰病不得有汗惟陰毒則額上手背有冷汗甚者如水洗此是陽虛陰盛亡陽而將脫也其死必矣鏊按汗出凶症一切病皆然不特傷寒熱病為忌也因前人只於傷寒熱病詳言之茲故雖非言傷寒亦借録其語於此以為凡病有自汗凶症者亦知所忌也禁忌法活人書曰冬月天地閉血氣藏縱有病亦不宜多出汗鏊按不宜多出汗言不宜用藥使之多汗也丹溪曰自汗大忌生薑以其開腠理故也又曰凡有汗一切辛辣之味五辛之屬並忌食之涕瓷涎唾五臟所出或為病或不為病也難經曰腎主五液分化五臟入肝為瓷入心為汗入脾為涎入肺為涕自入為唾然則汗涕瓷涎唾五者雖皆由腎灌施而既灌施各臟則即為各臟之液也入心之汗已詳言之若夫涕者由肺所出或清或濁皆肺之病也如肺傷風則流清涕宜川芎茶調散肺傷熱則流黃濁涕如膿狀甚或大如彈丸從鼻中出不出損肺而死宜黃連清肺散肺傷寒則流厚濁涕宜參蘇飲肺兼傷風熱亦流濁涕宜荊防瀉白湯肺氣冷亦流清涕宜半夏溫肺湯然而肺系上通於腦故鼻淵一症則為腦病其原皆由肺經感受風寒久而凝入腦戶太陽濕熱又為蒸鬱宜辛夷消風散或好飲熱熾風邪相乘而風與熱交結不散宜辛夷荊芥散皆能成此症以致濁涕下不止經又云膽移熱於腦則辛頞鼻淵是病更兼屬乎膽者也宜奇授藿香散其款另詳於鼻門瓷者由肝所出其因悲哀愁哭而瓷出不為病者無論已至如迎風瓷出宜加味地黃丸隱澀瓷出宜芎歸明目丸羞明瓷出宜羞明立勝散皆肝之病也説肝發竅於目靈樞謂目者肝之所聚上液之道則使宗脈有所感而成病必液道開液道開而瓷於是出矣其緣乎迎風者肝陰虧血不能榮及乎睛故為風邪所搏而瓷出也其緣乎隱澀者肝經熱邪上壅於本竅而烏珠正屬肝其熱邪遂由本竅而攻擊乎所屬故本經之氣不勝而瓷出也其緣乎羞明者肝屬木木本生火肝主風風勢更疾今在內之風木為外來之風火所觸故反受其制而瓷出也肝與膽相表里故膽熱者亦瓷出宜湯泡散老人火盛水虧膽汁慳者哭則無瓷笑反有瓷宜養肝丸明目四神丸是病亦兼屬乎膽者也其款另詳於目門涎者由脾所出從口角流溢而不禁者是也涎與痰同為火盛所生故曰痰涎涎與沫同為水濕所聚故曰涎沫而痰也沫也涎也同伏於脾脾與胃相表里故伏於脾者溢於胃口為胃之門戶故溢於胃者流於口由內出外自相連屬其或時吐清水冷涎自下涌上脾熱所致也宜二陳加白朮白芍土炒升淋岑連山梔神麯麥芽乾薑或煎或丸服其或涎自兩腮流出而不自知睡則更甚氣弱不能管攝也宜六君子湯倍茯苓半夏如瓜蔞霜其或涎流不已脈洪大甚兼喜笑舌喑土病而反傷乎母也宜沈氏止涎湯其或始而口角流涎漸至口眼斜木不能剋土致受脾熱反傷而肝風轉助為靈也宜用通天愈風湯送下清心導痰丸五十丸夫脾與胃相表里如靈樞謂飲食人於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開而涎下宜烏梅丸去人參附桂合平胃散服是病更兼乎胃也而不得專取脾唾者由腎所出凡人口曰華池口中津唾曰玉泉舌曰靈根黃庭經謂玉朱清水灌靈根審能修之可長存修煉家以舌抵上腭則津唾滿口咽之足以滅火足以養心此唾之無病且可腳病者也若胃中有寒則多唾宜理中丸加益智仁陽明正府有積冷則多唾宜理中丸加半夏胃家有濕滯刖多唾宜勝濕湯胃中有宿食則多唾宜平胃散加神麯伏苓半夏麥芽大病新愈胃陽未復則喜唾不休宜理中丸加益智仁蟲症往來痛五更心嘈牙關硬面色青黃則多唾或吐清水宜追蟲取積散其或肚大青筋時痛時止人中鼻唇一時青黑亦多唾宜萬應丸又或往來痛無休腹中有塊起似手按之不見鐘聚痛則咬心亦多唾宜蕪荑散另詳蟲門茲撮其略以上皆病之兼乎胃者以唾為腎液而腎為胃關故腎家之唾為病必見於胃也若乃腎寒則多唾宜溫腎丸腎虛亦多唾宜虎潛丸則腎本經病然則此五者固即五臟之津液而獨不免於病焉謹身之士盍亦加之意也夫涕瓷涎唾原由形症直格書曰積液生氣積氣生液朱於語癸曰或問曰天一生水有可驗乎曰人身可驗矣貪心動則津生哀心動則瓷生楚心動則汗生欲心動則精生方人心寂然不動時則太極也此心之動則太極動而生陽所以心一動而水生即可以為天一生水之證也貿生曰水谷入於口輸於腸胃其液則為五天寒衣薄則為尿與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水服靈樞曰液者所以灌精輸孔竅者也故上液之道開則泣泣瓷也泣不止則液竭液竭則精不灌精不灌別目無所見矣命旨奪精內經曰泣涕曰腦也腦者陰也腦滲為涕延壽書曰真人口當習不唾地説口中津液是金漿玉醴能終日不唾嘗吞而咽之令人精氣常流而目有光説人身以津液為本在皮為汗在肉為血在腎為精在口為津伏脾為痰在眼為瓷曰汗曰血曰瓷曰精已出則皆不可回惟津唾則獨可回也回則生生之意又續矣有人喜唾液乾而體活遇至人教以回津之術久而休復潤治汗方四十一當歸六黃湯總治當歸熱地生地黃岑黃柏黃連各一錢黃耆二錢五味子腎汗五味山萸龍骨牡蠣首烏遠志五倍子地骨皮黃耆六一湯肺汗黃耆六錢炙草一兩黃為末每五錢煎服補中益氣湯脾汗人參黃耆歸身白朮升麻白芍湯肝汗白芍棗仁烏梅天