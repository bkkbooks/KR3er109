歸鎖陽各二兩陳皮虎骨各一兩乾薑五錢酒糊丸如加人參牛膝山藥破故紙杜仲五味豫菟絲子杞子豬脊髓丸名加味虎潛丸大補心腎虛勞小腸病源流小腸氣小腸癰手太陽小腸脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩盤之間上循孺外後廉出肩膊繞肩胛交肩上入缺盆絡心循咽抵膈至胃到小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴次注足太陽膀胱經每日未時氣血至小腸手太陽小腸經少氣多血經曰小腸者受盛之官化物出焉其為器亦止為胃役使特以與心絡並行隧道又與足太陽膀胱連經故亦以三陽歸之非謂其職能與足太陽並列也倘一拈太陽即以小腸膀胱並舉不知要矣所以小腸之職任與大腸相仿大腸之腑無靈小腸亦無靈大腸之經非當陽之用小腸亦非有巨陽之用經故俱以器目之也惟小腸與大腸皆為胃化物之器故其病亦與胃同惟本經與心絡並行隧道故本經病亦延及於心然亦止在經絡而已無與於心之臟也其為病實則嗌痛頷腫不可以顧肩似折臑似折節弛肘廢小水不利及赤或澀痛尿血虛則遺尿面白苦寒耳前熱小腸氣生疣小者患指痂疥虛實之病各有別矣至遺溺閉癃更有由肝所生病及膀胱不約者固不盡由小腸也各詳本症小腸形質靈樞曰唇厚人中長以候小腸又曰心應脈皮厚者脈厚小腸亦厚皮薄者脈薄小腸亦薄皮緩者脈緩小腸大而長皮薄而脈小者小腸小而短諸陽經脈皆多紆曲者小腸結入門曰凡胃中腐熟水谷其滓穢自胃之下口傳入於小腸上口自小腸下口分別清濁水液入膀胱上口滓穢入大腸上口難經以大小二腸之會為闌門言關闌分隔也小腸症治靈樞曰中氣不足腸為之苦嗚又曰小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱內經曰小腸為泄入門曰小腸有氣則小腹痛小腸有血則小便澀小腹有熱則莖中痛又曰小腸者心之府也有病宜通利小腸絶候脈經曰小腸絶六日死何以知之發直如乾麻不得屈仲自汗不止小腸氣小腸經病也小腹引睪丸連腰脊而痛小腸虛風冷乘間而入邪氣既實則厥而上衝肝肺控引睪丸上而不下也宜楝實丸葫蘆巴散千金方以為㿉疝有四種其一腸㿉即小腸氣吊外腎偏墜腫癢故綱目等書多因其説並云得之於地氣卑濕亦當備參而其為症有甚而熱痛小便不通者宜加味通心飲有年久不愈者宜橘核丸有莖囊抽痛不可忍耐者宜立效散楊氏麝香元四味茴香散各宜詳究脈法正傳曰肝脈滑甚為㿉疝小腸氣痛小腸氣症治綱目曰大抵小腸氣屬濕多故江淮間多有之宜以去濕之劑下之以苦堅之不可溫之補之小腸癰小腸火熱病也或因七情飲食或因經行産後瘀血留積其症發熱惡寒脈芤而數膚皮錯縱腹急漸腫按之內痛大便重墜小便澀滯若淋或小腹隱痛堅硬如掌而熱肉色如故亦或琚赤微腫甚者臍突腹脹轉側有水聲宜大黃湯如瘀血去盡則安矣若體虛脈散不敢輕下用輕劑可也宜活血散瘀湯癰已成則腹痛腹滿不食便淋刺痛宜苡仁湯腹濡痛小腹急必時時下膿宜丹皮散㿉後疼痛淋瀝不已必見諸虛症宜參耆地黃湯此病亦不可驚防腸斷坐臥轉側皆宜徐緩嘗少進稀粥靜養調理為要但古方書但載腸癰無大小之別故其治法亦約略相仿參考可也脈法脈訣曰關內逢芤腸裡癰小腸癰症治瘍科選粹曰若小腹硬痛脈遲緊者未有膿也用大黃湯下之不敢下者用敗毒散加秦艽連翹脈芤澀者四物湯加桃仁紅花延胡索木香小腹軟痛脈洪數者已有膿也用薏苡仁湯排之或三仁湯神效瓜蔞湯小腹疼痛小便不利膿壅滯也牡丹皮散主之若大便或臍間出膿者不治治小腸病諸藥要品及方二小腸實宜滲利茯苓甘草知母黃連麥冬童便木通黃柏牛膝黃岑生地燈心琥珀瞿麥石膏滑石山梔紫菀陳皮車前赤豆扁豆海金沙小腸虛宜補氣人參黃耆山萸麥冬金櫻子肉五味牡蠣茯苓茴香益智仁肉白芍粳米溲而便膿血加赤石脂導赤散小腸熱生地木通甘草各一錢竹葉七片此治小腸熱而小便不利者赤茯苓湯又赤苓木通生地檳榔黃岑赤芍麥冬甘草各一錢薑五片附載仲景分別標本方藥標茯苓石膏本導赤散淡竹葉木通甘草治小腸氣方七楝實丸總治川楝子茴香吳萸陳皮馬蘭花芫花醋糊丸每服一錢漸加至二錢溫酒送下如不用酒淡薑湯下胡蘆巴散又胡蘆巴益智仁大茴蓬朮牽牛子山萸肉酒牛膝川斷川芎防風甘草共為末每二錢酒下加味通心飲熱痛瞿麥木通山梔黃岑連翹枳殼甘草川楝子各一錢燈心二十莖車前草五葉橘核丸久痛炒橘核鹽酒炒海藻鹽酒炒崑布鹽水洗海帶麩炒桃仁炒川楝子各一兩酒炒延胡索厚朴枳實肉桂木香木通各五錢酒糊丸或酒或鹽湯下六七十丸如久不消加醋煮硼砂二錢此方總治一切㿉疝卵核腫脹偏有大小或硬如石或小腹絞痛甚則囊腫潰爛出黃水無不效如小腸氣新發者不必此方只用橘核一錢半桃仁十五個山梔一錢炮川烏吳茱萸各五分各炒為粗末水煎此名橘核散橘核單止痛川烏散寒鬱山梔除濕熱又引川烏速下不令胃中停留用之甚捷立效散抽痛全蠍七個砂仁三七枚茴香一錢共為末分三服熱酒調下空心即效楊氏麝香元又木香胡椒各一兩炒全蠍巴霜各四錢麝香一錢蒸餅丸麻子大朱砂為衣熱水下五七丸此方能尋諸處痛凡小腸氣及膊胱氣脅下痛最難治此藥主之四味茴香散又烏藥酒浸一宿焙高良薑青皮茴香各一兩共為末每二錢發時酒下治小腸癰方十天黃湯初起熟大黃芒硝各一錢丹皮白芥子桃仁各二錢活血散瘀湯又川芎當歸赤芍蘇木丹皮枳殼木瓜桃仁各一錢檳榔六分炒大黃二錢苡仁湯已成苡仁瓜蔞仁各三錢丹皮桃仁各二錢白芍一錢丹皮散下膿人參丹皮白芍茯苓苡仁黃耆桃仁白芷當歸川芎各一錢肉桂甘草各五分木香三分參耆地黃湯補益人參黃耆茯苓熟地山藥丹皮山萸薑棗敗毒散毒四物湯下瘀川芎當歸白芍地黃三仁湯下膿苡仁二錢半冬瓜仁桃仁丹皮各一錢半神效瓜蔞湯又瓜蔞一個當歸甘草各五錢乳香沒藥各一錢此是重劑勿輕用牡丹皮散又丹皮人參天麻茯苓薏苡仁黃耆桃仁白芷酒當歸川芎各一錢炙甘草七分膀胱病源流膀胱氣轉胞症足太陽膀胱起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中挾脊貫臀入膕中其支者從髆內左右別下貫脾挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側次注足少陰腎經每日申時周身氣血俱注於膀胱足太陽膀胱經少氣而多血膀胱本州都之官藏津液州都者下邑也遠於京師且津液必待氣化而後能出則其為器有不得與諸陽並者乃其經反納太陽何也以太陽起於少陰今歸之以陽故藉納於此也其實太陽為三陽之主膀胱乃必待氣化而後能出則太陽豈膀胱能為之耶後人不明經旨謂膀胱為太陽寒水以主寒令不知六氣之寒水惟腎能主之人身太陽之經既非寒令而膀胱之水亦非寒水固不可混也則膀胱之所以為腑有可識矣試進詳之人身太陽之經起於足上於巔腦及額顱內下於膺中包心肺皆太陽經所貫太陽居六經之盛故為巨陽而為諸陽主氣然以同衛氣起於少陰乃以其陽藉納膀胱而膀胱雖居卑賤所以得稱太陽也膺中為心肺所居肺主皮毛心主血脈太陽之經既下膺中則皆與太陽和是以寒邪一犯太陽遂傷肺及心以犯皮毛血脈為心肺之所合如皮毛懍懍鼻塞聲童罷寒無汗以及心煩皆太陽病而師與心皆為之變也仲景治太陽傷寒設麻黃湯發汗以疏肺設桂枝湯和表止煩以寧心豈非治太陽即以治太陰少陰且治太陰少陰正所以治太陽乎是太陽一經實兼攝手二陰矣故其為病實則鼻窒頭痛目似脫瓷出項似拔腰似折髀不可以曲膕如結腨如裂是為踝厥痔瘧狂臍反出下腫便膿血肌肉痿少腹脹痛按之欲小便不得若虛則鼽衄小便不禁遺尿膀胱氣皆其候也古人謂太陽病並有時連及陽明經曰肝膽同歸津府所以太陽厥陰同為一治又曰膀胱腎合為津液腎所以主二便之難此膀胱所以連及諸經而為病也故膀胱病小便祕不得任用熱藥經又曰胞移熱於膀胱則為遺溺閉癃又曰小腹膀胱按之內痛若沃以湯澀於小便上為清涕則為胞痺注云胞內居之則知胞居膀胱之內也其胞痺之症由風寒濕邪客於胞中氣不能化出故胞滿而水道不通以致小腹膀胱俱痛而澀於小便也宜腎著湯腎瀝湯巴戟丸而胞與膀胱皆有上口無下口至胞之為患有轉胞症另詳於後然轉胞為胞本病而患之所及又能令目病如能遠視不能近視有其火無其水也當補腎宜地芝丸六味地黃丸能近視不能遠視有其水無其火也當補心宜定志丸加茯苓通及心腎而近視不能遠視宜空心服四物湯加澤瀉茯苓牡蠣臨臥服遠志丸加甘菊密蒙花皆胞所致病也總之凡目病血勝則痛血勝則癢又能致頭風宜川芎瓜蒂又能致頭汗亦皆胞所致病也膀胱形質內經曰水液自小腸沁則汁滲入膀胱之中胞氣化之而為尿以泄出也東垣曰膀胱雖為津液之府至於受盛津液則又有胞居膀胱之中類纂云膀胱者胞之室也靈樞曰鼻孔在外膀胱泄漏又曰腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛多而粗者三焦膀胱直稀毫毛者三焦膀胱結膀胱症治內經曰膀胱不利為癃不約為遺尿入門曰膀胱病者熱結下焦小腹苦滿胞轉小便不利令人發狂冷則濕痰上溢而為多唾小便淋瀝故遺尿鰲按小便不禁由膀胱氣虛加減八味丸倍山萸加烏藥益智補骨指是主藥也小便不通由膀胱邪熱五苓散益元散是主藥也膀胱絶候內經曰遺尿狂言目反視此膀胱絶也又曰膀胱絶者戴眼反瘛瘲其色白絶汗乃出絶汗出則死矣膀胱氣膀胱經病也其症小腹腫痛必小便祕宜五苓散加茴香蔥白鹽服藥後若下小便如墨汁膀胱之邪去矣邪去而便通痛止矣宜隨用硼砂丸入門以㿉疝有四種其一種水㿉外腎腫大如升如斗不痛不癢為即膀胱氣宜備參究而其為症有由膀胱腎虛結成腫痛者宜茱萸內消丸有膀胱氣連脅下痛者宜楊氏麝香元有由蘊熱陰囊腫脹大小便不通者宜三白散有膀胱氣痛不可忍者宜蠲痛元金鈴散三疝湯有症由新得者宜橘核散有年久不愈者宜橘核丸膀胱氣症治綱目曰小腹痛者三肝病小腹引脅痛小腸病小腹引睪丸腰脊痛膀胱病小腹腫痛不得小便又曰神保元治膀胱氣脅下痛最妙通用橘核丸橘核散導引保生祕要曰用手緊鼎幽闕納氣數口而緊緊頂閉納之立效運央保生祕要曰因欲火積滯外腎復感冷氣故作脹痛不可勝言注意從外腎提氣至內腎右運二七遍即從內腎想一火提至頂門略凝而後行吹吸之法轉胞症水逆氣迫病也亦作轉脬症直指曰此症由強忍小便或尿急疾走或飽食走馬或忍尿入房使水氣上逆氣迫於脬故屈戾而不得舒張也脬落即殂又曰此症孕婦多有之患在忍縮小便或醉飽入房使小腸之氣逆而不通大腸之氣與之俱滯外水不得入膀胱內水不得出膀胱淋瀝急數每欲尿時如不可言大便亦裡急頻並似痢非痢必以手按臍下庶可立出小便甚者因此腹脹浮腫治法用涼藥疏利小腸中熱仍與通泄大腸逮其腹中攪痛大便大下則尿脬隨即歸正小便自然順流丹溪曰胎婦轉脬之症稟受弱者憂悶多者性急躁者食厚味者大率有之古方用滑利疏導無效因思脬為胎所墮展在一邊脬係了戾不通爾胎若舉起懸在中央脬係得疏水導自行一婦患此診之兩手似澀重取則弦此得之憂患澀為血少氣多弦為有飲遂以參朮飲空心煎服遂以指探喉中吐出藥汁俟少項又與一帖次早亦然如是與八帖而安此法恐偶中後歷用數人皆驗據此二説一用瀉一用吐皆所以疏通其氣而使之流注也至轉脬之候必臍下急痛小便不通此所以與尋常溺閉有異若老人有脬轉困篤欲死者又與少年不同治宜六味丸倍澤瀉説少年不須補益只與利導足矣宜蒲黃散滑石散又有驚憂暴怒氣乘膀胱鬱閉而脬係不正遂至小便卒暴不通小腹膨脹氣上衝心悶絶欲死者此其治法必當兼氣分宜蔥白湯即如孕婦轉脬治法雖不同要必兼補氣血宜參朮飲參朮湯此皆胞之為病所當從胞而治者也胞為尿器東垣曰膀胱雖為津液之府至於受盛津液則又有脬而居膀胱之中焉故內經云脬移熱於膀胱靈樞云膀胱之脬薄以濡類纂云膀胱者脬之室夫脬之居於膀胱也有上口而無下口津液既盛於脬無由自出必因乎氣化而後能漸漬浸潤於胞外積於胞下之空處遂為尿以出於前陰若使脬正無空處則人尿急時至廁安能即出乎夫惟積滿脬下之空處而不可再容故急急則至廁即出矣治膀胱病諸藥要品及方十膀胱實宜潤滲黃柏知母滑石木通瞿麥車前子旋覆花茯苓豬苓澤瀉膀胱虛宜補氣人參山萸天冬麥冬牛膝益智仁金櫻子五味杞子柏子仁虛加牡蠣鹿茸桔梗桑螵蛸雞肫皮既濟丸膀胱虛菟絲子益智仁肉蓯蓉茯苓韭子當歸熟地各五錢牡蠣鹽黃柏鹽知母酒山萸去核各三錢五味子一錢面糊丸空心鹽湯下百丸治小便不禁葵子丸膀胱實熱冬葵子赤苓豬苓枳實瞿麥滑石木通黃岑甘草車前子各一錢薑五片治小便不通巴戟丸胞痺巴戟兩半桑螵蛸麩炒薑遠志酒生地山藥附子酒川斷酒蓯蓉各一兩杜仲金石斛鹿茸龍骨菟絲子五味子山萸官桂各三錢蜜丸空心酒下五七十丸治胞痺小便澀而不通腎著湯又炒乾薑茯苓炙甘草白朮各二兩共為末每服用四錢水一鐘煎七分空心溫服此方兼治腎虛傷濕腰極重極冷而痛不渴小便自利此名腎著症腎瀝湯又麥冬去心五加皮犀角鎊各一錢半薑汁炒杜仲桔梗煨赤芍木通各一錢桑螵蛸一個水二鐘入羊腎少部煎八分食前服地芝丸補腎熟地天冬各四兩枳殼甘菊各二兩蜜丸六味地黃丸又熟地山藥山萸丹皮茯苓澤瀉蜜丸定志丸補心茯苓茯神各三兩石菖蒲遠志各二兩朱砂一兩內半為衣蜜丸四物湯近視川芎當歸白芍生地遠志丸又麥冬菖蒲甘菊遠志各五錢杞子熟地各四錢蜜丸附載仲景分別標本方藥標麻黃桂枝黃耆白朮防風防己製蒼朮羌活本五苓散白朮肉桂茯苓豬苓澤瀉加滑石治膀胱氣方十五苓散溺閉肉桂白朮茯苓豬苓澤瀉硼砂丸藥後木香沉香巴霜青皮銅青硼砂茱萸內消丸腎虛山萸吳萸川楝子馬蘭花茴香青皮陳皮山藥肉桂各二兩木香一兩酒糊丸此方兼治膀胱腎虛致成寒疝偏墜引痛及小腸奔豚痃癖等症楊氏麝香元脅痛木香胡椒各一兩全蠍巴霜各四錢麝香一錢蒸餅丸麻子大朱砂為衣湯下五七丸能尋諸處痛凡膀胱氣脅下痛最難治此方主之神保元即此方無麝香亦是治膀胱氣痛要藥三白散蘊熱白醜頭末一兩桑白皮白朮木通陳皮各二錢半共為末每一錢薑湯下蠲痛元痛甚延胡索一兩川楝肉茴香各五錢白醜頭末當歸高良薑青皮木香烏藥各二錢半全蠍七個薑汁浸蒸餅糊丸燒綿灰調酒送下三五十丸金鈴散又金鈴子三十枚巴豆肉三十枚各切片同炒焦色去巴豆以茴香炒與金鈴肉等分並入木香一錢半共為末每二錢水酒各半煎蔥白湯調下橘核丸久病橘核炒鹽酒炒海藻鹽酒炒崑布鹽水洗海帶麩炒桃仁炒川楝肉各一兩酒炒延胡索厚朴枳實肉桂木香木通各五錢酒糊丸溫酒或鹽湯下治轉胞症方六六味丸老人熟地山萸山藥丹皮澤瀉茯苓蒲黃散總治蒲黃滑石等分為末每三錢雞子清調下滑石散又寒水石二兩滑石亂髮灰車前木通各一兩冬葵子一合蔥白湯驚憂陳皮三兩冬葵子一兩蔥白三莖水五升煎三升分三服參朮飲孕婦川芎當歸白芍地黃人參白朮半夏陳皮甘草薑三棗二服後探吐參朮湯又人參白朮當歸白芍半草陳皮甘草服後探吐小便閉癃源流小便黃赤遺溺飲後即便交腸症小便閉癃肝與三焦及督脈病也言三經而不及膀胱者以膀胱但主藏溺而不主出溺也經云肝脈過陰器病閉癃又云女子督脈入係廷孔廷孔正中直孔即溺竅也男子循莖下至篡陰莖之端也病不得前後又云三焦下腧並太陽正脈入絡膀胱約下焦實則閉癃虛則遺溺據經觀之閉癃之症舍三經何屬哉雖然其致病之由實各有異膀胱藏溺氣化則出而主氣化者肺也若燥則不能生水氣化不及膀胱法當清金潤肺宜紫菀麥冬車前丹皮茯苓如脾濕不運水谷不精不能上輸於肺使肺得行其液以生水法當燥濕健胃宜茯苓半夏白朮蒼朮如腎水燥熱以致膀胱不利法當滋腎滌熱宜知母黃柏茯苓通草澤瀉又或水液只滲大腸小腸因而燥竭宜以淡滲之品分利之宜茯苓豬苓通草澤瀉又或氣滯不能通調水道下輸膀胱必以順氣為急宜枳殼木通橘紅蘇子又或心火盛以致小腸多熱急當清心宜黃連犀角天冬麥冬又或由乎大虛須與溫補以行其水宜金匱腎氣丸又或忿怒氣結閉遏不通須開鬱破氣宜鬱金檳榔桔梗枳實至若三焦實熱則惟用純陰之品以化其陽而已上焦熱宜山梔黃岑中焦熱宜黃連黃岑下焦熱宜知母黃連此治閉癃之大法也乃丹溪獨以吐法通小便説亦猶滴水之器上竅通下竅自出之意其旨微妙有可參用其法氣虛者先服藥宜補中益氣湯後用吐血虛者亦先服藥後用吐宜芎歸湯痰多者亦先服藥宜二陳湯後吐氣閉者用藥為探吐宜香附木通血瘀小便閉者則以牛膝桃仁為要藥嘗採其法用之頗效雖然閉癃之異究何如哉新病為溺閉點滴難通也久病為溺癃屢出而短少綱目謂即癃病也此二症之實也若夫溺有餘瀝全由於腎氣之虛須當補益為要宜覆盆子菟絲子五味子沙蒺藜益智仁蓮鬚山萸牡蠣龍骨芡實脈法仲景曰腎脈滑實為癃㿉脈訣曰便血則芤數則赤黃實脈癃閉熱在膀胱醫鑑曰少陰微者氣閉膀胱綱目曰癃病脈細不治小便不利仲景曰陰虛則小便難丹溪曰小便澀者血因火爍下焦無血氣不得降而滲泄之令不行也宜補陰降火入門曰小便難者出不快也經曰陽入陰分則膀胱熱而小便難直指曰腎虛小便數而瀝如欲滲之狀宜溫補綱目曰小便數而不利者有三若大便泄瀉而津液澀少一也宜利而已熱搏下焦津液不能行者二也必滲瀉乃愈若脾胃氣澀不能通調水道下輸膀胱而化者三也可咽氣令施化而出如茯苓琥珀散用澤瀉滑石赤苓白朮豬苓琥珀肉桂炙草者是也不得混治小便不通內經曰胞移熱於膀胱則癃尿血元素曰熱在下焦填塞不通其症小便閉塞而不渴時見躁者是也東垣曰小便不通有氣血之異如渴而小便不通者熱在上焦氣分宜清肺如不渴而小便不通者熱在下焦血分宜滋腎又曰血澀致氣不通而竅塞宜導氣除燥綱目曰小便不通臍下狀如覆碗痛閉難忍治法有二如氣不能化而不通則用陳皮茯苓湯調木香沉香末二錢空心服兼用吐法以提之如血瘀於下而不通則用桃仁承氣湯之類回春曰嘔噦而小便不通者難治中滿鼓脹病小便不通者難治正傳曰老人氣虛短作小便不通為下焦血氣乾者死鼻頭色黃者小便必難閉癃宜吐瀉丹溪曰水道不通屬氣虛血虛有實熱有痰氣閉塞皆宜吐之以提其氣氣升則水自降説氣承載其水也又曰實熱癃閉用八正散説大便動則小便自通矣直指曰水道不行其本在腎合用牽牛澤瀉其末在肺合用葶藶桑皮更以木通滑石佐之又能透達雖然大便小便脈絡相貫人有多日小便不通但使大瀉數行則小便自通尿色內經曰水液渾濁皆屬於熱資生曰小便有五色惟赤白色者多赤色多因酒得之白色乃下元虛冷導引保生祕要曰搓小紙撚入鼻中俟打嚏噴小水自通此治閉塞若遲塞多搓掌心及湧泉穴退火安靜或再行運央法自效運央保生祕要曰及小腸症同法從歸元法旋運而下旋至病處多運數十回復繞而上撒而散之周而復始如法漸行谷道去濁提回守靜小便黃赤實熱病也凡臟腑皆能為之而下焦更甚經曰肝熱病者小便先黃宜火府丹又曰胃氣盛則身以前皆熱消谷善飢溺色黃宜涼胃湯此二條言肝胃有實熱故黃赤也又曰肺氣虛肩背痛寒少氣不足以息溺色變宜加味補中益氣湯又曰冬脈不及令人䏚清脊痛小便變宜溫腎湯此二條言肺腎虛寒故黃赤也又曰厥陰之勝胠脅氣並化而為熱小便黃赤宜青皮赤芍防風柴胡此一條言氣運之屬風而黃赤者也又曰少陰司天熱淫勝病溺色變宜黃柏山梔又曰少阻之勝溺赤善驚宜山梔黃岑又曰陽明司天燥氣下臨暴熱至陽氣鬱發小便變宜黃岑石膏此三條言運氣之屬熱而黃赤者也又曰中氣不足溲便為之變宜加味補中益氣湯此一條言脾家虛故黃赤也又曰小便黃者小腹中有熱也此則言下焦之熱不可不清之利之者宜四苓散然下焦之熱豈但是哉或由腎虛有火宜補陰丸或由膀胱蓄熱宜葵子湯亦或由小腸燥結宜赤茯苓湯固當分別治之小便黃赤形症得效曰上盛下虛小便赤澀必致成淋尿色內經曰足陽明之脈病氣盛則尿色黃仲景曰疸症小便如黃柏汁正傳曰下焦無血小便澀數而黃色遺溺腎小腸膀胱三經氣虛病也而經又推及肺肝督脈緣肺主氣以下降生水輸於膀胱肺虛則不能為氣化之主故溺不禁也宜補中益氣湯不愈當以黃柏生地麥冬清其熱肝督二經之脈並循陰器係廷孔病則營衛不至氣血失常莫能約柬水道之竅故遺溺不此也肝病宜川芎歸身澤瀉白芍督脈病宜荊芥黃連防風若夫腎上應於肺為子母母虛子亦虛其遺數宜也宜菟絲子散小腸主傳送故其氣虛亦患遺溺也宜茯苓澤瀉赤石脂白芍生地膀胱者水泉所藏虛則不能收攝而溺自遺也宜菟絲子散固脬丸如挾寒宜韭子丸挾熱白微散滑脫牡蠣丸以上皆小便不禁之由於諸經者也至如小兒睡中遺尿多由於實熱而間或因寒宜沈氏悶泉丸挾熱去山梔加萸肉巴戟乾薑老人淋漓不禁多由於虛寒而間亦有熱宜大菟絲子丸為主酌其寒熱以為治不可不審也妊嫡尿出不知或由脬熱宜加味逍遙散或由睥肺氣虛宜補中益氣湯或由肝腎陰虛宜六味丸不可不審也産後小便不禁或由脬損宜沈氏固胞湯或用八珍湯補脬飲或由膀胱氣虛宜加味補中益氣湯或由膀胱陰虛宜補肺腎不可不審也果如是遺溺之病亦何足慮哉遺溺原由症治內經巴膀胱不約為遺尿又曰水泉不此者是膀胱不藏也直指曰腎與膀胱俱虛內氣不充故脬中自滑所出多而色白是以遇夜而陰虛愈多又日下焦畜血與虛勞內損則便尿自遺而不知又曰下焦虛寒不能溫制水液則尿出不禁又曰經云水之本在腎其末在肺則知天一之水自上而下相為貫通也丹溪曰小便不禁屬熱屬虛熱者五苓散合黃連解毒湯虛者五苓散合四物湯加山萸五味子又曰下虛內損而不禁宜補膀胱陰血瀉火邪為主入門曰傷寒熱病及風溫狂言直視遺尿者不治尿色丹溪曰小便不禁赤者有熱白者氣虛飲後即便精氣耗散病也內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺靈橛曰人飲酒酒入胃谷未熟而小便獨先下説酒者熟谷之液其氣悍以清故後谷而入先谷而液出焉以是知飲入胃而遽覺至臍下即欲小便者皆精氣衰耗不能輸於脾歸於肺也東垣以為不輸脾歸肺心火必上攻使口燥而咽乾旨哉言矣宜補中益氣湯便溺原委東垣曰溲尿者水也水之下流其性則然也飲入於胃其精氣雖上升其本體固不能上升則豈可謂小便獨為氣化所成哉交腸症陰陽失度病也此症惟婦人多有之或因病後或因嗜酒血活氣耗陰陽失於傳送故大小腸錯亂往往小便中出大便亦大便中出小便而成此症也宜五苓散如下愈以舊袱頭燒灰酒服交腸症治丹溪曰一婦人嗜酒常痛飲忽糟粕出前竅溲尿出後竅六脈皆沉澀與四物湯加海金沙木香檳榔桃仁木通服之而愈此人酒多氣升不降陽極虛又酒濕積久生熱煎熬其血陰液大虛陰陽俱虛而暫時活著以其形實而酒中谷氣尚在故也三月後必死果然回春曰一婦人病愈後小便出屎先服五苓散二劑又用中益氣湯而愈治閉癃方六金匱腎氣丸大虛熟地山萸丹藥丹皮茯苓澤瀉附子肉桂牛膝車前子補中益氣湯氣虛人參黃耆當歸白朮升麻柴胡炙草陳皮薑棗芎歸湯血虛川芎當歸二陳湯痰多茯苓甘草半夏陳皮桃仁承氣湯血瘀八正散實熱大黃木通瞿麥扁蓄滑石山梔甘草車前燈心各一錢治小便黃赤方七火府丹肝熱黃岑錢半生地三錢木通四錢空心服涼胃湯胃熱黃連甘草陳皮茯苓食遠服加味補中益氣湯肺寒人參黃耆當歸白朮升麻柴胡甘草陳皮茯苓車前薑棗溫腎湯腎寒附子肉桂熟地牛膝茯苓生薑空心服補陰丸腎火黃柏知母龜板杞子杜仲側柏葉砂仁五味子甘草豬脊髓地黃膏為丸四苓散下熱茯苓豬苓澤瀉白朮葵子湯膀胱熱冬葵子赤茯苓豬苓枳實瞿麥滑石木通黃岑車前子甘草各一錢薑五片治遺溺方十七補中益氣湯肺虛方詳上加味補中益氣湯膀胱虛方詳上菟絲子散腎虛菟絲子五味子肉蓯蓉杜仲牡蠣雞肫去黃皮微炒共為末每服二錢固脬丸膀胱虛茴香附子戎鹽桑螵蛸菟絲子酒糊丸家韭子丸挾寒韭子鹿茸牛膝熟地歸身肉蓯蓉菟絲子金石斛巴戟杜仲肉桂酒糊丸白微散挾熱白微白斂白芍等分牡蠣丸滑脫牡蠣赤石脂酒糊丸沈氏悶泉丸小兒益智仁茯苓白朮白斂黑山梔白芍此餘自製方也用之頗效大菟絲子丸老人菟絲子澤瀉鹿茸石龍芮肉桂附子金石斛熟地茯苓牛膝山萸川斷肉蓯蓉杜仲防風補骨脂蓽澄茄沉香巴戟茴香川芎五味子桑螵蛸覆盆子加味逍遙散脬熱六味丸肝腎虛沈氏固胞湯脬損酒炒桑螵蛸二錢酒黃耆五錢沙苑子萸肉各三錢酒炒全當歸茯神茺蔚子各二錢生白芍錢半升麻二錢羊小豬子一個洗淨煎湯代水煎藥此餘自製方也屢用神效八珍湯又人參茯苓白朮甘草生地黃川芎當歸白芍補脬飲又生黃絹一尺剪碎白牡丹根皮一錢白芨一錢將二味為末水一碗煮至絹爛如飴空心頓服服時不得作聲如作聲即不效五苓散因熱肉桂白朮茯苓豬苓澤瀉黃連解毒湯又黃連黃柏黃芩山梔等分四物湯因虛川芎當歸白芍地黃治飲後即便方一補中益氣湯總治方詳上治立腸症方三五苓散總治方詳上補中益氣湯又方詳上四物湯又方詳上
