  - {type: 'tls:div-start', offset: 1984, content: '', id: KR3er109_jc_017-d19d3, level: 2, head_text: 三消源流消癉}
  - {type: 'tls:head', offset: 1984, content: '', id: KR3er109_jc_017-d19.d3.h1s1}
  - {type: 'tls:div-start', offset: 5772, content: '', id: KR3er109_jc_017-d19.d3d4, level: 3, head_text: 消癉肝心腎三經之陰虛而生內熱病也}
