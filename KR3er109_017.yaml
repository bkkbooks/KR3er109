  - {type: 'tls:div-start', offset: 15046, content: '', id: KR3er109_jc_017-d19d5, level: 2, head_text: 諸血源流蓄血症脫血症}
  - {type: 'tls:head', offset: 15046, content: '', id: KR3er109_jc_017-d19.d5.h1s1}
  - {type: 'tls:div-start', offset: 19864, content: '', id: KR3er109_jc_017-d19.d5d4, level: 3, head_text: 蓄血瘀血鬱積也而瘀血之鬱積當有上中下之分}
  - {type: 'tls:head', offset: 19864, content: '', id: KR3er109_jc_017-d19.d5.d4.h1s1}
