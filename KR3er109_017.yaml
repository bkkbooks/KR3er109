者宜青黃散有由少小鼻破衄血小勞輒出者宜桑耳塞鼻丹有由病後常衄小勞即作者宜石膏牡蠣丸有衄至五七日不住者宜人中白散有口鼻出血如湧因酒色太過者宜荊芥散有火熱上升而衄極甚或不止者宜沈氏止衄丹牙血者陽明經熱火上攻所致或挾風或挾濕或係血熱或係氣實宜清胃湯加減或大寒犯腦宜白芷散須就脈症辨之總治宜用百草霜擦牙立止舌上無故出血者全屬心火舌為心苗也宜槐花末擦之而其條分薄判則有舌硬而出血者宜木賊煎有舌腫出血如泉者宜塗舌丹有舌上出血竅如針孔者宜紫金沙丸溺血者一因膀胱火即血淋之屬溺出必痛宜小蘇飲子或四物湯加發灰山梔牛膝一因下元虛冷即尿血溺出不痛宜金匱腎氣丸而其條分薄判則有由勞傷者宜茅根湯有由陰虛者宜參芪夢卜散有卒然尿血不止者宜龍膽草湯有不問男婦患溺血者宜龍骨散鬱金散二草丹皆當治腸風者腸胃間濕熱鬱積甚至脹滿而下血也宜槐花散或四物湯加阿膠山梔地榆而其條分薄判則有風入大腸留滯不散挾濕而成者宜加減四物湯有陰分虛血不循經而成者宜四物湯地榆散合用皆當治便血者內經謂之結陰病由於陰氣內結不得外行血無所稟滲入腸間遂成此症與腸風不同內經釋云其脈必虛澀者是也宜平胃地榆湯結陰丹清臟湯榆砂湯而其條分薄判有先便後血仲景謂之遠血者宜黃土湯有先血後便仲景謂之近血者宜赤小豆當歸散有內傷下血必有以解脈絡之結者宜連殼丸有實熱積於內而使血者宜當歸承氣湯有結陰下血而腹痛不已者宜地榆甘草湯有由脾濕便血者宜蒼朮地榆湯有大便瀉血三代相傳者宜砂仁末米湯熱服二錢以愈為度有臟毒下血者宜大蒜丸旱蓮草散乾柿散有痔漏脫肛瀉血面色萎黃積年不瘥者宜白朮丸有五腫腸風痔漏瀉血糞前有血名外痔糞後有血名內痔大腸不收名脫肛谷道四面藟肉如奶名舉痔頭上有孔名瘻瘡內有蟲名蟲痔者宜槐角丸有瘀血內漏者宜蒲黃散子有下血虛寒日久腸冷者宜熟附子丸有便血及腸風用寒藥熱藥及脾虛藥俱不效者宜山楂子散有便血止後但覺丹田元氣虛乏腰膝沉重少力者宜桑寄生散有卒瀉鮮血噴出如竹筒者宜小蘇打汁溫服一升有腸胃積熱及因酒毒下血腹痛作渴脈弦數者宜黃連丸酒蒸黃連丸有大腸素虛挾風又飲酒過度挾熱下痢膿血且痛甚多日不瘥者宜烏梅丸樗白皮散有風邪入臟或食毒積熱大便鮮血疼痛肛出或久患酒痢者宜木饅頭散皆當治痰涎血者脾家畜熱所致宜加味逍遙散清肺湯而痰唾中帶有紅絲紅點病尤為甚其條分薄判則有由六經之火者宜山梔地黃湯有由思慮傷心傷肺者宜天門冬湯有由於陰分虛弱者宜清火滋陰湯嘔血者血從口湧出多至成盆成碗者始必大怒以致肝氣上逆治以降氣清熱為主宜蘇子鬱金橘皮甘草降香蒲黃當歸青黛麥冬生地赤芍童便天冬麥冬而其條分薄判則有飲酒過多積熱湧盛或至垂死者宜葛黃丸有飲食過度負重努力傷胃而大嘔者宜是齊白朮散有陽乘於陰血溢妄出者宜四生丸有內傷心肺血如湧泉從口鼻出須臾不救則死者宜側柏散有血出如泉諸藥不能效者宜七生湯有因虛勞五內崩損湧出可升斗計者宜花蕊石散皆當治腸澼者東垣謂為水谷與血另作一派如唧桶湧出也長夏濕熱太甚正當客氣盛而主氣弱故腸澼之病甚也總之腸風臟毒便血腸澼四者雖相似而各有辨腸風由邪氣外入隨感隨見所以下清血而色鮮必在糞前臟毒由蘊積熱毒久而始見所以下濁血而色黯必在糞後便血兼由濕熱風虛所以下血或清或濁亦不論糞前糞後腸澼則客氣盛而正氣衰所以血與水谷齊出固不可不詳審而治之也然則腸澼之不得用腸風等藥明矣宜涼血地黃湯當歸和血散升陽除濕和血湯加味香連丸而其條分薄判則有唧出之血遠散如篩色紫黑腰腹沉重名曰濕毒腸澼者宜升陽補胃湯有唧出血色紫黑腹痛惡寒有關脈按之無力喜熱物尉之而由於內寒者宜益智和中湯有因飽食發為腸澼者宜香殼丸有下血作派唧出有力而遠射四散如篩腹中大痛者宜芍藥黃連湯皆當治九竅出血者因火盛之極故卒然大驚九竅皆出血也宜側柏散沈氏犀角湯而其條分薄判則有九竅四肢指岐間出血乃暴怒所為者宜小蘇散或以井華水卒噀其面勿令病人先知有指縫搔癢成瘡有竅出血不止者宜多年糞桶箍篾燒灰傅之即止有血自皮膚間濺出者宜以煮酒壇上紙揉碎如楊花攤在出血處按之即止有膕中出血不止乃血虛者宜十全大補湯有遍身不論何處無故出血者宜五花湯皆當治血汗者或有病或無病汗出而色紅染衣亦謂之紅汗內經以為少陰所至河間以為膽受熱而血妄行本草以為大喜傷心喜則氣散而血隨氣行其原雖不同而治之則一宜黃芪建中湯兼服妙香散以金銀器大小麥麥冬煎湯調下或定命散薄厥症者得於大怒氣逆陰陽奔並不必素有病而忽吐血以升斗計脈弦急者是也宜六鬱湯唾血者鮮血隨唾出其原本於腎也宜滋陰降火湯而其條薄判有唾中帶紅絲者乃是肺痿難治宜人參平肺散有由熱鬱所致者宜河間生地黃散有陰虛火動而唾血者宜清唾湯有由勞心動火者宜元霜雪梨膏皆當治以上諸血疰或輕或重或緩或急其原各有所因其症各有所見如此然而一切去血過多則必致眩暈悶絶以虛故也宜大劑芎歸湯煎服救之全生活血湯生地芩連湯亦佳故凡吐衄太多不止者當防其血暈急取茅根燒煙將醋灑之令鼻嗅氣以遏其勢或驀然以冷水噀其面使驚則止或濃磨京墨汁飲之仍點入鼻中如此頂防庶可免血暈之患至婦人崩漏及産後血症俱詳在婦科茲不贅脈法靈樞曰衄而不止脈大者逆內經曰脈至而搏血衄身熱者死又曰腹脹便血脈大時絶者死難經曰病若吐衄脈當沉細反浮大而牢者死仲景曰脫血而脈實者難治脈經曰脈得諸澀濡弱為亡血脈訣曰諸症失血皆見芤脈脈貴沉細浮大難治正傳曰芤為失血澀為少血又曰亡血之脈必大而芤大為發熱芤為失血丹溪曰吐衄血脈滑數者難治又曰吐唾血脈細弱者生實大者死又曰諸失血症脈大且數者逆也論治血三法藥各不同繆仲淳曰血虛宜補之虛則發熱內熱法宜滋益榮血用甘寒甘平酸寒酸溫之品宜熟地白芍牛膝炙草鹿角膠杞子人乳肉蓯蓉生地棗仁龍眼甘菊血熱宜清之涼之熱則為癰腫瘡疥為齒衄為牙齒腫為舌上出血為舌腫為赤淋為血崩為月事先期為熱入血室為赤游丹為眼暴赤腫痛法宜酸寒苦寒咸寒辛涼以除實熱宜童便生地犀角茜草山梔青黛大薊小薊荊芥丹皮赤芍地榆黃連大黃天冬元參血瘀宜通之瘀必發熱發黃作痛作腫及作結塊癖積法宜辛溫辛熱辛平辛寒甘溫之劑以入血通行佐以咸寒乃可軟堅宜當歸紅花桃仁蘇木肉桂五靈脂蒲黃薑黃鬱金三棱花蕊石韭汁左牡蠣芒硝延胡索䗪蟲乾漆童便沒藥丹參乳香說血為榮陰也有形可見有色可察有症可審者也病既不同藥亦各異治之之法要在合宜而已謹之論治吐血三要繆仲淳曰吐血宜降氣不宜降火說氣有餘即是火氣降則火降火降則氣不上升血隨氣行無溢出上竅之患矣降火必用寒涼之藥反傷胃氣胃氣傷則脾不能統血血愈不能歸經矣今之療吐血者大患有二一則專用寒涼之味如芩連山梔青黛柿餅灰四物湯黃柏知母之類往往傷脾作泄以致不救一則專用人參肺熱還傷肺咳逆愈甚亦有用參而愈者此是氣虛喘嗽氣為陽不由陰虛火熾所致然亦百不一二也宜以白芍炙草製肝麥冬薄荷橘紅貝母枇杷葉清肺苡仁山藥養脾韭菜降香蘇子下氣青蒿鱉甲丹皮地骨皮銀柴胡補陰清熱棗仁茯神養心山萸杞子牛膝補腎此纍試輒驗之方然陰無驟補之法非多服藥不效病家欲速其央醫士張皇失主百藥雜試以致損命而不悟悲夫宜行血不宜止血血不循經絡者氣逆上壅也夫血得熱則行得寒則凝故降氣行血則血循經絡不求其止而自止矣止之則血凝血凝必發熱惡食及胸脅痛病日沉痼矣宜補肝不宜伐肝經曰五臟者藏精氣而不瀉者也肝為將軍之官主藏血吐血者肝失其職也養肝則肝氣平而血有所歸伐之則肝不能藏血血愈不止矣辮驗血色王海藏曰初便褐色者重再便深褐色者愈重三便黑色者尤重色變者以其有火燥也不可不辨綱目曰新血鮮紅舊血瘀黑又曰風症色青寒症色黯暑症色紅濕症如煙煤屋漏水諸血原由症治內經曰諸血者皆屬於心又曰大怒則形氣絶而血菀於上使人薄厥又曰怒則氣逆甚則嘔血入門曰暴喜動心不能生血暴怒傷肝不能藏血積憂傷肺過思傷脾失志傷腎皆能動血正傳曰暴喜傷心則氣緩而心不出血故肝無所受暴怒傷肝則氣逆而肝不納血故血無所歸又房勞過度以致陰火沸騰血從火起故錯經妄行以上皆七情動血之病也直指曰凡熱皆出於心熱甚則能傷血三因曰凡血得熱則洋溢故鮮得寒則凝滯故瘀瘀者黑色也鮮者紅色也丹溪曰諸見血皆熱症所謂知其要者一言而終是也又曰血見熱則行見寒則凝凡口鼻出血皆係陽盛陰虛有升無降血隨氣上越出諸竅法當補陰抑陽氣降則血歸於經也以上皆言火熱傷血之病也靈樞曰卒然多飲食則脹滿起居不節用力過度則陽絡脈傷傷則血外溢而衄陰絡脈傷則血內溢而後血內經日血由上竅出為血溢由大小便出為血泄以上皆言內傷失血之病也丹溪曰血妄行於上則吐衄衰涸於下則虛勞妄返於下則便紅積熱膀胱則癃閉尿血滲漏腸間則為腸風濕壅熱瘀則為滯下熱極腐化則為膿血火極似水則紫黑熱勝於陰則發瘡瘍濕滯於血則發痛癢癮疹皮膚則為冷痹畜之在上其人喜忘畜之在下其人喜狂以上言諸失血病也入門曰凡血逆行難治順行易治無潮熱者輕有潮熱者重潮盛脈大者死九竅血身熱不得臥者即死東垣曰諸血症身熱脈大難治身涼脈靜易治又曰血溢上行或吐嘔唾逆也凶也若變而下行為惡痢順也吉也故仲景云畜血症下血者當自愈無病人忽然下血利者其病進也今病血症上行而復下行為惡痢者其邪欲去是知吉也仲景曰吐血咳逆上氣脈數有熱不得臥者死直指曰無故忽然瀉下惡血名曰心絶難治又曰傷寒太陽症衄血者病欲愈熱結膀胱血自下者亦欲愈觀此則他病伏熱之人上焦瘀熱而作吐者亦病之欲愈也雖然血既吐而自止則可矣以上皆言諸血病之吉凶也丹溪曰凡藥治血不可單行單止及純用寒涼如用須酒炒酒煮又日血症久服藥不效以川芎為君乃效也入門曰若嘔吐血出未多必有瘀在胸膈當先消瘀而涼之止之消瘀宜犀角地黃湯又曰治血防風為上使連翹黃連為中使地榆為下使不可不知東垣曰血不足用甘草血瘀黑用熟地血鮮紅用生地若脈洪實痛甚用酒大黃和血止痛用當歸以言治血藥法也咳紅導引法保生祕要曰坐定兀子上以雙手搭項蹲身閉氣三七口如氣稍急微微放之放而又閉日行五次兼用運法極妙運央保生祕要曰艮念數日絛胸前推開次運湧泉水洗心或封固臍凝守蓄血瘀血鬱積也而瘀血之鬱積當有上中下之分如衄嘔唾吐血皆屬上部茍蓄於此其症必兼善忘宜犀角地黃湯血結胸中則屬中部茍蓄於此其症必兼胸滿身黃漱水不欲咽宜桃仁承氣湯血凝下焦又屬下部茍蓄於此其症必兼發狂糞黑小腹硬痛須盡下黑物為效宜抵當湯抵當丸醫者能分三部治之蓄血之症無遁情矣而仲景云傷寒熱病身黃屎黑發狂喜忘者為蓄血仲景云然者乃是傷寒熱病亦有蓄血之症非蓄血止屬傷寒熱病才有之也治之之法雖大略相同而倘由傷寒熱病者則必隨本症而調劑治之與單病蓄血者應稍殊也蓄血原由症治海藏曰喜忘發狂身黃屎黑疾已甚也但小腹滿小便不利者輕也直指曰蓄血外症痰嘔燥渴昏憒迷忘常喜湯水沃口入門曰凡病日輕夜重便是瘀血又曰通治三焦蓄血生地黃湯丹溪曰生韭菜汁善治胸膈間瘀血甚效綱目曰瘀血燥結宜用玉燭散直指曰下焦蓄血宜桃仁五靈脂生地大黃甘草利而逐之本草曰沒藥蘇木水蛭虻蟲桃仁留尖五靈脂皆破瘀血脫血衝脈病也靈樞日衝脈為血之海血海不足則身少血色面無精光是名血脫又曰血脫者色白夭然不澤其脈空虛然則據經之言脫血之症固由衝脈不足但其所以不足之故有由先天賦畀本來衰弱而後天又不能培養以致然如不勝衣者有先天賦畀本來充盛而或因思慮過傷或因房勞過傷或努力過傷或因酒食過傷皆能虧耗真陰真陰既虧血自消散而不澤者且真陰既虧火熱愈熾或致衄吐溺便上下失血而夭然血不華者凡此皆脫血之所由來也故附列此條於諸血之後宜四物湯三才丸補榮湯加減四物湯脫血原由症治內經曰臂多青脈曰脫血又曰安臥脈盛謂之脫血東垣日六脈弦細而澀按之空虛其色必白而夭不澤者脫血也鰲按靈樞謂鼻頭色白者為亡血身少血乜面無精光者為脫血則知亡血之色之白僅在鼻頭而脫血之色之白且由面而及於一身此其所以異也亡血者即諸失血也乃一時暴來之病非若脫血為由內而漸致之病也治諸血方一百零三理中湯氣虛人參白朮炙草乾薑槐花散吐血槐花二兩百草霜五錢每末二錢茅根湯下神傳膏又剪草一斤洗淨曬為末入生蜜二斤和為膏忌鐵器盛磁瓶內一日一蒸九蒸九曬乃止病人五更面東坐勿言語挑膏四匙食之良久以粥湯壓之藥只冷服米湯亦勿太熱或吐或否總不妨如久病肺損咯血只一服愈尋常嗽血妄行每服一匙可也上部血須用翦草丹皮天冬麥冬部學士云翦草治勞瘵吐血損肺及血妄行米蓮散又糯米五錢蓮子心七枚為末酒服多效或以墨汁作丸服之黃明膠散又黃明膠炙乾花桑葉陰乾各二兩研末每三錢生地汁調下生地黃膏又生地一斤打汁入酒少部以熟附兩半去皮臍切片入汁內石器煮成膏取附片焙乾入山藥三兩研末以膏搗丸空心米飲下三十丸柏葉散又柏葉為末米飲調下二方寸匕香附散又香附為末每服二錢童便調下蒲黃湯又蒲黃末三錢煎湯服每日溫酒或冷水調跟亦可人中黃散又人中黃為末每服四錢或三錢用茜根汁薑汁竹瀝和勻服之乾藕節散又乾藕節為末酒服方寸匕日二次阿膠湯又阿膠二兩蒲黃六合生地三升水五升煮三升分服茜根煎又茜根一兩為末每末二錢水煎冷服亦可水調服十灰散咯血大薊小薊柏葉荷葉茅根茜根丹皮棕皮大黃梔子黃等分燒存性研末或藕汁或萊蔔汁磨京墨半匙下五錢立止花蕊散又花蕊石研極細童便一杯煎溫調服三錢或五錢用酒一半女用醋一半與童便和服亦可總使瘀化黃水再調治四物湯又川芎當歸白芍熟地各一錢二分半水煎服一方春倍川芎夏倍白芍秋倍地黃冬倍當歸又方春加防風夏加黃芩秋加天冬冬加桂枝當歸和血歸經白芍涼血補腎生地黃生血寧心熟地黃補血滋腎川芎行血通肝劉宗厚曰欲求血藥其四物之謂乎夫川芎血中氣藥也通肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之虛者也當歸分三治血中主藥也通肝經性味辛溫全用能活血各歸其經也白芍陰分藥也通脾經性味酸寒能涼血又治血虛腹痛若求陰藥之屬必於此而取則焉犀角地黃湯又犀角生地黃連黃芩大黃青餅子又青黛一兩杏仁以牡蠣粉炒過一兩研勻黃蠟化和作三十餅以乾柿半個夾定濕紙包煨香嚼食粥飲送下日三薏苡仁散又薏苡仁為末以熟豬肺切蘸空心食之苡仁補肺豬肺引經也補陰丸咳血龜板杞子黃柏知母杜仲砂仁甘草五味子側柏葉用豬脊髓地黃膏為丸紫菀丸又紫菀五味子等分蜜丸芡子大含化桑白皮散又鮮桑根白皮一斤米泔浸三宿刮去黃皮銼碎入糯米四兩焙乾為末每一錢米飲下海犀膏散又海犀膏即水膠一大片炙黃塗酥再炙研末每三錢白湯化服白虎湯衄血石膏知母粳米竹葉青黃散又青黛蒲黃各一錢新汲水服之或青黛發灰等分生地汁調下亦可桑耳塞鼻丹又桑耳炒焦搗末每發時以杏仁大塞鼻中數次即可斷石膏牡蠣丸又石膏五錢牡蠣一兩每末方寸匕酒服蜜丸亦可日三次人中白散又人中白新瓦上焙乾入麝少部溫酒調服立效荊芥散又荊芥炭每二錢研陳皮湯下不過二服也沈氏止衄丹又香附二兩川芎一兩黑山梔黃芩各五錢共為末每服二錢開水下不過一服即止重者亦止二三服此金鰲自製方也用之無不驗清胃湯牙血升麻當歸黃連生地丹皮白芷散又木賊煎舌血木賊草煎水漱之立止塗舌丹又烏賊骨蒲黃等分炒為細末塗舌上紫金沙丸又紫金沙即露蜂房頂上實處一兩貝母四錢蘆薈三錢蜜丸芡子大每一丸水一小杯煎五分溫服如吐血溫酒調服小薊鐵子溺血藕節二錢當歸一錢山梔八分小薊生地滑石通草蒲黃各五分甘草三分竹葉七片金匱腎氣丸又熟地八兩山藥山萸各四兩丹皮茯苓澤瀉各三兩附子肉桂車前子牛膝各一兩茅根湯又茅根薑炭等分入蜜一匙水二杯煎一杯參芪夢卜散又人參鹽黃芪等分為末用紅皮大夢卜一枚切四片用蜜二兩將夢卜逐片蘸炙令乾再炙勿令焦蜜盡為度每用一斤蘸藥食之仍以鹽湯送下以