body:
  text: 卷十七燥病源流經曰諸澀活涸乾徑皴揭皆屬於燥夫陽明燥金乃肺與大腸之氣也故燥之為病皆陽實陰虛血液衰耗所致條分之雖有風燥熱燥火燥氣虛燥之殊要皆血少火多之故是以外則皮膚皴揭中則煩渴上則咽鼻焦下則溲赤便難陽有餘而陰不足肺失清化之源腎乏滋生之本痿消噎攣皆本於此治法惟以滋金養血為主宜滋燥飲所謂熱燥病在裡者也耗人津液故便祕消渴生焉宜大補地黃丸所謂風燥病在表者也肌膚活毛發槁故乾疥爪活生焉宜養榮湯所謂火燥病亦在裡者也東垣云飢飽勞役損傷胃氣及食辛辣厚味而助火邪優於肺中耗散真陰津液虧少故大便燥結而其燥結又有風燥熱燥陽結陰結之殊治法總惟辛以潤之苦以瀉之宜大黃黃芩黃連黃柏連翹山梔元參知母石膏童便當歸木通麻仁甘菊柏子仁蔗漿梨汁而此熱燥風燥火燥其原總不外氣血之虛燥說惟氣血之虛先有致燥之由故風熱火相感而成病也然氣虛之燥其症則為痿痹以肺熱不能管攝一身也血虛之燥其症則為噎嗝以胃槁不能收納飲食也氣虛燥宜以黃芪為君黃柏為臣黃芩為使血虛燥宜以歸身為君白芍為臣生地為佐其本病亦有易見者至於燥病之發不一療治之法亦不一試列舉之一切燥熱可概治也宜大補地黃丸咽乾鼻燥必清上部也宜清涼飲大腸風祕燥結必理中焦也宜鎮風潤氣丸辛潤湯元戎四物湯皮膚皴裂血出肌肉燥癢是火型金必清肺以保金也宜加減四物湯筋燥爪活必滋養其榮血也宜養榮湯皮膚拆手足爪甲活搔之屑起血出痛楚必養血以澤膚也宜生血潤膚飲瓊指膏天門冬膏腸胃活燥大便祕結必清燥以潤腸也宜當歸承氣湯如是而燥病有不愈者哉脈法入門曰傷燥脈澀正傳曰脈緊而澀或浮而弦或芤而遲皆燥脈也燥病原由症治類聚曰燥者肺金之本燥金受熱化以成燥澀由風能勝熱熱能耗液而成燥也燥於外則皮膚皴揭而瘙癢燥於中則精血活涸燥於上則咽鼻乾焦燥於下則便尿閉結故日燥為肺金病也宜當歸承氣湯正傳曰火熱勝則金衰而風生緣風能勝濕熱能耗液而為燥陽實陰虛則風熱勝於水濕而為燥也說肝主筋而風氣自甚又燥熱加之則筋太燥也燥金主於收斂故其脈緊澀而為病徑強緊急而口噤也夫燥之為病血液衰少不能榮養百骸故也入門曰經云燥者潤之養血之謂也積液固能生氣積氣亦能生液宜服瓊王膏又曰皮膚皴揭拆裂血出大痛或皮膚搔癢爪甲浮起乾活皆火爍肺金燥之甚也宜以四物湯去川芎合生脈散加天冬花粉知母黃柏酒紅花生甘草之類東垣曰榮衛活涸濕劑所以潤之二冬人參杞子五味同為生脈之劑葉氏醫案曰燥有由陽過動傷液者一老人舌腐肉消肌活心事繁冗陽氣過動致五液皆涸而為燥冬月無妨夏月深處林壑心境凝然每早服牛乳一杯又曰上燥治氣下燥治血此定評也今陽明胃腑之虛因久病嘔逆投以辛耗破氣津液劫傷胃氣不主下行致腸中傳送失司經云六腑以通為補半月小效全在一通補工夫豈徒理燥而已議甘寒清補胃陰用生地天冬人參甜梨肉生白蜜又曰陽津陰液重傷餘熱淹留不解臨晚潮熱舌色若赭頻飲救亢陽焚燎究未能解渴形脈俱虛難投白虎當以仲景復脈一法為邪少虛多使少陰厥陰二臟之陰少蘇冀得胃關復振因左關尺空數不藏非久延所宜耳此亦治熱動陰液之法也用人參生地阿膠麥冬桂枝炙草生薑大棗華岫云曰燥為乾澀不通之候內傷外感宜分外感者由於天時風熱過勝或因深秋偏亢之邪始必傷人上焦氣分法以辛涼甘潤肺胃為先喻氏清燥救肺湯是也內傷者乃人之本病精血下奪而成或因偏餌燥劑所致病從下焦陰分先起法以純陰靜藥柔養肝腎為宜大補地黃丸六味丸是也要知是症大忌苦澀最喜甘柔若氣分失治則延及於血下病失治則槁及乎上喘咳痿厥三消噎嗝之萌總由此致大凡津液結而為患者必佐辛通之氣味精血竭而為患者必藉血肉之滋填在表佐風藥而成央在腑以緩通為要務古之滋燥養榮湯潤腸丸五仁湯瓊脂膏牛羊乳汁等法各有專司也治燥病方十九滋燥飲總治秦艽花粉白芍生地天冬麥冬加蜜童便服人乳牛乳梨汁蔗汁時時可服大補地黃丸熱燥熟地當歸杞子山藥山萸白芍生地元參酒知母酒黃柏肉蓯蓉蜜丸鹽湯下養榮湯風燥當歸白芍熟地生地秦艽黃芩防風清涼飲清上部黃連黃芩薄荷當歸元參白芍甘草便少加大黃鎮風潤氣丸風祕大黃麻仁山萸山藥牛膝檳榔枳殼獨活車前子菟絲子郁李仁辛潤湯又熟地生地升麻紅花炙甘草檳榔歸身桃仁元戎四物湯又川芎當歸白芍生地煨大黃桃仁加減四物湯保肺當歸白芍生地麥冬元參花粉甘草黃柏五味子生血潤膚飲潤膚天冬一錢半生地熟地麥冬當歸黃芪各一錢酒芩桃仁泥瓜蔞仁各五分升麻二分酒紅花一分五味子九粒天門冬膏又天門冬去心生搗絞汁濾去渣砂鍋熬成膏服一二匙當歸承氣湯潤腸當歸大黃各二錢芒硝七分甘草五分水煎臨時入芒硝攪和服四物湯燥甚川芎當歸白芍熟地生脈散又人參麥冬五味子炙甘草湯熱劫炙草阿膠生地麥冬人參麻仁清燥救肺湯傷氣桔梗黃芩麥冬花粉桑皮生地六味丸傷血生地山藥山萸丹皮茯苓澤瀉滋燥養榮湯總治熟地生地黃芩甘草白荷當歸秦艽防風潤腸丸又歸尾羌活桃仁麻仁大黃一方加秦艽防風皂角子五仁湯又桃仁杏仁柏子仁松子仁郁李仁瓊脂膏又生地二十斤打汁去渣白蜜二升煎沸去沫鹿角膠真酥油各二斤生薑二兩取汁先以慢火熬地黃汁數沸棉濾取淨汁又煎二十沸下膠次下酥蜜同熬至如飴磁器收貯每服一二匙溫酒下三消源流消疸三消燥病也三消之症分上中下上消者舌赤裂咽如燒大渴引飲日夜無度中消者多食易飢肌肉燥口乾飲水大便鞭小便如泔下消者煩躁引飲耳輪焦便溺不攝或便如膠油三消之由上消肺也由肺家實火或上焦熱或心火煅煉肺金中消脾也由脾家實火或伏陽蒸胃下消腎也由腎陰虛或火伏下焦經曰心移寒於肺為肺消肺消者飲一溲二死不治又曰心移熱於肺傳為鬲消又曰奇病有消渴皆上消也多飲而渴不止者也說肺主氣其能通調水道而有製者賴心君火時與以溫氣而為之主以潤燥金故肺之合皮其主心也若心火不足不能溫金而反移以寒寒與金化則金冷氣沉而不得升猶下有溝瀆上無雨露是以飲一溲二也是肺氣以下而活索也故曰肺消死不治此因於寒者也肺本燥金心腹以熱移之為火燥相即因而鬲上焦煩飲水多而善消此因於熱者也可見上消之由有陰有陽不可不辨而多飲易消火氣炎鬱所以為奇病也經又日疸成為消中又日胃中熱則消谷令人善飢又曰二陽結謂之消皆中消也此說結於本氣陽明氣盛熱壯然以血多津守未嘗有所結今言其結則陽邪盛而傷陰活其津液故結在中焦陽明亢甚故消谷善飢又熱亢能消精液不榮肌肉故名曰消也經又日溲便頻而膏濁不禁肝腎主之此下消也說緣腎水虧損津液活竭水虧火旺蒸爍肺金肺被火邪不能生腎故成了消也趙獻可言三消之症總由煎熬既久五臟燥烈能食者必發胸疽背癰不能食者必發中滿鼓脹治者不必分上下概用清肺滋腎之藥上消小劑中消中劑下消大劑宜概用六味丸加麥冬五味子其或命門火衰火不歸元游於肺為上消游於胃為中消必用引火歸元之法渴病若失矣宜八味丸冷水服之若過用寒涼恐內熱未除中寒又起獻可此言誠能於消病中尋源討流但必切脈合症確然審是命門火衰然後可用桂附若由熱結所致下咽立斃矣慎之謹之大約善治三消者必補腎水真陰之虛瀉心火燔灼之勢除腸胃燥熱之邪濟心中津液之衰使道路散而不結津液生而不活氣血利而不澀則消症無不愈矣夫三消之成總皆以水火不交偏勝用事燥熱傷陰之所致而要之五行之氣相成陽勝固能消陰陰勝亦能消陽如經言二陽之病傳為風消二陽者陽明也陽明既病木邪起而勝之既勝則精血不榮肌肉風消也故由燥陽傷陰而氣不化水固為消由陰邪偏勝而陽不帥陰其水不化氣亦為消其消一也總治三消宜人參白朮散桑白皮湯活血潤燥生津飲大黃甘草飲子又有中消而口甘者由脾熱中消而口苦者由膽熱此二種內經謂之疸症與消病一類卻非即消病說口甘者脾疸肥美之所發肥令人內熱甘令人中滿中滿熱鬱其氣上溢久亦轉為消渴也經則治之以蘭草除陳氣也蘭性味甘寒能利水道其清氣能生津止渴除陳積畜熱也口苦者膽疸肝取決於膽而數謀慮不決膽氣虛其氣上溢而口為之苦以膽之脈會於咽也治法俱同三消特各加引經藥使歸於肝脾至三消分治之方可詳舉之有煩渴能食者宜人參白虎湯有消渴胸滿心煩無精神者宜人參寧神湯有消渴便乾陰頭短舌白燥口唇裂眼澀而昏者宜止消潤燥湯有消渴後身腫者宜紫蘇湯有消渴面目足膝腫小便少者宜瞿麥飲有消渴咽乾面赤煩躁者宜地黃飲有消渴盛於夜者宜加減地黃丸有消渴由心火上炎腎水不濟煩渴引飲氣血日消者宜降心湯有心火熾熱口乾煩渴小便赤澀者宜清心蓮子飲有消渴小便數舌上赤脈肌體活瘦者宜和血益氣湯有消渴而上焦煩熱為膈消者宜人參石膏湯有消渴不能食者宜麥門冬飲子有老人虛人大渴者宜人參麥冬湯以上皆上消之屬通治上消宜生津養血湯黃芩湯有消中飲食多不甚渴小便數肌肉瘦者宜加減白朮散有消谷善飢者宜加減白朮散有能食而瘦口乾自汗便結溺數者宜清涼飲有消中而瘦二便祕者宜蘭香飲子有消中由胃熱者宜藕汁膏有消中而中焦燥熱肌肉瘦削大便鞭小便數而黃赤者宜生津甘露飲有消中後腿漸細將成腎消者宜茯苓丸以上皆中消之屬通治消中宜調胃承氣湯加減三黃丸黃連豬肚丸順氣散有腎消大渴飲水下部消瘦小便如脂液者宜元菟丹有腎虛水涸燥渴者宜雙補丸有腎消大渴便數腰膝疼者宜腎瀝丸有腎消尿濁如膏者宜人參茯苓散有腎消口燥煩渴兩腳活瘦者宜加減腎氣丸有腎虛消竭小便無度者宜鹿茸丸有腎消莖長而堅精自出者此孤陽無陰即強中症也最難治說此亦由耽好女色或服丹石以恣欲久則真氣脫而熱氣盛故飲食如湯沃雪肌膚削小便如膏油陽易興而精易泄也宜六味丸石子薺芪湯黃連豬肝丸以上皆下消之屬通治下消宜補腎地黃丸加減八味丸消症之不同如此此外又有食㑊症經曰大腸移熟於胃善食而瘦謂之食㑊胃移熱於膽亦名食㑊注云㑊者易也飲食移易而過不生肌肉也治之與消中同而又有酒渴症由平日好酒熱積於內津液活燥煩渴引飲專嗜冷物也宜烏梅木瓜湯而又有蟲渴症由蟲在臟腑之間耗其精液而成消竭也宜苦楝湯而又有類消症其人渴欲求飲飲一二口即厭不比消渴之無厭此由中氣虛寒寒水泛上逼出浮游之火於喉舌間故上焦欲得水救水到中焦以水遇水故厭也宜理中湯送八味丸又經云二陽之病發心脾有不得隱曲女子不月陽明位太陰之表而居中於腑則胃當之非若手陽明大腸之以經絡為陽明比也其病發心脾者胃與心為生土之母子而脾與胃為行津之表裡發者發足之義人之情欲本以傷心勞倦憂思本以傷脾臟既傷則必連及於腑又必從其能連及者如母病必及子故凡內而傷精外而傷形者皆能病及胃此二陽之病發自心脾也然陽明為生化之本其氣盛其精血下行化榮衛而潤宗筋化源既病則陽道外衰故不得隱曲而活澀女子則不月說心脾為真陰之主胃為真陽之主傷真陰必使真陽無守二陽既病倉廩空而餉道絶為生死之關然必自真陽之傷為之故曰發心脾也治亦同三消參其症而用方主之可也至於消渴既久其傳變之症在能食者必發癰疽背瘡不能食者必至中滿鼓脹何也津液竭則火邪勝故發癰膿且痛甚而或不潰或流赤水也又如上中二消製之太急寒藥多而胃氣傷故成中滿甚而水氣浸漬溢於皮膚則為腫脹所謂上熱未除中寒之症復生也夫至癰疽脹滿亦與強中等症皆為傳變而不易治矣脈法內經曰消渴脈實大病久可治脈懸小堅病久不可治仲景曰趺陽脈數胃中有熱即消谷引飲大便必堅小便即數脈經曰消渴脈當得緊實而數反得沉澀而微者死又曰心脈滑為渴滑者陽氣勝也心脈微小為消疸又曰脈數大者生沉小者死消渴與腳氣反本事曰消渴腳氣雖皆為腎虛所致其為病則相反腳氣始發於二三月盛於五六月衰於七八月消渴始發於七八月盛於十一二月衰於二三月其故何也說腳氣壅疾也消渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈審此二者疾可理也消渴原由症治本事曰消渴之症全由坎水衰少何也肺為五臟華說若下有暖氣蒸則肺潤若下冷極則陽不能升故肺乾而渴譬如釜中有水以火暖之又以板覆則暖氣上騰故板能潤若無火力則水氣不能上升此板終不能潤火力者腰腎強盛常須暖補腎氣飲食得火力則潤上而易消亦免乾渴之患宜腎氣丸又曰消渴者腎虛所致每發則小便必甜以物理推之淋餳醋酒作脯法須臾即甜足明人之食後滋味皆甜流在膀胱若脾腎氣盛則上蒸炎氣化成精氣下入骨髓其次為脂膏又其次為血肉其餘則為小便故小便色黃血之餘也五臟之氣咸潤者則下味也若腰腎既虛冷則不能蒸化谷氣盡下為小便故味甘不變其色清冷則肌膚活槁也直指曰自腎消而析之又有五石過度之人真氣既盡石勢獨留陽道興強不交精泄名曰強中消渴輕也消中甚焉消腎又甚焉若強中則斃可立待類聚曰五臟六腑皆有津液熱氣在內則津液竭少故為渴夫渴者數飲水其人必頭目眩背寒而嘔皆因裡虛故也入門曰飲水而安者實熱也飲水少頃即吐者火邪假渴耳丹溪曰三消多屬血虛不生津液宜以四物湯為主上消加人參五味麥冬花粉煎入藕汁地黃汁牛乳酒客生葛根汁衝服中消加知母石膏寒水石滑石下消加黃柏知母熟地五味子又曰養肺降火生血為主分上中下治之又曰消渴症小便反多如飲水一斗小便亦一斗宜腎氣丸徐忠可曰仲景云厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐下之不肯止夫厥陰之為病消渴七字乃消渴之大原然或單渴不止或善食而渴或渴而小便反多後人乃有上中下之分不知上中下似不同其病原總屬厥陰厥陰者風木之臟也與風相得故凡中風必先中肝然風善行而數變故在經絡在血脈在肌肉各各不同而又有鬱於本臟者則肝得邪而實因而乘其所勝陽明受之乘其所生少陰受之於是上中下或有偏勝現症稍殊皆為消渴皆由厥陰風鬱火燔故曰厥陰之為病消渴內經亦有風消二字消必兼風言之亦此意也又曰內經云二陽結謂之消仲景獨言厥陰似乎互異不知邪氣浸淫病深腸胃氣聚不散故曰結其使腸胃之氣不能健運而成三消則厥陰實為病之本如果病專腸胃則下之為中病消渴宜無不止矣然多食而飢不止為中消此又云飢不欲食則知消渴之病亦有不欲食者但能食而渴者全重二陽論治飲一溲二重在腎虛論治其不能食而氣衝者重在厥陰論治此又臨症時微細之辨乎繆仲淳曰三消渴疾以鮎魚涎和黃連末為丸每五七丸烏梅下日三服取效又曰用白芍甘草等分為末每一錢水煎日三服有人患消渴九年服藥止而復作得是方服之七日頓愈古人處方殆不可曉不可以平易而忽之又方用瓜蔞根黃連各三兩為末蜜丸每三十丸麥冬湯下日二服其飲水無度小便數者用田螺五升水一斗浸一夜渴即飲之每日一換水及螺或煮食飲汁亦妙其飲水無度小便赤澀者用秋麻子仁一升水三升煮三四沸飲不過五升瘥其腎消飲水小便如膏油者用茴香苦楝子等分炒為末每食前酒服二錢其消渴飲水骨節煩熱者用芭蕉根搗汁時飲一二合其消渴不止下元虛損者用牛膝末五兩生地汁五升浸之日曬夜浸汁盡為度蜜丸空心酒下三下丸久服壯筋骨駐顏色黑須發津液自生其胃虛消渴者羊肚煮爛空腹服之其消渴煩亂者乾冬瓜瓤一兩水煎服其消渴贏瘦小便不禁者兔骨和大麥苗煮汁服極效其消中易飢者用蓯蓉山萸五味蜜丸每鹽酒下二十丸其三消骨蒸者以冬瓜自然汁浸曬黃連末七次又以冬瓜汁和丸每三四十丸大麥湯下尋常口渴只一服見效其強中消渴者用豬腎一具薺苨石膏各三兩人參茯苓磁石知母葛根黃芩花粉甘草各二兩黑大豆一升水一斗半先煮豬腎大豆取汁一斗去渣下藥再煮三升分三服名豬腎薺苨湯後人名為石子薺苨湯消疸肝心腎三經之陰虛而生內熱病也即經所謂熱中與三消異靈樞經言五臟皆柔弱者善病消疸夫皆柔弱者天元形體不充也其本大氣不足五臟氣餒陰虛生內熱自是內熱不解而外消肌肉故五臟之脈皆以微小者為消疸是五臟之氣不能充滿於榮分而內有鬱熱以爍之也故法以脈實大者為順雖病可治若脈懸小而堅則精活血槁必不能耐久矣是知消疸之病本起於不足必以滋陰平肝清熱為主也宜生地黃飲子玉泉丸消疸症治內經注曰疸謂消熱病也多飲數溲謂之熱中多食數溲謂之消中內經曰凡消疸肥實人則膏梁之疾也此人因數食甘美而多肥故其氣上溢轉為消渴注曰食肥則腠理密而陽氣不得外泄故肥令人內熱甘者性氣和緩而發散逆故甘令人中滿然內熱則陽氣炎上炎上則欲飲而嗌乾中滿則陽氣有餘有餘則脾氣上溢故轉為消渴入門曰消者燒也如火烹燒物者也鰲按消為肌肉爍疸為內鬱熱二字連讀為一症之名非如內經言疸成為消中消為三消疸為疸病也即內經言肥甘之病亦消渴之類非消癢姑附於此治三消方四十四六味丸總治地黃山藥山萸丹皮茯苓澤瀉八味丸又熟地山藥山萸丹皮茯苓澤瀉附子肉桂人參白朮散又人參白朮當歸白芍山梔大黃連翹澤瀉花粉葛根茯苓各一錢官桂木香藿香各五分草草六分寒水石四錢石膏八錢磁石芒硝各六錢共為末每取五錢加蜜少部服漸加至兩部日二三服桑白皮湯又桑白皮新生者二錢茯苓人參麥冬葛根山藥肉桂各一錢甘草五分水煎服大黃甘草飲子又大黃兩半甘草大者四兩黑豆五升另煮三沸去苦水另用井水一桶同煮豆爛令病人食豆飲汁無時不三劑病去活血潤燥生津飲又天冬麥冬五味子瓜蔞仁火麻仁生地熟他花粉當歸甘草各一錢水煎服人參寧神湯上消人參生地甘草葛根茯神知母花粉竹葉五味子人參白虎湯又人參石膏甘草知母止消潤燥湯又升麻錢半杏仁桃仁麻仁歸身荊芥知母黃柏石膏各一錢熟地二錢柴胡七分甘草五分川椒細辛各一分紅花二分半熱服紫蘇湯又紫蘇桑皮赤苓各一錢郁李仁二錢羚羊角七分半檳榔七分肉桂木香獨活枳殼各五分瞿麥飲又瞿麥澤瀉滑石各一錢防己一錢半黃芩大黃各五分桑螵蛸三個地黃飲又熟地生地天冬麥冬人參枇杷葉枳殼石斛澤瀉黃芪甘草加減地黃丸又熟地山藥山萸丹皮五味子百藥煎降心湯又花粉二錢人參遠志當歸熟地茯苓蜜黃芪五味子甘草各一錢棗二枚清心蓮子飲又蓮子二錢赤苓人參黃芪各一錢黃芩麥冬車前子地骨皮甘草各七分人參石膏湯又人參錢七分石膏四錢知母二錢三分甘草錢三分和血益氣湯又酒黃柏升麻各一錢酒生地酒黃連各八分杏仁桃仁石膏各六分知母羌活防己各五分歸梢四分生甘草炙甘草麻黃根柴胡各三分紅花分半麥門冬飲子又麥冬二錢知母花粉人參五味子葛根茯神生地甘草各一七竹葉十片人參麥冬湯又人參茯苓甘草杞子五味子麥冬生津養血湯通治上消當歸白芍生地麥冬各一錢川芎黃連各八分花粉七分蜜知母蜜黃柏蓮肉烏梅肉薄荷甘草各五分黃芩湯又片芩山梔桔梗麥冬當歸生地花粉葛根人參白芍各一錢烏梅一個水煎服清涼飲中消甘草冬用梢防風梢羌活龍膽草柴胡黃芪茯苓生地酒知母防己桃仁杏仁當歸黃柏石膏蘭香飲子又石膏三錢知母錢半生甘草防風各一錢炙甘草人參蘭香葉連翹白豆蔻桔梗升麻各五分半夏二分蒸餅糊調成餅曬乾為末每二錢淡薑湯下生津甘露湯又石膏龍膽草黃柏各一錢柴胡羌活黃芪酒知母酒黃芩炙甘草各八分歸身六分升麻四分防風防己生地生甘草各三分杏仁六個桃仁五個紅花少部水煎加酒一匙不拘時稍熱服一名清涼飲子藕汁膏又藕汁生地汁牛乳和黃連末天花粉末佐以薑汁白蜜為膏挑取留舌上徐徐以白湯送下日三四次加減白朮散又葛根二錢人參白朮茯苓各一錢木香知母黃柏甘草各五分五味子九粒茯苓丸又茯苓黃連花粉熟地覆盆子萆薢人參元參石斛蛇床子雞肫皮磁石湯下調胃承氣湯通治中消加減三黃丸又大黃黃芩黃連生地黃連豬肚丸又雄豬肚全具黃連五兩麥冬瓜蔞根知母各四兩將四味為末入肚內線封口蒸爛搗入蜜少部丸每百丸米飲下順氣散又大黃芒硝各二錢炙甘草一錢元菟丹下消菟絲子酒浸通軟乘濕研焙乾別取末十兩五味子酒浸別為末淨七兩茯苓蓮肉各三兩別研乾山藥末六兩將所浸酒添酒打糊丸空心食前米飲下雙補丸又鹿角膠人參茯苓苡仁熟地蓯蓉歸身石斛黃芪木瓜五味菟絲子覆盆子各一兩沉香澤瀉各五錢麝香一錢腎瀝丸又雞肫皮人參黃芪肉桂澤瀉熟地遠志茯苓歸身龍骨桑螵蛸各一兩麥冬川芎各二兩五味子元參炙草各五錢磁石二兩研淬去赤水每末五錢用羊腎煮湯代水煎日二服加減腎氣丸又熟地二兩丹皮茯苓山萸五味子澤瀉山藥鹿茸各一兩肉桂沉香各五錢蜜丸空心下七八十丸人參茯苓散又滑石寒水石各錢半甘草七分赤苓葛根黃苓薄荷大黃各五分連翹三分人參白朮澤瀉桔梗天花粉山梔砂仁各二分一名人參散鹿茸丸又麥冬二兩鹿茸熟地黃芪五味子雞肫皮麩炒酒浸肉蓯蓉破故紙酒牛膝山萸人參各七錢半地骨皮茯苓元參各五錢蜜丸空心米飲下石子薺苨湯又薺苨石膏各錢半人參茯苓花粉磁石知母葛根黃芩甘草各一錢先以水三盞煮豬腰一個黑豆一合至半去渣入藥煎七分食後服次服黃連豬肚丸補腎地黃丸通治下消黃柏一斤切生地半斤酒浸二日蒸爛研膏與黃柏拌曬乾茯苓四兩天冬熟地人參甘菊各二兩酒條芩生片芩當歸枳殼麥冬各一兩水丸空心鹽酒下七八十丸加減八味丸又熟地二兩山藥山萸各一兩酒蒸澤瀉茯苓丹皮各八錢五味子略炒一兩半肉桂五錢蜜丸五更初未言語時鹽湯下五六十丸臨臥再服此方有五味最為得力不惟止渴亦免生癰疽久服永除渴疾氣血加壯烏梅木瓜湯酒渴烏梅打碎木瓜各二錢炒麥芽草果甘草各一錢薑五片苦楝湯蟲渴苦楝根皮一握切焙麝香少部水煎空心飲之金匱腎氣丸補氣熟地山藥山萸丹皮茯苓澤瀉附子肉桂牛膝車前子四物湯補血川芎當歸白芍地黃治消疸諸藥要品及方二滋陰清熱平肝地黃元參麥冬鱉甲沙參山藥黃柏棗仁丹皮知母白芍川續斷青蒿牛膝五味山萸阿膠珠沙蒺藜柏子仁地骨皮杞子金石斛車前子玉泉丸消疸花粉葛根各兩半麥冬人參茯苓烏梅甘草各一兩生黃芪蜜黃芪各五錢蜜丸彈子大每一丸溫水嚼下生地黃飲子又人參黃芪生地熟地金石斛天冬麥冬枳殼枇杷葉澤瀉各一錢甘草五分此方乃二黃元合甘露飲也生精補血潤燥止渴佐以澤瀉枳殼疏導二府使心火下行則小便清利肺金潤澤火府流暢宿熱既消其渴自止造化精深妙無倫比火病源流火有三一曰君火一曰相火一曰龍雷之火人之心為君以照臨為德故居神之物惟火為之所謂君火也君火不以火用惟建極於廣明廣明即膻中為神明喜樂之官廣大清明之地君主居之以照臨十二官為生之本榮之居初非以燔灼為令也經故曰君火以明以明者言照臨之不爽也後人昧乎明字之義因改曰君火以名亦可發一笑矣然君火雖不用有時無精以養則神空飛而有自焚之患則亦有灼熱之時相火者心包代君行事在三焦之中處兩陽合明之地所以應天之夏令而主乎腐熟水谷故經曰陽明者午也經以陽明當棉火夏令不言心包而心包在其中矣說人之相火起少陽膽游行三焦督署於心包為陽明胃腐熟水谷之主故曰少陽相火火之能相在少陽耳丹溪諸公乃以龍雷之陰火為相火後人多承襲其訛其不知相火先不知龍雷之陰火矣所謂龍雷者何曇氏曰性火真空性空真火遍滿法界陰符曰火生於木禍發必尅說陽隧真形即在陰物奠宅之中故此火則隱胎坎水朕兆風木實在乎君相有形之外是謂龍雷無故則不現雖激之亦不起惟水涸木活氣逆血沸則勢將焚巢燎原而不可止此火若起則反君滅相豈君相治平之火乎緣此火不起於子半不循行於少陽膽猝犯之而猝起所謂火生於木禍發必尅者也何前人竟謂之相火哉然而相火之為害亦大矣甚則為元氣之賊又能煎熬真陰陰虛則病陰絶則死皆相火之為也夫火主動凡動皆屬火醉飽胃火動恚怒肝火動悲哀肺火動房勞腎火動心火能自焚是五臟又皆有火也且火動即身熱其因於五臟者各不同如按至肌肉之下至骨上乃肝之熱寅卯時尤甚其症必兼四肢滿悶便難轉筋多怒多驚筋疲不能起於床宜柴胡飲子如按至皮膚之下肌肉之上輕手乃得微按至皮毛之下則熱少加力按之則全不熱是熱在血脈也乃心之熱日中尤甚其症必兼煩心心痛掌中熱而啘宜導赤湯如輕手按不熱重按至筋骨亦不熱在不輕不重間此熱在肌肉也乃脾之熱夜尤重其症必兼怠惰嗜臥四肢不收無氣以動宜分虛實虛宜補中益氣湯實宜瀉黃散如輕按不熱重按至骨其熱炙手乃腎之熱亥子時尤甚其症必兼骨蘇蘇然如蟲蝕其骨因熱不任亦不能起於床宜滋腎丸如輕手乃得略按全無此熱在皮毛也乃肺之熱日西尤甚宜分輕重輕者瀉白散重者涼膈散是五臟之熱所宜審也且火動則熱壅其見於三焦者又各不同如熱在上焦因咳而為肺萎或口舌生瘡眼目赤腫頭項腫痛宜涼膈散加減涼膈散清心湯如熱在中焦大便堅結或胸膈煩躁飲食不美宜四順清涼飲桃仁承氣湯如熱在下焦尿血淋閉或小便赤澀大便祕結宜立效散防風當歸飲子是三焦之熱所宜審也然而火之虛實又宜辨如遇發熱脈沉實而大者為實浮而虛數者為虛也火之燥濕又宜辨燥火疼而不腫濕火腫而不疼又燥火筋縮而疼濕火腫脹而疼又燥火口渴便閉濕火口不渴而大便滑也痰與火又宜辨如病之有形者總是痰紅腫結核或疼或不疼是也病之無形者總是火但疼不腫是也火變病又宜辨如睡覺忽腰背重滯轉側不便如隆冬薄衣不冷非關壯盛如平時筋不縮偶直足一曲即縮如食時有涕無痰不食時有痰無涕如弱症左側睡心左墜一響右側睡心有墜一響如心中滴滴噹噹若有響聲如頭眩耳鳴目暈皆火之變幻也治火之藥又宜辨如心火宜黃連生地麥冬木通小腸火宜赤苓木通肝火宜柴胡黃芩膽火宜連翹龍膽草脾火宜白芍生地胃火宜石膏葛根大黃肺火宜山梔黃芩桑皮石膏大腸火宜大黃黃芩腎火宜黃柏知母膀胱火宜黃柏滑石三焦火上宜山梔中宜地骨皮心包絡宜麥冬丹皮燥火宜生地當歸麥冬濕火宜蒼朮木通茯苓豬苓實火宜大黃芒硝實火熱甚宜黃連黃柏黃芩山梔如欲下之宜加大黃虛火宜薑皮竹葉麥冬童便甘草生薑虛火宜補宜人參黃芪白朮炙草生薑鬱火宜青黛鬱火重按烙手輕按不覺此熱在肌肉之內取汗則愈宜升麻葛根羌活以發熱鬱之火青黛以宣五臟鬱火山梔以利小便而解鬱火血中火宜生地血虛發熱宜當歸生地熟地氣如火從足下起入腹為虛熱之極十不救一宜六味加肉桂大劑作湯夕用附子末津調塗湧泉穴或愈無根之火游行作熱宜元參麥冬腎水受傷為真陰失守宜六味加元參作湯服痰結熱火宜竹茹竹瀝花粉天冬過食生冷遏抑少陽之火於脾部宜加減發鬱湯是皆火之為病所當悉心究之者火之見症又宜辨二便忽閉火也以利小便為先宜赤苓豬苓澤瀉通草車前孔滑石海金沙防己扁畜瞿麥氣逆衝上火也以降氣清熱為先宜鬱金蘇子麥冬枇杷葉躁擾狂越詈罵驚駭火也以清鎮涼解為先宜牛黃黃連黃芩山梔滑石知母童便石膏大便祕加大黃不行再加芒硝猝眩僕九竅流血火也以降折清涼為先然多不治宜犀角汁童便竹瀝鹽湯藍汁梨汁蔗汁猝心痛火也以涼心解毒為先宜山梔白芍生甘草元胡索蘇子鹽湯目暴赤腫痛甚火也以涼血清熱為先宜生地赤芍黃柏荊芥山梔木通黃連大黃元參連翹龍膽章童便頭面忽然赤腫或痛火也以清熱消毒為先宜甘菊牛蒡子連翹荊芥石膏竹葉薄荷蟬退元參知母甘草大黃口乾舌苦忽大渴思冰水火也以清潤生津為先宜石膏知母元參麥冬竹葉花粉五味子梨汁蔗汁童便暴喑火也以降氣發音為先宜蘇子貝母桔梗百部竹瀝天冬麥冬薄荷元參桑皮梨汁枇杷葉暴注火也以利水泄熱為先宜茯苓黃連黃芩滑石白芍葛根木通甘草禁栗如喪神守火也以清熱鎮神為先宜朱砂黃芩山梔知母牛黃黃連童便石膏瞤瘛瞀亂火也以和肝滌熱為先宜白芍竹葉元參黃連石膏黃柏知母甘菊生地麥冬症狀不同而各有所以治之如此總之治火切不可久任寒涼之品重傷脾胃便不可救故化而裁之因乎變神而明之存乎人脈法脈經曰火脈洪數虛則浮脈訣曰骨痿勞熟脈數而虛熱而澀小必捐其軀加汗加咳非藥可治丹溪日脈實數者有實熱正傳曰脈浮而洪數虛火沉而實大實火洪數見左寸心火有寸肺火左關肝火右關脾火兩尺腎經命門之火男子兩尺洪大必遺精陰火盛也火論四條繆仲淳曰夫火者陽也氣也與水為對待者也水為陰精火為陽氣二物匹配名曰陰陽和平亦名少火生氣如是則諸病不作矣倘不善攝養以致陰虧水涸則火偏勝陰不足則陽必湊之是謂陽盛陰虛亦曰旺火食氣是知火即氣也氣即火也東垣亦曰火與元氣不兩立亦指此也譬諸水性本流過極即凝為冰解則復常非二物也說平則為水火既濟火即真陽之氣及其偏則即陽氣而為火也始與元氣不兩立矣故戴人日莫治風莫治燥治得火時風便了正指火之變態多端為病不一了此則皆可辨也人身之有陰陽水一而已火則二焉是稟受之始陽常有餘陰常不足也故自少至老所生疾病由於真陰不足者恆也若真陽不足之病千百中一二矣陽者氣也火也神也陰者血也水也精也陰陽和平是為常候若縱恣房室或肆情喜怒或輕犯陰陽或嗜好辛熱以致腎水真陰不足不能匹配陽火遂使陽氣有餘氣有餘即是火故火愈盛而水愈涸於是而吐血咳嗽吐痰內熱骨蒸盜汗種種陰虛之病醫者又不明凡見前症不分陰陽概施溫補參芪二朮還佐薑桂倘遇盧劇輒投附子死猶不悟良可憫也雖然亦病家不明有以致之何則難成易虧者陰也益陰之藥必無旦夕之效助陽之藥能使胃氣一時暫壯飲食加增或陽道興舉有似神旺醫者病者利其速效宜乎服藥者多斃勿藥者反得存也人身以陰陽兩稱為平偏勝則病此大較也水不足則火有餘陰既虧則陽獨盛說陰陽之精互藏其宅是陽中有陰陰中有陽也故心火也而生赤液腎水也而藏白氣赤液為陰白氣為陽循環不息此常度也茍不知攝養虧損真陰陽無所附而發越上升此火空則發周身之氣並於陽也並於陽則陽盛故上焦熱而咳嗽生痰迫血上行而為吐衄為煩躁為頭痛為不得眠為胸前骨痛為口乾舌苦此其候也陽愈盛則陰虛陰愈虛則為五心煩熱為潮熱骨蒸為遺精為骨乏少力為小水短赤丹田不暖則飲食不化為瀉泄為卒僵僕此其候也治之之要當亟降氣當急益精氣降則陽交於陰是火下降也精血生則腎陰來復是水上升也此坎離而既濟也至此則陰陰二氣復得其平矣經曰形不足補之以氣人參黃芪人胞羊肉紅鉛之屬是已益陽氣也乃可以卻沉寒經曰精不足補之以味人乳鱉甲地黃黃柏杞子牛膝天冬之屬是已補陰精也乃可以除伏熱火病原由症治內經日心熱病者顏先赤顏即額也脾熱病者鼻先赤肝熱病者左頰先赤肺熱病者有頰先赤腎熱病者頤先赤綱目曰心肺居胸背心熱則胸熱肺熱則背熱肝膽居脅肝膽熱則當脅熱腎居腰腎熱則當腰熱胃居臍上胃熱臍以上熱腸居臍下腸熱則臍以下熱以上言臟腑發熱部分東垣曰凡病晝病在氣夜病在血晝發少而夜發多者足太陽膀胱血中浮熱微有氣也有時發有時止知邪氣不在表不在裡而在經絡中也夜發多者是邪氣下陷之深當從熱入血室而論之宜瀉血湯退熱湯海藏日晝熱則行陽二十五度宜柴胡飲子夜熱則行陰二十五度宜四順清涼飲平旦發熱熱在行陽之分肺氣主之故宜白虎湯以瀉氣中之火日晡潮熱熱在行陰之分腎氣主之故宜地骨皮散以瀉血中之火入門曰氣分實熱白虎湯血分實熱四順清涼飲氣分虛熱清心蓮子飲血分虛熱滋陰降火湯以上言晝夜發熱之異丹溪曰火能消物凡爍金虧土旺木涸水者皆火也河間曰火之為病其害甚大其變甚速其熱甚張其死甚暴人身有二火一君火一相火在氣交中多動少靜凡動皆屬火化動之極也病則死矣又有臟腑陰陽之火根於五志之內六欲七情激之其火隨起東垣曰相火易起五性厥陽之火相扇則妄動矣火起於妄變化不測無時不有煎熬真陰陰虛則病陰絶則死又曰火者元氣谷氣真氣之賊也以上言火為元氣賊丹溪曰病人自言冷氣從下而上非真冷氣也此上升之氣自肝而出中挾相火自下而上其熱為甚自覺其冷者火極似水積熱之甚也陽亢陰微故見此症冷生氣者高陽生之謬言也又曰氣從左邊起肝火也宜回金丸氣從臍下起陰火也宜黃柏丸坎離丸氣從足下起入腹乃虛之極也宜滋陰降火湯外用津調附子末塗湧泉穴引熱下行說火起於九泉之下十不救一以上言上升之氣屬火東坦日能食而熱口舌乾燥大便難者實熱也以辛苦大寒之劑下之瀉熱補陰脈洪盛而有力者是也不能食而熱自汗氣短者虛熱也以甘寒之劑瀉熱補氣脈虛而無力者是也海藏曰五臟陰也所主皆有形骨肉筋血皮毛是也此五臟皆陰足陰足而熱反勝之是為實熱若骨痿肉爍筋緩血活皮聚毛落者陰不足陰不足而有熱乃虛熱也丹溪曰實火可瀉黃連解毒湯之類虛火可補四君子湯之類以言火熱有虛實內經曰陰虛則發熱陽在外為陰之衛陰在內為陽之守精神外馳嗜欲無節陰氣耗散陽無所附遂致浮散於肌表之間而惡熱當作陰虛治之又曰惡寒戰栗皆屬於熱又曰病熱而反覺自冷實非寒也古人遇戰寒之症有以大承氣湯下燥糞而愈者明是熱症耳丹溪日惡熱非熱明是虛症惡寒非寒明是實症仲景曰其人亡血必惡寒後乃發熱無休止其陰脈必遲澀或微澀以上言惡熱惡寒陽虛外寒陽盛外熱者內經曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗又曰上焦不通利則皮膚密致腠理閉寒玄府不通衛氣不得泄越故外熱陰虛內實陰盛外寒者內經曰有所勞倦形氣衰少谷氣不盛上焦不行下脘不通胃氣熱熱氣燻胸中故內熱又曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留而血凝澀澀則脈不通其脈盛大以澀故中寒以上言陰陽虛盛而致內外寒熱方廣曰陰虛陽虛丹溪辨之明矣何則日夜發熱日重夜輕口中無味陽虛症也午後發熱夜半則止口中有味陰虛症也陽虛之症責在胃陰虛之症責在腎說飢飽傷胃則陽虛矣房勞傷腎則陰虛矣以藥論之甘溫則能補陽氣苦寒則能補陰血如四君子補陽氣四物補陰血是也若氣血兩虛但以甘溫補氣氣旺則能生血也若只血虛而氣不虛亦用甘溫補氣氣旺而陰血愈作矣故陽虛與陰虛甘藥與苦藥不可不慎也入門曰氣虛熱升陽以散之宜補中益氣湯益胃升陽湯血虛熱滋陰以降之宜滋陰降火湯坎離丸氣血俱虛熱升陽滋陰兼用之宜十全大補湯人參養榮湯加知母黃柏以上辨陰虛陽虛丹溪曰飲酒人發熱者難治不飲酒人因酒發熱者亦難治也仲景曰飲酒發熱黃連解毒湯加葛根主之以上言飲酒發熱直指曰其人血滯而發熱者脈澀必有漱水之症必有嘔惡之症必有兩足厥冷之症必有小腹結急之症或吐血或鼻衄宜用柴芩佐以川芎白芷桃仁五靈脂更加大黃蜂蜜使滯血宣通黑物利去則熱不復作矣以上言滯血發熱入門曰火不妄動動由於心靜之一字其心中之水平又曰神靜則心火自降欲斷則腎水自升以上言製火有方丹溪曰退熱之法全在清心必用麥冬燈心白朮茯苓說心者一身之宰心不清則妄動而熱不退熱能傷血血滯則氣鬱而熱愈不退退熱之法又在調血宜用芎歸若陽浮於外則當斂以降之宜參苓白朮散直指曰凡壯熱煩躁用柴芩大黃解利之其熱不退宜用黃芩川芎烏梅作劑入黃連生地赤苓燈草煎湯其效甚速說芎地皆能調血心血一調其熱自退駱隆古曰風火既熾當滋腎水可耳以上言退熱有法海藏曰君火者心火也可以濕伏可以水滅黃連之屬可以製之相火者龍火也不可以水滅惟從其性而伏之黃柏之屬可以降之又曰上焦熱梔子片芩中焦熱黃連白芍下焦熱黃柏大黃東垣曰黃連瀉心火黃芩瀉肺火白芍瀉脾火柴胡瀉肝火黃連佐之知母瀉腎火木通瀉小湯火條芩瀉大腸火柴胡瀉膽火黃連佐之鰲按瀉膽火龍膽草為最石膏瀉胃火黃柏瀉膀胱火入門曰主治各經熱藥肝之氣柴胡血黃芩心之氣麥冬血黃連脾之氣白芍血大黃肺之氣石膏血梔子腎之氣元參血黃柏膽之氣連翹血柴胡胃之氣葛根血大黃大腸之氣連翹血大黃小腸之氣赤苓血木通膀胱之氣滑石血黃柏心包之氣麥冬血丹皮三焦之氣連翹血地骨皮以上言臟腑瀉火清熱藥丹溪曰除熱瀉火非甘寒不可有大熱脈洪大服苦寒劑而不退者加石膏火妄動夏月用益元散鎮墜之虛熱用荊芥薄荷山梔黃芩實熱用大黃芒硝實火可瀉黃連解毒湯之類虛火可補參朮甘草之類火盛者不可驟用寒涼必兼溫散火急甚者必緩之生甘草兼瀉兼緩參朮亦可火盛發狂人壯氣實者可用正治冰水之類飲之虛者用生薑湯若投冰水立死補陰則火自降黃柏生地之類又曰芩連白芍知母柴胡皆苦寒能瀉五臟有餘之火若內傷勞倦為陽虛之病以甘溫除之如參芪甘草之屬相火熾盛日漸煎為血虛之病以甘寒降之如歸地之屬心火亢極為陽強之病以咸冷折之如硝黃之屬腎水受傷真陰失守為陰虛之病以壯水之主製之如生地元參之屬命門火衰為陽脫之病以溫熱濟之如附桂之屬胃虛食冷遏抑陽氣為火鬱之病以升散發之如升麻葛根之屬以上言通治火熱之藥治火病方四十八方六味丸虛熱熟地山萸山藥丹皮茯苓澤瀉加減發鬱湯火遏升麻葛根羌活柴胡細辛香附蔥白瀉血湯夜熱酒生地柴胡各一錢熟地蒲黃丹參酒當歸酒防己羌活炙甘草各七分桃仁泥二分退熱湯又黃芪錢三分柴胡一錢酒黃連黃芩甘草赤芍地骨皮生地蒼朮各七分歸身升麻各五分柴胡飲子晝熱柴胡黃芩人參當歸赤芍大黃甘草各一錢薑三片四順清涼飲積熱蒸大黃赤芍當歸炙草各一錢二分薄荷汁白虎湯朝熱石膏知母甘草粳米地骨皮散骨蒸石膏二錢柴胡黃芩知母生地各一錢羌活麻黃各七分半赤苓地骨皮各五分薑三片清心蓮子飲心火蓮子二錢赤苓人參黃芪各一錢黃芩麥冬地骨皮車前子甘草各七分滋陰降火湯血熱白芍錢三分當歸錢二分熟地麥冬白朮各一錢酒生地八分陳皮七分鹽知母鹽黃柏炙草各五分薑三片棗二枚黃連解毒湯實火黃連黃芩黃柏山梔各錢二分半加連翹柴胡赤芍各一錢四君子湯虛火人參茯苓白芍甘草涼膈散積熱連翹二錢大黃芒硝甘草各一錢薄荷黃芩山梔各五分竹葉七片蜜少部煎至半入硝清心湯上焦熱甘草錢七分連翹山梔酒蒸大黃薄荷黃連黃芩各七分朴硝五分竹葉七片蜜少部加減涼膈散又連翹二錢甘草錢半山梔黃芩桔梗薄荷各五分竹葉七片桃仁承氣湯中焦熱桃仁大黃芒硝甘草桂枝立效散下焦熱瞿麥四錢山梔二錢甘草一錢薑燈心防風當歸飲子又滑石三錢柴胡人參赤苓甘草各一錢大黃當歸赤芍防風各七分薑三片此方乃專治風熱燥熱濕熱補虛之妙劑五蒸湯諸