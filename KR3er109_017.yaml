地黃散又杞子柴胡黃連地骨皮天門冬白芍黃芩黃芪生地熟地生甘草各七分清唾湯又知母貝母桔梗黃柏鹽水炒熟地元參天冬遠志麥冬各一錢薑炭五分元霜雪梨膏又雪梨六十個去心打取汁二十鐘酸者不用生藕汁十鐘生地汁十鐘麥冬煎濃汁五鐘生萊蔔汁五鐘白茅根汁十鐘上汁合和重濾去渣火上煎煉入煉蜜一斤飴糖八兩薑汁半酒杯火上再熬如稀糊收好每服三五匙日三次不拘時芎歸湯眩暈生地芩連湯又生地川芎當歸各錢半赤芍山梔黃芩黃連各七分防風二錢水煎徐徐呷下此方兼治男子失血過多女人崩漏過度因而涸燥循衣摸床撮空閉目不省揚手擲足錯語失神鼻乾氣粗並及眩暈皆危症也以此救之全生活血湯又白芍升麻各一錢防風羌活獨活柴胡歸身葛根甘草各七分川芎藁本各五分生地熟地各四分蔓荊子細辛各三分紅花二分此方兼治崩漏太多昏冒不省閉目無所知覺說因血暴亡也血去則心神無所養暴損氣血豈能久活當補而升舉之以助其陽則目張神不昏迷矣此方補血養血生血益陽以補手足厥陰之不足治蓄血方五犀角地黃湯上部生地三錢赤芍二錢犀角鎊丹皮各一錢一方加當歸黃芩黃連各一錢桃仁承氣湯中部桃仁甘草桂枝大黃芒硝抵當湯下部抵當丸又生地黃湯總治生地汁一升無則用於生地二兩乾漆五錢生藕汁半升無則用刺薊汁升半生藍葉汁半升無則用於末半升虻蟲二十個炒水蛭十個炒大黃一兩桃仁研五錢水一升可熬至二升放冷分二服先服至半日部血未下再服之此藥比抵當湯丸甚輕恐服抵當湯丸下血不止故以此主之此方專治蓄血症脈沉細微膚冷臍下滿或狂或躁大便色黑小便自利老幼氣弱者尤宜治脫血症方四四物湯總治川芎當歸白芍生地三才湯又熟地天冬人參蜜丸酒飲任下百丸加減四物湯又側柏葉生地當歸川芎各一錢枳殼荊芥槐花炙草各五分薑三烏梅一補榮湯又當歸白芍生地熟地赤苓山梔麥冬陳皮各一錢人參甘草各五分棗二枚烏梅一個噯氣嘈雜吞酸惡心源流噯氣嘈雜吞酸惡心皆火病也噯氣者即內經之噫氣經云五氣所病心為噫又云寒氣客於胃厥逆從下上散復出於胃故為噫竊按噯氣一症總由胃弱不和三焦失職經云寒氣客胃者必先有火鬱於胃中又為客寒所遏清無所歸而不得升濁無所納而不得降又或挾痰或挾食或挾氣故隨胸中之氣而上逆也宜香附散而致噯之原更有由脾肺鬱者有由胃陽虛者脾肺鬱宜杏仁桔梗鬱金厚朴半夏曲胃陽虛宜生白朮茯苓益智厚朴半夏曲皆當詳察嘈雜者即心嘈內經云飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺又云脾主為胃行其津液剛知胃陽易燥必賴脾陰養之脾陰易濕必賴胃陽運之若表裡不和則鮮衝和之氣致生嘈雜之病其原有火動其痰者必痰多脈滑而數當先治痰次治火宜二陳湯加黃芩黃連有食鬱作熱者必脈數實而大當先治火次消導宜生地黃芩木通神曲山楂麥芽有濕痰壅盛者必脈沉而滑當去濕消痰宜白朮丸有氣鬱胸膈者必脈沉而澀當開鬱理氣宜氣鬱湯又有嘈雜至於醋心吐水者宜檳榔橘皮湯有嘈雜醋心上攻直至咽喉者宜吳茱萸湯有嘈雜由心陽熱而心中煩頭汗泄者宜茯神淮小麥朱砂柏子仁有婦人時患嘈雜皆血液汗瓷變而為痰或言是血嘈多以豬血炒食自愈說以血導血歸原之意也即或蛔蟲作嘈雜蟲得血腥亦飽伏也又有肝陰虛經水十日半月一至夜分多嘈雜者宜生地阿膠天冬茯神白芍丹皮皆當詳察吞酸者鬱滯日久優於脾胃間不能自出又咽不下倘肌表復遇風寒則內熱愈鬱而酸味刺心肌膚得溫暖則腠理開發或得香熱湯丸則津液流通鬱熱暫解宜二陳湯左金丸或有食已吞酸則因於胃氣虛冷宜吳萸炮薑等分為末湯服一錢或八分另有葉酸吐出酸水如醋是津液鬱積日久濕中生痰故從火化遂作酸味隨上升之氣而吐也宜平胃散加木香砂仁查肉神曲惡心者由痰凝胃脘或濕熱壅遏膈中故欲吐不吐欲嘔不嘔心中兀兀如畏舟車者然宜橘紅半夏山梔黃連此四者皆胃家之病而治之之法固不離乎胃矣而亦有時不專主胃者說胃司納食主乎通降通降則無此四者之病其所以不通降而生病之故皆由肝氣衝逆阻胃之降泡古人胃病治肝實有見於此所以噯氣嘈雜吞酸惡心諸症於理胃藥中必加平肝之品也噯氣等原由症治靈樞曰足太陽之脈病是動則病腹脹善噫內經曰太陰病所謂上走心為噫者陰盛而上走乎陽明陽明終屬心故上走而噫也脈經曰寸脈緊寒之實也寒在上焦胸中必滿而噫仲景曰上焦受中焦之氣未和不能消故能噫又日上焦之氣不至其部則物不能傳化故噫而吞酸又日寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於隔上活人書曰傷寒噫氣由中氣不交故也少陰經至胸中交於厥陰水火相搏而有聲故噫氣入門曰噫氣轉出食氣也胃中鬱火膈上稠痰飲食鬱成宜香附石膏半夏南星梔子治之亦治嘈雜又曰氣實噫者食罷噫轉腐氣甚則物亦然濕熱所致也氣虛噫者濁氣填胸也不因飲食常噫者虛也說胃有濁氣膈有濕痰俱能發噫也宜六君子湯加沉香為君厚朴蘇葉為臣吳萸為使以治之亦有善飲酒每朝常噫不吐者正傳曰痰在中焦作噫氣吞酸胃脘當心痛或嘔清水惡心以茯苓陳皮半夏甘草白朮蒼朮神曲麥芽砂仁川芎草蔻仁枳實豬苓澤瀉吳萸黃連檳榔木香山梔之類治之效又曰河間原病式言酸者肝木之味由火盛尅金不能平木則肝木自甚故為酸是以肝熱則口酸也所以中酸不宜食粘胃油膩者謂能令氣鬱不通暢也丹溪曰俗謂之心嘈似飢不飢似痛不痛而有懊憹不自寧之況其症或兼噯氣或兼痞滿漸至胃脘作痛皆痰火為患也治法以半夏橘紅輩消其痰芩連石膏山梔知母輩降其火二朮芍藥輩健脾行濕壯其本元則安又曰此乃食鬱有熱黑山梔薑炒黃連必用之藥又曰內經言諸嘔吐酸皆屬於熱以為熱言其本也東垣言作熱攻之必誤則又以為寒言其末也吞酸導引法保生祕要曰於肝經肺經二穴掐之九九擦亦九九行央後自效運央保生祕要曰先服氣凝定歸元半響次行胃口洗滌邪火至轉大腸散濁復元又凝定氣自愈治噯氣嘈雜吞酸吐酸惡心方九香附散噯氣香附山梔黃連橘紅半夏六君子湯又人參茯苓白朮炙草陳皮半夏二陳湯嘈雜茯苓半夏陳皮甘草白朮丸又白朮南星半夏氣鬱湯又香附蒼朮橘紅半夏茯苓貝母川芎山梔甘草紫蘇木香尖檳榔檳榔橘皮湯又檳榔四兩橘皮一兩每末方寸匕空心生蜜湯下吳茱萸湯又淡吳萸水煎頓服有人心如蜇破服此二十年不發也纍用有效左金丸吞酸黃連吳萸平胃散吐酸蒼朮厚朴陳皮甘草厄逆源流厄逆火病也經曰諸逆衝上皆屬於火是也厄逆一症古名噦後名咳逆又名吃忒其故有三一曰熱逆胃火乾氣上逆脈洪大而數必口乾舌燥面赤便祕宜平胃散加清火藥陰火上炎而厄其氣從臍下逆上說上升之氣至肝而出中挾相火也宜山梔黃連清火木香理氣茯苓半夏理脾胃中停痰阻塞致痰火鬱遏不得疏泄亦厄宜參用二陳湯半黃丸溫病發厄乃伏熱在胃令人腦滿而氣逆逆而厄或大下胃中虛冷亦致厄宜茅葛湯一曰氣厄勞役過度努傷中焦丹田之氣逆而上行故厄急調氣宜調氣平胃散人參利膈湯中氣大虛不時發厄急補益宜補中益氣湯元氣不足胃虛而厄非培元不可宜人參理中湯肺氣鬱痹面冷頻厄總在咽喉不爽當開上焦之痹說心胸背部須藉在上清陽舒展乃能曠達也宜枇杷葉川貝鬱金射乾通草淡豉痢後發厄極為險症宜六君子湯傷寒汗吐下後或瀉利日久或大病後氣厄為中氣極虛宜十全大補湯兼熱加竹茹丹皮兼寒方加丁香附桂脈沉數大便祕宜稍加大黃男女傷寒及一切雜病手足逆冷而嘔且厄宜薑橘湯厄逆之甚至於短氣急疏導之宜紫蘇二錢人參一錢煎服食傷脾胃復病嘔吐發厄下利兩脈微澀是陽氣欲盡濁陰衝逆急候也舍理陽驅陰無別法宜乾薑吳萸人參茯苓丁香柿蒂炮熟附子病後氣逆不能歸元致厄厄連聲不止聲聞屋外宜刀豆子燒存性白湯調服二錢即止溫病飲水過多氣滯厄逆不止宜枇杷葉茅根各半斤煎水徐徐服厄而心下悸說緣水氣停鬱宜二陳湯加木香竹瀝薑汁痰氣滯其氣從胸中起中州元氣鬱也宜氣鬱湯或脈小舌白氣逆吃忒畏寒微戰胃陽虛肝木上犯必議鎮肝安胃理陽法宜代赭石人參丁香橘皮茯苓淡乾薑半夏若無別症忽然發厄氣從胃中而起只是氣不順宜木香調氣散若痰結礙逆而吃忒乃為痰厄宜先用鹽湯探吐法後服導痰湯陰火從少腹上衝厄逆夜分轉甚乃榮血虧傷之故宜四物湯加知母黃柏竹茹陳皮茯苓厄而專由於火則曰火厄宜乾柿生薑煎服厄而音高連聲尚為有力為實可治若厄一二聲而音低者中氣稍絶而不能接續則虛之極旦發夕死病後大發厄亦由真元之氣絶不治一曰胃寒手足冷嘔吐無熱症脈遲澀為胃寒之候宜丁香柿蒂湯胃虛寒致胸滿而發厄宜丁香柿蒂湯胃家寒冷久厄不能止宜沉香散腎氣自腹中趕上築於咽喉逆氣連屬而不能出或至數十聲上下不得喘息此由寒傷胃脘腎虛氣逆上乘於胃與氣相並經云病深者其聲噦也宜吳茱萸散吐利後胃氣虛寒手足厥冷必傷土氣宜理中湯加丁香白朮枳殼或脈歇止汗出厄逆大便溏此勞倦積傷胃中虛冷陰濁上乾宜人參茯苓淡乾薑炒川椒代赭石炒烏梅肉若為冷物所阻或誤投寒劑所遏至陽不得上升而厄陽症傷寒胸中飲食未消誤服石膏人中黃之類而厄均宜散其寒越其熱不使寒熱抑遏宜丁香柿蒂散以上三者皆厄症之由也故有謂厄證屬寒多而熱少者又有謂厄症屬熱多而寒少者皆一偏之見說厄之為症總屬乎火即如胃寒諸症亦必火熱為寒所遏而然若純由乎寒則必不相激而逆上矣故人有尋常並無疾病或一張口而寒氣相襲立時發厄者俗名之曰冷厄其得竟謂之冷病乎說相襲者寒氣而相襲之時必陽氣適當上升故寒氣一襲陽即不得越而厄也若陽當下降而非上升之時雖寒襲之亦必不厄也然此偶然感發不足為病非若前文三因之症必須調治也至如活人書所載厄逆陰症胃寒脈細虛極宜丁香柿蒂散羌活附子湯厄逆陽症發熱口苦胸滿脈數宜橘皮竹茹湯或小柴胡湯加橘皮竹茹入門所載痢後厄逆宜人參白朮煎湯調益元散頓服自止痢後胃陽衰氣弱不相續而厄逆宜補中益氣湯加竹茹生薑附子飲食填塞胸中或食物太甚噎而不下發為厄逆宜三香散或二陳湯加枳殼砂仁蘇葉正傳所載痰閉於上火動於下無別症忽發厄逆從胸中起宜二陳湯加芩連桔梗薑炒山梔痰挾氣虛而厄逆宜六君子湯綱目所載胃中虛冷不能食飲水則厄逆或飲水太過或水結胸而厄逆宜小陷胸湯或但飲水多而厄逆別無惡候宜五苓散回春所載過笑而厄逆宜燈草探鼻取嚏皆所當究者也總之厄逆甚危不得視為尋常易瘳之症倘尋常視之危斃立見脈法醫鑑曰厄逆之脈宜浮緩若弦促代急微結難治散大者必死厄逆症治入門曰厄逆當分有餘不足不足者因內傷及大病後發其症胃弱面青肢冷便軟有餘者因外感冒燥及大怒大飽而發其症面紅體熱便閉便軟者瀉心湯主之便閉者大承氣湯主之綱目曰靈樞云嘔以草刺鼻令嚏而已無息而疾迎引之立已大驚之亦已詳此三法正是治厄逆之法今人用紙捻刺鼻取嚏嚏則厄逆立止或閉口鼻氣使之無息亦立已或作冤盜賊大驚駭之亦立已此以噦為厄逆正得經旨也謂之噦者厄聲之重也謂之厄者噦聲之輕也皆因病聲之輕重而名之也又曰厄聲頻密相連者為實可治若半時厄一聲者為虛難治多死死在旦夕厄至八九聲氣不回者難治厄逆小便祕澀或腹滿者不治脈見沉微散者死瀉痢後厄逆及傷寒結胸發黃而厄逆俱難治治厄逆方二十七平胃散熱厄蒼朮厚朴草草陳皮二陳湯痰厄茯苓陳皮甘草半夏半黃丸又半夏南星黃芩薑汁漫蒸餅丸食後薑湯下七十丸茅葛湯熱厄茅根葛根各半斤水三升煎升半每溫飲一盞噦止即停調氣平胃散氣厄木香檀香烏藥蔻仁砂仁藿香蒼朮厚朴陳皮甘草人參利膈湯又木香檳榔人參當歸藿香甘草枳實厚朴大黃補中益氣湯虛厄人參黃芪歸身白朮陳皮甘草升麻柴胡人參理中湯胃虛人參白朮甘草乾薑六君子湯痢後人參茯苓白朮甘草半夏陳皮十全大補湯虛極肉桂炙草白芍黃芪當歸川芎人參白朮熟地茯苓薑棗薑橘湯病後橘皮四兩生薑一兩水煎徐呷乃止木香調氣湯忽厄木香藿香砂仁蔻仁甘草導痰湯痰厄南星半夏茯苓枳實陳皮甘草四物湯血虧川芎當歸地黃白芍丁香柿蒂湯胃寒丁香柿蒂人參茯苓良薑橘皮半夏各五錢甘草二錢半生薑七錢半共為粗末每三錢煎服或調蘇合丸服亦可一方七味各一錢甘草五分煎服沉香散久厄沉香紫蘇白蔻仁各一錢共為末每柿蒂湯服五七分理中湯吐痢後白朮乾薑炙草氣鬱湯鬱厄香附茯神藿香桔梗木香枳殼厚朴砂仁丁香柿蒂散寒厄丁香柿蒂各二錢共為末生薑五斤煎湯調下如治傷寒厄逆每末一錢人參湯下本方潔古治虛人厄逆加人參一錢三因方加貝母甘草等分衛生方加青皮陳皮易簡方加半夏生薑羌活附子湯胃寒羌活附子茴香炮薑木香丁香各一錢入鹽一撮同煎服橘皮竹茹湯陽症橘皮三錢人參二錢竹茹四錢甘草一錢薑五片棗二枚加白朮枳殼尤妙小柴胡湯又柴胡黃芩人參半夏甘草益元散痢後滑石甘草三香散食厄沉香木香蔻仁蘇葉藿香小陷胸湯水結黃連半夏瓜蔞實生薑瀉心湯便軟生薑黃連黃芩半夏人參甘草乾薑大棗大承氣湯便閉大黃芒硝枳實厚朴
