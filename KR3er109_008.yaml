body:
  text: 卷八腎病源流奔豚腎癰腎哄髮土龍疽足少陰腎脈起於足小指之下斜趁足心至然谷之下循內踝之後別入跟中以上踹內又出膕內廉上股內後廉貫脊到腎絡膀胱其支者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中次注手蹶陰心包絡經每出酉時周身氣血俱注於腎足少陰腎經多氣而少血少陰者陽代初轉陰氣乍生之謂太陽寒水司氣獨歸於腎故腎為陽初轉陰乍生之少陰說以腎之氣主蟄伏衣歸藏天地斂藏之氣必歸於此是以腎得主寒水也是以為先天根柢與心火相對待也然腎雖主寒水而與心火南北對待而先天有真火亦涵於此是火也乃命門真陽之火安身立命之主即坎中一畫乾陽以運化生長收藏之原也是腎固以寒為位以水為體以火為本故其堅滑者水之體也其流行者火之本也所以諸臟各一獨腎有水火兩具而命門真火與蟄藏真水兩相並見然坎中一陽要即藏於兩陰之中故命門之火即涵於真水之內初非火是火水是水截分為二者殆如天地之陰陽動靜然靜極兩動陽生陰中遂能升陰精以上奉心主此升坎填離水火既濟皆先天之神妙不可思議者也先輩云腎之臟水猶海火猶龍水暖則龍潛水寒則龍起是腎火炎熾為患皆由腎水虛寒而腎既虛寒益為脾土所剋其病自日生矣此言水火不能相濟因為致病之由也而不但已也腎家本有水火兩病火病者龍火騰熾上爍為害也其症有口熱咽乾煩心心如懸喝喝而喘面如漆柴咳唾有血等類水病者寒濕之淫所勝為災也其症有跗腫骨痛陰痺時眩清噘腹大脛腫喘咳身重寢汗頭項痛饑不欲食寒氣自傷意不樂等類是則腎之病有可指數者雖然水由地中行剋水者固為土而為水所藏者亦即土也試觀江湖河海未有不載於土上行於土中者故其水得土之中氣而足為蛟龍之所潛藏若澗壑之水非不清徹要皆寒冷沁骨故雖魚蝦之細亦不能養明乎此亦可知腎之蟄藏心藉土封之力內經所以謂腎合精其主脾不曰剋而反曰主也羅淡生亦云水藏土中此前人補腎用六味當知其入茯苓山藥之妙是已但脾藥甚多而必用此二味者實因補水故補土水本濕土又易生濕故必須此二味能滲土中之濕則土既無濕淫之患而水之藏土中者亦自若其性而不至濕與濕並多潰溢之病矣此六味不用其他脾藥而必用茯苓山藥者其旨更自深微不可不知也況乎先哲之言曰腎家不足勿撲其火須滋陰之真源以配火腎家火不足勿傷其水須益火之源以配水果能知其所以然以治瘳之腎家水火兩病吾知免矣脈法脈經曰男子脈微弱而澀為無子腎經不足精氣清冷也脈訣曰遺精白濁當驗於尺結芤動緊二症之的又曰澀脈為精血不足之候丈夫脈澀號傷精兩腎同歸一腑入門曰小便清利脈沉遲是冷氣歸腎小便赤澀脈沉數是熱氣歸命門是腎與命門脈同者謂其所受之病同歸於膀胱一腑也腎病症治靈樞曰有所用力舉重若入房過度汗出浴水則傷腎又曰邪在腎則病骨痛陰痺陰痺者按之而不得腹脹腰痛大便難肩背頸項痛時眩內經曰脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蟲注云出白溲出白液也又曰腎熱者色黑而齒活又曰大骨活大肉陷肩髓內消動作益衰真臟見腎臟也期一歲死又曰腎苦燥急食辛以潤之開腠理致津液通氣也腎欲堅急食苦以堅之用苦補之咸瀉之又曰腎病禁碎㶼熱食溫炙衣難經曰久坐濕地強力入水則傷於腎又曰外症善恐數缺面黑內證臍下有動氣按之牢若痛其病逆氣少腹急痛泄痢下重足脛寒而逆腎氣間甚內經曰腎病者夜半慧四季甚下哺靜腎絶侯靈樞曰足少陰氣絶則骨活少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢髮無澤髮無澤者骨先死戊日篤己日死脈經曰腎絶四日死何以知之為暴活面為正黑目中黃色腰中欲折自汗如流水一云人中平十日死仲景曰溲便遺矢狂言目反直視者此為腎絶也脈浮而洪身汗如油喘不休水漿不下形體不仁乍靜乍亂者此為命門絶也腎氣滯澀保養法保生祕要曰凡人氣旺則血榮而潤澤氣絶則血活而滅形故氣虛弱則滯澀而成病如澀於腎諸寒收引皆屬腎水氣弱或作腰疼水活瞳人昏暗兩耳難察律音冬月水旺宜吐納按節吹氣調和會意掌心所忌須避寒冷最宜早臥遲升大抵冬月斂藏氣閉至陰己極宜節欲養一陽之初生說陰陽交精子南合璧萬物氣微在下不可動搖守此則保壽無疆腎之積曰奔豚發小腹上至心如豚奔走狀上下無時久則喘逆骨痿少氣脈沉而滑宜奔豚丸增損五積丸皆由腎虛脾家間斷邪下傳客腎所致治法宜補氣健脾辛溫散結脈法脈訣曰五積屬陰沉伏附骨肝弦心芤腎沉急滑脾實且長肺浮喘卒醫鑑曰腹中有積脈忌虛弱綱目曰內有積不見脈難治見一脈相應為易治腎積證治永類鈐方曰經云治積聚有化積消積挨積磨積而無下積之說說不可直便取下以傷胃氣也得效曰治積有奔豚丸又有奔豚湯腎癰腎氣衰敗病也其發處正與內腎相對大抵突起皮赤者易安陷入皮黑者難愈宜加減八味元加味十奇散十六味流氣飲托裡散加山梔黃岑杏仁連翹說不可視為輕症也而腎癰之外又有腎哄發亦為腎臟虛證其瘡起於脊骨十四椎腎哄穴及腎哄下之腰哄穴此兩處皆屬至虛地位不拘癰疽但發此兩處者皆宜防毒氣內攻急當補益內氣令實方可開破以內氣實則毒氣不能內攻且易得潰此皆治於末成之前者也若已成潰破猶宜峻補已未成補藥俱宜參耆歸朮勿使淹滯久不收口至成漏管此則治於已成之後者也大約補益之藥以補腎為主補脾次之補氣補血又次之而尤不可犯者是房欲若犯必至不救男女皆然又有一症名土龍疽亦發腎哄及胃哄兩處其發也必寒熱大作十數日大汗展頸身熱如火陳文治云九日可刺膿青黑者死血膿者不死失而不刺其上下亦黑二十日死亦言其症之重且急醫者所當詳察而理之也宜消毒散防風通聖散去大黃麻黃芒硝腎癰等症治靈樞曰京門穴名隱隱而痛者腎疽上肉微起者腎癰也內經曰腎癰胠下至小腹滿入門曰五臟癰疽俱宜十六味流氣飲仙方活命飲腎哄發宜乾千金內消散仙傳化毒湯連翹敗毒散治腎病諸藥要品及方六腎無實故無瀉法因不列腎實之藥腎虛宜滋陰除熱生精補血地黃杞子牛膝人乳胡麻杜仲天冬麥冬肉蓯蓉黃柏知母五味川斷山藥丹皮柏子仁山萸車前龜甲青蒿童便乾漆沙蒺藜朱砂磁石蓮鬚甘草砂仁龍骨金石斛魚鰾蓮肉牡蠣遠志韭子薤白菟絲子阿膠茅根戎鹽蒲黃茯苓萆解地骨皮苡仁桃仁紅花白膠桑椹鹿茸胡黃連側柏棗仁蘇子降香通草益智覆盆子人參沉香鬱金陳皮木香黃耆鹿角霜橘核巴戟仙茅白朮河車雀卵鹿角膠木瓜茴香附子肉桂蠶蛾肉蔻川楝子補骨脂蛇床子狗陰莖桑螵蛸金櫻子荔枝核六味地黃丸腎水不足陰虛地黃山藥山萸丹皮茯苓澤瀉此方如血虛陰衰熟地黃為君滑精山萸為君小便或多或少或赤或白茯苓為君小便淋澀澤瀉為君心氣不足丹皮為君皮膚乾澀淮山藥為君按此綱目所載法也可知此方之妙四通八達隨用皆宜固不必拘於地八山山四丹苓澤瀉三之說以為止宜於血虛陰衰之人矣補腎丸又酒龜板四兩酒黃柏酒知母各三兩乾薑一兩粥丸空心鹽湯下滋陰降火湯腎水不足陰虛火動白芍錢三分當歸錢二分熟地白朮天冬麥冬各一錢生地八分陳皮七分蜜知母蜜黃柏炙甘草各五分薑三棗二八味丸命門火不足陽痿即六味丸加肉桂附子各一兩再加車前子名金匱腎氣丸加減八味丸水火兼補熟地二兩山藥山萸各一兩酒蒸澤瀉丹皮茯苓各八錢五味子一兩半肉桂五錢蜜丸五更未言語時酒或鹽湯下晚間空腹再服溫腎散腎命虛寒腰脊重痛熟地錢半肉蓯蓉牛膝巴戟麥冬五味子炙甘草各八分茯神乾薑杜仲各五分煎服為末酒下二錢亦可附載仲景大法及分別標本方藥有餘為寒氣天雄附子山萸補骨脂陽起石血熟地肉桂巴戟肉蓯蓉不足為熱氣山藥遠志五味子血牡蠣生地蛤粉腎溫則實豬苓車前澤瀉滑石腎虛則寒動於中肉蓯蓉補骨脂盛則寒附子肉桂虛則燥天冬當歸益智仁生地砂仁咽痛咽物無妨不腫為寒炙甘草湯半夏乾桔湯肉桂苦酒咽物有妨腫痺為熱紫河車散礬石散尤重速下之下遲即咽閉也內經曰喉氣通於天咽氣通於地傷於風上先受之傷於濕下先受之也消渴益火之源使溺有餘烏附壯水之主使渴不想飲哈蚧消中調中人參五味子茯苓枸杞子消腎益火消陰八味丸加五味子壯水制陽八味丸加五味子地黃乾寒人參菖蒲茯苓朱砂熱山萸芡實蓯蓉補骨脂精滑黃連遠志牡蠣益智仁黃柏地黃哈粉縮砂仁澀脈男子失血亡精女子半産漏下因寒天麻因熱遠志命門有餘生地朱砂黃柏知母寒水石天雄不足附子肉桂川烏硫黃陽起石實車前子天冬元參黃柏知母麥冬生地黃丹皮木通澤瀉甘草黃岑白茯苓牛膝童便虛紫河車人參鹿茸白膠杞子蓯蓉菟絲子巴戟五味山萸附子仙茅覆盆子蛾雀卵山藥蓮肉肉蔻陽起石砂仁木香吳萸故紙肉桂蛇床子狗陰莖白馬陰莖陰囊濕癢黃耆羌活白蒺藜白附子共為末湯酒任調空心服即將四味加吳萸盤龍子煎湯洗一法鬱則折之謂抑之制其衝逆也過者折之則以其畏也過太過也太過以其味瀉之以鹹瀉腎酸瀉肝辛瀉肺苦瀉心甘瀉脾瀉故畏謂瀉為畏也標麻黃附子細辛湯麻黃附子甘草湯細辛味辛溫熱以潤肉寒主頭痛腦痛百節拘鬱風濕痺痛汗不出血不行所以主足少陰連及足厥陰也標之本豬苓湯本寒四逆湯熱大承氣厚朴枳實雖治大實大滿本治傷寒頭痛大風在皮與大黃芒硝同用白膏而下無所通與酒浸大黃同為佐使仲景之法可謂極矣本之標白虎湯薑附湯通脈四逆湯本之本承氣湯抵當湯抵當丸桃仁承氣湯治奔豚方三奔豚丸總治厚朴七錢黃連五錢川楝子三錢茯苓澤瀉菖蒲各二錢延胡索一錢半全蠍附子獨活各一錢川烏丁香巴霜各五分肉桂二分蜜丸鹽湯下服法照息賁丸奔豚湯又半夏二錢川芎當歸各錢半甘李根皮乾葛各一錢黃岑白芍甘草各七分薑三棗二增損五積丸又黃連厚朴川烏乾薑人參茯苓增損法詳息賁條治腎癰方五加減八味丸總治加味十奇散又當歸肉桂人參黃耆川芎白芷防風桔梗厚朴甘草乳香沒藥等分為末酒服三錢不飲酒麥冬湯下一名固壘元戎即十宣散加乳香沒藥也十六味流氣飲又人參當歸黃耆桔梗防風木香川芎枳殼白芍白芷肉桂檳榔厚朴蘇葉烏藥甘草各六分托裡散又人參黃耆各二錢陳皮白朮熟地當歸茯苓白芍各錢半甘草一錢此方治癰疽潰後久末斂以此補托另有神效托裡散是治癰疽腫毒能托裡排膿者其方用黃耆忍冬藤各三錢當歸二錢甘草一錢水酒煎服仙方活命飲又大黃五錢金銀花三錢歸尾皂角刺陳皮各錢半乳香貝母花粉白芷甘草節赤芍各一錢防風七分沒藥五分穿山甲三片燒另研好酒入瓦罐內封口煎熟隨瘡上下飲之服後再飲酒二三杯側臥而睡忌酸物錫器如在背皂角刺為君在腹白芷為君在四肢金銀花為君此方通治一切癰疽毒腫末成者內消已成者即潰排膿止痛消毒之聖藥也治腎哄發方三千金內消散總治大黃三錢金銀花二錢酒歸尾錢半木鱉子去殼赤芍白芷乳香沒藥皂角刺薑蠶瓜蔞仁花粉各一錢甘草節五分穿山甲三片蛤粉炒酒水煎服此方通治一切癰疽及腸癰肚癰便毒初起即消己腫即潰血從大便中出也此方與仙方活命飲略同仙傳化毒湯又金銀花花粉各錢二分甘草節防風黃岑白芍赤苓貝母連翹白芷各一錢半夏七分乳香沒藥各五分酒水煎此方通治一切癰疽發背乳癰無名腫毒未成立消已成立潰連翹敗毒散又羌活獨活柴胡前胡金銀花桔梗川芎赤苓枳殼連翹薄荷防風荊芥甘草各七分薑三片水煎此方治一切癰疽初發憎寒壯熱甚者頭痛拘急狀似傷寒五日前二三服輕者消若不消宜服仙方活命飲治土龍疽方二消毒散總治皂角刺金銀花防風當歸瓜蔞實甘草節大黃等分水酒煎食前溫服仍提掣頂中發立效此方症發三四日者可消防風通聖散又赤芍芒硝滑石川芎大黃桔梗石膏荊芥麻黃各四分半山梔白朮連翹當歸薄荷甘草防風黃岑各八分此方非表裡俱實大小便祕者未可輕用虛損癆瘵源流五癆六極七傷煎厥症解㑊證食㑊證二陽病虛損癆瘵真元病也虛者氣血之虛損者臟腑之損虛久致損五臟皆有損肺傷氣毛槁皮焦急宜養氣宜四君子湯損心傷神血脈不榮急調榮衛宜八珍湯損肝傷筋筋緩不收急當緩中宜牛膝丸八味丸損腎傷精骨髓消減急須益精宜金剛丸煨腎丸損脾傷倉廩飲食不為肌膚急應時飲食適寒溫宜十全大補湯五臟之氣有一損傷積久成癆甚而為瘵癆者勞也勞困疲憊也瘵者敗也羸敗凋敝也虛損癆瘵其病相因其實由於五臟如此然五臟雖分而五臟所藏無非精氣其所以致損者有四曰氣虛曰血虛曰陽虛曰陰虛陽氣陰血精又為血本不離氣血不外水火水火得其正則為精為氣水火失其和則為寒為熱此虛損之大概而氣血陰陽各有專主認得真確方可施治氣虛者脾肺二經虛也或飲食或勞倦氣衰火旺四肢困熱無氣以動懶於言語動作喘乏自汗心煩必溫補中氣宜補中益氣湯血虛者心肝二經虛也吐血瀉血女人産後或崩漏或諸血失道妄行眼花頭暈漸至吐血不止或乾血癆宜四物湯當歸補血湯而陽虛陰虛則又皆屬腎陽虛者腎中真陽虛也真陽即真火審是火虛右尺必弱只宜大補元陽亦不可傷陰氣忌涼潤恐補陰邪也尤忌辛散恐傷陰氣也惟喜甘溫益火之品補陽以配陰宜八味丸沉陰自斂陰從乎陽矣所謂益火之原以消陰翳也陰虛者腎中真陰虛也真陰腎水審是水虛脈必細數只宜大補真陰亦不可伐陽氣忌辛燥恐助陽邪也尤忌苦寒恐伐元陽也惟喜純甘壯水之劑補陰以配陽宜六味丸加杞子魚鰾虛火自降而陽歸於陰矣所謂壯水之主以鎮陽光也而二者之為病亦各有異陽虛所生病為熱癆口乾咽痛舌瘡涕唾稠粘手足心熱大便燥小便赤然至咽瘡失音或尪羸陽不舉脈細無根脈數不倫漸已成瘵而難救宜逍遙散坎離既濟丹陰虛所生病為虛癆吐痰白色胃逆不思飲食惡食食不化遺濁便溏泄然至泄不已神瘁肉削漸已成瘵而難救宜人參養榮湯三白廣生湯二病之原皆由勞心好色以至真陽衰憊邪火盛熾真陰虧損虛火炎爍由是火蒸於上則為咳血宜五汁膏為潮熱宜清骨散火動於下則為精濁宜龍齒丸為泄瀉宜歸脾湯三白廣生湯諸症蜂起矣然病之原雖屬陰陽之虛而其症必積各見於一經就其症之所見以審知為何經而因以辨乎陰陽之所屬然後可與療治何言之如現患精濁又兼脛酸腰背拘急知其病在腎也宜大菟絲子丸補中地黃丸現患喘咳嗽血又兼皮活鼻塞聲重知其病在肺也宜保和湯現患咯血多汗又兼驚惕口舌瘡知其病在心也宜聖哄湯現患夢遺又兼脅疼善怒項強知其病在肝也宜補肝湯柴胡疏肝散兩方參用現患溏泄又兼腹痛痞塊飲食無味四肢倦怠知其病在脾也宜調中益氣湯此皆由陰陽之虛以致病成於五臟者也而猶不止此也有雜病久不愈病久必虛虛久成癆者宜調榮養衛丸有思慮過度心氣不舒鬱熱熏蒸胸中因生內熱而成癆者宜歸脾湯有房勞精損困乏虛火目暈耳聾遺精步履欹邪而成癆者宜鹿胎丸有飢飽傷脾而成癆者宜補中益氣湯口柴胡山藥有積勞虛損體瘦氣短好臥寒熱而成癆者宜十四味建中湯有負重受傷而成癆者宜補中益氣湯如病久再為加減有盛暑勞碌受傷而成癆者宜清暑益氣湯有縱酒傷脾而成癆者宜葛花解酲湯有老人氣血兩虧下體痿弱不善食而成癆者宜嵩崖脾腎丸常服神仙延壽酒有童男女稟受母胎之氣骨蒸黃瘦口臭肌熱而成癆者宜麥煎散有婦人女子經閉或血熱血活而成癆者宜逍遙散補血養陰丸有情竇初開有其心而無其事邪火煎耗真陰而成癆者宜清離滋坎丸種種病因難更仆數而治之之法要不外溫補滋補兩端以陽虛即宜溫陰虛即宜滋也然即用溫不得偏任辛香丁附之屬即用滋不得偏任苦寒知柏之屬此士材所必諄諄誥誡也由是推之陽為氣陰為血即陰陽之須補益可知氣血之應補矣然古人云陽生則陰長又云血脫者補氣實以氣藥有行血之央血藥無益氣之理也又況血藥滯膩非痰多食少者所宜血藥清潤久用必多泄滑之患乎夫虛癆之症疑難不少陰虛火動內熱爍金必致損肺寒熱內熾多服寒涼必致傷脾補脾必礙肺須知燥熱能食而不泄者急當潤肺兼補脾宜滋陰清化丸加白朮建蓮若虛羸食少而腸滑者雖喘嗽不寧但當補脾而清潤宜戒宜三白廣生湯以土能生金金不能培土故補脾尤要也古人謂癆病多死於泄瀉職是故耳又如脾腎法宜兼補但甘寒補腎不利於脾辛溫快脾益傷於腎即兩者而衡之土能生金金為水母即腎虛宜補當更扶脾即欲壯脾不忘養腎可耳或滋腎而佐以沉朮砂蓮或快脾而佐以菟絲五味故部學士有補腎不如補脾孫真人有補脾不如補腎之說兩家雖似相反要皆為虛癆家指示要法醫者當必辨症察脈或補脾或補腎務當其施庶無偏之弊說以血之原在腎氣之原在脾故肺氣受傷而土為金母必求助於脾肝血受傷而水為木母必借資於腎此二臟乘則百疾作二臟安則百脈調而病自息也且夫虛癆之由有寒有熱皆由虛而感感乎寒者陽傷傷則虛陽虛必陰盛故受損自上而下由肺而心而胃治宜辛甘淡宜二朮當歸茯苓茯神桑皮橘皮過於胃則不可治也感乎熱者陰傷傷則虛陰虛必陽盛故受損自下而上由腎而肝而脾治宜甘緩溫宜地黃丹皮白芍知母山萸石斛麥冬過於脾則不可治也經曰陽虛生外寒陰虛生內熱陽盛生外熱陰盛生內寒而寒與熱二者常相因而熱為甚故治之者必以熱為憑而寒為驗說癆病必發熱其發熱之由不一有氣虛熱必兼少氣自汗體倦心煩宜八珍湯加減有血虛熱必兼燥渴睡臥不安宜聖愈湯人中白丸兩方參酌用有往來潮熱必兼自汗食少膝軟骨節疼宜參苓建中有骨蒸熱必兼肌瘦舌紅頰赤宜龜甲散河車丸二仙膠有五心熱必兼體疼口乾頰赤發熱宜逍遙散十全大補湯有遍體發熱必兼瘦削神困宜十四味建中湯有病久結痰成積腹脅常熱惟頭面手足於寅卯時乍涼宜六君子湯送滾痰丸二錢先以潤腸丸分三次投之使其徐化六君子湯中加薑汁竹瀝尤妙此熱之見於身體顯而可驗者也若五臟之熱尤不可不審大約肺熱輕手即得略重全無肺主皮毛也日西尤甚必兼喘咳灑淅善嚏善悲缺盆痛胸中及肩臂皆痛臍右脹痛小便數皮膚痛及麻木宜茯苓麥冬五味山藥紫菀百合以補之桑皮葶藶枳殼蘇子以瀉之乾薑豆莞木香款冬花以溫之二母沙參元參山梔黃岑花粉馬兜鈴以涼之心熱微按之皮毛之下肌肉之上乃得心主血脈也日中尤甚必兼煩心掌熱而嘔善笑善忘善驚不寐築築然動舌破消渴口苦心胸間汗宜丹參龍眼茯神歸身麥冬山藥以補之黃連以瀉之菖蒲益智以溫之竹葉犀角連翹朱砂牛黃天冬以涼之脾熱輕重按俱不得熱在不輕不重間脾主肌肉也夜尤甚必兼怠惰嗜臥四肢不收無氣以動泄瀉溺閉面黃口甘舌強痛吐逆不貪食不化食搶心善味善飢善嘻當臍痛腹脹腸鳴肉痛足腫宜參芩朮草陳皮扁豆山藥苡仁以補之薑附丁桂以溫之石膏滑石元明粉以涼之肝熱按至肌肉之下骨之上乃得肝主筋也寅卯時尤甚必兼多怒多驚便難轉筋攣急四肢困熱滿悶筋痿不能起頭痛耳聾頰腫面青目腫痛兩脅小腹痛嘔逆作酸睪疝冒眩多瘛宜阿膠山藥木瓜棗仁以補之青皮青黛柴胡白芍黃連木通龍膽草以瀉之木香吳萸肉桂以溫之甘菊車前子柴胡山梔以涼之腎熱極重按至骨乃得腎主骨也亥子時尤甚必兼腰膝脊臂股後痛耳鳴遺泄二便不調骨痿不能起眇中清面黑口乾咯血飢不欲食腹大脛腫少腹氣逆急痛下腫腸澼陰下濕癢手指青黑厥逆足下熱嗜臥坐而欲起善怒四肢不收宜地黃杞子山藥桑螵蛸龜板牛膝山萸杜仲五味子以補之知母澤瀉以瀉之鹿茸肉桂附子鹿角膠補骨脂沉香肉蓯蓉以溫之知母黃柏丹皮地骨皮以涼之以上皆癆成於五臟其熱之發因而各異者也然五臟雖皆有癆而心腎尤多固有不可不知者說心主血腎主精天下之人大抵勞心好色者衆精傷血耗勞自成也誠察乎此惟當溫養滋補調心益腎宜還少丹坎離既濟丹一切熱藥涼藥安可偏任哉癆病多吐血吐血之原未有不由五臟來者咳嗽血出於肺因悲憂所致也宜二冬二母桔梗黃岑痰涎血出於脾因思慮所致也宜生地石斛葛根丹皮甘草茯苓陳皮黃耆吐血出於心因驚恐所致也宜丹參山藥麥冬茯神當歸生地吐血多塊出於肝因恚怒所致也宜柴胡芍藥山梔丹皮棗仁生地沉香咯血出於腎因房欲所致也宜生地丹皮茯苓遠志阿膠知母黃柏嘔血出於胃中氣失調邪熱在中所致也宜犀角地黃丹皮甘草元明粉其餘致血之由正多而止血之法又必各從其類有由酒傷者用解止之宜葛根蔻仁側柏茅花有由食積者用消止之宜白朮陳皮山查神麯有由血熱者用涼止之宜山梔炭黃連炭有由血寒者用溫止之宜血餘灰乾薑炭有由血滑者用澀止之宜棕灰荷葉灰有由血虛者用補止之宜髮灰地黃灰有由怒傷肝木血菀於上者必含人搏厥用平止之宜沉香木瓜青皮丹皮白芍有由血瘀在中者必脈沉實腹中滿痛用行止之宜當歸降香木查蓬朮桃仁延胡索赤芍藥有由血溢者被觸傷破泉湧不止用補止之宜十全大補頻頻多服有由血脫者九竅齊出亦用補止之宜急用髮灰大薊汁人參湯調服此外有積勞吐血久病後吐血多而久不止者並宜獨參湯或內多乾血肌膚甲錯兩目暗黑宜大黃䗪蟲丸皆當加意治之是知血宜靜宜下七情妄動形體疲勞陽火相迫錯行必脈洪口渴便結用涼藥救之宜黃岑黃連生地竹葉麥冬丹皮若氣虛挾寒陰陽不相為守血亦妄行必有虛冷之狀說陽虛陰必走是也宜八味丸或理中湯加烏藥木香而古人謂血以下行為順上出為逆吐血初起宜食大黃下之又謂亡血失血虛家禁下非兩言之相背也須知宜行者畜妄之初禁下者亡失之後固不可混視也總之治血之法不外治肝而治肝之餘必兼補水順氣說氣有餘即是火血隨氣上補水則火自降順氣則血不升也補水宜熟地牛膝丹皮等順氣宜蘇子沉香橘紅等童便能使濁陰歸下竅兼能行瘀藕汁能達血無滯兼能止澀若內經云凡風寒暑濕燥火六氣之變皆能失血若不察其所因概與涼折必生變醫者不可不知古人治血多以胃藥收央如烏藥沉香炮薑薑棗稱為虛家神劑醫者又不可不知以上治血之大凡也癆病必咳嗽或由陰傷陽浮水涸金燥喉癢而咳宜用甘潤養肺水旺氣復而咳自已宜麥冬花粉生地杏仁橘紅阿膠桔梗或由脾胃先虛不能製水水泛為痰水冷金寒而咳宜立效方加羌活皮白白朮或由火爍肺金而咳宜六味丸或由命門火衰氣不化水而咳宜於治咳藥中加附子肉桂人參羌活至癆嗽失音肺氣鬱也宜杏仁膏痰嗽兼喘痰涎湧也宜五汁膏癆嗽痰熱渴汗心脾傷也宜滋陰清化丸以上治咳之大凡也參看咳嗽門更詳虛癆之屬有桃花疰其症面色不衰肌膚不瘦外如無病內實虛傷須審現在何症及傷在何臟以治之大概宜用紫金錠蘇合丸或回春避邪丹等方又有傳尸癆乃鬼作蟲而為祟其症沉沉默默不知所苦經時纍月漸漸羸頓至於死亡治法以固本為先祛蟲為次固本宜人參養榮湯八味丸祛蟲宜十疰丸桃奴丸紫金錠嗟乎虛勞為病亦既甚矣茍非洞其源徹其流何以云治乎故知治癆之法不可偏熱不可偏涼不可偏補務在察其脈症斟酌用藥庶乎有廖丹溪云一水既虧不勝五火虛症蜂起先當和解微下次用調補若邪未除便行補劑邪入經絡深為可悲惟無積人脈舉按無力者方可補之此誠治虛損癆瘵之要道也脈法靈樞曰氣虛則脈弦陰虛則脈大仲景曰平人脈大為勞脈極虛亦為勞又曰脈虛細弱者勞也又曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半虛漏下男子則亡血失精又曰寸口脈微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉槁活而寒栗咳逆唾膠吐涎沫脈經曰脈來軟者為虛緩者為虛微者為虛弱者為虛弦者為中虛細而微者氣血俱虛小者氣血俱少大而芤者脫血血虛脈大如蔥管脈沉者遲者脫氣脈經曰平脈弦大勞損而虛大而無力陽衰易扶數而無力陰火難除寸弱上損浮大裡活尺寸俱微五勞之軀血羸左濡氣惟右推左右微小氣血無餘丹溪曰男子久病氣口脈弱則死強則生女子久病人迎脈強則生弱則死直指曰虛勞之脈大抵多弦或浮大或數大者易治血氣未定可藥而正也弦者難治血氣已耗未易調補也若帶雙弦則為賊邪侵脾尤為難治加數極則殆虛勞原由症治回春曰百病皆生於腎說精傷則腎水空虛不能平其心火火炎傷其肺金是絶水之源金水衰弱不能勝其肝木木盛則剋脾土而反生火火獨旺而不生化故陽有餘陰不足獨熱而不久矣綱目曰虛者皮毛肌肉筋脈骨髓氣血津液不足是也入門曰凡飲食減少精神昏短遺精夢泄腰背胸脅筋骨引痛潮熱自汗痰盛咳嗽是虛癆常症也又曰虛損皆由水火不濟但以調和心腎為主兼補脾胃則飲食加而精神氣血自生矣直指曰皮虛則熱脈虛則驚內虛則重筋虛則急骨虛則痛髓虛則墮腸虛則泄三陽實三陰虛汗不出三陰實三陽虛汗不止又曰虛勞之疾百脈空虛非滋潤粘膩之物以養之不能實也切不可妄施金石燥熱等藥東垣曰肺損益其氣心損調其榮衛脾損調其飲食適其寒溫腎損益其精肝損緩其中緩中者調血也宜四物湯以其中有白芍也得效曰虛損之症峻補者烏附天雄薑桂等潤補者鹿茸當歸蓯蓉等清補者二冬人參地黃等陰陽氣血虛辨入門曰虛脈多弦弦而濡大為氣虛沉微無力為氣虛甚弦而微為血虛澀而微為血虛甚形肥而面白者為陽虛形瘦而面倉黑者為陰虛又曰房勞思慮傷心腎則陰血虛飢飽勞役傷胃氣則陽氣虛此傷症之至要也海藏曰呼吸少氣懶言語動作無力目無精光面色㿠白此兼氣血虛也保命曰右脈浮而大或大而弦皆為虛勞說陽盛陰虛之症暮多見之右脈虛微細弦為虛勞者乃陰陽俱虛也晨多見之丹溪曰人之一身陽常有餘陰常不足氣常有餘血常不足故滋陰補血之藥自幼至老皆不可缺虛癆五敗九死十絶侯千金方曰手足腫無交紋心敗唇反黑無紋肺敗面黑有瘡肝敗陰腫囊縮腎敗臍突腫滿脾敗又曰九死候者一手足青二手足久腫三脈活齒乾四語聲散鼻虛張五唇寒冷宣露六唇腫齒焦七手循衣縫八汗出不流九舌卷卵縮又曰氣短目視亭亭無精光心絶鼻虛張氣復短肺絶面青眼視人不直數出瓷肝絶面黑眼晴黃素汁流腎絶泄涎唾不覺時時妄語脾絶爪甲青惡罵不休膽絶背脊酸痛腰重反覆難骨絶面無精光頭目自眩血絶舌卷縮如紅丹咽唾不得足踝小腫肉絶發直如麻汗出不止腸絶虛癆脈代及生死症仲景曰虛癆不足汗出而悶脈結代心動悸行動如常不出百日死急者十餘日死宜用炙甘草湯救之正傳曰難經言七傳者死間臟者生何謂也然七傳者傳其所勝也間臟者傳其子也何以言之假令心病傳肺肺病傳肝肝病傳脾脾病傳腎腎病傳心一臟不再傳故言七傳者死也間臟者傳其所生也假令心傳脾脾傳肺肺傳腎腎傳肝肝傳心是子母相生周而復始如環無端故言生也今考之經文所謂七傳者只六傳而已謂一臟不再傳按其數乃有四臟不再受傷也夫此條言虛癆之症也其所謂七傳者心病上必脫去腎病傳心一句其一臟不再傷當作三臟不再傷皆傳寫之誤耳說虛癆之症必始於腎經五臟從相剋而逆傳已盡又復傳於腎與心則水絶而火太旺故死而不復再傳於彼之三臟矣其有從相生而順傳者有生生不息之義故間臟者生也回春曰虛癆之疾不受補者難治喉中生瘡聲音啞者不治久臥生胝者不治虛極之病火炎面紅發喘痰多身熱如火跗腫溏泄脈緊不食者死不治虛癆導引保生祕要曰掌心無事任擦搓早晚摩兩脅腎哄耳根湧泉令人搓百四十回固精多效朝煅人乳酒飲清潔童便或服循環水用薑棗以暖脾宮或用秋石代鹽取其滋陰降火若虛損無力服參者宜依方進氣取效天然至危漏底諸藥難治者用好臍帶數條燥為末每服二錢好酒諒意調服神驗也戒惱怒絶思欲忘言守靜能踵息起死回生運央保生祕要曰一指歸元三提三咽念四字咒於分寸虛虛抱守妄念返復持一死字世事盡歸於空抱守二七痰涎稍清運央周天借督脈按四時進退有神央嘔紅起念艮背運行庭歸元合用百日央夫勿使間斷骨蒸盜汗痰嗽盡愈五癆六極七傷皆虛損之屬病也說虛損之病由五臟之勞而生其病既成即生六極漸至七傷是五勞者虛損之原而六極七傷則皆虛損病之流極也其患有相因其勢有必至雖皆虛損之屬而其症狀調治實有不容混者故復舉而詳之金匱曰五勞者心勞神損肝勞血損脾勞食損肺勞氣損腎勞精損也心宜大五補丸肝宜黑元脾宜橘皮煎元肺宜人參黃耆散腎宜腎氣丸然則知五勞之症治即可以杜癆瘵之原入門曰數轉筋十指爪甲皆痛為筋極宜並服滋補養榮丸酒煮木爪粥牙痛手足痛不能久立為骨極宜茸珠丸面無血色頭髮墮落為血極宜補榮湯身上往往如鼠走體上乾黑為肉極宜參苓元氣少無力身無膏澤翕翕羸瘦目無精光立不能久身體若癢搔之生瘡此為精極宜巴戟元胸脅逆滿恆欲大怒氣少不能言此為氣極宜益氣丸然則知六極之症治即可以拯癆瘵之深入門曰七傷一陰寒二陰痿三裡急四精漏五精少六精清七小便數也總治宜鎖陽丹九龍丹然則知七傷之症治即可以培癆瘵之根勞傷形症孫思邈曰忽喜怒大便苦難口內生瘡此為心勞短氣面腫鼻不聞香咳嗽唾痰兩脅脹痛喘息不定此為肺勞面目乾黑精神恍惚不能獨臥目視不明頻頻瓷下此為肝勞口苦舌強嘔逆醋心氣脹唇焦此為脾勞小便黃赤兼有餘瀝腰痛耳鳴夜間多夢此為腎勞入門曰曲運心機為心之勞其症血少面無色驚悸盜汗夢遺極則心痛咽腫盡力謀慮為肝之勞其症筋骨拘攣極則頭目昏眩意外過思為脾之勞其症脹滿少食極則吐瀉肉削四肢倦怠預事而憂為肺之勞其症氣乏心腹冷痛極則毛焦津活咳嗽烘熱矜持志節為腎之勞其症腰脊痛遺精白濁極則面垢脊如折又曰心勞則口舌生瘡語澀肌瘦肝勞則脅痛關格不通脾勞則氣急肌瘦多汗肺勞則氣喘面腫口燥咽乾腎勞則尿赤陰瘡耳鳴面黑醫鑑曰七傷者一陰汗二精寒三精清四精少五囊下濕癢六小便澀數七夜夢陰人其病皆小便赤熱或如針刺煎厥症陽虛病也內經曰陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止注曰以煎迫而氣逆因以煎厥為名厥謂氣逆也說陽虛之人其氣本浮為外熱所迫氣遂逆而不止甚至昏冒故成此症也然其原雖本陽虛以由熱邪煎迫而成仍禁用辛熱之品醫者固不可不知也宜加味補陰丸加減補陰丸煎厥症治入門曰煎厥而至目盲所視耳閉厥聽大矣哉房之為患也治法宜與陰虛火動同解㑊肝腎虛病也內經言尺脈緩澀謂之解㑊釋云尺為陰部肝腎主之緩為熱中澀為無血故謂之解㑊解㑊者寒不寒熱不熱弱不弱壯不壯停不可名謂之解㑊也據此則知解㑊一症洵由肝腎二經之虛說肝主筋腎主骨肝虛則筋軟緩而無力以束無力以束則周身之肌肉皆渙而若解腎虛則骨萎薾而不能自強不能自強則遍體之骨節皆鬆懈而多㑊惟其然故懨懨悒悒悶悶若有不可以為人並不自知所以為人者則肝腎二經之虛為已極矣宜遐齡萬壽丹神仙既濟丹此則內經之旨也然而李氏梃則又兼內傷外感言之細詳其症誠非混雜之論也李云解者肌肉解散㑊者筋不束骨其症似寒非寒似熱非熱四肢骨節解散怠惰煩疼飲食不美或因酒傷宜葛花解酲湯或中濕宜加味朮附湯或感冒風寒宜羌活沖和湯或房事過多宜鹿胎丸或婦人月水不調宜加味逍遙散以此得病宜通其氣血疏其腠理以內傷兼外感藥調之則又醫者所當詳察總之內經之言解㑊本症也李梃之言解㑊兼症也由本症論為虛癆已極由兼症論為虛癆派別固不可一例視也且由李氏之言推之如大腸移熱於胃胃移熱於膽皆成食㑊症皆多飲食皆食易飢皆不生肌肉應亦為解㑊兼症之流派也宜參苓元病千變而不窮治隨機而難執必審乎此乃可與言醫解㑊症狀靈樞曰髓傷則消爍腑酸體解㑊然不去矣不去者謂不能行去也二陽病血虛精少症也內經言二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治夫所謂二陽者手陽明大腸足陽明胃也說以腸胃發病心脾受之心主血今受病則失所主而血不流脾主化食作味輪於臟腑而成精今受病則失所主而味不化致男子少精不得為隱蔽委曲之事然則二陽之病非由精少血衰而何古人謂為症屬血勞洵有然也說以女子不月固屬血病宜逍遙散加味逍遙散精即是血男子不得隱曲亦即血病也宜菟絲子丸鹿胎丸附載陳藏器諸虛用藥例虛癆頭痛身熱杞子玉竹虛而欲吐人參虛而多氣微嗽麥冬五味子虛而不寧人參虛而腰脅不利杜仲磁石煅虛而多夢龍骨虛而痰又有氣半夏生薑枳實虛而大熱黃岑天冬虛而小腸不利茯苓澤瀉虛而多熱地黃地膚子牡蠣甘草虛而小腸自利龍骨桑螵蛸虛而口乾麥冬知母天冬虛而驚悸兼冷小草紫石英虛而驚怖沙參龍齒虛而吸吸胡麻覆盆子柏子仁虛而多忘茯神遠志虛而客熱沙參地骨皮龍齒虛而大冷肉桂附子虛而髓竭熟地當歸虛而溺白厚朴虛而溲赤黃岑虛而損蓯蓉巴戟虛而冷川芎乾薑當歸虛而昏茯神朱砂虛癆頭痛身熱杞子玉竹五味子磁石虛而欲吐人虛而不寧虛而多夢虛而虛而多熱地虛而口乾虛而驚怖沙參龍齒虛而吸吸胡麻覆盆子柏子仁虛而多忘茯神遠志虛而客熱沙參地骨皮龍齒虛而大冷肉桂附子虛而髓竭熟地當歸虛而溺白厚朴虛而溲赤黃岑虛而損蓯蓉巴戟虛而冷川芎乾薑當歸虛而昏茯神朱砂心虛人參茯苓石菖蒲鰲按心虛者心家氣血不足致成虛癆也宜古庵心腎丸大五補丸方附後肝虛川芎防風天麻螯接肝虛者肝家受損面無血色筋緩目暗也宜拱辰丸滋補養榮丸方附後脾虛白朮白芍益智仁鰲按脾虛者肌肉消瘦飲食不進也宜橘皮煎元大山芋元方附後肺虛天冬麥冬五味子鰲按肺虛者咳嗽痰盛氣急或唾血也宜人參黃耆散補肺散方附後腎虛熟地丹皮遠志鰲按腎虛者水火不足也水虛宜太極丸無比山藥丸方附後火虛宜增益歸茸丸玄菟固本丸方附後膽虛棗仁細辛地榆鰲按膽虛多驚多畏不能獨處如人將捕之也宜仁熟散溫膽湯方附後附載李士材治癆法苡仁茯苓扶胃且有降下之央效桑皮貝母止痰嗽桔梗陳皮行氣且有健脾之力蓮心山藥止泄瀉麥冬五味保肺而能滋化之源人乳梨汁解燥結地骨丹皮治蒸而無寒冷之纍童便藕汁能止血以上皆以甘涼之品行收降之令為初起者設也若久病百脈空虛虛火炎亢非甘溫不能復真元異央散是也人參茯苓白朮炙草陳皮非粘膩不能潤活朽地黃丸是也人參黃耆當歸白芍地黃防風遠志茯神鹿茸黃岑石韋滑石蒲黃戎鹽炙草車前子瓜蔞治虛損癆瘵方五十六四君子湯養氣人參茯苓白朮炙甘草八珍湯虛熱人參茯苓白朮炙草川芎當歸白芍地黃十全大補湯調衛人參茯苓白朮炙草川芎當歸白芍地黃黃耆肉桂牛膝丸緩肝牛膝萆薢杜仲防風蓯蓉肉桂蒺藜菟絲子八味丸補火地黃山藥山萸丹皮茯苓澤瀉肉桂附子金剛丸益精萆薢杜仲蓯蓉菟絲子酒煮豬腰子丸煨腎丸又白蒺藜牛膝萆薢杜仲防風肉桂蓯蓉菟絲子破故紙葫蘆巴酒煮豬腰子和蜜丸補中益氣湯溫補人參黃耆當歸白朮甘草陳皮升麻柴胡四物湯諸血川芎當歸白芍生地當歸補血湯又荊芥穗當歸生地熟地川芎赤芍黃耆陳皮棗二烏梅一六味丸補水地黃山藥山萸丹皮茯苓澤瀉逍遙散陽虛當歸白芍柴胡黃岑白朮甘草薄荷煨薑坎離既濟丹又肉蓯蓉生地麥冬山萸杞子五味川柏歸身白芍天冬熟地遠志茯苓茯神丹皮棗仁人參澤瀉蜜丸人參養榮湯陰虛人參茯苓白朮甘草當歸白芍地黃黃耆陳皮遠志肉桂五味子三百廣生湯又地骨皮白朮白芍茯苓甘草陳皮棗仁山藥貝母丹皮芡實蓮肉烏梅五汁膏咳血天冬麥冬生地薄荷貝母丹皮阿膠茯苓犀角犁汁藕汁蔗汁人乳蘿蔔汁羚羊角水八杯煎三杯去渣入五汁再熬以入水不化為度又入蜜二兩重湯頓半日清骨散潮熱秦艽鱉甲知母青蒿甘草銀柴胡地骨皮胡黃連龍齒丸精濁茯神遠志人參龍齒菖蒲知母黃柏歸脾湯泄瀉人參黃耆當歸白朮茯神棗仁遠志龍眼木香甘草薑棗大菟絲子丸腎病鹿茸澤瀉附子肉桂熟地牛膝茯苓山萸川斷防風杜仲巴戟沉香茴香五味川芎蓯蓉菟絲子破骨紙蓽澄茄桑螵蛸覆盆子石龍芮去尖補中地黃湯積勞人參黃耆當歸白朮茯苓地黃山萸山藥澤瀉丹皮升麻薑棗保和湯肺病貝母知母天冬麥冬苡仁杏仁甘草紫蘇薄荷紫菀百合桔梗當歸阿膠百部飴糖款冬花五味子馬兜鈴生薑失血加炒黑蒲黃生地小薊痰加瓜蔞仁茯苓橘紅喘去紫蘇薄荷加蘇子桑皮聖愈湯心病人參黃耆川芎當歸生地熟地補肝湯肝病山萸甘草肉桂桃仁茯苓細辛防風大棗柏子仁柴胡疏肝散又炒香附柴胡陳皮川芎白芍枳殼甘草調中益氣湯脾病人參黃耆當歸白朮白芍甘草升麻柴胡陳皮五味子調榮養衛丸久癆人參黃耆當歸白朮白芍茯苓山藥麥冬遠志山萸陳皮熟地生地五味子鴨血蜜丸鹿胎丸房欲鹿胎去穢煮爛熟地八兩用人乳粉山藥各一兩拌蒸九次菟絲子十兩酒煮杞子八兩乳浸製過首烏十兩乳浸日曬夜露九次金石斛六兩酒炒巴戟肉五兩酒炒黃耆酥炙五兩人參四兩黃蒿膏丸十四味建中湯積癆人參黃耆當歸白朮甘草白芍茯苓地黃川芎麥冬附子肉桂蓯蓉半夏薑棗清暑益氣湯暑癆人參黃耆白朮甘草當歸蒼朮升麻陳皮神麯澤瀉麥冬青皮葛根五味子葛花解酲湯酒癆葛花人參茯苓白朮青皮木香橘紅豬苓澤瀉神麯乾薑砂仁蔻仁嵩崖脾腎丸老人熟地山藥山萸茯苓丹皮澤瀉附子肉桂牛膝砂仁車前補骨脂益智仁神仙延壽酒又補骨脂熟地生地天冬麥冬人參川芎當歸白芍茯苓木香砂仁菖蒲遠志柏子仁煮酒三十斤麥煎散童癆赤苓當歸乾漆鱉甲常山大黃柴胡白朮生地石膏甘草小麥補血養陰丸女癆生地丹皮麥冬白芍當歸牛膝杞子青蒿茯苓鱉甲川斷五味子益母膏為丸咳加蜜炙枇杷葉咳甚加貝母沙參百部痰加橘紅熱甚加胡黃連銀柴胡食少泄瀉去歸地杞鱉加蓮肉山藥陳松花清離滋坎丸情癆熟地生地天冬麥冬當歸白芍知母黃柏白朮山藥山萸茯苓丹皮澤瀉甘草吐血加童便調陳墨痰加竹瀝薑汁汗加黃耆棗仁痰加貝母瓜蔞仁熱加地骨皮嗽加五味怔忡加遠志棗仁遺精加龍骨牡蠣膈礙加陳皮咽瘡加桔梗元參痰喘加蘇子白芥子萊蔔子久陔加阿膠五味紫菀麥冬滋陰清化丸痰熱熟地生地天冬麥冬當歸鱉甲阿膠白芍茯苓山藥貝母花粉甘草五味蜜丸含化人中白丸血熱生地當歸阿膠白朮白芍鱉甲熟地青蒿子羚羊角人中白百部膏丸男服四錢女服三錢參苓建中湯潮熱人參茯苓當歸白芍肉桂甘草前胡細辛麥冬陳皮半夏鱉甲散骨蒸柴胡鱉甲知母秦艽當歸青蒿烏梅地骨皮早晚服河車丸又人中白河車秋石五味人參乳粉阿膠鱉甲地骨皮銀柴胡百部青蒿童便陳酒熬膏丸二仙膠又鹿角膠龜膠人參杞子共為末酒調服亦治遺精六君子湯痰結人參茯苓白朮甘草陳皮半夏潤腸丸又火麻仁羌活歸尾大黃桃仁遠少丹溫補山藥山萸牛膝遠志茯苓五味巴戟蓯蓉菖蒲楮實杜仲茴香杞子熟地蜜同棗肉丸獨參湯久血人參一味濃煎大黃䗪蟲丸乾血理中湯陽虛人參白朮甘草乾薑杏仁膏喘嗽杏仁泥薑汁蜜砂糖桑皮木通紫菀五味子後四味先煎去渣入前四味熬膏含化立效方痰嗽貝母杏仁瓜蔞仁五味子款冬花桔梗天冬蔥白川椒每歲一粒共為末納豬肺中荷葉包蒸熟五更作一次用薄燒酒食食完再吃陳酒少部安臥至曉紫金錠桃花疰五倍子去蟲土三兩山茨菰去皮焙二兩大戟洗焙一兩半千金子去皮油一兩麝香三錢糯米粥和杵千下每一料分作四十錠每服半錠重者一錠蒲荷湯下一名太乙紫金丹蘇合香丸又木香麝香丁香檀香安息香白朮犀角香附朱砂水飛半為衣蓽撥各二兩乳香冰片各一兩蘇合油入安息膏內為丸每一兩分作四十丸每取二三丸薑湯白湯任下回春辟邪丹又虎頭骨二兩朱砂雄黃鬼白蕪荑藜蘆鬼箭羽雄黃各一兩蜜丸彈子大囊盛一丸繫臂上又於病者戶內燒之一切邪鬼不敢近與鬼交者亦治兼治瘟疫十疰丸傳尸癆雄黃巴霜各一兩人參北細辛麥冬附子桔梗皂角川椒甘草各五錢蜜丸梧子大每五丸溫水化下此藥並治一切鬼氣桃奴丸又桃奴七個另研玳瑁鎊細末一兩安息香去渣一兩上三味同入銀石器中熬成膏朱砂犀角各五錢琥珀雄黃各三錢麝香冰片牛黃各二錢桃仁麩炒十四個安息膏丸芡子大陰乾封固安靜室每一丸人參湯下炙甘草湯脈代附載葛可久治癆十方保真湯當歸生地人參白朮黃耆各一錢赤芍炙草各八分半天冬麥冬陳皮白芍知母黃柏五味子柴胡地骨皮熟地各三分半蓮肉白茯苓赤茯苓各六分薑三棗二驚悸加茯神棗仁遠志尿濁加豬苓澤瀉萆薢尿澀加木通石韋篇蓄遺精加牡蠣蓮鬚燥熱加石膏滑石青蒿鱉甲盜汗加浮麥牡蠣麻黃根各因症之輕重而量加之可也此方專治虛癆骨蒸潮熱盜汗等症保和湯天冬麥冬知母貝母款冬花各一錢苡仁杏仁花粉五味子各七分馬兜鈴炙甘草紫菀百合桔根阿膠當歸酒生地各三分半蘇葉薄荷各二分薑三片煎至半去渣入飴糖一匙食後服日三次此方專治虛癆咳嗽肺痿唾膿血血甚加蒲黃茜根藕節痰盛加南星半夏陳皮枳殼瓜蔞仁喘急加桑皮陳皮葶藶熱盛加梔子黃岑連翹風盛加防風荊芥金沸草寒盛加人參桂枝太平丸天冬麥冬知母貝母款冬花杏仁各二兩當歸生地熟地阿膠各一兩半蒲黃京墨桔梗薄荷各一兩白蜜四兩麝香一錢用銀石器先煉白蜜再下諸藥末攪勻再上火入麝末熬數沸作丸彈子大每日二服食後細嚼一丸薄荷湯緩緩送下次噙一丸痰盛先用飴糖拌消化丸吞下卻噙此丸仰臥使藥入肺竅則肺清潤其嗽退除七日病痊此方專治虛癆久嗽肺萎消化丸青礞石煅如金色明礬皂角炮南星製半夏茯苓陳皮各二兩枳實枳殼各一兩半薄荷一兩沉香黃岑各五錢薑汁浸神麯末作糊丸二藥相攻痰嗽自然除根矣此方專治虛癆肺萎咳嗽熱痰壅盛潤肺膏羊肺一具杏仁另研柿霜真酥真蛤粉各一兩白蜜一兩二錢先洗淨肺次將水拌諸藥入肺中白水煮熟如常法食之與一藥相間服亦可此方專治虛癆久嗽肺萎白鳳膏墨嘴白鴨一只黑棗三升參苓平胃散末一升陳酒一瓶將鴨頭割開取血將熱酒隨量和血飲之能直入肺經潤補卻將鴨乾去毛於脅邊開一孔去腸雜拭乾將棗去核每個納參苓平胃散填入鴨腹中麻扎定以大沙罐置鴨及酒四圍用火慢煨將酒作二次添入煮乾為度然後食之其棗陰乾任意去藥食用參湯送下或將棗研爛為丸服亦可服此藥後隨服補髓丹此方專治虛癆肺萎嗽血補髓丹雄豬脊髓一條羊脊髓一條鱉魚一個烏雞一只將四樣製淨去骨取肉用酒一大碗沙鍋內煮熟打爛再入大山藥五條建蓮肉半斤大棗百個柿餅十個將四味修淨用井華水一大碗於沙鍋內煮爛與前肉合一處慢火熬之再下明膠四兩黃蠟五兩上二味逐漸添下與前八味和打成膏和平胃散末四君子湯末知母黃柏末各一兩共十兩如乾入蜜同熬取起於青石上以木捶打如泥為丸每百丸不拘時棗湯下此方專治虛癆贏瘦能補髓生精和血順氣十灰散大薊小薊側柏荷葉茅根茜根大黃梔子棕皮丹皮等分燒存性出火毒研細用藕汁或萊蔔汁磨京墨半碗調服五錢即止此方專治虛癆心肺損大吐血及咯血唾血不止宜服此以止之如不效用花蕊石散以消之無不愈花蕊石散花蕊石煅研極細童便一杯煎溫調下三錢或五錢服之或男用酒一半女用醋一半與童便和服亦可此方專治虛癆吐血五內崩損湧出升斗者宜服此使瘀血化為黃水繼服獨參湯以補之獨參湯人參加棗一二枚以長流水濃煎服此方專治虛癆吐血後贏弱氣微治五勞六極七傷方十四大五補丸心勞天冬麥冬茯神菖蒲人參杞子遠志熟地益智仁地骨皮黑元肝勞酒當歸鹿茸各一兩烏梅肉為膏丸酒下五七十丸橘皮煎元脾勞橘皮五兩甘草三兩三錢當歸萆薢蓯蓉吳萸厚朴肉桂巴戟石斛附子牛膝鹿茸杜仲乾薑陽起石菟絲子各一兩酒一升半沙鍋內入橘皮末熬如飴再入諸藥末攪勻為丸空心溫酒鹽湯任下五七十丸人參黃耆散肺勞鱉甲錢半天冬一錢秦艽地骨皮柴胡生地各七分桑皮半夏知母紫菀黃耆赤芍甘草各五分人參茯苓桔梗各三分腎氣丸腎勞熟地八兩山藥山萸五味子各四兩丹皮茯苓澤瀉各三兩此乃水泛為痰之聖藥血虛發熱之神劑又能補肝說肝腎之病同一治也滋補養榮丸筋極遠志白芍黃耆當歸山藥各二兩陳皮八錢茯苓七錢生地五錢山萸四錢蜜丸此方專補肝血並治虛勞氣血不足精神短少脾胃虛弱酒煮木瓜粥又大木瓜酒水煮爛研作膏熱裹轉筋處冷即易一宿三五度即差此方並治腳膝筋急痛茸珠丸骨極鹿茸鹿角霜鹿角膠熟地當歸各兩半蓯蓉棗仁柏子仁黃耆各七錢附子陽起石朱砂各三錢酒糊丸此方專冶腎損兼補命門陽衰補榮湯血極當歸白芍生地熟地赤苓山梔麥冬陳皮各一錢人參甘草各五分棗二烏梅一參苓元肉極人參菖蒲遠志赤苓牛膝地骨皮各一兩蜜丸米飲下巴戟元精極五味子巴戟蓯蓉菟絲子人參白朮熟地骨碎補茴香牡蠣龍骨覆盆子益智仁等分蜜丸每三十丸米湯下日二服虛甚八物湯下此方專治面色白而不澤悲愁欲哭脈空虛是為脫精脫神宜峻補肝腎收斂精氣補益元陽益氣丸氣極人參麥冬各七錢陳皮桔梗炙草各五錢五味二十一粒水浸油餅丸芡子大每一丸細嚼津唾咽下鎮陽丹七傷總桑螵蛸三兩龍骨茯苓各一兩糊丸茯苓鹽湯下專治脫精滑泄九龍丹又金櫻子杞子山楂蓮子蓮鬚熟地芡實茯苓當歸等分酒糊丸如精滑便濁者服二三日尿清如水飲食倍常行步輕健治煎厥症方二加味補陰丸煎厥黃柏知母各四兩牛膝杜仲熟地巴戟山萸各三兩蓯蓉茯苓杞子遠志山藥鹿茸龜板各二兩蜜丸鹽湯下八九十丸此方極能補陰虛瀉陰火加減補陰丸又熟地八兩菟絲子牛膝各四兩白芍當歸鎖陽龜板各三兩虎骨黃柏山藥杜仲人參黃耆各二兩補骨脂杞子各兩半豬脊髓入蜜和丸每百丸鹽湯下治解㑊方八遐齡萬壽丹解㑊茯神赤石脂川椒微炒出汗各二兩飛朱砂乳香燈心同研各一兩用雞子二個去清黃只將朱砂乳香各裝一卵內紙糊七重青絹袋盛之懷於肚上常令溫暖朱砂懷三十五日乳香懷四十九日再出再研前三藥亦為細末和勻以蒸棗肉丸緑豆大每三十丸空心溫酒下或人參湯下一月外加至四十丸一名五老還童丹神仙既濟丹又酒炒黃柏四兩酒蒸山藥酒洗牛膝各三兩人參薑杜仲巴戟五味子酒洗杞子茯苓鹽炒茴香酒蓯蓉酒山萸甘草水浸遠志菖蒲熟地酒知母酒生地酒菟絲子麥冬黑山梔酒洗甘菊去白陳皮各一兩蜜和蒸棗肉丸空心溫酒鹽湯任下一方有天冬酒當歸各二兩無甘菊山梔陳皮此方專補諸虛百損五勞七傷滋腎水除心火益脾土添精補髓益氣和血壯筋骨潤肌膚聰耳明目開心定智強陰健陽延年益壽性味溫而不熱清而不寒久服則坎離既濟陰陽浹和火不炎而神自清水不滲而精自固乃平補之聖藥也葛花解酲湯酒傷葛花砂仁蔻仁各五錢青皮三錢白朮乾薑神麯澤瀉各二錢人參茯苓豬苓陳皮各錢半木香五分共為末每三錢白湯下得微汗則酒病去矣此說不得已而用之豈可恃賴日日飲酒若頻服之損人天年加味朮附湯中濕附子二錢白朮赤苓甘草各錢半薑七棗二水煎日再服才見身痺三服後當如冒狀勿怪說朮附並行脾中逐水氣故耳羌活沖和湯感冒羌活防風蒼朮甘草川芎白芷生地黃岑細辛薑棗渴加葛根石膏鹿胎丸房事過多鹿胎熟地菟絲子杞子製首烏金石斛巴戟黃耆人參黃蒿膏丸本方製法及分量詳在虛癆條內加味逍遙散月病白芍白朮各錢二分地骨皮知母當歸各一錢茯苓麥冬生地各八分山梔黃柏各五分桔梗甘草各三分參苓元食㑊方詳上治二陽病方四逍遙散不月白朮白芍茯苓柴胡當歸麥冬各一錢甘草茯苓各五分薑三片加味逍遙散又白朮白芍各錢二分知母當歸地骨皮各一錢茯苓麥冬生地各八分山梔黃柏各五分桔梗甘草各三分菟絲子丸精少菟絲子山藥蓮肉茯苓杞子鹿胎丸又菟絲子杞子鹿胎熟地首烏石斛巴戟人參黃耆黃蒿膏丸本方製法及及分量詳在虛癆條內
