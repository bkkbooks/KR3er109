body:
  text: 卷二十六肩臑肘臂腕手病源流按銅人圖項旁缺盆之上曰肩肩下臂上通名曰臑俗謂之膊臑下臂上接處曰肘肘即臂節肘下手上名曰臂臂有二骨臂下手上接處曰腕又云掌後為腕腕之下曰手手有掌有指五指各有名一曰大指二曰食指又曰鹽指三曰長指又曰中指四曰無名指五曰小指上部肩至手曰肢下部胯至足亦曰肢兩手兩足因曰四肢此自肩至手之部位名目也試言其病肩前屬大腸經故肩前痛為大腸經病説肩端兩骨及前臑皆大腸脈所貫風熱乘肺肺氣鬱甚肺先病當瀉風通肺氣宜防風羌活升麻柴胡蔻仁陳皮桑皮貝母若面白氣虛必兼補宜加人參黃芪肩後屬小腸經故肩後痛為小腸經病以小腸中感受風熱氣鬱不行故致此宜羌活防風藁本木通蔓荊子若心血虛必養血宜當歸熟地又有腎氣逆上而痛者必補腎壯陽氣宜杞子山萸牛膝補骨脂挾痰飲者豁之宜導痰湯當肩背一片冷痛有熱也消之宜三稜蓬朮枳實檳榔至於臂則為六經分布之處故其為病須即病處分別之試以兩手直伸其臂貼身垂下大指居前小指居後若前廉痛屬陽明宜升麻白芷葛根後廉痛屬太陽宜羌活藁本外廉痛屬少陽宜柴胡黃芩內廉痛屬厥陰宜柴胡青皮內前廉痛屬太陰宜升麻白芷蔥白內後廉痛屬少陰宜獨活細辛此六經分配之處先不可不辨其所以痛者雖不外風寒濕熱而要惟邪之所湊其氣必虛固有由來也若其痛而果係風寒則從風寒治之宜蠲痹湯若由血不榮筋瘦弱臂痛則兼養血宜蠲痹四物湯若由血燥筋攣遇寒則劇肝氣虛弱風寒客經絡脈緊細必從肝治宜加味逍遙散為主參用舒筋湯亦有怒動肝火而臂痛者宜小柴胡湯加川芎當歸亦有腎水虧筋骨失養以致痿痹者宜六味丸若夫臂連肩背酸痛兩手軟痹由痰飲流入四肢也宜二陳湯星香散合用偶提重物忽痛傷筋也宜劫勞湯或八珍湯加官桂丹皮木瓜薑黃延胡劉寄奴因搐臂筋痛傷於寒也宜舒筋湯臂痛不能舉或痛無定處由脾虛邪氣相搏也脈必沉細宜補中益氣湯加威靈仙桂枝桑皮薑黃臂酸痛手軟麻有痰滯也宜道痰湯加木香片薑黃臂痛不能舉物氣血凝滯也宜舒筋湯兩臂流注走痛似覺酸冷爬搔不著難忍寒濕痰流注也宜天仙藤散臂脛疼痛至於年久不愈血虛不能養筋且有客邪留著也宜虎脛骨酒當歸酒痛起肩膊連臂漸下入環跳髀膝由絡虛也宜防風根湯左指脹痛引肩由血虛風動病在肝也宜桑枝膏丸肩膊筋緩連臂不舉而痛陽明脈衰也宜黃芪白朮防風根當歸片薑黃桑枝如坐臥傷濕或受寒而臂痛為寒濕氣痛也宜五積散手腫痛或指掌連臂膊肘腕俱痛為手氣也宜蠲痹湯臂忽發熱極痛為風熱也宜桑枝濃煎湯多服臂發熱痛從裡徹外為血衰也宜秦艽地黃湯若夫手掌熱則病屬心與心包手熱赤癢兩掌皮厚皴裂則病屬肝膽血燥宜加味逍遙散加熟地鉤藤手與足心腫病則屬風宜花椒鹽醋和敷手與足抽掣動搖弄舌吐沫其脈沉弱病則屬脾虛生風不可遽作風火痰治宜歸脾湯手與足麻木病則屬脾肺氣虛宜補中益氣湯加茯苓半夏桑枝外煎桑枝葉湯洗手與足生紫斑白點活厚破裂病則屬血虛而燥宜二礬湯燻手與足忽如火燃起紫白黃泡病則屬血熱急針挑破太乙膏貼之若挑破又生血熱之極宜防風牛蒡湯凡言手與足者以種種皆手足俱有之病非必一時手足齊患此病也論手而言足亦連類及之後足病源流可與此參看也如以手指言之大指屬肺食指屬大腸中指屬心包無名指屬三焦小指內側屬心外側屬小腸凡五指經脈所到邪氣盛則痛正氣虛亦痛須分其經絡察其虛實以治之總治指痛宜烏梅魚鮓打爛傅之其有手搐內外發熱者其肝心二經之火乎宜瀉青赤湯素弱者抑肝導赤湯有手搐目動口瞤面腫者其胃中有風乎宜胃風湯有手搐臂肘筋痛者其傷於寒乎宜舒經湯有手搐覺衰弱或見弱症者其元氣虛乎宜續命煮散有手搐既愈欲絶其根者其非滋補不可乎宜六味丸間服加味逍遙散總之搐則有止時若非筋攣為常病無刻不拘急但患搐者皆不可以艾灼或發表以腠理開邪愈易入也夫搐雖非痛病所屬以其在手故由手痛而連及雖然肩病手病臂病不憚瑣屑言之而臑肘腕從略者非略也臑肘腕病每與肩臂手相牽連言此即可知彼耳手掌候胃靈樞曰掌中熱者腹中熱掌中寒者腹中寒銅人圖曰胃中寒則手魚際之絡多青胃中熱則手魚際之絡赤其暴黑者久留痹也其有赤有黑有青者寒熱氣也又曰大指本節後白肉際名曰魚以其形似魚也有穴名魚際回春曰傷寒手心熱者邪在裡也手背熱者邪在表也手足溫者陽症也手足冷者陰症也肩臑等病原由症治內經曰人有四肢熱逢風寒如灸於火者是人陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而獨陽不能生長也逢風而加灸於火者是人當內爍也又曰四肢懈墮者脾精之不行也靈樞曰胃不實則諸脈虛諸脈虛則筋脈懈墮筋脈懈墮則行陰用力氣不能復故為嚲嚲謂手足嚲曳也又曰肺心有邪氣流於兩肘保命曰脾實則四肢不舉此謂膏粱之疾其治宜調胃承氣湯若脾虛則四肢不用説牌病不能與胃行其津液其治宜十全大補湯又曰手屈而不伸者病在筋伸而不屈者病在骨直指曰酒家之癖多為項腫臂痛説熱在上焦不能清利故醞釀日久生痰聚飲流走項臂不腫則痛耳集要曰忽患手腳胸背腰胯隱痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定疑是風症或癰疽皆非也乃痰涎伏在心膈上下變為此疾資生曰兩肩頭冷疼尤不可忽屢見將中風人臂骨脫臼不與肩相連接多有治不愈者要之才覺肩上冷疼必先灸肩髃等穴毋使至於此極也入門曰留飲之症四肢歷節痛氣短脈沉久則令人骨節蹉跌宜導痰湯加減用之扁鵲曰病人爪甲白者不治爪甲青者死手足爪甲下肉黑者八日死手掌腫無紋者死肩者手足三陽交會之所為風熱蘊結或負重傷損則生肩疽宜仙方活命飲加柴胡桔梗烏金散其惡血留結內外榮衛不通則兩肩生疔疽五日腫大口禁寒戰十二日可刺不治二十日死宜四聖旋疔散追疔奪命湯陳乾疽亦生兩肩及兩大臂連𩨹骨十四日痛不止不可動五十日身熱不赤六十日可刺刺無血則死宜仙方活命飲飛龍奪命丹庇癰則生於肩及臑色赤黑令人汗出至足不害五臟宜急治宜化毒丹內消丸鎖骨疽者生肩前陷中故又名缺盆疽屬胃三焦兩經之病宜紫金丹奪命丹症退或潰後宜十全大補湯若瘡口不合者凶太陽鬱怒所結疽生肩膊後骨上曰上搭宜仙方活命飲加羌活桔梗柴胡潰後宜人參養榮湯心與心包風熱所侵毒生肩膊下隙內曰夾肢癰治宜分壯盛宜一粒金丹下之老弱宜人參養榮湯其有兩臂肘起在接骨下引手至小骨上發癰者此處連大小筋骨舉動不便垂手墜痛膿深徹骨或致傷筋拳縮治宜緩慢其筋脈宜白芷升麻湯亦有臑臂表裡俱赤惟肘節處差小者名藕包宜內消散塗油泥膏又有肘之內生癰由心肺包絡鬱火宜仙方活命飲紫金丹勝金丹引經用黃連升麻柴胡肘之外生癰由胃大小腸積熱鬱毒者宜芩連消毒飲紫金丹此肘內外二症皆當別老弱壯盛為治壯盛宜牡蠣大黃湯下之老弱宜千金內托散補之又有臂內生毒為魚肚宜神效托裡散臂上節生毒腫連肩髃名臂風毒者宜仙方活命飲加羌活獨活桂枝桔梗此臂間二症壯盛者亦宜下宜內疏黃連湯虛而漫腫無頭服敗毒藥不動者亦宜補宜十全大補湯加桂枝桔梗至若毒發於腋下及臂或兩手掌中憎寒壯熱咽乾飲多嘔吐煩心脈洪大數盛者乃內疚疽也七八日可汗失汗者死宜初服內托榮衛湯汗之繼服黃連解毒湯散之腕癰者屬手三陰經風熱毒也生手屈之處琚腫疼痛宜玉樞丹少加蟾酥塗兩手背生癰名手發背漫腫無頭三陽經風熱鬱滯也宜仙方活命飲加芩連山梔桔梗升麻寒加桂枝熱加薑黃兩手心發毒名穿掌又名穿窟天蛇偏於掌邊名穿邊天蛇心包絡經積熱也宜仙方活命飲加桂枝薑黃此二症壯實者宜酌表裡汗下之有表症宜紫金丹汗之有裡症宜一粒金丹下之老弱及既潰後宜用參芪補托之宜黃芪木香散十全大補湯若乃風熱積毒結於大腸經分致虎口發毒琚赤腫痛則名合谷疽又名臂蟹毒又名手丫刺宜仙方活命飲加桂枝薑黃升麻桔梗治之汗下補三法酌同前例至如毒之生於手指者有五種一曰大指疽專生大指頭上初則小點如粟頗覺癢痛漸大如豆如桃如李或青或紫乍黃黑或癢或麻或木或徹心大痛此專由肺經積熱也急發汗宜烏金散紫金丹壯實者急下宜五利大黃湯此固大症故人或患此指色黑者其指已死宜截去之不然黑至臂不治若攻心痛嘔吐不食及牙縫出血者死一名天蛇頭除大指外不拘四指指頭上生毒琚赤腫痛既膿裂開如蛇頭狀故名此則由心包絡積熱也宜芩連消毒飲仙方活命飲加羌活柴胡桔梗如既裂急塗藥瘡口內宜蛇頭瘡方一曰代指不拘何指指頭先腫琚熱掣痛然後於爪中間結膿潰破甚者爪甲俱脫説爪者筋之餘筋賴血養血熱甚注於指端故成此症俗謂之貢爪病同大指疽然無蘊毒故不青黑亦不殺人丹溪以烏梅入醋研浸患處立效入門以蒲公英摘取白汁多塗立差綱目以生雞子開一孔將指浸之浸三個即愈醫鑑以忍冬藤蒲公英濃煎湯浸極妙此皆治代指之法以代指為小症不必服藥也一曰鰍肚生手指根節或中節上亦琚熱亦腫痛亦釀膿亦潰爛較大指疽則輕比代指則重此則全由風熱毒也宜清熱消毒飲一曰發指俗謂之丫指生兩指中間相連處其疼痛往往徹骨難當亦由風熱毒結聚也宜清熱消毒飲外塗拔毒散夫自肩至手指腫毒之多如此安可不詳求治法哉乃若冬月胃受烈風寒冰手足皸裂血出作痛宜黃蠟膏豬腦酒雖非腫毒一例然既在手故類及焉以見治法之不可略也是書所及遍身外症方論雖多採前人醫籍然大半則以瘍科選粹為主一切瘡瘍總論陳文治曰凡初發壅腫未見膿者其名有三曰癤曰癰曰疽癤初起浮赤無根腳微軟皮薄先出清水後破膿初生紅腫突起無頭根闊三四寸發熱惡寒抽掣疼痛四五日後按之微軟其名曰癰然初時毒氣浮淺或汗或下早治即散膿成另法治一等皮色不變但微腫肌肉內痛夜尤甚發熱惡寒此熱毒極深其名為疽能傷筋脈骨髓初生一白粒如粟米覺癢亦痛其痛應心此疽之始兆也大法琚高腫痛脈浮者邪在表琚痛發熱拘急頭痛或煩躁咽乾亦邪在表俱宜散腫硬痛深脈沉者邪在內宜下煩躁飲冷琚痛脈數者邪在上宜清外無琚腫內便調和者邪在經絡宜調和榮衛惡寒而不潰者氣實兼寒邪也宜宣補琚痛發熱汗多便祕譫語者陽結症宜下腫痛不作膿者邪氣凝結宜解不作膿但熱不潰者氣血虛宜補托不作膿或不潰或不飲者陽氣虛宜扶陽治瘡之法大要先明托裡疏通和榮衛三法托裡者治其外之內也潔古云其脈浮大當先托裡恐邪氣入於內説以脈浮數琚腫形症外顯恐邪氣竭而內攻故必先托裡宜內托復煎散疏通者冶其內之外也潔古云若脈沉遲當先疏其內以絶其原説以其脈沉實發熱煩躁外無琚腫赤痛邪氣已深入於內故必疏通用內疏黃連湯和榮衛者治其中也潔古云有在內外之中者邪氣遏於經絡故發癰腫説以外無琚赤內臟宣通知其在經當和榮衛故曰治其中用當歸黃芪湯用此三法雖未必無變要使邪氣峻減而易痊耳然托裡用溫劑疏通用涼劑設或反投助邪不淺輕則危重則死不可不慎也夫癰疽膿熟自潰或針烙而潰毒氣已泄即稟賦厚不免氣血亦虧宜排膿內補或膿出反痛氣血虛也宜補托定痛若毒未盡慎勿生肌收斂以致復腫或肉赤不斂血虛有熱也肉黯不斂陽氣虛寒也肉死不潰脾氣虛弱也肉白不斂陽氣大虛也膿多不斂氣血俱虛也他如不思斂食胃氣虛也飲食不化脾氣虛也膿少色赤血虛也亦有為穢氣所觸者乳香沒藥和解之有為風寒所逼者桂枝防風溫散之若瘀肉已腐膿不止腫痛不已定有筋隔住致內膿不得出必針挑引出之如畏痛延挨多致不起若寒邪凝滯氣血不能榮衛致肉白膿少瘡口不合者最要避風用艾湯日洗丹溪云諸經之瘡惟肝膽二經氣多血少肌肉難長理宜預防若用驅毒利藥伐其陰血禍不旋踵斯言宜切記之若膿已出盡正趨吉避凶之時風入即為破傷風水入即為破傷濕倉卒不知其因害人最速宜先摻聖效散毋使風濕攻搏而已然瘡或再合生膿仍用通和藥次第治之不可造次失手若膿出肉腐急貼撥毒膏內補氣血秋冬微加風寒藥若膿雖潰根腳反赤暈開展或大痛毒未退也總以補氣血為主解毒藥佐之若破後不潰瘡口堅硬者風也蠹肉不腐者熱毒結也若瘡口易收而皮嫩薄者不可便去撥毒膏藥若脈緊數膿未成但數膿已成手按大熱有膿不熱無膿外硬未膿軟𩊅已膿手足指梢乳上宜令膿熟大潰方可開之若潰後發熱頭痛脈緊而浮虛而兼表邪也潰後將斂遍身作癢脈浮用消風托裡之藥若膿潰後脈澀遲緩易愈有胃氣也脈沉細而直裡虛欲變症也洪滑粗散難治正虛邪實也若壯實人患瘡皆腫高色赤易腐潰膿稠易斂怯弱人多不起發不腐難潰膿清不斂如不審察一概尅伐虛虛之禍不免若瘡瘍皆由胃氣不調而生其潰由胃氣腐化其斂由胃氣榮養丹溪云治瘡瘍當助胃壯氣使根本堅固誠哉是言也此總論皆就原文而改竄之癰疽惡侯薛立齋曰瘡瘍之症有五善有七惡五善見三則瘥七惡見四則危如大渴發熱泄瀉淋閉者邪火內淫也宜竹葉黃芪湯虛宜八珍湯加黃芪山萸麥冬五味不應佐以加減八味丸料煎服如膿血既瀉腫痛尤甚膿色敗臭者胃氣虛而火盛也宜人參黃芪湯不應佐以十全大補湯加麥冬五味子如目視不正黑睛緊小白睛青赤瞳子上視者肝腎陰虛而目系急也宜六味丸料加山梔麥冬五味不應八珍湯加山梔麥冬五味如喘粗氣短恍惚嗜臥者脾肺虛火也宜六君子湯加薑棗不應補中益氣湯加麥冬五味如肩背不便四肢沉重者脾腎虧損也宜補中益氣湯加山萸山藥五味不應十全大補湯加山萸山藥五味如不能下食服藥而嘔食不知味者胃氣虛弱也宜六君子湯加木香砂仁不應急加附子如聲嘶色敗唇鼻青赤面目四肢浮腫者脾肺俱虛也宜補中益氣湯加薑棗不應六君子湯加炮薑更不應十全大補湯加炮薑附子如腹痛泄瀉咳逆昏憒者陽氣虛寒氣內淫之惡症也宜先服托裡溫中湯後用六君子湯加附子或加薑桂此七惡之治法也此外又有潰後發熱惡寒作渴或怔忡驚悸寤寐不寧牙關緊閉或頭目赤痛自汗盜汗寒戰咬牙手撒身熱脈洪大按之如無或又身熱惡衣欲投於水其脈浮大按之微細衣厚乃寒此血氣虛竭傳變之惡症也手足逆冷肚腹疼痛泄利腸鳴飲食不入吃厄嘔吐此陽氣虛寒氣所乘之惡症也又考精要論嘔逆之症乃因初發時不曾服內托散而致伏熱在心亦有氣虛脾氣不正而嘔吐者丹溪則謂初發當作毒氣上攻潰後當作陰虛火逆分先後而治老年宜用參芪白朮膏峻補佐使之藥隨時隨症加減河間則謂瘡瘍嘔者濕氣浸於胃也宜倍加白朮可見病之所見者雖內之所因者各異惟在人之體察耳如有汗而不惡寒或無汗而惡寒口禁作冷腰背反張徑項強徑此血氣虛極變痓之惡症也宜急用參芪歸朮附子以救之或有可生者如心火刑尅肺金宜人參平肺散陰火上炎傷肺宜六味丸料加五味子潰後發熱作渴膿出愈多由真氣虛而邪氣實皆為惡候耳然則臟腑無虧氣血充實起居如常其善豈止於五若稟賦薄毒氣盛誤藥受傷症變不一其惡豈止於七醫者但察其症之變而酌量治之斯得矣奚必以善惡候之數目拘之哉治肩臑肘臂腕手病方二十六導痰湯痰飲南星半夏赤苓枳實甘草橘紅蠲痹湯風寒當歸赤芍黃芪薑黃羌活甘草薄荷桂枝蠲痹四物湯血衰當歸赤芍川芎熟地黃芪羌活甘草白芍僵蠶加味逍遙散血燥茯苓白朮白芍當歸柴胡甘草以上逍遙散加山梔丹皮舒筋湯又薑黃二錢赤芍當歸海桐皮白朮各錢半羌活甘草各一錢沉香二分小柴胡湯肝火柴胡黃芩人參半夏甘草六味丸腎虧熟地山藥山萸丹皮茯苓澤瀉二陳湯痰注茯苓陳皮半夏甘草星香散又劫勞湯負重人參黃芪當歸白芍熟地炙草阿膠紫菀薑黃八珍湯又人參茯苓白朮甘草川芎當歸白芍生地補中益氣湯脾虛人參黃芪當歸白朮柴胡升麻陳皮甘草五積散寒濕茯苓白芷半夏當歸川芎甘草肉桂白芍枳殼麻黃陳皮桔梗厚朴乾薑蒼朮薑黃秦艽地黃湯臂熱秦艽丹皮茯苓白朮鉤藤甘草生地柴胡二礬湯斑點白礬皂礬各四兩孩兒茶五錢柏葉八兩水煎濃先用桐油搽患處以桐油紙蘸點煙燻患處再以湯洗之當歸酒年久當歸一味浸酒常飲效虎脛骨酒又虎脛骨搗碎炙黃新白芍各二兩羚羊角屑一兩酒浸七日秋冬倍之每日空腹飲一杯天仙藤散痰注天仙藤白芷梢白朮羌活各三錢片薑黃六錢半夏五錢每末五錢加薑五片煎服防風根湯絡虛防風根於朮當歸薑黃生黃芪桑枝桑枝膏丸肝病製首烏杞子歸身三角胡麻菊花炭柏子仁刺蒺藜桑枝膏丸歸脾湯脾虛人參黃芪當歸白朮茯神棗仁遠志木香甘草圓眼薑棗防風牛蒡湯血熱防風山梔石膏黃芩蒼朮木通甘草牛蒡子瀉青赤湯心肝火龍膽草青黛羌活防風山梔生地黃芩黃連木通甘草加大黃亦可抑肝導赤湯素弱鉤藤當歸白朮茯苓木通柴胡川芎羌活防風山梔生地生草炙草胃風湯胃風白芷葛根藁本黃柏麻黃升麻蒼朮當歸柴胡羌活草蔻蔓荊子薑棗續命煮散虛搐獨活人參葛根生地遠志防風當歸細辛白芍川芎半夏甘草荊芥肉桂汗多加牡蠣治肩臑肘臂腕手瘍方四十二仙方活命飲肩疽白芷防風赤芍甘草歸尾貝母花粉穿山甲炒黃皂角刺各一錢陳皮金銀花各三錢乳香沒藥各一錢二味另研水酒煎送二末四聖旋疔散肩疔巴豆五分僵蠶輕粉硇砂各二錢半為末醋調用此方專治疔瘡生於四肢其勢微者先以好醋調藥塗疔疽上以紙護之次服內托之藥其疔自出矣追疔奪命湯又蟬退四分澤蘭五分青皮金線重樓各七分防風細辛各八分黃連首烏羌活僵蠶藕節各一錢大便祕加大黃一錢加薑蔥臨臥入酒一杯服衣覆取汗此方專治疔瘡飛龍奪命丹陳乾疽蟾酥三錢酒化雄黃三錢輕粉五分乳香沒藥銅緑各二錢麝香五分另研冰片五分另研膽礬寒水石辰砂血竭各一錢蜈蚣一條去頭足酒炙黃共為末用蝸牛二十個和藥搗爛入飛面為丸每服一丸勢重人壯二三丸以蔥白三個同藥嚼爛好酒送下於避風處重衣説定約行五裡再服熱酒數杯以助藥力發熱大汗為妙化毒丹疽癰乳香沒藥各五錢另研巴豆四十九粒去皮心另研草烏頭醋浸炮製其醋候用浮石醋淬七次醋候用各一兩共為末醋調面糊丸每服五七丸食後冷酒下忌熱飲利二三次或吐出惡物為效此方治一切腫毒初覺一二日咳逆煩悶或咽喉閉塞發熱惡寒者內消丸又青皮陳皮各二兩牽牛八兩取頭末二兩皂角去粗皮搗碎薄荷葉各八兩二味共用水一斗煮揉汁漫火熬膏即膏和丸每三十丸食後荊芥湯下此方專治瘡腫初生熱毒鬱滯服之內消大有神效紫金丹缺盆疽奪命丹又蟾酥輕粉各五分朱砂三錢寒水石活礬銅緑麝香乳香沒藥各一錢蝸牛三十一個另研為丸如乾加酒糊每用一丸用蔥白三四根嚼爛吐手心包藥熱酒送下約行六七裡汗出為效重者再一二丸但此為少陰經劫藥用者當量輕重此方兼治一切大腫毒央與飛龍奪命丹相等十全大補湯又人參黃芪當歸白朮白芍熟地茯苓川芎肉桂炙草薑棗人參養榮湯又人參黃芪當歸肉桂白朮陳皮炙草各一錢遠志肉五分白芍一錢半熟地茯苓五味子各八分一粒金丹夾支癰沉香乳香木香各五分巴霜錢半上為末照分數和勻黑棗肉丸芡子大每服一丸量人虛實先呷水一口即行一次胃氣實者只可三四口後用水一口送下一丸行數次以米飲補之即止白芷升麻湯臂癰白芷一錢半升麻桔梗各一錢酒黃芩四錢生黃芩三錢紅花炙草各五分水二酒一煎內消散藕包皂角刺七個桃仁四十九粒炒黃穿山甲炒羚羊角大黃各一錢俱為末金銀花花粉厚朴各一錢乳香一錢為末水一鐘先將金銀花角刺厚朴花粉桃仁五味煎六分調送四味末服此方未成膿即消已膿從大便出油泥膏又塘泥一倍桐油三倍和勻以鵝翎時時掃塗勿令乾勝金丹肘癰製白砒麝香各五分蟾酥一錢雄黃辰砂乳香沒藥血竭各錢半炮全蠍炙天龍去頭足炒穿山甲各三錢炒僵蠶五錢上研末稱勻每三錢砂糖調蔥頭酒下取汗芩連消毒飲又黃芩黃連柴胡羌活防風荊芥白芷川芎連翹桔梗枳殼射干甘草大黃牛蒡子等分惟桔梗加倍牡蠣大黃湯肘癰煨大黃牡蠣木香各錢半水煎春夏露一宿冬月乾暖處一宿雞鳴時溫服得利活即勿服千金內托散又金銀花人參黃芪當歸赤芍川芎花粉白芷桂皮桔梗防風甘草各一錢水煎入酒半盞服日三帖服後瘡口有黑血出或遍身汗出藥之央也神效托裡散魚肚黃芪鹽水炙忍冬藤當歸各五錢粉草二錢酒煎服渣敷患處內疏黃連湯臂毒黃連白芍當歸檳榔木香黃芩山梔薄荷桔梗甘草各一錢連翹大黃各錢半薑水煎量人虛實用此方兼治一切瘡瘍發熱而嘔便結脈洪實內托榮衛湯內疚疽黃芪紅花連翹蒼朮酒歸身柴胡羌活防風黃芩人參炙甘草各一錢桂枝七分醫學綱目此方用黃芪桂枝各五錢蒼朮紅花各三錢防風羌活黃芩當歸冬錢半為末服此方專治風濕熱鬱於手足少陽而致血脈凝逆元氣消弱面色赤腫微黯時多忿怒瘡色赤黯腫硬奮然高起脈洪緩而弦用此發汗以通榮衛則邪氣去矣黃連解毒湯又炒黃柏黃芩黃連山梔各錢半此方專治瘡瘍琚腫煩躁飲冷脈洪數發狂言玉樞丹腕癰五倍子洗淨打碎三兩山茨菰去皮淨末二兩麝香三錢另研千金子霜紅牙大戟去蘆焙乾為末各一兩糯米濃飲丸每料作四十錠此藥能應諸病各有神效若瘡疽用東流水磨塗並服須端午日合一方有全蠍雄黃朱砂各一兩名神仙追毒丸此玉樞丹即紫金錠也黃芪木香散手癰烏金散大指疽牙皂四分製人信麝香蟾酥各五分發灰蛇殼煅蜂房煅各一錢蟬退血竭乳香僵蠶炒去絲各二錢穿山甲炙朱砂雄黃各二錢半全蠍三錢湯泡七次天龍去頭足四錢川烏尖沒藥各錢半各為末稱準和勻每服三錢砂糖調蔥頭酒送下取汗此方能治一切無名腫毒五利大黃湯又大黃根黃芩升麻各錢二分黑山梔芒硝各一錢水煎稍熱服此方專治瘡疽初發年壯氣盛大小便祕宜服此藥蛇頭瘡方蛇頭雄黃蜈蚣全蠍各一錢共為末瘡口開入藥在內以小油抹帛拴住如乾小油搽潤清熱消毒飲鰍肚黃連山梔連翹當歸各一錢川芎白芍生地各錢半炙甘草八分金銀花二錢此方專治癰疽發於陽腫痛發熱作渴撥毒散丫指乳香泥蜂窩多在壁縫間為末醋調塗乾以醋潤痛立止黃蠟膏皸裂清油五錢煎沸入黃蠟一塊煎熔入胡粉五倍子末各少部熬紫色先以湯洗患處敷藥以紙貼之豬腦酒又豬腦子研爛入熱酒中或洗或塗皆可以兔腦生塗之更妙聖效散預防風濕黃柏炒黑穿山甲炒黃各一兩檳榔木香雞內金各五錢每用末少部搽瘡口日五七次方見效此方治潰瘍毒已盡先以蛇床子湯洗用此撥毒膏外貼麻子肉銅青各一兩同研大薊汁一碗豆油春夏三兩秋冬四兩松香一斤水煮濾淨先將油煎滾入松香熔化下大薊汁沸水盡下水缸內如絞糖法入萆麻銅青攪勻以器盛之如用重湯煮化攤貼此方能呼膿長肉竹葉黃芪湯邪火生地黃芪各二錢當歸川芎甘草白芍黃芩花粉人參淡竹葉各一錢熟石膏錢半麥冬二錢薑三此方治癰疽大渴發熱小便如淋八珍湯又人參茯苓白朮炙草川芎當歸白芍地黃加減八味丸又熟地八兩山萸山藥各四兩丹皮茯苓澤瀉各三兩肉桂五味各一兩人參黃芪湯胃虛黃芪一錢炒黃柏四分當歸升麻人參麥冬陳皮白朮蒼朮各五分六味丸陰虛熟地山藥山萸丹皮茯苓澤瀉六君子湯虛火人參茯苓白朮炙草陳皮半夏補中益氣湯又托裡溫中湯陽虛附子羌活各四錢乾薑炒三錢炙甘草二錢丁香沉香木香茴香陳皮益智仁各一錢此方治膿潰元氣虛寒或過服尅伐致胃氣脫陷腸鳴腹痛便泄神昏此寒變內陷為七惡之症緩則不治人參平肺散火尅金人參陳皮桑皮甘草地骨皮茯苓各一錢炒知母七分五味子杵炒天冬青皮各四分此方專治心火尅肺為癰為痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利附録瘡瘍外治雜方乳香定痛散乳香沒藥各五錢寒水石一兩冰片一錢研末搽患處痛即止此治潰爛後痛追毒散全蠍五錢五靈脂川烏頭炮炮薑各一兩研細末少部摻瘡口深者紙捻蘸藥紝之外貼膏藥惡症重症以蒸餅浸透丸作長細條子紅入瘡口名追毒錠子此方治一切惡瘡膿水不快者翠霞散滑石一兩銅緑五錢輕粉二錢冰片麝香各三分粉霜二分半研末紝瘡口以膏貼之此方治一切惡瘡去毒生肌搜膿散白芷一兩川芎二兩白芍三兩輕粉三錢研末摻瘡口深者纖之此方能治年深不斂惡瘡桃花散白芨白斂黃柏黃連乳香另研麝香黃丹洗淨炒等分研末摻瘡上二三日即生肌平滿此方專能生肌萬應針頭丸麝香二錢血竭如蠟一塊者輕粉蟾酥辣者硇砂各三錢冰片一錢蜈蚣一對全用煉蜜丸如瘡有頭者針挑見血以黍米大藥放瘡口用紙花周圍津濕貼之立愈此方治一切惡瘡生於腦背毒大欲死者一粒即愈針頭散乳香蟾酥各一錢研勻入乳和如泥磁盒收貯如用以津調一些點腫處以膏貼之毒自消即發亦輕此方專治瘡瘍琚腫木硬去腐散麻蟲指甲輕粉飛面各五分蟾酥少部津調丸麻子大每三四丸入毒內以膏貼此方能去敗生新神效替針丸白丁香硇砂沒藥乳香各一錢糯米四十粒用礦灰拳大一塊放碗內入井水待熱氣將息以米排灰中良久米如水晶狀取出候用上各另研末和勻將灰內糯米研爛作丸緑豆大如不敷量取飯粒研和以一粒粘瘡頭上以小膏貼使水移動其膿自潰透膿散已出蛾大蠶繭一個燒存性酒服若多用一個則毒多生一孔切記此治瘡毒無頭者消蝕散活白礬一兩活緑礬雄黃乳香遠志肉胭脂各一錢蜜水研膏敷惡肉上麻油調亦可此方能消惡肉淫蟲朽骨雄黃散雄黃末一錢巴豆一個不去皮共研如泥再入乳香沒藥各少部再研細點上惡肉自去此膏藥內入雄黃巴豆少部不傷好肉止去惡肉諸癰瘡有惡肉者皆可去諸般敗毒散大黃四兩銼細先以當歸一兩切用酒二碗煎八分將大黃片拌一宿曬乾為末聽用每服時以白芷一錢連翹六錢酒煎八分露一宿調服大黃三錢其毒盡從大便中出出後以粥湯止之上部毒飽肚服下部毒空心服用連酒和丸服亦可金箍膏鳳仙花子大黃五倍子各十兩為細末人中白兩半如無以皮硝代陳小粉三年者十三兩共入鐵鍋內炒至黃焦色米醋調腫毒初起圍之圍藥方五倍子炒焦黑陳小粉炒黃黑各五斤龜板燒白芨白斂朴硝榆樹皮各十二兩白芷稍大黃南星黃柏半夏各八兩黃連牙皂萆麻子各四兩醋調瓦盆內慢火熬成膏此方專治一切癰疽發背便毒吹乳橫痃及風濕疼痛小兒熱毒火丹無名腫毒初起者圍之即散已成者圍之即生頭出膿定痛散毒真聖藥也每用加白蜜豬膽醋三味和勻圍腫處中留一孔綿紙貼之如紙乾以抿子刷上頸項病源流頸項強痛肝腎膀胱病也三經感受風寒濕邪則項強風熱勝宜加味小柴胡湯濕勝宜加味逍遙散肝血虛肝火旺亦筋燥強急宜首鳥湯而其所屬諸病有項下卒腫堅硬者由於肝腎之病昆布海藻海帶必用外則於風熱濕三者參之有常慣項痛者宜六味丸間服和氣飲有感冒項強或痛者宜驅邪湯有痰盛項痛者宜治風豁痰湯有濕盛項痛者宜加味勝濕湯有項筋急不得轉側者宜木瓜煎有腎氣上攻項筋連背痛不可轉側者宜椒附散有腮項相連腫痛發熱便閉者宜防風通聖散有項面腫衆人一般者是疫癘宜普濟消毒飲有腦後腫者恐是疽宜黃連救苦湯若兼堅腫木硬口燥舌乾惡心煩渴便祕宜石決明湯有頸項腫痛寒熱頭眩者是氣毒宜加味藿香散有頸項結核浮腫先寒後熱者此風寒所搏宜防風解毒湯有頸項結核堅腫色紅漸熱者是熱毒宜連翹消毒飲有項強不能回顧動則腦痛脈弦數實者是痰熱客太陽經宜二陳湯加酒炒黃芩羌活紅花有傷寒後項前後腫硬作痛身熱者宜柴胡葛根湯有傷寒後項腫痛卻不紅身不熱者宜牛蒡甘桔湯有項強卒口噤背反張成敢蘵病者宜烏藥順氣散加羌活獨活木瓜以上皆項強之病而又有項軟者天柱骨倒也宜健骨散生筋散小兒久患疳疾體虛不食及諸病後往往患此俗醫謂之五軟宜天柱元五加皮散頸項之為地雖小其病亦如此之多可忽視哉頸項部位症治靈樞曰前曰頸後曰項又曰缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次手陽明之脈名曰扶突三次手太陽之脈名曰天窗四次足少陽之脈名曰天容五次手少陽之脈名曰天牖六次足太陽之脈名曰天柱七次項中央督脈名曰風府風府穴名也在腦後資生曰內經云巨陽者諸陽之屬也其脈連於風府説為諸陽主氣也然則固傷寒之所自起也北人皆以毛裹之南人怯弱者亦以帛護其項故風府宜護也本草單方曰風襲項強不得顧視者穿地作坑煅赤以水灑之令濕鋪生桃葉於內臥席上以項著坑上蒸至汗出良久即瘥或以大豆一升蒸變色囊裹枕之亦愈也頸項瘡瘍頸項瘡瘍最重者莫如對口瘡生頸後腦下緣督脈陽盛火毒上炎所致若琚赤腫痛者可治如根腳大精神憒便屬惡候宜量其虛實虛弱者汗之宜勝金丹壯實者下之宜一粒金丹或用內托內消法宜托裡消毒散仙方活命飲氣血虛者尤宜補托宜托裡散外用圍藥圍住勿令毒走泄如漸腫至肩上或毒邪壅盛鮮血瀑湧或毒攻心腹膨脹譫語或潰後風入發搐皆死不治其次百脈疽腫起環頸項琚赤作痛身灼熱不能食上氣咳嗽其發引耳其原由有所大驚恐也十五日可刺導引見血否則八十日死宜神效托裡散其次夭疽生頸上腫大而色赤黑不急治則熱毒前傷任脈下侵洲液內入肝肺十餘日死宜仙方活命飲其次夾疽生喉兩旁由心肝脾三經火熱上攻也若潰內者死不治宜琥珀犀角膏黃連消毒飲其次猛疽生嗌中又名喉癰由任脈及心小腸積熱憂憤所致宜琥珀犀角膏黃連消毒飲壯實人先用下法以泄毒宜一粒金丹若過時不治穿爛咽喉者死膿不泄而塞咽亦立死其次頸癰三焦鬱火研發也宜仙方活命飲加元參桔梗虛弱人或先汗之宜奪命丹壯實人或先下之宜一粒金丹老弱人必用補之宜人參養榮湯神勞多怒者必當消解之宜八珍湯加柴胡香附費心過度者急培補之宜補中益氣湯更有婦人鬱怒恚憤頸項腫後月水不通小便如淋則又關於血分矣宜先調之宜椒紅丸俟經行腫消補之宜六君子湯加柴胡枳殼以上皆頸項瘡瘍發之於暫者也痰核瘰癧馬刀癭瘤其有纍月經年久而不愈者則曰痰核曰瘰癧曰馬刀曰癭瘤痰核者濕痰流聚成塊不紅不痛不作膿推動軟滑多生頸項宜專消痰核仙方海帶丸消核丸亦有生手臂肩背者雖覺微痛但腫不紅宜二陳湯加防風酒芩連翹川芎角刺蒼朮亦有胸中胃脘至咽門窄狹如線疼痛及手足俱有核如胡桃者宜開氣消痰湯亦有咽喉結核腫痛頸項不得回轉兩腋下塊如石硬者宜消解散亦有風痰鬱結而成核者宜消風化痰湯亦有酒怒氣發腫痛潰膿痰核生於腋下久不能瘥者宜內托白斂散亦有生於耳後連項下三五成簇不紅不腫不作膿者宜含化丹亦有項後少陽經中疙瘩赤硬腫痛者宜山藥膏亦有痰核紅腫寒熱狀如瘰癧者宜石灰火煅為末白果肉同搗貼亦有枕後生痰正則為腦側則為痹者宜輕虛白浮石燒存性入輕粉少部研麻油調塗勿令手按即漲或加焙黃牛糞尤妙總之痰核一症生在上體多兼風熱生在下體多兼濕熱宜加味小胃丹竹瀝達痰丸瘰癧者內經通謂之結核如大豆如銀杏連屬者是也多起於耳後其原由怒火風熱血燥或肝腎二經精血虧損虛火內動或恚怒氣逆憂思過度風熱之邪內搏於肝肝主筋肝受病則筋縮纍纍如貫珠也故此症專屬於肝兼屬膽與三焦以肝為雷火而膽三焦皆有相火以為助也雖然瘰癧者其總名而就形分類則各有指名可按焉排行成列或繞遍項或二三或六七或赤或白或沉或浮初如豆久似梅甚如雞卵此名蟠蛇癧憂思勞力則疼痛赤腫早治為急宜梔子清肝湯連翹散堅湯頸項間止生一個者名單窠癧最為難治宜小犀角丸外起一胞中裹十數核塊者名蓮子癧手推能動尚可用藥宜內消丸琥珀散若堅硬如石必發熱躁渴死不治初則單生頸項左右後則重疊而起名重台癧亦死症且害人甚速形似燕窩者名燕窩癧亦死症初生在項破後流注四肢遍體結毒如梅李狀不療自破孔竅相穿寒熱疼痛膿汁淋漓名流注癧又名千歲瘡婦人多患之宜化氣調經湯夏活草散而治之之法當細覆其原由形症以用藥如脈沉數實琚赤腫痛由邪氣之實急當泄之宜消毒化堅湯如脈浮數憎寒壯熱拘急腫痛由邪氣在表急當表散宜荊防敗毒散加減如由於大怒肝邪橫逆急疏肝行氣宜小柴胡湯加青皮青木香桃仁紅花如由氣血虛腫硬不潰急補氣養血宜益氣養勞湯如由氣血虛潰後不能收斂急當調補宜先服益氣養榮湯次服十全大補湯加香附貝母遠志如由虛勞而致急須補益宜先服補中益氣湯次服益氣養榮湯如脈數實不消或不斂急當下之宜羌活連翹湯如腫痛發寒熱大便祕結當先下後托宜先服羌活連翹湯次服仙方活命飲如耳下核塊腫痛發寒作熱急發表宜荊防敗毒散表症退急消毒宜散腫潰堅湯如腫硬久不消亦不作膿服敗毒散堅藥不應急灸肘尖肩尖再服藥宜益氣養榮湯如由血虛脈大無力潰後發熱煩躁急當補陰宜當歸補血湯總之初覺憎寒壯熱咽項強急腫結疼痛者急為消散宜羌活連翹湯又時服消癧丸外以稜針刺出血以撥毒湯令洗一日內時刺時洗至五六次刺時放蟾酥少部於針處上以膏貼宜琥珀膏更貼內消膏自然消散若己潰不愈然後用補益藥宜益氣養榮湯或八物湯加柴胡地骨皮夏活草香附貝母多服取效此先後之法其用藥大概不可紊亂推之凡屬瘡瘍皆然不獨瘰癧已也馬刀者亦屬三焦肝膽浸淫於陽明太陽流注於胸脅掖下堅硬如石形長如蛤者是也不論已破未破年近年遠總宜以夏活草濃煎食遠溫服虛弱人熬膏服並塗患處以此草生血乃治馬刀瘰癧聖藥也久服恐嫌尅伐常以十全大補湯加香附貝母遠志相間而服而其方藥又不可不詳求以備急用宜連翹散堅湯消腫湯散腫潰堅湯海藻潰堅丸貓頭丸補中勝毒餅如此則症雖險惡亦不患無法以治之也癭瘤者氣血凝滯年數深遠漸長漸大之症何謂癭其皮寬有似櫻桃故名癭亦名癭氣又名影袋何謂瘤其皮急有似石榴故名瘤亦名瘤贅是癭瘤本異症也其症皆隸五臟其原皆由肝火説人怒動肝邪血涸筋攣又或外邪搏擊故成此二症惟憂恚耗傷心肺故癭多著頸項及肩惟有所勞欲邪乘經氣之虛而住留故瘤隨處皆有陳文治曰自筋腫起按之如筋聚之狀而或有赤薄名曰筋瘤屬於肝也宜六味丸或四物湯加山梔木瓜自肌肉腫起久而有赤薄或皮色俱赤名曰血瘤屬於心也宜四物湯加茯苓遠志自肌肉腫起按之實軟名曰肉瘤屬於脾也宜歸脾湯補中益氣湯自皮膚腫起按之浮軟名曰氣瘤屬於肺也宜補中益氣湯自骨腫起按之堅硬名曰骨瘤屬於腎也宜六味丸補中益氣湯而三因方又於骨肉血三瘤之外增膿瘤宜海藻丸石瘤宜神效開結散一並散脂瘤宜治脂瘤方謂瘤名有六其初起皆作梅李狀皮嫩而光漸如杯卵不可決潰肉瘤尤不可破破則殺人惟脂瘤粉紅色全是痰結宜用針決去脂粉或有如茄垂下根甚小者用藥點其蒂五灰膏俟茄落即以生指膏貼之自愈須防其出血如血出急以藥止之宜止血藥桃花散三因之言亦病日深變生多種之謂也且不但此也有手背生瘤或如雞距或如羊角向明照之如桃膠曰膠瘤者宜以排針十字刺破按出黃膿如膠者二三匙立平有生於面曰粉瘤者宜海藻浸酒飲有翻花瘤者宜馬齒莧一斤燒灰研細豬脂調服薛立齋曰筋脈呈露曰筋癭宜玉壺散破結散赤脈交絡曰血癭宜化癭丹四物湯合用皮色不變曰肉癭宜人參化癭丹隨憂愁消長曰氣癭宜白頭翁丸消癭散海帶丸堅硬不可移曰石癭宜破結散三因言五癭之名亦同謂皆不可決破破則膿血崩潰多致夭枉如破宜桃花散止血藥其言是也然西北方依山聚澗之民食溪谷之水受冷毒之氣其間婦女往往生結囊如癭皮色不變不痛不癢餘前遊宣化府曾立方治數婦人皆得效此方書所未及者宜沈氏癭囊丸故特志之痰核症治丹溪曰結核在皮裡膜外多是濕痰流注作核不散間其平日好食何物吐下後用藥散核入門曰遍身有核多是痰注宜竹瀝達痰丸瘰癧症治外台祕要曰肝腎虛熱則生癧病機云瘰癧不係膏粱丹熱之變因虛勞氣鬱所致宜補形氣調經脈其瘡自愈不得妄汗妄下致有虛虛之禍陳文治曰初覺憎寒壯熱咽項強痛或寒熱琚痛乃肝火風熱而氣病也便用梔子清肝湯柴胡清肝湯以清肝火加味四物湯以養肝血若手推可動而軟滑者屬痰也以化痰為主用二陳湯加防風桔梗黃芩竹瀝見於少陽之分者柴胡通經湯見於陽明之分者升麻調經湯若寒熱止而核不消乃肝經火燥而血病也用加味逍遙散以清肝火六味丸以生腎水或初用牡蠣大黃湯疏下二三次或服內消丸外貼琥珀膏內外兼治必使消散如此用藥卒不可退其人面色痿黃患處腫高稍軟皮膚壯熱膿已成也宜以針刺核中外貼琥珀膏仍服托裡之劑三日後取去核中稠膿膿盡又取核外薄膜先破初起之核以絶其源餘核不消盡如前法次用龍珠膏金寶膏除去其根而服除風熱之藥自是可愈若已成瘻則用蒜餅子灸法瘡口貼琥珀膏先哲立法不一而必效散立應散瓜蔞散大有奇效又曰男子患此最怕咳嗽潮熱女子患此亦忌經閉潮熱但以玉燭散和血通經服之自消經久閉者用加味逍遙散清肝益榮湯丹溪曰治瘰癧以必效散與瓜蔞散相間而服效驗如神然必效立應二散非王道藥之劑服後宜酌量調治馬刀症治入門曰生胸脅腋下堅硬如石形如馬刀蛤者曰馬刀又曰患馬刀者取立應散一錢濃煎木通湯調下臨臥服毒從小便出如粉片血塊是也未效再服斑貓性毒濟以烏尖或沖上麻悶嚼蔥白茶清下以解之如尿澀益無散或五苓散燈心煎湯調下宣毒後繼服薄荷丹解其風熱癭瘤症治入門曰癭瘤初起通用十六味流氣飲久服蠟礬丸外敷南星膏瘍科書曰此疾宜補脾肺滋心腎令木得水而敷華筋得血而滋潤多有可生對口瘡治法瘍科書曰治對口瘡用鮮白茄蒂七枚稱若乾重又用鮮首烏稱同茄蒂重水鐘半煎服一服出膿一服收口如無鮮者收取乾者亦可此為輕劑不可以治重病耳治頸項病方二十二加味小柴胡湯風熱柴胡黃芩人參甘草川芎白朮當歸黃芪黃柏知母各一錢半夏五分水煎食前服痛甚加黃連加味逍遙散濕勝白芍白朮各一錢麥冬茯苓生地各六分甘草桔梗各二分當歸地骨皮各八分山梔黃柏各三分此方兼治外症潮熱虛甚者首烏湯肝虛首烏五錢牛膝三錢萆薢澤瀉甘草各一錢六味丸常痛熟地山萸山藥丹皮茯苓澤瀉驅邪湯感冒升麻桂枝杏仁甘草羌活防風獨活川芎藁本葛根柴胡白芷生薑治風豁痰湯痰盛黃芩紅花茯苓獨活葛根半夏羌活陳皮甘草防風白芷柴胡升麻生薑加味勝濕湯濕盛羌活獨活藁本防風川芎蒼朮甘草荊芥黃柏蔓荊子木瓜煎筋急木瓜一個去瓤沒藥一兩研細納木瓜中兩半緊扎飯上蒸三四次研爛地黃汁酒下三匙椒附散筋痛附子一個六錢以上者炮研每用二錢川椒二十粒薑七片水煎去渣入鹽少部防風通聖散項腫防風白芍薄荷川芎山梔桔梗黃芩白朮荊芥當歸麻黃連翹滑石石膏甘草芒硝酒大黃普濟消毒飲疫癘黃連黃芩陳皮元參柴胡甘草桔梗連翹升麻僵蠶大黃牛蒡子黃連救苦湯腦後腫黃連葛根升麻柴胡甘草節赤芍川芎連翹歸尾桔梗黃芩羌活防風忍冬藤水酒煎石決明湯又生石決明僵蠶防風穿山甲連翹羌活各一錢乳香甘草忍冬藤黃連歸尾大黃花粉各八分酒水煎空心服行過三次方進飲食加味藿香散氣毒藿香甘草桔梗青皮陳皮柴胡紫蘇半夏白朮白芷茯苓厚朴川芎香附夏活草防風解毒湯結核防風荊芥桔梗連翹甘草石膏薄荷枳殼川芎蒼朮燈心牛蒡子酒知母連翹消毒飲熱毒連翹陳皮桔梗元參黃芩赤荷當歸山梔葛根射干花粉紅花甘草便祕加大黃柴胡葛根湯傷寒柴胡葛根花粉桔梗連翹黃芩石膏升麻甘草牛蒡子牛蒡甘桔湯不紅桔梗陳皮黃連花粉川芎赤芍甘草蘇木牛蒡子健骨散項軟僵蠶炒為末每五分或一錢酒泡薄荷下日三服生筋散又木鱉子三個萆麻子三十粒俱去殼研勻先抱病人頭起摩項中令熱作片貼之天柱元又蛇含石一大塊醋煅七次鬱金末少部研細入麝香少部飯丸荊芥薑湯下五加皮散又五加皮一味為末酒調塗項骨上乾則易治頸項瘡瘍方八十六勝金丹對口製白砒麝香各五分蟾酥一錢雄黃辰砂乳香沒藥血竭各錢半全蠍炮天龍去頭足炙炙穿山甲各三錢僵蠶炒五錢每末二錢沙糖調蔥頭酒下一粒金丹又沉香乳香木香各五分巴霜一錢半各為末照分數和勻黑棗肉丸芡子大每服一丸量人虛實先呷水一口行一次胃氣實只可呷三四口後用水一口送下行後米飲止之托裡消毒散又人參鹽黃芪酒當歸炒白芍川芎焦朮茯苓各一錢金銀花白芷各七錢炙草連翹各五分加減法載在前仙方活命飲又穿山甲白芷赤芍甘草歸尾花粉貝母角刺各一錢金銀花陳皮各三錢乳香沒藥各一錢二味另研末水酒煎好送下二末托裡散又人參炒黃芪各二錢焦朮陳皮當歸熟地茯苓白芍各一錢半神效托裡散百脈疽黃芪鹽水炙忍冬葉當歸各五錢粉草二錢酒煎服渣敷患處此方兼治癰疽發背腸癰乃托裡消毒之良劑琥珀犀角膏夾疽琥珀生犀角各一錢辰砂人參茯神棗仁各二錢冰片二分半另研上各另研和勻煉蜜調成膏每服一彈子大麥冬湯化開十五服凡瘡瘍潰後不宜用黃連消毒飲猛疽黃連山梔當歸連翹各一錢川芎白芍炒生地各錢半炙草八分金銀花二錢亦名清熱消毒飲此方兼治一切癰疽發於陽腫痛發熱作渴奪命丹頸癰蟾酥輕粉各五分朱砂三錢寒水石活礬銅緑各一錢蝸牛三十一個另研如泥和為丸緑豆大每用一丸生蔥白三四根嚼爛吐手心包藥在內酒下約行六七裡汗出為效重者再服一二丸此方主諸般大腫毒然劫劑也用當酌輕重陰陽之分人參養榮湯又白芍三兩人參白朮甘草黃芪陳皮肉桂各一兩茯苓熟地五味子各七錢遠志五錢每貼取末三錢薑水煎空心溫服效虛甚者煉蜜丸可常服遺精加龍骨咳嗽加阿膠麥冬挾火加知母黃柏八珍湯又人參茯苓白朮甘草川芎當歸白芍熟地補中益氣湯又人參黃芪當歸白朮升麻柴胡陳皮甘草椒紅丸又六君子湯又人參茯苓白朮炙草半夏陳皮專消痰核仙方痰核枳殼十四個破開去子大黃五錢生研細斑貓十四個去頭足翅每用枳殼兩片對合入斑貓一個又將大黃末分十四份第一份入枳殼兩片內線扎緊再將夏活草六兩鋪大鍋底將枳殼排放在內入水六宮碗煮乾水取枳殼切片曬或烘焙去大黃斑貓再將萆麻子六十三粒炒去油打爛入藥米糊丸早晚各用開水送下七丸服至痰核消去大半即止不服調養半月自然平安而愈此方兼治瘰癧真仙方也海帶丸又海帶青皮陳皮貝母等分蜜丸彈子大食後含化甚者加昆布消核丸又鹽水炒橘紅赤苓酒煨大黃連翹各一兩酒黃芩山梔各八錢半夏麯酒元參牡蠣童便淬另研花粉桔梗瓜蔞仁各七錢僵蠶六錢甘草節四錢湯浸蒸餅丸白湯下八九十丸二陳湯又茯苓陳皮半夏甘草開氣消痰湯又便香附桔便僵蠶各一錢黃芩陳皮枳殼各七分檳榔前胡半夏枳實羌活荊芥射干威靈仙各五分甘草四分木香三分薑三片消解散又南星半夏各一錢陳皮枳實桔梗柴胡前胡黃連連翹赤芍防風獨活蘇子蓬朮木通白附子甘草蔓荊子各五分薑燈心消風化痰湯又白附子木通各一錢南星半夏赤芍連翹天麻僵蠶天冬桔梗金銀花蒼耳子各七分白芷防風羌活皂角各五分全蠍陳皮各四分甘草二分薑五片內托白斂散又赤芍當歸連翹各一錢酒黃芩白芷白斂瓜蔞仁各八分川芎天花粉乳香各七分防風桔梗柴胡各五分白蒺藜生草各四分含化丹又酒蒸大黃僵蠶青黛膽星等分蜜丸食後含化山藥膏又生山藥一塊萆麻子三個各去皮研勻攤貼如神加味小胃丹又南星半夏各二兩半俱用白礬皂角薑汁水煮十五次桃仁杏仁俱用白礬皂角水泡紅花陳皮白朮白芥子枳實礬水泡半日炒蒼朮米泔白礬皂角水浸一宿炒各二兩薑汁竹瀝煮神麯丸此方兼治中風痰痞積眩暈喉痹淡薑湯下癱瘓不語濃薑湯下痞塊頭風頭痛臨臥食後服神效竹瀝達痰丸又大黃黃芩各八兩沉香五錢人參白朮茯苓陳皮甘草半夏各三兩礞石焰硝煅過一兩以竹瀝薑汁和如稀糊磁器內曬乾又研細又以竹瀝薑汁和曬共三次再研仍以竹瀝薑汁和丸每服百丸米湯下此方治有痰而氣弱者能搜逐積痰從大便出不損元氣孕婦忌用梔子清肝湯瘰癧山梔柴胡丹皮各一錢茯苓川芎白芍當歸牛蒡子各七分甘草五分此方專治三焦及膽經血虛肝火風熱耳內瘡或癢或頸項胸乳等處作痛或寒熱晡甚自汗口苦或目唇搐動等症東垣連翹散堅湯又柴胡錢二分龍膽草酒炒四次土瓜根酒炒各一錢黃芩酒炒七次七分生黃芩歸尾廣皮三稜酒炒連翹白芍各五分炙草三分黃連酒炒二次製蒼朮各二分水煎食後臥下足高頭低乘熱每含一口作十數次咽下務使藥氣上留仍以十倍煉蜜作丸服此方治凡耳下至缺盆肩上生瘡堅硬如石動之無根名曰馬刀屬少陽經已破未破並皆治之及頸項瘰癧小犀角丸又犀角黑牽牛半生半炒青皮陳皮各一兩連翹五錢用皂角二條去皮弦子泡捶以布絞汁一碗又用鮮薄荷二斤打汁同熬膏為丸每食後連翹煎湯服三十丸間以薄荷湯服此方常服能除根諸癧並治應效如神內消丸又青皮陳皮各二兩牽牛八兩取頭末二兩皂角去粗皮搗碎薄荷葉各八兩二味共用水一斗煮揉汁去渣慢火熬膏為丸每三十丸食後荊芥湯下此方治瘡腫初生及瘰癧結核熱毒鬱滯服之內消大有神效琥珀散又白丑頭末滑石僵蠶黃芩各一兩木通連翹各七錢枳殼赤芍柴胡各五分斑貓去足翅炒三錢甘草三錢琥珀二錢銼作六帖水煎服化氣調經湯又廣皮二兩酒香附羌活白芷各一兩牡蠣花粉角刺甘草各五錢每末二錢酒下日二服此方兼治流注夏活草散又夏活草末六錢甘草末一錢每二錢茶清下又方取一兩煎服虛者多服益妙兼服十全大補湯加香附遠志貝母此方治瘰癧馬刀退寒熱之聖藥也消毒化堅湯又炙草龍膽草薄荷各四分黃芩五分花粉白芍元參各六分牛蒡子昆布羌活升麻各七分黃芪當歸柴胡桔梗各一錢連翹錢半陳皮八分加薑二片或加甘草節知母貝母海藻更佳荊防敗毒散又羌活獨活柴胡前胡人參赤茯苓桔梗枳殼麩炒荊芥防風各一錢甘草五分小柴胡湯又柴胡黃芩人參半夏甘草益氣養榮湯又人參茯苓貝母陳皮川芎當歸香附鹽黃芪酒熟地炒白芍各一錢炙草桔梗各五分炒白朮二錢熱服不拘軟硬赤白或潰而不斂皆可服十全大補湯又羌活連翹湯又羌活連翹防風柴胡夏活草昆布枳殼黃芩川芎甘草薄荷牛蒡子金銀花散腫潰堅湯又黃芩一錢酒洗半生半炒龍膽草酒洗六分花粉酒洗酒黃柏酒知母苦桔梗昆布海藻各七分柴胡六分炙甘草三稜酒炒蓬朮酒炒連翹各五分葛根白芍歸尾各四分酒黃連升麻各三分銼作一帖水浸半日煎食後去枕低頭而臥每一口作十次咽下另搗一料蜜丸每百丸以二煎藥湯送下當歸補血湯又黃芪一兩酒拌當歸三錢作一服煎消癧丸又琥珀膏又琥珀一兩木通肉桂當歸白芷防風松脂朱砂各八錢木鱉子肉五錢丁香木香各三錢將珀桂朱二香各為極細末和勻其餘以麻油一斤半煎藥至黑色去渣照油實數每油一斤下淘淨炒黃丹八兩膏成稍溫下琥珀等末內消膏又消腫湯馬刀連翹二錢黃芩柴胡各錢二分花粉黃芪各一錢歸梢甘草各七分牛蒡子黃連各五分紅花二分海藻潰堅丸又神麯四錢半夏二錢海藻昆布龍膽草蛤粉通草貝母真松夢茶活礬各三錢蜜丸每三十丸臨臥白湯下或含化或酒調末二錢服俱可此方治瘰癧馬刀堅硬形瘦潮熱不食兼治一切癭氣忌甘草魚雞豬肉五辛生冷貓頭丸又貓頭骨一個炙蝙蝠一個以朱砂末三錢入肚內瓦上炙焦南星白礬各一兩黃蠟化丸臨臥米飲下三十丸此方治瘰癧馬刀不拘已破未破俱效補中勝毒餅又黃芪一錢人參三分甘草五分以上三味調氣補中生地熟地白芍當歸各三分以上四味和血生血涼血惟白芍兼能益氣之虛連翹一錢升麻柴胡防風各五分陳皮三分上研細末湯浸蒸餅調捏作餅子曬乾研米粞大每三錢白湯下六味丸癭瘤地黃山藥山萸丹皮茯苓澤瀉四物湯又川芎當歸白芍地黃歸脾湯又人參黃芪當歸白朮茯神棗仁遠志龍眼木香甘草薑棗海藻丸又海藻川芎當歸官桂白芷細辛藿香白斂昆布活礬各一兩海蛤松夢茶各七錢半蜜丸此方通治癭瘤神效開結散又沉香二錢木香三錢陳皮四錢真珠四十九粒煅豬黶肉子生豬項下如棗大微扁色紅者四十九個瓦上焙乾每末二錢臥時冷酒調和徐徐咽下輕者三五服效重者一料全愈一井散又雄黃粉霜硇砂各二錢輕粉乳香沒藥各一錢土黃三錢麝香少部研細末津調塗瘤頂以濕紙説之後小黃膏塗四圍間日一度上藥土黃乃造作所成方用信石二兩木鱉仁二錢去油巴豆五錢硇砂二錢各研為末和勻以石腦酒和成一塊油紙包裹埋於地坑四十九日取出劈作小塊磁器裝聽用小黃膏又黃柏黃芩大黃等分研末水調為糊塗一井散四圍亦間日一度涼肌退腫治脂瘤方又用針決去脂粉自愈五灰膏又棗柴灰桑柴灰荊芥灰蕎麥桿子灰桐子殼灰各五兩以沸湯各淋汁一碗共五碗澄清入斑貓四十枚穿山甲五片煎二碗磁器裝用時入新出窯石灰一兩乳香冰片少部調成膏敷瘤上如稠加清水稀稀用之神效點瘤贅神效止血藥又陳京墨煅百草霜等分掞血處以手按之桃花散又石灰十兩炒紅入麻油半盞大黃一兩煎汁半盞內和勻慢火炒如桃花色磁器收聽用神效此方能止百般出血不但癭瘤已也玉壺散又海藻洗海帶冼昆布洗雷丸各一兩青鹽廣皮各五錢陳火酒丸含化破結散又神麯四錢海藻昆布龍膽草蛤粉通草貝母活礬松夢茶各三錢半夏二錢蜜丸蔥白湯下三十丸或酒下末二錢亦可此即海藻散堅丸也有人生癭大如茄子潮熱形瘦百治不效得此方去松夢代真桑寄生一倍服三五日其癭自消化癭丹又海帶海藻海蛤昆布以上俱洗淨焙澤瀉炒連翹各五錢豬靨羊靨各十枚蜜丸芡子大臥時含化一二丸須忌油膩面酒人參化癭丹又海帶海藻海蛤昆布四味俱焙澤瀉炒連翹各一兩豬靨羊靨各十枚切片焙人參八錢蜜丸含化一説豬羊靨即豬羊外腎乃囊中之卵存參白頭翁丸又白頭翁五錢昆布一錢通草海藻各七分連翹元參各八分桂心三分白斂六分蜜丸酒下消癭散又海馬酒炙海帶海藻海紅蛤煅海螵蛸昆布石燕各一兩為末茶清下服此方須兼服含化丸含化丸又海蛤煅海藻海帶昆布訶子瓦楞子煅文蛤即花蛤有斑者五靈脂各一兩豬靨子十四個焙乾另研蜜丸含化沈氏癭囊丸又雄黃五錢另研青木香四錢另研海南檳榔切片曬研昆布洗淡焙研海蛤煅研白斂酒炒研半夏麯薑汁炒研各八錢肉桂心白芥子各二錢半每服二錢食後酒調下忌大葷麵食此餘自製方也梔子清肝湯氣病山梔柴胡丹皮各一錢茯苓川芎當歸白芍牛蒡子各七分甘草五分水煎服柴胡清肝湯又柴胡山梔各錢半人參黃芩川芎各一錢連翹桔梗各八分甘草五分加味四物湯又柴胡通經湯少陽柴胡歸尾連翹生草三稜黃芩牛蒡子桔梗各二分黃連五分紅花少部食後稍熱服此攻裡內消之劑升麻調經湯陽明升麻八分酒龍膽草葛根各四分酒黃芩酒廣茂酒三稜炙草各五分歸尾白芍各三分酒黃柏二分酒知母一錢加味逍遙散血病白芍白朮各一錢茯苓麥冬生地各六分甘草桔梗各二分當歸地骨皮各八分山梔黃柏各三分牡蠣大黃湯疏利牡蠣木香大黃煨各錢半水煎春夏露一宿冬月於暖處一宿雞鳴時服得利勿服金寶膏外貼桑柴灰五碗先以草紙一層皮紙二層墊箕底放灰於上以滾水十碗淋取汁聽用穿山甲二兩信一錢另研辰砂一字粉霜錢半麝香五分杏仁七枚同信末研塗穿山甲上將灰汁澄清煎滾下甲末煎至半下麝次下粉霜乾至九分下辰砂候成膏下石灰炒研細一兩以成塊為度磁瓶收不可見風每取傅核上再傅即去舊藥並靨即效龍珠膏又龍牙草五兩棘棗根五錢海藻二錢半蘇木五錢用水二十碗煎十二碗去渣又用桑柴灰炒石灰桑耳草灰各碗半先以草紙二層皮紙二層放箕底放灰於上以前所煎水熱淋取汁十碗澄清煎成膏入白丁香石膏輕粉各五錢麝香一錢攪勻收磁瓶內每敷藥一日一換並去靨再上新藥即消而愈根小者只敷根上必效散總治瘰癧南硼砂二錢半輕粉一錢麝香五分巴豆去皮心膜五粒斑貓去頭足翅糯米炒米黃色去米四十個白檳榔一個研極細以雞子三個去黃留清調藥仍入殼內以濕紙數重糊口飯上蒸熟取出曬乾再研細壯者一錢弱者五分炒生薑煎陳酒五更調服如覺小腹痛即用益元散一服其毒從大便出孕婦忌用繆仲淳曰此治瘰癧氣血無虧癧核不去者服之大有神效雖有斑貓然已炒熟且有巴豆製之弱者先服益氣養榮湯數帖壯者服後用益氣養榮湯屢試屢驗立應散又連翹赤芍川芎當歸甘草滑石各五錢黃芩三錢斑貓懦米炒三錢川烏尖七個土蜂房蜜水洗飯上蒸曬乾白牽牛各二錢半每末一錢濃煎木通湯調下毒從小便出未效再服繼以宣熱丹解其風熱若宣導癰疽惡毒去黃芩宣熱丹又何首烏薄荷皂角連翹三稜荊芥蔓荊子各一兩共作末用熱醋浸淡豆豉二兩半搗膏丸每三十丸熟水下日一服解瘰癧風熱之毒自小便出宣毒之後病雖愈常宜服之瓜蔞散又瓜蔞仁青皮各一錢石膏二錢甘草沒藥歸尾角刺金銀花各五分青橘葉取汁二匙水酒煎空心服玉燭散又酒大黃當歸白芍熟地甘草芒硝黃芩川芎等分每末三錢薑湯下七八日見效清肝益榮湯又山梔當歸茯苓木瓜各一錢柴胡川芎炒白芍各七分白朮二錢炙草五分龍膽草八分熟地錢半薑水煎服此方治肝膽小腸經風熱血燥筋攣結核或耳項胸乳脅肋作痛薄荷丹又即宣熱丹十六味流氣飲癭瘤人參黃芪當歸各一錢川芎肉桂厚朴白芷甘草防風檳榔烏藥白芍枳殼木香各五分桔梗三分紫蘇葉一錢半水煎食後服若由忿怒者加青皮一錢此方乃通行十二經藥病在一經者不用蠟礬丸又黃蠟二兩入明礬末四兩衆手和勻作丸每三十丸酒水任下日二服此方專治癰疽發背瘰癧瘻瘡一切惡瘡衛護內膜驅解諸毒自然內消如因藥毒發疽非此莫治內疽腸癰尤妙南星膏又南星大者一枚細研入醋調膏先將小針刺腫處令氣通卻以膏攤紙上如瘤大小貼之覺癢則頻貼取效此方治頭面瘤大如拳小如栗或軟或硬不癢不痛宜用此藥切不可用針灸附録頸項瘡瘍雜方生肌乾膿散黃連貝母降香燒存性白芨海螵蛸五倍子炒黑藝香各五錢輕粉五分共研末先將藥水洗患處次掞此末外貼膏此方專治瘰癧馬刀膿汁不乾丹溪方牡蠣四兩甘草二兩每末一錢食後茶下日二服半月除根其效如神此方專治瘰癧初發頭項腫硬未破者活瘤方砒硇砂黃丹雄黃輕粉各一錢朱砂乳香沒藥各八分螌蝥三十個生用糯米粥丸棋子大曬乾先灸破瘤頂以藥餅説上用黃柏末水調敷之數日自落縮瘤法甘草膏用筆蘸塗瘤之四圍乾則又塗凡三次之後以大戟芫花甘遂末等分醋調另以筆妝點其中不得近甘草如是而漸漸收小中點悉如舊法自然焦縮係瘤法芫花根淨洗帶濕不得犯鐵器於木石器內搗取汁用線一條浸一宿取出係瘤經宿即落如未落再換一二次落後以龍骨訶子末敷瘡口自合用之屢效如無根泡濃汁浸線亦妙化瘤膏白斂一兩大黃川芎赤芍當歸黃連黃芩白礬各五錢吳萸二錢半雞子黃調勻攤帛貼之此方專治肉中腫起生瘤漸大腋胠脅肋瘡瘍源流腋胠脅肋痛氣血食痰病也凡人肩下曰膊膊下曰臑臑對腋腋下為胠胠下為脅脅後為肋肋下為季肋即俗謂之肋梢季肋之下則為腰部分如此然腋胠脅肋之病雖其故皆由氣血食痰而其位實屬於肝故四者之病已詳於肝經門中茲不必重贅茲但即四者之地所患瘡瘍備列之馬刀本發腋下堅而不潰其症治亦已詳頸項篇中不復贅而腋下所發有與馬刀相似雖堅而色赤為米疽者治之用砭石欲細而長疏疏砭之外塗豕膏內仍服藥宜紫金錠內消丸內疚疽亦發腋下已詳肩臂篇中不復贅惟脅下生疽名曰發脅由肝與心包火盛虛而有熱所致但不可過用陽藥宜柴胡清肝湯神效瓜蔞散即至潰後亦惟清熱托裡兼滋腎水宜清熱消毒飲去金銀花多加熟地黃若自脅下至臍上及膝下兩旁一二寸發癰填硬難膿且難穴穴後難斂須先用暖內藥宜排膿內補十宣散外用熱藥貼令和軟宜千金不易比天助陽補精膏及寒瘡熱膏若急切破之必至膿出不止故須緩破使膿一湧而出易於收拾也虛弱人仍用大補之劑宜十全大補湯又有脅下瘡如牛眼狀者往往膿血出而不止宜以鹽少部入牛耳取其垢敷瘡口即瘥又有自脅抵腰腫赤如霞名丹毒者宜榆白皮末雞子白和塗甚至遍身青紫當急砭出惡血宜羚羊角燒灰雞子白和塗不應服紫金丹勝金丹汗之肋上發癰則曰發肋初起腫盛十數日不攻穴即大如杯如碗痛徹內腸左患應右右患應左急以針刺出膿血否則毒必內攻而多死也宜清心內固金粉散若處荒僻一時不得方藥則有簡便之法可使毒不內攻不侵臟腑不傳惡症宜黃礬丸牛膠飲不可不知也發肋論症劉涓子曰發肋及兩肩肘頭名曰夾熒疽九日可刺赤白膿相間多出可治全無赤白者不治二十日之久若仍不穴者死不治治腋胠脅肋瘡瘍方十六紫金錠米疽五倍子三兩山茨菰二兩千金子大戟各一兩麝香三錢各藥製法詳肩臂篇服法亦詳在前糯米飲丸內消丸又青皮陳皮各二兩牽牛八兩取頭末二兩皂角去皮打碎薄荷葉各八兩二味熬膏作丸每三十丸食後荊芥湯下柴胡清肝湯發脅柴胡山梔各錢半川芎黃芩人參各一錢桔梗連翹各八分甘草五分食後溫服神效瓜蔞散又當歸五錢生甘草五錢乳香沒藥各一錢瓜蔞一個子多者妙水酒煎一方有穿山甲貝母一方以各末入瓜蔞內重綿紙封之微火煅存性為末每二錢酒下清熱消毒飲又黃連山梔連翹當歸各一錢川芎白芍生地各錢半炙草八分金銀花二錢排膿內補十宣散脅癰酒當歸人參各八分鹽水拌炒黃芪防風桔梗各一錢川芎肉桂各三分白芷甘草各五分薑厚朴六分水煎或為末木香酒下此方宜於元氣虛弱風寒鬱滯不能潰散之人若熱毒壅滯氣血虛弱又當用托裡消毒散參芪托裡散丹溪謂夏月不宜用此方潰瘍亦不宜用只冬月腫瘍及些小癰疽可用耳托裡消毒散又人參鹽黃芪酒當歸炒白芍炒白朮川芎茯苓各一錢金銀花白芷各七分炙草連翹各五分參芪托裡散又人參黃芪當歸川芎麥冬芍藥黃柏知母柴胡甘草金銀花寒瘡熱膏又歸梢一兩杏仁百粒去皮尖黃丹六兩飛炒麻油一斤肥嫩柳枝一兩肥嫩桃枝三兩半俱切寸部先熬油下二枝半焦以綿裹歸梢杏仁同熬至二枝焦黑去渣極淨再煎沸入黃丹熬滴水不散為度其熱瘡寒膏同藥只歸梢用全當歸二枝分量倒轉即是十全大補湯又人參茯苓白朮炙草川芎當歸白芍熟地黃芪肉桂薑棗紫金丹丹毒勝金丹又製白砒麝香各五分蟾酥一錢雄黃辰砂乳香沒藥血竭各錢半全蠍炮天龍去頭足炙穿山甲炙各三錢炒薑蠶五錢各研末稱準每服三錢砂糖調蔥頭酒送下千金不易比天助陽補精膏外貼香油一斤四兩甘草二兩遠志牛膝虎頸骨酥炙川斷熟地焙肉蓯蓉蛇床子天冬生地菟絲子各一兩肉豆蔻面煨川楝子去核杏仁去皮尖谷精草各一兩紫梢花去草大附子官桂各四錢入藥油內煎黑色去渣下飛過黃丹八兩透明松香四兩用柳條不住手攪不散為度再下雄黃硫黃龍骨赤石脂各二錢再沸又下沉香木香蟾酥沒藥母丁香陽起石煅阿芙蓉為末再沸即住火將茶匙挑藥滴水不散為度又下黃蠟五錢將此膏收貯磁瓶密封口入水五日去火氣然後用紅絹攤勻重七錢貼六十日方換其效如神不可盡述清心內固金粉散發肋辰砂另研茯苓人參甘草各三錢緑豆四兩雄黃麝香冰片各一錢各另研朴硝另研蔻仁各五錢每一錢半蜜湯調下黃礬丸總治明礬一兩生研黃蠟五錢以蠟熔化入礬末乘熱為丸每服十丸漸加至二十丸酒下又名蠟礬丸此方治癰疽初起未破內消已破自合如服金石藥毒而發者加礬末一兩但須日服百粒方能禦毒不致內攻最能止痛不動臟腑有人遍身生瘡如蛇頭服此即效牛膠飲又牛皮膠明者四兩水一碗重湯煮化加酒中飲之至醉不飲即用白湯此方治癰疽能使毒不內攻不傳惡症此有益無損之物法宜酒煮但恐氣味難嘗不若銼碎為丸以酒送下亦權變之法
